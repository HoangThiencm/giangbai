<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Game 8: Đấu Đội Chiếm Điểm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex {
            font-size: 1.1em;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .team-win {
            animation: teamWin 1s ease-out infinite;
        }

        @keyframes teamWin {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-orange-50 to-amber-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MathText = ({ text }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!text || !ref.current) return;
                let processed = text.replace(/`([^`]+)`/g, '$$$1$$').replace(/\\\[(.+?)\\\]/g, '$$$$1$$').replace(/\\\((.+?)\\\)/g, '$$$1$$');
                if (processed.includes('\\') && !processed.includes('$')) processed = `$${processed}$`;
                const parts = processed.split(/($$[\s\S]+?$$|\$[\s\S]+?\$)/g);
                ref.current.innerHTML = "";
                parts.forEach(part => {
                    if (part.startsWith('$$') && part.endsWith('$$')) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(2, -2), span, { throwOnError: false, displayMode: true }); } catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); } catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else {
                        ref.current.appendChild(document.createTextNode(part));
                    }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        const TeamBattleGame = () => {
            const [gameData, setGameData] = useState(null);
            const [teams, setTeams] = useState([
                { id: 1, name: 'Đội Đỏ', score: 0, color: 'red' },
                { id: 2, name: 'Đội Xanh', score: 0, color: 'blue' }
            ]);
            const [currentTeamIndex, setCurrentTeamIndex] = useState(0);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showAnswer, setShowAnswer] = useState(false);
            const [gameOver, setGameOver] = useState(false);
            const [showInstructions, setShowInstructions] = useState(true);

            useEffect(() => {
                const data = localStorage.getItem('gameData');
                if (!data) {
                    alert('Không có dữ liệu game!');
                    window.location.href = 'trochoi.html';
                    return;
                }
                setGameData(JSON.parse(data));
            }, []);

            const handleSubmit = () => {
                if (selectedAnswer === null) return;
                setShowAnswer(true);

                const questions = gameData.content.questions;
                const currentQuestion = questions[currentQuestionIndex];
                const isCorrect = selectedAnswer === currentQuestion.answer;
                const value = currentQuestion.value || 10;

                if (isCorrect) {
                    const newTeams = [...teams];
                    newTeams[currentTeamIndex].score += value;
                    setTeams(newTeams);
                } else {
                    const newTeams = [...teams];
                    newTeams[currentTeamIndex].score = Math.max(0, newTeams[currentTeamIndex].score - Math.floor(value / 2));
                    setTeams(newTeams);
                }
            };

            const handleNext = () => {
                if (currentQuestionIndex < gameData.content.questions.length - 1) {
                    setCurrentQuestionIndex(currentQuestionIndex + 1);
                    setCurrentTeamIndex((currentTeamIndex + 1) % teams.length);
                    setSelectedAnswer(null);
                    setShowAnswer(false);
                } else {
                    setGameOver(true);
                }
            };

            if (!gameData) return <div className="flex items-center justify-center min-h-screen"><div className="text-2xl">Đang tải...</div></div>;

            const questions = gameData.content.questions || [];

            if (showInstructions) {
                return (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-3xl font-bold text-orange-700">
                                    <i className="fas fa-users mr-3"></i>ĐẤU ĐỘI CHIẾM ĐIỂM
                                </h2>
                                <button onClick={() => setShowInstructions(false)} className="text-gray-500 hover:text-gray-700">
                                    <i className="fas fa-times text-2xl"></i>
                                </button>
                            </div>
                            <div className="space-y-4 text-gray-700">
                                <div className="bg-orange-50 border-2 border-orange-200 rounded-xl p-4">
                                    <h3 className="font-bold text-lg text-orange-800 mb-2">
                                        <i className="fas fa-bullseye mr-2"></i>Mục tiêu
                                    </h3>
                                    <p>Tổng kết, thi đấu giữa các đội để giành chiến thắng!</p>
                                </div>
                                <div>
                                    <h3 className="font-bold text-lg text-gray-800 mb-2">
                                        <i className="fas fa-gamepad mr-2"></i>Luật chơi
                                    </h3>
                                    <ul className="space-y-2 ml-6">
                                        <li className="flex items-start gap-2">
                                            <span className="text-orange-600 font-bold">1.</span>
                                            <span><strong>2-4 đội</strong> thi đấu</span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-orange-600 font-bold">2.</span>
                                            <span>Mỗi vòng: <strong>1 đội</strong> chọn câu</span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-orange-600 font-bold">3.</span>
                                            <span>Đúng → <strong className="text-green-600">+điểm</strong> (10/20/30)</span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-orange-600 font-bold">4.</span>
                                            <span>Sai → <strong className="text-red-600">-½ điểm</strong></span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-orange-600 font-bold">5.</span>
                                            <span>Đội nhiều điểm nhất <strong className="text-yellow-600">THẮNG</strong></span>
                                        </li>
                                    </ul>
                                </div>
                                <div>
                                    <h3 className="font-bold text-lg text-gray-800 mb-2">
                                        <i className="fas fa-calculator mr-2"></i>Tính điểm
                                    </h3>
                                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 space-y-2">
                                        <p>Đúng: <strong>+value</strong> (10/20/30 điểm)</p>
                                        <p>Sai: <strong className="text-red-600">-value/2</strong></p>
                                    </div>
                                </div>
                            </div>
                            <button
                                onClick={() => setShowInstructions(false)}
                                className="w-full mt-6 py-4 bg-gradient-to-r from-orange-600 to-amber-600 text-white rounded-xl font-bold text-lg hover:shadow-xl transition"
                            >
                                <i className="fas fa-play mr-2"></i>Bắt đầu thi đấu
                            </button>
                        </div>
                    </div>
                );
            }

            if (gameOver) {
                const winner = teams.reduce((max, team) => team.score > max.score ? team : max, teams[0]);
                return (
                    <div className="max-w-3xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-12 text-center">
                            <div className={`w-24 h-24 bg-${winner.color}-100 rounded-full flex items-center justify-center mx-auto mb-6 team-win`}>
                                <i className="fas fa-trophy text-5xl text-yellow-500"></i>
                            </div>
                            <h2 className="text-4xl font-bold mb-4 text-gray-800">Chiến thắng!</h2>
                            <div className={`text-5xl font-bold text-${winner.color}-600 mb-8`}>{winner.name}</div>

                            <div className="space-y-3 mb-8">
                                {teams.sort((a, b) => b.score - a.score).map((team, idx) => (
                                    <div key={team.id} className={`p-4 rounded-xl border-2 ${idx === 0 ? `bg-${team.color}-100 border-${team.color}-500` : 'bg-gray-100 border-gray-300'}`}>
                                        <div className="flex justify-between items-center">
                                            <div className="flex items-center gap-3">
                                                <span className="text-3xl">#{idx + 1}</span>
                                                <span className="text-xl font-bold">{team.name}</span>
                                            </div>
                                            <span className="text-2xl font-bold">{team.score}đ</span>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="flex gap-4 justify-center">
                                <button onClick={() => window.location.reload()} className="px-8 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700">
                                    <i className="fas fa-redo mr-2"></i>Chơi lại
                                </button>
                                <button onClick={() => window.location.href = 'trochoi.html'} className="px-8 py-3 bg-gray-600 text-white rounded-xl font-bold hover:bg-gray-700">
                                    <i className="fas fa-home mr-2"></i>Về menu
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentTeam = teams[currentTeamIndex];
            const currentQuestion = questions[currentQuestionIndex];

            return (
                <div className="max-w-5xl mx-auto p-6 fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex gap-2">
                            <button onClick={() => window.location.href = 'trochoi.html'} className="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                                <i className="fas fa-arrow-left mr-2"></i>Thoát
                            </button>
                            <button onClick={() => setShowInstructions(true)} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                <i className="fas fa-question-circle"></i>
                            </button>
                        </div>

                        <h1 className="text-3xl font-bold text-orange-700">
                            <i className="fas fa-users mr-2"></i>ĐẤU ĐỘI CHIẾM ĐIỂM
                        </h1>

                        <div className="text-sm text-gray-600">
                            Câu {currentQuestionIndex + 1}/{questions.length}
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 mb-6">
                        {teams.map((team, idx) => (
                            <div key={team.id} className={`p-6 rounded-2xl border-4 transition ${idx === currentTeamIndex
                                    ? `bg-${team.color}-100 border-${team.color}-500 scale-105 shadow-xl`
                                    : `bg-white border-gray-300`
                                }`}>
                                <div className="flex justify-between items-center">
                                    <div>
                                        <div className="text-sm text-gray-600">{idx === currentTeamIndex ? '👉 Lượt chơi' : ''}</div>
                                        <div className="text-2xl font-bold">{team.name}</div>
                                    </div>
                                    <div className="text-4xl font-bold text-orange-600">{team.score}đ</div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="bg-white rounded-3xl shadow-2xl p-8">
                        <div className={`text-center p-4 rounded-xl mb-6 bg-${currentTeam.color}-100 border-2 border-${currentTeam.color}-500`}>
                            <div className="text-2xl font-bold">{currentTeam.name} - Câu hỏi {currentQuestion.value || 10} điểm</div>
                        </div>

                        <h3 className="text-2xl font-bold text-gray-800 mb-6">
                            <MathText text={currentQuestion.prompt} />
                        </h3>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            {currentQuestion.choices.map((choice, idx) => {
                                const isSelected = selectedAnswer === idx;
                                const isCorrect = currentQuestion.answer === idx;

                                let className = "p-4 rounded-xl border-2 cursor-pointer transition font-medium ";
                                if (showAnswer) {
                                    if (isCorrect) className += "bg-green-100 border-green-500 text-green-900";
                                    else if (isSelected) className += "bg-red-100 border-red-500 text-red-900";
                                    else className += "border-gray-200 opacity-50";
                                } else {
                                    className += isSelected ? "bg-blue-100 border-blue-500" : "border-gray-300 hover:border-blue-400 hover:bg-blue-50";
                                }

                                return (
                                    <button key={idx} onClick={() => setSelectedAnswer(idx)} disabled={showAnswer} className={className}>
                                        <div className="flex items-center gap-3">
                                            <span className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center font-bold">
                                                {String.fromCharCode(65 + idx)}
                                            </span>
                                            <div className="flex-1 text-left"><MathText text={choice} /></div>
                                            {showAnswer && isCorrect && <i className="fas fa-check-circle text-green-600 text-2xl"></i>}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>

                        <div className="flex gap-4">
                            {!showAnswer && selectedAnswer !== null && (
                                <button onClick={handleSubmit} className="flex-1 py-4 bg-green-600 text-white rounded-xl font-bold text-lg hover:bg-green-700">
                                    <i className="fas fa-check mr-2"></i>Gửi câu trả lời
                                </button>
                            )}

                            {showAnswer && (
                                <button onClick={handleNext} className="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold text-lg hover:bg-blue-700">
                                    <i className="fas fa-arrow-right mr-2"></i>Câu tiếp theo
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<TeamBattleGame />, document.getElementById('root'));
    </script>
</body>

</html>
