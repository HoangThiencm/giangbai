<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Game 4: Team Strategy Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex {
            font-size: 1.1em;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .team-pulse {
            animation: teamPulse 2s ease-in-out infinite;
        }

        @keyframes teamPulse {

            0%,
            100% {
                box-shadow: 0 0 20px currentColor;
            }

            50% {
                box-shadow: 0 0 40px currentColor;
            }
        }

        .powerup-activate {
            animation: powerupPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes powerupPop {
            0% {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }

            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-purple-50 to-pink-100 min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Math Text Component
        const MathText = ({ text }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!text || !ref.current) return;
                ref.current.innerHTML = "";
                const imgPattern = /!\[([^\]]*)\]\(([^)]+)\)/g;
                const fragments = [];
                let lastIndex = 0, match;
                while ((match = imgPattern.exec(text)) !== null) {
                    if (match.index > lastIndex) fragments.push({ type: 'text', content: text.substring(lastIndex, match.index) });
                    fragments.push({ type: 'image', alt: match[1], src: match[2] });
                    lastIndex = match.index + match[0].length;
                }
                if (lastIndex < text.length) fragments.push({ type: 'text', content: text.substring(lastIndex) });
                if (fragments.length === 0) fragments.push({ type: 'text', content: text });
                fragments.forEach(fragment => {
                    if (fragment.type === 'image') {
                        const img = document.createElement('img');
                        img.src = fragment.src;
                        img.alt = fragment.alt || 'Image';
                        img.className = 'max-h-48 rounded-lg my-2 border border-gray-200 shadow-sm inline-block';
                        ref.current.appendChild(img);
                    } else {
                        let processed = fragment.content.replace(/`([^`]+)`/g, '$$$1$$').replace(/\\\[(.+?)\\\]/g, '$$$$1$$').replace(/\\\((.+?)\\\)/g, '$$$1$$');
                        if (processed.includes('\\') && !processed.includes('$')) processed = `$${processed}$`;
                        const parts = processed.split(/($$[\s\S]+?$$|\$[\s\S]+?\$)/g);
                        parts.forEach(part => {
                            if (!part) return;
                            if (part.startsWith('$$') && part.endsWith('$$')) {
                                const span = document.createElement("span");
                                try { katex.render(part.slice(2, -2), span, { throwOnError: false, displayMode: true }); } catch { span.textContent = part; }
                                ref.current.appendChild(span);
                            } else if (part.startsWith("$") && part.endsWith("$")) {
                                const span = document.createElement("span");
                                try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); } catch { span.textContent = part; }
                                ref.current.appendChild(span);
                            } else if (part.trim()) {
                                ref.current.appendChild(document.createTextNode(part));
                            }
                        });
                    }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        // Gemini Service
        const GeminiService = {
            getApiKeys: () => { const keys = localStorage.getItem('global_gemini_keys'); return keys ? JSON.parse(keys) : []; },
            getDefaultModule: () => localStorage.getItem('default_gemini_module') || 'gemini-2.0-flash-exp',
            buildPrompt: (params) => {
                const { subject, gradeMax, topic, difficulty, numQuestions, mode } = params;
                return `Bạn là trợ lý tạo câu hỏi cho game "Team Strategy Quiz".

Môn: ${subject}, Lớp tối đa: ${gradeMax}, Chủ đề: ${topic}, Độ khó: ${difficulty}
Mode: ${mode === 'classroom' ? 'Lớp học' : 'Thi đấu'}

Tạo ${numQuestions} câu hỏi MIX dạng: MCQ (60%), True/False (40%)
- ${Math.ceil(numQuestions * 0.3)} câu CÁ NHÂN (individual: true)
- ${Math.floor(numQuestions * 0.7)} câu ĐỘI (individual: false)
- LaTeX: \\( ... \\)
- KHÔNG tiền tố A., B., C., D.

JSON (KHÔNG thêm chữ):
{
  "questions": [
    {"id":"q1","type":"mcq","prompt":"...","choices":["A","B","C","D"],"answer":0,"individual":true},
    {"id":"q2","type":"truefalse","prompt":"...","answer":true,"individual":false}
  ]
}`;
            },
            generate: async (params) => {
                const prompt = GeminiService.buildPrompt(params);
                const apiKeys = GeminiService.getApiKeys();
                if (!apiKeys.length) throw new Error("Chưa có API Keys!");
                const defaultModule = GeminiService.getDefaultModule();
                const shuffledKeys = [...apiKeys].sort(() => Math.random() - 0.5);
                for (let i = 0; i < shuffledKeys.length; i++) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${defaultModule}:generateContent?key=${shuffledKeys[i]}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await res.json();
                        if (data.error) throw new Error(data.error.message);
                        const text = data.candidates[0].content.parts[0].text;
                        return GeminiService.parseJSON(text);
                    } catch (e) {
                        console.error(`Key ${i + 1} lỗi:`, e.message);
                        if (i === shuffledKeys.length - 1) throw e;
                    }
                }
            },
            parseJSON: (text) => {
                let jsonStr = text.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                const startIdx = Math.min(jsonStr.indexOf('{') >= 0 ? jsonStr.indexOf('{') : Infinity, jsonStr.indexOf('[') >= 0 ? jsonStr.indexOf('[') : Infinity);
                const endIdx = Math.max(jsonStr.lastIndexOf('}'), jsonStr.lastIndexOf(']'));
                if (startIdx !== Infinity && endIdx >= 0) jsonStr = jsonStr.substring(startIdx, endIdx + 1);
                try { return JSON.parse(jsonStr); } catch (e) { const fixed = jsonStr.replace(/"([^"]*)"/g, (match, str) => `"${str.replace(/\\/g, '\\\\')}"`); return JSON.parse(fixed); }
            }
        };

        const TEAM_COLORS = {
            blue: { bg: 'bg-blue-500', border: 'border-blue-500', text: 'text-blue-700', light: 'bg-blue-50' },
            red: { bg: 'bg-red-500', border: 'border-red-500', text: 'text-red-700', light: 'bg-red-50' },
            green: { bg: 'bg-green-500', border: 'border-green-500', text: 'text-green-700', light: 'bg-green-50' },
            yellow: { bg: 'bg-yellow-500', border: 'border-yellow-500', text: 'text-yellow-700', light: 'bg-yellow-50' }
        };

        const TeamBattleGame = () => {
            const [currentScreen, setCurrentScreen] = useState('INSTRUCTIONS');
            const [gameMode, setGameMode] = useState('classroom');
            const [teams, setTeams] = useState([]);
            const [questions, setQuestions] = useState([]);
            const [currentTeamIndex, setCurrentTeamIndex] = useState(0);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [timeLeft, setTimeLeft] = useState(30);
            const [timerActive, setTimerActive] = useState(false);
            const [showAnswer, setShowAnswer] = useState(false);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [trueFalseAnswer, setTrueFalseAnswer] = useState(null);
            const [activePowerUps, setActivePowerUps] = useState({});
            const [aiGenParams, setAiGenParams] = useState({ subject: 'Toán học', gradeMax: 9, topic: '', difficulty: 'Vừa', numQuestions: 10, mode: 'classroom' });
            const [aiGenerating, setAiGenerating] = useState(false);

            useEffect(() => { const token = localStorage.getItem('authToken'); if (!token) { alert("Chưa đăng nhập!"); window.location.href = 'login.html'; } }, []);
            useEffect(() => { if (timerActive && timeLeft > 0 && !showAnswer) { const timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000); return () => clearTimeout(timer); } else if (timeLeft === 0 && timerActive && !showAnswer) { handleRevealAnswer(); } }, [timeLeft, timerActive, showAnswer]);

            const handleGenerateQuestions = async () => {
                if (!aiGenParams.topic.trim()) { alert('Vui lòng nhập chủ đề!'); return; }
                setAiGenerating(true);
                try {
                    const result = await GeminiService.generate({ ...aiGenParams, mode: gameMode });
                    if (result.questions && result.questions.length > 0) {
                        const cleanedQuestions = result.questions.map(q => {
                            if (q.type === 'mcq' && q.choices) {
                                let cleaned = q.choices.map(ch => typeof ch === 'string' ? ch.replace(/^[A-D]\.\s*/, '').trim() : ch);
                                const uniqueChoices = [...new Set(cleaned)];
                                if (uniqueChoices.length < cleaned.length) { q.choices = uniqueChoices; while (q.choices.length < 4) { q.choices.push(`Đáp án ${q.choices.length + 1}`); } } else { q.choices = cleaned; }
                            }
                            return q;
                        });
                        setQuestions(cleanedQuestions);
                        setCurrentScreen('Q_LIST');
                    } else { alert('Không tạo được câu hỏi!'); }
                } catch (error) { alert('Lỗi: ' + error.message); } finally { setAiGenerating(false); }
            };

            const startGame = () => {
                if (teams.length < 2) { alert('Cần ít nhất 2 đội!'); return; }
                if (questions.length === 0) { alert('Cần ít nhất 1 câu hỏi!'); return; }
                setCurrentQuestionIndex(0); setCurrentTeamIndex(0); setCurrentScreen('GAME'); startQuestion();
            };

            const startQuestion = () => {
                const timeLimit = gameMode === 'classroom' ? 30 : 20;
                setTimeLeft(timeLimit); setTimerActive(true); setShowAnswer(false); setSelectedAnswer(null); setTrueFalseAnswer(null);
            };

            const handleRevealAnswer = () => {
                setTimerActive(false); setShowAnswer(true);
                const currentQ = questions[currentQuestionIndex];
                const currentTeam = teams[currentTeamIndex];
                let isCorrect = false;
                if (currentQ.type === 'mcq') isCorrect = selectedAnswer === currentQ.answer;
                else if (currentQ.type === 'truefalse') isCorrect = trueFalseAnswer === currentQ.answer;
                if (isCorrect) {
                    let points = 10;
                    if (activePowerUps[currentTeam.id]?.double) { points *= 2; setActivePowerUps({ ...activePowerUps, [currentTeam.id]: { ...activePowerUps[currentTeam.id], double: false } }); }
                    const updatedTeams = [...teams];
                    const teamIdx = updatedTeams.findIndex(t => t.id === currentTeam.id);
                    if (currentQ.individual) updatedTeams[teamIdx].individualScore += points;
                    else updatedTeams[teamIdx].teamScore += points;
                    setTeams(updatedTeams);
                }
                setTimeout(() => { goNextQuestion(); }, 2500);
            };

            const goNextQuestion = () => {
                if (currentQuestionIndex < questions.length - 1) {
                    setCurrentQuestionIndex(currentQuestionIndex + 1);
                    const nextTeamIndex = (currentTeamIndex + 1) % teams.length;
                    setCurrentTeamIndex(nextTeamIndex);
                    setTimeout(startQuestion, 500);
                } else { setCurrentScreen('RESULTS'); }
            };

            const usePowerUp = (powerUpId) => {
                const currentTeam = teams[currentTeamIndex];
                if (activePowerUps[currentTeam.id]?.[powerUpId]) { alert('Power-up đã được kích hoạt!'); return; }
                setActivePowerUps({ ...activePowerUps, [currentTeam.id]: { ...activePowerUps[currentTeam.id], [powerUpId]: true } });
                if (powerUpId === 'timefreeze') setTimeLeft(timeLeft + 10);
                else if (powerUpId === 'steal') {
                    const otherTeams = teams.filter(t => t.id !== currentTeam.id);
                    if (otherTeams.length > 0) {
                        const targetTeam = otherTeams[Math.floor(Math.random() * otherTeams.length)];
                        const stolenPoints = Math.floor((targetTeam.teamScore + targetTeam.individualScore) * 0.2);
                        const updatedTeams = teams.map(t => {
                            if (t.id === targetTeam.id) return { ...t, teamScore: Math.max(0, t.teamScore - stolenPoints) };
                            else if (t.id === currentTeam.id) return { ...t, teamScore: t.teamScore + stolenPoints };
                            return t;
                        });
                        setTeams(updatedTeams);
                    }
                }
            };

            // SCREEN: INSTRUCTIONS
            if (currentScreen === 'INSTRUCTIONS') {
                return (
                    <div className="max-w-4xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-8">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-3xl font-bold text-purple-700"><i className="fas fa-users mr-3"></i>ĐỐI KHÁNG ĐỘI</h2>
                                <button onClick={() => window.location.href = 'trochoi.html'} className="text-gray-500 hover:text-gray-700"><i className="fas fa-times text-2xl"></i></button>
                            </div>
                            <div className="space-y-4 text-gray-700">
                                <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-4">
                                    <h3 className="font-bold text-lg text-purple-800 mb-2"><i className="fas fa-bullseye mr-2"></i>Mục tiêu</h3>
                                    <p>Game đối kháng đội! Hợp tác + Chiến thuật + Kiến thức!</p>
                                </div>
                                <div>
                                    <h3 className="font-bold text-lg text-gray-800 mb-2"><i className="fas fa-gamepad mr-2"></i>Luật chơi</h3>
                                    <ul className="space-y-2 ml-6">
                                        <li className="flex items-start gap-2"><span className="text-purple-600 font-bold">1.</span><span>2-4 đội thi đấu, mỗi đội 1-6 người</span></li>
                                        <li className="flex items-start gap-2"><span className="text-purple-600 font-bold">2.</span><span>Chơi theo <strong>lượt</strong></span></li>
                                        <li className="flex items-start gap-2"><span className="text-purple-600 font-bold">3.</span><span>Có câu <strong className="text-blue-600">ĐỘI</strong> + câu <strong className="text-green-600">CÁ NHÂN</strong></span></li>
                                        <li className="flex items-start gap-2"><span className="text-purple-600 font-bold">4.</span><span>Điểm = <strong>70% đội + 30% cá nhân</strong></span></li>
                                        <li className="flex items-start gap-2"><span className="text-purple-600 font-bold">5.</span><span>Có <strong className="text-yellow-600">Kỹ năng</strong></span></li>
                                    </ul>
                                </div>
                            </div>
                            <button onClick={() => setCurrentScreen('MODE_SELECT')} className="w-full mt-6 py-4 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-xl font-bold text-lg hover:shadow-xl"><i className="fas fa-arrow-right mr-2"></i>Tiếp tục</button>
                        </div>
                    </div>
                );
            }

            // SCREEN: MODE_SELECT
            if (currentScreen === 'MODE_SELECT') {
                return (
                    <div className="max-w-4xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-8">
                            <h2 className="text-3xl font-bold text-center text-purple-700 mb-6"><i className="fas fa-cog mr-2"></i>Chọn chế độ</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <button onClick={() => { setGameMode('classroom'); setCurrentScreen('TEAM_SETUP'); }} className="border-4 border-blue-500 rounded-2xl p-6 hover:bg-blue-50 transition text-left">
                                    <div className="text-5xl mb-4 text-center">🏫</div>
                                    <h3 className="text-2xl font-bold text-blue-700 mb-3">Chế độ Lớp học</h3>
                                    <p className="text-gray-600 mb-2">• 2 đội</p>
                                    <p className="text-gray-600 mb-2">• Không sabotage</p>
                                    <p className="text-gray-600 mb-2">• 2 kỹ năng</p>
                                    <p className="text-gray-600">• Dành cho lớp học</p>
                                </button>
                                <button onClick={() => { setGameMode('tournament'); setCurrentScreen('TEAM_SETUP'); }} className="border-4 border-red-500 rounded-2xl p-6 hover:bg-red-50 transition text-left">
                                    <div className="text-5xl mb-4 text-center">🏆</div>
                                    <h3 className="text-2xl font-bold text-red-700 mb-3">Chế độ Thi đấu</h3>
                                    <p className="text-gray-600 mb-2">• 3-4 đội</p>
                                    <p className="text-gray-600 mb-2">• Đầy đủ kỹ năng</p>
                                    <p className="text-gray-600 mb-2">• Hệ thống chuông</p>
                                    <p className="text-gray-600">• Thi đấu/sự kiện</p>
                                </button>
                            </div>
                            <button onClick={() => setCurrentScreen('INSTRUCTIONS')} className="w-full mt-6 py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600"><i className="fas fa-arrow-left mr-2"></i>Quay lại</button>
                        </div>
                    </div>
                );
            }

            // SCREEN: TEAM_SETUP
            if (currentScreen === 'TEAM_SETUP') {
                const maxTeams = gameMode === 'classroom' ? 2 : 4;
                const addTeam = () => {
                    if (teams.length >= maxTeams) { alert(`Tối đa ${maxTeams} đội!`); return; }
                    const colors = ['blue', 'red', 'green', 'yellow'];
                    const usedColors = teams.map(t => t.color);
                    const availableColor = colors.find(c => !usedColors.includes(c));
                    setTeams([...teams, { id: Date.now(), name: `Đội ${teams.length + 1}`, color: availableColor, players: [], teamScore: 0, individualScore: 0 }]);
                };
                const removeTeam = (id) => setTeams(teams.filter(t => t.id !== id));
                const updateTeamName = (id, name) => setTeams(teams.map(t => t.id === id ? { ...t, name } : t));
                const addPlayer = (teamId) => {
                    const updatedTeams = teams.map(t => {
                        if (t.id === teamId) {
                            if (t.players.length >= 6) { alert('Tối đa 6 người/đội!'); return t; }
                            return { ...t, players: [...t.players, { id: Date.now(), name: `Người ${t.players.length + 1}` }] };
                        }
                        return t;
                    });
                    setTeams(updatedTeams);
                };
                const removePlayer = (teamId, playerId) => setTeams(teams.map(t => t.id === teamId ? { ...t, players: t.players.filter(p => p.id !== playerId) } : t));
                const updatePlayerName = (teamId, playerId, name) => setTeams(teams.map(t => t.id === teamId ? { ...t, players: t.players.map(p => p.id === playerId ? { ...p, name } : p) } : t));

                return (
                    <div className="max-w-5xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-8">
                            <h2 className="text-3xl font-bold text-purple-700 mb-6"><i className="fas fa-users mr-2"></i>Thiết lập đội ({teams.length}/{maxTeams})</h2>
                            <div className="space-y-4 mb-6">
                                {teams.map(team => {
                                    const colors = TEAM_COLORS[team.color];
                                    return (
                                        <div key={team.id} className={`border-2 ${colors.border} rounded-xl p-4 ${colors.light}`}>
                                            <div className="flex items-center gap-3 mb-3">
                                                <input type="text" value={team.name} onChange={(e) => updateTeamName(team.id, e.target.value)} className="flex-1 px-4 py-2 border-2 border-gray-300 rounded-lg font-bold text-lg" />
                                                <button onClick={() => removeTeam(team.id)} className="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600"><i className="fas fa-trash"></i></button>
                                            </div>
                                            <div className="ml-4 space-y-2">
                                                {team.players.map(player => (
                                                    <div key={player.id} className="flex items-center gap-2">
                                                        <input type="text" value={player.name} onChange={(e) => updatePlayerName(team.id, player.id, e.target.value)} className="flex-1 px-3 py-1 border border-gray-300 rounded" placeholder="Tên thành viên" />
                                                        <button onClick={() => removePlayer(team.id, player.id)} className="px-2 py-1 bg-red-400 text-white rounded text-sm"><i className="fas fa-times"></i></button>
                                                    </div>
                                                ))}
                                                <button onClick={() => addPlayer(team.id)} className="text-sm text-blue-600 hover:underline"><i className="fas fa-plus mr-1"></i>Thêm thành viên ({team.players.length}/6)</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            {teams.length < maxTeams && <button onClick={addTeam} className="w-full py-3 border-2 border-dashed border-purple-400 text-purple-600 rounded-xl font-bold hover:bg-purple-50"><i className="fas fa-plus mr-2"></i>Thêm đội</button>}
                            <div className="flex gap-4 mt-6">
                                <button onClick={() => setCurrentScreen('MODE_SELECT')} className="flex-1 py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600"><i className="fas fa-arrow-left mr-2"></i>Quay lại</button>
                                <button onClick={() => { if (teams.length >= 2) setCurrentScreen('AI_GEN'); else alert('Cần ít nhất 2 đội!'); }} className="flex-1 py-3 bg-purple-600 text-white rounded-xl font-bold hover:bg-purple-700"><i className="fas fa-arrow-right mr-2"></i>Tiếp tục</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // SCREEN: AI_GEN
            if (currentScreen === 'AI_GEN') {
                return (
                    <div className="max-w-3xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-8">
                            <h2 className="text-3xl font-bold text-purple-700 mb-6"><i className="fas fa-robot mr-2"></i>Tạo câu hỏi</h2>
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div><label className="block font-bold mb-2">Môn học:</label><select value={aiGenParams.subject} onChange={(e) => setAiGenParams({ ...aiGenParams, subject: e.target.value })} className="w-full p-3 border-2 border-gray-200 rounded-xl"><option>Toán học</option><option>Tiếng Việt</option><option>Tiếng Anh</option><option>Vật lý</option><option>Hóa học</option></select></div>
                                    <div><label className="block font-bold mb-2">Lớp:</label><select value={aiGenParams.gradeMax} onChange={(e) => setAiGenParams({ ...aiGenParams, gradeMax: parseInt(e.target.value) })} className="w-full p-3 border-2 border-gray-200 rounded-xl">{[6, 7, 8, 9, 10, 11, 12].map(g => <option key={g} value={g}>Lớp {g}</option>)}</select></div>
                                </div>
                                <div><label className="block font-bold mb-2">Chủ đề:</label><input type="text" value={aiGenParams.topic} onChange={(e) => setAiGenParams({ ...aiGenParams, topic: e.target.value })} className="w-full p-3 border-2 border-gray-200 rounded-xl" placeholder="VD: Phân số, Phương trình..." /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="block font-bold mb-2">Độ khó:</label><select value={aiGenParams.difficulty} onChange={(e) => setAiGenParams({ ...aiGenParams, difficulty: e.target.value })} className="w-full p-3 border-2 border-gray-200 rounded-xl"><option>Dễ</option><option>Vừa</option><option>Khó</option></select></div>
                                    <div><label className="block font-bold mb-2">Số câu:</label><input type="number" value={aiGenParams.numQuestions} onChange={(e) => setAiGenParams({ ...aiGenParams, numQuestions: parseInt(e.target.value) || 10 })} className="w-full p-3 border-2 border-gray-200 rounded-xl" min="5" max="20" /></div>
                                </div>
                                <button onClick={handleGenerateQuestions} disabled={aiGenerating} className="w-full py-4 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-xl font-bold text-lg hover:shadow-xl disabled:opacity-50">{aiGenerating ? <><i className="fas fa-spinner fa-spin mr-2"></i>Đang tạo...</> : <><i className="fas fa-magic mr-2"></i>Tạo câu hỏi</>}</button>
                                <button onClick={() => setCurrentScreen('TEAM_SETUP')} className="w-full py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600"><i className="fas fa-arrow-left mr-2"></i>Quay lại</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // SCREEN: Q_LIST
            if (currentScreen === 'Q_LIST') {
                return (
                    <div className="max-w-4xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-8">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-3xl font-bold text-purple-700"><i className="fas fa-list mr-2"></i>Câu hỏi ({questions.length})</h2>
                                <button onClick={startGame} className="px-6 py-3 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded-xl font-bold hover:shadow-xl"><i className="fas fa-play mr-2"></i>Chơi ngay</button>
                            </div>
                            <div className="space-y-3 mb-6">
                                {questions.map((q, idx) => (
                                    <div key={idx} className="border-2 border-gray-200 rounded-xl p-4 hover:border-purple-400 transition">
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2 mb-2">
                                                    <span className="text-lg font-bold text-purple-600">#{idx + 1}</span>
                                                    <span className={`px-2 py-1 ${q.individual ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'} text-xs rounded-full font-bold`}>{q.individual ? 'CÁ NHÂN' : 'ĐỘI'}</span>
                                                    <span className="px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded-full">{q.type === 'mcq' ? 'Trắc nghiệm' : 'Đúng/Sai'}</span>
                                                </div>
                                                <div className="text-gray-800"><MathText text={q.prompt} /></div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setCurrentScreen('AI_GEN')} className="w-full py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600"><i className="fas fa-arrow-left mr-2"></i>Quay lại</button>
                        </div>
                    </div>
                );
            }

            // SCREEN: GAME
            if (currentScreen === 'GAME') {
                const currentQ = questions[currentQuestionIndex];
                const currentTeam = teams[currentTeamIndex];
                const colors = TEAM_COLORS[currentTeam.color];

                return (
                    <div className="max-w-6xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-xl p-6 mb-6">
                            <div className="grid grid-cols-3 gap-4 items-center">
                                <div className="text-sm text-gray-600">Câu {currentQuestionIndex + 1}/{questions.length}</div>
                                <div className="text-center"><div className={`text-5xl font-bold ${timeLeft <= 5 ? 'text-red-600 animate-pulse' : 'text-blue-600'}`}>{timeLeft}s</div></div>
                                <div className="text-right">
                                    {gameMode === 'tournament' && (
                                        <div className="flex gap-2 justify-end">
                                            <button onClick={() => usePowerUp('shield')} disabled={activePowerUps[currentTeam.id]?.shield} className="px-3 py-2 bg-blue-500 text-white rounded-lg text-sm disabled:opacity-50">🛡️ Shield</button>
                                            <button onClick={() => usePowerUp('double')} disabled={activePowerUps[currentTeam.id]?.double} className="px-3 py-2 bg-yellow-500 text-white rounded-lg text-sm disabled:opacity-50">✨ x2</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                            {teams.map((team, idx) => {
                                const tColors = TEAM_COLORS[team.color];
                                const finalScore = Math.round(team.teamScore * 0.7 + team.individualScore * 0.3);
                                return (
                                    <div key={team.id} className={`p-4 rounded-xl border-2 transition ${idx === currentTeamIndex ? `${tColors.border} ${tColors.light} shadow-lg scale-105` : 'border-gray-300 bg-white'}`}>
                                        <div className="text-xs text-gray-600 mb-1">{idx === currentTeamIndex ? '👉 Lượt chơi' : ''}</div>
                                        <div className="font-bold text-lg mb-1">{team.name}</div>
                                        <div className="text-2xl font-bold text-purple-600">{finalScore}đ</div>
                                        <div className="text-xs text-gray-500 mt-1">Đội: {team.teamScore} | Cá nhân: {team.individualScore}</div>
                                    </div>
                                );
                            })}
                        </div>

                        <div className="bg-white rounded-3xl shadow-2xl p-8">
                            <div className={`text-center p-4 rounded-xl mb-6 ${colors.light} border-2 ${colors.border}`}>
                                <div className="text-2xl font-bold">{currentTeam.name} - {currentQ.individual ? 'Câu CÁ NHÂN' : 'Câu ĐỘI'}</div>
                            </div>

                            <h3 className="text-2xl font-bold text-gray-800 mb-6"><MathText text={currentQ.prompt} /></h3>

                            {currentQ.type === 'mcq' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                    {currentQ.choices.map((choice, idx) => {
                                        const isSelected = selectedAnswer === idx;
                                        const isCorrect = currentQ.answer === idx;
                                        let className = "p-4 rounded-xl border-2 cursor-pointer transition font-medium ";
                                        if (showAnswer) {
                                            if (isCorrect) className += "bg-green-100 border-green-500 text-green-900";
                                            else if (isSelected) className += "bg-red-100 border-red-500 text-red-900";
                                            else className += "border-gray-200 opacity-50";
                                        } else {
                                            className += isSelected ? "bg-blue-100 border-blue-500" : "border-gray-300 hover:border-blue-400 hover:bg-blue-50";
                                        }
                                        return (
                                            <button key={idx} onClick={() => setSelectedAnswer(idx)} disabled={showAnswer} className={className}>
                                                <div className="flex items-center gap-3">
                                                    <span className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center font-bold">{String.fromCharCode(65 + idx)}</span>
                                                    <div className="flex-1 text-left"><MathText text={choice} /></div>
                                                    {showAnswer && isCorrect && <i className="fas fa-check-circle text-green-600 text-2xl"></i>}
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            )}

                            {currentQ.type === 'truefalse' && (
                                <div className="grid grid-cols-2 gap-4 mb-6">
                                    {[true, false].map((value) => {
                                        const isSelected = trueFalseAnswer === value;
                                        const isCorrect = currentQ.answer === value;
                                        let className = "p-6 rounded-xl border-2 cursor-pointer transition font-bold text-xl ";
                                        if (showAnswer) {
                                            if (isCorrect) className += "bg-green-100 border-green-500 text-green-900";
                                            else if (isSelected) className += "bg-red-100 border-red-500 text-red-900";
                                            else className += "border-gray-200 opacity-50";
                                        } else {
                                            className += isSelected ? "bg-blue-100 border-blue-500" : "border-gray-300 hover:border-blue-400 hover:bg-blue-50";
                                        }
                                        return (
                                            <button key={String(value)} onClick={() => setTrueFalseAnswer(value)} disabled={showAnswer} className={className}>
                                                <div className="flex items-center justify-center gap-3">
                                                    <span className="text-4xl">{value ? '✓' : '✗'}</span>
                                                    <span>{value ? 'ĐÚNG' : 'SAI'}</span>
                                                    {showAnswer && isCorrect && <i className="fas fa-check-circle text-green-600 text-2xl"></i>}
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            )}

                            <div className="flex gap-4">
                                {!showAnswer && ((currentQ.type === 'mcq' && selectedAnswer !== null) || (currentQ.type === 'truefalse' && trueFalseAnswer !== null)) && (
                                    <button onClick={handleRevealAnswer} className="flex-1 py-4 bg-green-600 text-white rounded-xl font-bold text-lg hover:bg-green-700"><i className="fas fa-check mr-2"></i>Gửi câu trả lời</button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // SCREEN: RESULTS
            if (currentScreen === 'RESULTS') {
                const rankedTeams = [...teams].map(t => ({ ...t, finalScore: Math.round(t.teamScore * 0.7 + t.individualScore * 0.3) })).sort((a, b) => b.finalScore - a.finalScore);
                const winner = rankedTeams[0];

                return (
                    <div className="max-w-4xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-12 text-center">
                            <div className="text-8xl mb-6">🎉</div>
                            <h1 className="text-5xl font-bold text-purple-600 mb-4">Hoàn thành!</h1>
                            <div className="mb-8">
                                <div className="text-7xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-600 to-orange-600 mb-2">{winner.name}</div>
                                <div className="text-3xl text-gray-600">Chiến thắng với {winner.finalScore} điểm!</div>
                            </div>
                            <div className="space-y-3 mb-8">
                                {rankedTeams.map((team, idx) => {
                                    const colors = TEAM_COLORS[team.color];
                                    return (
                                        <div key={team.id} className={`p-6 rounded-2xl border-2 ${idx === 0 ? `${colors.light} ${colors.border}` : 'bg-gray-100 border-gray-300'}`}>
                                            <div className="flex justify-between items-center">
                                                <div className="flex items-center gap-4">
                                                    <span className="text-4xl font-bold">#{idx + 1}</span>
                                                    <div className="text-left">
                                                        <div className="text-2xl font-bold">{team.name}</div>
                                                        <div className="text-sm text-gray-600">Đội: {team.teamScore}đ | Cá nhân: {team.individualScore}đ</div>
                                                    </div>
                                                </div>
                                                <div className="text-4xl font-bold text-purple-600">{team.finalScore}đ</div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="flex gap-4 justify-center">
                                <button onClick={() => window.location.reload()} className="px-8 py-4 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded-2xl font-bold text-lg hover:shadow-xl"><i className="fas fa-redo mr-2"></i>Chơi lại</button>
                                <button onClick={() => window.location.href = 'trochoi.html'} className="px-8 py-4 bg-gray-500 text-white rounded-2xl font-bold text-lg hover:bg-gray-600"><i className="fas fa-home mr-2"></i>Menu</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return <div className="text-center p-8">Đang tải...</div>;
        };

        ReactDOM.render(<TeamBattleGame />, document.getElementById('root'));
    </script>
</body>

</html>
