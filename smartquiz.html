<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SmartQuiz AI - Soạn & Dạy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <!-- KaTeX cho hiển thị toán học -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex { font-size: 1.2em; color: #1e3a8a; }
        /* Animation nhẹ */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- HELPER: LÀM SẠCH NỘI DUNG OPTION (FIX LỖI TRÙNG LẶP) ---
        // Hàm này sẽ cắt bỏ "A.", "B)", "1." ở đầu chuỗi
        const cleanOptionText = (text) => {
            if (!text) return "";
            // Regex tìm ký tự A-Z hoặc a-z hoặc số, theo sau là dấu chấm, ngoặc đơn, hai chấm hoặc gạch ngang
            return text.replace(/^([A-Da-d0-9]+)([\.\)\:\-])\s*/, '').trim();
        };

        // --- HELPER: CHUYỂN ĐỔI TEXT SANG MATHML CHO WORD ---
        const convertToMathML = (text) => {
            if (!text) return "";
            
            // 1. Chuẩn hóa các loại dấu công thức về $...$
            let standardized = text
                .replace(/`([^`]+)`/g, '$$$1$$') 
                .replace(/\\\[(.*?)\\\]/g, '$$$$$1$$$$')
                .replace(/\\\((.*?)\\\)/g, '$$$1$$');

            // 2. Tìm các đoạn $...$ và render thành MathML
            return standardized.replace(/\$([^$]+)\$/g, (match, latex) => {
                try {
                    return katex.renderToString(latex, {
                        throwOnError: false,
                        output: 'mathml', 
                        displayMode: false
                    });
                } catch (e) {
                    return match;
                }
            });
        };

        // --- COMPONENT HIỂN THỊ TOÁN TRÊN WEB ---
        const MathText = ({ text }) => {
            const ref = useRef(null);

            useEffect(() => {
                if (!text || !ref.current) return;

                let processed = text
                    .replace(/`([^`]+)`/g, '$$$1$$')
                    .replace(/\\\[(.*?)\\\]/g, '$$$$$1$$$$')
                    .replace(/\\\((.*?)\\\)/g, '$$$1$$');

                ref.current.innerHTML = processed;

                if (window.renderMathInElement) {
                    try {
                        window.renderMathInElement(ref.current, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$', right: '$', display: false},
                                {left: '\\(', right: '\\)', display: false},
                                {left: '\\[', right: '\\]', display: true}
                            ],
                            throwOnError: false
                        });
                    } catch (e) { console.error(e); }
                }
            }, [text]);

            return <span ref={ref} />;
        };

        // --- PRESENTATION MODE ---
        const PresentationMode = ({ questions, onExit }) => {
            const [idx, setIdx] = useState(0);
            const [showAns, setShowAns] = useState(false);
            const [selectedOpt, setSelectedOpt] = useState(null);
            const q = questions[idx];

            useEffect(() => { setShowAns(false); setSelectedOpt(null); }, [idx]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === "ArrowRight" && idx < questions.length - 1) setIdx(i => i + 1);
                    if (e.key === "ArrowLeft" && idx > 0) setIdx(i => i - 1);
                    if (e.key === " " || e.key === "Enter") setShowAns(prev => !prev);
                    if (e.key === "Escape") onExit();
                };
                window.addEventListener("keydown", handleKeyDown);
                return () => window.removeEventListener("keydown", handleKeyDown);
            }, [idx, questions.length, onExit]);

            return (
                <div className="fixed inset-0 bg-slate-900 text-white z-50 flex flex-col p-4 md:p-6 transition-colors duration-500">
                    <div className="flex justify-between items-center mb-4">
                        <button onClick={onExit} className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg transition flex items-center gap-2">
                            <i className="fas fa-times"></i> <span className="hidden md:inline">Thoát</span>
                        </button>
                        <div className="text-xl font-bold text-gray-300">Câu {idx+1} <span className="text-sm font-normal text-gray-500">/ {questions.length}</span></div>
                        <div className="w-20"></div>
                    </div>
                    
                    <div className="flex-1 flex flex-col justify-center items-center max-w-6xl mx-auto w-full">
                        <div className="bg-white text-slate-900 p-8 md:p-12 rounded-3xl shadow-2xl w-full min-h-[50vh] flex flex-col justify-center relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-100 rounded-bl-full -z-0 opacity-50"></div>
                            <h3 className="text-2xl md:text-4xl font-bold mb-10 leading-relaxed text-slate-800 z-10 border-l-8 border-indigo-500 pl-6">
                                <MathText text={q.question} />
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 z-10">
                                {q.options.map((opt, i) => {
                                    let containerClass = "p-6 rounded-2xl text-xl border-2 transition-all duration-300 cursor-pointer flex items-center gap-4 relative overflow-hidden ";
                                    if (showAns && i === q.correctAnswerIndex) containerClass += "bg-green-50 border-green-500 text-green-900 font-bold shadow-lg transform scale-105 ring-4 ring-green-100";
                                    else if (selectedOpt === i) containerClass += "bg-blue-50 border-blue-500 text-blue-900 shadow-md";
                                    else if (showAns && selectedOpt === i && i !== q.correctAnswerIndex) containerClass += "bg-red-50 border-red-300 text-red-900 opacity-70";
                                    else { containerClass += "border-gray-200 hover:bg-gray-50 hover:border-indigo-300"; if (showAns) containerClass += " opacity-40 grayscale"; }

                                    return (
                                        <div key={i} onClick={() => !showAns && setSelectedOpt(i)} className={containerClass}>
                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg flex-shrink-0 transition-colors ${showAns && i === q.correctAnswerIndex ? 'bg-green-600 text-white' : selectedOpt === i ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'}`}>{String.fromCharCode(65+i)}</div>
                                            {/* SỬ DỤNG cleanOptionText Ở ĐÂY */}
                                            <div className="flex-1"><MathText text={cleanOptionText(opt)} /></div>
                                            {showAns && i === q.correctAnswerIndex && <i className="fas fa-check-circle text-green-600 text-2xl absolute right-4"></i>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    <div className="mt-8 flex justify-center items-center gap-6">
                        <button disabled={idx===0} onClick={()=>{setIdx(idx-1)}} className="w-14 h-14 bg-slate-700 rounded-full hover:bg-blue-600 disabled:opacity-30 disabled:hover:bg-slate-700 transition flex items-center justify-center text-white shadow-lg"><i className="fas fa-arrow-left text-2xl"></i></button>
                        <button onClick={()=>setShowAns(!showAns)} className="px-10 py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-extrabold rounded-2xl text-xl shadow-xl transition transform active:scale-95 flex items-center gap-3 min-w-[240px] justify-center">{showAns ? <><i className="fas fa-eye-slash"></i> Ẩn Đáp Án</> : <><i className="fas fa-eye"></i> Hiện Đáp Án</>}</button>
                        <button disabled={idx===questions.length-1} onClick={()=>{setIdx(idx+1)}} className="w-14 h-14 bg-slate-700 rounded-full hover:bg-blue-600 disabled:opacity-30 disabled:hover:bg-slate-700 transition flex items-center justify-center text-white shadow-lg"><i className="fas fa-arrow-right text-2xl"></i></button>
                    </div>
                    <div className="text-center mt-4 text-gray-500 text-sm hidden md:block">Phím tắt: [←] Câu trước | [→] Câu sau | [Space] Đáp án | [Esc] Thoát</div>
                </div>
            );
        };

        // --- APP CHÍNH ---
        const App = () => {
            const [step, setStep] = useState(1);
            const [topic, setTopic] = useState("");
            const [numQ, setNumQ] = useState(5);
            const [level, setLevel] = useState("Trung bình");
            const [questions, setQuestions] = useState([]);
            const [loading, setLoading] = useState(false);
            const [apiKeys, setApiKeys] = useState([]);
            const [retryCount, setRetryCount] = useState(0);

            const LEVELS = ["Cơ bản", "Trung bình", "Nâng cao", "Hỗn hợp"];

            useEffect(() => {
                const keys = localStorage.getItem('global_gemini_keys');
                if(keys) setApiKeys(JSON.parse(keys));
            }, []);

            const generate = async () => {
                if(!apiKeys.length) return alert("Thiếu API Key!");
                if(!topic.trim()) return alert("Nhập chủ đề!");
                
                setLoading(true); setRetryCount(0);
                
                let levelPrompt = level === "Hỗn hợp" ? "Hỗn hợp (30% Cơ bản, 40% Trung bình, 30% Nâng cao)" : level;
                // CẬP NHẬT PROMPT: Nhắc AI không trả về A. B. C. D. nhưng vẫn dùng cleanOptionText để dự phòng
                const prompt = `Đóng vai giáo viên giỏi. Tạo ${numQ} câu hỏi trắc nghiệm chủ đề: "${topic}". Mức độ: ${levelPrompt}.
                QUY TẮC TOÁN: Dùng dấu $...$ bao quanh công thức. KHÔNG dùng dấu huyền \`.
                QUY TẮC ĐÁP ÁN: Trong mảng "options", CHỈ đưa nội dung đáp án, KHÔNG bao gồm "A.", "B.", "C.", "D." ở đầu.
                Output JSON Strict: [{"question":"...","options":["Nội dung A","Nội dung B","Nội dung C","Nội dung D"],"correctAnswerIndex":0}]`;

                let success = false;
                let finalError = "";
                const shuffledKeys = [...apiKeys].sort(() => Math.random() - 0.5);

                for (let i = 0; i < shuffledKeys.length; i++) {
                    const currentKey = shuffledKeys[i];
                    try {
                        if(i > 0) setRetryCount(i);
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentKey}`, {
                            method: 'POST', headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                        });
                        const data = await res.json();
                        if(data.error) throw new Error(data.error.message);
                        
                        const txt = data.candidates[0].content.parts[0].text;
                        const startIdx = txt.indexOf('[');
                        const endIdx = txt.lastIndexOf(']');
                        let jsonStr = (startIdx !== -1 && endIdx !== -1) ? txt.substring(startIdx, endIdx + 1) : txt.replace(/```json|```/g, '').trim(); 
                        
                        const parsedQ = JSON.parse(jsonStr);
                        if(parsedQ.length > 0) {
                            setQuestions(parsedQ); setStep(2); success = true; break;
                        }
                    } catch(e) { finalError = e.message; }
                }

                if (!success) alert(`Thất bại! Lỗi: ${finalError}`);
                setLoading(false);
            };

            // --- HÀM XUẤT WORD CẢI TIẾN (ĐÃ DÙNG cleanOptionText) ---
            const exportWord = () => {
                const header = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' 
                      xmlns:w='urn:schemas-microsoft-com:office:word' 
                      xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset='utf-8'>
                    <title>${topic}</title>
                    <style>
                        body { font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.5; }
                        h1 { text-align: center; font-size: 16pt; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
                        .question-block { margin-bottom: 15pt; text-align: justify; }
                        .options-table { width: 100%; border-collapse: collapse; margin-top: 5pt; }
                        .options-table td { padding: 3pt 0; vertical-align: top; }
                        .answer-key { margin-top: 30px; page-break-before: always; }
                        .answer-table { width: 100%; border-collapse: collapse; border: 1px solid #000; margin-bottom: 20px; }
                        .answer-table td, .answer-table th { border: 1px solid #000; padding: 5px; text-align: center; }
                    </style>
                </head>
                <body>`;
                
                const footer = "</body></html>";
                
                let bodyContent = `<h1>ĐỀ THI TRẮC NGHIỆM: ${topic}</h1>`;
                bodyContent += `<p style="text-align:center; margin-bottom: 30px;"><i>Mức độ: ${level} - Số lượng: ${questions.length} câu</i></p>`;
                
                // 1. Phần Câu hỏi
                questions.forEach((q, i) => {
                    const qText = convertToMathML(q.question);
                    // LÀM SẠCH OPTION TRƯỚC KHI XUẤT WORD
                    const optA = convertToMathML(cleanOptionText(q.options[0]));
                    const optB = convertToMathML(cleanOptionText(q.options[1]));
                    const optC = convertToMathML(cleanOptionText(q.options[2]));
                    const optD = convertToMathML(cleanOptionText(q.options[3]));

                    bodyContent += `
                    <div class="question-block">
                        <b>Câu ${i+1}:</b> ${qText}
                        <table class="options-table">
                            <tr>
                                <td width="50%"><b>A.</b> ${optA}</td>
                                <td width="50%"><b>B.</b> ${optB}</td>
                            </tr>
                            <tr>
                                <td width="50%"><b>C.</b> ${optC}</td>
                                <td width="50%"><b>D.</b> ${optD}</td>
                            </tr>
                        </table>
                    </div>`;
                });

                // 2. Phần Bảng Đáp Án (Ngang - Chia theo block 10 câu)
                bodyContent += `<div class="answer-key"><h2 style="text-align:center; margin-bottom: 15px;">BẢNG ĐÁP ÁN</h2>`;
                
                const chunkSize = 10;
                for (let i = 0; i < questions.length; i += chunkSize) {
                    const chunk = questions.slice(i, i + chunkSize);
                    
                    bodyContent += `<table class="answer-table">`;
                    
                    // Hàng 1: Số câu
                    bodyContent += `<tr><td style="font-weight:bold; background-color:#f0f0f0; width: 100px;">Câu hỏi</td>`;
                    chunk.forEach((_, idx) => {
                        bodyContent += `<td>${i + idx + 1}</td>`;
                    });
                    // Lấp đầy ô trống nếu block cuối không đủ 10
                    for(let k = chunk.length; k < chunkSize; k++) {
                         bodyContent += `<td></td>`;
                    }
                    bodyContent += `</tr>`;
                    
                    // Hàng 2: Đáp án
                    bodyContent += `<tr><td style="font-weight:bold; background-color:#f0f0f0;">Đáp án</td>`;
                    chunk.forEach(q => {
                        bodyContent += `<td style="font-weight:bold;">${String.fromCharCode(65 + q.correctAnswerIndex)}</td>`;
                    });
                     for(let k = chunk.length; k < chunkSize; k++) {
                         bodyContent += `<td></td>`;
                    }
                    bodyContent += `</tr></table>`;
                }
                bodyContent += `</div>`;

                const blob = new Blob([header + bodyContent + footer], {type: "application/msword"});
                saveAs(blob, `De_Thi_${topic.replace(/\s+/g, '_')}.doc`);
            };

            if(step === 3) return <PresentationMode questions={questions} onExit={()=>setStep(2)} />;

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 font-sans">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={()=>window.location.href='index.html'} className="text-slate-500 hover:text-indigo-600 font-bold transition flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-100"><i className="fas fa-arrow-left"></i> Về Trang Chủ</button>
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold shadow-lg">AI</div>
                            <h1 className="text-xl md:text-2xl font-bold text-indigo-900">SMART QUIZ</h1>
                        </div>
                    </div>

                    {step === 1 && (
                        <div className="bg-white p-6 md:p-10 rounded-3xl shadow-xl border border-indigo-50 relative overflow-hidden fade-in">
                            <div className="absolute top-0 right-0 bg-gradient-to-l from-indigo-100 to-transparent w-40 h-full opacity-50 pointer-events-none"></div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-6">Thiết lập đề thi</h2>
                            <div className="mb-6">
                                <label className="block font-bold mb-2 text-slate-700 text-sm uppercase tracking-wide">Chủ đề bài học</label>
                                <div className="relative">
                                    <i className="fas fa-book-open absolute left-4 top-4 text-indigo-400"></i>
                                    <input value={topic} onChange={e=>setTopic(e.target.value)} onKeyDown={e => e.key === 'Enter' && generate()} className="w-full border border-gray-200 bg-slate-50 p-3 pl-12 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition text-lg" placeholder="Nhập chủ đề (VD: Hàm số lượng giác, Lịch sử 12...)" autoFocus />
                                </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                <div>
                                    <label className="block font-bold mb-2 text-slate-700 text-sm uppercase tracking-wide">Số lượng câu</label>
                                    <div className="bg-slate-50 p-4 rounded-xl border border-gray-200">
                                        <div className="flex justify-between items-center mb-2"><span className="font-bold text-indigo-600 text-2xl">{numQ}</span><span className="text-xs text-gray-400">câu hỏi</span></div>
                                        <input type="range" min="3" max="50" value={numQ} onChange={e=>setNumQ(Number(e.target.value))} className="w-full h-2 bg-indigo-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block font-bold mb-2 text-slate-700 text-sm uppercase tracking-wide">Mức độ khó</label>
                                    <div className="grid grid-cols-2 gap-2 bg-slate-50 p-2 rounded-xl border border-gray-200 h-full content-center">
                                        {LEVELS.map(l => (
                                            <button key={l} onClick={()=>setLevel(l)} className={`py-2 px-2 rounded-lg text-xs md:text-sm font-bold transition ${level===l ? 'bg-white shadow text-indigo-600 ring-1 ring-indigo-100' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100'}`}>{l}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <button onClick={generate} disabled={loading} className="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white py-4 rounded-xl font-bold hover:shadow-lg hover:scale-[1.01] transition disabled:opacity-70 disabled:hover:scale-100 flex justify-center items-center gap-3 text-lg">
                                {loading ? (retryCount > 0 ? <><i className="fas fa-sync fa-spin"></i> Đổi Key khác ({retryCount})...</> : <><i className="fas fa-circle-notch fa-spin"></i> Đang suy nghĩ...</>) : <><i className="fas fa-magic"></i> TẠO ĐỀ NGAY</>}
                            </button>
                            {!apiKeys.length && <p className="text-red-500 text-center mt-4 text-sm bg-red-50 p-2 rounded"><i className="fas fa-exclamation-circle"></i> Chưa tìm thấy API Key.</p>}
                        </div>
                    )}

                    {step === 2 && (
                        <div className="fade-in">
                            <div className="sticky top-2 z-30 bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-lg border border-indigo-100 mb-6 flex flex-wrap justify-between items-center gap-4">
                                <div><h2 className="font-bold text-lg text-slate-800 line-clamp-1">Output: {topic}</h2><p className="text-xs text-slate-500">{questions.length} câu • {level}</p></div>
                                <div className="flex gap-2">
                                    <button onClick={()=>setStep(1)} className="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 font-bold text-sm transition"><i className="fas fa-redo"></i> Tạo lại</button>
                                    <button onClick={exportWord} className="px-4 py-2 bg-blue-50 text-blue-600 border border-blue-200 rounded-lg hover:bg-blue-100 font-bold text-sm transition"><i className="fas fa-file-word"></i> Word</button>
                                    <button onClick={()=>setStep(3)} className="px-5 py-2 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-lg font-bold hover:shadow-lg hover:-translate-y-0.5 transition flex items-center gap-2 text-sm shadow-green-200"><i className="fas fa-chalkboard-teacher"></i> DẠY NGAY</button>
                                </div>
                            </div>
                            <div className="space-y-6 pb-20">
                                {questions.map((q,i) => (
                                    <div key={i} className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition group">
                                        <div className="flex gap-3 mb-4"><span className="bg-indigo-100 text-indigo-700 font-bold px-3 py-1 rounded-lg text-sm h-fit whitespace-nowrap">Câu {i+1}</span><h3 className="text-lg font-medium text-slate-800 leading-relaxed"><MathText text={q.question}/></h3></div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 pl-0 md:pl-12">
                                            {q.options.map((o, idx) => (
                                                <div key={idx} className={`p-3 border rounded-xl flex items-center gap-3 transition ${idx===q.correctAnswerIndex ? 'bg-green-50 border-green-200 ring-1 ring-green-400' : 'bg-slate-50 border-slate-200 group-hover:bg-white'}`}>
                                                    <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 ${idx===q.correctAnswerIndex ? 'bg-green-500 text-white' : 'bg-slate-200 text-slate-600'}`}>{String.fromCharCode(65+idx)}</span>
                                                    {/* SỬ DỤNG cleanOptionText Ở ĐÂY ĐỂ XÓA A. B. */}
                                                    <span className="text-slate-700"><MathText text={cleanOptionText(o)}/></span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
