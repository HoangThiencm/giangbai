<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cấu Hình Đề Thi</title>
    
    <!-- Tải React và ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Tải Babel để trình duyệt hiểu được JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tải Tailwind CSS để làm đẹp -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font chữ Inter cho đẹp -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div id="root"></div>

    <script type="text/babel">
        // --- CÁC COMPONENT ICON (Thay thế cho lucide-react để chạy không cần cài đặt) ---
        const PlusIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );
        const TrashIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        );
        const SettingsIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        );
        const BookIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        );
        const FileTextIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        );
        const CheckCircleIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        );
        const HomeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        );

        const { useState } = React;

        // --- COMPONENT CHÍNH ---
        function ExamConfigurator() {
            // State quản lý danh sách chủ đề
            const [topics, setTopics] = useState([
                { id: Date.now(), name: '', questionCount: 10, difficulty: 'medium' }
            ]);
            
            const [isGenerated, setIsGenerated] = useState(false);
            const [generatedData, setGeneratedData] = useState(null);

            // Thêm chủ đề mới
            const addTopic = () => {
                const newTopic = {
                    id: Date.now(),
                    name: '',
                    questionCount: 5,
                    difficulty: 'medium'
                };
                setTopics([...topics, newTopic]);
            };

            // Xóa chủ đề
            const removeTopic = (indexToRemove) => {
                if (topics.length === 1) {
                    alert("Cần ít nhất một chủ đề để tạo đề thi.");
                    return;
                }
                setTopics(topics.filter((_, index) => index !== indexToRemove));
            };

            // Cập nhật thông tin chủ đề
            const updateTopic = (index, field, value) => {
                const newTopics = [...topics];
                newTopics[index] = { ...newTopics[index], [field]: value };
                setTopics(newTopics);
            };

            // Xử lý tạo đề
            const handleCreateExam = () => {
                const totalQuestions = topics.reduce((sum, t) => sum + Number(t.questionCount), 0);
                
                if (totalQuestions <= 0) {
                    alert("Tổng số câu hỏi phải lớn hơn 0");
                    return;
                }

                const payload = {
                    createdAt: new Date().toISOString(),
                    totalTopics: topics.length,
                    totalQuestions: totalQuestions,
                    structure: topics.map((t, i) => ({
                        topicLabel: `Chủ đề ${i + 1}`,
                        ...t
                    }))
                };

                setGeneratedData(payload);
                setIsGenerated(true);
            };

            if (isGenerated) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div className="bg-white max-w-lg w-full rounded-xl shadow-lg p-8 text-center animate-fade-in-up">
                            <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-600">
                                <CheckCircleIcon />
                            </div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">Đã tạo cấu trúc đề thi!</h2>
                            <p className="text-gray-500 mb-6">Hệ thống đã ghi nhận cấu hình của bạn.</p>
                            
                            <div className="bg-gray-100 p-4 rounded-lg text-left text-sm font-mono overflow-auto max-h-64 mb-6 border border-gray-200">
                                <pre>{JSON.stringify(generatedData, null, 2)}</pre>
                            </div>

                            <button 
                                onClick={() => setIsGenerated(false)}
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors"
                            >
                                Tạo đề mới
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-100 py-8 px-4">
                    <div className="max-w-3xl mx-auto">
                        
                        {/* Nut Home */}
                        <div className="mb-4">
                            <a href="/" className="inline-flex items-center gap-2 text-gray-500 hover:text-blue-600 transition-colors font-medium hover:bg-white px-3 py-2 rounded-lg">
                                <HomeIcon />
                                <span>Trang chủ</span>
                            </a>
                        </div>

                        {/* Header */}
                        <div className="mb-8 text-center">
                            <h1 className="text-3xl font-bold text-gray-800 flex items-center justify-center gap-3">
                                <div className="text-blue-600"><SettingsIcon /></div>
                                Cấu Hình Ma Trận Đề Thi
                            </h1>
                            <p className="text-gray-500 mt-2">Thêm các chủ đề và mức độ để tạo đề thi tự động</p>
                        </div>

                        {/* Danh sách chủ đề */}
                        <div className="space-y-6">
                            {topics.map((topic, index) => (
                                <div 
                                    key={topic.id} 
                                    className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow"
                                >
                                    <div className="bg-gray-50 px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                                        <h3 className="text-lg font-bold text-gray-700 flex items-center gap-2">
                                            <span className="bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded-full">#{index + 1}</span>
                                            Chủ đề {index + 1}
                                        </h3>
                                        {topics.length > 1 && (
                                            <button 
                                                onClick={() => removeTopic(index)}
                                                className="text-red-400 hover:text-red-600 p-2 hover:bg-red-50 rounded-lg transition-colors"
                                                title="Xóa chủ đề này"
                                            >
                                                <TrashIcon />
                                            </button>
                                        )}
                                    </div>

                                    <div className="p-6 grid grid-cols-1 md:grid-cols-12 gap-6">
                                        <div className="md:col-span-12">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                                Nội dung chủ đề (Tuỳ chọn)
                                            </label>
                                            <div className="relative">
                                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                                                    <BookIcon />
                                                </div>
                                                <input
                                                    type="text"
                                                    value={topic.name}
                                                    onChange={(e) => updateTopic(index, 'name', e.target.value)}
                                                    placeholder={`Ví dụ: Đại số chương ${index + 1}...`}
                                                    className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                                />
                                            </div>
                                        </div>

                                        <div className="md:col-span-6">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                                Số lượng câu hỏi
                                            </label>
                                            <input
                                                type="number"
                                                min="1"
                                                value={topic.questionCount}
                                                onChange={(e) => updateTopic(index, 'questionCount', parseInt(e.target.value) || 0)}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                            />
                                        </div>

                                        <div className="md:col-span-6">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                                Mức độ khó
                                            </label>
                                            <select
                                                value={topic.difficulty}
                                                onChange={(e) => updateTopic(index, 'difficulty', e.target.value)}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white cursor-pointer"
                                            >
                                                <option value="easy">Nhận biết (Dễ)</option>
                                                <option value="medium">Thông hiểu (Trung bình)</option>
                                                <option value="hard">Vận dụng (Khó)</option>
                                                <option value="very_hard">Vận dụng cao (Cực khó)</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Action Buttons */}
                        <div className="mt-8 flex flex-col md:flex-row gap-4 justify-between items-center">
                            <button
                                onClick={addTopic}
                                className="group flex items-center gap-2 px-6 py-3 bg-white border-2 border-dashed border-gray-300 text-gray-600 rounded-xl hover:border-blue-500 hover:text-blue-600 hover:bg-blue-50 transition-all w-full md:w-auto justify-center"
                            >
                                <div className="bg-gray-100 group-hover:bg-blue-100 rounded-full p-1 transition-colors">
                                    <PlusIcon />
                                </div>
                                <span className="font-medium">Thêm chủ đề khác</span>
                            </button>

                            <div className="flex items-center gap-4 w-full md:w-auto">
                                <div className="text-right hidden md:block">
                                    <div className="text-xs text-gray-500 uppercase font-semibold">Tổng câu hỏi</div>
                                    <div className="text-xl font-bold text-blue-600">
                                        {topics.reduce((sum, t) => sum + Number(t.questionCount), 0)}
                                    </div>
                                </div>

                                <button
                                    onClick={handleCreateExam}
                                    className="flex-1 md:flex-none flex items-center justify-center gap-2 px-8 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all font-bold"
                                >
                                    <FileTextIcon />
                                    Tạo đề ngay
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- RENDER APP ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ExamConfigurator />);
    </script>
</body>
</html>
