<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SmartQuiz AI - Soạn & Dạy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <!-- KaTeX cho hiển thị toán học -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex { font-size: 1.2em; color: #1e3a8a; }
        /* Animation nhẹ */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* SỬA: Tăng kích thước lựa chọn trong trình chiếu thêm 30% */
        .presentation-option { 
            font-size: 1.7em !important; 
            min-height: 120px !important;
            padding: 1.5rem !important;
            line-height: 1.4;
        }
        .presentation-question {
            font-size: 2.2em !important;
            margin-bottom: 2rem !important;
            line-height: 1.3;
        }
        
        /* SỬA: Tăng kích thước chữ cái A,B,C,D */
        .option-letter {
            width: 70px !important;
            height: 70px !important;
            font-size: 2em !important;
            font-weight: bold;
        }
        
        /* Tăng kích thước icon check */
        .fa-check-circle {
            font-size: 2em !important;
        }
    </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- MODULE GEMINI TẬP TRUNG (ĐỌC TỪ INDEX.HTML) ---
        const GeminiModule = {
            // Lấy API Keys từ localStorage
            getApiKeys: () => {
                const keys = localStorage.getItem('global_gemini_keys');
                return keys ? JSON.parse(keys) : [];
            },
            
            // Lấy danh sách modules
            getModules: () => {
                const modules = localStorage.getItem('gemini_modules');
                return modules ? JSON.parse(modules) : ['gemini-2.5-flash'];
            },
            
            // Lấy module mặc định
            getDefaultModule: () => {
                return localStorage.getItem('default_gemini_module') || 'gemini-2.5-flash';
            },

            // Gọi API Gemini
            callGeminiAPI: async (prompt, onRetry = null) => {
                const apiKeys = GeminiModule.getApiKeys();
                const modules = GeminiModule.getModules();
                const defaultModule = GeminiModule.getDefaultModule();
                
                if (!apiKeys.length) throw new Error("Chưa nạp API Keys! Vui lòng cấu hình trong trang chủ.");
                if (!modules.length) throw new Error("Chưa nạp Modules! Vui lòng cấu hình trong trang chủ.");
                
                let finalError = "";
                const shuffledKeys = [...apiKeys].sort(() => Math.random() - 0.5);

                for (let i = 0; i < shuffledKeys.length; i++) {
                    const currentKey = shuffledKeys[i];
                    try {
                        if (onRetry && i > 0) onRetry(i);
                        
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${defaultModule}:generateContent?key=${currentKey}`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                        });
                        
                        const data = await res.json();
                        if (data.error) throw new Error(data.error.message);
                        
                        const txt = data.candidates[0].content.parts[0].text;
                        return txt;
                        
                    } catch(e) {
                        finalError = e.message;
                        console.error(`Key ${i+1} lỗi:`, e.message);
                    }
                }
                
                throw new Error(`Tất cả keys đều lỗi: ${finalError}`);
            },
            
            // Parse JSON từ response
            parseJSONResponse: (text) => {
                const startIdx = text.indexOf('[');
                const endIdx = text.lastIndexOf(']');
                let jsonStr = (startIdx !== -1 && endIdx !== -1) 
                    ? text.substring(startIdx, endIdx + 1) 
                    : text.replace(/```json|```/g, '').trim();
                
                return JSON.parse(jsonStr);
            }
        };

        // --- HELPER: LÀM SẠCH NỘI DUNG OPTION ---
        const cleanOptionText = (text) => {
            if (!text) return "";
            return text.replace(/^([A-Da-d0-9]+)([\.\)\:\-])\s*/, '').trim();
        };

        // --- HELPER: CHUYỂN ĐỔI TEXT SANG MATHML CHO WORD ---
        const convertToMathML = (text) => {
            if (!text) return "";
            
            let standardized = text
                .replace(/`([^`]+)`/g, '$$$1$$') 
                .replace(/\\\[(.*?)\\\]/g, '$$$$$1$$$$')
                .replace(/\\\((.*?)\\\)/g, '$$$1$$');

            return standardized.replace(/\$([^$]+)\$/g, (match, latex) => {
                try {
                    return katex.renderToString(latex, {
                        throwOnError: false,
                        output: 'mathml', 
                        displayMode: false
                    });
                } catch (e) {
                    return match;
                }
            });
        };

        // --- COMPONENT HIỂN THỊ TOÁN TRÊN WEB ---
        const MathText = ({ text }) => {
            const ref = useRef(null);

            useEffect(() => {
                if (!text || !ref.current) return;

                let processed = text
                    .replace(/`([^`]+)`/g, '$$$1$$')
                    .replace(/\\\[(.*?)\\\]/g, '$$$$$1$$$$')
                    .replace(/\\\((.*?)\\\)/g, '$$$1$$');

                ref.current.innerHTML = processed;

                if (window.renderMathInElement) {
                    try {
                        window.renderMathInElement(ref.current, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$', right: '$', display: false},
                                {left: '\\(', right: '\\)', display: false},
                                {left: '\\[', right: '\\]', display: true}
                            ],
                            throwOnError: false
                        });
                    } catch (e) { console.error(e); }
                }
            }, [text]);

            return <span ref={ref} />;
        };

        // --- CÀI ĐẶT TRÌNH CHIẾU ---
        const PresentationSettings = ({ settings, onSettingsChange, onClose }) => {
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div className="bg-white p-6 rounded-2xl max-w-md w-full mx-4">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-xl font-bold text-slate-800">Cài đặt trình chiếu</h3>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-700">
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                        
                        <div className="space-y-4">
                            <div className="flex items-center justify-between">
                                <label className="font-medium">Tráo đáp án</label>
                                <input 
                                    type="checkbox" 
                                    checked={settings.shuffleOptions} 
                                    onChange={(e) => onSettingsChange({...settings, shuffleOptions: e.target.checked})}
                                    className="w-5 h-5"
                                />
                            </div>
                            
                            <div>
                                <label className="font-medium block mb-2">Thời gian đếm ngược (giây)</label>
                                <input 
                                    type="number" 
                                    min="0" 
                                    value={settings.countdownTime} 
                                    onChange={(e) => onSettingsChange({...settings, countdownTime: parseInt(e.target.value) || 0})}
                                    className="w-full p-2 border rounded-lg"
                                />
                                <p className="text-xs text-gray-500 mt-1">0 = không giới hạn thời gian</p>
                            </div>
                            
                            <div className="flex items-center justify-between">
                                <label className="font-medium">Tự động chuyển câu</label>
                                <input 
                                    type="checkbox" 
                                    checked={settings.autoNext} 
                                    onChange={(e) => onSettingsChange({...settings, autoNext: e.target.checked})}
                                    className="w-5 h-5"
                                />
                            </div>
                            
                            <div>
                                <label className="font-medium block mb-2">Điểm mỗi câu</label>
                                <input 
                                    type="number" 
                                    min="0.1" 
                                    step="0.1"
                                    value={settings.pointsPerQuestion} 
                                    onChange={(e) => onSettingsChange({...settings, pointsPerQuestion: parseFloat(e.target.value) || 1})}
                                    className="w-full p-2 border rounded-lg"
                                />
                            </div>
                        </div>
                        
                        <div className="mt-6 flex justify-end">
                            <button 
                                onClick={onClose}
                                className="px-4 py-2 bg-indigo-600 text-white rounded-lg font-medium"
                            >
                                Lưu cài đặt
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- TRÌNH CHIẾU TRẮC NGHIỆM ---
        const QuizPresentationMode = ({ questions, onExit, settings }) => {
            const [idx, setIdx] = useState(0);
            const [showAns, setShowAns] = useState(false);
            const [selectedOpt, setSelectedOpt] = useState(null);
            const [timeLeft, setTimeLeft] = useState(settings.countdownTime);
            const [score, setScore] = useState(0);
            const [shuffledQuestions, setShuffledQuestions] = useState([]);
            const [showResults, setShowResults] = useState(false);

            // SỬA: Thêm useCallback cho navigation
            const handleNext = useCallback(() => {
                if (idx < shuffledQuestions.length - 1) {
                    setIdx(prev => prev + 1);
                } else {
                    setShowResults(true);
                }
            }, [idx, shuffledQuestions.length]);

            const handlePrev = useCallback(() => {
                if (idx > 0) {
                    setIdx(prev => prev - 1);
                }
            }, [idx]);

            // Khởi tạo câu hỏi đã xáo trộn
            useEffect(() => {
                const shuffled = questions.map(q => {
                    if (!settings.shuffleOptions) return q;
                    
                    const options = [...q.options];
                    const correctAnswer = options[q.correctAnswerIndex];
                    const shuffledIndices = options.map((_, i) => i).sort(() => Math.random() - 0.5);
                    const newOptions = shuffledIndices.map(i => options[i]);
                    const newCorrectIndex = newOptions.indexOf(correctAnswer);
                    
                    return {
                        ...q,
                        options: newOptions,
                        correctAnswerIndex: newCorrectIndex
                    };
                });
                setShuffledQuestions(shuffled);
            }, [questions, settings.shuffleOptions]);

            // SỬA: Xử lý đếm ngược - sửa lỗi không chuyển câu
            useEffect(() => {
                if (settings.countdownTime <= 0 || showAns || showResults) return;
                
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            if (settings.autoNext) {
                                // THÊM setTimeout để đảm bảo state được cập nhật
                                setTimeout(() => {
                                    handleNext();
                                }, 100);
                            }
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                
                return () => clearInterval(timer);
            }, [idx, showAns, settings.countdownTime, settings.autoNext, showResults, handleNext]);

            // Reset timer khi chuyển câu
            useEffect(() => {
                setTimeLeft(settings.countdownTime);
                setShowAns(false);
                setSelectedOpt(null);
            }, [idx, settings.countdownTime]);

            const handleOptionSelect = (optionIndex) => {
                if (showAns) return;
                setSelectedOpt(optionIndex);
                
                // Tính điểm nếu chọn đúng
                if (optionIndex === shuffledQuestions[idx].correctAnswerIndex) {
                    setScore(prev => prev + settings.pointsPerQuestion);
                }
            };

            const handleKeyDown = (e) => {
                if (showResults) return;
                
                switch(e.key) {
                    case "ArrowRight": handleNext(); break;
                    case "ArrowLeft": handlePrev(); break;
                    case " ": setShowAns(prev => !prev); break;
                    case "Enter": setShowAns(prev => !prev); break;
                    case "Escape": onExit(); break;
                    case "1": case "2": case "3": case "4": 
                        if (!showAns) handleOptionSelect(parseInt(e.key) - 1);
                        break;
                }
            };

            useEffect(() => {
                window.addEventListener("keydown", handleKeyDown);
                return () => window.removeEventListener("keydown", handleKeyDown);
            }, [idx, showAns, showResults, handleNext, handlePrev]);

            if (showResults) {
                const totalScore = (score).toFixed(1);
                const maxScore = (questions.length * settings.pointsPerQuestion).toFixed(1);
                const percentage = ((score / (questions.length * settings.pointsPerQuestion)) * 100).toFixed(1);
                
                return (
                    <div className="fixed inset-0 bg-gradient-to-br from-blue-900 to-purple-900 text-white z-50 flex flex-col items-center justify-center p-6">
                        <div className="bg-white text-gray-800 rounded-3xl p-8 max-w-2xl w-full text-center shadow-2xl">
                            <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i className="fas fa-trophy text-4xl text-green-600"></i>
                            </div>
                            <h2 className="text-3xl font-bold mb-4">Kết Quả Bài Làm</h2>
                            <div className="grid grid-cols-3 gap-4 mb-6">
                                <div className="bg-blue-50 p-4 rounded-xl">
                                    <div className="text-2xl font-bold text-blue-600">{totalScore}</div>
                                    <div className="text-sm text-blue-500">Điểm số</div>
                                </div>
                                <div className="bg-green-50 p-4 rounded-xl">
                                    <div className="text-2xl font-bold text-green-600">{percentage}%</div>
                                    <div className="text-sm text-green-500">Tỷ lệ</div>
                                </div>
                                <div className="bg-purple-50 p-4 rounded-xl">
                                    <div className="text-2xl font-bold text-purple-600">{questions.length}</div>
                                    <div className="text-sm text-purple-500">Tổng câu</div>
                                </div>
                            </div>
                            <div className="flex gap-4 justify-center">
                                <button 
                                    onClick={() => setShowResults(false)}
                                    className="px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition"
                                >
                                    <i className="fas fa-redo mr-2"></i>Xem lại
                                </button>
                                <button 
                                    onClick={onExit}
                                    className="px-6 py-3 bg-gray-600 text-white rounded-xl font-bold hover:bg-gray-700 transition"
                                >
                                    <i className="fas fa-times mr-2"></i>Kết thúc
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const q = shuffledQuestions[idx] || questions[idx];

            return (
                <div className="fixed inset-0 bg-slate-900 text-white z-50 flex flex-col p-2 md:p-4 transition-colors duration-500">
                    <div className="flex justify-between items-center mb-2">
                        <button onClick={onExit} className="bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded-lg transition flex items-center gap-2 text-sm">
                            <i className="fas fa-times"></i> <span className="hidden md:inline">Thoát</span>
                        </button>
                        <div className="text-lg font-bold text-gray-300">Câu {idx+1} <span className="text-sm font-normal text-gray-500">/ {questions.length}</span></div>
                        <div className="flex items-center gap-4">
                            {settings.countdownTime > 0 && (
                                <div className={`px-3 py-1 rounded-full font-bold ${timeLeft <= 10 ? 'bg-red-600 animate-pulse' : 'bg-blue-600'}`}>
                                    {Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}
                                </div>
                            )}
                            <div className="bg-green-600 px-3 py-1 rounded-full font-bold">
                                Điểm: {(score).toFixed(1)}
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex-1 flex flex-col justify-center items-center max-w-7xl mx-auto w-full p-2">
                        <div className="bg-white text-slate-900 p-6 md:p-10 rounded-3xl shadow-2xl w-full min-h-[70vh] flex flex-col justify-center relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-48 h-48 bg-indigo-100 rounded-bl-full -z-0 opacity-50"></div>
                            <h3 className="text-3xl md:text-4xl font-bold mb-8 leading-relaxed text-slate-800 z-10 border-l-8 border-indigo-500 pl-6 presentation-question">
                                <MathText text={q.question} />
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 z-10">
                                {q.options.map((opt, i) => {
                                    let containerClass = "p-6 rounded-2xl text-xl border-2 transition-all duration-300 cursor-pointer flex items-center gap-4 relative overflow-hidden presentation-option ";
                                    if (showAns && i === q.correctAnswerIndex) containerClass += "bg-green-50 border-green-500 text-green-900 font-bold shadow-lg transform scale-105 ring-4 ring-green-100";
                                    else if (selectedOpt === i) containerClass += "bg-blue-50 border-blue-500 text-blue-900 shadow-md";
                                    else if (showAns && selectedOpt === i && i !== q.correctAnswerIndex) containerClass += "bg-red-50 border-red-300 text-red-900 opacity-70";
                                    else { containerClass += "border-gray-200 hover:bg-gray-50 hover:border-indigo-300"; if (showAns) containerClass += " opacity-40 grayscale"; }

                                    return (
                                        <div key={i} onClick={() => handleOptionSelect(i)} className={containerClass}>
                                            {/* SỬA: Tăng kích thước chữ cái A,B,C,D */}
                                            <div className={`option-letter rounded-full flex items-center justify-center font-bold flex-shrink-0 transition-colors ${showAns && i === q.correctAnswerIndex ? 'bg-green-600 text-white' : selectedOpt === i ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'}`}>
                                                {String.fromCharCode(65+i)}
                                            </div>
                                            <div className="flex-1 text-2xl"><MathText text={cleanOptionText(opt)} /></div>
                                            {showAns && i === q.correctAnswerIndex && <i className="fas fa-check-circle text-green-600 text-3xl absolute right-6"></i>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    <div className="mt-4 flex justify-center items-center gap-4">
                        <button disabled={idx===0} onClick={handlePrev} className="w-12 h-12 bg-slate-700 rounded-full hover:bg-blue-600 disabled:opacity-30 disabled:hover:bg-slate-700 transition flex items-center justify-center text-white shadow-lg">
                            <i className="fas fa-arrow-left text-xl"></i>
                        </button>
                        <button onClick={() => setShowAns(!showAns)} className="px-6 py-3 bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-extrabold rounded-xl text-lg shadow-xl transition transform active:scale-95 flex items-center gap-3 min-w-[200px] justify-center">
                            {showAns ? <><i className="fas fa-eye-slash"></i> Ẩn Đáp Án</> : <><i className="fas fa-eye"></i> Hiện Đáp Án</>}
                        </button>
                        <button disabled={idx===questions.length-1} onClick={handleNext} className="w-12 h-12 bg-slate-700 rounded-full hover:bg-blue-600 disabled:opacity-30 disabled:hover:bg-slate-700 transition flex items-center justify-center text-white shadow-lg">
                            <i className="fas fa-arrow-right text-xl"></i>
                        </button>
                    </div>
                    <div className="text-center mt-2 text-gray-500 text-sm hidden md:block">
                        Phím tắt: [←→] Chuyển câu | [Space] Đáp án | [1-4] Chọn | [Esc] Thoát
                    </div>
                </div>
            );
        };

        // --- TRÌNH CHIẾU TỰ LUẬN ---
        const EssayPresentationMode = ({ essays, onExit }) => {
            const [idx, setIdx] = useState(0);
            const [showSolution, setShowSolution] = useState(false);

            const handleKeyDown = (e) => {
                switch(e.key) {
                    case "ArrowRight": 
                        if (idx < essays.length - 1) setIdx(prev => prev + 1); 
                        break;
                    case "ArrowLeft": 
                        if (idx > 0) setIdx(prev => prev - 1); 
                        break;
                    case " ": 
                        setShowSolution(prev => !prev); 
                        break;
                    case "Escape": 
                        onExit(); 
                        break;
                }
            };

            useEffect(() => {
                window.addEventListener("keydown", handleKeyDown);
                return () => window.removeEventListener("keydown", handleKeyDown);
            }, [idx]);

            const essay = essays[idx];

            return (
                <div className="fixed inset-0 bg-gradient-to-br from-blue-900 to-purple-900 text-white z-50 flex flex-col p-4 md:p-6">
                    <div className="flex justify-between items-center mb-4">
                        <button onClick={onExit} className="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition flex items-center gap-2">
                            <i className="fas fa-times"></i> <span className="hidden md:inline">Thoát</span>
                        </button>
                        <div className="text-xl font-bold text-white">Bài {idx+1} <span className="text-sm font-normal text-gray-300">/ {essays.length}</span></div>
                        <button 
                            onClick={() => setShowSolution(!showSolution)}
                            className="px-4 py-2 bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold rounded-lg transition"
                        >
                            {showSolution ? <><i className="fas fa-eye-slash"></i> Ẩn Lời giải</> : <><i className="fas fa-eye"></i> Hiện Lời giải</>}
                        </button>
                    </div>
                    
                    <div className="flex-1 flex flex-col max-w-6xl mx-auto w-full gap-6">
                        <div className="bg-white text-slate-900 p-6 md:p-8 rounded-2xl shadow-2xl flex-1">
                            <h3 className="text-xl font-bold text-blue-600 mb-4">Đề bài:</h3>
                            <div className="text-lg leading-relaxed">
                                <MathText text={essay.question} />
                            </div>
                        </div>
                        
                        {showSolution && (
                            <div className="bg-green-50 border border-green-200 text-slate-800 p-6 md:p-8 rounded-2xl shadow-lg">
                                <h3 className="text-xl font-bold text-green-600 mb-4">Lời giải:</h3>
                                <div className="text-lg leading-relaxed">
                                    <MathText text={essay.solution} />
                                </div>
                            </div>
                        )}
                    </div>
                    
                    <div className="mt-6 flex justify-center items-center gap-6">
                        <button disabled={idx===0} onClick={() => setIdx(prev => prev - 1)} className="w-14 h-14 bg-white/20 rounded-full hover:bg-white/30 disabled:opacity-30 transition flex items-center justify-center text-white shadow-lg">
                            <i className="fas fa-arrow-left text-2xl"></i>
                        </button>
                        <button disabled={idx===essays.length-1} onClick={() => setIdx(prev => prev + 1)} className="w-14 h-14 bg-white/20 rounded-full hover:bg-white/30 disabled:opacity-30 transition flex items-center justify-center text-white shadow-lg">
                            <i className="fas fa-arrow-right text-2xl"></i>
                        </button>
                    </div>
                    <div className="text-center mt-4 text-gray-300 text-sm hidden md:block">
                        Phím tắt: [←→] Chuyển bài | [Space] Lời giải | [Esc] Thoát
                    </div>
                </div>
            );
        };

        // --- APP CHÍNH ---
        const App = () => {
            const [step, setStep] = useState(1);
            const [mode, setMode] = useState("quiz"); // "quiz" hoặc "essay"

                    Output JSON Strict: [{"question":"Đề bài...", "solution":"Lời giải chi tiết..."}]`;
