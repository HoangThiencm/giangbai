<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SmartQuiz AI - Soạn & Dạy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <!-- KaTeX cho hiển thị toán học -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex { font-size: 1.2em; color: #1e3a8a; }
        /* Animation nhẹ */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* SỬA: Tăng kích thước lựa chọn trong trình chiếu thêm 30% */
        .presentation-option { 
            font-size: 1.7em !important; 
            min-height: 100px !important;
            max-height: 200px !important;
            padding: 1.5rem !important;
            line-height: 1.4;
            overflow-y: auto;
            transition: font-size 0.2s ease;
        }
        .presentation-option.auto-scaled-option {
            /* Font size sẽ được điều chỉnh động bằng JavaScript */
            will-change: font-size;
        }
        .presentation-option::-webkit-scrollbar {
            width: 6px;
        }
        .presentation-option::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        .presentation-option::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
        .presentation-question {
            font-size: 2.2em !important;
            margin-bottom: 2rem !important;
            line-height: 1.3;
            word-wrap: break-word;
            overflow-wrap: break-word;
            /* Tự động điều chỉnh font size, chỉ scroll khi bất khả kháng */
            overflow-x: hidden;
            transition: font-size 0.2s ease;
        }
        .presentation-question.auto-scaled {
            /* Font size sẽ được điều chỉnh động bằng JavaScript */
            will-change: font-size;
        }
        .presentation-question.need-scroll {
            /* Chỉ bật scroll khi font đã giảm đến mức tối thiểu */
            overflow-y: auto;
            max-height: 40vh;
            scroll-behavior: smooth;
        }
        .presentation-question.need-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .presentation-question.need-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .presentation-question.need-scroll::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        .presentation-question.need-scroll::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        /* SỬA: Tăng kích thước chữ cái A,B,C,D */
        .option-letter {
            width: 70px !important;
            height: 70px !important;
            font-size: 2em !important;
            font-weight: bold;
        }
        
        /* Tăng kích thước icon check */
        .fa-check-circle {
            font-size: 2em !important;
        }
		
		/* TĂNG KÍCH THƯỚC CHỮ TỰ LUẬN */
		.text-lg.leading-relaxed {
			font-size: 1.8em !important;
			line-height: 1.6;
		}
		
		/* STYLING CHO BẢNG MARKDOWN */
		table {
			border-collapse: collapse;
			width: 100%;
			margin: 15px 0;
			border: 1px solid #ddd;
			font-size: 0.95em;
			background-color: white;
		}
		table th {
			background-color: #f2f2f2;
			border: 1px solid #ddd;
			padding: 10px;
			text-align: left;
			font-weight: bold;
		}
		table td {
			border: 1px solid #ddd;
			padding: 10px;
			vertical-align: top;
		}
		table tr:nth-child(even) {
			background-color: #f9f9f9;
		}
		table tr:hover {
			background-color: #f5f5f5;
		}
		
		/* BẢNG TRONG TRÌNH CHIẾU - TĂNG KÍCH THƯỚC */
		.presentation-question table,
		.presentation-option table {
			font-size: 1.3em !important;
		}
		.presentation-question table th,
		.presentation-question table td,
		.presentation-option table th,
		.presentation-option table td {
			padding: 15px !important;
		}
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- MODULE GEMINI TẬP TRUNG ---
        const GeminiModule = {
            getApiKeys: () => {
                const keys = localStorage.getItem('global_gemini_keys');
                return keys ? JSON.parse(keys) : [];
            },
            getModules: () => {
                const modules = localStorage.getItem('gemini_modules');
                return modules ? JSON.parse(modules) : ['gemini-2.5-flash'];
            },
            getDefaultModule: () => {
                return localStorage.getItem('default_gemini_module') || 'gemini-2.5-flash';
            },
            callGeminiAPI: async (prompt, onRetry = null) => {
                const apiKeys = GeminiModule.getApiKeys();
                const defaultModule = GeminiModule.getDefaultModule();
                
                if (!apiKeys.length) throw new Error("Chưa nạp API Keys! Vui lòng cấu hình trong trang chủ.");
                
                let finalError = "";
                const shuffledKeys = [...apiKeys].sort(() => Math.random() - 0.5);

                for (let i = 0; i < shuffledKeys.length; i++) {
                    const currentKey = shuffledKeys[i];
                    try {
                        if (onRetry && i > 0) onRetry(i);
                        
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${defaultModule}:generateContent?key=${currentKey}`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                        });
                        
                        const data = await res.json();
                        if (data.error) throw new Error(data.error.message);
                        
                        const txt = data.candidates[0].content.parts[0].text;
                        return txt;
                        
                    } catch(e) {
                        finalError = e.message;
                        console.error(`Key ${i+1} lỗi:`, e.message);
                    }
                }
                throw new Error(`Tất cả keys đều lỗi: ${finalError}`);
            },
            parseJSONResponse: (text) => {
                const startIdx = text.indexOf('[');
                const endIdx = text.lastIndexOf(']');
                let jsonStr = (startIdx !== -1 && endIdx !== -1) 
                    ? text.substring(startIdx, endIdx + 1) 
                    : text.replace(/```json|```/g, '').trim();
                return JSON.parse(jsonStr);
            }
        };

        // --- HELPER: LÀM SẠCH NỘI DUNG OPTION ---
        const cleanOptionText = (text) => {
            if (!text) return "";
            return text.replace(/^([A-Da-d0-9]+)([\.\)\:\-])\s*/, '').trim();
        };

        // --- HELPER: CHUYỂN ĐỔI TEXT SANG MATHML CHO WORD ---
        const convertToMathML = (text) => {
            if (!text) return "";
            
            // Bước 1: Xử lý markdown tables trước (chuyển sang HTML)
            let processed = parseMarkdownTable(text);
            
            // Bước 2: Xử lý công thức toán
            processed = processed
                .replace(/`([^`]+)`/g, '$$$1$$') 
                .replace(/\\\[(.*?)\\\]/g, '$$$$$1$$$$')
                .replace(/\\\((.*?)\\\)/g, '$$$1$$');

            // Bước 3: Chuyển đổi công thức toán sang MathML
            // Xử lý cả công thức trong HTML table cells
            return processed.replace(/\$([^$]+)\$/g, (match, latex) => {
                try {
                    return katex.renderToString(latex, {
                        throwOnError: false,
                        output: 'mathml', 
                        displayMode: false
                    }).replace(/<annotation encoding="application\/x-tex">[\s\S]*?<\/annotation>/g, '');
                } catch (e) {
                    return match;
                }
            });
        };

        // --- HELPER: CHUYỂN ĐỔI MARKDOWN TABLE SANG HTML ---
        const parseMarkdownTable = (text) => {
            if (!text) return "";
            
            // Tìm các bảng markdown: | Header | Header |\n|--------|--------|\n| Cell | Cell |
            // Pattern: bắt đầu bằng |, có ít nhất 2 dòng, dòng thứ 2 là separator
            const lines = text.split(/\r?\n/);
            let result = [];
            let i = 0;
            
            while (i < lines.length) {
                const line = lines[i];
                const trimmedLine = line.trim();
                
                // Kiểm tra nếu dòng này có thể là header của bảng (bắt đầu và kết thúc bằng |)
                if (trimmedLine.startsWith('|') && trimmedLine.endsWith('|') && trimmedLine.length > 2) {
                    const tableLines = [line];
                    let j = i + 1;
                    
                    // Kiểm tra dòng tiếp theo có phải separator không (chứa : hoặc -)
                    if (j < lines.length) {
                        const nextLine = lines[j].trim();
                        if (nextLine.match(/^\|[\s:\-|]+\|$/)) {
                            tableLines.push(lines[j]);
                            j++;
                            
                            // Thu thập các dòng data tiếp theo (phải bắt đầu và kết thúc bằng |)
                            while (j < lines.length) {
                                const dataLine = lines[j].trim();
                                if (dataLine.startsWith('|') && dataLine.endsWith('|')) {
                                    tableLines.push(lines[j]);
                                    j++;
                                } else {
                                    break;
                                }
                            }
                            
                            // Nếu có ít nhất 3 dòng (header + separator + 1 data row), xử lý như bảng
                            if (tableLines.length >= 3) {
                                // Parse header
                                const headerLine = tableLines[0].trim();
                                const headers = headerLine.split('|').map(h => h.trim()).filter(h => h);
                                
                                if (headers.length > 0) {
                                    // Tạo HTML table
                                    let tableHtml = '<table style="border-collapse: collapse; width: 100%; margin: 15px 0; border: 1px solid #ddd; font-size: 0.95em;">';
                                    
                                    // Header row
                                    tableHtml += '<thead><tr style="background-color: #f2f2f2;">';
                                    headers.forEach(header => {
                                        tableHtml += `<th style="border: 1px solid #ddd; padding: 10px; text-align: left; font-weight: bold;">${header}</th>`;
                                    });
                                    tableHtml += '</tr></thead><tbody>';
                                    
                                    // Data rows (bỏ qua dòng separator - index 1)
                                    for (let k = 2; k < tableLines.length; k++) {
                                        const rowLine = tableLines[k].trim();
                                        const cells = rowLine.split('|').map(c => c.trim()).filter(c => c);
                                        if (cells.length === headers.length) {
                                            tableHtml += '<tr>';
                                            cells.forEach(cell => {
                                                // Giữ nguyên nội dung cell (có thể chứa công thức toán)
                                                // Không escape vì MathText component sẽ xử lý an toàn
                                                tableHtml += `<td style="border: 1px solid #ddd; padding: 10px; vertical-align: top;">${cell}</td>`;
                                            });
                                            tableHtml += '</tr>';
                                        }
                                    }
                                    
                                    tableHtml += '</tbody></table>';
                                    result.push(tableHtml);
                                    i = j;
                                    continue;
                                }
                            }
                        }
                    }
                }
                
                // Nếu không phải bảng, giữ nguyên dòng
                result.push(lines[i]);
                i++;
            }
            
            return result.join('\n');
        };

        // --- COMPONENT HIỂN THỊ TOÁN TRÊN WEB ---
        const MathText = ({ text }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!text || !ref.current) return;
                
                // Bước 1: Xử lý markdown tables trước (chuyển sang HTML)
                let processed = parseMarkdownTable(text);
                
                // Bước 2: Xử lý công thức toán trong text (chuẩn hóa format)
                processed = processed
                    .replace(/`([^`]+)`/g, '$$$1$$')
                    .replace(/\\\[(.*?)\\\]/g, '$$$$$1$$$$')
                    .replace(/\\\((.*?)\\\)/g, '$$$1$$');

                // Tự động thêm $ nếu có dấu \ và không có $
                if (processed.includes('\\') && !processed.includes('$')) {
                    processed = `$${processed}$`;
                }
                
                // Bước 3: Tách thành các phần (math, HTML table, và text thường)
                // Tách theo thứ tự: HTML tables trước, rồi đến math formulas, cuối cùng là text
                const tableRegex = /<table[\s\S]*?<\/table>/g;
                const tables = [];
                let tableIndex = 0;
                processed = processed.replace(tableRegex, (match) => {
                    tables.push(match);
                    return `__TABLE_${tableIndex++}__`;
                });
                
                // Bước 4: Xử lý math formulas trong phần còn lại
                const parts = processed.split(/(\$\$[\s\S]*?\$\$|\$[\s\S]*?\$|__TABLE_\d+__)/g);
                ref.current.innerHTML = "";
                
                parts.forEach(part => {
                    if (part.startsWith('__TABLE_') && part.endsWith('__')) {
                        // Khôi phục table HTML
                        const tableIdx = parseInt(part.match(/\d+/)[0]);
                        if (tables[tableIdx]) {
                            // Xử lý công thức toán trong table cells trước khi thêm vào DOM
                            let tableHTML = tables[tableIdx];
                            // Tìm và xử lý math trong các td/th
                            tableHTML = tableHTML.replace(/>([^<]+)</g, (match, content) => {
                                if (content.trim()) {
                                    let cellContent = content
                                        .replace(/\$\$([^$]+)\$\$/g, (m, latex) => {
                                            try {
                                                return katex.renderToString(latex, { throwOnError: false, displayMode: true });
                                            } catch {
                                                return m;
                                            }
                                        })
                                        .replace(/\$([^$]+)\$/g, (m, latex) => {
                                            try {
                                                return katex.renderToString(latex, { throwOnError: false, displayMode: false });
                                            } catch {
                                                return m;
                                            }
                                        });
                                    return `>${cellContent}<`;
                                }
                                return match;
                            });
                            
                            const tempDiv = document.createElement("div");
                            tempDiv.innerHTML = tableHTML;
                            while (tempDiv.firstChild) {
                                ref.current.appendChild(tempDiv.firstChild);
                            }
                        }
                    } else if (part.startsWith('$$') && part.endsWith('$$')) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(2, -2), span, { throwOnError: false, displayMode: true }); } catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); } catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else if (part.trim()) {
                        ref.current.appendChild(document.createTextNode(part));
                    }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        // --- CÀI ĐẶT TRÌNH CHIẾU ---
        const PresentationSettings = ({ settings, onSettingsChange, onClose }) => {
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div className="bg-white p-6 rounded-2xl max-w-md w-full mx-4">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-xl font-bold text-slate-800">Cài đặt trình chiếu</h3>
                            <button onClick={onClose} className="text-gray-500 hover:text-gray-700"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="space-y-4">
                            <div className="flex items-center justify-between">
                                <label className="font-medium">Tráo đáp án</label>
                                <input type="checkbox" checked={settings.shuffleOptions} onChange={(e) => onSettingsChange({...settings, shuffleOptions: e.target.checked})} className="w-5 h-5"/>
                            </div>
                            <div>
                                <label className="font-medium block mb-2">Thời gian đếm ngược (giây)</label>
                                <input type="number" min="0" value={settings.countdownTime} onChange={(e) => onSettingsChange({...settings, countdownTime: parseInt(e.target.value) || 0})} className="w-full p-2 border rounded-lg"/>
                                <p className="text-xs text-gray-500 mt-1">0 = không giới hạn thời gian</p>
                            </div>
                            <div className="flex items-center justify-between">
                                <label className="font-medium">Tự động chuyển câu</label>
                                <input type="checkbox" checked={settings.autoNext} onChange={(e) => onSettingsChange({...settings, autoNext: e.target.checked})} className="w-5 h-5"/>
                            </div>
                            <div>
                                <label className="font-medium block mb-2">Điểm mỗi câu</label>
                                <input type="number" min="0.1" step="0.1" value={settings.pointsPerQuestion} onChange={(e) => onSettingsChange({...settings, pointsPerQuestion: parseFloat(e.target.value) || 1})} className="w-full p-2 border rounded-lg"/>
                            </div>
                        </div>
                        <div className="mt-6 flex justify-end">
                            <button onClick={onClose} className="px-4 py-2 bg-indigo-600 text-white rounded-lg font-medium">Lưu cài đặt</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- TRÌNH CHIẾU TRẮC NGHIỆM ---
        const QuizPresentationMode = ({ questions, onExit, settings }) => { /* Giữ nguyên QuizPresentationMode */ 
            const [idx, setIdx] = useState(0);
            const [showAns, setShowAns] = useState(false);
            const [selectedOpt, setSelectedOpt] = useState(null);
            const [timeLeft, setTimeLeft] = useState(settings.countdownTime);
            const [score, setScore] = useState(0);
            const [shuffledQuestions, setShuffledQuestions] = useState([]);
            const [showResults, setShowResults] = useState(false);
            const questionRef = useRef(null);
            const contentRef = useRef(null);
            const handleNext = useCallback(() => { if (idx < shuffledQuestions.length - 1) { setIdx(prev => prev + 1); } else { setShowResults(true); } }, [idx, shuffledQuestions.length]);
            const handlePrev = useCallback(() => { if (idx > 0) { setIdx(prev => prev - 1); } }, [idx]);
            
            // Tự động điều chỉnh font size cho câu hỏi
            useEffect(() => {
                if (!questionRef.current || !contentRef.current) return;
                
                const adjustFontSize = () => {
                    const questionEl = questionRef.current;
                    const contentEl = contentRef.current;
                    if (!questionEl || !contentEl) return;
                    
                    // Tính toán chiều cao khả dụng
                    const headerEl = document.querySelector('.fixed.inset-0 > div:first-child');
                    const footerEl = document.querySelector('.fixed.inset-0 > div:last-child');
                    const headerHeight = headerEl ? headerEl.offsetHeight : 60;
                    const footerHeight = footerEl ? footerEl.offsetHeight : 80;
                    const padding = 80; // Padding top/bottom của content
                    const availableHeight = window.innerHeight - headerHeight - footerHeight - padding;
                    
                    // Chiều cao tối đa cho câu hỏi (35% viewport hoặc dựa trên availableHeight)
                    const maxQuestionHeight = Math.min(availableHeight * 0.35, 350);
                    
                    // Reset font size về mặc định
                    questionEl.style.fontSize = '';
                    questionEl.style.maxHeight = '';
                    questionEl.classList.remove('auto-scaled', 'need-scroll');
                    
                    // Đợi DOM render xong
                    setTimeout(() => {
                        const scrollHeight = questionEl.scrollHeight;
                        
                        if (scrollHeight > maxQuestionHeight) {
                            // Nội dung vượt quá, cần giảm font size
                            const computedStyle = window.getComputedStyle(questionEl);
                            let fontSize = parseFloat(computedStyle.fontSize);
                            const minFontSize = 1.0; // Font size tối thiểu (em) = 16px
                            
                            // Tính toán font size mới dựa trên tỷ lệ
                            const ratio = maxQuestionHeight / scrollHeight;
                            let newFontSize = Math.max(fontSize * ratio * 0.95, minFontSize * 16); // Nhân 0.95 để có buffer
                            
                            // Áp dụng font size mới
                            questionEl.style.fontSize = `${newFontSize}px`;
                            questionEl.classList.add('auto-scaled');
                            
                            // Kiểm tra lại sau khi điều chỉnh
                            setTimeout(() => {
                                const newScrollHeight = questionEl.scrollHeight;
                                
                                // Nếu vẫn vượt quá sau khi giảm font đến mức tối thiểu, bật scroll
                                if (newScrollHeight > maxQuestionHeight && newFontSize <= minFontSize * 16 + 2) {
                                    questionEl.classList.add('need-scroll');
                                    questionEl.style.maxHeight = `${maxQuestionHeight}px`;
                                } else if (newScrollHeight <= maxQuestionHeight) {
                                    // Nếu đã vừa, có thể tăng font size một chút
                                    let optimalSize = newFontSize;
                                    for (let testSize = newFontSize + 2; testSize <= fontSize; testSize += 2) {
                                        questionEl.style.fontSize = `${testSize}px`;
                                        if (questionEl.scrollHeight > maxQuestionHeight) {
                                            break;
                                        }
                                        optimalSize = testSize;
                                    }
                                    questionEl.style.fontSize = `${optimalSize}px`;
                                }
                            }, 50);
                        }
                    }, 150);
                };
                
                // Đợi một chút để đảm bảo MathText đã render xong
                const timer = setTimeout(adjustFontSize, 300);
                
                // Điều chỉnh lại khi resize window
                const handleResize = () => {
                    clearTimeout(timer);
                    setTimeout(adjustFontSize, 100);
                };
                
                window.addEventListener('resize', handleResize);
                
                return () => {
                    clearTimeout(timer);
                    window.removeEventListener('resize', handleResize);
                };
            }, [idx, showAns, shuffledQuestions, questions]);
            
            useEffect(() => {
                document.body.style.overflow = 'hidden';
                const shuffled = questions.map(q => {
                    if (!settings.shuffleOptions) return q;
                    const options = [...q.options];
                    const correctAnswer = options[q.correctAnswerIndex];
                    const shuffledIndices = options.map((_, i) => i).sort(() => Math.random() - 0.5);
                    const newOptions = shuffledIndices.map(i => options[i]);
                    const newCorrectIndex = newOptions.indexOf(correctAnswer);
                    return { ...q, options: newOptions, correctAnswerIndex: newCorrectIndex };
                });
                setShuffledQuestions(shuffled);
                return () => { document.body.style.overflow = 'auto'; };
            }, [questions, settings.shuffleOptions]);

            useEffect(() => {
                if (settings.countdownTime <= 0 || showAns || showResults) return;
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            if (settings.autoNext) setTimeout(() => handleNext(), 100);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [idx, showAns, settings.countdownTime, settings.autoNext, showResults, handleNext]);

            useEffect(() => {
                setTimeLeft(settings.countdownTime);
                setShowAns(false);
                setSelectedOpt(null);
            }, [idx, settings.countdownTime]);

            const handleOptionSelect = (optionIndex) => {
                if (showAns) return;
                setSelectedOpt(optionIndex);
                if (optionIndex === shuffledQuestions[idx].correctAnswerIndex) {
                    setScore(prev => prev + settings.pointsPerQuestion);
                }
            };

            const handleKeyDown = (e) => {
                if (showResults) return;
                switch(e.key) {
                    case "ArrowRight": handleNext(); break;
                    case "ArrowLeft": handlePrev(); break;
                    case " ": setShowAns(prev => !prev); break;
                    case "Enter": setShowAns(prev => !prev); break;
                    case "Escape": onExit(); break;
                    case "1": case "2": case "3": case "4": 
                        if (!showAns) handleOptionSelect(parseInt(e.key) - 1);
                        break;
                }
            };

            useEffect(() => {
                window.addEventListener("keydown", handleKeyDown);
                return () => window.removeEventListener("keydown", handleKeyDown);
            }, [idx, showAns, showResults, handleNext, handlePrev]);

            if (showResults) {
                const totalScore = (score).toFixed(1);
                const percentage = ((score / (questions.length * settings.pointsPerQuestion)) * 100).toFixed(1);
                
                return (
                    <div className="fixed inset-0 bg-gradient-to-br from-blue-900 to-purple-900 text-white z-50 flex flex-col items-center justify-center p-6">
                        <div className="bg-white text-gray-800 rounded-3xl p-8 max-w-2xl w-full text-center shadow-2xl">
                            <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i className="fas fa-trophy text-4xl text-green-600"></i>
                            </div>
                            <h2 className="text-3xl font-bold mb-4">Kết Quả Bài Làm</h2>
                            <div className="grid grid-cols-3 gap-4 mb-6">
                                <div className="bg-blue-50 p-4 rounded-xl">
                                    <div className="text-2xl font-bold text-blue-600">{totalScore}</div>
                                    <div className="text-sm text-blue-500">Điểm số</div>
                                </div>
                                <div className="bg-green-50 p-4 rounded-xl">
                                    <div className="text-2xl font-bold text-green-600">{percentage}%</div>
                                    <div className="text-sm text-green-500">Tỷ lệ</div>
                                </div>
                                <div className="bg-purple-50 p-4 rounded-xl">
                                    <div className="text-2xl font-bold text-purple-600">{questions.length}</div>
                                    <div className="text-sm text-purple-500">Tổng câu</div>
                                </div>
                            </div>
                            <div className="flex gap-4 justify-center">
                                <button onClick={() => setShowResults(false)} className="px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition"><i className="fas fa-redo mr-2"></i>Xem lại</button>
                                <button onClick={onExit} className="px-6 py-3 bg-gray-600 text-white rounded-xl font-bold hover:bg-gray-700 transition"><i className="fas fa-times mr-2"></i>Kết thúc</button>
                            </div>
                        </div>
                    </div>
                );
            }

            const q = shuffledQuestions[idx] || questions[idx];

            return (
                <div className="fixed inset-0 bg-slate-900 text-white z-50 flex flex-col transition-colors duration-500">
                    {/* Header cố định */}
                    <div className="flex justify-between items-center p-2 md:p-4 flex-shrink-0 border-b border-slate-700">
                        <button onClick={onExit} className="bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded-lg transition flex items-center gap-2 text-sm"><i className="fas fa-times"></i> <span className="hidden md:inline">Thoát</span></button>
                        <div className="text-lg font-bold text-gray-300">Câu {idx+1} <span className="text-sm font-normal text-gray-500">/ {questions.length}</span></div>
                        <div className="flex items-center gap-4">
                            {settings.countdownTime > 0 && (
                                <div className={`px-3 py-1 rounded-full font-bold ${timeLeft <= 10 ? 'bg-red-600 animate-pulse' : 'bg-blue-600'}`}>{Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}</div>
                            )}
                            <div className="bg-green-600 px-3 py-1 rounded-full font-bold">Điểm: {(score).toFixed(1)}</div>
                        </div>
                    </div>
                    
                    {/* Nội dung tự động điều chỉnh */}
                    <div ref={contentRef} className="flex-1 flex flex-col justify-center items-center max-w-7xl mx-auto w-full p-2 md:p-4">
                        <div className="bg-white text-slate-900 p-6 md:p-10 rounded-3xl shadow-2xl w-full my-4 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-48 h-48 bg-indigo-100 rounded-bl-full -z-0 opacity-50"></div>
                            {q.question_image && (
                                <div className="mb-4 z-10 flex justify-center">
                                    <img src={q.question_image} alt="Câu hỏi" className="max-h-80 rounded-lg border-2 border-indigo-200 object-contain bg-white shadow-md"/>
                                </div>
                            )}
                            <h3 ref={questionRef} className="text-2xl md:text-3xl lg:text-4xl font-bold mb-6 md:mb-8 leading-relaxed text-slate-800 z-10 border-l-8 border-indigo-500 pl-4 md:pl-6 presentation-question"><MathText text={q.question} /></h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 z-10">
                                {q.options.map((opt, i) => {
                                    let containerClass = "p-4 md:p-6 rounded-2xl text-lg md:text-xl border-2 transition-all duration-300 cursor-pointer flex items-center gap-3 md:gap-4 relative overflow-hidden presentation-option ";
                                    if (showAns && i === q.correctAnswerIndex) containerClass += "bg-green-50 border-green-500 text-green-900 font-bold shadow-lg transform scale-105 ring-4 ring-green-100";
                                    else if (selectedOpt === i) containerClass += "bg-blue-50 border-blue-500 text-blue-900 shadow-md";
                                    else if (showAns && selectedOpt === i && i !== q.correctAnswerIndex) containerClass += "bg-red-50 border-red-300 text-red-900 opacity-70";
                                    else { containerClass += "border-gray-200 hover:bg-gray-50 hover:border-indigo-300"; if (showAns) containerClass += " opacity-40 grayscale"; }
                                    return (
                                        <div key={i} onClick={() => handleOptionSelect(i)} className={containerClass}>
                                            <div className={`option-letter rounded-full flex items-center justify-center font-bold flex-shrink-0 transition-colors ${showAns && i === q.correctAnswerIndex ? 'bg-green-600 text-white' : selectedOpt === i ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'}`}>{String.fromCharCode(65+i)}</div>
                                            <div className="flex-1 overflow-auto"><MathText text={cleanOptionText(opt)} /></div>
                                            {showAns && i === q.correctAnswerIndex && <i className="fas fa-check-circle text-green-600 text-2xl md:text-3xl absolute right-4 md:right-6"></i>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    
                    {/* Footer cố định với các nút điều khiển */}
                    <div className="p-3 md:p-4 flex justify-center items-center gap-4 flex-shrink-0 border-t border-slate-700 bg-slate-900">
                        <button disabled={idx===0} onClick={handlePrev} className="w-12 h-12 bg-slate-700 rounded-full hover:bg-blue-600 disabled:opacity-30 disabled:hover:bg-slate-700 disabled:cursor-not-allowed transition flex items-center justify-center text-white shadow-lg"><i className="fas fa-arrow-left text-xl"></i></button>
                        <button onClick={() => setShowAns(!showAns)} className="px-4 md:px-6 py-2 md:py-3 bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-extrabold rounded-xl text-base md:text-lg shadow-xl transition transform active:scale-95 flex items-center gap-2 md:gap-3 min-w-[180px] md:min-w-[200px] justify-center"><i className={`fas ${showAns ? 'fa-eye-slash' : 'fa-eye'}`}></i> <span>{showAns ? 'Ẩn Đáp Án' : 'Hiện Đáp Án'}</span></button>
                        <button disabled={idx===questions.length-1} onClick={handleNext} className="w-12 h-12 bg-slate-700 rounded-full hover:bg-blue-600 disabled:opacity-30 disabled:hover:bg-slate-700 disabled:cursor-not-allowed transition flex items-center justify-center text-white shadow-lg"><i className="fas fa-arrow-right text-xl"></i></button>
                    </div>
                </div>
            );
        };

        // --- TRÌNH CHIẾU TỰ LUẬN ---
        const EssayPresentationMode = ({ essays, onExit }) => { /* Giữ nguyên EssayPresentationMode */
            const [idx, setIdx] = useState(0);
            const [showSolution, setShowSolution] = useState(false);
            const handleKeyDown = (e) => {
                switch(e.key) {
                    case "ArrowRight": if (idx < essays.length - 1) setIdx(prev => prev + 1); break;
                    case "ArrowLeft": if (idx > 0) setIdx(prev => prev - 1); break;
                    case " ": setShowSolution(prev => !prev); break;
                    case "Enter": setShowSolution(prev => !prev); break;
                    case "Escape": onExit(); break;
                }
            };

            useEffect(() => {
                document.body.style.overflow = 'hidden';
                window.addEventListener("keydown", handleKeyDown);
                return () => { document.body.style.overflow = 'auto'; window.removeEventListener("keydown", handleKeyDown); };
            }, [idx]);

            const essay = essays[idx];

            return (
                <div className="fixed inset-0 bg-gradient-to-br from-blue-900 to-purple-900 text-white z-50 flex flex-col p-4 md:p-6">
                    <div className="flex justify-between items-center mb-4">
                        <button onClick={onExit} className="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition flex items-center gap-2"><i className="fas fa-times"></i> <span className="hidden md:inline">Thoát</span></button>
                        <div className="text-xl font-bold text-white">Bài {idx+1} <span className="text-sm font-normal text-gray-300">/ {essays.length}</span></div>
                        <button onClick={() => setShowSolution(!showSolution)} className="px-4 py-2 bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold rounded-lg transition">{showSolution ? <><i className="fas fa-eye-slash"></i> Ẩn Lời giải</> : <><i className="fas fa-eye"></i> Hiện Lời giải</>}</button>
                    </div>
                    <div className="flex-1 flex flex-col max-w-6xl mx-auto w-full gap-6">
                        <div className="bg-white text-slate-900 p-6 md:p-8 rounded-2xl shadow-2xl flex-1">
                            <h3 className="text-xl font-bold text-blue-600 mb-4">Đề bài:</h3>
                            {essay.question_image && (
                                <div className="mb-4 flex justify-center">
                                    <img src={essay.question_image} alt="Đề bài" className="max-h-96 rounded-lg border-2 border-blue-200 object-contain bg-white shadow-md"/>
                                </div>
                            )}
                            <div className="text-lg leading-relaxed"><MathText text={essay.question} /></div>
                        </div>
                        {showSolution && (
                            <div className="bg-green-50 border border-green-200 text-slate-800 p-6 md:p-8 rounded-2xl shadow-lg">
                                <h3 className="text-xl font-bold text-green-600 mb-4">Lời giải:</h3>
                                <div className="text-lg leading-relaxed"><MathText text={essay.solution}/></div>
                            </div>
                        )}
                    </div>
                    <div className="mt-6 flex justify-center items-center gap-6">
                        <button disabled={idx===0} onClick={() => setIdx(prev => prev - 1)} className="w-14 h-14 bg-white/20 rounded-full hover:bg-white/30 disabled:opacity-30 transition flex items-center justify-center text-white shadow-lg"><i className="fas fa-arrow-left text-2xl"></i></button>
                        <button disabled={idx===essays.length-1} onClick={() => setIdx(prev => prev + 1)} className="w-14 h-14 bg-white/20 rounded-full hover:bg-white/30 disabled:opacity-30 transition flex items-center justify-center text-white shadow-lg"><i className="fas fa-arrow-right text-2xl"></i></button>
                    </div>
                </div>
            );
        };

        // --- COMPONENT CHỈNH SỬA ---
        const EditorComponent = ({ mode, data, onSave, onBack }) => {
            const [editedData, setEditedData] = useState(data.map(item => ({
                ...item,
                // Ensure data is mutable copy for textareas/inputs
                question: item.question,
                options: item.options ? [...item.options] : undefined,
                correctAnswerIndex: item.correctAnswerIndex !== undefined ? item.correctAnswerIndex : -1,
                solution: item.solution,
                question_image: item.question_image || null // Thêm trường hình ảnh
            })));

            const handleUpdate = (index, field, value) => {
                setEditedData(prev => prev.map((item, i) => {
                    if (i === index) {
                        return { ...item, [field]: value };
                    }
                    return item;
                }));
            };

            const handleUpdateOption = (qIndex, oIndex, value) => {
                setEditedData(prev => prev.map((item, i) => {
                    if (i === qIndex) {
                        const newOptions = [...item.options];
                        newOptions[oIndex] = value;
                        return { ...item, options: newOptions };
                    }
                    return item;
                }));
            };
            
            const handleAddQuestion = () => {
                if (mode === 'quiz') {
                    setEditedData(prev => [
                        ...prev, 
                        { question: "Câu hỏi mới...", options: ["A", "B", "C", "D"], correctAnswerIndex: 0, question_image: null }
                    ]);
                } else {
                    setEditedData(prev => [
                        ...prev, 
                        { question: "Bài tập mới...", solution: "Lời giải mới...", question_image: null }
                    ]);
                }
            };
            
            // Xử lý upload hình ảnh
            const handleImageUpload = (index, file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    handleUpdate(index, 'question_image', e.target.result);
                };
                reader.readAsDataURL(file);
            };
            
            // Xử lý paste hình ảnh
            const handlePasteImage = (index, e) => {
                const items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf("image") !== -1) {
                        e.preventDefault();
                        const file = items[i].getAsFile();
                        handleImageUpload(index, file);
                        return;
                    }
                }
            };
            
            const handleDeleteQuestion = (index) => {
                if(confirm(`Bạn có chắc chắn muốn xóa ${mode === 'quiz' ? 'Câu' : 'Bài'} ${index + 1}?`)) {
                    setEditedData(prev => prev.filter((_, i) => i !== index));
                }
            };
            
            const handleFinalSave = () => {
                // Simple validation for quiz mode
                if (mode === 'quiz') {
                    const missingAns = editedData.filter(q => q.correctAnswerIndex === -1);
                    if (missingAns.length > 0) {
                        alert(`Vui lòng chọn đáp án đúng cho ${missingAns.length} câu hỏi!`);
                        return;
                    }
                }
                onSave(editedData);
            };


            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 font-sans fade-in">
                    <div className="sticky top-2 z-30 bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-lg border border-red-100 mb-6 flex justify-between items-center gap-4">
                        <h2 className="text-xl font-bold text-red-700 flex items-center gap-2">
                            <i className="fas fa-pencil-alt"></i> CHỈNH SỬA {mode === 'quiz' ? 'TRẮC NGHIỆM' : 'TỰ LUẬN'}
                        </h2>
                        <div className="flex gap-2">
                             <button onClick={handleAddQuestion} className="px-4 py-2 bg-indigo-500 text-white rounded-lg font-bold hover:bg-indigo-600 transition"><i className="fas fa-plus"></i> Thêm</button>
                             <button onClick={onBack} className="px-4 py-2 bg-gray-500 text-white rounded-lg font-bold hover:bg-gray-600 transition">Hủy</button>
                             <button onClick={handleFinalSave} className="px-5 py-2 bg-red-600 text-white rounded-lg font-bold hover:bg-red-700 transition"><i className="fas fa-save"></i> LƯU THAY ĐỔI</button>
                        </div>
                    </div>

                    <div className="space-y-8 pb-20">
                        {editedData.map((item, i) => (
                            <div key={i} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 relative">
                                <div className="absolute top-4 right-4 flex gap-2">
                                    <span className="bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold">#{i + 1}</span>
                                    <button onClick={() => handleDeleteQuestion(i)} className="text-gray-400 hover:text-red-600" title="Xóa câu hỏi"><i className="fas fa-trash-alt"></i></button>
                                </div>
                                
                                {/* QUESTION TEXTAREA */}
                                <div className="mb-4 pr-16">
                                    <label className="block text-sm font-bold text-indigo-700 mb-1">{mode === 'quiz' ? 'Câu hỏi' : 'Đề bài'}:</label>
                                    <textarea 
                                        className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-indigo-200 outline-none text-base resize-y min-h-[80px]" 
                                        value={item.question} 
                                        onChange={(e) => handleUpdate(i, 'question', e.target.value)}
                                        onPaste={(e) => handlePasteImage(i, e)}
                                        placeholder="Nhập câu hỏi hoặc dán hình ảnh (Ctrl+V)..."
                                    ></textarea>
                                    
                                    {/* Hình ảnh câu hỏi */}
                                    <div className="mt-2 flex items-center gap-2 bg-gray-50 p-2 rounded border border-gray-200">
                                        {item.question_image ? (
                                            <div className="relative inline-block">
                                                <img src={item.question_image} alt="Câu hỏi" className="max-h-32 rounded border object-contain bg-white"/>
                                                <button 
                                                    onClick={() => handleUpdate(i, 'question_image', null)} 
                                                    className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs hover:bg-red-600 transition shadow-lg"
                                                    title="Xóa hình ảnh"
                                                >
                                                    ×
                                                </button>
                                            </div>
                                        ) : (
                                            <label className="text-xs text-blue-600 cursor-pointer flex items-center gap-2 hover:underline px-2 py-1 rounded hover:bg-blue-50 transition">
                                                <i className="fas fa-image"></i>
                                                <span>Chèn hình ảnh</span>
                                                <input 
                                                    type="file" 
                                                    accept="image/*" 
                                                    className="hidden" 
                                                    onChange={(e) => {
                                                        const file = e.target.files[0];
                                                        if (file) handleImageUpload(i, file);
                                                        e.target.value = ''; // Reset để có thể chọn lại file cùng tên
                                                    }}
                                                />
                                            </label>
                                        )}
                                    </div>
                                    
                                    <div className="mt-2 bg-gray-50 p-2 rounded border border-gray-200 text-sm">
                                        {item.question_image && (
                                            <div className="mb-2">
                                                <img src={item.question_image} alt="Câu hỏi" className="max-h-40 rounded border object-contain bg-white"/>
                                            </div>
                                        )}
                                        <MathText text={item.question}/>
                                    </div>
                                </div>
                                
                                {mode === 'quiz' ? (
                                    /* QUIZ OPTIONS */
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        {item.options.map((opt, oIdx) => (
                                            <div key={oIdx} className={`flex items-center gap-3 p-3 border rounded-xl transition ${item.correctAnswerIndex === oIdx ? 'bg-green-100 border-green-500' : 'bg-white border-gray-200'}`}>
                                                <input 
                                                    type="radio" 
                                                    name={`q-${i}`} 
                                                    checked={item.correctAnswerIndex === oIdx} 
                                                    onChange={() => handleUpdate(i, 'correctAnswerIndex', oIdx)} 
                                                    className="w-5 h-5 cursor-pointer accent-green-600 flex-shrink-0"
                                                />
                                                <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${item.correctAnswerIndex === oIdx ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-600'}`}>
                                                    {String.fromCharCode(65 + oIdx)}
                                                </span>
                                                <input 
                                                    className="w-full bg-transparent outline-none text-base" 
                                                    value={opt} 
                                                    onChange={(e) => handleUpdateOption(i, oIdx, e.target.value)}
                                                />
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    /* ESSAY SOLUTION */
                                    <div className="mt-4 bg-green-50 border border-green-200 rounded p-3">
                                        <label className="block text-sm font-bold text-green-700 mb-1">Lời giải:</label>
                                        <textarea 
                                            className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-green-200 outline-none text-base resize-y min-h-[120px]" 
                                            value={item.solution} 
                                            onChange={(e) => handleUpdate(i, 'solution', e.target.value)}
                                        ></textarea>
                                        <div className="mt-2 bg-white p-2 rounded border border-gray-200 text-sm"><MathText text={item.solution}/></div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        
        // --- APP CHÍNH ---
        const App = () => {
            const [step, setStep] = useState(1);
            const [mode, setMode] = useState("quiz"); 
            const [topics, setTopics] = useState([
                { id: Date.now(), name: '', count: 5, level: 'Trung bình' }
            ]);
            
            const [questions, setQuestions] = useState([]);
            const [essays, setEssays] = useState([]);
            const [loading, setLoading] = useState(false);
            const [retryCount, setRetryCount] = useState(0);
            const [showSettings, setShowSettings] = useState(false);
            const [presentationSettings, setPresentationSettings] = useState({
                shuffleOptions: false,
                countdownTime: 0,
                autoNext: false,
                pointsPerQuestion: 1
            });
            
            // [NEW] Ẩn hiện màn hình chỉnh sửa
            const [isEditing, setIsEditing] = useState(false); 

            // SỬA: Thêm check auth ngay khi vào trang
            useEffect(() => {
                const token = localStorage.getItem('authToken');
                if (!token) {
                    alert("Bạn chưa đăng nhập! Hệ thống sẽ chuyển về trang đăng nhập.");
                    window.location.href = 'login.html';
                }
            }, []);

            const LEVELS = ["Cơ bản", "Trung bình", "Nâng cao", "Hỗn hợp"];

            // --- CÁC HÀM QUẢN LÝ CHỦ ĐỀ ---
            const addTopic = () => {
                const newTopic = {
                    id: Date.now(),
                    name: '',
                    count: 5,
                    level: 'Trung bình'
                };
                setTopics([...topics, newTopic]);
            };

            const removeTopic = (id) => {
                if (topics.length > 1) {
                    setTopics(topics.filter(t => t.id !== id));
                } else {
                    alert("Cần ít nhất một chủ đề!");
                }
            };

            const updateTopic = (id, field, value) => {
                setTopics(topics.map(t => t.id === id ? { ...t, [field]: value } : t));
            };

            const generateContent = async () => {
                const emptyTopics = topics.filter(t => !t.name.trim());
                if (emptyTopics.length > 0) return alert("Vui lòng nhập tên cho tất cả các chủ đề!");
                
                setLoading(true);
                setRetryCount(0);
                
                const structurePrompt = topics.map((t, idx) => 
                    `- Phần ${idx + 1}: Chủ đề "${t.name}", ${t.count} ${mode === "quiz" ? "câu" : "bài"}, Mức độ: ${t.level === "Hỗn hợp" ? "Hỗn hợp (30% Dễ, 40% TB, 30% Khó)" : t.level}`
                ).join('\n');

                const totalQuestions = topics.reduce((sum, t) => sum + t.count, 0);

                let prompt = "";
                if (mode === "quiz") {
                    prompt = `Đóng vai giáo viên giỏi. Tạo tổng cộng ${totalQuestions} câu hỏi trắc nghiệm dựa trên cấu trúc sau:\n${structurePrompt}\n
                    QUY TẮC TOÁN: Dùng dấu $...$ bao quanh công thức. KHÔNG dùng dấu huyền \`.
                    QUY TẮC ĐÁP ÁN: Trong mảng "options", CHỈ đưa nội dung đáp án, KHÔNG bao gồm "A.", "B.", "C.", "D." ở đầu.
                    Output JSON Strict: Một mảng phẳng chứa tất cả câu hỏi: [{"question":"...","options":["A","B","C","D"],"correctAnswerIndex":0}, ...]`;
                } else {
                    prompt = `Đóng vai giáo viên giỏi. Tạo tổng cộng ${totalQuestions} bài tập TỰ LUẬN dựa trên cấu trúc sau:\n${structurePrompt}\n
                    Mỗi bài tập bao gồm:
                    - "question": Đề bài (có thể chứa công thức toán học trong $...$)
                    - "solution": Lời giải chi tiết (có thể chứa công thức toán học trong $...$)
                    Output JSON Strict: Một mảng phẳng chứa tất cả bài tập: [{"question":"Đề bài...", "solution":"Lời giải chi tiết..."}, ...]`;
                }

                try {
                    const response = await GeminiModule.callGeminiAPI(prompt, setRetryCount);
                    const parsedData = GeminiModule.parseJSONResponse(response);
                    
                    if (mode === "quiz") {
                        setQuestions(parsedData);
                    } else {
                        setEssays(parsedData);
                    }
                    setStep(2);
                } catch (error) {
                    alert(`Thất bại! Lỗi: ${error.message}`);
                } finally {
                    setLoading(false);
                }
            };

            const exportWord = () => {
                const header = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Export</title>
                    <style>
                        body { font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.5; }
                        h1 { text-align: center; font-size: 16pt; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
                        .question-block { margin-bottom: 15pt; text-align: justify; }
                        .options-table { width: 100%; border-collapse: collapse; margin-top: 5pt; }
                        .options-table td { padding: 3pt 0; vertical-align: top; }
                        .answer-key { margin-top: 30px; page-break-before: always; }
                        .answer-table { width: 100%; border-collapse: collapse; border: 1px solid #000; margin-bottom: 20px; }
                        .answer-table td, .answer-table th { border: 1px solid #000; padding: 5px; text-align: center; }
                        .essay-block { margin-bottom: 20pt; }
                        .solution { margin-top: 10pt; padding: 10pt; background: #f5f5f5; border-left: 4px solid #4CAF50; }
                    </style>
                </head><body>`;
                
                const dataToExport = mode === "quiz" ? questions : essays;
                const totalQ = dataToExport.length;
                let bodyContent = `<h1>${mode === "quiz" ? "ĐỀ THI TRẮC NGHIỆM" : "BÀI TẬP TỰ LUẬN"} TỔNG HỢP</h1>`;
                bodyContent += `<p style="text-align:center; margin-bottom: 30px;"><i>Tổng số câu: ${totalQ}</i></p>`;
                
                if (mode === "quiz") {
                    dataToExport.forEach((q, i) => {
                        const qText = convertToMathML(q.question);
                        const optA = convertToMathML(cleanOptionText(q.options[0]));
                        const optB = convertToMathML(cleanOptionText(q.options[1]));
                        const optC = convertToMathML(cleanOptionText(q.options[2]));
                        const optD = convertToMathML(cleanOptionText(q.options[3]));
                        
                        const imageHtml = q.question_image ? `<div style="text-align: center; margin: 10pt 0;"><img src="${q.question_image}" style="max-height: 300px; max-width: 100%; object-fit: contain;" alt="Câu hỏi ${i+1}"/></div>` : '';

                        bodyContent += `
                        <div class="question-block">
                            <b>Câu ${i+1}:</b> ${qText}
                            ${imageHtml}
                            <table class="options-table">
                                <tr><td width="50%"><b>A.</b> ${optA}</td><td width="50%"><b>B.</b> ${optB}</td></tr>
                                <tr><td width="50%"><b>C.</b> ${optC}</td><td width="50%"><b>D.</b> ${optD}</td></tr>
                            </table>
                        </div>`;
                    });

                    bodyContent += `<div class="answer-key"><h2 style="text-align:center; margin-bottom: 15px;">BẢNG ĐÁP ÁN</h2>`;
                    const chunkSize = 10;
                    for (let i = 0; i < questions.length; i += chunkSize) {
                        const chunk = questions.slice(i, i + chunkSize);
                        bodyContent += `<table class="answer-table"><tr><td style="font-weight:bold; background-color:#f0f0f0; width: 100px;">Câu hỏi</td>`;
                        chunk.forEach((_, idx) => bodyContent += `<td>${i + idx + 1}</td>`);
                        for(let k = chunk.length; k < chunkSize; k++) bodyContent += `<td></td>`;
                        bodyContent += `</tr><tr><td style="font-weight:bold; background-color:#f0f0f0;">Đáp án</td>`;
                        chunk.forEach(q => bodyContent += `<td style="font-weight:bold;">${String.fromCharCode(65 + q.correctAnswerIndex)}</td>`);
                        for(let k = chunk.length; k < chunkSize; k++) bodyContent += `<td></td>`;
                        bodyContent += `</tr></table>`;
                    }
                    bodyContent += `</div>`;
                } else {
                    dataToExport.forEach((essay, i) => {
                        const questionText = convertToMathML(essay.question);
                        const solutionText = convertToMathML(essay.solution);
                        const imageHtml = essay.question_image ? `<div style="text-align: center; margin: 10pt 0;"><img src="${essay.question_image}" style="max-height: 300px; max-width: 100%; object-fit: contain;" alt="Đề bài ${i+1}"/></div>` : '';
                        bodyContent += `<div class="essay-block"><b>Bài ${i+1}:</b> ${questionText}${imageHtml}<div class="solution"><b>Lời giải:</b> ${solutionText}</div></div>`;
                    });
                }

                const blob = new Blob([header + bodyContent + "</body></html>"], {type: "application/msword"});
                saveAs(blob, `De_Thi_Tong_Hop.doc`);
            };

            const startPresentation = () => {
                if (mode === "quiz" && questions.length === 0) return alert("Chưa có câu hỏi nào!");
                if (mode === "essay" && essays.length === 0) return alert("Chưa có bài tập nào!");
                setStep(4); // Đổi step 3 thành 4 để EditorComponent dùng step 3
            };
            
            // Xử lý khi nhấn nút Sửa
            const startEditing = () => {
                setIsEditing(true);
                setStep(3);
            };
            
            // Xử lý khi lưu từ EditorComponent
            const handleEditorSave = (newContent) => {
                if (mode === 'quiz') {
                    setQuestions(newContent);
                } else {
                    setEssays(newContent);
                }
                setIsEditing(false);
                setStep(2); // Quay lại màn hình xem lại
            };

            if(step === 4) { // Trình chiếu
                if (mode === "quiz") return <QuizPresentationMode questions={questions} onExit={() => setStep(2)} settings={presentationSettings}/>;
                else return <EssayPresentationMode essays={essays} onExit={() => setStep(2)}/>;
            }

            if(step === 3) { // Chỉnh sửa
                return <EditorComponent 
                            mode={mode} 
                            data={mode === 'quiz' ? questions : essays} 
                            onSave={handleEditorSave} 
                            onBack={() => setStep(2)} 
                        />;
            }

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 font-sans">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={() => window.location.href = 'index.html'} className="text-slate-500 hover:text-indigo-600 font-bold transition flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-100">
                            <i className="fas fa-arrow-left"></i> Về Trang Chủ
                        </button>
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold shadow-lg">AI</div>
                            <h1 className="text-xl md:text-2xl font-bold text-indigo-900">SMART QUIZ</h1>
                        </div>
                    </div>

                    {step === 1 && (
                        <div className="bg-white p-6 md:p-10 rounded-3xl shadow-xl border border-indigo-50 relative overflow-hidden fade-in">
                            <div className="absolute top-0 right-0 bg-gradient-to-l from-indigo-100 to-transparent w-40 h-full opacity-50 pointer-events-none"></div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-6">THIẾT LẬP YÊU CẦU</h2>
                            
                            {/* Chọn chế độ */}
                            <div className="mb-6">
                                <label className="block font-bold mb-2 text-slate-700 text-sm uppercase tracking-wide">Chế độ</label>
                                <div className="grid grid-cols-2 gap-4 bg-slate-50 p-2 rounded-xl border border-gray-200">
                                    <button onClick={() => setMode("quiz")} className={`py-3 px-4 rounded-lg font-bold transition ${mode === "quiz" ? 'bg-white shadow text-indigo-600 ring-1 ring-indigo-100' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100'}`}>
                                        <i className="fas fa-list-ol mr-2"></i>Trắc nghiệm
                                    </button>
                                    <button onClick={() => setMode("essay")} className={`py-3 px-4 rounded-lg font-bold transition ${mode === "essay" ? 'bg-white shadow text-green-600 ring-1 ring-green-100' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100'}`}>
                                        <i className="fas fa-edit mr-2"></i>Tự luận
                                    </button>
                                </div>
                            </div>

                            {/* DANH SÁCH CHỦ ĐỀ */}
                            <div className="mb-6 space-y-4">
                                <div className="flex justify-between items-center">
                                    <label className="block font-bold text-slate-700 text-sm uppercase tracking-wide">Danh sách chủ đề</label>
                                    <button onClick={addTopic} className="text-sm bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg font-bold hover:bg-indigo-100 transition"><i className="fas fa-plus mr-1"></i> Thêm chủ đề</button>
                                </div>
                                
                                {topics.map((topic, index) => (
                                    <div key={topic.id} className="bg-slate-50 p-4 rounded-xl border border-gray-200 relative group transition hover:border-indigo-300 hover:shadow-sm">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-1 rounded">#{index + 1}</span>
                                            {topics.length > 1 && (
                                                <button onClick={() => removeTopic(topic.id)} className="text-red-400 hover:text-red-600 transition"><i className="fas fa-trash-alt"></i></button>
                                            )}
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-12 gap-3">
                                            <div className="md:col-span-6">
                                                <input 
                                                    value={topic.name} 
                                                    onChange={(e) => updateTopic(topic.id, 'name', e.target.value)}
                                                    className="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" 
                                                    placeholder="Nhập tên chủ đề..." 
                                                />
                                            </div>
                                            <div className="md:col-span-3">
                                                <div className="flex items-center bg-white border border-gray-300 rounded-lg px-2">
                                                    <span className="text-gray-500 text-xs whitespace-nowrap mr-2">SL:</span>
                                                    <input 
                                                        type="number" min="1" max="50" 
                                                        value={topic.count} 
                                                        onChange={(e) => updateTopic(topic.id, 'count', parseInt(e.target.value) || 1)}
                                                        className="w-full p-2 outline-none" 
                                                    />
                                                </div>
                                            </div>
                                            <div className="md:col-span-3">
                                                <select 
                                                    value={topic.level} 
                                                    onChange={(e) => updateTopic(topic.id, 'level', e.target.value)}
                                                    className="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white"
                                                >
                                                    {LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* TỔNG KẾT */}
                            <div className="mb-6 flex justify-end items-center gap-2 text-slate-600 text-sm font-bold">
                                <span>Tổng câu hỏi:</span>
                                <span className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg text-lg">{topics.reduce((acc, t) => acc + t.count, 0)}</span>
                            </div>

                            <button 
                                onClick={generateContent} 
                                disabled={loading} 
                                className="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white py-4 rounded-xl font-bold hover:shadow-lg hover:scale-[1.01] transition disabled:opacity-70 disabled:hover:scale-100 flex justify-center items-center gap-3 text-lg"
                            >
                                {loading ? (
                                    retryCount > 0 ? <><i className="fas fa-sync fa-spin"></i> Đổi Key khác ({retryCount})...</> : <><i className="fas fa-circle-notch fa-spin"></i> Đang suy nghĩ...</>
                                ) : (
                                    <><i className="fas fa-magic"></i> TẠO {mode === "quiz" ? "ĐỀ" : "BÀI TẬP"} NGAY</>
                                )}
                            </button>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="fade-in">
                            <div className="sticky top-2 z-30 bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-lg border border-indigo-100 mb-6 flex flex-wrap justify-between items-center gap-4">
                                <div>
                                    <h2 className="font-bold text-lg text-slate-800 line-clamp-1">
                                        {mode === "quiz" ? "Đề trắc nghiệm" : "Bài tập tự luận"} tổng hợp
                                    </h2>
                                    <p className="text-xs text-slate-500">
                                        {mode === "quiz" ? questions.length : essays.length} {mode === "quiz" ? "câu" : "bài"}
                                    </p>
                                </div>
                                <div className="flex gap-2 flex-wrap">
                                    <button onClick={() => setStep(1)} className="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 font-bold text-sm transition"><i className="fas fa-redo"></i> Tạo lại</button>
                                    <button onClick={startEditing} className="px-4 py-2 bg-red-100 text-red-600 border border-red-200 rounded-lg hover:bg-red-200 font-bold text-sm transition"><i className="fas fa-pencil-alt"></i> Sửa</button>
                                    {mode === "quiz" && (
                                        <button onClick={() => setShowSettings(true)} className="px-4 py-2 bg-purple-50 text-purple-600 border border-purple-200 rounded-lg hover:bg-purple-100 font-bold text-sm transition"><i className="fas fa-cog"></i> Cài đặt</button>
                                    )}
                                    <button onClick={exportWord} className="px-4 py-2 bg-blue-50 text-blue-600 border border-blue-200 rounded-lg hover:bg-blue-100 font-bold text-sm transition"><i className="fas fa-file-word"></i> Word</button>
                                    <button onClick={startPresentation} className="px-5 py-2 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-lg font-bold hover:shadow-lg hover:-translate-y-0.5 transition flex items-center gap-2 text-sm shadow-green-200"><i className="fas fa-chalkboard-teacher"></i> DẠY NGAY</button>
                                </div>
                            </div>

                            {mode === "quiz" ? (
                                <div className="space-y-6 pb-20">
                                    {questions.map((q, i) => (
                                        <div key={i} className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition group">
                                            <div className="flex gap-3 mb-4">
                                                <span className="bg-indigo-100 text-indigo-700 font-bold px-3 py-1 rounded-lg text-sm h-fit whitespace-nowrap">Câu {i+1}</span>
                                                <div className="flex-1">
                                                    {q.question_image && (
                                                        <div className="mb-3">
                                                            <img src={q.question_image} alt="Câu hỏi" className="max-h-60 rounded-lg border object-contain bg-gray-50"/>
                                                        </div>
                                                    )}
                                                    <h3 className="text-lg font-medium text-slate-800 leading-relaxed"><MathText text={q.question}/></h3>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 pl-0 md:pl-12">
                                                {q.options.map((o, idx) => (
                                                    <div key={idx} className={`p-3 border rounded-xl flex items-center gap-3 transition ${idx === q.correctAnswerIndex ? 'bg-green-50 border-green-200 ring-1 ring-green-400' : 'bg-slate-50 border-slate-200 group-hover:bg-white'}`}>
                                                        <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 ${idx === q.correctAnswerIndex ? 'bg-green-500 text-white' : 'bg-slate-200 text-slate-600'}`}>{String.fromCharCode(65+idx)}</span>
                                                        <span className="text-slate-700"><MathText text={cleanOptionText(o)}/></span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="space-y-6 pb-20">
                                    {essays.map((essay, i) => (
                                        <div key={i} className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition">
                                            <div className="flex gap-3 mb-4">
                                                <span className="bg-green-100 text-green-700 font-bold px-3 py-1 rounded-lg text-sm h-fit whitespace-nowrap">Bài {i+1}</span>
                                                <div className="flex-1">
                                                    {essay.question_image && (
                                                        <div className="mb-3">
                                                            <img src={essay.question_image} alt="Đề bài" className="max-h-60 rounded-lg border object-contain bg-gray-50"/>
                                                        </div>
                                                    )}
                                                    <h3 className="text-lg font-medium text-slate-800 leading-relaxed"><MathText text={essay.question}/></h3>
                                                </div>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                <h4 className="font-bold text-slate-700 mb-2 flex items-center gap-2"><i className="fas fa-lightbulb text-yellow-500"></i>Lời giải:</h4>
                                                <div className="text-slate-600 leading-relaxed"><MathText text={essay.solution}/></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {showSettings && <PresentationSettings settings={presentationSettings} onSettingsChange={setPresentationSettings} onClose={() => setShowSettings(false)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
