<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lộ trình tự ôn luyện Toán 7</title>
    <script src="access-control.js?v=20260620-access-sync1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.LOTRINH_PAGE_KEY = 'lotrinhtoan7';
        window.LOTRINH_SUBJECT = 'Toán 7';
        window.LOTRINH_PAGE_TITLE = 'Tự học và rèn luyện Toán 7 cùng thầy Thiên';
    </script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { color-scheme: light; }
        /* Fix Tailwind Preflight: svg{display:block} phá vỡ MathJax inline */
        mjx-container svg { display: inline !important; }
        html { font-size: 18px; }
        body { font-family: "Segoe UI", Arial, sans-serif; background: #f6f8fb; }
        .app-shell {
            min-height: 100vh;
            background:
                linear-gradient(180deg, rgba(20, 184, 166, 0.08), transparent 280px),
                linear-gradient(90deg, rgba(245, 158, 11, 0.08), transparent 460px),
                #f6f8fb;
        }
        .panel {
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.07);
        }
        .lesson-item {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            transition: border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
        }
        .lesson-item.active {
            border-color: #0f766e;
            box-shadow: 0 8px 18px rgba(15, 118, 110, 0.12);
            transform: translateY(-1px);
        }
        .lesson-chapter-group {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #f8fafc;
            overflow: hidden;
        }
        .lesson-chapter-group + .lesson-chapter-group { margin-top: 10px; }
        .lesson-chapter-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            cursor: pointer;
            list-style: none;
            font-size: 0.82rem;
            font-weight: 800;
            color: #334155;
        }
        .lesson-chapter-head::-webkit-details-marker { display: none; }
        .lesson-chapter-title { min-width: 0; line-height: 1.4; }
        .lesson-chapter-meta {
            flex-shrink: 0;
            font-size: 0.72rem;
            font-weight: 700;
            color: #64748b;
        }
        .lesson-chapter-items { padding: 0 8px 8px; }
        .skill-bar { height: 8px; border-radius: 999px; background: #e2e8f0; overflow: hidden; }
        .skill-bar span { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, #0f766e, #f59e0b); }
        .practice-card {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            background: #ffffff;
            overflow: hidden;
        }
        .question-head {
            border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
            padding: 14px 16px;
        }
        .question-text {
            white-space: normal;
            word-break: normal;
            overflow-wrap: break-word;
            line-height: 1.75;
        }
        .question-text mjx-container,
        .answer-option mjx-container {
            display: inline;
            vertical-align: -0.15em;
        }
        .answer-grid {
            display: grid;
            gap: 10px;
            padding: 14px 16px 16px;
        }
        .answer-option {
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            background: #ffffff;
            min-height: 46px;
            transition: border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
        }
        .answer-option:hover { border-color: #94a3b8; background: #f8fafc; }
        .answer-option:has(input:checked) {
            border-color: #0f766e;
            background: #f0fdfa;
            box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.08);
        }
        .essay-input,
        .fill-input {
            display: block;
            width: calc(100% - 32px);
            margin: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 12px 14px;
            color: #0f172a;
            background: #fff;
            outline: none;
            pointer-events: auto;
            user-select: text;
            -webkit-user-select: text;
            resize: vertical;
        }
        .essay-input:focus,
        .fill-input:focus {
            border-color: #0f766e;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }
        .math-symbol-toolbar {
            margin: 0 16px 12px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
        }
        .math-symbol-toolbar-title {
            margin: 0 0 10px;
            font-size: 0.82rem;
            font-weight: 700;
            color: #475569;
        }
        .math-symbol-group + .math-symbol-group { margin-top: 10px; }
        .math-symbol-group-label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .math-symbol-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .math-symbol-btn {
            min-width: 36px;
            padding: 6px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #fff;
            color: #0f172a;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }
        .math-symbol-btn:hover {
            border-color: #0f766e;
            background: #ecfdf5;
            color: #0f766e;
        }
        .drag-pool,
        .drag-slot-row {
            margin: 16px;
            display: flex;
            min-height: 52px;
            flex-wrap: wrap;
            gap: 10px;
            border-radius: 8px;
            border: 1px dashed #cbd5e1;
            background: #f8fafc;
            padding: 12px;
        }
        .drag-slot-row { background: #f0fdfa; border-color: #5eead4; }
        .drag-chip {
            border: 1px solid #99f6e4;
            border-radius: 999px;
            background: #ffffff;
            color: #0f172a;
            cursor: grab;
            font-weight: 700;
            padding: 8px 12px;
        }
        .drag-chip:active { cursor: grabbing; }
        .drag-pool.drag-over,
        .drag-slot-row.drag-over,
        .fill-drop-slot.drag-over {
            border-color: #0f766e;
            background: #ecfdf5;
        }
        .fill-prompt-line {
            margin: 16px;
            line-height: 2.2;
        }
        .fill-pool-label,
        .match-help,
        .essay-help {
            margin: 0 16px 8px;
            font-size: 0.82rem;
            font-weight: 700;
            color: #475569;
        }
        .sort-pool-label { margin-top: 16px; }
        .sort-zone-label { margin: 8px 16px 6px; color: #0f766e; }
        .sort-answer-zone {
            min-height: 58px;
            margin: 0 16px 16px;
        }
        .sort-zone-placeholder {
            display: block;
            width: 100%;
            padding: 10px 4px;
            font-size: 0.84rem;
            font-weight: 600;
            color: #64748b;
            text-align: center;
        }
        .fill-drop-slot {
            display: inline-flex;
            min-width: 96px;
            min-height: 42px;
            align-items: center;
            justify-content: center;
            margin: 0 4px;
            padding: 4px 8px;
            border: 2px dashed #5eead4;
            border-radius: 10px;
            background: #f0fdfa;
            vertical-align: middle;
        }
        .fill-slot-placeholder {
            font-size: 0.75rem;
            font-weight: 700;
            color: #0f766e;
        }
        .match-board {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin: 16px;
        }
        .match-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .match-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            background: #fff;
            padding: 12px 14px;
            text-align: left;
            color: #0f172a;
            font-weight: 700;
            cursor: pointer;
            transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        }
        .match-item:hover { border-color: #94a3b8; background: #f8fafc; }
        .match-item.is-selected {
            border-color: #0f766e;
            background: #ecfdf5;
            box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.12);
        }
        .match-item.is-paired {
            border-color: #14b8a6;
            background: #f0fdfa;
        }
        .match-pair-badge {
            display: inline-flex;
            width: 24px;
            height: 24px;
            flex: 0 0 24px;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: #0f766e;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 800;
        }
        .match-item-text { flex: 1; min-width: 0; }
        .answer-letter {
            display: grid;
            width: 28px;
            height: 28px;
            flex: 0 0 28px;
            place-items: center;
            border-radius: 999px;
            background: #eef2f7;
            color: #334155;
            font-size: 0.78rem;
            font-weight: 800;
        }
        .answer-option:has(input:checked) .answer-letter {
            background: #0f766e;
            color: #ffffff;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; }
        .muted-note { color: #64748b; font-size: 0.875rem; line-height: 1.6; }
        .lesson-document {
            color: #1e293b;
            font-size: 1.05rem;
            line-height: 1.85;
        }
        .lesson-document .lesson-explain-block + .lesson-explain-block { margin-top: 1rem; }
        .lesson-theory-flow .lesson-paragraph + .lesson-paragraph,
        .lesson-theory-flow .ai-explain-btn + .lesson-paragraph { margin-top: 0.7rem; }
        .lesson-theory-flow .lesson-paragraph + .ai-explain-btn { margin-top: 4px; margin-bottom: 4px; }
        .lesson-inline-image { margin: 0.75rem 0; text-align: center; }
        .lesson-inline-image img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
        }
        .lesson-inline-image figcaption {
            margin-top: 0.35rem;
            font-size: 0.82rem;
            color: #64748b;
        }
        .next-action-clickable {
            cursor: pointer;
            transition: border-color 0.16s ease, box-shadow 0.16s ease;
        }
        .next-action-clickable:hover {
            border-color: #f59e0b;
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.12);
        }
        .lesson-document .lesson-paragraph {
            margin: 0;
            white-space: normal;
            word-break: normal;
            overflow-wrap: break-word;
            line-height: 1.9;
        }
        .lesson-document .lesson-paragraph mjx-container {
            display: inline;
            vertical-align: -0.12em;
        }
        .lesson-document mjx-container[jax="SVG"] {
            max-width: 100%;
        }
        .lesson-document mjx-container[display="true"] {
            display: block;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0.35rem 0;
        }
        .lesson-document mjx-container:not([display="true"]),
        .question-text mjx-container:not([display="true"]),
        .answer-option mjx-container:not([display="true"]) {
            display: inline;
            vertical-align: -0.12em;
            overflow-wrap: normal;
            word-break: keep-all;
        }
        /* AI giải thích - Nút */
        .ai-explain-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            padding: 4px 12px;
            font-size: 0.78rem;
            font-weight: 600;
            color: #92400e;
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .ai-explain-btn:hover {
            background: #fde68a;
            border-color: #f59e0b;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.2);
        }
        .ai-explain-btn:disabled {
            opacity: 0.7;
            cursor: wait;
            transform: none;
        }
        .ai-chat-bubble {
            position: relative;
            margin-top: 12px;
            max-width: min(640px, 100%);
            border: 1px solid #fbbf24;
            border-radius: 14px;
            background: #fffbeb;
            box-shadow: 0 16px 34px rgba(146, 64, 14, 0.14);
            overflow: visible;
            animation: aiBubbleIn 0.18s ease;
        }
        .ai-chat-bubble::before {
            content: "";
            position: absolute;
            top: -8px;
            left: 28px;
            width: 14px;
            height: 14px;
            border-left: 1px solid #fbbf24;
            border-top: 1px solid #fbbf24;
            background: #fffbeb;
            transform: rotate(45deg);
        }
        .ai-chat-bubble-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            color: #92400e;
            font-size: 0.86rem;
            font-weight: 800;
        }
        .ai-chat-bubble-head span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .ai-chat-bubble-close {
            display: grid;
            width: 26px;
            height: 26px;
            place-items: center;
            border: 0;
            border-radius: 999px;
            background: #fde68a;
            color: #78350f;
            font-size: 1.1rem;
            line-height: 1;
            cursor: pointer;
        }
        .ai-chat-bubble-close:hover { background: #fcd34d; }
        .ai-chat-bubble-body {
            padding: 0 14px 14px;
            color: #334155;
            font-size: 0.95rem;
            line-height: 1.85;
            max-height: 320px;
            overflow-y: auto;
        }
        .ai-chat-bubble-body mjx-container svg { display: inline !important; }
        @keyframes aiBubbleIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* AI giải thích - Modal popup */
        .ai-modal-overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            background: rgba(15,23,42,0.5); backdrop-filter: blur(4px);
            animation: aiModalFadeIn 0.25s ease; padding: 16px;
        }
        .ai-modal-card {
            background: #fff; border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            width: 100%; max-width: 560px; max-height: 80vh;
            display: flex; flex-direction: column;
            animation: aiModalSlideUp 0.3s ease; overflow: hidden;
        }
        .ai-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid #e2e8f0;
            font-weight: 700; font-size: 1rem; color: #1e293b;
        }
        .ai-modal-close {
            width: 32px; height: 32px; display: grid; place-items: center;
            border: none; background: #f1f5f9; border-radius: 8px;
            font-size: 1.3rem; color: #64748b; cursor: pointer; transition: all 0.15s;
        }
        .ai-modal-close:hover { background: #e2e8f0; color: #0f172a; }
        .ai-modal-body {
            padding: 20px; overflow-y: auto;
            font-size: 0.95rem; line-height: 1.85; color: #334155;
        }
        .ai-modal-body mjx-container svg { display: inline !important; }
        .ai-modal-footer {
            padding: 12px 20px; border-top: 1px solid #e2e8f0;
            display: flex; justify-content: flex-end;
        }
        .ai-modal-close-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 20px; font-size: 0.85rem; font-weight: 700;
            color: #fff; background: linear-gradient(135deg, #0f766e, #14b8a6);
            border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .ai-modal-close-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15,118,110,0.3);
        }
        @keyframes aiModalFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes aiModalSlideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>

<body>
    <div class="app-shell text-slate-900">
        <header class="border-b border-slate-200 bg-white/90">
            <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-4 md:flex-row md:items-center md:justify-between">
                <div>
                    <a href="index.html" class="mb-2 inline-flex items-center gap-2 text-sm font-semibold text-teal-700">
                        <i class="fas fa-arrow-left"></i>
                        Trang chính
                    </a>
                    <h1 id="routeTitle" class="text-2xl font-bold tracking-normal text-slate-950">Lộ trình tự học</h1>
                </div>
                <div class="flex flex-col gap-2 sm:flex-row sm:items-end">
                    <div>
                        <div id="accountRoleLabel" class="text-sm font-semibold text-slate-700">Tài khoản</div>
                        <div id="studentNameDisplay" class="mt-1 min-w-[220px] rounded border border-slate-300 bg-slate-50 px-3 py-2 text-sm font-semibold text-slate-900 sm:w-52">Đang tải...</div>
                    </div>
                    <button id="resetBtn" class="inline-flex items-center justify-center gap-2 rounded border border-slate-300 bg-white px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-50">
                        <i class="fas fa-rotate-left"></i>
                        Làm lại
                    </button>
                    <button id="logoutBtn" class="inline-flex items-center justify-center gap-2 rounded border border-rose-200 bg-white px-4 py-2 text-sm font-bold text-rose-700 hover:bg-rose-50">
                        <i class="fas fa-right-from-bracket"></i>
                        Đăng xuất
                    </button>
                </div>
            </div>
        </header>

        <main id="studentLearningMain" class="mx-auto grid max-w-7xl gap-5 px-4 py-5 lg:grid-cols-[320px_1fr]">
            <aside class="space-y-4">
                <section class="panel p-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <p id="routeSubject" class="text-xs font-bold uppercase tracking-widest text-teal-700">Lộ trình</p>
                            <h2 id="routeChapter" class="mt-1 text-lg font-bold">Đang tải bài học</h2>
                        </div>
                        <i class="fas fa-route text-2xl text-amber-500"></i>
                    </div>
                    <div id="overallProgress" class="mt-4"></div>
                </section>

                <section class="panel p-4">
                    <h2 class="mb-3 text-sm font-bold uppercase tracking-widest text-slate-500">Danh sách bài</h2>
                    <div id="lessonList" class="space-y-2"></div>
                </section>
            </aside>

            <div class="space-y-5">
                <section class="panel p-5">
                    <p id="lessonPath" class="text-sm font-semibold text-teal-700"></p>
                    <h2 id="lessonTitle" class="mt-1 text-2xl font-bold"></h2>
                    <p id="lessonGoal" class="mt-2 max-w-3xl text-sm leading-6 text-slate-600"></p>
                    <div id="lessonStatus" class="mt-4 max-w-xl"></div>
                </section>

                <section class="grid gap-5 xl:grid-cols-[minmax(0,1fr)_300px]">
                    <section class="panel p-5">
                        <div class="flex flex-wrap items-center gap-2 border-b border-slate-200 pb-4">
                            <button data-tab="learn" class="tab-btn rounded px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-100">
                                <i class="fas fa-book-open mr-2"></i>Lý thuyết
                            </button>
                            <button data-tab="examples" class="tab-btn rounded px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-100">
                                <i class="fas fa-lightbulb mr-2"></i>Ví dụ
                            </button>
                            <button data-tab="videos" class="tab-btn rounded px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-100">
                                <i class="fas fa-circle-play mr-2"></i>Bài giảng
                            </button>
                            <button data-tab="practice" class="tab-btn rounded px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-100">
                                <i class="fas fa-pen-to-square mr-2"></i>Luyện tập
                            </button>
                        </div>
                        <div id="tabContent" class="pt-5"></div>
                    </section>

                    <aside id="lessonRightAside" class="space-y-3 xl:sticky xl:top-4 xl:self-start">
                        <section id="lessonAiChatAside" class="panel p-3 lesson-ai-chat-aside">
                            <div class="lesson-ai-chat-head">
                                <strong><i class="fas fa-comments text-teal-700 mr-1"></i> Hỏi đáp cùng AI</strong>
                                <p id="lessonAiChatLessonLabel">Đang tải bài...</p>
                                <p class="lesson-ai-chat-hint">Bôi đen đoạn → <strong>AI giải thích</strong>, hoặc hỏi bên dưới.</p>
                            </div>
                            <div id="lessonAiChatMessages" class="lesson-ai-chat-messages">
                                <div class="lesson-ai-chat-msg assistant">Em có thể hỏi về khái niệm, công thức hoặc cách làm bài trong bài học này.</div>
                            </div>
