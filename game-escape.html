<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Game 7: Escape Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/babel.min.js"></script>
    <link rel="stylesheet" href="vendor/katex.min.css">
    <script src="vendor/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex {
            font-size: 1.1em;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lock-open {
            animation: lockOpen 0.6s ease-out;
        }

        @keyframes lockOpen {
            0% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(15deg) scale(1.1);
            }

            100% {
                transform: rotate(0deg);
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-indigo-50 to-purple-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MathText = ({ text }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!text || !ref.current) return;
                let processed = text.replace(/`([^`]+)`/g, '$$$1$$').replace(/\\\[(.+?)\\\]/g, '$$$$1$$').replace(/\\\((.+?)\\\)/g, '$$$1$$');
                if (processed.includes('\\') && !processed.includes('$')) processed = `$${processed}$`;
                const parts = processed.split(/($$[\s\S]+?$$|\$[\s\S]+?\$)/g);
                ref.current.innerHTML = "";
                parts.forEach(part => {
                    if (part.startsWith('$$') && part.endsWith('$$')) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(2, -2), span, { throwOnError: false, displayMode: true }); } catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); } catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else {
                        ref.current.appendChild(document.createTextNode(part));
                    }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        const EscapeGame = () => {
            const [gameData, setGameData] = useState(null);
            const [currentLockIndex, setCurrentLockIndex] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showAnswer, setShowAnswer] = useState(false);
            const [hintsUsed, setHintsUsed] = useState(0);
            const [showHint, setShowHint] = useState(false);
            const [collectedCode, setCollectedCode] = useState([]);
            const [escaped, setEscaped] = useState(false);
            const [showInstructions, setShowInstructions] = useState(true);

            useEffect(() => {
                const data = localStorage.getItem('gameData');
                if (!data) {
                    alert('Không có dữ liệu game!');
                    window.location.href = 'trochoi.html';
                    return;
                }
                setGameData(JSON.parse(data));
            }, []);

            const handleSubmit = () => {
                if (selectedAnswer === null) return;
                setShowAnswer(true);

                const locks = gameData.content.locks || gameData.content.questions;
                const currentLock = locks[currentLockIndex];
                const isCorrect = selectedAnswer === currentLock.answer;

                if (isCorrect) {
                    const codeChar = currentLock.codeChar || String.fromCharCode(65 + currentLockIndex);
                    setCollectedCode([...collectedCode, codeChar]);

                    setTimeout(() => {
                        if (currentLockIndex < locks.length - 1) {
                            setCurrentLockIndex(currentLockIndex + 1);
                            setSelectedAnswer(null);
                            setShowAnswer(false);
                            setShowHint(false);
                        } else {
                            setEscaped(true);
                        }
                    }, 1500);
                }
            };

            if (!gameData) return <div className="flex items-center justify-center min-h-screen"><div className="text-2xl">Đang tải...</div></div>;

            const locks = gameData.content.locks || gameData.content.questions || [];

            if (showInstructions) {
                return (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-3xl font-bold text-indigo-700">
                                    <i className="fas fa-door-open mr-3"></i>ESCAPE ROOM
                                </h2>
                                <button onClick={() => setShowInstructions(false)} className="text-gray-500 hover:text-gray-700">
                                    <i className="fas fa-times text-2xl"></i>
                                </button>
                            </div>
                            <div className="space-y-4 text-gray-700">
                                <div className="bg-indigo-50 border-2 border-indigo-200 rounded-xl p-4">
                                    <h3 className="font-bold text-lg text-indigo-800 mb-2">
                                        <i className="fas fa-bullseye mr-2"></i>Mục tiêu
                                    </h3>
                                    <p>Ôn tập đỉnh cao, làm việc nhóm để thoát khỏi phòng!</p>
                                </div>
                                <div>
                                    <h3 className="font-bold text-lg text-gray-800 mb-2">
                                        <i className="fas fa-gamepad mr-2"></i>Luật chơi
                                    </h3>
                                    <ul className="space-y-2 ml-6">
                                        <li className="flex items-start gap-2">
                                            <span className="text-indigo-600 font-bold">1.</span>
                                            <span>Có <strong>5-8 ổ khóa</strong> liên tiếp</span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-indigo-600 font-bold">2.</span>
                                            <span>Đúng → mở khóa + <strong className="text-green-600">lấy 1 ký tự</strong></span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-indigo-600 font-bold">3.</span>
                                            <span>Sai → xem <strong>gợi ý</strong> (max 2-3 hint)</span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-indigo-600 font-bold">4.</span>
                                            <span>Ghép ký tự → <strong className="text-green-600">MÃ TẨU THOÁT</strong></span>
                                        </li>
                                    </ul>
                                </div>
                                <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                                    <p className="text-sm">
                                        <i className="fas fa-lightbulb text-yellow-600 mr-2"></i>
                                        <strong>Mẹo:</strong> Đọc kỹ câu hỏi, sử dụng hint khôn ngoan!
                                    </p>
                                </div>
                            </div>
                            <button
                                onClick={() => setShowInstructions(false)}
                                className="w-full mt-6 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-bold text-lg hover:shadow-xl transition"
                            >
                                <i className="fas fa-play mr-2"></i>Bắt đầu thoát
                            </button>
                        </div>
                    </div>
                );
            }

            if (escaped) {
                const finalCode = collectedCode.join('');
                return (
                    <div className="max-w-3xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-12 text-center">
                            <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 lock-open">
                                <i className="fas fa-door-open text-5xl text-green-600"></i>
                            </div>
                            <h2 className="text-4xl font-bold mb-4 text-gray-800">Thoát thành công!</h2>
                            <div className="bg-indigo-100 border-2 border-indigo-500 rounded-xl p-6 mb-8">
                                <div className="text-sm text-gray-600 mb-2">Mã tẩu thoát:</div>
                                <div className="text-5xl font-bold text-indigo-600 tracking-widest">{finalCode}</div>
                            </div>
                            <div className="text-gray-600 mb-8">Hints sử dụng: {hintsUsed}</div>
                            <div className="flex gap-4 justify-center">
                                <button onClick={() => window.location.reload()} className="px-8 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700">
                                    <i className="fas fa-redo mr-2"></i>Chơi lại
                                </button>
                                <button onClick={() => window.location.href = 'trochoi.html'} className="px-8 py-3 bg-gray-600 text-white rounded-xl font-bold hover:bg-gray-700">
                                    <i className="fas fa-home mr-2"></i>Về menu
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentLock = locks[currentLockIndex];

            return (
                <div className="max-w-4xl mx-auto p-6 fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex gap-2">
                            <button onClick={() => window.location.href = 'trochoi.html'} className="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                                <i className="fas fa-arrow-left mr-2"></i>Thoát
                            </button>
                            <button onClick={() => setShowInstructions(true)} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                <i className="fas fa-question-circle"></i>
                            </button>
                        </div>

                        <h1 className="text-3xl font-bold text-indigo-700">
                            <i className="fas fa-door-open mr-2"></i>ESCAPE ROOM
                        </h1>

                        <div className="text-xl font-bold text-indigo-600">
                            {currentLockIndex}/{locks.length} khóa
                        </div>
                    </div>

                    <div className="flex justify-center gap-3 mb-8">
                        {locks.map((_, idx) => (
                            <div key={idx} className={`w-16 h-20 rounded-lg flex items-center justify-center transition ${idx < currentLockIndex ? 'bg-green-500 lock-open' :
                                    idx === currentLockIndex ? 'bg-yellow-500 animate-pulse' :
                                        'bg-gray-300'
                                }`}>
                                <i className={`fas ${idx < currentLockIndex ? 'fa-unlock text-white' : 'fa-lock text-gray-600'} text-3xl`}></i>
                            </div>
                        ))}
                    </div>

                    <div className="bg-white rounded-3xl shadow-2xl p-8 mb-6">
                        <div className="text-sm text-gray-500 mb-2">Khóa {currentLockIndex + 1}/{locks.length}</div>
                        <h3 className="text-2xl font-bold text-gray-800 mb-6">
                            <MathText text={currentLock.prompt} />
                        </h3>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            {currentLock.choices.map((choice, idx) => {
                                const isSelected = selectedAnswer === idx;
                                const isCorrect = currentLock.answer === idx;

                                let className = "p-4 rounded-xl border-2 cursor-pointer transition font-medium ";
                                if (showAnswer) {
                                    if (isCorrect) className += "bg-green-100 border-green-500 text-green-900";
                                    else if (isSelected) className += "bg-red-100 border-red-500 text-red-900";
                                    else className += "border-gray-200 opacity-50";
                                } else {
                                    className += isSelected ? "bg-blue-100 border-blue-500" : "border-gray-300 hover:border-blue-400 hover:bg-blue-50";
                                }

                                return (
                                    <button key={idx} onClick={() => setSelectedAnswer(idx)} disabled={showAnswer} className={className}>
                                        <div className="flex items-center gap-3">
                                            <span className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center font-bold">
                                                {String.fromCharCode(65 + idx)}
                                            </span>
                                            <div className="flex-1 text-left"><MathText text={choice} /></div>
                                        </div>
                                    </button>
                                );
                            })}
                        </div>

                        {showHint && (currentLock.hint1 || currentLock.hint) && (
                            <div className="p-4 bg-yellow-50 border-2 border-yellow-300 rounded-xl mb-4">
                                <div className="font-bold text-yellow-800 mb-1">
                                    <i className="fas fa-lightbulb mr-2"></i>Gợi ý:
                                </div>
                                <div className="text-gray-700"><MathText text={currentLock.hint1 || currentLock.hint} /></div>
                            </div>
                        )}

                        <div className="flex gap-4">
                            {!showHint && !showAnswer && (currentLock.hint1 || currentLock.hint) && hintsUsed < 3 && (
                                <button onClick={() => { setShowHint(true); setHintsUsed(hintsUsed + 1); }} className="px-6 py-3 bg-yellow-500 text-white rounded-xl font-bold hover:bg-yellow-600">
                                    <i className="fas fa-lightbulb mr-2"></i>Xem gợi ý ({3 - hintsUsed} còn)
                                </button>
                            )}

                            {!showAnswer && selectedAnswer !== null && (
                                <button onClick={handleSubmit} className="flex-1 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700">
                                    <i className="fas fa-key mr-2"></i>Mở khóa
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="bg-indigo-100 border-2 border-indigo-300 rounded-xl p-4 text-center">
                        <div className="text-sm text-gray-600 mb-2">Mã đã thu thập:</div>
                        <div className="text-3xl font-bold text-indigo-600 tracking-widest">{collectedCode.join(' ')}</div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<EscapeGame />, document.getElementById('root'));
    </script>
</body>

</html>
