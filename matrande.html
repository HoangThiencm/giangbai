<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Đề Toán 9 (V9.1 - Max 15 Pages)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap');
        body { font-family: 'Times New Roman', serif; background-color: #f0f2f5; }
        .font-ui { font-family: system-ui, -apple-system, sans-serif; }
        .loader { width: 24px; height: 24px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        .loader-blue { border-color: #2563eb; border-bottom-color: transparent; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .paper-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
        .blueprint-row:hover { background-color: #f8fafc; }
        .section-header { background-color: #e0e7ff; color: #3730a3; font-weight: bold; padding: 10px; border-radius: 6px; margin-top: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- AI ENGINE ---
        const AIAdapter = {
            getConfig: () => ({
                geminiKeys: JSON.parse(localStorage.getItem('global_gemini_keys') || "[]"),
            }),
            
            callMultiImage: async (payloadParts) => {
                const { geminiKeys } = AIAdapter.getConfig();
                if(!geminiKeys.length) throw new Error("MISSING_KEYS");
                
                let lastError;
                for(let i=0; i<3; i++) {
                    try {
                        const key = geminiKeys[Math.floor(Math.random() * geminiKeys.length)];
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                            method: 'POST', headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ contents: [{ parts: payloadParts }] })
                        });
                        if(!res.ok) {
                            const err = await res.json();
                            throw new Error(err.error?.message || res.statusText);
                        }
                        const data = await res.json();
                        return data.candidates[0].content.parts[0].text;
                    } catch(e) { 
                        console.warn(`Retry ${i+1} failed:`, e);
                        lastError = e; 
                        await new Promise(r => setTimeout(r, 2000)); 
                    }
                }
                throw lastError;
            }
        };

        // --- UTILS ---
        const cleanContent = (text) => {
            if (!text) return "";
            return text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                       .replace(/\\n/g, '<br/>').replace(/\n/g, '<br/>');
        };

        const processTextForWord = (text) => {
            if (!text) return "";
            // Fix format trước khi export
            let clean = cleanContent(text);
            clean = clean.replace(/\\\[/g, '$$$').replace(/\\\]/g, '$$$').replace(/\\\(/g, '$').replace(/\\\)/g, '$');
            
            return clean.replace(/(\$\$)([^$]+)(\$\$)|(\$)([^$]+)(\$)/g, (match, d1, dTex, d2, i1, iTex, i2) => {
                let tex = dTex || iTex;
                const isDisplay = !!dTex;
                tex = tex.replace(/frac/g, '\\frac').replace(/\\\\frac/g, '\\frac');
                try {
                    const mathML = katex.renderToString(tex, { throwOnError: false, output: 'mathml', displayMode: isDisplay, strict: false });
                    const matchMath = mathML.match(/<math[\s\S]*?<\/math>/);
                    return matchMath ? matchMath[0].replace(/<math/g, '<math xmlns="http://www.w3.org/1998/Math/MathML"').replace(/<annotation[\s\S]*?<\/annotation>/g, '') : match;
                } catch (e) { return match; }
            });
        };

        const MathView = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if(!ref.current || !text) return;
                try {
                    let htmlContent = cleanContent(text);
                    const parts = htmlContent.split(/(\$\$[^$]+\$\$|\$[^$]+\$)/g);
                    ref.current.innerHTML = "";
                    parts.forEach(part => {
                        if((part.startsWith('$$') && part.endsWith('$$')) || (part.startsWith('$') && part.endsWith('$'))) {
                            const span = document.createElement('span');
                            let tex = part.startsWith('$$') ? part.slice(2, -2) : part.slice(1, -1);
                            tex = tex.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/frac/g, '\\frac').replace(/\\\\frac/g, '\\frac');
                            try { katex.render(tex, span, { throwOnError: false, displayMode: part.startsWith('$$'), strict: false }); } catch(e) { span.innerText = part; }
                            ref.current.appendChild(span);
                        } else {
                            const span = document.createElement('span');
                            span.innerHTML = part; 
                            ref.current.appendChild(span);
                        }
                    });
                } catch(e){}
            }, [text]);
            return <div ref={ref} className="font-serif text-lg leading-relaxed text-gray-800"/>;
        };

        // --- APP COMPONENT ---
        const App = () => {
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [loadingText, setLoadingText] = useState("");
            const [info, setInfo] = useState({ dept: "PHÒNG GD&ĐT...", school: "TRƯỜNG THCS...", title: "KIỂM TRA CUỐI KỲ I", time: "90" });
            const [keysReady, setKeysReady] = useState(false);
            
            // STATE QUAN TRỌNG
            const [blueprint, setBlueprint] = useState(null); // Lưu cấu trúc đề
            const [examData, setExamData] = useState(null);   // Lưu nội dung đề đã sinh

            useEffect(() => {
                const keys = JSON.parse(localStorage.getItem('global_gemini_keys') || "[]");
                setKeysReady(keys.length > 0);
            }, []);

            // 1. UPLOAD & ANALYZE (Multi-page)
            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                
                setLoading(true);
                setLoadingText("Đang đọc PDF và phân tích cấu trúc...");
                
                try {
                    // Convert PDF to Images (Up to 15 pages)
                    const buffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(buffer).promise;
                    const images = [];
                    // ĐIỀU CHỈNH: Tăng giới hạn lên 15 trang
                    const maxPages = Math.min(pdf.numPages, 15); 
                    
                    for (let p = 1; p <= maxPages; p++) {
                        const page = await pdf.getPage(p);
                        const vp = page.getViewport({ scale: 2 });
                        const cvs = document.createElement('canvas');
                        cvs.width = vp.width; cvs.height = vp.height;
                        await page.render({ canvasContext: cvs.getContext('2d'), viewport: vp }).promise;
                        images.push(cvs.toDataURL('image/jpeg').split(',')[1]);
                    }

                    // Prompt Blueprint
                    const parts = [
                        { text: `
                            Bạn là chuyên gia khảo thí. Hãy phân tích các trang tài liệu (Ma trận & Đặc tả) này.
                            
                            NHIỆM VỤ: Trích xuất cấu trúc đề thi (Blueprint) thành JSON.
                            
                            LOGIC PHÂN TÍCH QUAN TRỌNG:
                            1. Nếu thấy cột "TL" (Tự luận) chiếm đa số hoặc toàn bộ, và các câu được nhóm thành "Bài 1", "Bài 2"... -> Exam Type là "TL" (100% Tự luận).
                            2. Nếu thấy có cả "TN" (Trắc nghiệm) và "TL" -> Exam Type là "TN+TL".
                            3. Xác định các Phần (Sections) và các Câu hỏi (Questions) bên trong.
                            4. Với Tự luận: Nếu một Bài lớn (VD: Bài 3) có nhiều ý nhỏ (a, b), hãy ghi chú vào field "group".
                            
                            OUTPUT JSON FORMAT:
                            {
                                "exam_type": "TN+TL" hoặc "TL",
                                "sections": [
                                    {
                                        "id": "I", "name": "PHẦN TRẮC NGHIỆM (hoặc TỰ LUẬN)", "score": 3.0,
                                        "questions": [
                                            { "code": "C1", "topic": "Căn thức...", "level": "NB", "type": "TN", "score": 0.25, "spec": "Nhận biết căn bậc hai..." },
                                            { "code": "C2", "topic": "Hàm số...", "level": "TH", "type": "TN", "score": 0.25, "spec": "..." }
                                        ]
                                    },
                                    {
                                        "id": "II", "name": "PHẦN TỰ LUẬN", "score": 7.0,
                                        "questions": [
                                            { "code": "B1a", "group": "Bài 1", "topic": "Giải phương trình", "level": "TH", "type": "TL", "score": 0.5, "spec": "Giải pt bậc nhất..." },
                                            { "code": "B1b", "group": "Bài 1", "topic": "Hệ phương trình", "level": "VD", "type": "TL", "score": 0.5, "spec": "Giải hệ..." }
                                        ]
                                    }
                                ]
                            }
                            Chỉ trả về JSON thuần.
                        `},
                        ...images.map(img => ({ inline_data: { mime_type: "image/jpeg", data: img } }))
                    ];

                    const jsonText = await AIAdapter.callMultiImage(parts);
                    const jsonMatch = jsonText.match(/\{[\s\S]*\}/);
                    if(!jsonMatch) throw new Error("Không tìm thấy JSON hợp lệ từ AI");
                    
                    const blueprintData = JSON.parse(jsonMatch[0]);
                    setBlueprint(blueprintData);
                    setStep(2); // Review Blueprint
                } catch (err) {
                    alert("Lỗi: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            // 2. GENERATE CONTENT (From Blueprint)
            const generateExamContent = async () => {
                if(!blueprint) return;
                setLoading(true);
                setLoadingText("Đang biên soạn nội dung đề thi (Mất khoảng 30s)...");

                try {
                    const prompt = `
                        Bạn là Giáo viên Toán 9 chuyên nghiệp.
                        Hãy soạn ĐỀ THI HOÀN CHỈNH dựa trên cấu trúc Blueprint JSON dưới đây:
                        ${JSON.stringify(blueprint)}

                        YÊU CẦU NỘI DUNG (TUÂN THỦ NGHIÊM NGẶT):
                        1. **Định dạng Toán học**: Mọi công thức toán (phân số, căn, hệ pt) BẮT BUỘC dùng LaTeX kẹp trong dấu $...$. 
                           - Ví dụ: $\\sqrt{x^2+1}$, $\\frac{1}{2}$.
                           - HỆ PHƯƠNG TRÌNH: Dùng $\\begin{cases} ... \\\\ ... \\end{cases}$ (Lưu ý: dấu xuống dòng trong hệ là 2 gạch chéo, nhưng trong JSON string phải escape thành 4 gạch chéo \\\\\\\\).
                        
                        2. **Cấu trúc đề**:
                           - Nếu type="TN" (Trắc nghiệm): Sinh câu dẫn + 4 đáp án A, B, C, D (Có 1 đúng).
                           - Nếu type="TL" (Tự luận): Sinh câu hỏi tự luận rõ ràng. Nếu có group "Bài 1", hãy đặt câu hỏi phù hợp ngữ cảnh chung.
                        
                        3. **Đáp án (Trường c)**:
                           - TN: Chỉ ghi đáp án đúng (A/B/C/D).
                           - TL: Ghi LỜI GIẢI CHI TIẾT từng bước và thang điểm. Dùng \\n để xuống dòng trong lời giải.

                        OUTPUT JSON FORMAT:
                        {
                            "exam_content": [
                                {
                                    "section_id": "I",
                                    "questions": [
                                        { "id": "1", "q": "Nội dung câu 1...", "a": ["A...", "B...", "C...", "D..."], "c": "A" },
                                        ...
                                    ]
                                },
                                {
                                    "section_id": "II",
                                    "questions": [
                                        { "id": "1a", "group_label": "Bài 1", "q": "Giải phương trình...", "a": [], "c": "Lời giải..." },
                                        ...
                                    ]
                                }
                            ]
                        }
                    `;

                    const contentText = await AIAdapter.callMultiImage([{ text: prompt }]);
                    const jsonMatch = contentText.match(/\{[\s\S]*\}/);
                    if(!jsonMatch) throw new Error("Lỗi sinh nội dung đề");
                    
                    const contentData = JSON.parse(jsonMatch[0]);
                    
                    // Merge content back to blueprint structure for display
                    // (Simplification: Just store the contentData structured by sections)
                    setExamData(contentData);
                    setStep(3);

                } catch (err) {
                    alert("Lỗi sinh đề: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            // 3. EXPORT WORD
            const exportWord = () => {
                if(!examData || !blueprint) return;

                let html = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'>
                    <head><meta charset='utf-8'><title>De Thi</title>
                    <style>
                        body { font-family: 'Times New Roman'; font-size: 13pt; line-height: 1.3; }
                        p { margin: 5px 0; }
                        table { border-collapse: collapse; width: 100%; }
                        .header { text-align: center; font-weight: bold; margin-bottom: 20px; }
                        .section-title { font-weight: bold; text-transform: uppercase; margin-top: 15px; margin-bottom: 10px; }
                        .question-block { margin-bottom: 10px; text-align: justify; }
                    </style>
                    </head><body>
                    <div class="header">
                        <p>${info.dept.toUpperCase()}<br/>${info.school.toUpperCase()}</p>
                        <p>${info.title.toUpperCase()}<br/>MÔN: TOÁN 9 - Thời gian: ${info.time} phút</p>
                    </div>
                    <hr/>
                `;

                // Render Sections
                examData.exam_content.forEach((sec, idx) => {
                    // Tìm tên section từ blueprint
                    const bpSection = blueprint.sections[idx] || { name: `PHẦN ${sec.section_id}` };
                    html += `<div class='section-title'>${bpSection.name}</div>`;

                    sec.questions.forEach((q, qIdx) => {
                        const isTN = q.a && q.a.length > 0;
                        const label = q.group_label ? `<b>${q.group_label}</b> (${q.id})` : `<b>Câu ${q.id}:</b>`;
                        
                        html += `<div class='question-block'>${label} ${processTextForWord(q.q)}</div>`;
                        
                        if(isTN) {
                            html += `<table><tr>`;
                            q.a.forEach((opt, k) => {
                                if(k%2===0 && k>0) html += `</tr><tr>`;
                                html += `<td width="50%"><b>${String.fromCharCode(65+k)}.</b> ${processTextForWord(opt)}</td>`;
                            });
                            html += `</tr></table><br/>`;
                        } else {
                            html += `<br/>`; // Space for Essay
                        }
                    });
                });

                // Render Answers
                html += `<br clear=all style='page-break-before:always'><h3 style='text-align:center'>HƯỚNG DẪN CHẤM</h3>`;
                
                examData.exam_content.forEach((sec, idx) => {
                    const bpSection = blueprint.sections[idx];
                    html += `<h4>${bpSection.name}</h4>`;
                    
                    // Check if section is mainly TN or TL
                    const isTNSection = sec.questions.some(q => q.a && q.a.length > 0);

                    if(isTNSection) {
                        html += `<table border="1" cellpadding="5" style="text-align:center"><tr>`;
                        sec.questions.forEach(q => html += `<td>${q.id}</td>`);
                        html += `</tr><tr>`;
                        sec.questions.forEach(q => html += `<td><b>${processTextForWord(q.c)}</b></td>`);
                        html += `</tr></table><br/>`;
                    } else {
                        sec.questions.forEach(q => {
                            html += `<p><b>${q.group_label || 'Câu'} ${q.id}:</b></p>`;
                            html += `<div>${processTextForWord(q.c)}</div><hr/>`;
                        });
                    }
                });

                html += `</body></html>`;
                const blob = new Blob(['\ufeff', html], {type: 'application/msword'});
                saveAs(blob, `De_Thi_Toan_9_${blueprint.exam_type}.doc`);
            };

            // RENDER UI
            return (
                <div className="max-w-6xl mx-auto p-6 font-ui">
                    <div className="flex justify-between items-end border-b pb-4 mb-6">
                        <div>
                            <h1 className="text-2xl font-bold text-indigo-800">HỆ THỐNG RA ĐỀ TOÁN 9 (V9.1)</h1>
                            <p className="text-gray-500 text-sm">Kiến trúc Blueprint: Đọc hiểu toàn bộ PDF & Cấu trúc đề thông minh</p>
                        </div>
                        <a href="index.html" className="text-gray-500 hover:text-indigo-600 font-medium text-sm"><i className="fas fa-home"></i> Dashboard</a>
                    </div>

                    {!keysReady ? (
                        <div className="bg-red-50 text-red-700 p-4 rounded border border-red-200 font-bold mb-6">
                            ⚠️ Vui lòng quay lại Dashboard để nạp API Key trước!
                        </div>
                    ) : (
                        <>
                            {/* STEP 1: UPLOAD */}
                            {step === 1 && (
                                <div className="bg-white p-8 rounded-xl shadow paper-shadow animate-fade-in">
                                    <h2 className="text-xl font-bold mb-4 text-gray-800">1. Thiết lập & Tải lên</h2>
                                    <div className="grid grid-cols-4 gap-4 mb-6">
                                        <input className="border p-2 rounded" placeholder="Sở/Phòng" value={info.dept} onChange={e=>setInfo({...info, dept:e.target.value})}/>
                                        <input className="border p-2 rounded" placeholder="Trường" value={info.school} onChange={e=>setInfo({...info, school:e.target.value})}/>
                                        <input className="border p-2 rounded" placeholder="Tên kỳ thi" value={info.title} onChange={e=>setInfo({...info, title:e.target.value})}/>
                                        <input className="border p-2 rounded" placeholder="Thời gian" value={info.time} onChange={e=>setInfo({...info, time:e.target.value})}/>
                                    </div>
                                    
                                    <label className="block border-2 border-dashed border-indigo-200 bg-indigo-50 rounded-xl p-12 text-center cursor-pointer hover:bg-indigo-100 transition relative">
                                        <input type="file" className="hidden" accept=".pdf" onChange={handleUpload} />
                                        {loading ? (
                                            <div><div className="loader loader-blue mb-2"></div><p className="text-indigo-600 font-bold">{loadingText}</p></div>
                                        ) : (
                                            <div>
                                                <i className="fas fa-file-pdf text-5xl text-indigo-500 mb-3"></i>
                                                <p className="font-bold text-indigo-700 text-lg">Tải lên File PDF Ma trận & Đặc tả</p>
                                                <p className="text-sm text-indigo-400">Hệ thống sẽ đọc tối đa 15 trang để hiểu cấu trúc đề</p>
                                            </div>
                                        )}
                                    </label>
                                </div>
                            )}

                            {/* STEP 2: REVIEW BLUEPRINT */}
                            {step === 2 && blueprint && (
                                <div className="bg-white p-6 rounded-xl shadow paper-shadow animate-fade-in">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-xl font-bold text-gray-800">2. Xác nhận Cấu trúc đề (Blueprint)</h2>
                                        <div className="bg-blue-100 text-blue-800 px-3 py-1 rounded text-sm font-bold">
                                            Loại đề: {blueprint.exam_type}
                                        </div>
                                    </div>

                                    <div className="overflow-auto max-h-[60vh] border rounded-lg mb-6">
                                        {blueprint.sections.map((sec, idx) => (
                                            <div key={idx} className="p-4">
                                                <div className="section-header">{sec.name} ({sec.score} điểm)</div>
                                                <table className="w-full text-sm text-left">
                                                    <thead className="bg-gray-50 text-gray-500">
                                                        <tr>
                                                            <th className="p-2">Mã</th>
                                                            <th className="p-2">Nhóm</th>
                                                            <th className="p-2">Chủ đề / Đặc tả</th>
                                                            <th className="p-2">Mức độ</th>
                                                            <th className="p-2">Điểm</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y">
                                                        {sec.questions.map((q, qIdx) => (
                                                            <tr key={qIdx} className="blueprint-row">
                                                                <td className="p-2 font-bold text-indigo-600">{q.code}</td>
                                                                <td className="p-2 font-bold">{q.group || '-'}</td>
                                                                <td className="p-2">
                                                                    <div className="font-bold">{q.topic}</div>
                                                                    <div className="text-xs text-gray-500">{q.spec}</div>
                                                                </td>
                                                                <td className="p-2"><span className="bg-gray-100 px-2 py-0.5 rounded text-xs">{q.level}</span></td>
                                                                <td className="p-2">{q.score}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="flex justify-end gap-3 border-t pt-4">
                                        <button onClick={()=>setStep(1)} className="px-4 py-2 border rounded font-bold text-gray-600 hover:bg-gray-50">Làm lại</button>
                                        <button onClick={generateExamContent} className="px-6 py-2 bg-indigo-600 text-white rounded font-bold hover:bg-indigo-700 shadow-lg flex items-center gap-2">
                                            {loading ? <div className="loader w-4 h-4 border-white"></div> : <i className="fas fa-magic"></i>}
                                            Tiến hành biên soạn đề
                                        </button>
                                    </div>
                                    {loading && <p className="text-center text-indigo-600 mt-2 font-bold animate-pulse">{loadingText}</p>}
                                </div>
                            )}

                            {/* STEP 3: PREVIEW & EXPORT */}
                            {step === 3 && examData && (
                                <div className="h-[85vh] flex flex-col bg-white rounded-xl shadow paper-shadow overflow-hidden">
                                    <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                                        <h2 className="text-xl font-bold text-gray-800">3. Xem trước & Xuất bản</h2>
                                        <div className="space-x-2">
                                            <button onClick={()=>setStep(2)} className="px-4 py-2 border rounded font-bold text-gray-600">Quay lại</button>
                                            <button onClick={exportWord} className="px-4 py-2 bg-green-600 text-white rounded font-bold hover:bg-green-700 shadow flex items-center gap-2">
                                                <i className="fas fa-file-word"></i> Xuất file Word
                                            </button>
                                        </div>
                                    </div>

                                    <div className="flex-1 overflow-auto p-8 bg-white">
                                        {/* HEADER PREVIEW */}
                                        <div className="text-center font-bold mb-8 font-serif">
                                            <p>{info.dept.toUpperCase()}</p>
                                            <p>{info.school.toUpperCase()}</p>
                                            <div className="w-16 h-0.5 bg-black mx-auto my-2"></div>
                                            <p className="text-lg">{info.title.toUpperCase()}</p>
                                            <p>MÔN: TOÁN 9</p>
                                        </div>

                                        {examData.exam_content.map((sec, idx) => (
                                            <div key={idx} className="mb-8">
                                                <h3 className="font-bold text-lg mb-4 uppercase">{blueprint.sections[idx]?.name || sec.section_id}</h3>
                                                <div className="space-y-6">
                                                    {sec.questions.map((q, qIdx) => (
                                                        <div key={qIdx} className="bg-slate-50 p-4 rounded-lg border hover:border-indigo-300 transition">
                                                            <div className="mb-2">
                                                                <span className="font-bold text-indigo-800 mr-2">{q.group_label ? q.group_label : `Câu ${q.id}`}:</span>
                                                                <div className="inline-block"><MathView text={q.q} /></div>
                                                            </div>
                                                            
                                                            {/* Trắc nghiệm Options */}
                                                            {q.a && q.a.length > 0 && (
                                                                <div className="grid grid-cols-2 gap-4 ml-4 mt-2">
                                                                    {q.a.map((opt, k) => (
                                                                        <div key={k} className="flex gap-2">
                                                                            <span className="font-bold text-gray-600">{String.fromCharCode(65+k)}.</span>
                                                                            <MathView text={opt} />
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}

                                                            {/* Đáp án */}
                                                            <div className="mt-4 pt-3 border-t border-slate-200">
                                                                <p className="text-xs font-bold text-green-700 uppercase mb-1">Hướng dẫn chấm:</p>
                                                                <div className="text-sm text-gray-700 font-mono bg-white p-2 rounded border">
                                                                    <MathView text={q.c} />
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
