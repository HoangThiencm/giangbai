<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Đề Toán 9 (V9.7 - Stable Context Aware)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap');
        body { font-family: 'Times New Roman', serif; background-color: #f0f2f5; }
        .font-ui { font-family: system-ui, -apple-system, sans-serif; }
        .loader { width: 16px; height: 16px; border: 2px solid #2563eb; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .section-header { background-color: #e0e7ff; color: #3730a3; font-weight: bold; padding: 10px; border-radius: 6px; margin-top: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        input, select, textarea { transition: all 0.2s; font-size: 13px; }
        input:focus, select:focus, textarea:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 1px rgba(37,99,235,0.2); }
        
        /* Trạng thái row */
        .status-done { background-color: #f0fdf4; border-left: 4px solid #22c55e; }
        .status-error { background-color: #fef2f2; border-left: 4px solid #ef4444; }
        .status-generating { background-color: #eff6ff; border-left: 4px solid #3b82f6; }
        .status-pending { border-left: 4px solid #e5e7eb; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- AI ENGINE ---
        const AIAdapter = {
            getConfig: () => ({
                geminiKeys: JSON.parse(localStorage.getItem('global_gemini_keys') || "[]"),
            }),
            
            // Hàm gọi AI hỗ trợ đa ảnh (Dùng chung cho cả tạo Blueprint và tạo câu hỏi)
            callMultiImage: async (payloadParts) => {
                const { geminiKeys } = AIAdapter.getConfig();
                if(!geminiKeys.length) throw new Error("MISSING_KEYS");
                
                let lastError;
                // Retry logic
                for(let i=0; i<3; i++) {
                    try {
                        const key = geminiKeys[Math.floor(Math.random() * geminiKeys.length)];
                        // Dùng model 1.5 Flash cho tốc độ và khả năng đọc ảnh tốt
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                            method: 'POST', headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ contents: [{ parts: payloadParts }] })
                        });
                        if(!res.ok) {
                            const err = await res.json();
                            throw new Error(err.error?.message || res.statusText);
                        }
                        const data = await res.json();
                        return data.candidates[0].content.parts[0].text;
                    } catch(e) { 
                        console.warn(`Retry ${i+1} failed:`, e);
                        lastError = e; 
                        await new Promise(r => setTimeout(r, 1000)); 
                    }
                }
                throw lastError;
            }
        };

        // --- UTILS ---
        const cleanContent = (text) => text?.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\\n/g, '<br/>').replace(/\n/g, '<br/>') || "";

        const processTextForWord = (text) => {
            if (!text) return "";
            let clean = cleanContent(text);
            clean = clean.replace(/\\\[/g, '$$$').replace(/\\\]/g, '$$$').replace(/\\\(/g, '$').replace(/\\\)/g, '$');
            return clean.replace(/(\$\$)([^$]+)(\$\$)|(\$)([^$]+)(\$)/g, (match, d1, dTex, d2, i1, iTex, i2) => {
                let tex = (dTex || iTex).replace(/frac/g, '\\frac').replace(/\\\\frac/g, '\\frac');
                try {
                    const mathML = katex.renderToString(tex, { throwOnError: false, output: 'mathml', displayMode: !!dTex, strict: false });
                    const matchMath = mathML.match(/<math[\s\S]*?<\/math>/);
                    return matchMath ? matchMath[0].replace(/<math/g, '<math xmlns="http://www.w3.org/1998/Math/MathML"').replace(/<annotation[\s\S]*?<\/annotation>/g, '') : match;
                } catch (e) { return match; }
            });
        };

        const MathView = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if(!ref.current || !text) return;
                try {
                    let htmlContent = cleanContent(text);
                    const parts = htmlContent.split(/(\$\$[^$]+\$\$|\$[^$]+\$)/g);
                    ref.current.innerHTML = "";
                    parts.forEach(part => {
                        if((part.startsWith('$$') && part.endsWith('$$')) || (part.startsWith('$') && part.endsWith('$'))) {
                            const span = document.createElement('span');
                            let tex = (part.startsWith('$$') ? part.slice(2, -2) : part.slice(1, -1)).replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/frac/g, '\\frac').replace(/\\\\frac/g, '\\frac');
                            try { katex.render(tex, span, { throwOnError: false, displayMode: part.startsWith('$$'), strict: false }); } catch(e) { span.innerText = part; }
                            ref.current.appendChild(span);
                        } else {
                            const span = document.createElement('span'); span.innerHTML = part; ref.current.appendChild(span);
                        }
                    });
                } catch(e){}
            }, [text]);
            return <div ref={ref} className="font-serif text-sm leading-relaxed text-gray-800"/>;
        };

        // --- APP ---
        const App = () => {
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [loadingText, setLoadingText] = useState("");
            const [info, setInfo] = useState({ dept: "PHÒNG GD&ĐT...", school: "TRƯỜNG THCS...", title: "KIỂM TRA CUỐI KỲ I", time: "90" });
            const [keysReady, setKeysReady] = useState(false);
            
            const [images, setImages] = useState([]); // Lưu ảnh để dùng lại khi sinh từng câu
            const [blueprint, setBlueprint] = useState(null);

            useEffect(() => {
                const keys = JSON.parse(localStorage.getItem('global_gemini_keys') || "[]");
                setKeysReady(keys.length > 0);
            }, []);

            // ACTIONS
            const updateQ = (sIdx, qIdx, field, val) => {
                const n = {...blueprint}; n.sections[sIdx].questions[qIdx][field] = val; setBlueprint(n);
            };
            
            const addQ = (sIdx) => {
                const n = {...blueprint};
                n.sections[sIdx].questions.push({ 
                    code: `Câu ${n.sections[sIdx].questions.length + 1}`, group: "", topic: "Chủ đề mới...", 
                    level: "TH", type: "TN", score: 0.25, spec: "...", status: 'pending', q: "", a: [], c: "" 
                });
                setBlueprint(n);
            };

            const removeQ = (sIdx, qIdx) => {
                if(confirm("Xóa dòng này?")) {
                    const n = {...blueprint}; n.sections[sIdx].questions.splice(qIdx, 1); setBlueprint(n);
                }
            };

            // 1. UPLOAD
            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                setLoading(true); setLoadingText("Đang đọc PDF và lưu ngữ cảnh...");
                try {
                    const buffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(buffer).promise;
                    const imgs = [];
                    for(let i=1; i<=Math.min(pdf.numPages, 15); i++) {
                        const page = await pdf.getPage(i);
                        const vp = page.getViewport({ scale: 2 });
                        const cvs = document.createElement('canvas'); cvs.width = vp.width; cvs.height = vp.height;
                        await page.render({ canvasContext: cvs.getContext('2d'), viewport: vp }).promise;
                        imgs.push(cvs.toDataURL('image/jpeg').split(',')[1]);
                    }
                    setImages(imgs); // Lưu lại ảnh để dùng cho bước sau

                    const prompt = `
                        Phân tích ảnh Ma trận đề thi Toán 9. Trích xuất JSON cấu trúc.
                        QUAN TRỌNG:
                        1. Quét TOÀN BỘ các dòng. Không bỏ sót.
                        2. Cột "Nhóm" (Group): Nếu có "Bài 1", "Bài 2"... hãy trích xuất để gộp câu.
                        3. Cột "Mã": C1, C2...
                        4. Loại câu (Type): "TN" (Trắc nghiệm), "TL" (Tự luận), "TF" (Đúng/Sai).
                        
                        OUTPUT JSON:
                        {
                            "exam_type": "TN+TL",
                            "sections": [
                                {
                                    "id": "I", "name": "PHẦN TRẮC NGHIỆM", "score": 3.0,
                                    "questions": [
                                        { "code": "C1", "group": "", "topic": "...", "level": "NB", "type": "TN", "score": 0.25, "spec": "..." }
                                    ]
                                }
                            ]
                        }
                    `;
                    
                    const res = await AIAdapter.callMultiImage([{text: prompt}, ...imgs.map(d=>({inline_data: {mime_type: "image/jpeg", data: d}}))]);
                    const json = JSON.parse(res.match(/\{[\s\S]*\}/)[0]);
                    
                    // Init status & content fields
                    json.sections.forEach(s => s.questions.forEach(q => {
                        q.status = 'pending'; q.q = ""; q.a = []; q.c = "";
                    }));
                    
                    setBlueprint(json);
                    setStep(2);
                } catch(e) { alert("Lỗi: " + e.message); } finally { setLoading(false); }
            };

            // 2. GENERATE SINGLE QUESTION (FIXED: Gửi kèm ảnh để AI không nói tào lao)
            const generateSingle = async (sIdx, qIdx) => {
                const qData = blueprint.sections[sIdx].questions[qIdx];
                updateQ(sIdx, qIdx, 'status', 'generating');
                
                try {
                    const prompt = `
                        Bạn là Giáo viên Toán 9. Hãy soạn nội dung cho câu hỏi này dựa trên ảnh Ma trận/Đặc tả đã cung cấp:
                        
                        THÔNG TIN CÂU HỎI:
                        - Mã: ${qData.code}
                        - Chủ đề: ${qData.topic}
                        - Mức độ: ${qData.level}
                        - Loại: ${qData.type} (TN=Trắc nghiệm 4 đáp án, TL=Tự luận, TF=Đúng/Sai)
                        - Đặc tả chi tiết: ${qData.spec}
                        ${qData.group ? `- Thuộc nhóm bài: "${qData.group}" (Hãy soạn nội dung phù hợp ngữ cảnh nhóm này)` : ""}

                        YÊU CẦU ĐẦU RA (JSON):
                        1. Toán học: Dùng LaTeX $...$. Hệ PT dùng \\begin{cases} ... \\\\ ... \\end{cases}.
                        2. Nội dung:
                           - Nếu TN: Câu hỏi + 4 đáp án A,B,C,D.
                           - Nếu TF: Câu hỏi + 4 ý a,b,c,d để xét đúng sai.
                           - Nếu TL: Câu hỏi tự luận chuẩn mực.
                        3. Đáp án (Bắt buộc):
                           - TN: Đáp án đúng (VD: "A").
                           - TF: Đáp án từng ý (VD: "a-Đ, b-S, c-Đ, d-S").
                           - TL: Lời giải chi tiết, có thang điểm.

                        JSON Output: { 
                            "q": "Nội dung câu hỏi...", 
                            "a": ["A...","B...","C...","D..."] (nếu TN/TF, ngược lại []), 
                            "c": "Lời giải chi tiết / Đáp án" 
                        }
                    `;
                    
                    // GỬI KÈM ẢNH ĐỂ AI CÓ NGỮ CẢNH CHÍNH XÁC
                    const payloadParts = [{ text: prompt }, ...images.map(d=>({inline_data: {mime_type: "image/jpeg", data: d}}))];
                    
                    const res = await AIAdapter.callMultiImage(payloadParts);
                    const jsonMatch = res.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("AI không trả về JSON");
                    const json = JSON.parse(jsonMatch[0]);
                    
                    if (!json.c) json.c = "AI chưa sinh đáp án.";

                    const newBp = {...blueprint};
                    const target = newBp.sections[sIdx].questions[qIdx];
                    target.q = json.q;
                    target.a = json.a || [];
                    target.c = json.c;
                    target.status = 'done';
                    setBlueprint(newBp);
                } catch(e) {
                    console.error(e);
                    updateQ(sIdx, qIdx, 'status', 'error');
                }
            };

            const generateAll = async () => {
                if(!confirm("Sinh toàn bộ các câu chưa có nội dung?")) return;
                for(let s=0; s<blueprint.sections.length; s++) {
                    for(let q=0; q<blueprint.sections[s].questions.length; q++) {
                        if(blueprint.sections[s].questions[q].status !== 'done') {
                            await generateSingle(s, q);
                            // Delay nhẹ để tránh rate limit nếu dùng key free
                            await new Promise(r => setTimeout(r, 1500)); 
                        }
                    }
                }
                alert("Hoàn tất!");
            };

            // 3. EXPORT
            const exportWord = () => {
                let html = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'>
                    <head><meta charset='utf-8'><style>body{font-family:'Times New Roman';font-size:13pt}table{width:100%;border-collapse:collapse}td{vertical-align:top}</style></head><body>
                    <div style="text-align:center;font-weight:bold;margin-bottom:20px"><p>${info.dept.toUpperCase()}</p><p>${info.school.toUpperCase()}</p><p>${info.title.toUpperCase()}</p><p>MÔN: TOÁN 9 - Thời gian: ${info.time} phút</p></div><hr/>
                `;

                blueprint.sections.forEach(sec => {
                    html += `<div style='font-weight:bold;margin-top:15px;margin-bottom:10px;text-transform:uppercase'>${sec.name}</div>`;
                    let currentGroup = null;
                    sec.questions.forEach(q => {
                        if(q.group && q.group !== currentGroup) { html += `<p><b>${q.group}:</b></p>`; currentGroup = q.group; }
                        else if(!q.group) currentGroup = null;
                        
                        const label = currentGroup ? `<b>(${q.code})</b>` : `<b>Câu ${q.code}:</b>`;
                        html += `<div style='margin-bottom:10px;text-align:justify;margin-left:${currentGroup?'20px':0}'>${label} ${processTextForWord(q.q)}</div>`;
                        
                        if(q.type === 'TN' && q.a?.length) {
                            html += `<table style='margin-left:${currentGroup?'20px':0}'><tr>`;
                            q.a.forEach((opt, k) => html += `<td width="50%"><b>${String.fromCharCode(65+k)}.</b> ${processTextForWord(opt)}</td>${k%2!==0?'</tr><tr>':''}`);
                            html += `</tr></table><br/>`;
                        } else if (q.type === 'TF' && q.a?.length) {
                             html += `<table style='margin-left:${currentGroup?'20px':0}'>`;
                             q.a.forEach((opt, k) => html += `<tr><td><b>${String.fromCharCode(97+k)})</b> ${processTextForWord(opt)}</td></tr>`);
                             html += `</table><br/>`;
                        } else { html += `<br/>`; }
                    });
                });

                html += `<br clear=all style='page-break-before:always'><h3 style='text-align:center'>HƯỚNG DẪN CHẤM</h3>`;
                blueprint.sections.forEach(sec => {
                    html += `<h4>${sec.name}</h4>`;
                    const isTN = sec.questions.some(q => q.type === 'TN' || q.type === 'TF');
                    if(isTN) {
                        sec.questions.filter(q=>q.type==='TN' || q.type==='TF').forEach(q => {
                             html += `<p><b>${q.code}:</b> ${processTextForWord(q.c)}</p>`;
                        });
                    }
                    sec.questions.filter(q=>q.type==='TL').forEach(q => {
                        html += `<p><b>${q.group?q.group+" - ":""}${q.code}:</b></p><div>${processTextForWord(q.c)}</div><hr/>`; 
                    });
                });
                saveAs(new Blob(['\ufeff', html], {type: 'application/msword'}), `De_Thi_Toan_9.doc`);
            };

            return (
                <div className="max-w-[95%] mx-auto p-4 font-ui">
                    <div className="flex justify-between items-end border-b pb-4 mb-6">
                        <div><h1 className="text-2xl font-bold text-indigo-800">HỆ THỐNG RA ĐỀ TOÁN 9 (V9.7)</h1><p className="text-gray-500 text-sm">V9.7: Stable + Context Aware (Gửi kèm ảnh khi sinh từng câu)</p></div>
                        <a href="index.html" className="text-gray-500 hover:text-indigo-600 font-medium text-sm"><i className="fas fa-home"></i> Dashboard</a>
                    </div>

                    {!keysReady && <div className="bg-red-50 text-red-700 p-4 rounded border mb-6">⚠️ Vui lòng quay lại Dashboard nạp API Key!</div>}

                    {step === 1 && keysReady && (
                        <div className="bg-white p-8 rounded-xl shadow animate-fade-in max-w-4xl mx-auto">
                            <div className="grid grid-cols-4 gap-4 mb-6">
                                <input className="border p-2 rounded" placeholder="Sở/Phòng" value={info.dept} onChange={e=>setInfo({...info, dept:e.target.value})}/>
                                <input className="border p-2 rounded" placeholder="Trường" value={info.school} onChange={e=>setInfo({...info, school:e.target.value})}/>
                                <input className="border p-2 rounded" placeholder="Tên kỳ thi" value={info.title} onChange={e=>setInfo({...info, title:e.target.value})}/>
                                <input className="border p-2 rounded" placeholder="Thời gian" value={info.time} onChange={e=>setInfo({...info, time:e.target.value})}/>
                            </div>
                            <label className="block border-2 border-dashed border-indigo-200 bg-indigo-50 rounded-xl p-12 text-center cursor-pointer hover:bg-indigo-100 transition">
                                <input type="file" className="hidden" accept=".pdf" onChange={handleUpload} />
                                {loading ? <div><div className="loader border-indigo-600 mb-2"></div><p className="text-indigo-600 font-bold">{loadingText}</p></div> : <div><i className="fas fa-file-pdf text-5xl text-indigo-500 mb-3"></i><p className="font-bold text-indigo-700 text-lg">Tải lên File PDF (Max 15 trang)</p></div>}
                            </label>
                        </div>
                    )}

                    {step === 2 && blueprint && (
                        <div className="bg-white p-4 rounded-xl shadow animate-fade-in flex flex-col h-[85vh]">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xl font-bold text-gray-800">2. Biên soạn & Chỉnh sửa Đề thi</h2>
                                <div className="space-x-2">
                                    <button onClick={generateAll} className="px-4 py-2 bg-indigo-600 text-white rounded font-bold hover:bg-indigo-700 text-sm"><i className="fas fa-bolt"></i> Sinh toàn bộ</button>
                                    <button onClick={exportWord} className="px-4 py-2 bg-green-600 text-white rounded font-bold hover:bg-green-700 text-sm"><i className="fas fa-file-word"></i> Xuất Word</button>
                                </div>
                            </div>
                            
                            <div className="flex-1 overflow-auto bg-slate-50 border rounded-lg p-4">
                                {blueprint.sections.map((sec, sIdx) => (
                                    <div key={sIdx} className="mb-8 bg-white rounded shadow-sm border p-4">
                                        <div className="section-header">
                                            <input className="bg-transparent font-bold text-lg text-indigo-800 w-1/2" value={sec.name} onChange={e=>{const n={...blueprint};n.sections[sIdx].name=e.target.value;setBlueprint(n)}} />
                                            <button onClick={()=>addQ(sIdx)} className="text-xs bg-white text-indigo-600 px-2 py-1 rounded border border-indigo-200 hover:bg-indigo-50 font-bold">+ Thêm câu</button>
                                        </div>
                                        
                                        <table className="w-full text-sm text-left border-collapse">
                                            <thead className="bg-gray-100 text-gray-600 font-bold">
                                                <tr><th className="p-2 w-16">Mã</th><th className="p-2 w-20">Nhóm</th><th className="p-2 w-16">Loại</th><th className="p-2">Chủ đề & Nội dung câu hỏi (Đã sinh)</th><th className="p-2 w-10"></th></tr>
                                            </thead>
                                            <tbody className="divide-y">
                                                {sec.questions.map((q, qIdx) => (
                                                    <tr key={qIdx} className={`hover:bg-gray-50 group align-top status-${q.status}`}>
                                                        <td className="p-2">
                                                            <input className="w-full border rounded p-1 font-bold text-center mb-1" value={q.code} onChange={e=>updateQ(sIdx, qIdx, 'code', e.target.value)}/>
                                                            <input className="w-full border rounded p-1 text-center text-xs" value={q.score} type="number" onChange={e=>updateQ(sIdx, qIdx, 'score', e.target.value)}/>
                                                        </td>
                                                        <td className="p-2"><input className="w-full border rounded p-1 font-semibold bg-yellow-50 text-xs" placeholder="Nhóm..." value={q.group||''} onChange={e=>updateQ(sIdx, qIdx, 'group', e.target.value)}/></td>
                                                        <td className="p-2">
                                                            <select className="w-full border rounded p-1 font-bold text-xs" value={q.type} onChange={e=>updateQ(sIdx, qIdx, 'type', e.target.value)}>
                                                                <option value="TN">TN</option><option value="TF">Đ/S</option><option value="TL">TL</option>
                                                            </select>
                                                            <select className="w-full border rounded p-1 mt-1 text-xs" value={q.level} onChange={e=>updateQ(sIdx, qIdx, 'level', e.target.value)}>
                                                                <option value="NB">NB</option><option value="TH">TH</option><option value="VD">VD</option><option value="VDC">VDC</option>
                                                            </select>
                                                        </td>
                                                        <td className="p-2">
                                                            <div className="mb-2">
                                                                <input className="w-full border-b border-dashed mb-1 bg-transparent text-gray-600 text-xs italic w-full" value={q.topic} onChange={e=>updateQ(sIdx, qIdx, 'topic', e.target.value)} placeholder="Chủ đề..."/>
                                                                <textarea className="w-full border rounded p-1 h-10 resize-none text-xs text-gray-500 mb-2" value={q.spec} onChange={e=>updateQ(sIdx, qIdx, 'spec', e.target.value)} placeholder="Đặc tả..."/>
                                                            </div>
                                                            
                                                            {/* Generated Content Area */}
                                                            {q.status === 'done' ? (
                                                                <div className="bg-slate-50 p-2 rounded border border-indigo-100 animate-fade-in">
                                                                    <div className="mb-1 font-semibold text-indigo-700">Nội dung:</div>
                                                                    <textarea className="w-full border p-2 rounded text-sm font-serif h-24 mb-1" value={q.q} onChange={e=>updateQ(sIdx, qIdx, 'q', e.target.value)}></textarea>
                                                                    <div className="text-xs text-gray-400 mb-2 p-1 border rounded bg-white"><MathView text={q.q}/></div>
                                                                    
                                                                    {q.type !== 'TL' && (
                                                                        <div className="grid grid-cols-2 gap-2 mb-2">
                                                                            {q.a.map((opt, k) => (
                                                                                <div key={k} className="flex gap-1 items-center">
                                                                                    <span className="font-bold text-xs">{q.type==='TF' ? String.fromCharCode(97+k) : String.fromCharCode(65+k)}</span>
                                                                                    <input className="border rounded p-1 text-sm w-full font-serif" value={opt} onChange={e=>{const na=[...q.a]; na[k]=e.target.value; updateQ(sIdx, qIdx, 'a', na)}}/>
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                    )}
                                                                    
                                                                    <div className="mb-1 font-semibold text-green-700">Đáp án/Lời giải:</div>
                                                                    <textarea className="w-full border border-green-200 bg-green-50 p-2 rounded text-sm font-mono h-16" value={q.c} onChange={e=>updateQ(sIdx, qIdx, 'c', e.target.value)} placeholder="Đáp án..."></textarea>
                                                                </div>
                                                            ) : (
                                                                <div className="text-center text-gray-400 italic text-sm py-4 border-2 border-dashed rounded">
                                                                    {q.status === 'generating' ? <span className="text-blue-600 flex items-center justify-center gap-2"><div className="loader h-4 w-4"></div> Đang soạn...</span> : "Chưa có nội dung"}
                                                                </div>
                                                            )}
                                                        </td>
                                                        <td className="p-2 text-center flex flex-col gap-2">
                                                            <button onClick={()=>generateSingle(sIdx, qIdx)} className="text-white bg-blue-600 hover:bg-blue-700 p-2 rounded shadow text-xs font-bold whitespace-nowrap" title="Tạo/Soạn lại">
                                                                <i className="fas fa-magic"></i> {q.status==='done'?'Sửa':'Tạo'}
                                                            </button>
                                                            <button onClick={()=>removeQ(sIdx, qIdx)} className="text-red-400 hover:text-red-600 p-2"><i className="fas fa-trash"></i></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
