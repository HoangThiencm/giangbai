<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Đề Từ Ma Trận (AI Vision)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .katex { font-size: 1.1em; color: #1e3a8a; }
        .matrix-table th { background-color: #f1f5f9; color: #475569; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }
        .matrix-table td { border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
        .matrix-table tr:hover td { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- HÀM TRÍCH XUẤT JSON MẠNH MẼ (FIX LỖI "Unexpected token") ---
        const extractJson = (text) => {
            try {
                // 1. Thử parse trực tiếp
                return JSON.parse(text);
            } catch (e) {
                // 2. Nếu lỗi, cố gắng tìm mảng [...] hoặc đối tượng {...}
                const startArray = text.indexOf('[');
                const endArray = text.lastIndexOf(']');
                if (startArray !== -1 && endArray !== -1 && endArray > startArray) {
                    try {
                        return JSON.parse(text.substring(startArray, endArray + 1));
                    } catch (e2) {}
                }
                
                // Trường hợp AI trả về markdown ```json ... ```
                const cleanMd = text.replace(/```json|```/g, '').trim();
                try { return JSON.parse(cleanMd); } catch (e3) {}

                throw new Error("Không tìm thấy dữ liệu JSON hợp lệ trong phản hồi của AI.");
            }
        };

        const AIAdapter = {
            getConfig: () => ({
                geminiKeys: JSON.parse(localStorage.getItem('global_gemini_keys') || "[]"),
                hfTokens: JSON.parse(localStorage.getItem('hf_tokens') || "[]")
            }),

            analyzeImage: async (base64Image, prompt) => {
                const { geminiKeys } = AIAdapter.getConfig();
                if (!geminiKeys.length) throw new Error("Chức năng đọc ảnh cần Gemini API Key.");
                const key = geminiKeys[Math.floor(Math.random() * geminiKeys.length)];
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Image } }] }] })
                    });
                    if (!response.ok) throw new Error(`Google API Error: ${response.status}`);
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (e) { throw e; }
            },

            generateText: async (prompt) => {
                const { geminiKeys, hfTokens } = AIAdapter.getConfig();
                
                if (geminiKeys.length > 0) {
                    try {
                        const key = geminiKeys[Math.floor(Math.random() * geminiKeys.length)];
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await response.json();
                        if (data.candidates) return data.candidates[0].content.parts[0].text;
                    } catch (e) { console.warn("Gemini lỗi, thử chuyển sang HF...", e); }
                }

                if (hfTokens.length > 0) {
                    try {
                        const token = hfTokens[Math.floor(Math.random() * hfTokens.length)];
                        const response = await fetch("https://api-inference.huggingface.co/models/Qwen/Qwen2.5-72B-Instruct", {
                            method: "POST",
                            headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
                            body: JSON.stringify({
                                inputs: prompt,
                                parameters: { max_new_tokens: 3000, temperature: 0.7, return_full_text: false }
                            })
                        });
                        const data = await response.json();
                        if (Array.isArray(data)) return data[0].generated_text;
                        if (data.error) throw new Error(data.error);
                    } catch (e) { throw new Error(`Cả Gemini và HF đều lỗi: ${e.message}`); }
                } else {
                    throw new Error("Không có API Key nào khả dụng! Vui lòng nạp Gemini Key hoặc HF Token.");
                }
            }
        };

        const FileUtils = {
            toBase64: (file) => {
                return new Promise(async (resolve, reject) => {
                    if (file.type.includes("image")) {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                        reader.readAsDataURL(file);
                    } else if (file.type === "application/pdf") {
                        try {
                            const buffer = await file.arrayBuffer();
                            const pdf = await pdfjsLib.getDocument(buffer).promise;
                            const page = await pdf.getPage(1);
                            const viewport = page.getViewport({ scale: 2.0 });
                            const canvas = document.createElement('canvas');
                            canvas.height = viewport.height;
                            canvas.width = viewport.width;
                            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                            resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                        } catch (e) { reject(e); }
                    } else { reject(new Error("Chỉ hỗ trợ Ảnh hoặc PDF")); }
                });
            }
        };

        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if(!text) return;
                try {
                    const processed = text
                        .replace(/\\\[/g, '$$').replace(/\\\]/g, '$$')
                        .replace(/\\\(/g, '$').replace(/\\\)/g, '$')
                        .replace(/`/g, '')
                        .replace(/\\begin{equation}/g, '$$').replace(/\\end{equation}/g, '$$');

                    const parts = processed.split(/(\$[^$]+\$)/g);
                    ref.current.innerHTML = '';
                    parts.forEach(part => {
                        if (part.startsWith('$') && part.endsWith('$')) {
                            const span = document.createElement('span');
                            try { katex.render(part.slice(1, -1), span, { throwOnError: false }); } catch { span.innerText = part; }
                            ref.current.appendChild(span);
                        } else { ref.current.appendChild(document.createTextNode(part)); }
                    });
                } catch(e) { ref.current.innerText = text; }
            }, [text]);
            return <div ref={ref} className="text-gray-800 text-lg leading-relaxed font-serif"></div>;
        };

        const App = () => {
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState("");
            const [preview, setPreview] = useState(null);
            
            // matrixData: Chứa thông tin cấu trúc đề + Trạng thái sinh + Dữ liệu câu hỏi đã sinh
            const [matrix, setMatrix] = useState([]);

            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true); setStatus("Đang xử lý file...");
                try {
                    const base64 = await FileUtils.toBase64(file);
                    setPreview(`data:image/jpeg;base64,${base64}`);
                    setStatus("AI đang đọc Ma trận...");
                    
                    const prompt = `
                        Hãy phân tích hình ảnh này (Ma trận đề thi/Bảng đặc tả).
                        Trích xuất danh sách các chủ đề kiến thức và số lượng câu hỏi.
                        
                        Quy tắc JSON: KHÔNG trả lời vòng vo, CHỈ trả về JSON.
                        Output: [ { "topic": "Tên chủ đề", "level": "Mức độ", "count": số_lượng, "type": "Trắc nghiệm"|"Đúng/Sai"|"Tự luận" } ]
                    `;
                    const res = await AIAdapter.analyzeImage(base64, prompt);
                    // SỬ DỤNG HÀM TRÍCH XUẤT JSON MỚI
                    const data = extractJson(res);
                    setMatrix(data.map((r, i) => ({...r, id: i, status: 'pending', questions: []})));
                    setStep(2);
                } catch (err) { alert("Lỗi đọc ma trận: " + err.message); } finally { setLoading(false); }
            };

            const updateRow = (id, key, val) => setMatrix(prev => prev.map(r => r.id === id ? {...r, [key]: val} : r));
            const deleteRow = (id) => setMatrix(prev => prev.filter(r => r.id !== id));
            const addRow = () => setMatrix(prev => [...prev, {id: Date.now(), topic: "", level: "Thông hiểu", count: 1, type: "Trắc nghiệm", status: 'pending', questions: []}]);

            // HÀM SINH CÂU HỎI CHO 1 DÒNG CỤ THỂ
            const generateRowQuestions = async (rowId) => {
                const row = matrix.find(r => r.id === rowId);
                if (!row || row.count <= 0) return;

                setMatrix(prev => prev.map(r => r.id === rowId ? {...r, status: 'generating'} : r));

                const prompt = `
                    Đóng vai giáo viên. Soạn ${row.count} câu hỏi dạng "${row.type}" về "${row.topic}". Mức độ: ${row.level}.
                    Yêu cầu:
                    1. Nếu là "Trắc nghiệm": Trả về mảng "a" chứa 4 đáp án.
                    2. Nếu là "Đúng/Sai": Trả về mảng "a" chứa 4 mệnh đề a,b,c,d.
                    3. Nếu là "Tự luận": Trả về mảng "a" rỗng.
                    4. Toán học dùng LaTeX chuẩn $...$.
                    5. KHÔNG trả lời vòng vo, CHỈ trả về JSON Array.
                    
                    Output: [ { "q": "...", "a": [], "c": "..." } ]
                `;

                try {
                    const res = await AIAdapter.generateText(prompt);
                    const qs = extractJson(res); // Sử dụng extractJson thay vì JSON.parse thuần
                    const qsWithMeta = qs.map(q => ({...q, meta: { ...row }})); 
                    
                    setMatrix(prev => prev.map(r => r.id === rowId ? {...r, status: 'done', questions: qsWithMeta} : r));
                } catch (e) {
                    console.error(e);
                    setMatrix(prev => prev.map(r => r.id === rowId ? {...r, status: 'error'} : r));
                }
            };

            const handleGenerateAll = async () => {
                let hasPending = false;
                for (let i = 0; i < matrix.length; i++) {
                    const row = matrix[i];
                    if (row.status === 'pending' || row.status === 'error') {
                        hasPending = true;
                        const el = document.getElementById(`row-${row.id}`);
                        if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });

                        await generateRowQuestions(row.id);
                        
                        if (i < matrix.length - 1) {
                            await new Promise(resolve => setTimeout(resolve, 3000));
                        }
                    }
                }
                if (!hasPending) alert("Đã hoàn thành sinh đề!");
            };

            const goToPreview = () => {
                // Gom tất cả câu hỏi từ các dòng đã xong
                const allQs = matrix.filter(r => r.status === 'done').flatMap(r => r.questions);
                if (allQs.length === 0) return alert("Chưa có câu hỏi nào được sinh ra!");
                setExamData(allQs);
                setStep(4);
            };

            const exportWord = () => {
                let html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'><head><meta charset='utf-8'><title>De Thi</title></head><body><h2 style='text-align:center'>ĐỀ THI</h2>`;
                
                const tn = examData.filter(q => q.meta.type === "Trắc nghiệm");
                const ds = examData.filter(q => q.meta.type === "Đúng/Sai");
                const tl = examData.filter(q => q.meta.type === "Tự luận");

                if(tn.length) {
                    html += `<h3>PHẦN 1. TRẮC NGHIỆM</h3>`;
                    tn.forEach((q, i) => {
                        html += `<p><b>Câu ${i+1}:</b> ${q.q}</p>`;
                        html += `<table style='width:100%; border:none'><tr>`;
                        q.a.forEach((opt, idx) => { if(idx > 0 && idx % 2 === 0) html += `</tr><tr>`; html += `<td style='width:50%'>${opt}</td>`; });
                        html += `</tr></table>`;
                    });
                }

                if(ds.length) {
                    html += `<h3>PHẦN 2. TRẮC NGHIỆM ĐÚNG SAI</h3>`;
                    ds.forEach((q, i) => {
                        html += `<p><b>Câu ${i+1}:</b> ${q.q}</p>`;
                        html += `<ul style="list-style-type: none;">`;
                        q.a.forEach(opt => html += `<li>${opt}</li>`);
                        html += `</ul>`;
                    });
                }

                if(tl.length) {
                    html += `<h3>PHẦN 3. TỰ LUẬN</h3>`;
                    tl.forEach((q, i) => {
                        html += `<p><b>Câu ${i+1}:</b> ${q.q}</p>`;
                        html += `<p>................................................................................</p>`;
                    });
                }

                html += `<br/><hr/><h3>HƯỚNG DẪN CHẤM</h3>`;
                examData.forEach((q, i) => {
                    html += `<p><b>Câu ${i+1} (${q.meta.type}):</b> ${q.c}</p>`;
                });
                
                html += `</body></html>`;
                saveAs(new Blob(['\ufeff', html], {type: 'application/msword'}), "De_Thi_2025.doc");
            };

            return (
                <div className="min-h-screen bg-slate-50 p-6 font-sans">
                    <div className="max-w-6xl mx-auto">
                        <div className="flex justify-between items-center mb-8">
                            <button onClick={()=>window.location.href='index.html'} className="text-slate-600 font-bold hover:text-indigo-600 flex items-center gap-2 transition"><i className="fas fa-arrow-left"></i> Trang chủ</button>
                            <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight"><span className="text-indigo-600">AI</span> MA TRẬN ĐỀ THI</h1>
                        </div>
                        
                        {step === 1 && (
                            <div className="bg-white rounded-2xl shadow-xl p-10 text-center border-2 border-dashed border-indigo-200 hover:border-indigo-500 transition-all cursor-pointer group" onClick={()=>document.getElementById('fileInput').click()}>
                                <input id="fileInput" type="file" accept="image/*,.pdf" className="hidden" onChange={handleUpload}/>
                                {loading ? (<div><div className="loader mb-4"></div><p className="text-indigo-600 font-semibold animate-pulse">{status}</p></div>) : (
                                    <div className="py-10"><div className="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 group-hover:scale-110 transition"><i className="fas fa-cloud-upload-alt"></i></div><h2 className="text-2xl font-bold text-slate-700 mb-2">Tải lên Ma trận / Đặc tả</h2><p className="text-slate-500">Hỗ trợ Ảnh/PDF</p><button className="mt-6 bg-indigo-600 text-white px-6 py-2 rounded-full font-bold shadow-lg group-hover:shadow-indigo-500/50 transition">Chọn File</button></div>
                                )}
                            </div>
                        )}

                        {step === 2 && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 fade-in">
                                <div className="lg:col-span-1 bg-white p-4 rounded-xl shadow h-fit hidden lg:block"><h3 className="font-bold text-slate-700 mb-2">Ảnh gốc:</h3><img src={preview} className="w-full rounded border" /></div>
                                <div className="lg:col-span-2 bg-white p-6 rounded-xl shadow-xl">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-xl text-slate-800">Cấu Trúc Đề Thi</h3>
                                        <div className="flex gap-2">
                                            <button onClick={handleGenerateAll} className="bg-gradient-to-r from-indigo-600 to-violet-600 text-white px-4 py-2 rounded-lg font-bold shadow hover:shadow-lg transition flex items-center gap-2 text-sm">
                                                <i className="fas fa-play-circle"></i> SINH TẤT CẢ (AUTO)
                                            </button>
                                            <button onClick={goToPreview} className="bg-green-600 text-white px-4 py-2 rounded-lg font-bold shadow hover:bg-green-700 transition flex items-center gap-2 text-sm">
                                                XEM & XUẤT FILE <i className="fas fa-arrow-right"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto max-h-[600px]">
                                        <table className="w-full matrix-table text-sm">
                                            <thead className="sticky top-0 z-10 shadow-sm"><tr><th className="p-3 text-left">Chủ đề</th><th className="p-3 text-left">Mức độ</th><th className="p-3 text-center">SL</th><th className="p-3 text-left">Loại</th><th className="p-3 text-center">Trạng thái</th><th className="p-3"></th></tr></thead>
                                            <tbody>{matrix.map(row => (
                                                <tr key={row.id} id={`row-${row.id}`} className={row.status === 'done' ? 'bg-green-50' : ''}>
                                                    <td className="p-2"><input value={row.topic} onChange={e=>updateRow(row.id,'topic',e.target.value)} className="w-full bg-transparent outline-none font-medium text-slate-700"/></td>
                                                    <td className="p-2"><select value={row.level} onChange={e=>updateRow(row.id,'level',e.target.value)} className="bg-transparent outline-none cursor-pointer"><option>Nhận biết</option><option>Thông hiểu</option><option>Vận dụng</option><option>Vận dụng cao</option></select></td>
                                                    <td className="p-2 text-center"><input type="number" value={row.count} onChange={e=>updateRow(row.id,'count',e.target.value)} className="w-10 text-center font-bold text-indigo-600 bg-indigo-50 rounded"/></td>
                                                    <td className="p-2"><select value={row.type} onChange={e=>updateRow(row.id,'type',e.target.value)} className="bg-transparent outline-none font-bold text-blue-700"><option>Trắc nghiệm</option><option>Đúng/Sai</option><option>Tự luận</option></select></td>
                                                    
                                                    {/* CỘT TRẠNG THÁI & ACTION */}
                                                    <td className="p-2 text-center">
                                                        {row.status === 'pending' && <button onClick={()=>generateRowQuestions(row.id)} className="bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-50 px-2 py-1 rounded text-xs font-bold shadow-sm">Tạo ngay</button>}
                                                        {row.status === 'generating' && <div className="loader w-4 h-4 border-2 border-indigo-600"></div>}
                                                        {row.status === 'done' && <span className="text-green-600 font-bold text-xs flex items-center justify-center gap-1"><i className="fas fa-check-circle"></i> Xong ({row.questions.length})</span>}
                                                        {row.status === 'error' && <button onClick={()=>generateRowQuestions(row.id)} className="text-red-500 hover:underline text-xs font-bold"><i className="fas fa-redo"></i> Lỗi (Thử lại)</button>}
                                                    </td>

                                                    <td className="p-2 text-center"><button onClick={()=>deleteRow(row.id)} className="text-slate-400 hover:text-red-500"><i className="fas fa-times"></i></button></td>
                                                </tr>
                                            ))}</tbody>
                                        </table>
                                        <button onClick={addRow} className="mt-3 text-sm font-bold text-indigo-600 hover:underline flex items-center gap-1"><i className="fas fa-plus-circle"></i> Thêm dòng</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 4 && (<div className="bg-white rounded-xl shadow-xl overflow-hidden fade-in">
                            <div className="p-4 bg-slate-50 border-b flex justify-between items-center sticky top-0 z-10"><div className="font-bold text-slate-700">Kết quả: {examData.length} câu hỏi</div><div className="flex gap-2"><button onClick={()=>setStep(2)} className="px-4 py-2 text-slate-600 hover:bg-slate-200 rounded font-bold">Quay lại bảng</button><button onClick={exportWord} className="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700 shadow flex items-center gap-2"><i className="fas fa-file-word"></i> Xuất Word</button></div></div>
                            <div className="p-8 space-y-8 max-w-4xl mx-auto">
                                {examData.map((q, i) => (
                                    <div key={i} className="border-b border-slate-100 pb-6 last:border-0">
                                        <div className="flex gap-3 mb-2">
                                            <span className={`px-2 py-1 rounded text-xs h-fit whitespace-nowrap font-bold ${q.meta.type === 'Tự luận' ? 'bg-orange-100 text-orange-700' : q.meta.type === 'Đúng/Sai' ? 'bg-purple-100 text-purple-700' : 'bg-indigo-100 text-indigo-700'}`}>Câu {i+1} ({q.meta.type})</span>
                                            <div className="font-medium text-slate-800 text-lg w-full"><MathText text={q.q} /></div>
                                        </div>
                                        
                                        {q.meta.type === 'Trắc nghiệm' && q.a && (<div className="grid grid-cols-1 md:grid-cols-2 gap-3 pl-10">{q.a.map((opt, idx) => (<div key={idx} className="bg-slate-50 p-3 rounded text-slate-700"><MathText text={opt} /></div>))}</div>)}

                                        {q.meta.type === 'Đúng/Sai' && q.a && (<div className="pl-10 space-y-2">{q.a.map((opt, idx) => (<div key={idx} className="flex justify-between items-center bg-slate-50 p-2 rounded border border-slate-200"><div className="flex-1"><MathText text={opt} /></div><div className="flex gap-2 text-sm font-bold text-slate-400"><span className="border px-2 py-1 rounded">Đ</span><span className="border px-2 py-1 rounded">S</span></div></div>))}</div>)}

                                        {q.meta.type === 'Tự luận' && (<div className="pl-10 text-slate-400 italic bg-slate-50 p-6 rounded border border-dashed border-slate-300">(Khoảng trống làm bài)</div>)}

                                        <div className="mt-3 pl-10 text-sm text-green-600 font-bold bg-green-50 p-2 rounded w-fit">Đáp án: <MathText text={q.c} /></div>
                                    </div>
                                ))}
                            </div>
                        </div>)}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
