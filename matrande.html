<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Đề Toán 9 (V8 - Fix Lỗi Hiển Thị & Thêm Dòng)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap');
        body { font-family: 'Times New Roman', serif; background-color: #f8fafc; }
        .font-ui { font-family: system-ui, -apple-system, sans-serif; }
        .loader { width: 18px; height: 18px; border: 2px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        .loader-blue { border-color: #2563eb; border-bottom-color: transparent; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .question-card { transition: all 0.2s; border-left: 4px solid transparent; }
        .question-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .type-tl { border-left-color: #9333ea; } /* Tự luận: Tím */
        .type-tn { border-left-color: #2563eb; } /* Trắc nghiệm: Xanh */
        
        /* Fix KaTeX overflow */
        .katex-display { overflow-x: auto; overflow-y: hidden; padding: 0.5em 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CẤU HÌNH HỆ THỐNG ---
        const AIAdapter = {
            getConfig: () => ({
                geminiKeys: JSON.parse(localStorage.getItem('global_gemini_keys') || "[]"),
                hfTokens: JSON.parse(localStorage.getItem('hf_tokens') || "[]")
            }),
            
            call: async (payload) => {
                const { geminiKeys } = AIAdapter.getConfig();
                if(!geminiKeys.length) throw new Error("MISSING_KEYS");
                
                let lastError;
                // V8: Dùng model 1.5 Flash ổn định
                for(let i=0; i<3; i++) {
                    try {
                        const key = geminiKeys[Math.floor(Math.random() * geminiKeys.length)];
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                            method: 'POST', headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(payload)
                        });
                        if(!res.ok) {
                            const err = await res.json();
                            throw new Error(err.error?.message || res.statusText);
                        }
                        const data = await res.json();
                        return data.candidates[0].content.parts[0].text;
                    } catch(e) { 
                        console.warn(`Retry ${i+1} failed:`, e);
                        lastError = e; 
                        await new Promise(r => setTimeout(r, 1000 + i*1000)); 
                    }
                }
                throw lastError;
            }
        };

        // --- BỘ XỬ LÝ VĂN BẢN THÔNG MINH (FIX TEXT UTILS) ---
        
        const cleanContent = (text) => {
            if (!text) return "";
            let clean = text;

            // 1. Fix lỗi Markdown in đậm (**text** -> <b>text</b>)
            clean = clean.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            
            // 2. Fix lỗi dấu * đầu dòng -> gạch đầu dòng
            clean = clean.replace(/^\s*\*\s+/gm, '• ');

            // 3. Fix lỗi xuống dòng của AI: "\n", "\\n", hoặc " \\ " trong văn bản
            // Lưu ý: Không thay thế \\ trong môi trường toán học (như cases, matrix)
            // Chiến thuật: Tách các block toán ra, chỉ replace trong text thường
            const parts = clean.split(/(\$\$[^$]+\$\$|\$[^$]+\$)/g);
            
            return parts.map(part => {
                if (part.startsWith('$')) return part; // Giữ nguyên toán
                // Trong văn bản thường:
                return part
                    .replace(/\\\\/g, '<br/>')  // Thay \\ bằng xuống dòng
                    .replace(/\\n/g, '<br/>')   // Thay \n string bằng xuống dòng
                    .replace(/\n/g, '<br/>');   // Thay ký tự xuống dòng thật
            }).join('');
        };

        // Component hiển thị (Preview)
        const MathView = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if(!ref.current || !text) return;
                try {
                    // Bước 1: Clean text cơ bản
                    let htmlContent = cleanContent(text);

                    // Bước 2: Tách toán và render
                    const parts = htmlContent.split(/(\$\$[^$]+\$\$|\$[^$]+\$)/g);
                    
                    ref.current.innerHTML = "";
                    parts.forEach(part => {
                        if((part.startsWith('$$') && part.endsWith('$$')) || (part.startsWith('$') && part.endsWith('$'))) {
                            const span = document.createElement('span');
                            let tex = part.startsWith('$$') ? part.slice(2, -2) : part.slice(1, -1);
                            
                            // Fix lỗi phổ biến trong LaTeX do AI sinh ra
                            tex = tex.replace(/&lt;/g, '<').replace(/&gt;/g, '>')
                                     .replace(/frac/g, '\\frac') // Fallback nếu mất dấu \
                                     .replace(/\\\\frac/g, '\\frac'); // Fix double escape thừa

                            try { 
                                katex.render(tex, span, {
                                    throwOnError: false, 
                                    displayMode: part.startsWith('$$'),
                                    strict: false
                                }); 
                            } catch(e) { span.innerText = part; }
                            ref.current.appendChild(span);
                        } else {
                            const span = document.createElement('span');
                            span.innerHTML = part; // Cho phép render thẻ <b>, <br/>
                            ref.current.appendChild(span);
                        }
                    });
                } catch(e){}
            }, [text]);
            return <div ref={ref} className="font-serif text-lg leading-relaxed text-gray-800"/>;
        };

        // Xử lý text cho Word (Export)
        const processTextForWord = (text) => {
            if (!text) return "";
            
            // 1. Clean format trước
            let clean = cleanContent(text); // Đã có <br/>, <b>

            // 2. Chuẩn hóa dấu toán học
            clean = clean
                .replace(/\\\[/g, '$$$') 
                .replace(/\\\]/g, '$$$') 
                .replace(/\\\(/g, '$')   
                .replace(/\\\)/g, '$');  

            // 3. Render MathML
            return clean.replace(/(\$\$)([^$]+)(\$\$)|(\$)([^$]+)(\$)/g, (match, d1, dTex, d2, i1, iTex, i2) => {
                let tex = dTex || iTex;
                const isDisplay = !!dTex;
                
                // Fix lỗi latex khi export
                tex = tex.replace(/frac/g, '\\frac').replace(/\\\\frac/g, '\\frac');

                try {
                    const mathML = katex.renderToString(tex, {
                        throwOnError: false,
                        output: 'mathml',
                        displayMode: isDisplay,
                        strict: false
                    });
                    
                    const matchMath = mathML.match(/<math[\s\S]*?<\/math>/);
                    if (matchMath) {
                        return matchMath[0]
                            .replace(/<math/g, '<math xmlns="http://www.w3.org/1998/Math/MathML"')
                            .replace(/<annotation[\s\S]*?<\/annotation>/g, '');
                    }
                    return match;
                } catch (e) { return match; }
            });
        };

        const App = () => {
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [systemStatus, setSystemStatus] = useState({ ready: false, gemini: 0, hf: 0 });
            const [info, setInfo] = useState({ dept: "PHÒNG GD&ĐT...", school: "TRƯỜNG THCS...", title: "KIỂM TRA CUỐI KỲ I", time: "90" });
            const [matrix, setMatrix] = useState([]);
            const [questions, setQuestions] = useState([]);

            useEffect(() => {
                const conf = AIAdapter.getConfig();
                setSystemStatus({
                    ready: conf.geminiKeys.length > 0,
                    gemini: conf.geminiKeys.length,
                    hf: conf.hfTokens.length
                });
            }, []);

            // Thêm dòng thủ công (Feature restored)
            const addRow = () => {
                setMatrix([...matrix, {
                    id: Date.now(),
                    topic: "Chủ đề mới...",
                    level: "TH",
                    count: 1,
                    type: "TN",
                    status: 'pending',
                    qs: []
                }]);
            };

            const removeRow = (id) => {
                setMatrix(matrix.filter(r => r.id !== id));
            };

            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                setLoading(true);
                try {
                    let base64 = "";
                    if (file.type.includes("pdf")) {
                        const buffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument(buffer).promise;
                        const page = await pdf.getPage(1);
                        const vp = page.getViewport({ scale: 2 });
                        const cvs = document.createElement('canvas'); cvs.width = vp.width; cvs.height = vp.height;
                        await page.render({ canvasContext: cvs.getContext('2d'), viewport: vp }).promise;
                        base64 = cvs.toDataURL('image/jpeg').split(',')[1];
                    } else {
                        const reader = new FileReader();
                        base64 = await new Promise(r => { reader.onload = ev => r(ev.target.result.split(',')[1]); reader.readAsDataURL(file); });
                    }

                    const prompt = `
                        Phân tích ảnh Ma trận đề thi Toán 9. Trích xuất JSON.
                        Phân biệt rõ cột "Tự luận" (TL) và "Trắc nghiệm" (TN).
                        Output JSON: [{ "topic": "...", "level": "NB/TH/VD/VDC", "count": 1, "type": "TL" or "TN" }]
                    `;
                    
                    const text = await AIAdapter.call({ contents: [{ parts: [{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: base64}}] }] });
                    const jsonStr = text.match(/\[[\s\S]*\]/)[0];
                    const data = JSON.parse(jsonStr);
                    setMatrix(data.map((r, i) => ({...r, id: Date.now()+i, status: 'pending', qs: []})));
                    setStep(2);
                } catch (err) { 
                    if(err.message === "MISSING_KEYS") alert("Lỗi: Chưa có API Key!");
                    else alert("Lỗi phân tích: " + err.message); 
                } 
                finally { setLoading(false); }
            };

            const generateRow = async (rowId) => {
                setMatrix(prev => prev.map(r => r.id === rowId ? {...r, status: 'generating'} : r));
                const row = matrix.find(r => r.id === rowId);
                const isEssay = row.type === 'TL'; 
                
                // SUPER PROMPT V8: FIX FORMAT
                const prompt = `
                    Đóng vai Giáo viên Toán 9 ra đề kiểm tra:
                    - Chủ đề: ${row.topic} (${row.level})
                    - Dạng: ${isEssay ? "TỰ LUẬN (Yêu cầu lời giải chi tiết)" : "TRẮC NGHIỆM (4 đáp án)"}
                    - Số lượng: ${row.count} câu.

                    QUY TẮC ĐỊNH DẠNG (BẮT BUỘC ĐỂ KHÔNG LỖI):
                    1. JSON STRING ESCAPE: Mọi dấu gạch chéo của LaTeX phải được nhân đôi. 
                       - SAI: "\\frac{1}{2}" (Máy sẽ hiểu là frac)
                       - ĐÚNG: "\\\\frac{1}{2}" (Máy sẽ hiểu là \\frac)
                       - SAI: "\\begin{cases}"
                       - ĐÚNG: "\\\\begin{cases}"
                    2. HỆ PHƯƠNG TRÌNH: Dùng "\\\\begin{cases} ... \\\\\\\\ ... \\\\end{cases}" (4 dấu gạch chéo để xuống dòng trong hệ).
                    3. XUỐNG DÒNG VĂN BẢN: Dùng "\\n". KHÔNG dùng "\\\\" ở ngoài công thức toán.
                    4. IN ĐẬM: Dùng thẻ <b>...</b> (Ví dụ: <b>Câu a:</b>). Không dùng dấu *.

                    OUTPUT JSON:
                    [
                        {
                            "q": "Nội dung câu hỏi (LaTeX kẹp trong $...$)...",
                            "a": ${isEssay ? "[]" : `["A...", "B...", "C...", "D..."]`},
                            "c": "${isEssay ? "Lời giải chi tiết (Dùng \\n để xuống dòng)..." : "Đáp án đúng"}"
                        }
                    ]
                `;

                try {
                    const text = await AIAdapter.call({ contents: [{ parts: [{text: prompt}] }] });
                    const jsonMatch = text.match(/\[[\s\S]*\]/);
                    if(!jsonMatch) throw new Error("AI trả về sai định dạng");
                    
                    let generatedQs = JSON.parse(jsonMatch[0]);
                    generatedQs = generatedQs.map(q => ({ ...q, meta: { topic: row.topic, level: row.level, type: row.type } }));

                    setMatrix(prev => prev.map(r => r.id === rowId ? {...r, status: 'done', qs: generatedQs} : r));
                } catch (e) {
                    console.error(e);
                    setMatrix(prev => prev.map(r => r.id === rowId ? {...r, status: 'error'} : r));
                }
            };

            const finalize = () => {
                const all = matrix.flatMap(r => r.qs || []);
                if(all.length === 0) return alert("Chưa có câu hỏi!");
                setQuestions(all);
                setStep(3);
            };

            const exportWord = () => {
                let html = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                    <head><meta charset='utf-8'><title>De Thi</title>
                    <style>
                        body { font-family: 'Times New Roman'; font-size: 13pt; line-height: 1.3; }
                        table { border-collapse: collapse; width: 100%; }
                        .qs-content { margin-bottom: 10px; text-align: justify; }
                    </style>
                    </head><body>
                    <div style="text-align:center; font-weight:bold; margin-bottom:20px">
                        <p>${info.dept.toUpperCase()}<br/>${info.school.toUpperCase()}</p>
                        <p>${info.title.toUpperCase()}<br/>MÔN: TOÁN 9 - Thời gian: ${info.time} phút</p>
                    </div>
                    <hr/>
                `;

                const tn = questions.filter(q => q.meta.type === 'TN');
                const tl = questions.filter(q => q.meta.type === 'TL');

                if(tn.length > 0) {
                    html += `<h3>I. PHẦN TRẮC NGHIỆM (${tn.length} câu)</h3>`;
                    tn.forEach((q, i) => {
                        html += `<div class='qs-content'><b>Câu ${i+1}:</b> ${processTextForWord(q.q)}</div>`;
                        html += `<table><tr>`;
                        q.a.forEach((opt, k) => {
                            if(k%2===0 && k>0) html += `</tr><tr>`;
                            html += `<td width="50%"><b>${String.fromCharCode(65+k)}.</b> ${processTextForWord(opt)}</td>`;
                        });
                        html += `</tr></table><br/>`;
                    });
                }

                if(tl.length > 0) {
                    html += `<h3>II. PHẦN TỰ LUẬN (${tl.length} câu)</h3>`;
                    tl.forEach((q, i) => {
                        html += `<div class='qs-content'><b>Câu ${i+1} (${q.meta.level}):</b> ${processTextForWord(q.q)}</div>`;
                        html += `<br/><br/>`; 
                    });
                }

                html += `<br clear=all style='page-break-before:always'><h3 style='text-align:center'>HƯỚNG DẪN CHẤM</h3>`;
                
                if(tn.length > 0) {
                    html += `<h4>A. TRẮC NGHIỆM</h4><table border="1" cellpadding="5"><tr>`;
                    tn.forEach((q, i) => html += `<td>${i+1}</td>`);
                    html += `</tr><tr>`;
                    tn.forEach(q => html += `<td><b>${processTextForWord(q.c).charAt(0)}</b></td>`);
                    html += `</tr></table>`;
                }

                if(tl.length > 0) {
                    html += `<h4>B. TỰ LUẬN</h4>`;
                    tl.forEach((q, i) => {
                        html += `<p><b>Câu ${i+1}:</b></p>`;
                        html += `<div>${processTextForWord(q.c)}</div><hr/>`;
                    });
                }

                html += `</body></html>`;
                const blob = new Blob(['\ufeff', html], {type: 'application/msword'});
                saveAs(blob, "De_Thi_Toan_9.doc");
            };

            return (
                <div className="max-w-5xl mx-auto p-6 font-ui">
                    <div className="flex justify-between items-end border-b pb-4 mb-6">
                        <div>
                            <h1 className="text-2xl font-bold text-blue-800">CÔNG CỤ TẠO ĐỀ TOÁN 9 (AI)</h1>
                            <p className="text-gray-500 text-sm">V8: Fix lỗi hiển thị công thức & Formatting</p>
                        </div>
                        <a href="index.html" className="text-gray-500 hover:text-blue-600 font-medium text-sm"><i className="fas fa-home"></i> Về Dashboard</a>
                    </div>

                    {!systemStatus.ready ? (
                        <div className="bg-red-50 border-l-4 border-red-500 p-4 mb-6 text-red-700">Vui lòng nạp API Key tại Dashboard!</div>
                    ) : (
                         <div className="bg-green-50 border border-green-200 px-4 py-2 rounded mb-6 text-sm text-green-700 font-bold">
                            <i className="fas fa-check-circle"></i> Hệ thống sẵn sàng (Gemini 1.5 Flash)
                        </div>
                    )}

                    {step === 1 && systemStatus.ready && (
                        <div className="bg-white p-6 rounded-lg shadow-sm border space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="block text-sm font-bold">Sở/Phòng</label><input className="w-full border p-2 rounded" value={info.dept} onChange={e=>setInfo({...info, dept:e.target.value})}/></div>
                                <div><label className="block text-sm font-bold">Trường</label><input className="w-full border p-2 rounded" value={info.school} onChange={e=>setInfo({...info, school:e.target.value})}/></div>
                                <div><label className="block text-sm font-bold">Tên kỳ thi</label><input className="w-full border p-2 rounded" value={info.title} onChange={e=>setInfo({...info, title:e.target.value})}/></div>
                                <div><label className="block text-sm font-bold">Thời gian</label><input className="w-full border p-2 rounded" value={info.time} onChange={e=>setInfo({...info, time:e.target.value})}/></div>
                            </div>
                            <label className="block border-2 border-dashed border-blue-300 rounded-lg p-10 text-center bg-blue-50 hover:bg-blue-100 transition cursor-pointer">
                                <input type="file" className="hidden" onChange={handleUpload} accept="image/*,.pdf"/>
                                {loading ? <div className="loader loader-blue"></div> : <div><i className="fas fa-cloud-upload-alt text-4xl text-blue-500"></i><p className="font-bold text-blue-700">Tải lên Ma trận đề</p></div>}
                            </label>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="space-y-4 animate-fade-in">
                            <div className="bg-white rounded shadow overflow-hidden border">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-gray-100 uppercase text-xs font-bold text-gray-700">
                                        <tr>
                                            <th className="p-3 border-b">Chủ đề</th>
                                            <th className="p-3 border-b">Mức độ</th>
                                            <th className="p-3 border-b text-center">SL</th>
                                            <th className="p-3 border-b">Loại</th>
                                            <th className="p-3 border-b text-center">Tác vụ</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {matrix.map((row, idx) => (
                                            <tr key={row.id} className="hover:bg-gray-50">
                                                <td className="p-2"><input className="w-full p-1 bg-transparent border-b border-dashed focus:border-blue-500 outline-none" value={row.topic} onChange={e=>{const n=[...matrix];n[idx].topic=e.target.value;setMatrix(n)}}/></td>
                                                <td className="p-2">
                                                    <select className="bg-transparent outline-none text-sm" value={row.level} onChange={e=>{const n=[...matrix];n[idx].level=e.target.value;setMatrix(n)}}>
                                                        <option value="NB">Nhận biết</option>
                                                        <option value="TH">Thông hiểu</option>
                                                        <option value="VD">Vận dụng</option>
                                                        <option value="VDC">Vận dụng cao</option>
                                                    </select>
                                                </td>
                                                <td className="p-2 text-center"><input type="number" className="w-12 text-center border rounded p-1" value={row.count} onChange={e=>{const n=[...matrix];n[idx].count=e.target.value;setMatrix(n)}}/></td>
                                                <td className="p-2">
                                                    <select className={`font-bold rounded px-2 py-1 text-xs border ${row.type==='TL' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`} value={row.type} onChange={e=>{const n=[...matrix];n[idx].type=e.target.value;setMatrix(n)}}>
                                                        <option value="TN">Trắc nghiệm</option>
                                                        <option value="TL">Tự luận</option>
                                                    </select>
                                                </td>
                                                <td className="p-2 text-center flex justify-center gap-2">
                                                    {row.status === 'pending' && <button onClick={()=>generateRow(row.id)} className="text-blue-600 hover:bg-blue-50 px-3 py-1 rounded border text-sm font-bold">Tạo</button>}
                                                    {row.status === 'generating' && <div className="loader loader-blue w-5 h-5"></div>}
                                                    {row.status === 'done' && <span className="text-green-600 font-bold text-sm"><i className="fas fa-check"></i></span>}
                                                    {row.status === 'error' && <button onClick={()=>generateRow(row.id)} className="text-red-500 hover:bg-red-50 px-2 py-1 rounded border text-sm font-bold">Lỗi</button>}
                                                    <button onClick={()=>removeRow(row.id)} className="text-gray-400 hover:text-red-500"><i className="fas fa-trash"></i></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                <div className="p-2 bg-gray-50 border-t text-center">
                                    <button onClick={addRow} className="text-blue-600 font-bold text-sm hover:underline"><i className="fas fa-plus-circle"></i> Thêm dòng chủ đề</button>
                                </div>
                            </div>

                            <div className="flex justify-end gap-3 pt-4 border-t">
                                <button className="px-4 py-2 text-gray-500 font-bold hover:bg-gray-100 rounded" onClick={()=>{if(confirm('Xóa hết?')) setMatrix([])}}>Xóa hết</button>
                                <button className="px-6 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 shadow" onClick={finalize}>Xem & Xuất đề <i className="fas fa-arrow-right"></i></button>
                            </div>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="h-[80vh] flex flex-col">
                            <div className="flex justify-between items-center mb-4 bg-white p-4 rounded shadow-sm sticky top-0 z-10 border-b">
                                <h2 className="text-xl font-bold text-gray-800">Xem trước đề thi</h2>
                                <div className="space-x-2">
                                    <button onClick={()=>setStep(2)} className="px-4 py-2 border rounded font-bold text-gray-600">Quay lại</button>
                                    <button onClick={exportWord} className="px-4 py-2 bg-green-600 text-white rounded font-bold hover:bg-green-700 shadow"><i className="fas fa-file-word"></i> Xuất Word</button>
                                </div>
                            </div>

                            <div className="flex-1 overflow-auto space-y-6 pr-2 pb-10">
                                {questions.map((q, i) => (
                                    <div key={i} className={`bg-white p-6 rounded-lg shadow-sm border question-card ${q.meta.type==='TL'?'type-tl':'type-tn'}`}>
                                        <div className="flex justify-between mb-3 border-b pb-2">
                                            <div className="flex gap-2 items-center">
                                                <span className={`text-xs font-bold px-2 py-1 rounded text-white ${q.meta.type==='TL'?'bg-purple-600':'bg-blue-600'}`}>{q.meta.type}</span>
                                                <span className="text-xs font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded">{q.meta.topic}</span>
                                            </div>
                                            <button onClick={()=>{const n=[...questions];n.splice(i,1);setQuestions(n)}} className="text-gray-400 hover:text-red-500"><i className="fas fa-times"></i></button>
                                        </div>

                                        <div className="mb-4">
                                            <div className="font-bold text-gray-800 mb-2">Câu {i+1}:</div>
                                            <textarea className="w-full p-3 border rounded font-serif text-lg focus:border-blue-500 outline-none" rows={q.meta.type==='TL'?3:2} value={q.q} onChange={e=>{const n=[...questions];n[i].q=e.target.value;setQuestions(n)}}/>
                                            <div className="p-3 bg-blue-50 mt-2 rounded border border-blue-100"><MathView text={q.q}/></div>
                                        </div>

                                        {q.meta.type === 'TN' && (
                                            <div className="grid grid-cols-2 gap-3 mb-4">
                                                {q.a.map((opt, k) => (
                                                    <div key={k} className="flex items-center gap-2">
                                                        <span className="font-bold text-gray-500">{String.fromCharCode(65+k)}.</span>
                                                        <div className="flex-1"><input className="w-full p-2 border-b font-serif bg-transparent outline-none" value={opt} onChange={e=>{const n=[...questions];n[i].a[k]=e.target.value;setQuestions(n)}}/><div className="text-xs text-gray-400 pl-2"><MathView text={opt}/></div></div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        <div className="mt-4 pt-4 border-t border-dashed">
                                            <label className="text-xs font-bold text-green-700 uppercase mb-2 block">Đáp án / Hướng dẫn</label>
                                            <textarea className="w-full p-3 border border-green-200 bg-green-50 rounded font-mono text-sm" rows={q.meta.type==='TL'?5:2} value={q.c} onChange={e=>{const n=[...questions];n[i].c=e.target.value;setQuestions(n)}}/>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
