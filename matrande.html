<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ra Đề Toán 9 Chuẩn (V2)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap');
        body { font-family: 'Times New Roman', serif; background-color: #f8fafc; }
        .font-ui { font-family: system-ui, -apple-system, sans-serif; }
        .loader { width: 20px; height: 20px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        .loader-blue { border-color: #2563eb; border-bottom-color: transparent; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .question-card { transition: all 0.2s; border-left: 4px solid transparent; }
        .question-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .type-tl { border-left-color: #9333ea; } /* Tự luận màu tím */
        .type-tn { border-left-color: #2563eb; } /* Trắc nghiệm màu xanh */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CẤU HÌNH ---
        // Logic mới: Chia rõ đặc tả cho Tự luận và Trắc nghiệm
        const SUBJECT_CONFIG = {
            id: "Toan9", 
            name: "Toán học 9",
            prompts: {
                TL: "Tự luận: Đề bài phải đặt câu hỏi rõ ràng (Ví dụ: 'Giải phương trình...', 'Cho tam giác...'). Đáp án phải là HƯỚNG DẪN CHẤM chi tiết từng bước, có thang điểm (0.25đ, 0.5đ). Không sinh các đáp án A,B,C,D.",
                TN: "Trắc nghiệm: Đề bài ngắn gọn. Phải sinh 4 đáp án A, B, C, D trong đó có 1 đáp án đúng và 3 phương án nhiễu hợp lý."
            }
        };

        const AIAdapter = {
            getConfig: () => ({
                geminiKeys: JSON.parse(localStorage.getItem('global_gemini_keys') || "[]")
            }),
            
            call: async (payload) => {
                const { geminiKeys } = AIAdapter.getConfig();
                if(!geminiKeys.length) throw new Error("Vui lòng nhập API Key trước!");
                
                // Retry logic with random keys
                let lastError;
                for(let i=0; i<3; i++) {
                    try {
                        const key = geminiKeys[Math.floor(Math.random() * geminiKeys.length)];
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                            method: 'POST', headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(payload)
                        });
                        if(!res.ok) throw new Error(`API Error: ${res.status}`);
                        const data = await res.json();
                        return data.candidates[0].content.parts[0].text;
                    } catch(e) { lastError = e; await new Promise(r => setTimeout(r, 1000)); }
                }
                throw lastError;
            }
        };

        // --- UTILS ---
        const MathView = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if(!ref.current || !text) return;
                try {
                    // Chuẩn hóa LaTeX cho KaTeX
                    const clean = text.replace(/\\\[/g, '$').replace(/\\\]/g, '$').replace(/\\\(/g, '$').replace(/\\\)/g, '$');
                    const parts = clean.split(/(\$[^$]+\$)/g);
                    ref.current.innerHTML = "";
                    parts.forEach(part => {
                        if(part.startsWith('$') && part.endsWith('$')) {
                            const span = document.createElement('span');
                            try { katex.render(part.slice(1,-1), span, {throwOnError:false}); } catch{ span.innerText=part;}
                            ref.current.appendChild(span);
                        } else {
                            ref.current.appendChild(document.createTextNode(part));
                        }
                    });
                } catch(e){}
            }, [text]);
            return <span ref={ref} className="font-serif text-lg leading-relaxed"/>;
        };

        const App = () => {
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [keys, setKeys] = useState("");
            const [info, setInfo] = useState({ dept: "SỞ GD&ĐT ĐỒNG NAI", school: "TRƯỜNG THCS NGUYỄN CÔNG TRỨ", title: "KIỂM TRA CUỐI KỲ I", time: "90" });
            const [matrix, setMatrix] = useState([]);
            const [questions, setQuestions] = useState([]);

            useEffect(() => {
                const saved = localStorage.getItem('global_gemini_keys');
                if(saved) setKeys(JSON.parse(saved).join('\n'));
            }, []);

            const saveKeys = () => {
                const k = keys.split('\n').map(s=>s.trim()).filter(s=>s);
                localStorage.setItem('global_gemini_keys', JSON.stringify(k));
                alert(`Đã lưu ${k.length} API Keys!`);
            };

            // 1. UPLOAD & ANALYZE
            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                
                setLoading(true);
                try {
                    let base64 = "";
                    if (file.type.includes("pdf")) {
                        const buffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument(buffer).promise;
                        const page = await pdf.getPage(1);
                        const vp = page.getViewport({ scale: 2 });
                        const cvs = document.createElement('canvas'); cvs.width = vp.width; cvs.height = vp.height;
                        await page.render({ canvasContext: cvs.getContext('2d'), viewport: vp }).promise;
                        base64 = cvs.toDataURL('image/jpeg').split(',')[1];
                    } else {
                        const reader = new FileReader();
                        base64 = await new Promise(r => { reader.onload = ev => r(ev.target.result.split(',')[1]); reader.readAsDataURL(file); });
                    }

                    const prompt = `
                        Phân tích ảnh Ma trận đề thi Toán 9. Hãy trích xuất thành JSON.
                        QUAN TRỌNG: Cần phân biệt rõ cột "Tự luận" (TL) và "Trắc nghiệm" (TN).
                        Nếu đề bài có cột "TL" và các số liệu nằm ở đó, hãy đánh dấu type: "TL".
                        
                        Output JSON Format:
                        [
                            {
                                "topic": "Tên chủ đề (VD: Phương trình bậc nhất, Hệ thức lượng...)",
                                "level": "NB/TH/VD/VDC",
                                "count": số_lượng_câu,
                                "type": "TL" hoặc "TN" (Nếu không rõ thì mặc định TN),
                                "desc": "Mô tả ngắn về yêu cầu cần đạt (nếu thấy)"
                            }
                        ]
                        Chỉ trả về JSON, không lời dẫn.
                    `;
                    
                    const text = await AIAdapter.call({ contents: [{ parts: [{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: base64}}] }] });
                    const jsonStr = text.match(/\[[\s\S]*\]/)[0];
                    const data = JSON.parse(jsonStr);
                    
                    setMatrix(data.map((r, i) => ({...r, id: Date.now()+i, status: 'pending', qs: []})));
                    setStep(2);
                } catch (err) { alert("Lỗi phân tích: " + err.message); } 
                finally { setLoading(false); }
            };

            // 2. GENERATE ROW (CORE LOGIC)
            const generateRow = async (rowId) => {
                setMatrix(prev => prev.map(r => r.id === rowId ? {...r, status: 'generating'} : r));
                
                const row = matrix.find(r => r.id === rowId);
                const isEssay = row.type === 'TL'; // Logic tư duy: Tự luận vs Trắc nghiệm
                
                // Prompt được tinh chỉnh theo style Đinh Tiên Hoàng
                const prompt = `
                    Đóng vai giáo viên Toán lớp 9, soạn câu hỏi kiểm tra học kỳ 1.
                    
                    YÊU CẦU:
                    - Chủ đề: ${row.topic}
                    - Mức độ: ${row.level} (NB: Nhận biết, TH: Thông hiểu, VD: Vận dụng thấp, VDC: Vận dụng cao)
                    - Loại câu hỏi: ${isEssay ? "TỰ LUẬN (Essay)" : "TRẮC NGHIỆM (Multiple Choice)"}
                    - Số lượng: ${row.count} câu.
                    
                    ${isEssay 
                        ? `STYLE TỰ LUẬN (Theo mẫu đề thi chuẩn):
                           - Đề bài phải chuẩn mực (VD: "Giải phương trình...", "Cho tam giác ABC vuông tại A...").
                           - Tuyệt đối KHÔNG sinh đáp án A,B,C,D.
                           - Phần đáp án trả về trường "c" phải là LỜI GIẢI CHI TIẾT và THANG ĐIỂM.` 
                        : `STYLE TRẮC NGHIỆM:
                           - Câu dẫn ngắn gọn.
                           - Sinh 4 đáp án A,B,C,D.`
                    }

                    ĐỊNH DẠNG JSON TRẢ VỀ (Array):
                    [
                        {
                            "q": "Nội dung câu hỏi (Dùng LaTeX $...$ cho công thức)",
                            "a": ${isEssay ? "[]" : `["Đáp án A", "Đáp án B", "Đáp án C", "Đáp án D"]`},
                            "c": "${isEssay ? "Lời giải chi tiết..." : "Đáp án đúng (A/B/C/D)"}"
                        }
                    ]
                `;

                try {
                    const text = await AIAdapter.call({ contents: [{ parts: [{text: prompt}] }] });
                    const jsonStr = text.match(/\[[\s\S]*\]/)[0]; // Lọc lấy mảng JSON
                    let generatedQs = JSON.parse(jsonStr);
                    
                    // Gắn metadata
                    generatedQs = generatedQs.map(q => ({
                        ...q, 
                        meta: { topic: row.topic, level: row.level, type: row.type }
                    }));

                    setMatrix(prev => prev.map(r => r.id === rowId ? {...r, status: 'done', qs: generatedQs} : r));
                } catch (e) {
                    console.error(e);
                    // Quan trọng: Set status 'error' để hiện nút thử lại
                    setMatrix(prev => prev.map(r => r.id === rowId ? {...r, status: 'error'} : r));
                }
            };

            const finalize = () => {
                const all = matrix.flatMap(r => r.qs || []);
                if(all.length === 0) return alert("Chưa có câu hỏi nào được tạo!");
                setQuestions(all);
                setStep(3);
            };

            // 3. EXPORT WORD (Improved Logic for TL)
            const exportWord = () => {
                let html = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'>
                    <head><meta charset='utf-8'><title>De Thi</title>
                    <style>
                        body { font-family: 'Times New Roman'; font-size: 13pt; line-height: 1.3; }
                        table { border-collapse: collapse; width: 100%; }
                        .header { text-align: center; font-weight: bold; margin-bottom: 20px; }
                        .qs-content { margin-bottom: 10px; }
                        .ans-grid { display: flex; flex-wrap: wrap; }
                        .ans-item { width: 50%; margin-bottom: 5px; }
                    </style>
                    </head><body>
                    <div class="header">
                        <p>${info.dept.toUpperCase()}<br/>${info.school.toUpperCase()}</p>
                        <p>${info.title.toUpperCase()}<br/>MÔN: TOÁN 9 - Thời gian: ${info.time} phút</p>
                    </div>
                    <hr/>
                `;

                // Tách TN và TL
                const tn = questions.filter(q => q.meta.type === 'TN');
                const tl = questions.filter(q => q.meta.type === 'TL');

                if(tn.length > 0) {
                    html += `<h3>I. PHẦN TRẮC NGHIỆM (${tn.length} câu)</h3>`;
                    tn.forEach((q, i) => {
                        html += `<div class='qs-content'><b>Câu ${i+1}:</b> ${q.q.replace(/\n/g, '<br/>')}</div>`;
                        html += `<table><tr>`;
                        q.a.forEach((opt, k) => {
                            if(k%2===0 && k>0) html += `</tr><tr>`;
                            html += `<td width="50%"><b>${String.fromCharCode(65+k)}.</b> ${opt}</td>`;
                        });
                        html += `</tr></table><br/>`;
                    });
                }

                if(tl.length > 0) {
                    html += `<h3>II. PHẦN TỰ LUẬN (${tl.length} câu)</h3>`;
                    tl.forEach((q, i) => {
                        // Logic tư duy: Tự luận thường đặt là Bài 1, Bài 2... hoặc Câu 1, Câu 2...
                        html += `<div class='qs-content'><b>Câu ${i+1} (${q.meta.level}):</b> ${q.q.replace(/\n/g, '<br/>')}</div>`;
                        html += `<br/>`; // Khoảng trống cho HS làm bài
                    });
                }

                // Đáp án
                html += `<br clear=all style='mso-special-character:line-break;page-break-before:always'>`;
                html += `<h3 style='text-align:center'>HƯỚNG DẪN CHẤM</h3>`;
                
                if(tn.length > 0) {
                    html += `<h4>A. TRẮC NGHIỆM</h4><table border="1" cellpadding="5"><tr>`;
                    tn.forEach((q, i) => html += `<td>${i+1}</td>`);
                    html += `</tr><tr>`;
                    tn.forEach(q => html += `<td><b>${q.c}</b></td>`);
                    html += `</tr></table>`;
                }

                if(tl.length > 0) {
                    html += `<h4>B. TỰ LUẬN</h4>`;
                    tl.forEach((q, i) => {
                        html += `<p><b>Câu ${i+1}:</b></p>`;
                        html += `<div>${q.c.replace(/\n/g, '<br/>')}</div><hr/>`;
                    });
                }

                html += `</body></html>`;
                const blob = new Blob(['\ufeff', html], {type: 'application/msword'});
                saveAs(blob, "De_Thi_Toan_9.doc");
            };

            return (
                <div className="max-w-5xl mx-auto p-6 font-ui">
                    {/* Header */}
                    <div className="flex justify-between items-end border-b pb-4 mb-6">
                        <div>
                            <h1 className="text-2xl font-bold text-blue-800">CÔNG CỤ TẠO ĐỀ TOÁN 9 (PRO)</h1>
                            <p className="text-gray-500 text-sm">Hỗ trợ đặc biệt: Ma trận Tự luận & Trắc nghiệm</p>
                        </div>
                        <button onClick={()=>setStep(1)} className="text-blue-600 hover:underline">Làm mới</button>
                    </div>

                    {/* Step 1: Config & Upload */}
                    {step === 1 && (
                        <div className="bg-white p-6 rounded-lg shadow-sm border space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-semibold mb-1">Đơn vị (Sở/Phòng)</label>
                                    <input className="w-full border p-2 rounded" value={info.dept} onChange={e=>setInfo({...info, dept:e.target.value})}/>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold mb-1">Trường</label>
                                    <input className="w-full border p-2 rounded" value={info.school} onChange={e=>setInfo({...info, school:e.target.value})}/>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold mb-1">Tên kỳ thi</label>
                                    <input className="w-full border p-2 rounded" value={info.title} onChange={e=>setInfo({...info, title:e.target.value})}/>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold mb-1">API Keys (Mỗi dòng 1 key - Để tránh lỗi quota)</label>
                                    <textarea className="w-full border p-2 rounded h-10 focus:h-24 transition-all" placeholder="Paste Gemini Keys here..." value={keys} onChange={e=>setKeys(e.target.value)} onBlur={saveKeys}/>
                                </div>
                            </div>

                            <div className="border-2 border-dashed border-blue-300 rounded-lg p-8 text-center bg-blue-50 hover:bg-blue-100 transition cursor-pointer relative">
                                <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleUpload} accept="image/*,.pdf"/>
                                {loading ? <div className="loader loader-blue"></div> : (
                                    <>
                                        <i className="fas fa-cloud-upload-alt text-4xl text-blue-500 mb-2"></i>
                                        <p className="font-bold text-blue-700">Tải lên Ma trận đề (Ảnh hoặc PDF)</p>
                                        <p className="text-sm text-gray-500">Hệ thống sẽ tự nhận diện Tự luận (TL) và Trắc nghiệm (TN)</p>
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Step 2: Matrix & Generation */}
                    {step === 2 && (
                        <div className="space-y-4">
                            <div className="bg-yellow-50 p-4 rounded border border-yellow-200 text-sm text-yellow-800 flex items-start gap-2">
                                <i className="fas fa-info-circle mt-1"></i>
                                <div>
                                    <strong>Lưu ý về tư duy ra đề:</strong>
                                    <ul className="list-disc ml-4 mt-1">
                                        <li>Cột <b>Loại</b> quyết định cấu trúc câu hỏi. Hãy chỉnh sửa nếu AI nhận diện sai.</li>
                                        <li>Nếu chọn <b>TL (Tự luận)</b>: AI sẽ không sinh đáp án nhiễu A,B,C,D mà sinh lời giải chi tiết.</li>
                                    </ul>
                                </div>
                            </div>

                            <div className="bg-white rounded shadow overflow-hidden">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-gray-100 text-gray-700 uppercase text-xs">
                                        <tr>
                                            <th className="p-3 border-b">Chủ đề</th>
                                            <th className="p-3 border-b">Mức độ</th>
                                            <th className="p-3 border-b w-20">Số câu</th>
                                            <th className="p-3 border-b w-32">Loại</th>
                                            <th className="p-3 border-b w-32 text-center">Tác vụ</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {matrix.map((row, idx) => (
                                            <tr key={row.id} className="border-b hover:bg-gray-50">
                                                <td className="p-2"><input className="w-full border-b border-transparent focus:border-blue-500 outline-none bg-transparent" value={row.topic} onChange={e=>{const n=[...matrix];n[idx].topic=e.target.value;setMatrix(n)}}/></td>
                                                <td className="p-2">
                                                    <select className="bg-transparent outline-none" value={row.level} onChange={e=>{const n=[...matrix];n[idx].level=e.target.value;setMatrix(n)}}>
                                                        <option value="NB">Nhận biết</option>
                                                        <option value="TH">Thông hiểu</option>
                                                        <option value="VD">Vận dụng</option>
                                                        <option value="VDC">Vận dụng cao</option>
                                                    </select>
                                                </td>
                                                <td className="p-2"><input type="number" className="w-12 text-center border rounded" value={row.count} onChange={e=>{const n=[...matrix];n[idx].count=e.target.value;setMatrix(n)}}/></td>
                                                <td className="p-2">
                                                    <select 
                                                        className={`font-bold rounded px-2 py-1 text-xs ${row.type==='TL' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`}
                                                        value={row.type} 
                                                        onChange={e=>{const n=[...matrix];n[idx].type=e.target.value;setMatrix(n)}}
                                                    >
                                                        <option value="TN">Trắc nghiệm</option>
                                                        <option value="TL">Tự luận</option>
                                                    </select>
                                                </td>
                                                <td className="p-2 text-center">
                                                    {row.status === 'pending' && (
                                                        <button onClick={()=>generateRow(row.id)} className="text-blue-600 hover:bg-blue-50 px-3 py-1 rounded text-sm font-semibold border border-blue-200">
                                                            <i className="fas fa-magic mr-1"></i> Tạo
                                                        </button>
                                                    )}
                                                    {row.status === 'generating' && <div className="loader loader-blue w-5 h-5"></div>}
                                                    {row.status === 'done' && <span className="text-green-600 font-bold text-sm"><i className="fas fa-check"></i> Xong</span>}
                                                    {row.status === 'error' && (
                                                        <button onClick={()=>generateRow(row.id)} className="text-white bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm font-semibold shadow">
                                                            <i className="fas fa-sync-alt mr-1"></i> Thử lại
                                                        </button>
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            <div className="flex justify-end gap-3 mt-4">
                                <button className="px-4 py-2 bg-gray-200 rounded font-semibold hover:bg-gray-300" onClick={()=>{setMatrix(matrix.map(r=>({...r, id: Date.now()+Math.random(), status:'pending'})))}}>Reset tất cả</button>
                                <button className="px-6 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 shadow-lg" onClick={finalize}>
                                    Xem & Xuất đề <i className="fas fa-arrow-right ml-2"></i>
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Step 3: Review */}
                    {step === 3 && (
                        <div className="h-[80vh] flex flex-col">
                            <div className="flex justify-between items-center mb-4 bg-white p-4 rounded shadow-sm sticky top-0 z-10">
                                <h2 className="text-xl font-bold text-gray-800">Xem trước đề thi</h2>
                                <div className="space-x-2">
                                    <button onClick={()=>setStep(2)} className="px-4 py-2 border rounded hover:bg-gray-50">Quay lại</button>
                                    <button onClick={exportWord} className="px-4 py-2 bg-green-600 text-white rounded font-bold hover:bg-green-700 shadow">
                                        <i className="fas fa-file-word mr-2"></i> Tải file Word
                                    </button>
                                </div>
                            </div>

                            <div className="flex-1 overflow-auto space-y-4 pr-2">
                                {questions.map((q, i) => (
                                    <div key={i} className={`bg-white p-5 rounded-lg shadow-sm border question-card ${q.meta.type==='TL'?'type-tl':'type-tn'}`}>
                                        <div className="flex justify-between mb-2">
                                            <div className="flex gap-2 items-center">
                                                <span className={`text-xs font-bold px-2 py-1 rounded text-white ${q.meta.type==='TL'?'bg-purple-600':'bg-blue-600'}`}>
                                                    {q.meta.type === 'TL' ? 'TỰ LUẬN' : 'TRẮC NGHIỆM'}
                                                </span>
                                                <span className="text-xs font-semibold text-gray-500 bg-gray-100 px-2 py-1 rounded border">{q.meta.topic} - {q.meta.level}</span>
                                            </div>
                                            <button onClick={()=>{const n=[...questions];n.splice(i,1);setQuestions(n)}} className="text-gray-400 hover:text-red-500"><i className="fas fa-trash"></i></button>
                                        </div>

                                        {/* Nội dung câu hỏi */}
                                        <div className="mb-4">
                                            <div className="font-bold text-gray-800 mb-1">Câu {i+1}:</div>
                                            <textarea 
                                                className="w-full p-2 border rounded bg-gray-50 font-serif text-lg focus:bg-white focus:border-blue-500 outline-none transition-colors" 
                                                rows={q.meta.type==='TL'?3:2}
                                                value={q.q} 
                                                onChange={e=>{const n=[...questions];n[i].q=e.target.value;setQuestions(n)}}
                                            />
                                            <div className="p-2 bg-gray-50 mt-1 rounded text-gray-700"><MathView text={q.q}/></div>
                                        </div>

                                        {/* Đáp án (Nếu là TN) */}
                                        {q.meta.type === 'TN' && (
                                            <div className="grid grid-cols-2 gap-3 mb-4">
                                                {q.a.map((opt, k) => (
                                                    <div key={k} className="flex items-center gap-2">
                                                        <span className="font-bold text-sm text-gray-500 w-6">{String.fromCharCode(65+k)}.</span>
                                                        <input 
                                                            className="flex-1 p-1 border-b border-gray-200 focus:border-blue-500 outline-none font-serif"
                                                            value={opt}
                                                            onChange={e=>{const n=[...questions];n[i].a[k]=e.target.value;setQuestions(n)}}
                                                        />
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {/* Hướng dẫn chấm / Đáp án đúng */}
                                        <div className="mt-3 border-t pt-3">
                                            <label className="text-xs font-bold text-green-700 uppercase mb-1 block">
                                                {q.meta.type === 'TL' ? 'HƯỚNG DẪN CHẤM & BIỂU ĐIỂM' : 'ĐÁP ÁN ĐÚNG'}
                                            </label>
                                            <textarea 
                                                className="w-full p-2 border border-green-200 bg-green-50 rounded font-mono text-sm"
                                                rows={q.meta.type==='TL'?4:1}
                                                value={q.c}
                                                onChange={e=>{const n=[...questions];n[i].c=e.target.value;setQuestions(n)}}
                                            />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
