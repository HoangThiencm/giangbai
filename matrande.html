<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Đề Từ Ma Trận (AI Vision)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .katex { font-size: 1.1em; color: #1e3a8a; }
        .matrix-table th { background-color: #f1f5f9; color: #475569; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }
        .matrix-table td { border-bottom: 1px solid #e2e8f0; }
        .matrix-table tr:hover td { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AIAdapter = {
            getConfig: () => ({
                geminiKeys: JSON.parse(localStorage.getItem('global_gemini_keys') || "[]"),
                hfTokens: JSON.parse(localStorage.getItem('hf_tokens') || "[]")
            }),

            analyzeImage: async (base64Image, prompt) => {
                const { geminiKeys } = AIAdapter.getConfig();
                if (!geminiKeys.length) throw new Error("Chức năng đọc ảnh cần Gemini API Key.");
                const key = geminiKeys[Math.floor(Math.random() * geminiKeys.length)];
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Image } }] }] })
                    });
                    if (!response.ok) throw new Error(`Google API Error: ${response.status}`);
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (e) { throw e; }
            },

            generateText: async (prompt) => {
                const { geminiKeys, hfTokens } = AIAdapter.getConfig();
                
                if (geminiKeys.length > 0) {
                    try {
                        const key = geminiKeys[Math.floor(Math.random() * geminiKeys.length)];
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await response.json();
                        if (data.candidates) return data.candidates[0].content.parts[0].text;
                    } catch (e) { console.warn("Gemini lỗi, thử chuyển sang HF...", e); }
                }

                if (hfTokens.length > 0) {
                    try {
                        const token = hfTokens[Math.floor(Math.random() * hfTokens.length)];
                        const response = await fetch("https://api-inference.huggingface.co/models/Qwen/Qwen2.5-72B-Instruct", {
                            method: "POST",
                            headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
                            body: JSON.stringify({
                                inputs: prompt,
                                parameters: { max_new_tokens: 3000, temperature: 0.7, return_full_text: false }
                            })
                        });
                        const data = await response.json();
                        if (Array.isArray(data)) return data[0].generated_text;
                        if (data.error) throw new Error(data.error);
                    } catch (e) { throw new Error(`Cả Gemini và HF đều lỗi: ${e.message}`); }
                } else {
                    throw new Error("Không có API Key nào khả dụng! Vui lòng nạp Gemini Key hoặc HF Token.");
                }
            }
        };

        const FileUtils = {
            toBase64: (file) => {
                return new Promise(async (resolve, reject) => {
                    if (file.type.includes("image")) {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                        reader.readAsDataURL(file);
                    } else if (file.type === "application/pdf") {
                        try {
                            const buffer = await file.arrayBuffer();
                            const pdf = await pdfjsLib.getDocument(buffer).promise;
                            const page = await pdf.getPage(1);
                            const viewport = page.getViewport({ scale: 2.0 });
                            const canvas = document.createElement('canvas');
                            canvas.height = viewport.height;
                            canvas.width = viewport.width;
                            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                            resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                        } catch (e) { reject(e); }
                    } else { reject(new Error("Chỉ hỗ trợ Ảnh hoặc PDF")); }
                });
            }
        };

        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if(!text) return;
                try {
                    const processed = text
                        .replace(/\\\[/g, '$$').replace(/\\\]/g, '$$')
                        .replace(/\\\(/g, '$').replace(/\\\)/g, '$')
                        .replace(/`/g, '')
                        .replace(/\\begin{equation}/g, '$$').replace(/\\end{equation}/g, '$$');

                    const parts = processed.split(/(\$[^$]+\$)/g);
                    ref.current.innerHTML = '';
                    parts.forEach(part => {
                        if (part.startsWith('$') && part.endsWith('$')) {
                            const span = document.createElement('span');
                            try { katex.render(part.slice(1, -1), span, { throwOnError: false }); } catch { span.innerText = part; }
                            ref.current.appendChild(span);
                        } else { ref.current.appendChild(document.createTextNode(part)); }
                    });
                } catch(e) { ref.current.innerText = text; }
            }, [text]);
            return <div ref={ref} className="text-gray-800 text-lg leading-relaxed font-serif"></div>;
        };

        const App = () => {
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState("");
            const [preview, setPreview] = useState(null);
            const [matrix, setMatrix] = useState([]);
            const [examData, setExamData] = useState([]);

            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true); setStatus("Đang xử lý file...");
                try {
                    const base64 = await FileUtils.toBase64(file);
                    setPreview(`data:image/jpeg;base64,${base64}`);
                    setStatus("AI đang đọc Ma trận / Bảng đặc tả...");
                    
                    const prompt = `
                        Hãy phân tích hình ảnh này (Ma trận đề thi hoặc Bảng đặc tả kỹ thuật).
                        Trích xuất danh sách các chủ đề kiến thức và số lượng câu hỏi.
                        
                        Quan trọng: Hãy nhận diện chính xác loại câu hỏi:
                        1. "Trắc nghiệm" (4 lựa chọn A,B,C,D).
                        2. "Đúng/Sai" (Trắc nghiệm đúng sai).
                        3. "Tự luận" (Trả lời ngắn/dài).

                        Yêu cầu đầu ra JSON thuần túy (Array):
                        [
                            {
                                "topic": "Tên chủ đề",
                                "level": "Mức độ (NB/TH/VD/VDC)",
                                "count": số_lượng_câu,
                                "type": "Trắc nghiệm" hoặc "Đúng/Sai" hoặc "Tự luận"
                            }
                        ]
                    `;
                    const res = await AIAdapter.analyzeImage(base64, prompt);
                    const jsonStr = res.replace(/```json|```/g, '').trim();
                    setMatrix(JSON.parse(jsonStr).map((r, i) => ({...r, id: i})));
                    setStep(2);
                } catch (err) { alert("Lỗi đọc ma trận: " + err.message); } finally { setLoading(false); }
            };

            const updateRow = (id, key, val) => setMatrix(prev => prev.map(r => r.id === id ? {...r, [key]: val} : r));
            const deleteRow = (id) => setMatrix(prev => prev.filter(r => r.id !== id));
            const addRow = () => setMatrix(prev => [...prev, {id: Date.now(), topic: "", level: "Thông hiểu", count: 1, type: "Trắc nghiệm"}]);

            const handleGenerate = async () => {
                setStep(3); setLoading(true);
                let results = [];
                try {
                    for (const row of matrix) {
                        const count = parseInt(row.count);
                        if(count <= 0) continue;
                        setStatus(`Đang soạn ${count} câu ${row.type} phần "${row.topic}"...`);
                        
                        const prompt = `
                            Đóng vai giáo viên. Soạn ${count} câu hỏi dạng "${row.type}" về "${row.topic}". Mức độ: ${row.level}.
                            
                            Quy tắc định dạng JSON strict:
                            
                            1. NẾU LÀ "Trắc nghiệm":
                            { "q": "Câu hỏi...", "a": ["A. ...", "B. ...", "C. ...", "D. ..."], "c": "Đáp án đúng (A/B/C/D)" }
                            
                            2. NẾU LÀ "Đúng/Sai" (Theo chương trình mới 2025):
                            { 
                                "q": "Câu dẫn chính...", 
                                "a": ["a) Mệnh đề 1", "b) Mệnh đề 2", "c) Mệnh đề 3", "d) Mệnh đề 4"],
                                "c": "a) Đúng, b) Sai, c) Đúng, d) Sai"
                            }
                            
                            3. NẾU LÀ "Tự luận":
                            { "q": "Câu hỏi...", "a": [], "c": "Lời giải chi tiết" }

                            Toán học dùng LaTeX chuẩn $...$. Trả về mảng JSON chứa các câu hỏi.
                        `;
                        const res = await AIAdapter.generateText(prompt);
                        const cleanRes = res.replace(/```json|```/g, '').trim();
                        try { 
                            const qs = JSON.parse(cleanRes);
                            results = [...results, ...qs.map(q => ({...q, meta: row}))];
                        } catch(e) {}
                    }
                    setExamData(results);
                    setStep(4);
                } catch(err) { alert("Lỗi sinh đề: " + err.message); setStep(2); } finally { setLoading(false); }
            };

            const exportWord = () => {
                let html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'><head><meta charset='utf-8'><title>De Thi</title></head><body><h2 style='text-align:center'>ĐỀ THI</h2>`;
                
                // Phân loại để in đẹp hơn
                const tn = examData.filter(q => q.meta.type === "Trắc nghiệm");
                const ds = examData.filter(q => q.meta.type === "Đúng/Sai");
                const tl = examData.filter(q => q.meta.type === "Tự luận");

                if(tn.length) {
                    html += `<h3>PHẦN 1. TRẮC NGHIỆM</h3>`;
                    tn.forEach((q, i) => {
                        html += `<p><b>Câu ${i+1}:</b> ${q.q}</p>`;
                        html += `<table style='width:100%; border:none'><tr>`;
                        q.a.forEach((opt, idx) => { if(idx > 0 && idx % 2 === 0) html += `</tr><tr>`; html += `<td style='width:50%'>${opt}</td>`; });
                        html += `</tr></table>`;
                    });
                }

                if(ds.length) {
                    html += `<h3>PHẦN 2. TRẮC NGHIỆM ĐÚNG SAI</h3>`;
                    ds.forEach((q, i) => {
                        html += `<p><b>Câu ${i+1}:</b> ${q.q}</p>`;
                        html += `<ul style="list-style-type: none;">`;
                        q.a.forEach(opt => html += `<li>${opt}</li>`);
                        html += `</ul>`;
                    });
                }

                if(tl.length) {
                    html += `<h3>PHẦN 3. TỰ LUẬN</h3>`;
                    tl.forEach((q, i) => {
                        html += `<p><b>Câu ${i+1}:</b> ${q.q}</p>`;
                        html += `<p>................................................................................</p>`;
                    });
                }

                // Đáp án
                html += `<br/><hr/><h3>HƯỚNG DẪN CHẤM</h3>`;
                examData.forEach((q, i) => {
                    html += `<p><b>Câu ${i+1} (${q.meta.type}):</b> ${q.c}</p>`;
                });
                
                html += `</body></html>`;
                saveAs(new Blob(['\ufeff', html], {type: 'application/msword'}), "De_Thi_2025.doc");
            };

            return (
                <div className="min-h-screen bg-slate-50 p-6 font-sans">
                    <div className="max-w-6xl mx-auto">
                        <div className="flex justify-between items-center mb-8">
                            <button onClick={()=>window.location.href='index.html'} className="text-slate-600 font-bold hover:text-indigo-600 flex items-center gap-2 transition"><i className="fas fa-arrow-left"></i> Trang chủ</button>
                            <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight"><span className="text-indigo-600">AI</span> MA TRẬN ĐỀ THI</h1>
                        </div>
                        
                        {step === 1 && (
                            <div className="bg-white rounded-2xl shadow-xl p-10 text-center border-2 border-dashed border-indigo-200 hover:border-indigo-500 transition-all cursor-pointer group" onClick={()=>document.getElementById('fileInput').click()}>
                                <input id="fileInput" type="file" accept="image/*,.pdf" className="hidden" onChange={handleUpload}/>
                                {loading ? (<div><div className="loader mb-4"></div><p className="text-indigo-600 font-semibold animate-pulse">{status}</p></div>) : (
                                    <div className="py-10"><div className="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 group-hover:scale-110 transition"><i className="fas fa-cloud-upload-alt"></i></div><h2 className="text-2xl font-bold text-slate-700 mb-2">Tải lên Ma trận / Đặc tả</h2><p className="text-slate-500">Hỗ trợ Ảnh/PDF</p><button className="mt-6 bg-indigo-600 text-white px-6 py-2 rounded-full font-bold shadow-lg group-hover:shadow-indigo-500/50 transition">Chọn File</button></div>
                                )}
                            </div>
                        )}

                        {step === 2 && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 fade-in">
                                <div className="lg:col-span-1 bg-white p-4 rounded-xl shadow h-fit"><h3 className="font-bold text-slate-700 mb-2">Ảnh gốc:</h3><img src={preview} className="w-full rounded border" /></div>
                                <div className="lg:col-span-2 bg-white p-6 rounded-xl shadow-xl">
                                    <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-xl text-slate-800">Cấu Trúc Đề Thi</h3><button onClick={handleGenerate} className="bg-gradient-to-r from-indigo-600 to-violet-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg hover:shadow-indigo-500/50 transition flex items-center gap-2"><i className="fas fa-magic"></i> SINH ĐỀ THI</button></div>
                                    <div className="overflow-x-auto"><table className="w-full matrix-table text-sm"><thead><tr><th className="p-3 text-left">Chủ đề</th><th className="p-3 text-left">Mức độ</th><th className="p-3 text-center">Số câu</th><th className="p-3 text-left">Loại</th><th className="p-3"></th></tr></thead><tbody>{matrix.map(row => (<tr key={row.id}><td className="p-2"><input value={row.topic} onChange={e=>updateRow(row.id,'topic',e.target.value)} className="w-full bg-transparent outline-none font-medium text-slate-700"/></td><td className="p-2"><select value={row.level} onChange={e=>updateRow(row.id,'level',e.target.value)} className="bg-transparent outline-none cursor-pointer"><option>Nhận biết</option><option>Thông hiểu</option><option>Vận dụng</option><option>Vận dụng cao</option></select></td><td className="p-2 text-center"><input type="number" value={row.count} onChange={e=>updateRow(row.id,'count',e.target.value)} className="w-12 text-center font-bold text-indigo-600 bg-indigo-50 rounded"/></td><td className="p-2"><select value={row.type} onChange={e=>updateRow(row.id,'type',e.target.value)} className="bg-transparent outline-none font-bold text-blue-700"><option>Trắc nghiệm</option><option>Đúng/Sai</option><option>Tự luận</option></select></td><td className="p-2 text-center"><button onClick={()=>deleteRow(row.id)} className="text-slate-400 hover:text-red-500"><i className="fas fa-times"></i></button></td></tr>))}</tbody></table><button onClick={addRow} className="mt-3 text-sm font-bold text-indigo-600 hover:underline flex items-center gap-1"><i className="fas fa-plus-circle"></i> Thêm dòng</button></div>
                                </div>
                            </div>
                        )}

                        {step === 3 && (<div className="flex flex-col items-center justify-center min-h-[50vh] fade-in"><div className="loader w-16 h-16 border-4 mb-6"></div><h2 className="text-2xl font-bold text-slate-700">AI đang soạn đề thi...</h2><p className="text-slate-500 mt-2">{status}</p></div>)}

                        {step === 4 && (<div className="bg-white rounded-xl shadow-xl overflow-hidden fade-in">
                            <div className="p-4 bg-slate-50 border-b flex justify-between items-center sticky top-0 z-10"><div className="font-bold text-slate-700">Kết quả: {examData.length} câu hỏi</div><div className="flex gap-2"><button onClick={()=>setStep(2)} className="px-4 py-2 text-slate-600 hover:bg-slate-200 rounded font-bold">Sửa lại</button><button onClick={exportWord} className="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700 shadow flex items-center gap-2"><i className="fas fa-file-word"></i> Xuất Word</button></div></div>
                            <div className="p-8 space-y-8 max-w-4xl mx-auto">
                                {examData.map((q, i) => (
                                    <div key={i} className="border-b border-slate-100 pb-6 last:border-0">
                                        <div className="flex gap-3 mb-2">
                                            <span className={`px-2 py-1 rounded text-xs h-fit whitespace-nowrap font-bold ${q.meta.type === 'Tự luận' ? 'bg-orange-100 text-orange-700' : q.meta.type === 'Đúng/Sai' ? 'bg-purple-100 text-purple-700' : 'bg-indigo-100 text-indigo-700'}`}>Câu {i+1} ({q.meta.type})</span>
                                            <div className="font-medium text-slate-800 text-lg w-full"><MathText text={q.q} /></div>
                                        </div>
                                        
                                        {/* Trắc nghiệm ABCD */}
                                        {q.meta.type === 'Trắc nghiệm' && q.a && (
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 pl-10">{q.a.map((opt, idx) => (<div key={idx} className="bg-slate-50 p-3 rounded text-slate-700"><MathText text={opt} /></div>))}</div>
                                        )}

                                        {/* Đúng Sai (Chương trình mới) */}
                                        {q.meta.type === 'Đúng/Sai' && q.a && (
                                            <div className="pl-10 space-y-2">
                                                {q.a.map((opt, idx) => (
                                                    <div key={idx} className="flex justify-between items-center bg-slate-50 p-2 rounded border border-slate-200">
                                                        <div className="flex-1"><MathText text={opt} /></div>
                                                        <div className="flex gap-2 text-sm font-bold text-slate-400">
                                                            <span className="border px-2 py-1 rounded">Đ</span>
                                                            <span className="border px-2 py-1 rounded">S</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {/* Tự luận */}
                                        {q.meta.type === 'Tự luận' && (
                                            <div className="pl-10 text-slate-400 italic bg-slate-50 p-6 rounded border border-dashed border-slate-300">
                                                (Khoảng trống làm bài)
                                            </div>
                                        )}

                                        <div className="mt-3 pl-10 text-sm text-green-600 font-bold bg-green-50 p-2 rounded w-fit">Đáp án: <MathText text={q.c} /></div>
                                    </div>
                                ))}
                            </div>
                        </div>)}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
