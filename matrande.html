<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Đề Từ Ma Trận và Bảng đặc tả</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
            min-height: 100vh;
        }

        .font-ui {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .font-heading {
            font-family: 'Outfit', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.07);
        }

        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid #2563eb;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. LOGIC XỬ LÝ TEXT & CONSTANTS
        // ==========================================

        // Định nghĩa cấu trúc mức độ nhận thức theo chuẩn 3 mức của CV 7991
        const LEVELS_7991 = [
            { code: 'B', name: 'Biết', prompt_key: 'Know' },
            { code: 'H', name: 'Hiểu', prompt_key: 'Understand' },
            { code: 'V', name: 'Vận dụng', prompt_key: 'Apply' },
        ];

        // AI đôi khi trả JSON với LaTeX chưa escape đúng (vd: ""\frac""), JSON.parse sẽ đổi ""\f"" thành ký tự điều khiển.
        const restoreEscapedLatexControls = (raw) => {
            if (typeof raw !== 'string') return raw;
            return raw
                .replace(/\u0008/g, '\\b')
                .replace(/\u000c/g, '\\f');
        };

        const sanitizeAiJson = (value) => {
            if (typeof value === 'string') return restoreEscapedLatexControls(value);
            if (Array.isArray(value)) return value.map(sanitizeAiJson);
            if (value && typeof value === 'object') {
                const out = {};
                Object.keys(value).forEach(k => out[k] = sanitizeAiJson(value[k]));
                return out;
            }
            return value;
        };
        const parseAIJson = (str) => {
            try { return sanitizeAiJson(JSON.parse(str)); } 
            catch (e) {
                try { return sanitizeAiJson(JSON.parse(str.replace(/\\+/g, '\\\\'))); } 
                catch (e2) { throw e; }
            }
        };

        const normalizeRichText = (raw) => {
            if (!raw) return "";
            return restoreEscapedLatexControls(raw)
                .replace(/`([^`]+)`/g, '$$$1$$')
                .replace(/\\\[(.*?)\\\]/gs, '$$$1$$')
                .replace(/\\\((.*?)\\\)/gs, '$$$1$$')
                .replace(/\\\\+(?=\\begin\{cases\})/g, '\\')
                .replace(/\\\\+(?=\\end\{cases\})/g, '\\')
                .replace(/\\\\\s*\\\\/g, '\\\\')
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>');
        };

        const tokenizeRichText = (raw) => {
            const text = normalizeRichText(raw)
                // Hỗ trợ xử lý \text{...} 
                .replace(/\\text\{([^}]+)\}/g, ' $1 ');

            return text.split(/(\$\$[\s\S]*?\$\$|\$[\s\S]*?\$)/g).map(part => {
                if (part.startsWith('$$') && part.endsWith('$$')) return { type: 'math', display: true, content: part.slice(2, -2).trim() };
                else if (part.startsWith('$') && part.endsWith('$')) return { type: 'math', display: false, content: part.slice(1, -1).trim() };
                else return { type: 'text', content: part };
            }).filter(token => token.content !== "");
        };

        const renderMarkdownTable = (htmlStr) => {
            let lines = htmlStr.split(/(?:<br\/>|\n)/); 
            let out = []; let inTable = false; let tableLines = [];
            for (let i=0; i<lines.length; i++) {
                let line = lines[i].trim();
                if (line.startsWith('|') && line.endsWith('|')) { 
                    inTable = true; tableLines.push(line); 
                } else {
                    if (inTable) { out.push(renderHtmlTable(tableLines)); inTable = false; tableLines = []; }
                    out.push(lines[i]); 
                }
            }
            if (inTable) out.push(renderHtmlTable(tableLines));
            return out.join('<br/>');
            function renderHtmlTable(tLines) {
                if (tLines.length < 2 || !tLines[1].replace(/ /g, '').match(/^\|[\-\:|]+\|$/)) return tLines.join('<br/>');
                let tbl = '<table border="1" cellpadding="5" style="border-collapse:collapse;width:100%;margin:10pt 0;">';
                tLines.forEach((l, idx) => {
                    if (idx === 1) return; 
                    let cells = l.substring(1, l.length-1).split('|');
                    tbl += '<tr>';
                    cells.forEach(cell => {
                        let tag = idx === 0 ? 'th' : 'td';
                        let style = idx === 0 ? 'background-color:#eee;font-weight:bold;text-align:center;border:1px solid #ccc;padding:5px;' : 'border:1px solid #ccc;padding:5px;';
                        tbl += `<${tag} style="${style}">${cell.trim()}</${tag}>`;
                    });
                    tbl += '</tr>';
                });
                return tbl + '</table>';
            }
        };

        const renderToWeb = (tokens) => renderMarkdownTable(tokens.map(t => t.type === 'math' ? (() => { try { return katex.renderToString(t.content, { displayMode: t.display, throwOnError: false, output: 'html' }); } catch (e) { return `<span class="text-red-500 text-xs">${t.content}</span>`; } })() : t.content.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\\\\/g, '<br/>').replace(/\\n/g, '<br/>').replace(/\n/g, '<br/>')).join(''));

        // --- Render Word dùng MathML bọc trong OMML ---
        const renderToWord = (tokens) => renderMarkdownTable(tokens.map(t =>
            t.type === 'math'
                ? (() => {
                    try {
                        const m = katex.renderToString(t.content, {
                            displayMode: t.display,
                            throwOnError: false,
                            output: 'mathml',
                        }).match(/<math[\s\S]*?<\/math>/);

                        if (m) {
                            return `
                                <m:oMathPara>
                                    <m:oMath>
                                        ${m[0].replace(/<math/g, '<math xmlns="http://www.w3.org/1998/Math/MathML"').replace(/<annotation[\s\S]*?<\/annotation>/g, '')}
                                    </m:oMath>
                                </m:oMathPara>
                            `;
                        }
                    } catch (e) { }
                    return t.content.replace(/\$/g, '');
                })()
                : t.content
                    .replace(/\\text\{([^}]+)\}/g, ' $1 ')
                    .replace(/\\textbf\{([^}]+)\}/g, '<b>$1</b>')
                    .replace(/\\textit\{([^}]+)\}/g, '<i>$1</i>')
                    .replace(/\\emph\{([^}]+)\}/g, '<i>$1</i>')
                    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                    .replace(/\\\\/g, '<br/>')
                    .replace(/\\n/g, '<br/>')
                    .replace(/\n/g, '<br/>')
        ).join(''));

        const escapeHtml = (raw) => String(raw || "")
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        // Xuất thô: giữ nguyên công thức $...$, chỉ đổi xuống dòng để Word hiển thị đúng.
        const renderRawTextForWord = (raw) => {
            const text = restoreEscapedLatexControls(String(raw || ""))
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>');
            return escapeHtml(text)
                .replace(/\\\\/g, '<br/>')
                .replace(/\\n/g, '<br/>')
                .replace(/\n/g, '<br/>');
        };

        const MathRender = ({ text }) => {
            const ref = useRef();
            useEffect(() => { if (!ref.current) return; ref.current.innerHTML = renderToWeb(tokenizeRichText(text || "")); }, [text]);
            return <div ref={ref} className="font-serif text-sm text-gray-800 leading-relaxed whitespace-pre-wrap"></div>;
        };

        const calcExamTotals = (bp) => {
            let total = 0;
            bp.sections.forEach(sec => {
                let secTotal = 0; (sec.questions || []).forEach(q => { const s = parseFloat(q.score); if (!isNaN(s)) { secTotal += s; total += s; } });
                sec.score = parseFloat(secTotal.toFixed(2));
            });
            return parseFloat(total.toFixed(2));
        };

        const normalizeQuestionType = (rawType, sectionName = "", defaultType = "MC") => {
            const s = (rawType || "").toString().trim().toUpperCase();
            const sec = (sectionName || "").toString().trim().toUpperCase();

            // Ưu tiên cao nhất: Bắt "Trả lời ngắn" trước (Dù nằm trong phần Trắc nghiệm/TNKQ)
            if (sec.includes("TRẢ LỜI NGẮN") || s.includes("NGẮN") || s.includes("TLN")) return "TLN";

            // Dạng Tự luận truyền thống (Thường có nhiều ý a, b, c)
            if (sec.includes("TỰ LUẬN") || s.includes("TỰ") || s === "TL") return "TL";

            // Dạng Đúng/Sai (TF)
            if (sec.includes("ĐÚNG SAI") || sec.includes("TRUE/FALSE") || s.includes("TF") || s.includes("Đ/S")) return "TF";

            // Dạng Nhiều lựa chọn (MC)
            if (sec.includes("NHIỀU LỰA CHỌN") || sec.includes("TRẮC NGHIỆM") || sec.includes("TNKQ") || s.includes("TN") || s.includes("MC")) return "MC";

            return defaultType;
        };

        const inferDefaultQuestionType = (bp, durationStr = "90") => {
            const allText = JSON.stringify(bp).toUpperCase();
            if (allText.includes("TRẮC NGHIỆM") && allText.includes("TỰ LUẬN")) return "MC";
            if (allText.includes("TRẮC NGHIỆM")) return "MC";
            if (allText.includes("TỰ LUẬN")) return "TL";
            let totalQuestions = 0; bp.sections.forEach(s => totalQuestions += (s.questions || []).length);
            const duration = parseInt(durationStr) || 90;
            if (totalQuestions <= 15 && duration >= 45) return "TL";
            return "MC";
        };

        const parseQuestionCode = (code) => {
            const match = code.match(/.*?(\d+)(?:[.\-_ ]?([a-zA-Z]+|[0-9]+))?/);
            if (match) {
                const main = match[1];
                let sub = match[2];
                if (sub === main) sub = null;
                return { main: main, sub: sub || null };
            }
            return { main: code, sub: null };
        };

        const toChar = (val) => {
            if (!val) return 'a';
            if (!isNaN(val)) return String.fromCharCode(96 + parseInt(val)); // 1->a, 2->b
            return val.toLowerCase();
        };

        // ==========================================
        // 2. AI ADAPTER
        // ==========================================
        const AIAdapter = {
            getConfig: () => ({
                geminiKeys: JSON.parse(localStorage.getItem('global_gemini_keys') || "[]"),
                groqKeys: JSON.parse(localStorage.getItem('global_groq_keys') || "[]"),
                hfTokens: JSON.parse(localStorage.getItem('hf_tokens') || "[]"),
                geminiModel: localStorage.getItem('default_gemini_module') || 'gemini-2.5-flash',
                groqModel: localStorage.getItem('default_groq_model') || 'llama-3.3-70b-versatile',
                hfModels: {
                    speed: 'Qwen/Qwen2.5-1.5B-Instruct',
                    balanced: 'Qwen/Qwen2.5-7B-Instruct',
                    expert: 'Qwen/Qwen2.5-Math-7B-Instruct'
                }
            }),

            selectModel: (qType, qLevel) => {
                const { hfModels } = AIAdapter.getConfig();
                if (qType === 'MC' || qType === 'TF') return { id: hfModels.speed, name: 'Qwen 1.5B (Speed)' };
                if (qType === 'TL' && ['B', 'H'].includes(qLevel)) return { id: hfModels.balanced, name: 'Qwen 7B (Balanced)' };
                return { id: hfModels.expert, name: 'Qwen Math (Expert)' };
            },

            callGemini: async (payloadParts) => {
                const { geminiKeys, geminiModel } = AIAdapter.getConfig();
                if (!geminiKeys.length) throw new Error("Thiếu Gemini API Key!");

                // Danh sách model: ưu tiên model user chọn, sau đó fallback xuống model ổn định hơn
                const fallbackModels = [geminiModel];
                if (!fallbackModels.includes('gemini-2.5-flash')) fallbackModels.push('gemini-2.5-flash');

                for (const currentModel of fallbackModels) {
                    const shuffledKeys = [...geminiKeys].sort(() => Math.random() - 0.5);
                    const maxAttempts = Math.max(shuffledKeys.length, 3);
                    let allFailed503 = true; // Theo dõi xem tất cả key đều lỗi 503 không

                    for (let i = 0; i < maxAttempts; i++) {
                        const currentKey = shuffledKeys[i % shuffledKeys.length];
                        try {
                            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${currentKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: payloadParts }] }) });

                            if (!res.ok) {
                                const errRaw = await res.json();
                                const errMsg = errRaw.error?.message || `HTTP Lỗi ${res.status}`;

                                if (res.status === 429 || res.status >= 500) {
                                    console.warn(`[${currentModel}] Key ${currentKey.substring(0, 6)}... lỗi ${res.status}. Thử key/model tiếp...`);
                                    await new Promise(r => setTimeout(r, 1500));
                                    continue;
                                }
                                throw new Error(errMsg);
                            }

                            allFailed503 = false;
                            const data = await res.json();
                            if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                                const parts = data.candidates[0].content.parts;
                                const answerPart = [...parts].reverse().find(p => !p.thought && p.text) || parts[parts.length - 1];
                                if (currentModel !== geminiModel) {
                                    console.log(`✅ Đã dùng model dự phòng: ${currentModel}`);
                                }
                                return answerPart.text;
                            }
                            throw new Error("Invalid Response Format from Gemini");

                        } catch (e) {
                            if (!e.message.includes("HTTP Lỗi") && !e.message.includes("Invalid Response Format")) {
                                await new Promise(r => setTimeout(r, 1500));
                            } else {
                                await new Promise(r => setTimeout(r, 1000));
                                if (i === maxAttempts - 1) break; // Thoát vòng key, thử model tiếp
                            }
                        }
                    }
                    // Nếu model này hết key mà vẫn lỗi, chuyển sang model dự phòng
                    if (currentModel !== fallbackModels[fallbackModels.length - 1]) {
                        console.warn(`⚠️ Model ${currentModel} quá tải. Chuyển sang model dự phòng...`);
                    }
                }
                throw new Error("Tất cả Gemini API Keys và Models đều báo lỗi hoặc quá tải (Quota).");
            },

            callGroq: async (payloadParts) => {
                const { groqKeys, groqModel } = AIAdapter.getConfig();
                if (!groqKeys.length) throw new Error("Thiếu Groq API Key! Vui lòng cấu hình ở Dashboard.");

                const hasImage = payloadParts.some(p => p.inlineData);
                const actualModel = hasImage ? 'meta-llama/llama-4-scout-17b-16e-instruct' : groqModel;

                const groqContent = payloadParts.map(p => {
                    if (p.text) return { type: "text", text: p.text };
                    if (p.inlineData) return {
                        type: "image_url",
                        image_url: { url: `data:${p.inlineData.mimeType};base64,${p.inlineData.data}` }
                    };
                    return { type: "text", text: "" };
                });

                const payload = {
                    model: actualModel,
                    messages: [{ role: "user", content: groqContent }],
                    temperature: 0.5
                };

                const shuffledKeys = [...groqKeys].sort(() => Math.random() - 0.5);
                const maxAttempts = Math.max(shuffledKeys.length, 3);

                for (let i = 0; i < maxAttempts; i++) {
                    const currentKey = shuffledKeys[i % shuffledKeys.length];
                    try {
                        const res = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${currentKey}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!res.ok) {
                            if (res.status === 429 || res.status >= 500) {
                                console.warn(`[Groq] Key ${currentKey.substring(0, 6)}... lỗi quota/rate_limit. Đang tự động đổi key khác...`);
                                await new Promise(r => setTimeout(r, 1500));
                                continue;
                            }
                            throw new Error(`Groq Lỗi ${res.status}: ${await res.text()}`);
                        }

                        const data = await res.json();
                        if (data.choices && data.choices[0] && data.choices[0].message) {
                            return data.choices[0].message.content;
                        }
                        throw new Error("Invalid Response Format from Groq");
                    } catch (e) {
                        if (i === maxAttempts - 1) throw e;
                        await new Promise(r => setTimeout(r, 1000));
                    }
                }
                throw new Error("Tất cả Groq API Keys đều báo lỗi hoặc hết Quota. Vui lòng thêm key mới.");
            },

            callHF: async (promptText, specificModel = null) => {
                const { hfTokens, hfModels } = AIAdapter.getConfig();
                if (!hfTokens.length) throw new Error("Thiếu HuggingFace Token!");
                const modelToUse = specificModel || hfModels.expert;
                const token = hfTokens[Math.floor(Math.random() * hfTokens.length)];
                const formattedPrompt = `<| im_start |> system\nBạn là trợ lý Toán học.CHỈ trả về JSON thuần, không markdown, không giải thích thêm.<| im_end |>\n <| im_start |> user\n${promptText}<| im_end |>\n <| im_start |> assistant\n`;
                for (let i = 0; i < 2; i++) {
                    try {
                        const res = await fetch(`https://api-inference.huggingface.co/models/${modelToUse}`, {
                            method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ inputs: formattedPrompt, parameters: { max_new_tokens: 1024, temperature: 0.5, return_full_text: false } })
                        });
                        if (!res.ok) { if (res.status === 503) { await new Promise(r => setTimeout(r, 5000)); continue; } throw new Error(`HF Error ${res.status}`); }
                        const data = await res.json();
                        if (Array.isArray(data) && data[0]?.generated_text) return data[0].generated_text;
                        throw new Error("HF invalid response");
                    } catch (e) { await new Promise(r => setTimeout(r, 1500)); }
                }
                throw new Error("HF API Failed");
            }
        };

        // ==========================================
        // 3. MAIN APP
        // ==========================================
        const App = () => {
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState("");
            const [info, setInfo] = useState({ dept: "SỞ GIÁO DỤC VÀ ĐÀO TẠO", school: "TRƯỜNG THPT/THCS", title: "KIỂM TRA", time: "90", subject: "Toán", grade: "9" });
            const [images, setImages] = useState([]);
            const [blueprint, setBlueprint] = useState(null);
            const [hfStatus, setHfStatus] = useState(false);
            const [totalScoreWarning, setTotalScoreWarning] = useState(null);
            const [globalType, setGlobalType] = useState("MC");
            const [viewFilter, setViewFilter] = useState("ALL");
            const [generatingState, setGeneratingState] = useState({ isRunning: false, current: 0, total: 0, text: "" });
            const [showPreview, setShowPreview] = React.useState(false);
            const [showKhoDeModal, setShowKhoDeModal] = useState(false);
            const [savedExamsList, setSavedExamsList] = useState([]);
            const [loadingKhoDe, setLoadingKhoDe] = useState(false);

            const [matrixFile, setMatrixFile] = useState(null);
            const [specFile, setSpecFile] = useState(null);
            const [aiProvider, setAiProvider] = useState("gemini"); // Thêm state cho AI Provider

            const [matrixConfig, setMatrixConfig] = useState({
                useConfig: false,
                mc: { q: 12, s: 12 },
                tf: { q: 4, s: 4 },
                tln: { q: 6, s: 6 },
                tl: { q: 2, s: 2 }
            });

            useEffect(() => {
                setHfStatus(AIAdapter.getConfig().hfTokens.length > 0);
                const config = AIAdapter.getConfig();
                if (config.groqKeys.length > 0 && config.geminiKeys.length === 0) {
                    setAiProvider("groq");
                }
            }, []);
            const hasGemini = AIAdapter.getConfig().geminiKeys.length > 0;
            const hasGroq = AIAdapter.getConfig().groqKeys.length > 0;

            const callPrimaryAI = async (payloadParts) => {
                if (aiProvider === 'groq') {
                    return await AIAdapter.callGroq(payloadParts);
                }
                return await AIAdapter.callGemini(payloadParts);
            };

            // ============================================================
            // HÀM TÁI PHÂN PHỐI SPEC: Chạy SAU khi AI trả kết quả.
            // Tách các ý bị AI gộp vào 1 câu thành mảng rồi rải đều
            // cho TẤT CẢ câu hỏi trong section theo đúng config đã nhập.
            // ============================================================
            const redistributeSpecs = (sections, config) => {
                if (!config || !config.useConfig) return sections;

                const sectionMapping = {
                    'PHẦN I': config.mc,
                    'PHẦN II': config.tf,
                    'PHẦN III': config.tln,
                    'TỰ LUẬN': config.tl
                };

                return sections.map(sec => {
                    const secNameUpper = (sec.name || '').toUpperCase();
                    let matchedCfg = null;
                    for (const [key, val] of Object.entries(sectionMapping)) {
                        if (secNameUpper.includes(key)) { matchedCfg = val; break; }
                    }

                    if (!matchedCfg) return sec;

                    const qCount = sec.questions.length;
                    if (qCount <= 0) return sec;

                    // === KIỂM TRA: Có cần phân phối lại không? ===
                    // Chỉ kích hoạt khi AI dumped toàn bộ spec vào 1 câu và những câu còn lại rỗng
                    const emptyCount = sec.questions.filter(q => !(q.spec || '').trim()).length;
                    const totalSpecLen = sec.questions.reduce((sum, q) => sum + (q.spec || '').length, 0);
                    const maxSpecLen = Math.max(...sec.questions.map(q => (q.spec || '').length));

                    // Không phân phối nếu:
                    // 1) Tất cả câu đều có spec (mỗi câu ít nhất 15 ký tự) → AI đã làm đúng
                    // 2) Chỉ 1 câu rỗng trong tổng số nhiều câu
                    const allHaveSpec = emptyCount === 0;
                    const mostlyFilled = emptyCount <= 1 && qCount > 2;
                    if (allHaveSpec || mostlyFilled) return sec; // Giữ nguyên, không sờ vào

                    // === Chỉ khi phát hiện dump pattern: nhiều câu rỗng, 1 câu ôm hết ===
                    // Ghép toàn bộ spec từ câu có spec dài nhất (câu bị dump vào)
                    const dumpedQ = sec.questions.find(q => (q.spec || '').length === maxSpecLen);
                    if (!dumpedQ || maxSpecLen < 20) return sec;

                    const rawText = (dumpedQ.spec || '').trim();

                    // Tách ra theo các quy ước phổ biến trong đặc tả VN
                    const splitSpecs = rawText
                        .split(/[;\n]/)
                        .map(line => line.replace(/^[\s\-•*\d+.]+/, '').trim())
                        .filter(line => line.length > 8);

                    if (splitSpecs.length <= 1) return sec; // Không tách được

                    // Phân bổ: 1 ý cho 1 câu (ưu tiên theo thứ tự), câu cuối nhận phần còn dư
                    const newQuestions = sec.questions.map((q, idx) => {
                        if (splitSpecs[idx] !== undefined) {
                            return { ...q, spec: splitSpecs[idx] };
                        }
                        return q; // Giữ nguyên nếu không còn ý
                    });

                    // Gộp phần dư vào câu cuối nếu còn dư
                    if (splitSpecs.length > qCount) {
                        newQuestions[qCount - 1].spec = splitSpecs.slice(qCount - 1).join('; ');
                    }

                    return { ...sec, questions: newQuestions };
                });
            };

            const generateExpectedCodes = () => {
                if (!matrixConfig.useConfig) return "";
                let txt = "⚠️ YÊU CẦU ĐẶC BIỆT TỪ NGƯỜI DÙNG: ĐỀ THI ĐÃ ĐƯỢC CHỐT TRƯỚC SỐ LƯỢNG JSON VÀ ĐÁNH SỐ THỨ TỰ NHƯ SAU. BẠN PHẢI TẠO RA ĐÚNG SỐ LƯỢNG OBJECT TRONG MẢNG QUESTIONS:\n";
                let currentNum = 1;

                // MC process
                const mcQ = parseInt(matrixConfig.mc.q) || 0;
                const mcS = parseInt(matrixConfig.mc.s) || 0;
                if (mcQ > 0) {
                    txt += `- PHẦN I. Câu trắc nghiệm nhiều phương án lựa chọn: BẠN PHẢI TẠO ĐÚNG ${mcQ} OBJECTS (JSON items). Mã từ "Câu ${currentNum}" đến "Câu ${currentNum + mcQ - 1}".\n`;
                    if (mcS !== mcQ && mcS > 0) {
                        txt += `   -> LƯU Ý CỰC KỲ QUAN TRỌNG: Phần này có ${mcS} ý đặc tả trong bảng nhưng chỉ làm thành ${mcQ} items. KHÔNG ĐƯỢC VỨT BỎ BẤT KỲ Ý NÀO. Bắt buộc phải GỘP CHUNG nhiều ý vào trường "spec" của các item nếu thiếu chỗ. (VD: Câu 1 chứa 2 ý).\n`;
                    }
                    currentNum += mcQ;
                }

                // TF process
                const tfQ = parseInt(matrixConfig.tf.q) || 0;
                const tfS = parseInt(matrixConfig.tf.s) || 0;
                if (tfQ > 0) {
                    const tfPerBig = tfS > 0 ? Math.ceil(tfS / tfQ) : 4;
                    const tfLetters = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'].slice(0, tfPerBig);
                    txt += `- PHẦN II. Câu trắc nghiệm đúng sai: Gồm ${tfQ} ĐẠI CÂU (mỗi đại câu có ĐÚNG ${tfPerBig} CÂU NHỎ: ${tfLetters.join(', ')}).\n`;
                    txt += `   -> YÊU CẦU BẮT BUỘC: Tạo ra ĐÚNG ${tfS > 0 ? tfS : tfQ * 4} JSON OBJECTS. DANH SÁCH MÃ KÈM SỐ THỨ TỰ:\n`;
                    let tfN = currentNum;
                    for (let i = 0; i < tfQ; i++) {
                        const codes = tfLetters.map(l => `"Câu ${tfN}${l}"`).join(', ');
                        txt += `      Đại câu ${tfN}: ${codes}\n`;
                        tfN++;
                    }
                    txt += `   -> Rải đều ${tfS > 0 ? tfS : tfQ * 4} ý đặc tả vào đúng ${tfS > 0 ? tfS : tfQ * 4} objects này, mỗi object 1 ý.\n`;
                    currentNum += tfQ;
                }

                // TLN process
                const tlnQ = parseInt(matrixConfig.tln.q) || 0;
                const tlnS = parseInt(matrixConfig.tln.s) || 0;
                if (tlnQ > 0) {
                    txt += `- PHẦN III. Câu trắc nghiệm trả lời ngắn: BẠN PHẢI TẠO ĐÚNG ${tlnQ} OBJECTS. Mã từ "Câu ${currentNum}" đến "Câu ${currentNum + tlnQ - 1}".\n`;
                    if (tlnS !== tlnQ && tlnS > 0) {
                        txt += `   -> LƯU Ý: Phần này có ${tlnS} ý nhưng chỉ có ${tlnQ} items. GỘP CHUNG nhiều ý vào trường "spec" nếu thiếu chỗ.\n`;
                    }
                    currentNum += tlnQ;
                }

                // TL process
                const tlQ = parseInt(matrixConfig.tl.q) || 0;
                const tlS = parseInt(matrixConfig.tl.s) || 0;
                if (tlQ > 0) {
                    const tlPerBig = tlS > 0 ? Math.ceil(tlS / tlQ) : 1;
                    const tlLetters = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'].slice(0, tlPerBig);
                    txt += `- PHẦN TỰ LUẬN: Gồm ${tlQ} BÀI (mỗi bài có ĐÚNG ${tlPerBig} CÂU NHỎ: ${tlLetters.join(', ')}).\n`;
                    txt += `   -> YÊU CẦU BẮT BUỘC: Tạo ra ĐÚNG ${tlS > 0 ? tlS : tlQ} JSON OBJECTS. DANH SÁCH MÃ:\n`;
                    let tlN2 = currentNum;
                    for (let i = 0; i < tlQ; i++) {
                        const codes2 = tlLetters.map(l => `"Câu ${tlN2}${l}"`).join(', ');
                        txt += `      Bài ${tlN2}: ${codes2}\n`;
                        tlN2++;
                    }
                    txt += `   -> Mỗi object chứa đúng 1 ý đặc tả riêng biệt.\n`;
                }

                txt += "\nTRONG TOÀN BỘ QUÁ TRÌNH TRÍCH XUẤT, BẠN BẮT BUỘC PHẢI DỰA VÀO DANH SÁCH MÃ NÀY (CẢ NHỮNG MÃ CON A, B, C) ĐỂ LẬP RA SỐ LƯỢNG ITEM CHUẨN. KHÔNG ĐƯỢC TỰ BỊA RA MÃ MỚI. TUYỆT ĐỐI KHÔNG BỎ XÓT Ý NÀO MÀ CẦN GỘP HOẶC TÁCH CHO KHỚP VỚI CẤU TRÚC!\n";
                return txt;
            };

            // ============================================================
            // QUÉT LẠI CÂU BỊ THIẾU: Tự động dò tìm câu còn thiếu sau lần
            // trích xuất đầu. Chỉ cảnh báo nếu vẫn thiếu sau khi quét lại.
            // ============================================================
            const findMissingQuestions = async (finalJson, imgs, setLoadingMsgFn) => {
                if (!matrixConfig.useConfig) return finalJson;

                // Tính danh sách mã câu kỳ vọng từ config
                const buildExpectedCodes = () => {
                    const codes = [];
                    let n = 1;
                    const mcQ = parseInt(matrixConfig.mc.q) || 0;
                    const tfQ = parseInt(matrixConfig.tf.q) || 0;
                    const tfS = parseInt(matrixConfig.tf.s) || 0;
                    const tlnQ = parseInt(matrixConfig.tln.q) || 0;
                    const tlQ = parseInt(matrixConfig.tl.q) || 0;
                    const tlS = parseInt(matrixConfig.tl.s) || 0;
                    for (let i = 0; i < mcQ; i++) codes.push({ code: `Câu ${n++}`, type: 'MC' });
                    for (let i = 0; i < tfQ; i++) {
                        const base = n++;
                        const perBig = Math.ceil(tfS / tfQ);
                        const letters = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'].slice(0, (tfS > 0 ? perBig : 1));
                        letters.forEach(l => codes.push({ code: `Câu ${base}${l}`, type: 'TF' }));
                    }
                    for (let i = 0; i < tlnQ; i++) codes.push({ code: `Câu ${n++}`, type: 'TLN' });
                    for (let i = 0; i < tlQ; i++) {
                        const base = n++;
                        const perBig = Math.ceil(tlS / tlQ);
                        const letters = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'].slice(0, (tlS > 0 ? perBig : 1));
                        letters.forEach(l => codes.push({ code: `Câu ${base}${l}`, type: 'TL' }));
                    }
                    return codes;
                };

                const expectedCodes = buildExpectedCodes();
                const existingCodes = new Set();
                finalJson.sections.forEach(sec => (sec.questions || []).forEach(q => {
                    existingCodes.add((q.code || '').toLowerCase().replace(/\s/g, ''));
                }));

                const missingCodes = expectedCodes.filter(ec =>
                    !existingCodes.has(ec.code.toLowerCase().replace(/\s/g, ''))
                );

                if (missingCodes.length === 0) return finalJson; // Không thiếu gì

                setLoadingMsgFn(`Phát hiện ${missingCodes.length} câu bị thiếu. Đang quét lại toàn bộ tài liệu để tìm...`);

                const missingList = missingCodes.map(c => `"${c.code}" (${c.type})`).join(', ');
                const retryPrompt = `Bạn là CHUYÊN GIA TÌM KIẾM CÂU HỎI BỊ THIẾU.
Trong lần trích xuất trước, hệ thống không tìm thấy các câu sau: ${missingList}.
Nhiệm vụ: Quét TOÀN BỘ tài liệu được gửi kèm và CHỈ trả về thông tin của những câu trên.
Tuyệt đối không tạo câu mới không có trong tài liệu. Nếu không tìm thấy, trả về mảng rỗng [].

Cấu trúc JSON đầu ra:
{
  "sections": [
    {
      "name": "PHẦN I. Câu trắc nghiệm nhiều phương án lựa chọn",
      "questions": [
        { "code": "Câu X", "group": "", "topic": "...", "level": "B", "type": "MC", "score": 0.25, "spec": "...", "parts": [] }
      ]
    }
  ]
}`;

                let retryJson = null;
                try {
                    const payload = [{ text: retryPrompt }, ...imgs.map(d => ({ inline_data: { mime_type: 'image/jpeg', data: d } }))];
                    const res = await callPrimaryAI(payload);
                    const jsonMatch = res.match(/\{[\s\S]*\}/);
                    if (jsonMatch) retryJson = parseAIJson(jsonMatch[0]);
                } catch (err) { console.error('Lỗi quét lại câu thiếu:', err); }

                if (retryJson && retryJson.sections) {
                    // Merge kết quả quét lại vào finalJson
                    retryJson.sections.forEach(retrySec => {
                        const normName = (retrySec.name || '').toUpperCase();
                        let targetSec = finalJson.sections.find(s => {
                            const n = (s.name || '').toUpperCase();
                            return n.includes('PHẦN I') && normName.includes('PHẦN I') ||
                                n.includes('PHẦN II') && normName.includes('PHẦN II') ||
                                n.includes('PHẦN III') && normName.includes('PHẦN III') ||
                                n.includes('TỰ LUẬN') && normName.includes('TỰ LUẬN');
                        });
                        if (!targetSec) {
                            targetSec = { name: retrySec.name, questions: [] };
                            finalJson.sections.push(targetSec);
                        }
                        (retrySec.questions || []).forEach(q => {
                            const codeNorm = (q.code || '').toLowerCase().replace(/\s/g, '');
                            if (!existingCodes.has(codeNorm)) {
                                targetSec.questions.push(q);
                                existingCodes.add(codeNorm); // Tránh thêm trùng
                            }
                        });
                    });
                }

                // Kiểm tra lại sau retry - nếu còn thiếu thì mới cảnh báo
                const stillMissing = missingCodes.filter(ec =>
                    !existingCodes.has(ec.code.toLowerCase().replace(/\s/g, ''))
                );
                if (stillMissing.length > 0) {
                    console.warn(`[Thông báo] Sau khi quét lại, vẫn còn ${stillMissing.length} câu không tìm thấy:`, stillMissing.map(c => c.code).join(', '));
                    // Có thể hiển thị cảnh báo nhẹ ở UI nếu cần
                }

                return finalJson;
            };


            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const buffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(buffer).promise;
                    const imgs = [];
                    // Giải pháp tối ưu: Giảm scale xuống 1.5 và vẽ phông trắng để nén ảnh JPEG nhẹ hơn
                    // Tăng giới hạn số trang đọc lên 30 thay vì 15
                    for (let i = 1; i <= Math.min(pdf.numPages, 30); i++) {
                        const page = await pdf.getPage(i);
                        const vp = page.getViewport({ scale: 1.5 });
                        const cvs = document.createElement('canvas');
                        cvs.width = vp.width; cvs.height = vp.height;
                        const ctx = cvs.getContext('2d');
                        ctx.fillStyle = "white"; // Vẽ nền trắng tránh ảnh transparent lỗi đen
                        ctx.fillRect(0, 0, cvs.width, cvs.height);

                        await page.render({ canvasContext: ctx, viewport: vp }).promise;
                        // Dùng format jpeg nén 80% giảm dung lượng tối đa
                        imgs.push(cvs.toDataURL('image/jpeg', 0.8).split(',')[1]);
                    }
                    setImages(imgs);

                    let mergedSectionsMap = {};
                    const batchSize = 3;
                    const expectedConfigText = generateExpectedCodes();

                    for (let i = 0; i < imgs.length; i += batchSize) {
                        const startPage = i + 1;
                        const endPage = Math.min(imgs.length, i + batchSize);
                        const contextImgs = imgs.slice(i, endPage);

                        const prompt = `Bạn là CHUYÊN GIA BIÊN TẬP MA TRẬN ĐỀ THI.
TÔI VỪA GỬI CHO BẠN TỪ TRANG 1 ĐẾN TRANG ${endPage} CỦA MỘT TÀI LIỆU MA TRẬN VÀ ĐẶC TẢ.
(Sở dĩ tôi phải gửi từ đầu là để bạn TỰ đối chiếu mắt nhìn lại các trang trước xem "Tiêu đề cột của bảng hiện tại đang chạy ở trang này là gì", vì tài liệu thường có 2 bảng với tiêu đề cột khác nhau: Bảng Ma Trần và Bảng Đặc Tả).

NHIỆM VỤ CỐT LÕI CỦA LẦN CHẠY NÀY:
Bạn CHỈ ĐƯỢC PHÉP TRÍCH XUẤT các câu hỏi xuất hiện trong đoạn từ TRANG ${startPage} đến TRANG ${endPage}.
TUYỆT ĐỐI KHÔNG trích xuất các câu ở các trang trước đó, vì chúng đã được xử lý xong rồi!
NẾU BẢN CẤU TRÚC BÊN DƯỚI CÓ KHAI BÁO SỐ LƯỢNG CÂU HỎI Ở CÁC PHẦN, BẠN PHẢI BẢO ĐẢM TẠO RA ĐÚNG VÀ ĐỦ SỐ LƯỢNG CÂU ĐÓ NẾU CHÚNG NẰM TRONG TRANG NÀY, TUYỆT ĐỐI KHÔNG ĐƯỢC LƯỚT QUA HOẶC ĐẾM THIẾU.

${expectedConfigText}

Quy tắc Bóc tách Định dạng chuẩn:
1. Phân các câu TRONG TRANG ${startPage}-${endPage} vào sections tương ứng. Có 4 phần chuẩn: "PHẦN I. Câu trắc nghiệm nhiều phương án lựa chọn", "PHẦN II. Câu trắc nghiệm đúng sai", "PHẦN III. Câu trắc nghiệm trả lời ngắn", và "PHẦN TỰ LUẬN".
2. Đối chiếu bằng mắt từ các cột tiêu đề của trang trước đó để biết câu đang xét thuộc mức độ nào: "Nhận biết/Biết" -> B, "Thông hiểu/Hiểu" -> H, "Vận dụng/VD" -> V.
3. Loai câu: PHẦN I -> MC, PHẦN II -> TF, PHẦN III -> TLN, TỰ LUẬN -> TL.
4. Xử lý gộp mã câu: Nếu ô Đặc tả ghi "TN1, 2, 3", phải tách thành 3 câu độc lập có mã "TN1", "TN2", "TN3". Nếu ghi "TL19a, b" tách thành 2 câu "TL19a", "TL19b". NẾU ĐÃ KHAI BÁO CẤU TRÚC Ở TRÊN, PHẢI THAY BẰNG MÃ "Câu X" NHƯ DANH SÁCH.
5. QUAN TRỌNG VỀ PHÂN BỔ ĐẶC TẢ (spec): 
- NẾU BẠN NHẬN ĐƯỢC CẤU TRÚC YÊU CẦU BÊN TRÊN: Tuân thủ TÚYẾT ĐỐI THEO QUY TẮC Ở TRÊN (ví dụ: tách thành các JSON items độc lập dạng Câu 13a, 13b... đối với Đúng/Sai, Tự Luận; Hoặc gộp chung ý lại nếu số lượng câu hỏi ít hơn ý đối với Trắc Nghiệm). Tuyệt đối không vứt bỏ hay làm ngơ bất cứ ý nào.
- NẾU KHÔNG CÓ CẤU TRÚC SẴN: Đếm số lượng câu và số ý. Nếu số câu = số ý -> mỗi câu 1 ý. Nếu số câu < ý -> HÃY GỘP CÁC Ý LẠI CHUNG VỚI NHAU. TUYỆT ĐỐI KHÔNG BỎ XÓT Ý.
6. Chỉ trích xuất nội dung của trang ${startPage} đến ${endPage}. Nếu đoạn này không có mã câu hỏi nào (chỉ có chữ lý thuyết hoặc nội dung rỗng), trả về mảng sections rỗng [].

Cấu trúc JSON đầu ra Hợp lệ:
{
    "sections": [
        {
            "name": "PHẦN I. Câu trắc nghiệm nhiều phương án lựa chọn",
            "questions": [
                { "code": "Câu 1", "group": "", "topic": "Tên chủ đề/Nội dung...", "level": "B", "type": "MC", "score": 0.25, "spec": "Nhận biết được khái niệm...", "parts": [] }
            ]
        }
    ]
}`;

                        let batchJson = null;
                        for (let attempt = 1; attempt <= 3; attempt++) {
                            setLoading(true);
                            setLoadingMsg(`Đang phân tích trang ${startPage}-${endPage} (Lần ${attempt}). Vui lòng chờ...`);
                            try {
                                const payload = [{ text: prompt }];

                                // Gửi ẢNH TỪ TRANG 1 ĐÉN TRANG HIỆN TẠI ĐỂ AI CÓ ĐỦ BỐI CẢNH TIÊU ĐỀ CỘT TRƯỚC ĐÓ
                                contextImgs.forEach(d => payload.push({ inline_data: { mime_type: "image/jpeg", data: d } }));

                                const res = await callPrimaryAI(payload);
                                const jsonMatch = res.match(/\{[\s\S]*\}/);
                                if (!jsonMatch) continue;
                                batchJson = parseAIJson(jsonMatch[0]);
                                break; // Thành công thì thoát vòng lặp attempt
                            } catch (err) {
                                console.error(`Lỗi phân tích batch trang ${i + 1}:`, err);
                                await new Promise(r => setTimeout(r, 2000));
                            }
                        }

                        // Gộp dữ liệu từ batchJson vào cấu trúc map chung
                        if (batchJson && batchJson.sections) {
                            batchJson.sections.forEach(sec => {
                                let normName = sec.name.toUpperCase();
                                let targetName = sec.name;
                                if (normName.includes("PHẦN I")) targetName = "PHẦN I. Câu trắc nghiệm nhiều phương án lựa chọn";
                                else if (normName.includes("PHẦN II")) targetName = "PHẦN II. Câu trắc nghiệm đúng sai";
                                else if (normName.includes("PHẦN III")) targetName = "PHẦN III. Câu trắc nghiệm trả lời ngắn";
                                else if (normName.includes("TỰ LUẬN")) targetName = "PHẦN TỰ LUẬN";

                                if (!mergedSectionsMap[targetName]) {
                                    mergedSectionsMap[targetName] = { id: 'sec_' + Object.keys(mergedSectionsMap).length, name: targetName, questions: [] };
                                }

                                // Đẩy thêm data vào section tương ứng
                                (sec.questions || []).forEach(q => {
                                    // Kiểm tra trùng lặp nhẹ để tránh một câu bị quét dở ở 2 trang
                                    const exists = mergedSectionsMap[targetName].questions.some(eq => eq.code === q.code);
                                    if (!exists) {
                                        mergedSectionsMap[targetName].questions.push(q);
                                    }
                                });
                            });
                        }
                    }

                    // Sắp xếp lại Sections theo thứ tự chuẩn
                    const orderedSections = ["PHẦN I. Câu trắc nghiệm nhiều phương án lựa chọn", "PHẦN II. Câu trắc nghiệm đúng sai", "PHẦN III. Câu trắc nghiệm trả lời ngắn", "PHẦN TỰ LUẬN"];
                    let finalSections = [];
                    orderedSections.forEach(name => {
                        if (mergedSectionsMap[name] && mergedSectionsMap[name].questions.length > 0) {
                            finalSections.push(mergedSectionsMap[name]);

                    const jsonStr = await callPrimaryAI(payload);
                    const clean = jsonStr.replace(/```json/g, '').replace(/```/g, '').trim();
                    const match = clean.match(/\{[\s\S]*\}/);
                    if (!match) throw new Error("AI không trả về JSON hợp lệ");
                    const json = parseAIJson(match[0]);

                    const doneBp = { ...blueprint };
                    const tgt = doneBp.sections[sIdx].questions[qIdx];
                    tgt.q = json.q || '';
                    tgt.c = json.c || '';
                    tgt.correct_char = json.correct_char || '';
                    if (qData.type === 'MC') {
                        tgt.a = (json.a || []).map(opt => (opt || '').replace(/^[A-Da-d][.)\s]\s*/, ''));
                    } else if (qData.type === 'TF' && json.parts) {
                        tgt.parts = json.parts.map((p, i) => ({
                            label: p.label || String.fromCharCode(97 + i),
                            content: p.content,
                            is_correct: p.is_correct
                        }));
                        tgt.correct_char = tgt.parts.map(p => p.is_correct ? 'Đ' : 'S').join('-');
                    }
                    tgt.status = 'done';
                    tgt.source = 'OCR+Solve';
                    setBlueprint(doneBp);
                } catch (err) {
                    console.error("Paste OCR error:", err);
                    const errBp = { ...blueprint };
                    errBp.sections[sIdx].questions[qIdx].q = `Lỗi nhận diện: ${err.message}`;
                    errBp.sections[sIdx].questions[qIdx].status = 'error';
                    setBlueprint(errBp);
                }
            };

            const generateQuestion = async (sIdx, qIdx) => {

                const qData = blueprint.sections[sIdx].questions[qIdx];
                const newBp = { ...blueprint };

                // ── GROUPED GENERATION: TF/TL câu lớn (13a,13b,13c,13d → 1 AI call) ──
                if (qData.type === 'TF' || qData.type === 'TL') {
                    const parsedTarget = parseQuestionCode(qData.code);
                    const baseMain = parsedTarget.main;

                    // Tìm tất cả subs cùng câu lớn trong section
                    const groupIndices = [];
                    newBp.sections[sIdx].questions.forEach((q, idx) => {
                        const p = parseQuestionCode(q.code);
                        if (p.main === baseMain && q.type === qData.type) groupIndices.push(idx);
                    });

                    // Chỉ gom nếu thực sự có sub-codes (13a, 13b...)
                    const hasSubs = groupIndices.some(idx => parseQuestionCode(newBp.sections[sIdx].questions[idx].code).sub !== null);
                    if (!hasSubs) groupIndices.length = 0; // Treat as standalone

                    if (groupIndices.length > 1) {
                        // Mark all as generating
                        groupIndices.forEach(idx => { newBp.sections[sIdx].questions[idx].status = 'generating'; });
                        setBlueprint({ ...newBp });

                        // Collect all specs/topics from the group
                        const groupQs = groupIndices.map(idx => newBp.sections[sIdx].questions[idx]);
                        const combinedSpecs = groupQs.map((q, i) => {
                            const sub = parseQuestionCode(q.code).sub || String.fromCharCode(97 + i);
                            return `  ${sub}) ${q.spec}`;
                        }).join('\n');
                        const levelData = LEVELS_7991.find(l => l.code === groupQs[0].level) || LEVELS_7991[0];

                        const nSubs = groupIndices.length;
                        const subLabels = groupIndices.map((idx, i) => {
                            const sub = parseQuestionCode(newBp.sections[sIdx].questions[idx].code).sub;
                            return sub || String.fromCharCode(97 + i);
                        });

                        const promptGroup = qData.type === 'TF' ? `
Đóng vai Giáo viên môn ${info.subject} lớp ${info.grade}. Soạn 1 câu Đúng/Sai (PHẦN II) gồm ${nSubs} mệnh đề:
- Chủ đề: ${groupQs[0].topic} | Mức độ: ${levelData.prompt_key}
- Yêu cầu từng ý:
${combinedSpecs}
- LƯU Ý: TUYỆT ĐỐI KHÔNG viết câu chào hỏi hay lời dẫn nhập bài học. Câu dẫn (trường "q") phải bắt đầu thẳng vào bài toán.

YÊU CẦU:
1. Kiến thức KHÔNG vượt quá chương trình lớp ${info.grade}.
2. Viết 1 câu dẫn ngữ cảnh chung, rồi tạo đúng ${nSubs} mệnh đề (${subLabels.join(', ')}).
3. Mỗi mệnh đề phải rõ ràng là Đúng hoặc Sai.
4. Dùng LaTeX $...$ cho công thức.
5. Output CHỈ JSON:
{
  "q": "Câu dẫn chung...",
  "parts": [
    ${subLabels.map(l => `{"label": "${l}", "content": "Nội dung ý ${l}...", "is_correct": true}`).join(',\n    ')}
  ],
  "c": "Giải thích chi tiết từng ý ${subLabels.join(', ')}..."
}` : `
Đóng vai Giáo viên môn ${info.subject} lớp ${info.grade}. Soạn 1 bài Tự luận gồm ${nSubs} câu hỏi nhỏ:
- Chủ đề: ${groupQs[0].topic} | Mức độ: ${levelData.prompt_key}
- Yêu cầu từng câu nhỏ:
${combinedSpecs}

YÊU CẦU:
0. TUYỆT ĐỐI KHÔNG viết câu chào hỏi hay lời dẫn nhập bài học. Trường "q" phải bắt đầu thẳng vào bài toán/đề bài.
1. Kiến thức KHÔNG vượt quá chương trình lớp ${info.grade}.
2. Viết 1 bài toán/đề bài lớn (ngữ cảnh chung), rồi chia thành đúng ${nSubs} câu hỏi nhỏ (${subLabels.join(', ')}).
3. Mỗi câu nhỏ phải phát biểu rõ ràng yêu cầu riêng.
4. Dùng LaTeX $...$ cho công thức. Mô tả hình vẽ bằng chữ.
5. Output CHỈ JSON:
{
  "q": "Đề bài/ngữ cảnh chung...",
  "sub_parts": [
    ${subLabels.map(l => `{"label": "${l}", "q": "Câu hỏi ${l}...", "c": "Lời giải ${l}..."}`).join(',\n    ')}
  ],
  "c": "Lời giải tổng quát (nếu có)..."
}`;

                        try {
                            const payload = [{ text: promptGroup }];
                            const jsonStr = await callPrimaryAI(payload);
                            const clean = jsonStr.replace(/```json/g, '').replace(/```/g, '').trim();
                            const match = clean.match(/\{[\s\S]*\}/);
                            if (!match) throw new Error("Invalid JSON");
                            const json = parseAIJson(match[0]);

                            const finalBp2 = { ...blueprint };
                            if (qData.type === 'TF') {
                                const parts = (json.parts || []);
                                groupIndices.forEach((idx, i) => {
                                    const tgt = finalBp2.sections[sIdx].questions[idx];
                                    // All subs share the same câu dẫn (q) and solution (c)
                                    tgt.q = json.q || '';
                                    tgt.parts = parts.length > 0 ? parts.map((p, pi) => ({
                                        label: p.label || subLabels[pi] || String.fromCharCode(97 + pi),
                                        content: p.content,
                                        is_correct: p.is_correct
                                    })) : [];
                                    tgt.correct_char = tgt.parts.map(p => p.is_correct ? 'Đ' : 'S').join('-');
                                    tgt.c = json.c || '';
                                    tgt.status = 'done';
                                    tgt.source = 'Gemini (grouped)';
                                });
                            } else { // TL
                                const subParts = json.sub_parts || [];
                                groupIndices.forEach((idx, i) => {
                                    const tgt = finalBp2.sections[sIdx].questions[idx];
                                    const sp = subParts[i] || {};
                                    // Each sub gets its own question, but shares the đề bài context
                                    tgt.q = `${json.q || ''}\n\n${sp.label || subLabels[i]}) ${sp.q || ''}`.trim();
                                    tgt.c = sp.c || json.c || '';
                                    tgt.a = [];
                                    tgt.correct_char = '';
                                    tgt.status = 'done';
                                    tgt.source = 'Gemini (grouped)';
                                });
                            }
                            setBlueprint(finalBp2);
                        } catch (e) {
                            console.error("Grouped generation error:", e);
                            const errBp = { ...blueprint };
                            groupIndices.forEach(idx => {
                                errBp.sections[sIdx].questions[idx].status = 'error';
                                errBp.sections[sIdx].questions[idx].q = `Lỗi: ${e.message}`;
                            });
                            setBlueprint(errBp);
                            if (!generatingState.isRunning) alert(`Lỗi tạo câu hỏi nhóm: ${e.message}`);
                        }
                        return; // Done - grouped generation handled
                    }
                }

                // ── SINGLE GENERATION: MC, TLN, or standalone TF/TL ──
                const selectedModel = AIAdapter.selectModel(qData.type, qData.level);
                newBp.sections[sIdx].questions[qIdx].status = 'generating';
                setBlueprint(newBp);

                const levelData = LEVELS_7991.find(l => l.code === qData.level) || LEVELS_7991[0];
                const levelPromptKey = levelData.prompt_key;

                const promptText = `
                    Đóng vai Giáo viên môn ${info.subject} chuyên dạy lớp ${info.grade}. Soạn câu hỏi:
                    - Chủ đề: ${qData.topic} | Mức độ: ${levelPromptKey} | Loại: ${qData.type} | Đặc tả (mỗi câu một ý): ${qData.spec} ${qData.group ? `| Nhóm: ${qData.group}` : ""}
                    YÊU CẦU THEO CHUẨN ĐỀ THI BỘ GDĐT:
                    0. TUYỆT ĐỐI KHÔNG viết câu chào hỏi ("Chào các em..."), lời dẫn nhập bài học, hay bất kỳ câu giới thiệu ngữ cảnh nào TRƯỚC câu hỏi. Nội dung trường "q" phải bắt đầu NGAY VÀO bài toán/đề bài.
                    1. RÀNG BUỘC KIẾN THỨC: Kiến thức sử dụng để ra đề và giải bài KHÔNG ĐƯỢC VƯỢT QUÁ chương trình giáo dục phổ thông hiện hành của môn ${info.subject} lớp ${info.grade}. TUYỆT ĐỐI KHÔNG dùng kiến thức hoặc phương pháp của lớp trên để giải cho lớp dưới (VD: Không dùng đạo hàm lớp 11/12 để giải bài lớp 9).
                    2. Định dạng: Dùng LaTeX $...$ thay vì chữ viết thường. Hệ PT dùng \\begin{cases} ... \\\\ ... \\end{cases}.
                    3. Nếu là Trắc nghiệm (MC - PHẦN I), chỉ 4 đáp án (A, B, C, D), chỉ rõ đáp án đúng (A/B/C/D).
                    4. NẾU LÀ ĐÚNG/SAI (TF - PHẦN II), BẮT BUỘC tạo 1 câu dẫn chung và 4 CÂU ĐỘC LẬP (a, b, c, d) dạng mệnh đề có tính Đúng hoặc Sai. CHỈ RÕ GIÁ TRỊ CHÂN LÝ.
                    5. NẾU LÀ TRẢ LỜI NGẮN (TLN), KHÔNG cho đáp án trắc nghiệm. BẮT BUỘC ĐỀ BÀI (TRƯỜNG 'q') PHẢI ĐƯỢC DIỄN ĐẠT SAO CHO KẾT QUẢ ĐẦU RA LÀ BẰNG SỐ CỤ THỂ HOẶC PHÂN SỐ. Học sinh chỉ cần điền KẾT QUẢ CUỐI CÙNG. CHÚ Ý: "correct_char" CHỈ ĐƯỢC CHỨA MỘT CON SỐ HOẶC PHÂN SỐ (VD: 5, -1/2, 3.14), TUYỆT ĐỐI KHÔNG GHI THÊM BAO GỒM CHỮ TỰ DO, KHÔNG CHỨA CÔNG THỨC DÀI DÒNG KÈM DẤU "=" NHƯ "x=5" HAY "S=5". CHỈ GHI SỐ CUỐI CÙNG!
                    6. NẾU LÀ TỰ LUẬN (TL), yêu cầu học sinh trình bày lời giải chi tiết.
                    7. CÂU HỎI CHÙM (BẢO TOÀN NGỮ CẢNH): Nếu câu hỏi hiện tại là một ý phụ (ví dụ mã câu là 19a, 19b...), bạn PHẢI tự động nhắc lại toàn bộ "Câu dẫn / Ngữ cảnh chung" của bài toán lớn lên đầu nội dung câu hỏi (Ví dụ: "Cho tứ giác ABCD... Phát biểu: Tính góc A"). Không được phép viết cụt lủn thân câu hỏi khiến người đọc không hiểu bài toán gốc.
                    8. QUAN TRỌNG VỀ HÌNH VẼ: Tuyệt đối không được ra đề bằng những câu lệnh chung chung như "sử dụng hình vẽ sau đây" mà không có hình. Nếu đề bài cần hình vẽ minh hoạ, bạn BẮT BUỘC VÀ LUÔN LUÔN phải mô tả lại hình học đó dưới dạng CHỮ HOẶC KÍ HIỆU CHI TIẾT (Ví dụ: "Cho tam giác ABC vuông tại A, đường cao AH, trên cạnh BC lấy điểm D sao cho BD = 3cm") ngay trực tiếp vào nội dung câu dẫn, để người ra đề dễ dàng tự vẽ lại chính xác 100% bằng mắt.
                    9. Output: CHỈ JSON THUẦN TÚY, KHÔNG GIẢI THÍCH, KHÔNG MARKDOWN.

                    // === CẤU TRÚC JSON THEO LOẠI (CHỈ TRẢ VỀ JSON) ===
                    ${qData.type === 'TF' ? `
                    {
                        "q": "Nội dung câu dẫn...",
                        "parts": [
                            {"content": "Ý a", "is_correct": true},
                            {"content": "Ý b", "is_correct": false},
                            {"content": "Ý c", "is_correct": false},
                            {"content": "Ý d", "is_correct": true}
                        ],
                        "c": "Lời giải/Giải thích chi tiết cho từng ý a, b, c, d"
                    }
                    ` : qData.type === 'TLN' ? `
                    {
                        "q": "Nội dung câu hỏi (Yêu cầu TÌM MỘT ĐẠI LƯỢNG SỐ CỤ THỂ, học sinh chỉ cần điền đáp án cuối)...",
                        "a": [],
                        "c": "Lời giải chi tiết...",
                        "correct_char": "Chỉ đúng 1 con số cuối cùng, KHÔNG CÓ CÔNG THỨC HAY CHỮ DƯ THỪA (VD: 5, -1/2)"
                    }
                    ` : qData.type === 'TL' ? `
                    {
                        "q": "Nội dung câu hỏi tự luận (có thể dài và có câu dẫn)...",
                        "a": [],
                        "c": "Lời giải chi tiết từng bước...",
                        "correct_char": ""
                    }
                    ` : `
                    { 
                        "q": "Nội dung câu hỏi...", 
                        "a": ["A...", "B...", "C...", "D..."], 
                        "c": "Lời giải...", 
                        "correct_char": "A" 
                    }
                    `}
                `;

                try {
                    let jsonStr = "", usedSource = "Gemini";

                    // Retry thông minh: thêm cụm nhắc nhở khác nhau mỗi lần để phá vòng lặp error
                    const retryHints = [
                        "", // Lần 1: prompt gốc
                        "\n\n[QUAN TRỌNG: CHỈ TRẢ VỀ JSON THUẦN TÚY, KHÔNG CÓ BẤT KỲ TEXT NÀO KHÁC. KHÔNG DÙNG MARKDOWN.]",
                        "\n\n[LƯU Ý: Hãy trả lời NGẮN GỌN hơn. Output CHỈ chứa 1 object JSON duy nhất, BẮT ĐẦU bằng { và KẾT THÚC bằng }.]"
                    ];
                    let lastError = null;
                    let success = false;

                    for (let retry = 0; retry < retryHints.length; retry++) {
                        try {
                            const currentPrompt = promptText + retryHints[retry];
                            const textOnlyPayload = [{ text: currentPrompt }];
                            if (AIAdapter.getConfig().hfTokens.length > 0) {
                                try {
                                    jsonStr = await AIAdapter.callHF(currentPrompt, selectedModel.id);
                                    usedSource = selectedModel.name;
                                } catch (hfErr) {
                                    jsonStr = await callPrimaryAI(textOnlyPayload);
                                    usedSource = "Gemini (Backup)";
                                }
                            } else {
                                jsonStr = await callPrimaryAI(textOnlyPayload);
                            }

                            const cleanJsonStr = jsonStr.replace(/```json/g, '').replace(/```/g, '').trim();
                            const jsonMatch = cleanJsonStr.match(/\{[\s\S]*\}/);
                            if (!jsonMatch) throw new Error("AI trả về không chứa JSON hợp lệ");
                            const json = parseAIJson(jsonMatch[0]);

                            const finalBp = { ...blueprint };
                            const target = finalBp.sections[sIdx].questions[qIdx];

                            if (qData.type === 'TF') {
                                target.parts = json.parts?.map((p, i) => ({
                                    label: p.label || String.fromCharCode(97 + i),
                                    content: p.content,
                                    is_correct: p.is_correct
                                })) || [];
                                target.q = json.q;
                                target.c = json.c;
                                target.correct_char = (json.parts || []).map(p => p.is_correct ? 'Đ' : 'S').join('-');
                            } else {
                                target.q = json.q;
                                target.a = (json.a || []).map(opt => (opt || '').replace(/^[A-Da-d][.)\s]\s*/, ''));
                                target.c = json.c || "";
                                target.correct_char = json.correct_char || "";
                            }

                            target.status = 'done'; target.source = usedSource;
                            console.log(`[DEBUG generateQuestion] SUCCESS qIdx=${qIdx} q_preview=${(target.q || '').substring(0, 60)}`);
                            setBlueprint(finalBp);
                            success = true;
                            break; // Thoát vòng retry khi thành công

                        } catch (retryErr) {
                            lastError = retryErr;
                            if (retry < retryHints.length - 1) {
                                console.warn(`⚠️ Lần thử ${retry + 1} thất bại: ${retryErr.message}. Thử lại với prompt khác...`);
                                await new Promise(r => setTimeout(r, 1000));
                            }
                        }
                    }

                    // Nếu tất cả retry đều thất bại
                    if (!success) {
                        throw lastError || new Error("Không thể tạo câu hỏi sau nhiều lần thử");
                    }

                } catch (e) {
                    console.error("Lỗi khi tạo câu hỏi:", e);
                    const errBp = { ...blueprint };
                    errBp.sections[sIdx].questions[qIdx].status = 'error';
                    errBp.sections[sIdx].questions[qIdx].source = "ERR";
                    errBp.sections[sIdx].questions[qIdx].q = `Lỗi: ${e.message}`;
                    setBlueprint(errBp);

                    if (!generatingState.isRunning) {
                        alert(`Lỗi tạo câu hỏi: ${e.message}`);
                    }
                }
            };

            const generateAll = async () => {
                if (!confirm(`Hệ thống sẽ tạo nội dung tuần tự cho các câu hỏi còn thiếu. Tiếp tục?`)) return;

                let totalQ = 0;
                blueprint.sections.forEach(s => s.questions.forEach(q => { if (q.status !== 'done') totalQ++; }));

                if (totalQ === 0) {
                    alert("Tất cả câu hỏi đã được tạo hoàn tất!");
                    return;
                }

                setGeneratingState({ isRunning: true, current: 0, total: totalQ, text: "Đang khởi tạo..." });
                let currentQ = 0;
                const processedGroups = new Set();

                // === LƯỢT 1: Tạo tuần tự tất cả câu hỏi ===
                for (let s = 0; s < blueprint.sections.length; s++) {
                    for (let q = 0; q < blueprint.sections[s].questions.length; q++) {
                        const qObj = blueprint.sections[s].questions[q];
                        if (qObj.status === 'done') continue;

                        const parsed = parseQuestionCode(qObj.code);
                        if ((qObj.type === 'TF' || qObj.type === 'TL') && parsed.sub !== null) {
                            const groupKey = `${s}-${parsed.main}-${qObj.type}`;
                            if (processedGroups.has(groupKey)) continue;
                            processedGroups.add(groupKey);
                        }

                        currentQ++;
                        const qCode = qObj.code;
                        setGeneratingState(prev => ({ ...prev, current: currentQ, text: `Đang tạo ${qCode} (${currentQ}/${totalQ})...` }));

                        await generateQuestion(s, q);

                        if (currentQ < totalQ) {
                            if (aiProvider === 'groq') {
                                setGeneratingState(prev => ({ ...prev, text: `Đang tới câu ${currentQ}/${totalQ}...` }));
                            } else {
                                setGeneratingState(prev => ({ ...prev, text: `Nghỉ 3 giây chống quá tải... (Đang tới câu ${currentQ}/${totalQ})` }));
                                await new Promise(r => setTimeout(r, 3000));
                            }
                        }
                    }
                }

                // === LƯỢT RETRY: Thử lại các câu bị lỗi (quota/rate limit) ===
                const MAX_RETRIES = 2;
                for (let retry = 1; retry <= MAX_RETRIES; retry++) {
                    // Thu thập câu hỏi bị lỗi
                    const failedQuestions = [];
                    blueprint.sections.forEach((sec, sIdx) => {
                        sec.questions.forEach((q, qIdx) => {
                            if (q.status === 'error') {
                                failedQuestions.push({ sIdx, qIdx, code: q.code });
                            }
                        });
                    });

                    if (failedQuestions.length === 0) break; // Không còn lỗi → dừng

                    setGeneratingState(prev => ({ ...prev, text: `Chờ 10 giây trước khi thử lại ${failedQuestions.length} câu lỗi (lần ${retry}/${MAX_RETRIES})...` }));
                    await new Promise(r => setTimeout(r, 10000));

                    for (let i = 0; i < failedQuestions.length; i++) {
                        const { sIdx, qIdx, code } = failedQuestions[i];
                        const qObj = blueprint.sections[sIdx].questions[qIdx];
                        // Kiểm tra lại — có thể đã được xử lý bởi grouped generation
                        if (qObj.status === 'done') continue;

                        // Reset status về pending trước khi thử lại
                        qObj.status = 'pending';
                        qObj.q = '';

                        setGeneratingState(prev => ({ ...prev, text: `Thử lại ${code} (${i + 1}/${failedQuestions.length}, lần ${retry})...` }));

                        await generateQuestion(sIdx, qIdx);

                        if (i < failedQuestions.length - 1) {
                            if (aiProvider !== 'groq') {
                                await new Promise(r => setTimeout(r, 3000));
                            }
                        }
                    }
                }
