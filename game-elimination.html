<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Game 1: Loại Trực Tiếp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex {
            font-size: 1.1em;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .eliminated {
            animation: eliminateOut 0.5s ease-out forwards;
        }

        @keyframes eliminateOut {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(0.8);
                opacity: 0.3;
                filter: grayscale(100%);
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-red-50 to-pink-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Math Renderer
        const MathText = ({ text }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!text || !ref.current) return;
                let processed = text
                    .replace(/`([^`]+)`/g, '$$$1$$')
                    .replace(/\\\[(.+?)\\\]/g, '$$$$1$$')
                    .replace(/\\\((.+?)\\\)/g, '$$$1$$');
                if (processed.includes('\\') && !processed.includes('$')) processed = `$${processed}$`;
                const parts = processed.split(/($$[\s\S]+?$$|\$[\s\S]+?\$)/g);
                ref.current.innerHTML = "";
                parts.forEach(part => {
                    if (part.startsWith('$$') && part.endsWith('$$')) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(2, -2), span, { throwOnError: false, displayMode: true }); }
                        catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); }
                        catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else {
                        ref.current.appendChild(document.createTextNode(part));
                    }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        // Main Game Component
        const EliminationGame = () => {
            const [gameData, setGameData] = useState(null);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [players, setPlayers] = useState([]);
            const [playerAnswers, setPlayerAnswers] = useState({});
            const [showAnswer, setShowAnswer] = useState(false);
            const [gameOver, setGameOver] = useState(false);
            const [timeLeft, setTimeLeft] = useState(30);
            const [timerActive, setTimerActive] = useState(false);
            const [showInstructions, setShowInstructions] = useState(true);

            useEffect(() => {
                // Load game data from localStorage
                const data = localStorage.getItem('gameData');
                if (!data) {
                    alert('Không có dữ liệu game!');
                    window.location.href = 'trochoi.html';
                    return;
                }

                const parsed = JSON.parse(data);
                setGameData(parsed);

                // Initialize players (solo mode for MVP)
                setPlayers([
                    { id: 1, name: 'Bạn', eliminated: false, score: 0 }
                ]);
            }, []);

            useEffect(() => {
                if (timerActive && timeLeft > 0) {
                    const timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
                    return () => clearTimeout(timer);
                } else if (timeLeft === 0 && timerActive) {
                    // Time's up - check answers
                    handleShowAnswer();
                }
            }, [timeLeft, timerActive]);

            const startQuestion = () => {
                setShowAnswer(false);
                setPlayerAnswers({});
                setTimeLeft(30);
                setTimerActive(true);
            };

            const handlePlayerAnswer = (playerId, answerIndex) => {
                if (showAnswer) return;
                setPlayerAnswers({ ...playerAnswers, [playerId]: answerIndex });
            };

            const handleShowAnswer = () => {
                setTimerActive(false);
                setShowAnswer(true);

                // Check answers and eliminate wrong players
                const currentQuestion = gameData.content.questions[currentQuestionIndex];
                const correctAnswer = currentQuestion.answer;

                setPlayers(prev => prev.map(player => {
                    const playerAnswer = playerAnswers[player.id];
                    if (playerAnswer === undefined || playerAnswer !== correctAnswer) {
                        return { ...player, eliminated: true };
                    }
                    return { ...player, score: player.score + (timeLeft > 0 ? Math.floor(100 * (timeLeft / 30)) : 10) };
                }));
            };

            const handleNextQuestion = () => {
                // Check if all players eliminated
                const alivePlayers = players.filter(p => !p.eliminated);
                if (alivePlayers.length === 0) {
                    setGameOver(true);
                    return;
                }

                if (currentQuestionIndex < gameData.content.questions.length - 1) {
                    setCurrentQuestionIndex(currentQuestionIndex + 1);
                    startQuestion();
                } else {
                    setGameOver(true);
                }
            };

            if (!gameData) {
                return <div className="flex items-center justify-center min-h-screen">
                    <div className="text-2xl text-gray-600">Đang tải...</div>
                </div>;
            }

            if (gameOver) {
                const survivors = players.filter(p => !p.eliminated).sort((a, b) => b.score - a.score);
                const allEliminated = survivors.length === 0;

                return (
                    <div className="max-w-3xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-12 text-center">
                            <div className={`w-24 h-24 ${allEliminated ? 'bg-gray-100' : 'bg-yellow-100'} rounded-full flex items-center justify-center mx-auto mb-6`}>
                                <i className={`fas ${allEliminated ? 'fa-sad-tear' : 'fa-trophy'} text-5xl ${allEliminated ? 'text-gray-400' : 'text-yellow-500'}`}></i>
                            </div>
                            <h2 className="text-4xl font-bold mb-6 text-gray-800">
                                {allEliminated ? 'Tất cả bị loại!' : 'Kết thúc!'}
                            </h2>

                            {!allEliminated && (
                                <div className="space-y-4 mb-8">
                                    {survivors.map((player, idx) => (
                                        <div key={player.id} className="bg-gradient-to-r from-yellow-100 to-yellow-50 border-2 border-yellow-400 rounded-xl p-4">
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center gap-3">
                                                    <span className="text-3xl font-bold text-yellow-600">#{idx + 1}</span>
                                                    <span className="text-xl font-bold text-gray-800">{player.name}</span>
                                                </div>
                                                <span className="text-2xl font-bold text-yellow-600">{player.score}đ</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div className="flex gap-4 justify-center">
                                <button
                                    onClick={() => window.location.reload()}
                                    className="px-8 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 transition"
                                >
                                    <i className="fas fa-redo mr-2"></i>Chơi lại
                                </button>
                                <button
                                    onClick={() => window.location.href = 'trochoi.html'}
                                    className="px-8 py-3 bg-gray-600 text-white rounded-xl font-bold hover:bg-gray-700 transition"
                                >
                                    <i className="fas fa-home mr-2"></i>Về menu
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentQuestion = gameData.content.questions[currentQuestionIndex];

            // Instructions Modal
            if (showInstructions) {
                return (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-3xl font-bold text-red-700">
                                    <i className="fas fa-user-slash mr-3"></i>LOẠI TRỰC TIẾP
                                </h2>
                                <button onClick={() => setShowInstructions(false)} className="text-gray-500 hover:text-gray-700">
                                    <i className="fas fa-times text-2xl"></i>
                                </button>
                            </div>

                            <div className="space-y-4 text-gray-700">
                                <div className="bg-red-50 border-2 border-red-200 rounded-xl p-4">
                                    <h3 className="font-bold text-lg text-red-800 mb-2">
                                        <i className="fas fa-bullseye mr-2"></i>Mục tiêu
                                    </h3>
                                    <p>Kiểm tra bài cũ nhanh, tạo áp lực nhẹ. Ai trả lời sai sẽ bị loại ngay lập tức!</p>
                                </div>

                                <div>
                                    <h3 className="font-bold text-lg text-gray-800 mb-2">
                                        <i className="fas fa-gamepad mr-2"></i>Luật chơi
                                    </h3>
                                    <ul className="space-y-2 ml-6">
                                        <li className="flex items-start gap-2">
                                            <span className="text-red-600 font-bold">1.</span>
                                            <span>Mỗi câu hỏi có <strong>30 giây</strong> để trả lời</span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-red-600 font-bold">2.</span>
                                            <span>Chọn đáp án bằng cách <strong>click vào ô</strong></span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-red-600 font-bold">3.</span>
                                            <span>Click <strong>"Hiện đáp án"</strong> để kiểm tra kết quả</span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-red-600 font-bold">4.</span>
                                            <span><strong className="text-red-600">Trả lời SAI → BỊ LOẠI</strong> ngay lập tức!</span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-red-600 font-bold">5.</span>
                                            <span>Ai còn sống đến cuối → <strong className="text-green-600">THẮNG</strong></span>
                                        </li>
                                    </ul>
                                </div>

                                <div>
                                    <h3 className="font-bold text-lg text-gray-800 mb-2">
                                        <i className="fas fa-calculator mr-2"></i>Tính điểm
                                    </h3>
                                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 space-y-2">
                                        <p><strong>Điểm = 100 × (Thời gian còn lại / 30)</strong></p>
                                        <p className="text-sm">Ví dụ: Trả lời đúng khi còn 20s → 66 điểm</p>
                                        <p className="text-sm">Trả lời đúng khi còn 5s → 16 điểm</p>
                                    </div>
                                </div>

                                <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                                    <p className="text-sm">
                                        <i className="fas fa-lightbulb text-yellow-600 mr-2"></i>
                                        <strong>Mẹo:</strong> Trả lời nhanh để có điểm cao hơn, nhưng hãy cẩn thận - sai là loại ngay!
                                    </p>
                                </div>
                            </div>

                            <button
                                onClick={() => { setShowInstructions(false); startQuestion(); }}
                                className="w-full mt-6 py-4 bg-gradient-to-r from-red-600 to-pink-600 text-white rounded-xl font-bold text-lg hover:shadow-xl transition"
                            >
                                <i className="fas fa-play mr-2"></i>Bắt đầu chơi
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-5xl mx-auto p-6 fade-in">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex gap-2">
                            <button
                                onClick={() => window.location.href = 'trochoi.html'}
                                className="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition"
                            >
                                <i className="fas fa-arrow-left mr-2"></i>Thoát
                            </button>
                            <button
                                onClick={() => setShowInstructions(true)}
                                className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
                                title="Xem hướng dẫn"
                            >
                                <i className="fas fa-question-circle"></i>
                            </button>
                        </div>

                        <div className="text-center">
                            <h1 className="text-3xl font-bold text-red-700">
                                <i className="fas fa-user-slash mr-2"></i>LOẠI TRỰC TIẾP
                            </h1>
                            <div className="text-sm text-gray-600 mt-1">Câu {currentQuestionIndex + 1}/{gameData.content.questions.length}</div>
                        </div>

                        <div className={`px-6 py-3 rounded-xl font-bold text-2xl ${timeLeft <= 10 ? 'bg-red-600 text-white animate-pulse' : 'bg-blue-600 text-white'}`}>
                            <i className="fas fa-clock mr-2"></i>{timeLeft}s
                        </div>
                    </div>

                    {/* Players Status */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        {players.map(player => (
                            <div
                                key={player.id}
                                className={`p-4 rounded-xl border-2 transition ${player.eliminated
                                    ? 'bg-gray-100 border-gray-300 eliminated'
                                    : 'bg-white border-green-500'
                                    }`}
                            >
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-2">
                                        <i className={`fas ${player.eliminated ? 'fa-times-circle text-red-500' : 'fa-check-circle text-green-500'} text-2xl`}></i>
                                        <span className="font-bold text-lg">{player.name}</span>
                                    </div>
                                    <span className="text-xl font-bold">{player.score}đ</span>
                                </div>
                                {player.eliminated && (
                                    <div className="text-sm text-red-600 mt-1">Đã bị loại</div>
                                )}
                            </div>
                        ))}
                    </div>

                    {/* Question */}
                    <div className="bg-white rounded-3xl shadow-2xl p-8 mb-6">
                        <h3 className="text-2xl font-bold text-gray-800 mb-6">
                            <MathText text={currentQuestion.prompt} />
                        </h3>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {currentQuestion.choices.map((choice, idx) => {
                                const isSelected = playerAnswers[1] === idx;
                                const isCorrect = currentQuestion.answer === idx;

                                let className = "p-4 rounded-xl border-2 cursor-pointer transition font-medium ";

                                if (showAnswer) {
                                    if (isCorrect) {
                                        className += "bg-green-100 border-green-500 text-green-900";
                                    } else if (isSelected) {
                                        className += "bg-red-100 border-red-500 text-red-900";
                                    } else {
                                        className += "border-gray-200 opacity-50";
                                    }
                                } else {
                                    if (isSelected) {
                                        className += "bg-blue-100 border-blue-500";
                                    } else {
                                        className += "border-gray-300 hover:border-blue-400 hover:bg-blue-50";
                                    }
                                }

                                return (
                                    <button
                                        key={idx}
                                        onClick={() => handlePlayerAnswer(1, idx)}
                                        disabled={showAnswer}
                                        className={className}
                                    >
                                        <div className="flex items-center gap-3">
                                            <span className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center font-bold">
                                                {String.fromCharCode(65 + idx)}
                                            </span>
                                            <div className="flex-1 text-left">
                                                <MathText text={choice} />
                                            </div>
                                            {showAnswer && isCorrect && (
                                                <i className="fas fa-check-circle text-green-600 text-2xl"></i>
                                            )}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>

                        {showAnswer && currentQuestion.explanation && (
                            <div className="mt-6 p-4 bg-blue-50 border-2 border-blue-200 rounded-xl">
                                <div className="font-bold text-blue-800 mb-2">
                                    <i className="fas fa-lightbulb mr-2"></i>Giải thích:
                                </div>
                                <div className="text-gray-700">
                                    <MathText text={currentQuestion.explanation} />
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Actions */}
                    <div className="flex gap-4 justify-center">
                        {!showAnswer && (
                            <button
                                onClick={handleShowAnswer}
                                className="px-8 py-4 bg-yellow-500 text-white rounded-xl font-bold text-lg hover:bg-yellow-600 transition shadow-lg"
                            >
                                <i className="fas fa-eye mr-2"></i>Hiện đáp án
                            </button>
                        )}

                        {showAnswer && (
                            <button
                                onClick={handleNextQuestion}
                                className="px-8 py-4 bg-green-600 text-white rounded-xl font-bold text-lg hover:bg-green-700 transition shadow-lg"
                            >
                                <i className="fas fa-arrow-right mr-2"></i>Câu tiếp theo
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<EliminationGame />, document.getElementById('root'));
    </script>
</body>

</html>
