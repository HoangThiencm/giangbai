<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Game 1: Loại Trực Tiếp - Battle Royale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex {
            font-size: 1.1em;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .eliminated {
            animation: eliminateOut 0.8s ease-out forwards;
        }

        @keyframes eliminateOut {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }

            50% {
                transform: scale(1.1) rotate(5deg);
            }

            100% {
                transform: scale(0.9) rotate(-2deg);
                opacity: 0.4;
                filter: grayscale(100%);
            }
        }

        .player-thinking {
            animation: thinkPulse 1.5s ease-in-out infinite;
        }

        @keyframes thinkPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .player-answered {
            animation: answerPop 0.3s ease-out;
        }

        @keyframes answerPop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-red-50 to-pink-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Math Renderer
        const MathText = ({ text }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!text || !ref.current) return;
                let processed = text
                    .replace(/`([^`]+)`/g, '$$$1$$')
                    .replace(/\\\[(.+?)\\\]/g, '$$$$1$$')
                    .replace(/\\\((.+?)\\\)/g, '$$$1$$');
                if (processed.includes('\\') && !processed.includes('$')) processed = `$${processed}$`;
                const parts = processed.split(/($$[\s\S]+?$$|\$[\s\S]+?\$)/g);
                ref.current.innerHTML = "";
                parts.forEach(part => {
                    if (part.startsWith('$$') && part.endsWith('$$')) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(2, -2), span, { throwOnError: false, displayMode: true }); }
                        catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); }
                        catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else {
                        ref.current.appendChild(document.createTextNode(part));
                    }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        const AVATARS = ['👨‍🎓', '👩‍🎓', '🧑‍💼', '👨‍💻', '👩‍🔬', '🧑‍🏫'];
        const AI_NAMES = ['Minh', 'Lan', 'Hùng', 'Linh', 'Tuấn'];

        const EliminationGame = () => {
            // Flow states
            const [currentScreen, setCurrentScreen] = useState('instructions'); // instructions, questionSource, questionCreation, modeSelection, profileSetup, game, gameOver

            // Game configuration
            const [gameMode, setGameMode] = useState('elimination'); // 'elimination' or 'complete'
            const [questions, setQuestions] = useState([]);
            const [playerProfile, setPlayerProfile] = useState(() => {
                const saved = localStorage.getItem('playerProfile');
                return saved ? JSON.parse(saved) : { name: '', class: '', avatar: '🎮' };
            });

            // Question creation
            const [questionCreationMethod, setQuestionCreationMethod] = useState('manual'); // 'manual' or 'ai'
            const [aiGenerating, setAiGenerating] = useState(false);
            const [aiFormData, setAiFormData] = useState({
                subject: 'Toán',
                topic: '',
                difficulty: 'Vừa',
                numQuestions: 5
            });
            const [editingQuestion, setEditingQuestion] = useState({
                prompt: '',
                choices: ['', '', '', ''],
                answer: 0
            });
            const [editingIndex, setEditingIndex] = useState(-1); // -1 means not editing, >= 0 means editing that question

            // Game play states
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [players, setPlayers] = useState([]);
            const [playerAnswer, setPlayerAnswer] = useState(null);
            const [showAnswer, setShowAnswer] = useState(false);
            const [timeLeft, setTimeLeft] = useState(30);
            const [timerActive, setTimerActive] = useState(false);

            // Initialize players when game starts
            useEffect(() => {
                if (currentScreen === 'game' && players.length === 0 && questions.length > 0) {
                    const initialPlayers = [
                        {
                            id: 0,
                            name: playerProfile.name,
                            class: playerProfile.class,
                            isHuman: true,
                            eliminated: false,
                            score: 0,
                            avatar: playerProfile.avatar,
                            answer: null,
                            hasAnswered: false
                        }
                    ];
                    for (let i = 0; i < 5; i++) {
                        initialPlayers.push({
                            id: i + 1,
                            name: AI_NAMES[i],
                            isHuman: false,
                            eliminated: false,
                            score: 0,
                            avatar: AVATARS[i],
                            answer: null,
                            hasAnswered: false
                        });
                    }
                    setPlayers(initialPlayers);
                    startQuestion();
                }
            }, [currentScreen, questions]);

            // Timer
            useEffect(() => {
                if (timerActive && timeLeft > 0) {
                    const timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
                    return () => clearTimeout(timer);
                } else if (timeLeft === 0 && timerActive) {
                    handleTimeUp();
                }
            }, [timeLeft, timerActive]);

            // AI simulation
            useEffect(() => {
                if (timerActive && !showAnswer && questions.length > 0) {
                    const interval = setInterval(() => {
                        setPlayers(prev => {
                            const updated = [...prev];
                            const currentQ = questions[currentQuestionIndex];

                            updated.forEach(player => {
                                if (!player.isHuman && !player.eliminated && !player.hasAnswered && Math.random() < 0.15) {
                                    const isCorrect = Math.random() < 0.8;
                                    player.answer = isCorrect ? currentQ.answer : Math.floor(Math.random() * currentQ.choices.length);
                                    player.hasAnswered = true;
                                }
                            });

                            return updated;
                        });
                    }, 1000);

                    return () => clearInterval(interval);
                }
            }, [timerActive, showAnswer, questions, currentQuestionIndex]);

            const handleGenerateAI = async () => {
                if (!aiFormData.topic.trim()) {
                    alert('Vui lòng nhập chủ đề!');
                    return;
                }

                setAiGenerating(true);

                try {
                    // Get API keys from localStorage
                    const apiKeys = JSON.parse(localStorage.getItem('global_gemini_keys') || '[]');
                    if (!apiKeys.length) {
                        alert('Chưa có API Keys! Vui lòng cấu hỉnh trong trang chủ.');
                        setAiGenerating(false);
                        return;
                    }

                    const defaultModule = localStorage.getItem('default_gemini_module') || 'gemini-2.0-flash-exp';

                    // Build prompt
                    const prompt = `Bạn là trợ lý tạo câu hỏi trắc nghiệm.
Môn: ${aiFormData.subject}
Chủ đề: ${aiFormData.topic}
Độ khó: ${aiFormData.difficulty}
Số câu: ${aiFormData.numQuestions}

YÊU CẦU:
- Tạo ${aiFormData.numQuestions} câu hỏi trắc nghiệm 4 đáp án (A, B, C, D)
- Câu hỏi ngắn gọn, rõ ràng, độ khó ${aiFormData.difficulty}
- Nếu có công thức toán/lý/hóa, viết bằng LaTeX trong dấu \\\\( \\\\) hoặc \\\\[ \\\\]
- Trả về DUY NHẤT JSON đúng schema sau, không thêm chữ nào khác

SCHEMA:
[
  {
    "prompt": "Câu hỏi (có thể chứa LaTeX)",
    "choices": ["A", "B", "C", "D"],
    "answer": 0
  }
]

Trong đó answer là chỉ số (0-3) của đáp án đúng.`;

                    // Try all API keys
                    let generatedQuestions = null;
                    const shuffledKeys = [...apiKeys].sort(() => Math.random() - 0.5);

                    for (let i = 0; i < shuffledKeys.length; i++) {
                        try {
                            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${defaultModule}:generateContent?key=${shuffledKeys[i]}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                            });

                            const data = await res.json();
                            if (data.error) throw new Error(data.error.message);

                            const text = data.candidates[0].content.parts[0].text;

                            // Parse JSON
                            let jsonStr = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                            const startIdx = jsonStr.indexOf('[');
                            const endIdx = jsonStr.lastIndexOf(']');
                            if (startIdx !== -1 && endIdx !== -1) {
                                jsonStr = jsonStr.substring(startIdx, endIdx + 1);
                            }

                            generatedQuestions = JSON.parse(jsonStr);
                            break;
                        } catch (e) {
                            console.error(`Key ${i + 1} lỗi:`, e.message);
                            if (i === shuffledKeys.length - 1) {
                                throw new Error(`Tất cả keys đều lỗi: ${e.message}`);
                            }
                        }
                    }

                    if (generatedQuestions && generatedQuestions.length > 0) {
                        // Add generated questions to the list
                        setQuestions([...questions, ...generatedQuestions]);
                        alert(`Đã tạo ${generatedQuestions.length} câu hỏi!`);
                    }
                } catch (error) {
                    alert('Lỗi: ' + error.message);
                } finally {
                    setAiGenerating(false);
                }
            };

            const handleEditQuestion = (idx) => {
                setEditingIndex(idx);
                setEditingQuestion(questions[idx]);
            };

            const handleSaveEdit = () => {
                if (!editingQuestion.prompt.trim()) {
                    alert('Vui lòng nhập câu hỏi!');
                    return;
                }
                const newQuestions = [...questions];
                newQuestions[editingIndex] = editingQuestion;
                setQuestions(newQuestions);
                setEditingIndex(-1);
                setEditingQuestion({ prompt: '', choices: ['', '', '', ''], answer: 0 });
            };

            const handleCancelEdit = () => {
                setEditingIndex(-1);
                setEditingQuestion({ prompt: '', choices: ['', '', '', ''], answer: 0 });
            };

            const startQuestion = () => {
                setShowAnswer(false);
                setPlayerAnswer(null);
                setTimeLeft(30);
                setTimerActive(true);

                setPlayers(prev => prev.map(p => ({
                    ...p,
                    answer: null,
                    hasAnswered: false
                })));
            };

            const handlePlayerAnswer = (answerIndex) => {
                if (showAnswer || playerAnswer !== null) return;
                setPlayerAnswer(answerIndex);
                setPlayers(prev => prev.map(p =>
                    p.isHuman ? { ...p, answer: answerIndex, hasAnswered: true } : p
                ));
            };

            const handleTimeUp = () => {
                setPlayers(prev => {
                    const updated = [...prev];
                    const currentQ = questions[currentQuestionIndex];

                    updated.forEach(player => {
                        if (!player.hasAnswered && !player.eliminated) {
                            player.answer = Math.floor(Math.random() * currentQ.choices.length);
                            player.hasAnswered = true;
                        }
                    });

                    return updated;
                });

                handleRevealAnswer();
            };

            const handleRevealAnswer = () => {
                setTimerActive(false);
                setShowAnswer(true);

                const currentQ = questions[currentQuestionIndex];
                const correctAnswer = currentQ.answer;

                setTimeout(() => {
                    setPlayers(prev => prev.map(player => {
                        if (player.eliminated) return player;

                        const isCorrect = player.answer === correctAnswer;

                        if (gameMode === 'complete') {
                            if (player.isHuman && isCorrect) {
                                const timeBonus = Math.floor(100 * (timeLeft / 30));
                                return { ...player, score: player.score + timeBonus };
                            }
                            return player;
                        }

                        if (!isCorrect) {
                            return { ...player, eliminated: true };
                        }

                        if (player.isHuman && isCorrect) {
                            const timeBonus = Math.floor(100 * (timeLeft / 30));
                            return { ...player, score: player.score + timeBonus };
                        }

                        return player;
                    }));
                }, 1500);
            };

            const handleNextQuestion = () => {
                const alivePlayers = players.filter(p => !p.eliminated);

                if (gameMode === 'elimination') {
                    if (alivePlayers.length === 0 || alivePlayers.length === 1) {
                        setCurrentScreen('gameOver');
                        return;
                    }
                }

                if (currentQuestionIndex < questions.length - 1) {
                    setCurrentQuestionIndex(currentQuestionIndex + 1);
                    setTimeout(startQuestion, 500);
                } else {
                    setCurrentScreen('gameOver');
                }
            };

            const handleAddQuestion = () => {
                if (!editingQuestion.prompt.trim()) {
                    alert('Vui lòng nhập câu hỏi!');
                    return;
                }
                if (editingQuestion.choices.some(c => !c.trim())) {
                    alert('Vui lòng nhập đầy đủ các đáp án!');
                    return;
                }

                setQuestions([...questions, { ...editingQuestion }]);
                setEditingQuestion({
                    prompt: '',
                    choices: ['', '', '', ''],
                    answer: 0
                });
            };

            const handleRemoveQuestion = (index) => {
                setQuestions(questions.filter((_, i) => i !== index));
            };

            // SCREEN: Instructions
            if (currentScreen === 'instructions') {
                return (
                    <div className="fixed inset-0 bg-gradient-to-br from-red-50 to-pink-100 flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-3xl w-full max-h-[90vh] overflow-y-auto fade-in">
                            <div className="text-center mb-6">
                                <h2 className="text-4xl font-bold text-red-700 mb-2">
                                    <i className="fas fa-user-slash mr-3"></i>LOẠI TRỰC TIẾP
                                </h2>
                                <p className="text-gray-600">Battle Royale - Ai sai bị loại!</p>
                            </div>

                            <div className="space-y-4 text-gray-700">
                                <div className="bg-red-50 border-2 border-red-200 rounded-xl p-4">
                                    <h3 className="font-bold text-lg text-red-800 mb-2">
                                        <i className="fas fa-bullseye mr-2"></i>Mục tiêu
                                    </h3>
                                    <p>Thi đấu với 5 AI trong trận Battle Royale! Trả lời đúng để sống sót, sai là bị loại ngay!</p>
                                </div>

                                <div>
                                    <h3 className="font-bold text-lg text-gray-800 mb-2">
                                        <i className="fas fa-gamepad mr-2"></i>Luật chơi
                                    </h3>
                                    <ul className="space-y-2 ml-6">
                                        <li>• 6 người chơi thi đấu cùng lúc (Bạn + 5 AI)</li>
                                        <li>• Mỗi câu hỏi có 30 giây</li>
                                        <li>• <strong className="text-red-600">Trả lời SAI → BỊ LOẠI</strong> (chế độ loại trực tiếp)</li>
                                        <li>• Người cuối cùng sống sót → <strong className="text-green-600">CHIẾN THẮNG</strong></li>
                                    </ul>
                                </div>

                                <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                                    <p className="text-sm">
                                        <strong>💡 Điểm = 100 × (Thời gian còn / 30)</strong><br />
                                        Trả lời nhanh = Nhiều điểm hơn!
                                    </p>
                                </div>
                            </div>

                            <button
                                onClick={() => setCurrentScreen('questionSource')}
                                className="w-full mt-6 py-4 bg-gradient-to-r from-red-600 to-pink-600 text-white rounded-xl font-bold text-lg hover:shadow-xl transition"
                            >
                                <i className="fas fa-arrow-right mr-2"></i>Tiếp tục
                            </button>

                            <button
                                onClick={() => window.location.href = 'trochoi.html'}
                                className="w-full mt-3 py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600 transition"
                            >
                                <i className="fas fa-arrow-left mr-2"></i>Quay lại
                            </button>
                        </div>
                    </div>
                );
            }

            // SCREEN: Question Source
            if (currentScreen === 'questionSource') {
                const savedGameData = localStorage.getItem('gameData');
                const hasSavedQuestions = savedGameData && JSON.parse(savedGameData).content?.questions?.length > 0;

                return (
                    <div className="fixed inset-0 bg-gradient-to-br from-red-50 to-pink-100 flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-3xl w-full fade-in">
                            <h2 className="text-3xl font-bold text-center text-red-700 mb-6">
                                <i className="fas fa-question-circle mr-2"></i>Chọn nguồn câu hỏi
                            </h2>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <button
                                    onClick={() => {
                                        setQuestions([]);
                                        setCurrentScreen('questionCreation');
                                    }}
                                    className="border-4 border-blue-500 rounded-2xl p-6 hover:bg-blue-50 transition text-left"
                                >
                                    <div className="text-5xl mb-4 text-center">✏️</div>
                                    <h3 className="text-2xl font-bold text-blue-700 mb-3">Tạo câu hỏi mới</h3>
                                    <p className="text-gray-600 mb-2">• Tự tạo câu hỏi riêng</p>
                                    <p className="text-gray-600 mb-2">• Linh hoạt, sáng tạo</p>
                                    <p className="text-gray-600">• Phù hợp với bài học</p>
                                </button>

                                <button
                                    onClick={() => {
                                        setQuestions([]);
                                        setQuestionCreationMethod('ai');
                                        setCurrentScreen('questionCreation');
                                    }}
                                    className="border-4 border-purple-500 hover:bg-purple-50 rounded-2xl p-6 transition text-left"
                                >
                                    <div className="text-5xl mb-4 text-center">🤖</div>
                                    <h3 className="text-2xl font-bold text-purple-700 mb-3">Tạo tự động bằng AI</h3>
                                    <p className="text-gray-600 mb-2">• AI tạo câu hỏi tự động</p>
                                    <p className="text-gray-600 mb-2">• Chọn môn, chủ đề, độ khó</p>
                                    <p className="text-gray-600">• Nhanh chóng, tiện lợi</p>
                                </button>
                            </div>

                            <button
                                onClick={() => setCurrentScreen('instructions')}
                                className="w-full mt-6 py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600 transition"
                            >
                                <i className="fas fa-arrow-left mr-2"></i>Quay lại
                            </button>
                        </div>
                    </div>
                );
            }

            // SCREEN: Mode Selection
            if (currentScreen === 'modeSelection') {
                return (
                    <div className="fixed inset-0 bg-gradient-to-br from-red-50 to-pink-100 flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-3xl w-full fade-in">
                            <h2 className="text-3xl font-bold text-center text-red-700 mb-6">
                                <i className="fas fa-cog mr-2"></i>Chọn chế độ chơi
                            </h2>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <button
                                    onClick={() => {
                                        setGameMode('elimination');
                                        setCurrentScreen('profileSetup');
                                    }}
                                    className="border-4 border-red-500 rounded-2xl p-6 hover:bg-red-50 transition text-left"
                                >
                                    <div className="text-5xl mb-4 text-center">⚔️</div>
                                    <h3 className="text-2xl font-bold text-red-700 mb-3">Loại Trực Tiếp</h3>
                                    <p className="text-gray-600 mb-2">• Trả lời sai → Bị loại ngay</p>
                                    <p className="text-gray-600 mb-2">• Người cuối cùng thắng</p>
                                    <p className="text-gray-600">• Căng thẳng cao!</p>
                                </button>

                                <button
                                    onClick={() => {
                                        setGameMode('complete');
                                        setCurrentScreen('profileSetup');
                                    }}
                                    className="border-4 border-green-500 rounded-2xl p-6 hover:bg-green-50 transition text-left"
                                >
                                    <div className="text-5xl mb-4 text-center">📝</div>
                                    <h3 className="text-2xl font-bold text-green-700 mb-3">Làm Hết Câu Hỏi</h3>
                                    <p className="text-gray-600 mb-2">• Sai vẫn làm tiếp</p>
                                    <p className="text-gray-600 mb-2">• Ai nhiều điểm nhất thắng</p>
                                    <p className="text-gray-600">• Nhẹ nhàng hơn!</p>
                                </button>
                            </div>

                            <button
                                onClick={() => setCurrentScreen('questionSource')}
                                className="w-full mt-6 py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600 transition"
                            >
                                <i className="fas fa-arrow-left mr-2"></i>Quay lại
                            </button>
                        </div>
                    </div>
                );
            }

            // SCREEN: Question Creation
            if (currentScreen === 'questionCreation') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-red-50 to-pink-100 p-6">
                        <div className="max-w-4xl mx-auto fade-in">
                            <div className="bg-white rounded-3xl shadow-2xl p-8 mb-6">
                                <h2 className="text-3xl font-bold text-red-700 mb-6">
                                    <i className="fas fa-plus-circle mr-2"></i>Tạo câu hỏi
                                    <span className="text-sm text-gray-500 ml-3">({questions.length} câu)</span>
                                </h2>

                                {/* Tabs chọn phương thức */}
                                <div className="flex gap-4 mb-6 border-b-2 border-gray-200">
                                    <button
                                        onClick={() => setQuestionCreationMethod('manual')}
                                        className={`pb-3 px-4 font-bold transition border-b-4 ${questionCreationMethod === 'manual'
                                            ? 'border-red-600 text-red-600'
                                            : 'border-transparent text-gray-400 hover:text-gray-600'
                                            }`}
                                    >
                                        <i className="fas fa-pencil-alt mr-2"></i>Tạo thủ công
                                    </button>
                                    <button
                                        onClick={() => setQuestionCreationMethod('ai')}
                                        className={`pb-3 px-4 font-bold transition border-b-4 ${questionCreationMethod === 'ai'
                                            ? 'border-purple-600 text-purple-600'
                                            : 'border-transparent text-gray-400 hover:text-gray-600'
                                            }`}
                                    >
                                        <i className="fas fa-robot mr-2"></i>Tạo bằng AI
                                    </button>
                                </div>

                                {/* Manual Creation */}
                                {questionCreationMethod === 'manual' && (
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block font-bold text-gray-700 mb-2">Câu hỏi:</label>
                                            <textarea
                                                value={editingQuestion.prompt}
                                                onChange={(e) => setEditingQuestion({ ...editingQuestion, prompt: e.target.value })}
                                                placeholder="Nhập câu hỏi..."
                                                className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-red-500 focus:outline-none"
                                                rows="3"
                                            />
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {editingQuestion.choices.map((choice, idx) => (
                                                <div key={idx}>
                                                    <label className="block font-bold text-gray-700 mb-2">
                                                        Đáp án {String.fromCharCode(65 + idx)}:
                                                    </label>
                                                    <div className="flex gap-2">
                                                        <input
                                                            type="radio"
                                                            name="correct"
                                                            checked={editingQuestion.answer === idx}
                                                            onChange={() => setEditingQuestion({ ...editingQuestion, answer: idx })}
                                                            className="mt-3"
                                                        />
                                                        <input
                                                            type="text"
                                                            value={choice}
                                                            onChange={(e) => {
                                                                const newChoices = [...editingQuestion.choices];
                                                                newChoices[idx] = e.target.value;
                                                                setEditingQuestion({ ...editingQuestion, choices: newChoices });
                                                            }}
                                                            placeholder={`Đáp án ${String.fromCharCode(65 + idx)}...`}
                                                            className="flex-1 px-4 py-2 border-2 border-gray-300 rounded-xl focus:border-red-500 focus:outline-none"
                                                        />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <button
                                            onClick={handleAddQuestion}
                                            className="w-full py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 transition"
                                        >
                                            <i className="fas fa-plus mr-2"></i>Thêm câu hỏi
                                        </button>
                                    </div>
                                )}

                                {/* AI Creation */}
                                {questionCreationMethod === 'ai' && (
                                    <div className="space-y-4">
                                        <div className="bg-purple-50 border-2 border-purple-200 rounded-xl p-4 mb-4">
                                            <div className="flex items-center gap-2 text-purple-800 mb-2">
                                                <i className="fas fa-robot text-2xl"></i>
                                                <h3 className="font-bold text-lg">Tạo câu hỏi bằng AI</h3>
                                            </div>
                                            <p className="text-sm text-purple-700">AI sẽ tự động sinh câu hỏi dựa trên chủ đề bạn nhập.</p>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block font-bold text-gray-700 mb-2">Môn học:</label>
                                                <select
                                                    value={aiFormData.subject}
                                                    onChange={(e) => setAiFormData({ ...aiFormData, subject: e.target.value })}
                                                    className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none"
                                                >
                                                    <option>Toán</option>
                                                    <option>Lý</option>
                                                    <option>Hóa</option>
                                                    <option>Sinh</option>
                                                    <option>Văn</option>
                                                    <option>Anh</option>
                                                    <option>Sử</option>
                                                    <option>Địa</option>
                                                </select>
                                            </div>

                                            <div>
                                                <label className="block font-bold text-gray-700 mb-2">Độ khó:</label>
                                                <select
                                                    value={aiFormData.difficulty}
                                                    onChange={(e) => setAiFormData({ ...aiFormData, difficulty: e.target.value })}
                                                    className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none"
                                                >
                                                    <option>Dễ</option>
                                                    <option>Vừa</option>
                                                    <option>Khó</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block font-bold text-gray-700 mb-2">Chủ đề:</label>
                                            <input
                                                type="text"
                                                value={aiFormData.topic}
                                                onChange={(e) => setAiFormData({ ...aiFormData, topic: e.target.value })}
                                                placeholder="VD: Phương trình bậc 2, Định luật Ôm..."
                                                className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none"
                                            />
                                        </div>

                                        <div>
                                            <label className="block font-bold text-gray-700 mb-2">Số câu hỏi:</label>
                                            <input
                                                type="number"
                                                min="1"
                                                max="20"
                                                value={aiFormData.numQuestions}
                                                onChange={(e) => setAiFormData({ ...aiFormData, numQuestions: parseInt(e.target.value) || 1 })}
                                                className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-500 focus:outline-none"
                                            />
                                        </div>

                                        <button
                                            onClick={handleGenerateAI}
                                            disabled={aiGenerating}
                                            className={`w-full py-4 rounded-xl font-bold text-lg transition ${aiGenerating
                                                ? 'bg-gray-400 text-gray-200 cursor-not-allowed'
                                                : 'bg-gradient-to-r from-purple-600 to-blue-600 text-white hover:shadow-xl'
                                                }`}
                                        >
                                            {aiGenerating ? (
                                                <>
                                                    <i className="fas fa-spinner fa-spin mr-2"></i>AI đang tạo...
                                                </>
                                            ) : (
                                                <>
                                                    <i className="fas fa-magic mr-2"></i>Tạo bằng AI
                                                </>
                                            )}
                                        </button>
                                    </div>
                                )}
                            </div>

                            {questions.length > 0 && (
                                <div className="bg-white rounded-3xl shadow-2xl p-8">
                                    <h3 className="text-2xl font-bold text-gray-800 mb-4">
                                        Danh sách câu hỏi ({questions.length})
                                    </h3>
                                    <div className="space-y-3 max-h-96 overflow-y-auto">
                                        {questions.map((q, idx) => (
                                            <div key={idx} className={`border-2 rounded-xl p-4 transition ${editingIndex === idx ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-red-300'}`}>
                                                {editingIndex === idx ? (
                                                    <div className="space-y-3">
                                                        <div>
                                                            <label className="block font-bold text-gray-700 mb-2 text-sm">Câu hỏi:</label>
                                                            <textarea
                                                                value={editingQuestion.prompt}
                                                                onChange={(e) => setEditingQuestion({ ...editingQuestion, prompt: e.target.value })}
                                                                onPaste={(e) => {
                                                                    const items = e.clipboardData.items;
                                                                    for (let i = 0; i < items.length; i++) {
                                                                        if (items[i].type.indexOf('image') !== -1) {
                                                                            e.preventDefault();
                                                                            const blob = items[i].getAsFile();
                                                                            const reader = new FileReader();
                                                                            reader.onload = (event) => {
                                                                                const imgTag = `\n![Ảnh](${event.target.result})\n`;
                                                                                setEditingQuestion({ ...editingQuestion, prompt: editingQuestion.prompt + imgTag });
                                                                            };
                                                                            reader.readAsDataURL(blob);
                                                                            break;
                                                                        }
                                                                    }
                                                                }}
                                                                className="w-full px-3 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-sm"
                                                                rows="3"
                                                                placeholder="Nhập câu hỏi... (Ctrl+V để dán ảnh)"
                                                            />
                                                        </div>
                                                        <div className="grid grid-cols-2 gap-2">
                                                            {editingQuestion.choices.map((choice, cIdx) => (
                                                                <div key={cIdx} className="flex gap-2 items-center">
                                                                    <input type="radio" name={`correct-edit-${idx}`} checked={editingQuestion.answer === cIdx} onChange={() => setEditingQuestion({ ...editingQuestion, answer: cIdx })} />
                                                                    <input type="text" value={choice} onChange={(e) => { const newChoices = [...editingQuestion.choices]; newChoices[cIdx] = e.target.value; setEditingQuestion({ ...editingQuestion, choices: newChoices }); }} className="flex-1 px-2 py-1 border border-gray-300 rounded text-sm" placeholder={String.fromCharCode(65 + cIdx)} />
                                                                </div>
                                                            ))}
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button onClick={handleSaveEdit} className="flex-1 px-3 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 font-bold text-sm"><i className="fas fa-check mr-1"></i>Lưu</button>
                                                            <button onClick={handleCancelEdit} className="flex-1 px-3 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 font-bold text-sm"><i className="fas fa-times mr-1"></i>Hủy</button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="flex justify-between items-start">
                                                        <div className="flex-1">
                                                            <div className="font-bold text-gray-800 mb-2">Câu {idx + 1}: {q.prompt}</div>
                                                            <div className="text-sm text-gray-600">Đáp án đúng: <span className="font-bold text-green-600">{q.choices[q.answer]}</span></div>
                                                        </div>
                                                        <div className="flex gap-2 ml-4">
                                                            <button onClick={() => handleEditQuestion(idx)} className="px-3 py-1 bg-blue-500 text-white rounded-lg hover:bg-blue-600"><i className="fas fa-edit"></i></button>
                                                            <button onClick={() => handleRemoveQuestion(idx)} className="px-3 py-1 bg-red-500 text-white rounded-lg hover:bg-red-600"><i className="fas fa-trash"></i></button>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>

                                    <div className="flex gap-4 mt-6">
                                        <button
                                            onClick={() => setCurrentScreen('questionSource')}
                                            className="flex-1 py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600 transition"
                                        >
                                            <i className="fas fa-arrow-left mr-2"></i>Quay lại
                                        </button>
                                        <button
                                            onClick={() => {
                                                if (questions.length < 3) {
                                                    alert('Vui lòng tạo ít nhất 3 câu hỏi!');
                                                    return;
                                                }
                                                setCurrentScreen('modeSelection');
                                            }}
                                            className="flex-1 py-3 bg-gradient-to-r from-red-600 to-pink-600 text-white rounded-xl font-bold hover:shadow-xl transition"
                                        >
                                            <i className="fas fa-arrow-right mr-2"></i>Tiếp tục ({questions.length} câu)
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // SCREEN: Profile Setup  
            if (currentScreen === 'profileSetup') {
                return (
                    <div className="fixed inset-0 bg-gradient-to-br from-red-50 to-pink-100 flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full fade-in">
                            <div className="text-center mb-6">
                                <h2 className="text-3xl font-bold text-red-700 mb-2">
                                    <i className="fas fa-user-circle mr-2"></i>Thông tin người chơi
                                </h2>
                                <p className="text-gray-600">Nhập thông tin để bắt đầu!</p>
                            </div>

                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">
                                        <i className="fas fa-user mr-2"></i>Tên của bạn *
                                    </label>
                                    <input
                                        type="text"
                                        value={playerProfile.name}
                                        onChange={(e) => setPlayerProfile({ ...playerProfile, name: e.target.value })}
                                        placeholder="Nhập tên..."
                                        className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-red-500 focus:outline-none text-lg"
                                        maxLength={20}
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">
                                        <i className="fas fa-school mr-2"></i>Lớp
                                    </label>
                                    <input
                                        type="text"
                                        value={playerProfile.class}
                                        onChange={(e) => setPlayerProfile({ ...playerProfile, class: e.target.value })}
                                        placeholder="Ví dụ: 10A1..."
                                        className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-red-500 focus:outline-none text-lg"
                                        maxLength={10}
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">
                                        <i className="fas fa-smile mr-2"></i>Chọn avatar
                                    </label>
                                    <div className="grid grid-cols-6 gap-2">
                                        {['🎮', '👨‍🎓', '👩‍🎓', '🧑‍💼', '👨‍💻', '👩‍🔬', '🧑‍🏫', '⭐', '🔥', '⚡', '🎯', '🏆'].map(emoji => (
                                            <button
                                                key={emoji}
                                                onClick={() => setPlayerProfile({ ...playerProfile, avatar: emoji })}
                                                className={`text-4xl p-3 rounded-xl border-2 transition hover:scale-110 ${playerProfile.avatar === emoji
                                                    ? 'border-red-500 bg-red-50'
                                                    : 'border-gray-300 hover:border-red-300'
                                                    }`}
                                            >
                                                {emoji}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-3 mt-6">
                                <button
                                    onClick={() => setCurrentScreen('modeSelection')}
                                    className="flex-1 py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600 transition"
                                >
                                    <i className="fas fa-arrow-left mr-2"></i>Quay lại
                                </button>
                                <button
                                    onClick={() => {
                                        if (!playerProfile.name.trim()) {
                                            alert('Vui lòng nhập tên!');
                                            return;
                                        }
                                        localStorage.setItem('playerProfile', JSON.stringify(playerProfile));
                                        setCurrentScreen('game');
                                    }}
                                    className="flex-1 py-4 bg-gradient-to-r from-red-600 to-pink-600 text-white rounded-xl font-bold hover:shadow-xl transition"
                                >
                                    <i className="fas fa-play mr-2"></i>Bắt đầu!
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // SCREEN: Game Over
            if (currentScreen === 'gameOver') {
                const survivors = players.filter(p => !p.eliminated).sort((a, b) => b.score - a.score);
                const humanPlayer = players.find(p => p.isHuman);
                const humanWon = survivors.length > 0 && survivors[0].isHuman;

                return (
                    <div className="min-h-screen bg-gradient-to-br from-red-50 to-pink-100 flex items-center justify-center p-6">
                        <div className="bg-white rounded-3xl shadow-2xl p-12 max-w-4xl w-full text-center fade-in">
                            <div className={`w-24 h-24 ${humanWon ? 'bg-yellow-100' : 'bg-gray-100'} rounded-full flex items-center justify-center mx-auto mb-6`}>
                                <i className={`fas ${humanWon ? 'fa-trophy' : 'fa-sad-tear'} text-5xl ${humanWon ? 'text-yellow-500' : 'text-gray-400'}`}></i>
                            </div>
                            <h2 className="text-4xl font-bold mb-6 text-gray-800">
                                {humanWon ? '🎉 CHIẾN THẮNG!' : survivors.length === 0 ? 'Tất cả bị loại!' : 'Đã bị loại!'}
                            </h2>

                            {survivors.length > 0 && (
                                <div className="mb-8">
                                    <div className="text-2xl font-bold mb-4 text-yellow-600">
                                        🏆 Người chiến thắng: {survivors[0].name} {survivors[0].avatar}
                                    </div>
                                    {humanPlayer && (
                                        <div className="text-xl text-gray-600">
                                            Điểm của bạn: {humanPlayer.score}
                                        </div>
                                    )}
                                </div>
                            )}

                            <div className="bg-gray-50 rounded-xl p-6 mb-8">
                                <h3 className="font-bold text-lg mb-4">Bảng xếp hạng</h3>
                                <div className="space-y-2">
                                    {players.sort((a, b) => {
                                        if (a.eliminated && !b.eliminated) return 1;
                                        if (!a.eliminated && b.eliminated) return -1;
                                        return b.score - a.score;
                                    }).map((player, idx) => (
                                        <div key={player.id} className={`flex items-center justify-between p-3 rounded-lg ${player.eliminated ? 'bg-gray-200 opacity-50' : 'bg-green-100'
                                            }`}>
                                            <div className="flex items-center gap-3">
                                                <span className="text-2xl">{player.avatar}</span>
                                                <span className="font-bold">{player.name}</span>
                                                {player.class && <span className="text-xs text-gray-500">{player.class}</span>}
                                                {player.eliminated && <span className="text-red-600 text-sm">❌ Đã loại</span>}
                                                {!player.eliminated && <span className="text-green-600 text-sm">✅ Sống sót</span>}
                                            </div>
                                            <span className="font-bold text-lg">{player.score}đ</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="flex gap-4 justify-center">
                                <button
                                    onClick={() => window.location.reload()}
                                    className="px-8 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 transition"
                                >
                                    <i className="fas fa-redo mr-2"></i>Chơi lại
                                </button>
                                <button
                                    onClick={() => window.location.href = 'trochoi.html'}
                                    className="px-8 py-3 bg-gray-600 text-white rounded-xl font-bold hover:bg-gray-700 transition"
                                >
                                    <i className="fas fa-home mr-2"></i>Về menu
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // SCREEN: Game Play
            const currentQ = questions[currentQuestionIndex];
            const alivePlayers = players.filter(p => !p.eliminated);

            return (
                <div className="min-h-screen bg-gradient-to-br from-red-50 to-pink-100 p-6">
                    <div className="max-w-7xl mx-auto fade-in">
                        {/* Header */}
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex gap-2">
                                <button
                                    onClick={() => window.location.href = 'trochoi.html'}
                                    className="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition"
                                >
                                    <i className="fas fa-arrow-left mr-2"></i>Thoát
                                </button>
                            </div>

                            <div className="text-center">
                                <h1 className="text-3xl font-bold text-red-700">
                                    <i className="fas fa-user-slash mr-2"></i>
                                    {gameMode === 'elimination' ? 'LOẠI TRỰC TIẾP' : 'LÀM HẾT CÂU'}
                                </h1>
                                <div className="text-sm text-gray-600 mt-1">
                                    Câu {currentQuestionIndex + 1}/{questions.length} •
                                    {gameMode === 'elimination' && <span className="font-bold text-red-600"> {alivePlayers.length} người còn lại</span>}
                                </div>
                            </div>

                            <div className={`px-6 py-3 rounded-xl font-bold text-2xl ${timeLeft <= 5 ? 'bg-red-600 text-white animate-pulse shake' : timeLeft <= 10 ? 'bg-orange-500 text-white' : 'bg-blue-600 text-white'}`}>
                                <i className="fas fa-clock mr-2"></i>{timeLeft}s
                            </div>
                        </div>

                        {/* Players Grid */}
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
                            {players.map(player => (
                                <div
                                    key={player.id}
                                    className={`p-4 rounded-xl border-2 transition ${player.eliminated
                                        ? 'bg-gray-100 border-gray-300 eliminated'
                                        : player.hasAnswered
                                            ? 'bg-green-100 border-green-500 player-answered'
                                            : 'bg-white border-blue-300 player-thinking'
                                        }`}
                                >
                                    <div className="flex items-center justify-between mb-2">
                                        <div className="flex items-center gap-2">
                                            <span className="text-3xl">{player.avatar}</span>
                                            <div>
                                                <div className="font-bold">
                                                    {player.name}
                                                    {player.isHuman && <span className="ml-1 text-xs bg-blue-500 text-white px-2 py-0.5 rounded">Bạn</span>}
                                                </div>
                                                {player.class && <div className="text-xs text-gray-500">{player.class}</div>}
                                                <div className="text-sm text-gray-600">{player.score}đ</div>
                                            </div>
                                        </div>
                                        {player.eliminated && <i className="fas fa-times-circle text-red-500 text-2xl"></i>}
                                        {!player.eliminated && player.hasAnswered && <i className="fas fa-check-circle text-green-500 text-2xl"></i>}
                                        {!player.eliminated && !player.hasAnswered && <i className="fas fa-brain text-gray-400 text-2xl"></i>}
                                    </div>
                                    {player.eliminated && <div className="text-sm text-red-600 font-bold">❌ ĐÃ BỊ LOẠI</div>}
                                    {!player.eliminated && player.hasAnswered && <div className="text-sm text-green-600 font-bold">✅ Đã trả lời</div>}
                                    {!player.eliminated && !player.hasAnswered && <div className="text-sm text-gray-500">🤔 Đang suy nghĩ...</div>}
                                </div>
                            ))}
                        </div>

                        {/* Question */}
                        <div className="bg-white rounded-3xl shadow-2xl p-8 mb-6">
                            <h3 className="text-2xl font-bold text-gray-800 mb-6">
                                <MathText text={currentQ.prompt} />
                            </h3>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {currentQ.choices.map((choice, idx) => {
                                    const isSelected = playerAnswer === idx;
                                    const isCorrect = currentQ.answer === idx;
                                    const humanPlayer = players.find(p => p.isHuman);

                                    let className = "p-4 rounded-xl border-2 cursor-pointer transition font-medium ";

                                    if (showAnswer) {
                                        if (isCorrect) {
                                            className += "bg-green-100 border-green-500 text-green-900";
                                        } else if (isSelected) {
                                            className += "bg-red-100 border-red-500 text-red-900";
                                        } else {
                                            className += "border-gray-200 opacity-50";
                                        }
                                    } else {
                                        if (isSelected) {
                                            className += "bg-blue-100 border-blue-500";
                                        } else {
                                            className += "border-gray-300 hover:border-blue-400 hover:bg-blue-50";
                                        }
                                    }

                                    return (
                                        <button
                                            key={idx}
                                            onClick={() => handlePlayerAnswer(idx)}
                                            disabled={showAnswer || humanPlayer?.eliminated || playerAnswer !== null}
                                            className={className}
                                        >
                                            <div className="flex items-center gap-3">
                                                <span className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center font-bold">
                                                    {String.fromCharCode(65 + idx)}
                                                </span>
                                                <div className="flex-1 text-left">
                                                    <MathText text={choice} />
                                                </div>
                                                {showAnswer && isCorrect && (
                                                    <i className="fas fa-check-circle text-green-600 text-2xl"></i>
                                                )}
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Actions */}
                        <div className="flex gap-4 justify-center">
                            {!showAnswer && playerAnswer !== null && (
                                <button
                                    onClick={handleRevealAnswer}
                                    className="px-8 py-4 bg-yellow-500 text-white rounded-xl font-bold text-lg hover:bg-yellow-600 transition shadow-lg"
                                >
                                    <i className="fas fa-eye mr-2"></i>Hiện đáp án
                                </button>
                            )}

                            {showAnswer && (
                                <button
                                    onClick={handleNextQuestion}
                                    className="px-8 py-4 bg-green-600 text-white rounded-xl font-bold text-lg hover:bg-green-700 transition shadow-lg"
                                >
                                    <i className="fas fa-arrow-right mr-2"></i>
                                    {currentQuestionIndex < questions.length - 1 ? 'Câu tiếp theo' : 'Kết thúc'}
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<EliminationGame />, document.getElementById('root'));
    </script>
</body>

</html>
