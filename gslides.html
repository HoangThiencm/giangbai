<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Chiếu Google Slides</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Hiệu ứng cho nút Settings */
        .setting-btn {
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        .setting-btn:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-black h-screen flex flex-col overflow-hidden relative">

    <button id="reopenToolbarBtn" onclick="showToolbar()" class="hidden absolute top-4 right-4 z-50 bg-gray-800 text-white p-3 rounded-full shadow-lg setting-btn border border-gray-600" title="Mở lại thanh nhập link">
        <i class="fas fa-cog fa-spin-hover text-xl"></i>
    </button>

    <div id="toolbar" class="bg-gray-800 text-white p-3 flex items-center justify-between shadow-md z-40 transition-transform duration-300">
        <button onclick="window.location.href='index.html'" class="text-gray-400 hover:text-white font-bold flex items-center gap-2 px-3 py-1 rounded hover:bg-gray-700 transition">
            <i class="fas fa-arrow-left"></i> Trang Chủ
        </button>
        
        <div class="flex-1 max-w-4xl mx-4 flex gap-2">
            <input type="text" id="slideUrl" class="w-full bg-gray-700 border border-gray-600 text-white rounded px-4 py-2 outline-none focus:border-yellow-500 transition" placeholder="Dán link Google Slides vào đây...">
            
            <button onclick="loadSlide()" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold px-6 py-2 rounded transition flex items-center gap-2 whitespace-nowrap">
                <i class="fas fa-play"></i> CHIẾU
            </button>
        </div>

        <button onclick="toggleFullscreen()" class="text-gray-300 hover:text-white border border-gray-600 hover:bg-gray-700 px-3 py-2 rounded transition flex items-center gap-2" title="Phóng to toàn màn hình">
            <i class="fas fa-expand"></i> Fullscreen
        </button>
    </div>

    <div class="flex-1 relative flex items-center justify-center w-full h-full">
        <div id="placeholder" class="text-center text-gray-600">
            <i class="fas fa-chalkboard-teacher text-7xl mb-6 opacity-50"></i>
            <h2 class="text-2xl font-bold text-gray-500">Chưa có bài giảng nào</h2>
            <p class="text-sm mt-2 text-gray-600">Dán link Google Slides vào thanh bên trên và nhấn "Chiếu"</p>
        </div>
        
        <iframe id="slideFrame" class="w-full h-full hidden border-0 absolute inset-0" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
    </div>

    <script>
        // 1. Hàm xử lý logic Load Slide
        function loadSlide() {
            const input = document.getElementById('slideUrl').value.trim();
            const frame = document.getElementById('slideFrame');
            const placeholder = document.getElementById('placeholder');
            const toolbar = document.getElementById('toolbar');
            const reopenBtn = document.getElementById('reopenToolbarBtn');

            if (!input) {
                alert("Vui lòng nhập đường link Google Slides!");
                return;
            }

            let embedUrl = input;
            
            // Logic chuyển link thường thành link embed
            if (input.includes("/pub?")) {
                embedUrl = input.replace("/pub?", "/embed?");
            } else if (input.includes("/edit")) {
                const baseUrl = input.split("/edit")[0];
                // Thêm tham số delayms=3000 để slide tự chạy nếu muốn, hoặc bỏ đi
                embedUrl = baseUrl + "/embed?start=false&loop=false&delayms=3000";
            } else if (!input.includes("/embed?")) {
                if(input.endsWith("/")) embedUrl = input + "embed?start=false&loop=false";
                else embedUrl = input + "/embed?start=false&loop=false";
            }

            // Gán link và hiển thị iframe
            frame.src = embedUrl;
            frame.classList.remove('hidden');
            placeholder.classList.add('hidden');

            // Ẩn thanh công cụ, hiện nút Setting
            toolbar.style.display = 'none'; 
            reopenBtn.classList.remove('hidden');
        }

        // 2. Hàm mở lại thanh công cụ (khi nhấn nút bánh răng)
        function showToolbar() {
            const toolbar = document.getElementById('toolbar');
            const reopenBtn = document.getElementById('reopenToolbarBtn');
            
            toolbar.style.display = 'flex'; // Hiện lại toolbar
            reopenBtn.classList.add('hidden'); // Ẩn nút bánh răng đi
        }

        // 3. Hàm Fullscreen thực thụ
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch((err) => {
                    alert(`Lỗi không thể full màn hình: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        
        // Hỗ trợ phím Enter
        document.getElementById('slideUrl').addEventListener("keypress", function(event) {
            if (event.key === "Enter") loadSlide();
        });
    </script>
</body>
</html>
