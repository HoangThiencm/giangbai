<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống kê tiến trình lộ trình Toán</title>
    <script src="access-control.js?v=20260620-toan4-1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        mjx-container svg { display: inline !important; }
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                linear-gradient(180deg, rgba(245, 158, 11, 0.08), transparent 260px),
                #f6f8fb;
        }
    </style>
</head>

<body class="text-slate-900 min-h-screen">
    <header class="border-b border-slate-200 bg-white/95">
        <div class="mx-auto flex max-w-7xl flex-col gap-3 px-4 py-4 md:flex-row md:items-center md:justify-between">
            <div>
                <h1 class="text-2xl font-bold text-slate-950">Thống kê tiến trình học sinh</h1>
                <p class="mt-1 text-sm text-slate-600">Theo dõi tiến độ các lớp bạn được phân quyền phụ trách trên lộ trình Toán.</p>
            </div>
            <div class="flex flex-wrap items-center gap-2">
                <a href="index.html" class="inline-flex items-center gap-2 rounded border border-slate-200 bg-white px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-50">
                    <i class="fas fa-home"></i> Trang chủ
                </a>
                <div id="teacherAccountLabel" class="rounded border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-semibold text-slate-800">Giáo viên</div>
                <button id="logoutBtn" type="button" class="inline-flex items-center gap-2 rounded border border-rose-200 bg-white px-4 py-2 text-sm font-bold text-rose-700 hover:bg-rose-50">
                    <i class="fas fa-right-from-bracket"></i> Đăng xuất
                </button>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-5">
        <div id="progressDashboardMount"></div>
    </main>

    <script>
        (function () {
            if (!localStorage.getItem('authToken')) {
                window.location.href = 'login.html';
                return;
            }
            if (localStorage.getItem('userRole') !== 'teacher') {
                window.location.href = 'index.html';
                return;
            }
            const label = document.getElementById('teacherAccountLabel');
            if (label) {
                label.textContent = localStorage.getItem('userName') || localStorage.getItem('userEmail') || 'Giáo viên';
            }
            document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                if (!confirm('Đăng xuất?')) return;
                try { await fetch('api/logout.php', { method: 'POST', cache: 'no-store' }); } catch {}
                localStorage.clear();
                window.location.href = 'login.html';
            });
        })();
    </script>
    <script src="teacher-lotrinh-nav.js?v=20260624-reminders"></script>
    <script src="admin-progress.js?v=20260622-submissions-merge1"></script>
</body>

</html>
