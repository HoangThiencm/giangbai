<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Game 3: Mở Khóa Kiến Thức</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex {
            font-size: 1.1em;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lock-unlock {
            animation: unlockAnim 0.6s ease-out;
        }

        @keyframes unlockAnim {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2) rotate(10deg);
            }

            100% {
                transform: scale(1) rotate(0deg);
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-cyan-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MathText = ({ text }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!text || !ref.current) return;
                let processed = text.replace(/`([^`]+)`/g, '$$$1$$').replace(/\\\[(.+?)\\\]/g, '$$$$1$$').replace(/\\\((.+?)\\\)/g, '$$$1$$');
                if (processed.includes('\\') && !processed.includes('$')) processed = `$${processed}$`;
                const parts = processed.split(/($$[\s\S]+?$$|\$[\s\S]+?\$)/g);
                ref.current.innerHTML = "";
                parts.forEach(part => {
                    if (part.startsWith('$$') && part.endsWith('$$')) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(2, -2), span, { throwOnError: false, displayMode: true }); } catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); } catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else {
                        ref.current.appendChild(document.createTextNode(part));
                    }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        const UnlockGame = () => {
            const [gameData, setGameData] = useState(null);
            const [unlockedCount, setUnlockedCount] = useState(0);
            const [currentLockIndex, setCurrentLockIndex] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showAnswer, setShowAnswer] = useState(false);
            const [showHint, setShowHint] = useState(false);
            const [allUnlocked, setAllUnlocked] = useState(false);
            const [showInstructions, setShowInstructions] = useState(true);

            useEffect(() => {
                const data = localStorage.getItem('gameData');
                if (!data) {
                    alert('Không có dữ liệu game!');
                    window.location.href = 'trochoi.html';
                    return;
                }
                setGameData(JSON.parse(data));
            }, []);

            const handleSelectAnswer = (idx) => {
                if (showAnswer) return;
                setSelectedAnswer(idx);
            };

            const handleSubmit = () => {
                if (selectedAnswer === null) return;
                setShowAnswer(true);

                const currentQuestion = gameData.content.questions[currentLockIndex];
                const isCorrect = selectedAnswer === currentQuestion.answer;

                if (isCorrect) {
                    setTimeout(() => {
                        setUnlockedCount(unlockedCount + 1);
                        if (currentLockIndex < gameData.content.questions.length - 1) {
                            setCurrentLockIndex(currentLockIndex + 1);
                            setSelectedAnswer(null);
                            setShowAnswer(false);
                            setShowHint(false);
                        } else {
                            setAllUnlocked(true);
                        }
                    }, 1500);
                }
            };

            if (!gameData) return <div className="flex items-center justify-center min-h-screen"><div className="text-2xl">Đang tải...</div></div>;

            const totalLocks = gameData.content.questions.length;

            if (allUnlocked) {
                return (
                    <div className="max-w-3xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-12 text-center">
                            <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 lock-unlock">
                                <i className="fas fa-unlock text-5xl text-green-600"></i>
                            </div>
                            <h2 className="text-4xl font-bold mb-4 text-gray-800">Đã mở khóa!</h2>
                            <p className="text-xl text-gray-600 mb-8">Bạn đã mở {totalLocks} ổ khóa và sẵn sàng vào bài học mới!</p>
                            <div className="flex gap-4 justify-center">
                                <button onClick={() => window.location.reload()} className="px-8 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700">
                                    <i className="fas fa-redo mr-2"></i>Chơi lại
                                </button>
                                <button onClick={() => window.location.href = 'trochoi.html'} className="px-8 py-3 bg-gray-600 text-white rounded-xl font-bold hover:bg-gray-700">
                                    <i className="fas fa-home mr-2"></i>Về menu
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentQuestion = gameData.content.questions[currentLockIndex];

            if (showInstructions) {
                return (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-3xl font-bold text-blue-700">
                                    <i className="fas fa-unlock mr-3"></i>MỞ KHÓA KIẾN THỨC
                                </h2>
                                <button onClick={() => setShowInstructions(false)} className="text-gray-500 hover:text-gray-700">
                                    <i className="fas fa-times text-2xl"></i>
                                </button>
                            </div>
                            <div className="space-y-4 text-gray-700">
                                <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-4">
                                    <h3 className="font-bold text-lg text-blue-800 mb-2">
                                        <i className="fas fa-bullseye mr-2"></i>Mục tiêu
                                    </h3>
                                    <p>Dẫn vào bài mới, giới thiệu kiến thức. Mở đủ khóa để vào bài học!</p>
                                </div>
                                <div>
                                    <h3 className="font-bold text-lg text-gray-800 mb-2">
                                        <i className="fas fa-gamepad mr-2"></i>Luật chơi
                                    </h3>
                                    <ul className="space-y-2 ml-6">
                                        <li className="flex items-start gap-2">
                                            <span className="text-blue-600 font-bold">1.</span>
                                            <span>Có <strong>3-7 ổ khóa</strong> cần mở</span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-blue-600 font-bold">2.</span>
                                            <span>Mỗi câu đúng → <strong className="text-green-600">Mở 1 khóa</strong></span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-blue-600 font-bold">3.</span>
                                            <span>Sai → Xem <strong>gợi ý</strong> (nhưng không được điểm)</span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-blue-600 font-bold">4.</span>
                                            <span>Mở đủ tất cả → <strong className="text-green-600">VÀO BÀI HỌC</strong></span>
                                        </li>
                                    </ul>
                                </div>
                                <div>
                                    <h3 className="font-bold text-lg text-gray-800 mb-2">
                                        <i className="fas fa-calculator mr-2"></i>Tính điểm
                                    </h3>
                                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 space-y-2">
                                        <p>Mỗi khóa mở = <strong>+10 điểm</strong></p>
                                        <p className="text-sm">Sử dụng gợi ý = <strong className="text-red-600">-5 điểm</strong></p>
                                    </div>
                                </div>
                                <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                                    <p className="text-sm">
                                        <i className="fas fa-lightbulb text-yellow-600 mr-2"></i>
                                        <strong>Mẹo:</strong> Thử suy nghĩ trước khi xem gợi ý để giữ điểm!
                                    </p>
                                </div>
                            </div>
                            <button
                                onClick={() => setShowInstructions(false)}
                                className="w-full mt-6 py-4 bg-gradient-to-r from-blue-600 to-cyan-600 text-white rounded-xl font-bold text-lg hover:shadow-xl transition"
                            >
                                <i className="fas fa-play mr-2"></i>Bắt đầu chơi
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto p-6 fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex gap-2">
                            <button onClick={() => window.location.href = 'trochoi.html'} className="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                                <i className="fas fa-arrow-left mr-2"></i>Thoát
                            </button>
                            <button onClick={() => setShowInstructions(true)} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700" title="Xem hướng dẫn">
                                <i className="fas fa-question-circle"></i>
                            </button>
                        </div>

                        <h1 className="text-3xl font-bold text-blue-700">
                            <i className="fas fa-unlock mr-2"></i>MỞ KHÓA KIẾN THỨC
                        </h1>

                        <div className="text-xl font-bold text-blue-600">
                            {unlockedCount}/{totalLocks} khóa
                        </div>
                    </div>

                    {/* Locks Display */}
                    <div className="flex justify-center gap-3 mb-8">
                        {Array.from({ length: totalLocks }).map((_, idx) => (
                            <div key={idx} className={`w-16 h-20 rounded-lg flex items-center justify-center transition ${idx < unlockedCount ? 'bg-green-500 lock-unlock' :
                                idx === currentLockIndex ? 'bg-yellow-500 animate-pulse' :
                                    'bg-gray-300'
                                }`}>
                                <i className={`fas ${idx < unlockedCount ? 'fa-unlock text-white' : 'fa-lock text-gray-600'} text-3xl`}></i>
                            </div>
                        ))}
                    </div>

                    <div className="bg-white rounded-3xl shadow-2xl p-8 mb-6">
                        <div className="text-sm text-gray-500 mb-2">Khóa {currentLockIndex + 1}/{totalLocks}</div>
                        <h3 className="text-2xl font-bold text-gray-800 mb-6">
                            <MathText text={currentQuestion.prompt} />
                        </h3>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            {currentQuestion.choices.map((choice, idx) => {
                                const isSelected = selectedAnswer === idx;
                                const isCorrect = currentQuestion.answer === idx;

                                let className = "p-4 rounded-xl border-2 cursor-pointer transition font-medium ";
                                if (showAnswer) {
                                    if (isCorrect) className += "bg-green-100 border-green-500 text-green-900";
                                    else if (isSelected) className += "bg-red-100 border-red-500 text-red-900";
                                    else className += "border-gray-200 opacity-50";
                                } else {
                                    className += isSelected ? "bg-blue-100 border-blue-500" : "border-gray-300 hover:border-blue-400 hover:bg-blue-50";
                                }

                                return (
                                    <button key={idx} onClick={() => handleSelectAnswer(idx)} disabled={showAnswer} className={className}>
                                        <div className="flex items-center gap-3">
                                            <span className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center font-bold">
                                                {String.fromCharCode(65 + idx)}
                                            </span>
                                            <div className="flex-1 text-left"><MathText text={choice} /></div>
                                        </div>
                                    </button>
                                );
                            })}
                        </div>

                        {showHint && currentQuestion.hint && (
                            <div className="p-4 bg-yellow-50 border-2 border-yellow-300 rounded-xl mb-4">
                                <div className="font-bold text-yellow-800 mb-1">
                                    <i className="fas fa-lightbulb mr-2"></i>Gợi ý:
                                </div>
                                <div className="text-gray-700"><MathText text={currentQuestion.hint} /></div>
                            </div>
                        )}

                        <div className="flex gap-4">
                            {!showHint && !showAnswer && currentQuestion.hint && (
                                <button onClick={() => setShowHint(true)} className="px-6 py-3 bg-yellow-500 text-white rounded-xl font-bold hover:bg-yellow-600">
                                    <i className="fas fa-lightbulb mr-2"></i>Xem gợi ý
                                </button>
                            )}

                            {!showAnswer && selectedAnswer !== null && (
                                <button onClick={handleSubmit} className="flex-1 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700">
                                    <i className="fas fa-key mr-2"></i>Mở khóa
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<UnlockGame />, document.getElementById('root'));
    </script>
</body>

</html>
