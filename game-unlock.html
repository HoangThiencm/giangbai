                                                    >
                                                        <i className="fas fa-square-root-alt"></i>
                                                    </button>
                                                    <button
                                                        onClick={() => setEditingQuestion(q)}
                                                        className="px-3 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 text-sm"
                                                    >
                                                        <i className="fas fa-edit"></i>
                                                    </button>
                                                    <button
                                                        onClick={() => {
                                                            if (confirm('Xóa?')) setQuestions(questions.filter((_, i) => i !== idx));
                                                        }}
                                                        className="px-3 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 text-sm"
                                                    >
                                                        <i className="fas fa-trash"></i>
                                                    </button>
                                                    {EditStorage.hasEdits(q.id) && (
                                                        <button
                                                            onClick={() => {
                                                                if (confirm('Reset về bản gốc?')) {
                                                                    EditStorage.clearQuestion(q.id);
                                                                    window.location.reload();
                                                                }
                                                            }}
                                                            className="px-3 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 text-sm"
                                                            title="Reset về bản gốc"
                                                        >
                                                            <i className="fas fa-undo"></i>
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                            <button
                                onClick={() => setCurrentScreen('AI_GEN')}
                                className="w-full mt-6 py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600"
                            >
                                <i className="fas fa-arrow-left mr-2"></i>Quay lại
                            </button>
                        </div>
                    </div>
                );

                return (
                    <React.Fragment>
                        {editScreenContent}
                        {mathEditingQuestion && (
                            <EditQuestionModal
                                question={mathEditingQuestion}
                                questionIndex={mathEditingIndex}
                                onSave={(editedData) => {
                                    const q = mathEditingQuestion;
                                    const idx = mathEditingIndex;

                                    // Save to localStorage
                                    Object.keys(editedData).forEach(field => {
                                        EditStorage.saveEdit(q.id, field, editedData[field]);
                                    });

                                    // Update questions in state
                                    const updated = [...questions];
                                    updated[idx] = {
                                        ...updated[idx],
                                        ...editedData
                                    };
                                    setQuestions(updated);

                                    // Close modal
                                    setMathEditingQuestion(null);
                                    setMathEditingIndex(null);
                                }}
                                onClose={() => {
                                    setMathEditingQuestion(null);
                                    setMathEditingIndex(null);
                                }}
                            />
                        )}
                    </React.Fragment>
                );
            }


            // SCREEN: SETUP
            if (currentScreen === 'SETUP') {
                return (
                    <div className="max-w-3xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-8">
                            <h2 className="text-3xl font-bold text-gray-800 mb-6">
                                <i className="fas fa-user mr-2"></i>Thông tin
                            </h2>

                            <div className="space-y-4">
                                <div className="p-4 bg-blue-50 border border-blue-300 rounded-xl">
                                    <p className="font-bold text-blue-800">
                                        Chế độ: {gameMode === 'individual' ? '👤 Cá nhân' : gameMode === 'team' ? '👥 Đội' : '🏫 Lớp'}
                                    </p>
                                </div>

                                <div>
                                    <label className="block font-bold mb-2">Tên:</label>
                                    <input
                                        type="text"
                                        value={playerName}
                                        onChange={(e) => setPlayerName(e.target.value)}
                                        className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-blue-500 outline-none"
                                        placeholder="VD: Bạn An, Nhóm 1..."
                                    />
                                </div>

                                <div>
                                    <label className="block font-bold mb-2">Avatar:</label>
                                    <div className="flex gap-2">
                                        {['👨‍🎓', '👩‍🎓', '🧑‍💼', '👨‍💻', '👩‍💻', '🦸‍♂️', '🦸‍♀️', '🧙‍♂️'].map(emoji => (
                                            <button
                                                key={emoji}
                                                onClick={() => setPlayerAvatar(emoji)}
                                                className={`text-4xl p-3 rounded-xl border-2 transition ${playerAvatar === emoji
                                                    ? 'border-blue-500 bg-blue-50'
                                                    : 'border-gray-200 hover:border-blue-300'
                                                    }`}
                                            >
                                                {emoji}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-3 mt-6">
                                <button
                                    onClick={() => setCurrentScreen('EDIT')}
                                    className="px-6 py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600"
                                >
                                    <i className="fas fa-arrow-left mr-2"></i>Quay lại
                                </button>
                                <button
                                    onClick={startGame}
                                    className="flex-1 py-3 bg-gradient-to-r from-blue-600 to-cyan-600 text-white rounded-xl font-bold text-lg hover:shadow-xl"
                                >
                                    <i className="fas fa-unlock mr-2"></i>Bắt đầu
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // SCREEN: GAME
            if (currentScreen === 'GAME') {
                const currentQ = questions[currentQuestionIndex];
                if (!currentQ) return null;

                const progress = revealedChars.join('');
                const hiddenCode = codeWord.split('').map((ch, i) =>
                    revealedChars.includes(ch) || progress.length > i ? ch : '_'
                ).join(' ');

                const hasAnswer =
                    (currentQ.type === 'mcq' && selectedAnswer !== null) ||
                    (currentQ.type === 'truefalse' && trueFalseAnswer !== null) ||
                    (currentQ.type === 'fill-blank' && fillAnswers.some(a => a)) ||
                    (currentQ.type === 'multi-select' && selectedAnswers.length > 0) ||
                    (currentQ.type === 'matching' && matchingPairs.length > 0) ||
                    (currentQ.type === 'drag-drop' && dragOrder.length > 0);

                return (
                    <div className="max-w-5xl mx-auto p-6 fade-in">
                        {/* Player Info */}
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-4">
                                <div className="text-4xl">{playerAvatar}</div>
                                <div>
                                    <div className="font-bold text-gray-800">{playerName}</div>
                                    <div className="text-2xl font-bold text-blue-600">{score} điểm</div>
                                </div>
                            </div>
                            <button
                                onClick={() => setCurrentScreen('INSTRUCTIONS')}
                                className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                                title="Hướng dẫn"
                            >
                                <i className="fas fa-question-circle"></i>
                            </button>
                        </div>

                        {/* Code Progress + Betting */}
                        <div className="bg-white rounded-3xl shadow-xl p-6 mb-6 treasure-glow">
                            <div className="text-center">
                                <div className="text-sm text-gray-600 mb-2">
                                    Mã bí mật ({revealedChars.length}/{codeWord.length})
                                </div>
                                <div className="text-5xl font-bold text-blue-700 tracking-widest font-mono">
                                    {hiddenCode}
                                </div>
                                <div className="flex justify-center gap-2 mt-4">
                                    {Array.from({ length: questions.length }).map((_, idx) => (
                                        <div
                                            key={idx}
                                            className={`w-12 h-14 rounded-lg flex items-center justify-center transition ${idx < revealedChars.length
                                                ? 'bg-green-500 lock-unlock'
                                                : idx === currentQuestionIndex
                                                    ? 'bg-yellow-500 animate-pulse'
                                                    : 'bg-gray-300'
                                                }`}
                                        >
                                            <i
                                                className={`fas ${idx < revealedChars.length
                                                    ? 'fa-unlock text-white'
                                                    : 'fa-lock text-gray-600'
                                                    } text-2xl`}
                                            ></i>
                                        </div>
                                    ))}
                                </div>

                                {/* Betting UI */}
                                {canGuess && !showGuessInput && (
                                    <button
                                        onClick={() => setShowGuessInput(true)}
                                        className="mt-4 px-6 py-3 bg-yellow-500 text-white rounded-xl font-bold hover:bg-yellow-600"
                                    >
                                        <i className="fas fa-star mr-2"></i>Đoán sớm (Cược điểm)
                                    </button>
                                )}

                                {showGuessInput && (
                                    <div className="mt-4 p-4 bg-yellow-50 border-2 border-yellow-400 rounded-xl bet-pulse">
                                        <div className="font-bold text-yellow-800 mb-2">
                                            <i className="fas fa-coins mr-2"></i>Đoán từ khóa (Cược điểm)
                                        </div>
                                        <div className="flex gap-2 mb-2">
                                            <input
                                                type="text"
                                                value={guessWord}
                                                onChange={(e) => setGuessWord(e.target.value)}
                                                placeholder="Nhập từ khóa..."
                                                className="flex-1 px-4 py-2 border-2 border-yellow-400 rounded-lg outline-none"
                                            />
                                            <input
                                                type="number"
                                                value={betPoints}
                                                onChange={(e) => setBetPoints(parseInt(e.target.value) || 0)}
                                                placeholder="Cược"
                                                className="w-24 px-4 py-2 border-2 border-yellow-400 rounded-lg outline-none"
                                                min="0"
                                                max={score}
                                            />
                                        </div>
                                        <div className="flex gap-2">
                                            <button
                                                onClick={handleGuess}
                                                className="flex-1 py-2 bg-yellow-600 text-white rounded-lg font-bold hover:bg-yellow-700"
                                            >
                                                <i className="fas fa-dice mr-2"></i>Đoán ({betPoints}đ)
                                            </button>
                                            <button
                                                onClick={() => {
                                                    setShowGuessInput(false);
                                                    setGuessWord('');
                                                    setBetPoints(0);
                                                }}
                                                className="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600"
                                            >
                                                Hủy
                                            </button>
                                        </div>
                                        <p className="text-xs text-gray-600 mt-2">
                                            Đúng: +{betPoints}đ | Sai: -{betPoints}đ
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Question Card */}
                        <div className="bg-white rounded-3xl shadow-2xl p-8">
                            <div className="text-sm text-gray-500 mb-2">
                                Câu {currentQuestionIndex + 1}/{questions.length} - Dạng: {currentQ.type}
                            </div>
                            <h3 className="text-2xl font-bold text-gray-800 mb-6">
                                <MathText text={currentQ.prompt} />
                            </h3>

                            {/* Question Type Renders - Continues in next write due to length */}
                            {currentQ.type === 'mcq' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                    {currentQ.choices.map((choice, idx) => {
                                        const isSelected = selectedAnswer === idx;
                                        const isCorrect = currentQ.answer === idx;
                                        let className = "p-4 rounded-xl border-2 cursor-pointer transition font-medium ";

                                        if (showAnswer) {
                                            if (isCorrect) className += "bg-green-100 border-green-500 text-green-900";
                                            else if (isSelected) className += "bg-red-100 border-red-500 text-red-900";
                                            else className += "border-gray-200 opacity-50";
                                        } else {
                                            className += isSelected
                                                ? "bg-blue-100 border-blue-500"
                                                : "border-gray-300 hover:border-blue-400 hover:bg-blue-50";
                                        }

                                        return (
                                            <button
                                                key={idx}
                                                onClick={() => !showAnswer && setSelectedAnswer(idx)}
                                                disabled={showAnswer}
                                                className={className}
                                            >
                                                <div className="flex items-center gap-3">
                                                    <span className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center font-bold">
                                                        {String.fromCharCode(65 + idx)}
                                                    </span>
                                                    <div className="flex-1 text-left">
                                                        <MathText text={choice} />
                                                    </div>
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            )}

                            {/* TRUE/FALSE Type */}
                            {currentQ.type === 'truefalse' && (
                                <div className="grid grid-cols-2 gap-4 mb-4">
                                    {[
                                        { value: true, label: 'ĐÚNG', icon: 'fa-check-circle', color: 'green' },
                                        { value: false, label: 'SAI', icon: 'fa-times-circle', color: 'red' }
                                    ].map((option) => {
                                        const isSelected = trueFalseAnswer === option.value;
                                        const isCorrect = currentQ.answer === option.value;
                                        let className = `p-6 rounded-xl border-2 cursor-pointer transition font-bold text-lg `;

                                        if (showAnswer) {
                                            if (isCorrect) className += `bg-${option.color}-100 border-${option.color}-500 text-${option.color}-900`;
                                            else if (isSelected) className += "bg-gray-100 border-gray-400 opacity-50";
                                            else className += "border-gray-200 opacity-30";
                                        } else {
                                            className += isSelected
                                                ? `bg-${option.color}-50 border-${option.color}-500`
                                                : "border-gray-300 hover:border-blue-400";
                                        }

                                        return (
                                            <button
                                                key={String(option.value)}
                                                onClick={() => !showAnswer && setTrueFalseAnswer(option.value)}
                                                disabled={showAnswer}
                                                className={className}
                                            >
                                                <i className={`fas ${option.icon} text-4xl mb-2`}></i>
                                                <div>{option.label}</div>
                                            </button>
                                        );
                                    })}
                                </div>
                            )}

                            {/* Rest of question types and hints/buttons will continue */}

                            {/* FILL-BLANK Type - Click Pills */}
                            {currentQ.type === 'fill-blank' && (
                                <div className="mb-4">
                                    <div className="text-sm text-gray-600 mb-3 font-medium">
                                        <i className="fas fa-hand-pointer mr-2"></i>Click chọn đáp án phù hợp
                                    </div>
                                    <div className="flex flex-wrap gap-3 justify-center">
                                        {currentQ.choices && currentQ.choices.map((choice, idx) => {
                                            const isSelected = selectedAnswer === idx;
                                            const isCorrect = currentQ.answer === idx;
                                            let className = "px-6 py-3 rounded-full border-2 cursor-pointer transition font-bold text-lg ";

                                            if (showAnswer) {
                                                if (isCorrect) className += "bg-green-100 border-green-500 text-green-900 shadow-lg";
                                                else if (isSelected) className += "bg-red-100 border-red-500 text-red-900";
                                                else className += "border-gray-200 opacity-40";
                                            } else {
                                                className += isSelected
                                                    ? "bg-blue-500 border-blue-600 text-white shadow-lg transform scale-110"
                                                    : "bg-white border-blue-300 hover:border-blue-500 hover:bg-blue-50 hover:shadow";
                                            }

                                            return (
                                                <button
                                                    key={idx}
                                                    onClick={() => !showAnswer && setSelectedAnswer(idx)}
                                                    disabled={showAnswer}
                                                    className={className}
                                                    style={{ transition: 'all 0.2s ease' }}
                                                >
                                                    <MathText text={choice} />
                                                </button>
                                            );
                                        })}
                                    </div>
                                    {selectedAnswer !== null && !showAnswer && (
                                        <div className="mt-4 p-3 bg-blue-50 border border-blue-300 rounded-lg text-center">
                                            <span className="text-blue-800 font-medium">
                                                <i className="fas fa-check-circle mr-2"></i>
                                                Đã chọn: <strong><MathText text={currentQ.choices[selectedAnswer]} /></strong>
                                            </span>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* MULTI-SELECT Type */}
                            {currentQ.type === 'multi-select' && (
                                <div className="mb-4">
                                    <div className="text-sm text-gray-600 mb-3 font-medium">
                                        <i className="fas fa-info-circle mr-2"></i>Chọn TẤT CẢ đáp án đúng
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        {currentQ.choices.map((choice, idx) => {
                                            const isSelected = selectedAnswers.includes(idx);
                                            const isCorrect = currentQ.answers.includes(idx);
                                            let className = "p-4 rounded-xl border-2 cursor-pointer transition font-medium ";

                                            if (showAnswer) {
                                                if (isCorrect) className += "bg-green-100 border-green-500 text-green-900";
                                                else if (isSelected) className += "bg-red-100 border-red-500 text-red-900";
                                                else className += "border-gray-200 opacity-50";
                                            } else {
                                                className += isSelected
                                                    ? "bg-blue-100 border-blue-500"
                                                    : "border-gray-300 hover:border-blue-400 hover:bg-blue-50";
                                            }

                                            return (
                                                <button
                                                    key={idx}
                                                    onClick={() => {
                                                        if (showAnswer) return;
                                                        if (isSelected) {
                                                            setSelectedAnswers(selectedAnswers.filter(a => a !== idx));
                                                        } else {
                                                            setSelectedAnswers([...selectedAnswers, idx]);
                                                        }
                                                    }}
                                                    disabled={showAnswer}
                                                    className={className}
                                                >
                                                    <div className="flex items-center gap-3">
                                                        <div className={`w-6 h-6 rounded border-2 flex items-center justify-center ${isSelected ? 'bg-blue-500 border-blue-500' : 'border-gray-400'
                                                            }`}>
                                                            {isSelected && <i className="fas fa-check text-white text-sm"></i>}
                                                        </div>
                                                        <div className="flex-1 text-left">
                                                            <MathText text={choice} />
                                                        </div>
                                                    </div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* MATCHING Type */}
                            {currentQ.type === 'matching' && (
                                <div className="mb-4">
                                    <div className="text-sm text-gray-600 mb-3 font-medium">
                                        <i className="fas fa-link mr-2"></i>Ghép cột trái với cột phải (click để chọn)
                                    </div>
                                    {/* Header Row */}
                                    <div className="grid grid-cols-2 gap-4 mb-3">
                                        <div className="font-bold text-blue-700 text-center bg-blue-100 py-2 rounded-lg">
                                            📋 Cột A
                                        </div>
                                        <div className="font-bold text-purple-700 text-center bg-purple-100 py-2 rounded-lg">
                                            📝 Cột B
                                        </div>
                                    </div>

                                    {/* Row-based Items */}
                                    <div className="space-y-2">
                                        {currentQ.leftItems && currentQ.leftItems.map((leftItem, idx) => {
                                            const rightItem = currentQ.rightItems && currentQ.rightItems[idx];
                                            const paired = matchingPairs.find(p => p[0] === idx);
                                            const rightPaired = matchingPairs.some(p => p[1] === idx);

                                            // Left item styling
                                            let leftClass = "p-3 rounded-lg border-2 cursor-pointer transition w-full text-left ";
                                            if (showAnswer) {
                                                const correct = currentQ.correctPairs.find(p => p[0] === idx);
                                                if (correct && paired && paired[1] === correct[1]) {
                                                    leftClass += "bg-green-100 border-green-500";
                                                } else {
                                                    leftClass += "bg-red-100 border-red-500";
                                                }
                                            } else {
                                                leftClass += paired
                                                    ? "bg-blue-100 border-blue-500"
                                                    : "border-gray-300 hover:border-blue-400";
                                            }

                                            // Right item styling
                                            let rightClass = "p-3 rounded-lg border-2 cursor-pointer transition w-full text-left ";
                                            if (showAnswer) {
                                                const correct = currentQ.correctPairs.find(p => p[1] === idx);
                                                const leftIdx = matchingPairs.find(p => p[1] === idx)?.[0];
                                                if (correct && leftIdx !== undefined && leftIdx === correct[0]) {
                                                    rightClass += "bg-green-100 border-green-500";
                                                } else {
                                                    rightClass += "bg-red-100 border-red-500";
                                                }
                                            } else {
                                                rightClass += rightPaired
                                                    ? "bg-purple-100 border-purple-500"
                                                    : "border-gray-300 hover:border-purple-400";
                                            }

                                            return (
                                                <div key={idx} className="grid grid-cols-2 gap-4">
                                                    {/* Cột A Item */}
                                                    <button
                                                        onClick={() => {
                                                            if (showAnswer) return;
                                                            setMatchingPairs(prev => {
                                                                const newPairs = prev.filter(p => p[0] !== idx);
                                                                return newPairs.length === prev.length ? [...newPairs, [idx, -1]] : newPairs;
                                                            });
                                                        }}
                                                        disabled={showAnswer}
                                                        className={leftClass}
                                                    >
                                                        <div className="flex items-center justify-between">
                                                            <div className="flex items-center gap-2">
                                                                <span className="font-bold text-blue-600">{idx + 1}.</span>
                                                                <MathText text={leftItem} />
                                                            </div>
                                                            {paired && paired[1] !== -1 && !showAnswer && (
                                                                <div className="text-sm bg-blue-50 px-2 py-1 rounded">
                                                                    → {String.fromCharCode(65 + paired[1])}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </button>

                                                    {/* Cột B Item */}
                                                    <button
                                                        onClick={() => {
                                                            if (showAnswer) return;
                                                            const selected = matchingPairs.find(p => p[1] === -1);
                                                            if (selected) {
                                                                setMatchingPairs(prev =>
                                                                    prev.map(p => p === selected ? [selected[0], idx] : p)
                                                                );
                                                            }
                                                        }}
                                                        disabled={showAnswer}
                                                        className={rightClass}
                                                    >
                                                        <div className="flex items-center gap-2">
                                                            <span className="font-bold text-purple-600">{String.fromCharCode(65 + idx)}.</span>
                                                            <MathText text={rightItem} />
                                                        </div>
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* Show current matching pairs (before submit) */}
                                    {!showAnswer && matchingPairs.length > 0 && (
                                        <div className="mt-4 p-4 bg-blue-50 border-2 border-blue-300 rounded-xl">
                                            <div className="font-bold text-blue-800 mb-2">
                                                <i className="fas fa-check-double mr-2"></i>Cặp đã ghép ({matchingPairs.filter(p => p[1] !== -1).length}/{currentQ.leftItems.length}):
                                            </div>
                                            <div className="space-y-1">
                                                {matchingPairs.filter(p => p[1] !== -1).map(pair => (
                                                    <div key={pair[0]} className="flex items-center gap-2 text-sm">
                                                        <span className="font-medium">{pair[0] + 1}.</span>
                                                        <MathText text={currentQ.leftItems[pair[0]]} />
                                                        <span className="mx-2">→</span>
                                                        <span className="font-medium">{String.fromCharCode(65 + pair[1])}.</span>
                                                        <MathText text={currentQ.rightItems[pair[1]]} />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Show matching results */}
                                    {showAnswer && (
                                        <div className="mt-4 p-4 bg-gray-50 border-2 border-gray-300 rounded-xl">
                                            <div className="font-bold text-gray-800 mb-2">
                                                <i className="fas fa-list mr-2"></i>Kết quả ghép cặp:
                                            </div>
                                            <div className="space-y-2">
                                                {currentQ.leftItems && currentQ.leftItems.map((leftItem, leftIdx) => {
                                                    const userPair = matchingPairs.find(p => p[0] === leftIdx);
                                                    const correctPair = currentQ.correctPairs.find(p => p[0] === leftIdx);
                                                    const isCorrect = userPair && correctPair && userPair[1] === correctPair[1];

                                                    return (
                                                        <div key={leftIdx} className={`p-2 rounded ${isCorrect ? 'bg-green-100' : 'bg-red-100'}`}>
                                                            <div className="flex items-center gap-2">
                                                                <i className={`fas ${isCorrect ? 'fa-check-circle text-green-600' : 'fa-times-circle text-red-600'}`}></i>
                                                                <MathText text={leftItem} />
                                                                <span className="mx-2">→</span>
                                                                {userPair && userPair[1] !== -1 ? (
                                                                    <>
                                                                        <MathText text={currentQ.rightItems[userPair[1]]} />
                                                                        {!isCorrect && (
                                                                            <span className="text-sm text-gray-600 ml-2">
                                                                                (Đúng: <MathText text={currentQ.rightItems[correctPair[1]]} />)
                                                                            </span>
                                                                        )}
                                                                    </>
                                                                ) : (
                                                                    <span className="text-gray-500 italic">Chưa ghép</span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* DRAG-DROP Type */}
                            {currentQ.type === 'drag-drop' && (
                                <div className="mb-4">
                                    <div className="text-sm text-gray-600 mb-3 font-medium">
                                        <i className="fas fa-arrows-alt mr-2"></i>Kéo thả để sắp xếp đúng thứ tự
                                    </div>
                                    {currentQ.items && currentQ.items.length > 0 ? (
                                        <div className="space-y-2">
                                            {(dragOrder.length > 0 ? dragOrder : currentQ.items.map((_, i) => i)).map((itemIdx, displayIdx) => {
                                                const item = currentQ.items[itemIdx];
                                                if (!item) return null;
                                                const isCorrect = showAnswer && currentQ.correctOrder && currentQ.correctOrder[displayIdx] === itemIdx;

                                                return (
                                                    <div
                                                        key={`${item}-${displayIdx}`}
                                                        draggable={!showAnswer}
                                                        onDragStart={(e) => handleDragStart(e, displayIdx)}
                                                        onDragOver={handleDragOver}
                                                        onDrop={(e) => handleDrop(e, displayIdx)}
                                                        className={`drag-item p-4 rounded-xl border-2 flex items-center gap-3 ${showAnswer
                                                            ? isCorrect
                                                                ? 'bg-green-100 border-green-500'
                                                                : 'bg-red-100 border-red-500'
                                                            : 'border-gray-300 bg-white hover:border-blue-400 hover:shadow-md'
                                                            }`}
                                                    >
                                                        <div className="text-2xl text-gray-400">
                                                            <i className="fas fa-grip-vertical"></i>
                                                        </div>
                                                        <div className="flex-1">
                                                            <MathText text={item} />
                                                        </div>
                                                        <div className="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center font-bold text-blue-700">
                                                            {displayIdx + 1}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    ) : (
                                        <div className="p-4 bg-red-50 border-2 border-red-300 rounded-xl text-red-700">
                                            ⚠️ Lỗi: Câu hỏi kéo thả không có items!
                                        </div>
                                    )}
                                </div>
                            )}


                            {/* Hints */}
                            {showHint1 && currentQ.hint1 && (
                                <div className="p-4 bg-yellow-50 border-2 border-yellow-300 rounded-xl mb-4">
                                    <div className="font-bold text-yellow-800 mb-1">
                                        <i className="fas fa-lightbulb mr-2"></i>Gợi ý 1:
                                    </div>
                                    <div className="text-gray-700">
                                        <MathText text={currentQ.hint1} />
                                    </div>
                                </div>
                            )}

                            {showHint2 && currentQ.hint2 && (
                                <div className="p-4 bg-orange-50 border-2 border-orange-300 rounded-xl mb-4">
                                    <div className="font-bold text-orange-800 mb-1">
                                        <i className="fas fa-fire mr-2"></i>Gợi ý 2:
                                    </div>
                                    <div className="text-gray-700">
                                        <MathText text={currentQ.hint2} />
                                    </div>
                                </div>
                            )}

                            {/* Action Buttons */}
                            <div className="flex gap-4">
                                {!showHint1 && !showAnswer && currentQ.hint1 && (
                                    <button
                                        onClick={() => {
                                            setShowHint1(true);
                                            setHintsUsed({ ...hintsUsed, 1: true });
                                        }}
                                        className="px-6 py-3 bg-yellow-500 text-white rounded-xl font-bold hover:bg-yellow-600"
                                    >
                                        <i className="fas fa-lightbulb mr-2"></i>Hint 1 (-2đ)
                                    </button>
                                )}
                                {!showHint2 && !showAnswer && currentQ.hint2 && (
                                    <button
                                        onClick={() => {
                                            setShowHint2(true);
                                            setHintsUsed({ ...hintsUsed, 2: true });
                                        }}
                                        className="px-6 py-3 bg-orange-500 text-white rounded-xl font-bold hover:bg-orange-600"
                                    >
                                        <i className="fas fa-fire mr-2"></i>Hint 2 (-5đ)
                                    </button>
                                )}
                                {!showAnswer && (() => {
                                    // Check if user has answered based on question type
                                    let hasAnswer = false;
                                    if (currentQ.type === 'mcq' || currentQ.type === 'fill-blank') {
                                        hasAnswer = selectedAnswer !== null;
                                    } else if (currentQ.type === 'truefalse') {
                                        hasAnswer = trueFalseAnswer !== null;
                                    } else if (currentQ.type === 'multi-select') {
                                        hasAnswer = selectedAnswers.length > 0;
                                    } else if (currentQ.type === 'matching') {
                                        hasAnswer = matchingPairs.length > 0;
                                    } else if (currentQ.type === 'drag-drop') {
                                        hasAnswer = dragOrder.length > 0; // Always true after init
                                    }
                                    return hasAnswer;
                                })() && (
                                        <button
                                            onClick={handleRevealAnswer}
                                            className="flex-1 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700"
                                        >
                                            <i className="fas fa-key mr-2"></i>Mở khóa
                                        </button>
                                    )}
                            </div>
                        </div>
                    </div>
                );
            }

            // SCREEN: SUCCESS
            if (currentScreen === 'SUCCESS') {
                return (
                    <div className="max-w-4xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-12 text-center">
                            <div className="w-32 h-32 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6 lock-unlock">
                                <i className="fas fa-unlock text-7xl text-green-600"></i>
                            </div>
                            <h1 className="text-5xl font-bold text-green-600 mb-4">Đã mở khóa!</h1>
                            <div className="text-3xl font-bold text-blue-700 mb-2">Mã: {codeWord}</div>
                            <p className="text-xl text-gray-600 mb-8">Sẵn sàng vào bài học!</p>

                            <div className="grid grid-cols-3 gap-6 mb-8">
                                <div className="bg-blue-50 rounded-2xl p-6">
                                    <div className="text-3xl mb-2">🎯</div>
                                    <div className="text-2xl font-bold text-blue-600">{score}</div>
                                    <div className="text-gray-600">Điểm</div>
                                </div>
                                <div className="bg-green-50 rounded-2xl p-6">
                                    <div className="text-3xl mb-2">🔓</div>
                                    <div className="text-2xl font-bold text-green-600">{revealedChars.length}</div>
                                    <div className="text-gray-600">Khóa mở</div>
                                </div>
                                <div className="bg-yellow-50 rounded-2xl p-6">
                                    <div className="text-3xl mb-2">💡</div>
                                    <div className="text-2xl font-bold text-yellow-600">
                                        {(hintsUsed[1] ? 1 : 0) + (hintsUsed[2] ? 1 : 0)}
                                    </div>
                                    <div className="text-gray-600">Hints</div>
                                </div>
                            </div>

                            {knowledgeCard && (
                                <div className="bg-gradient-to-br from-blue-50 to-cyan-50 border-2 border-blue-300 rounded-2xl p-8 mb-8 text-left">
                                    <h3 className="text-2xl font-bold text-blue-800 mb-4">
                                        <i className="fas fa-book mr-2"></i>{knowledgeCard.title}
                                    </h3>
                                    <p className="text-gray-700 mb-4">{knowledgeCard.summary}</p>

                                    {knowledgeCard.formula && (
                                        <div className="p-4 bg-white rounded-xl mb-4">
                                            <div className="font-bold text-gray-700 mb-2">Công thức:</div>
                                            <div className="text-center">
                                                <MathText text={knowledgeCard.formula} />
                                            </div>
                                        </div>
                                    )}

                                    {knowledgeCard.example && (
                                        <div className="p-4 bg-white rounded-xl mb-4">
                                            <div className="font-bold text-gray-700 mb-2">VD:</div>
                                            <div>
                                                <MathText text={knowledgeCard.example} />
                                            </div>
                                        </div>
                                    )}

                                    {knowledgeCard.tips && knowledgeCard.tips.length > 0 && (
                                        <div>
                                            <div className="font-bold text-gray-700 mb-2">Mẹo:</div>
                                            <ul className="list-disc ml-6 space-y-1">
                                                {knowledgeCard.tips.map((tip, i) => (
                                                    <li key={i} className="text-gray-700">{tip}</li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}
                                </div>
                            )}

                            <div className="flex gap-4 justify-center">
                                <button
                                    onClick={() => window.location.reload()}
                                    className="px-8 py-4 bg-green-600 text-white rounded-2xl font-bold text-lg hover:bg-green-700"
                                >
                                    <i className="fas fa-redo mr-2"></i>Chơi lại
                                </button>
                                <button
                                    onClick={() => window.location.href = 'index.html'}
                                    className="px-8 py-4 bg-gray-600 text-white rounded-2xl font-bold text-lg hover:bg-gray-700"
                                >
                                    <i className="fas fa-home mr-2"></i>Trang chủ
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return <div>Screen not found</div>;
        };

        ReactDOM.render(<UnlockGame />, document.getElementById('root'));
    </script>
</body>

</html>
