<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý văn bản</title>
    <script src="access-control.js?v=20260622-vanban-sector1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        body { font-family: "Segoe UI", Arial, sans-serif; background: #f6f8fb; }
    </style>
</head>
<body class="min-h-screen text-slate-900">
    <header class="border-b border-slate-200 bg-white">
        <div class="mx-auto flex max-w-7xl flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <a href="index.html" class="inline-flex items-center gap-2 text-sm font-semibold text-slate-600 hover:text-slate-900">
                    <i class="fa-solid fa-home"></i> Trang chính
                </a>
                <h1 class="mt-1 text-2xl font-black tracking-tight text-slate-950">
                    <i class="fa-solid fa-folder-open mr-2 text-slate-700"></i>Quản lý văn bản
                </h1>
                <p class="mt-1 text-sm text-slate-600">Tổng quan văn bản Hành chính và Đảng — hạn báo cáo, tệp minh chứng trên Google Drive.</p>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-5">
        <div id="loadError" class="mb-4 hidden rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-800"></div>
        <div id="driveWarning" class="mb-4 hidden rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm leading-6 text-amber-950"></div>

        <section id="summary" class="grid grid-cols-2 gap-3 lg:grid-cols-4"></section>

        <section class="mt-5">
            <h2 class="mb-3 text-sm font-extrabold uppercase tracking-[.12em] text-slate-500">Chọn lĩnh vực</h2>
            <div id="sectorCards" class="grid gap-4 lg:grid-cols-2"></div>
        </section>

        <section id="reminderPanel" class="mt-5 hidden rounded-xl border border-amber-200 bg-amber-50 p-4 shadow-sm">
            <div>
                <h2 class="font-extrabold text-amber-950"><i class="fa-solid fa-bell mr-2 text-amber-700"></i>Việc cần xử lý sớm</h2>
                <p id="reminderSummary" class="mt-1 text-sm text-amber-900"></p>
            </div>
            <div id="reminderList" class="mt-3 grid gap-2 lg:grid-cols-2"></div>
        </section>
    </main>

    <script src="vanban-hub.js?v=20260622-vanban-sector1"></script>
</body>
</html>
