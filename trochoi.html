<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Game Giáo Dục AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- KaTeX cho hiển thị toán học -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex {
            font-size: 1.1em;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-flip {
            perspective: 1000px;
        }

        .card-flip-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card-flip.flipped .card-flip-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            backface-visibility: hidden;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .pulse-correct {
            animation: pulseCorrect 0.5s ease-out;
        }

        @keyframes pulseCorrect {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .shake-wrong {
            animation: shakeWrong 0.5s ease-out;
        }

        @keyframes shakeWrong {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-purple-50 to-blue-50 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- MODULE GEMINI ---
        const GeminiModule = {
            getApiKeys: () => {
                const keys = localStorage.getItem('global_gemini_keys');
                return keys ? JSON.parse(keys) : [];
            },
            getDefaultModule: () => {
                return localStorage.getItem('default_gemini_module') || 'gemini-2.0-flash-exp';
            },
            callGeminiAPI: async (prompt, onRetry = null) => {
                const apiKeys = GeminiModule.getApiKeys();
                const defaultModule = GeminiModule.getDefaultModule();

                if (!apiKeys.length) throw new Error("Chưa nạp API Keys! Vui lòng cấu hình trong trang chủ.");

                let finalError = "";
                const shuffledKeys = [...apiKeys].sort(() => Math.random() - 0.5);

                for (let i = 0; i < shuffledKeys.length; i++) {
                    const currentKey = shuffledKeys[i];
                    try {
                        if (onRetry && i > 0) onRetry(i);

                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${defaultModule}:generateContent?key=${currentKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });

                        const data = await res.json();
                        if (data.error) throw new Error(data.error.message);

                        return data.candidates[0].content.parts[0].text;

                    } catch (e) {
                        finalError = e.message;
                        console.error(`Key ${i + 1} lỗi:`, e.message);
                    }
                }
                throw new Error(`Tất cả keys đều lỗi: ${finalError}`);
            },
            parseJSONResponse: (text) => {
                const startIdx = text.indexOf('[');
                const endIdx = text.lastIndexOf(']');
                let jsonStr = (startIdx !== -1 && endIdx !== -1)
                    ? text.substring(startIdx, endIdx + 1)
                    : text.replace(/```json|```/g, '').trim();
                return JSON.parse(jsonStr);
            }
        };

        // --- COMPONENT HIỂN THỊ TOÁN ---
        const MathText = ({ text }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!text || !ref.current) return;
                let processed = text
                    .replace(/`([^`]+)`/g, '$$$1$$')
                    .replace(/\\\[(.*?)\\\]/g, '$$$$1$$$$')
                    .replace(/\\\((.*?)\\\)/g, '$$$1$$');

                if (processed.includes('\\') && !processed.includes('$')) {
                    processed = `$${processed}$`;
                }

                const parts = processed.split(/($$[\s\S]*?$$|\$[\s\S]*?\$)/g);
                ref.current.innerHTML = "";

                parts.forEach(part => {
                    if (part.startsWith('$$') && part.endsWith('$$')) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(2, -2), span, { throwOnError: false, displayMode: true }); } catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); } catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else {
                        ref.current.appendChild(document.createTextNode(part));
                    }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        // --- GAME 1: FLASHCARD ---
        const FlashcardGame = ({ cards, onBack }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const [mastered, setMastered] = useState([]);
            const [needReview, setNeedReview] = useState([]);

            const currentCard = cards[currentIndex];

            const handleNext = () => {
                setFlipped(false);
                if (currentIndex < cards.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                } else {
                    setCurrentIndex(0);
                }
            };

            const handleMastered = () => {
                if (!mastered.includes(currentIndex)) {
                    setMastered([...mastered, currentIndex]);
                }
                handleNext();
            };

            const handleNeedReview = () => {
                if (!needReview.includes(currentIndex)) {
                    setNeedReview([...needReview, currentIndex]);
                }
                handleNext();
            };

            return (
                <div className="max-w-4xl mx-auto p-6 fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onBack} className="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
                            <i className="fas fa-arrow-left mr-2"></i>Quay lại
                        </button>
                        <div className="text-lg font-bold text-gray-700">
                            Thẻ {currentIndex + 1} / {cards.length}
                        </div>
                        <div className="flex gap-4 text-sm">
                            <span className="text-green-600"><i className="fas fa-check-circle mr-1"></i>{mastered.length} đã nhớ</span>
                            <span className="text-orange-600"><i className="fas fa-redo mr-1"></i>{needReview.length} cần ôn</span>
                        </div>
                    </div>

                    <div className={`card-flip ${flipped ? 'flipped' : ''} mb-6`} onClick={() => setFlipped(!flipped)}>
                        <div className="card-flip-inner relative">
                            <div className="card-front absolute inset-0">
                                <div className="bg-white rounded-3xl shadow-2xl p-12 min-h-[400px] flex flex-col items-center justify-center cursor-pointer border-4 border-indigo-200 hover:border-indigo-400 transition">
                                    <div className="text-sm text-gray-500 mb-4 uppercase tracking-wide">Câu hỏi</div>
                                    <div className="text-2xl font-bold text-center text-gray-800">
                                        <MathText text={currentCard.question} />
                                    </div>
                                    <div className="mt-8 text-gray-400 text-sm">
                                        <i className="fas fa-redo mr-2"></i>Click để lật thẻ
                                    </div>
                                </div>
                            </div>
                            <div className="card-back absolute inset-0">
                                <div className="bg-gradient-to-br from-green-400 to-blue-500 rounded-3xl shadow-2xl p-12 min-h-[400px] flex flex-col items-center justify-center cursor-pointer text-white">
                                    <div className="text-sm mb-4 uppercase tracking-wide opacity-90">Đáp án</div>
                                    <div className="text-2xl font-bold text-center">
                                        <MathText text={currentCard.answer} />
                                    </div>
                                    <div className="mt-8 text-white/70 text-sm">
                                        <i className="fas fa-redo mr-2"></i>Click để lật lại
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex gap-4 justify-center">
                        <button
                            onClick={handleNeedReview}
                            className="px-8 py-4 bg-orange-500 text-white rounded-xl font-bold hover:bg-orange-600 transition shadow-lg"
                        >
                            <i className="fas fa-redo mr-2"></i>Cần ôn lại
                        </button>
                        <button
                            onClick={handleMastered}
                            className="px-8 py-4 bg-green-500 text-white rounded-xl font-bold hover:bg-green-600 transition shadow-lg"
                        >
                            <i className="fas fa-check mr-2"></i>Đã nhớ
                        </button>
                    </div>

                    <div className="mt-6 flex justify-center">
                        <div className="bg-white rounded-full px-6 py-2 shadow">
                            <div className="w-64 h-2 bg-gray-200 rounded-full overflow-hidden">
                                <div
                                    className="h-full bg-green-500 transition-all duration-300"
                                    style={{ width: `${(mastered.length / cards.length) * 100}%` }}
                                ></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- GAME 2: SPEED QUIZ ---
        const SpeedQuiz = ({ questions, onBack }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);
            const [timeLeft, setTimeLeft] = useState(30);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showResult, setShowResult] = useState(false);
            const [gameOver, setGameOver] = useState(false);

            const currentQuestion = questions[currentIndex];

            useEffect(() => {
                if (gameOver || showResult) return;
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            setGameOver(true);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [gameOver, showResult, currentIndex]);

            const handleAnswer = (index) => {
                if (showResult) return;
                setSelectedAnswer(index);
                setShowResult(true);

                const isCorrect = index === currentQuestion.correctIndex;
                if (isCorrect) {
                    const points = 10 + streak * 2;
                    setScore(score + points);
                    setStreak(streak + 1);
                } else {
                    setStreak(0);
                }

                setTimeout(() => {
                    if (currentIndex < questions.length - 1) {
                        setCurrentIndex(currentIndex + 1);
                        setSelectedAnswer(null);
                        setShowResult(false);
                    } else {
                        setGameOver(true);
                    }
                }, 1500);
            };

            if (gameOver) {
                return (
                    <div className="max-w-4xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-12 text-center">
                            <div className="w-24 h-24 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i className="fas fa-trophy text-4xl text-purple-600"></i>
                            </div>
                            <h2 className="text-4xl font-bold mb-4 text-gray-800">Kết thúc!</h2>
                            <div className="text-6xl font-bold text-purple-600 mb-2">{score}</div>
                            <div className="text-xl text-gray-600 mb-8">Điểm số</div>
                            <div className="grid grid-cols-2 gap-4 max-w-md mx-auto mb-8">
                                <div className="bg-blue-50 p-4 rounded-xl">
                                    <div className="text-2xl font-bold text-blue-600">{currentIndex + 1}</div>
                                    <div className="text-sm text-blue-500">Câu đã trả lời</div>
                                </div>
                                <div className="bg-green-50 p-4 rounded-xl">
                                    <div className="text-2xl font-bold text-green-600">{Math.max(...questions.map((_, i) => i <= currentIndex ? streak : 0))}</div>
                                    <div className="text-sm text-green-500">Chuỗi dài nhất</div>
                                </div>
                            </div>
                            <button onClick={onBack} className="px-8 py-4 bg-purple-600 text-white rounded-xl font-bold hover:bg-purple-700 transition">
                                <i className="fas fa-arrow-left mr-2"></i>Quay lại
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto p-6 fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onBack} className="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
                            <i className="fas fa-arrow-left mr-2"></i>Quay lại
                        </button>
                        <div className="flex items-center gap-6">
                            <div className="text-lg font-bold text-purple-600">
                                <i className="fas fa-star mr-2"></i>Điểm: {score}
                            </div>
                            <div className="text-lg font-bold text-orange-600">
                                <i className="fas fa-fire mr-2"></i>Streak: {streak}
                            </div>
                            <div className={`text-2xl font-bold ${timeLeft <= 10 ? 'text-red-600 animate-pulse' : 'text-blue-600'}`}>
                                <i className="fas fa-clock mr-2"></i>{timeLeft}s
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl shadow-xl p-8 mb-6">
                        <div className="text-sm text-gray-500 mb-2">Câu {currentIndex + 1} / {questions.length}</div>
                        <h3 className="text-2xl font-bold text-gray-800 mb-6">
                            <MathText text={currentQuestion.question} />
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {currentQuestion.options.map((option, index) => {
                                let className = "p-4 rounded-xl border-2 cursor-pointer transition font-medium text-lg ";
                                if (showResult) {
                                    if (index === currentQuestion.correctIndex) {
                                        className += "bg-green-100 border-green-500 text-green-900 pulse-correct";
                                    } else if (index === selectedAnswer) {
                                        className += "bg-red-100 border-red-500 text-red-900 shake-wrong";
                                    } else {
                                        className += "border-gray-200 opacity-50";
                                    }
                                } else {
                                    className += "border-gray-200 hover:border-purple-400 hover:bg-purple-50";
                                }

                                return (
                                    <button
                                        key={index}
                                        onClick={() => handleAnswer(index)}
                                        className={className}
                                        disabled={showResult}
                                    >
                                        <MathText text={option} />
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // --- GAME 3: WORD HUNT ---
        const WordHuntGame = ({ words, gridSize = 10, onBack }) => {
            const [grid, setGrid] = useState([]);
            const [foundWords, setFoundWords] = useState([]);
            const [selectedCells, setSelectedCells] = useState([]);

            useEffect(() => {
                generateGrid();
            }, []);

            const generateGrid = () => {
                const newGrid = Array(gridSize).fill(null).map(() =>
                    Array(gridSize).fill(null).map(() => String.fromCharCode(65 + Math.floor(Math.random() * 26)))
                );

                words.forEach(word => {
                    const cleanWord = word.word.replace(/\s/g, '').toUpperCase();
                    placeWord(newGrid, cleanWord);
                });

                setGrid(newGrid);
            };

            const placeWord = (grid, word) => {
                const directions = [
                    [0, 1],   // horizontal
                    [1, 0],   // vertical
                    [1, 1],   // diagonal
                ];

                const direction = directions[Math.floor(Math.random() * directions.length)];
                const [dx, dy] = direction;

                let placed = false;
                let attempts = 0;

                while (!placed && attempts < 50) {
                    const startX = Math.floor(Math.random() * gridSize);
                    const startY = Math.floor(Math.random() * gridSize);

                    if (canPlaceWord(grid, word, startX, startY, dx, dy)) {
                        for (let i = 0; i < word.length; i++) {
                            grid[startX + dx * i][startY + dy * i] = word[i];
                        }
                        placed = true;
                    }
                    attempts++;
                }
            };

            const canPlaceWord = (grid, word, x, y, dx, dy) => {
                for (let i = 0; i < word.length; i++) {
                    const newX = x + dx * i;
                    const newY = y + dy * i;
                    if (newX < 0 || newX >= gridSize || newY < 0 || newY >= gridSize) {
                        return false;
                    }
                }
                return true;
            };

            const handleCellClick = (row, col) => {
                const cellKey = `${row}-${col}`;
                if (selectedCells.includes(cellKey)) {
                    setSelectedCells(selectedCells.filter(c => c !== cellKey));
                } else {
                    setSelectedCells([...selectedCells, cellKey]);
                }
            };

            return (
                <div className="max-w-6xl mx-auto p-6 fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onBack} className="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
                            <i className="fas fa-arrow-left mr-2"></i>Quay lại
                        </button>
                        <div className="text-lg font-bold text-gray-700">
                            Đã tìm: {foundWords.length} / {words.length}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-white rounded-2xl shadow-xl p-6">
                            <div className="grid gap-1" style={{ gridTemplateColumns: `repeat(${gridSize}, 1fr)` }}>
                                {grid.map((row, rowIdx) =>
                                    row.map((cell, colIdx) => {
                                        const cellKey = `${rowIdx}-${colIdx}`;
                                        const isSelected = selectedCells.includes(cellKey);
                                        return (
                                            <button
                                                key={cellKey}
                                                onClick={() => handleCellClick(rowIdx, colIdx)}
                                                className={`w-10 h-10 rounded font-bold text-sm transition ${isSelected
                                                        ? 'bg-purple-500 text-white'
                                                        : 'bg-gray-100 text-gray-700 hover:bg-purple-100'
                                                    }`}
                                            >
                                                {cell}
                                            </button>
                                        );
                                    })
                                )}
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-xl p-6">
                            <h3 className="text-xl font-bold mb-4 text-gray-800">Danh sách từ</h3>
                            <div className="space-y-2">
                                {words.map((word, idx) => (
                                    <div
                                        key={idx}
                                        className={`p-3 rounded-lg ${foundWords.includes(idx)
                                                ? 'bg-green-100 text-green-800 line-through'
                                                : 'bg-gray-50 text-gray-700'
                                            }`}
                                    >
                                        <div className="font-medium">{word.word}</div>
                                        <div className="text-xs text-gray-500">{word.hint}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- GAME 4: DRAG & SORT ---
        const DragSortGame = ({ items, correctOrder, onBack }) => {
            const [userOrder, setUserOrder] = useState([...items]);
            const [checked, setChecked] = useState(false);
            const [draggedItem, setDraggedItem] = useState(null);

            const handleDragStart = (index) => {
                setDraggedItem(index);
            };

            const handleDragOver = (e, index) => {
                e.preventDefault();
            };

            const handleDrop = (index) => {
                if (draggedItem === null) return;

                const newOrder = [...userOrder];
                const draggedContent = newOrder[draggedItem];
                newOrder.splice(draggedItem, 1);
                newOrder.splice(index, 0, draggedContent);

                setUserOrder(newOrder);
                setDraggedItem(null);
                setChecked(false);
            };

            const checkAnswer = () => {
                setChecked(true);
            };

            const isCorrect = () => {
                return JSON.stringify(userOrder) === JSON.stringify(correctOrder);
            };

            return (
                <div className="max-w-3xl mx-auto p-6 fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onBack} className="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">
                            <i className="fas fa-arrow-left mr-2"></i>Quay lại
                        </button>
                        <h2 className="text-2xl font-bold text-gray-800">Sắp xếp đúng thứ tự</h2>
                    </div>

                    <div className="bg-white rounded-2xl shadow-xl p-8">
                        <div className="text-sm text-gray-500 mb-4">
                            <i className="fas fa-info-circle mr-2"></i>Kéo và thả để sắp xếp các mục theo đúng thứ tự
                        </div>

                        <div className="space-y-3 mb-6">
                            {userOrder.map((item, index) => (
                                <div
                                    key={index}
                                    draggable
                                    onDragStart={() => handleDragStart(index)}
                                    onDragOver={(e) => handleDragOver(e, index)}
                                    onDrop={() => handleDrop(index)}
                                    className={`p-4 rounded-xl border-2 cursor-move transition ${checked
                                            ? (userOrder[index] === correctOrder[index]
                                                ? 'bg-green-100 border-green-500'
                                                : 'bg-red-100 border-red-500')
                                            : 'bg-gray-50 border-gray-300 hover:border-purple-400 hover:shadow'
                                        }`}
                                >
                                    <div className="flex items-center gap-3">
                                        <i className="fas fa-grip-vertical text-gray-400"></i>
                                        <div className="flex-1 font-medium">
                                            <MathText text={item} />
                                        </div>
                                        {checked && userOrder[index] === correctOrder[index] && (
                                            <i className="fas fa-check-circle text-green-600"></i>
                                        )}
                                        {checked && userOrder[index] !== correctOrder[index] && (
                                            <i className="fas fa-times-circle text-red-600"></i>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="flex gap-4">
                            <button
                                onClick={checkAnswer}
                                className="flex-1 px-6 py-3 bg-purple-600 text-white rounded-xl font-bold hover:bg-purple-700 transition"
                            >
                                <i className="fas fa-check mr-2"></i>Kiểm tra
                            </button>
                            {checked && !isCorrect() && (
                                <button
                                    onClick={() => {
                                        setUserOrder([...items]);
                                        setChecked(false);
                                    }}
                                    className="px-6 py-3 bg-orange-500 text-white rounded-xl font-bold hover:bg-orange-600 transition"
                                >
                                    <i className="fas fa-redo mr-2"></i>Thử lại
                                </button>
                            )}
                        </div>

                        {checked && isCorrect() && (
                            <div className="mt-6 p-4 bg-green-100 border-2 border-green-500 rounded-xl text-center">
                                <i className="fas fa-trophy text-3xl text-green-600 mb-2"></i>
                                <div className="text-xl font-bold text-green-800">Chính xác! Bạn đã sắp xếp đúng!</div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- APP CHÍNH ---
        const App = () => {
            const [step, setStep] = useState(1); // 1: Chọn game, 2: Cấu hình, 3: Chơi game
            const [gameType, setGameType] = useState(null);
            const [topic, setTopic] = useState('');
            const [level, setLevel] = useState('Trung bình');
            const [loading, setLoading] = useState(false);
            const [gameData, setGameData] = useState(null);

            useEffect(() => {
                const token = localStorage.getItem('authToken');
                if (!token) {
                    alert("Bạn chưa đăng nhập! Hệ thống sẽ chuyển về trang đăng nhập.");
                    window.location.href = 'login.html';
                }
            }, []);

            const generateGameContent = async () => {
                if (!topic.trim()) {
                    alert('Vui lòng nhập chủ đề!');
                    return;
                }

                setLoading(true);
                try {
                    let prompt = '';

                    if (gameType === 'flashcard') {
                        prompt = `Tạo 10 thẻ học (flashcard) về chủ đề "${topic}" ở mức độ ${level}.
                        Trả về JSON array với format:
                        [{"question": "câu hỏi hoặc thuật ngữ", "answer": "đáp án hoặc định nghĩa"}]
                        
                        Nếu có công thức toán học, hãy viết trong dấu $ để hiển thị với KaTeX.
                        Ví dụ: "Công thức $a^2 + b^2 = c^2$"`;
                    } else if (gameType === 'speedquiz') {
                        prompt = `Tạo 15 câu hỏi trắc nghiệm về chủ đề "${topic}" ở mức độ ${level}.
                        Trả về JSON array với format:
                        [{"question": "câu hỏi", "options": ["A", "B", "C", "D"], "correctIndex": 0}]
                        
                        Nếu có công thức toán học, hãy viết trong dấu $ để hiển thị với KaTeX.`;
                    } else if (gameType === 'wordhunt') {
                        prompt = `Tạo 8 từ khóa quan trọng về chủ đề "${topic}" ở mức độ ${level}.
                        Trả về JSON array với format:
                        [{"word": "từ khóa", "hint": "gợi ý ngắn"}]
                        
                        Từ khóa nên ngắn gọn (1-2 từ).`;
                    } else if (gameType === 'dragsort') {
                        prompt = `Tạo 6 mục cần sắp xếp theo thứ tự về chủ đề "${topic}" ở mức độ ${level}.
                        Ví dụ: sắp xếp các bước giải toán, sắp xếp sự kiện lịch sử, sắp xếp các giai đoạn...
                        Trả về JSON object với format:
                        {"items": ["mục 1", "mục 2", ...], "correctOrder": ["mục theo đúng thứ tự"]}
                        
                        Nếu có công thức toán học, hãy viết trong dấu $ để hiển thị với KaTeX.`;
                    }

                    const response = await GeminiModule.callGeminiAPI(prompt);
                    const data = GeminiModule.parseJSONResponse(response);

                    setGameData(data);
                    setStep(3);
                } catch (error) {
                    alert('Lỗi: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            if (step === 3 && gameData) {
                if (gameType === 'flashcard') {
                    return <FlashcardGame cards={gameData} onBack={() => setStep(2)} />;
                } else if (gameType === 'speedquiz') {
                    return <SpeedQuiz questions={gameData} onBack={() => setStep(2)} />;
                } else if (gameType === 'wordhunt') {
                    return <WordHuntGame words={gameData} onBack={() => setStep(2)} />;
                } else if (gameType === 'dragsort') {
                    return <DragSortGame items={gameData.items} correctOrder={gameData.correctOrder} onBack={() => setStep(2)} />;
                }
            }

            if (step === 2) {
                return (
                    <div className="max-w-2xl mx-auto p-6 fade-in">
                        <div className="text-center mb-8">
                            <button onClick={() => window.location.href = 'smartquiz.html'} className="text-gray-500 hover:text-purple-600 font-bold transition mb-4">
                                <i className="fas fa-arrow-left mr-2"></i>Quay lại SmartQuiz
                            </button>
                            <h1 className="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-blue-600 mb-2">
                                Cấu hình Game
                            </h1>
                            <p className="text-gray-600">Nhập thông tin để AI tạo nội dung game</p>
                        </div>

                        <div className="bg-white rounded-3xl shadow-2xl p-8">
                            <div className="mb-6">
                                <label className="block font-bold mb-2 text-gray-700">Chủ đề</label>
                                <input
                                    type="text"
                                    value={topic}
                                    onChange={(e) => setTopic(e.target.value)}
                                    className="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none transition"
                                    placeholder="VD: Phương trình bậc 2, Lịch sử Việt Nam..."
                                />
                            </div>

                            <div className="mb-6">
                                <label className="block font-bold mb-2 text-gray-700">Mức độ</label>
                                <select
                                    value={level}
                                    onChange={(e) => setLevel(e.target.value)}
                                    className="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none transition"
                                >
                                    <option>Cơ bản</option>
                                    <option>Trung bình</option>
                                    <option>Nâng cao</option>
                                </select>
                            </div>

                            <button
                                onClick={generateGameContent}
                                disabled={loading}
                                className="w-full py-4 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-xl font-bold text-lg hover:shadow-xl transition disabled:opacity-50"
                            >
                                {loading ? (
                                    <>
                                        <i className="fas fa-spinner fa-spin mr-2"></i>Đang tạo game...
                                    </>
                                ) : (
                                    <>
                                        <i className="fas fa-play mr-2"></i>Tạo Game
                                    </>
                                )}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto p-6 fade-in">
                    <div className="text-center mb-12">
                        <button onClick={() => window.location.href = 'smartquiz.html'} className="text-gray-500 hover:text-purple-600 font-bold transition mb-4">
                            <i className="fas fa-arrow-left mr-2"></i>Quay lại SmartQuiz
                        </button>
                        <h1 className="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-blue-600 mb-4">
                            Game Giáo Dục AI
                        </h1>
                        <p className="text-xl text-gray-600">Học tập vui vẻ với trò chơi do AI tạo nội dung</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Flashcard Game */}
                        <div
                            onClick={() => { setGameType('flashcard'); setStep(2); }}
                            className="bg-white rounded-3xl shadow-xl p-8 cursor-pointer hover:shadow-2xl hover:scale-105 transition transform border-2 border-transparent hover:border-purple-400"
                        >
                            <div className="w-16 h-16 bg-gradient-to-br from-purple-400 to-pink-500 rounded-2xl flex items-center justify-center mb-4">
                                <i className="fas fa-layer-group text-3xl text-white"></i>
                            </div>
                            <h3 className="text-2xl font-bold mb-2 text-gray-800">Flashcard</h3>
                            <p className="text-gray-600 mb-4">Học từ vựng và khái niệm bằng thẻ ghi nhớ. Lật thẻ để xem câu trả lời!</p>
                            <div className="flex gap-2 flex-wrap">
                                <span className="text-xs bg-purple-100 text-purple-700 px-3 py-1 rounded-full">Ghi nhớ</span>
                                <span className="text-xs bg-pink-100 text-pink-700 px-3 py-1 rounded-full">Ôn tập</span>
                            </div>
                        </div>

                        {/* Speed Quiz */}
                        <div
                            onClick={() => { setGameType('speedquiz'); setStep(2); }}
                            className="bg-white rounded-3xl shadow-xl p-8 cursor-pointer hover:shadow-2xl hover:scale-105 transition transform border-2 border-transparent hover:border-blue-400"
                        >
                            <div className="w-16 h-16 bg-gradient-to-br from-blue-400 to-cyan-500 rounded-2xl flex items-center justify-center mb-4">
                                <i className="fas fa-bolt text-3xl text-white"></i>
                            </div>
                            <h3 className="text-2xl font-bold mb-2 text-gray-800">Speed Quiz</h3>
                            <p className="text-gray-600 mb-4">Trắc nghiệm tốc độ với thời gian giới hạn. Tích lũy điểm và streak!</p>
                            <div className="flex gap-2 flex-wrap">
                                <span className="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full">Tốc độ</span>
                                <span className="text-xs bg-cyan-100 text-cyan-700 px-3 py-1 rounded-full">Thử thách</span>
                            </div>
                        </div>

                        {/* Word Hunt */}
                        <div
                            onClick={() => { setGameType('wordhunt'); setStep(2); }}
                            className="bg-white rounded-3xl shadow-xl p-8 cursor-pointer hover:shadow-2xl hover:scale-105 transition transform border-2 border-transparent hover:border-green-400"
                        >
                            <div className="w-16 h-16 bg-gradient-to-br from-green-400 to-emerald-500 rounded-2xl flex items-center justify-center mb-4">
                                <i className="fas fa-search text-3xl text-white"></i>
                            </div>
                            <h3 className="text-2xl font-bold mb-2 text-gray-800">Word Hunt</h3>
                            <p className="text-gray-600 mb-4">Tìm kiếm các từ khóa ẩn trong lưới chữ cái. Vui vẻ và thư giãn!</p>
                            <div className="flex gap-2 flex-wrap">
                                <span className="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full">Tìm kiếm</span>
                                <span className="text-xs bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full">Thư giãn</span>
                            </div>
                        </div>

                        {/* Drag & Sort */}
                        <div
                            onClick={() => { setGameType('dragsort'); setStep(2); }}
                            className="bg-white rounded-3xl shadow-xl p-8 cursor-pointer hover:shadow-2xl hover:scale-105 transition transform border-2 border-transparent hover:border-orange-400"
                        >
                            <div className="w-16 h-16 bg-gradient-to-br from-orange-400 to-red-500 rounded-2xl flex items-center justify-center mb-4">
                                <i className="fas fa-sort text-3xl text-white"></i>
                            </div>
                            <h3 className="text-2xl font-bold mb-2 text-gray-800">Drag & Sort</h3>
                            <p className="text-gray-600 mb-4">Sắp xếp các mục theo đúng thứ tự bằng cách kéo và thả.</p>
                            <div className="flex gap-2 flex-wrap">
                                <span className="text-xs bg-orange-100 text-orange-700 px-3 py-1 rounded-full">Sắp xếp</span>
                                <span className="text-xs bg-red-100 text-red-700 px-3 py-1 rounded-full">Logic</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>

</html>
