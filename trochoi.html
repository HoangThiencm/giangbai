<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Game Giáo Dục</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>

    <!-- KaTeX -->
    <link rel="stylesheet" href="vendor/katex.min.css">
    <script src="vendor/katex.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex {
            font-size: 1.1em;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-card {
            transition: all 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body class="bg-gradient-to-br from-purple-50 via-blue-50 to-pink-50 min-h-screen font-sans">
    <div id="root">
        <div style="max-width: 760px; margin: 48px auto; padding: 24px; border-radius: 18px; background: white; color: #334155; box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12); font-family: Arial, sans-serif;">
            <h1 style="margin: 0 0 8px; color: #4f46e5; font-size: 28px;">Đang tải trò chơi...</h1>
            <p style="margin: 0; line-height: 1.6;">Nếu dòng này đứng yên quá lâu, trình duyệt đang chặn hoặc chưa tải được thư viện cần thiết.</p>
        </div>
    </div>

</body>

</html>
