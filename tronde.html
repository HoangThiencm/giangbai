<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Trộn Đề Thi Đa Năng</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; }
        .katex { font-size: 1.1em; color: #1e3a8a; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // === CẤU HÌNH ===
        const SERVER_URL = "https://hoangthiencm-giangbai.hf.space";
        const MODEL_NAME = "gemini-2.5-flash"; // Bắt buộc dùng model này

        // --- HELPER: FORMAT TEXT CHO WORD ---
        const formatMathForWord = (text) => {
            if (!text) return "";
            let content = text;
            // Tự động bọc $ nếu thấy LaTeX mà thiếu $
            if (!content.includes('$') && content.includes('\\')) { content = `$${content}$`; }
            
            return content.replace(/\$([^$]+)\$/g, (match, tex) => {
                try {
                    let mathml = katex.renderToString(tex, { throwOnError: false, output: 'mathml', displayMode: false });
                    return mathml.replace(/<annotation encoding="application\/x-tex">[\s\S]*?<\/annotation>/g, '');
                } catch (e) { return match; }
            });
        };

        // --- HELPER: RENDER MATH TRÊN WEB ---
        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if (!text) return;
                const parts = text.split(/(\$[^$]+\$)/g);
                ref.current.innerHTML = "";
                parts.forEach(part => {
                    if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false }); } catch { span.innerText = part; }
                        ref.current.appendChild(span);
                    } else { ref.current.appendChild(document.createTextNode(part)); }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        // --- HELPER: TẠO FILE WORD ---
        const createDocContent = (code, questions) => {
            let body = `<h2 style='text-align:center; font-size:16pt; margin-bottom:20pt'>MÃ ĐỀ: ${code}</h2>`;
            questions.forEach(q => {
                body += `<p style='margin-bottom:6pt; text-align:justify'><b>Câu ${q.number}:</b> ${formatMathForWord(q.question)}</p>`;
                const opts = q.options || [];
                const maxLen = Math.max(...opts.map(o => o.length));
                
                if (maxLen < 15) {
                    body += `<table style='width:100%; border:none; margin-bottom:12pt'><tr>
                        <td style='width:25%'><b>A.</b> ${formatMathForWord(opts[0])}</td>
                        <td style='width:25%'><b>B.</b> ${formatMathForWord(opts[1])}</td>
                        <td style='width:25%'><b>C.</b> ${formatMathForWord(opts[2])}</td>
                        <td style='width:25%'><b>D.</b> ${formatMathForWord(opts[3])}</td>
                    </tr></table>`;
                } else if (maxLen < 45) {
                    body += `<table style='width:100%; border:none; margin-bottom:12pt'>
                        <tr><td style='width:50%'><b>A.</b> ${formatMathForWord(opts[0])}</td><td style='width:50%'><b>B.</b> ${formatMathForWord(opts[1])}</td></tr>
                        <tr><td style='width:50%'><b>C.</b> ${formatMathForWord(opts[2])}</td><td style='width:50%'><b>D.</b> ${formatMathForWord(opts[3])}</td></tr>
                    </table>`;
                } else {
                    body += opts.map((o,i) => `<p><b>${String.fromCharCode(65+i)}.</b> ${formatMathForWord(o)}</p>`).join('');
                }
            });
            return `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head><meta charset='utf-8'><title>${code}</title><style>body{font-family:'Times New Roman';font-size:12pt}</style></head><body>${body}</body></html>`;
        };

        // --- COMPONENT CHÍNH ---
        const App = () => {
            const [tab, setTab] = useState(null); // 'server' | 'ai' | 'simple'
            const [apiKeys, setApiKeys] = useState([]);
            const [status, setStatus] = useState("");
            const [loading, setLoading] = useState(false);
            const [questions, setQuestions] = useState([]);
            const [numVariants, setNumVariants] = useState(4);
            const fileRef = useRef();

            // Load Key từ LocalStorage của Index
            useEffect(() => {
                const k = localStorage.getItem('global_gemini_keys');
                if(k) setApiKeys(JSON.parse(k));
            }, []);

            // --- CHỨC NĂNG 1: TRỘN SERVER (Docx/PDF chuẩn, có công thức) ---
            const handleServerMix = async (file) => {
                setLoading(true); setStatus("Đang gửi file lên Server xử lý (Giữ nguyên công thức)...");
                try {
                    const fd = new FormData();
                    fd.append("file", file);
                    // Gửi kèm Key nếu user có key riêng
                    const headers = {};
                    if(apiKeys.length > 0) headers["x-gemini-api-key"] = apiKeys.join(",");
                    
                    const res = await fetch(`${SERVER_URL}/convert-and-quiz`, { method: "POST", headers, body: fd });
                    if(!res.ok) throw new Error("Lỗi kết nối Server: " + res.status);
                    
                    const data = await res.json();
                    if(data.error) throw new Error(data.error);
                    
                    // Map dữ liệu trả về từ server
                    const mapped = data.map((q, i) => ({
                        id: i, number: i+1, 
                        question: q.question, 
                        options: q.options.map(o=>o.replace(/^[A-D][\.:]\s*/, '')),
                        correctAnswerIndex: 0 // Mặc định A nếu server chưa trả về index
                    }));
                    
                    setQuestions(mapped); setStatus(`Đã xử lý xong ${mapped.length} câu!`);
                } catch(e) { setStatus("Lỗi: " + e.message); }
                setLoading(false);
            };

            // --- CHỨC NĂNG 2: TRỘN AI VISION (PDF/Ảnh) ---
            const handleAIMix = async (file) => {
                if(!apiKeys.length) return alert("Chưa có API Key! Vui lòng quay lại trang chủ nạp key.");
                setLoading(true); setStatus("Đang đọc PDF bằng Gemini Vision...");
                
                try {
                    // 1. Convert PDF to Image (Page 1 demo, thực tế cần loop)
                    const buffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(buffer).promise;
                    const page = await pdf.getPage(1); // Demo trang 1
                    const vp = page.getViewport({scale: 2});
                    const cvs = document.createElement('canvas');
                    cvs.width = vp.width; cvs.height = vp.height;
                    await page.render({canvasContext: cvs.getContext('2d'), viewport: vp}).promise;
                    const imgBase64 = cvs.toDataURL('image/jpeg', 0.8).split(',')[1];

                    // 2. Gửi lên Gemini
                    const prompt = `Trích xuất câu hỏi trắc nghiệm từ ảnh. 
                    Quy tắc:
                    - Output JSON strict: [{"question":"...","options":["..."],"correctAnswer":"..."}]
                    - Toán học để trong $.
                    - Nếu có bảng đáp án, hãy lấy đáp án đúng.`;

                    const currentKey = apiKeys[Math.floor(Math.random() * apiKeys.length)];
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${currentKey}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{parts: [{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: imgBase64}}]}]
                        })
                    });
                    
                    const data = await res.json();
                    const txt = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                    const parsed = JSON.parse(txt);
                    
                    const mapped = parsed.map((q,i) => ({
                        id: i, number: i+1,
                        question: q.question,
                        options: q.options,
                        correctAnswerIndex: 0 // Cần logic map chữ cái A,B,C,D sang 0,1,2,3
                    }));
                    
                    setQuestions(mapped); setStatus("AI đã đọc xong!");
                } catch(e) { setStatus("Lỗi AI: " + e.message); }
                setLoading(false);
            };

            // --- CHỨC NĂNG 3: TRỘN TEXT (Offline, Không công thức) ---
            const handleSimpleMix = async (file) => {
                setLoading(true); setStatus("Đang tách câu hỏi (Chế độ Text đơn giản)...");
                try {
                    const zip = new JSZip();
                    await zip.loadAsync(file);
                    const docXml = await zip.file("word/document.xml").async("string");
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(docXml, "text/xml");
                    let fullText = "";
                    xmlDoc.querySelectorAll("w\\:t").forEach(n => fullText += n.textContent + "\n");
                    
                    // Regex tách đơn giản: Câu 1...
                    const rawQs = fullText.split(/Câu\s+\d+[:\.]/g).filter(t => t.trim().length > 10);
                    
                    const mapped = rawQs.map((t, i) => {
                        // Giả lập tách option bằng split A. B. C. D.
                        // Trong thực tế cần regex phức tạp hơn
                        return {
                            id: i, number: i+1,
                            question: t.substring(0, 50) + "...", 
                            options: ["Đáp án A", "Đáp án B", "Đáp án C", "Đáp án D"],
                            correctAnswerIndex: 0
                        };
                    });
                    
                    setQuestions(mapped); setStatus(`Đã tách được ${mapped.length} câu (Lưu ý: Chỉ text).`);
                } catch(e) { setStatus("Lỗi đọc file: " + e.message); }
                setLoading(false);
            };

            const handleFileChange = (e) => {
                const f = e.target.files[0];
                if(!f) return;
                if(tab === 'server') handleServerMix(f);
                else if(tab === 'ai') handleAIMix(f);
                else handleSimpleMix(f);
            };

            const downloadZip = () => {
                if(questions.length === 0) return alert("Chưa có dữ liệu!");
                const zip = new JSZip();
                
                // Tạo danh sách mã đề (101, 102...)
                const codes = Array.from({length: numVariants}, (_, i) => 101 + i);
                
                let excelData = []; // Để lưu đáp án

                codes.forEach(code => {
                    // 1. Trộn câu hỏi
                    const shuffledQs = [...questions].sort(() => Math.random() - 0.5);
                    
                    // 2. Trộn đáp án trong từng câu & Map lại
                    const variantQs = shuffledQs.map((q, idx) => {
                        const originalOpts = q.options.map((txt, i) => ({ text: txt, isCorrect: i === q.correctAnswerIndex }));
                        const shuffledOpts = originalOpts.sort(() => Math.random() - 0.5);
                        const newCorrectIndex = shuffledOpts.findIndex(o => o.isCorrect);
                        
                        return {
                            number: idx + 1,
                            question: q.question,
                            options: shuffledOpts.map(o => o.text),
                            correctAnswerIndex: newCorrectIndex,
                            correctAnswerLetter: String.fromCharCode(65 + newCorrectIndex)
                        };
                    });

                    // 3. Tạo nội dung Word
                    zip.file(`De_${code}.doc`, createDocContent(code, variantQs));

                    // 4. Lưu đáp án cho Excel
                    let rowData = { "Mã Đề": code };
                    variantQs.forEach(q => rowData[`Câu ${q.number}`] = q.correctAnswerLetter);
                    excelData.push(rowData);
                });

                // 5. Tạo file Excel Tổng hợp
                const ws = XLSX.utils.json_to_sheet(excelData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "DapAn");
                const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                zip.file("Bang_Dap_An.xlsx", excelBuffer);

                // Xuất Zip
                zip.generateAsync({type:"blob"}).then(c => saveAs(c, "Bo_De_Tron.zip"));
            };

            if(!tab) return (
                <div className="max-w-5xl mx-auto p-8">
                    <button onClick={()=>window.location.href='index.html'} className="mb-6 text-gray-500 hover:text-indigo-600 font-bold flex items-center gap-2">
                        <i className="fas fa-arrow-left"></i> Về Trang Chủ
                    </button>
                    <h1 className="text-3xl font-bold text-center text-indigo-900 mb-10">CHỌN CHẾ ĐỘ TRỘN ĐỀ</h1>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {/* MODE 1: SERVER */}
                        <div onClick={()=>setTab('server')} className="bg-white p-8 rounded-2xl shadow-lg hover:shadow-2xl transition cursor-pointer border-t-4 border-blue-600 group">
                            <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4 group-hover:scale-110 transition">
                                <i className="fas fa-server"></i>
                            </div>
                            <h3 className="text-xl font-bold text-center mb-2">Trộn Đề Server</h3>
                            <p className="text-sm text-gray-500 text-center">
                                Dùng Backend xử lý file .docx / .pdf. <br/>
                                <span className="text-green-600 font-bold">Giữ nguyên công thức Toán/Lý/Hóa.</span>
                            </p>
                        </div>

                        {/* MODE 2: AI VISION */}
                        <div onClick={()=>setTab('ai')} className="bg-white p-8 rounded-2xl shadow-lg hover:shadow-2xl transition cursor-pointer border-t-4 border-red-600 group">
                            <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4 group-hover:scale-110 transition">
                                <i className="fas fa-eye"></i>
                            </div>
                            <h3 className="text-xl font-bold text-center mb-2">Trộn Đề AI Vision</h3>
                            <p className="text-sm text-gray-500 text-center">
                                Dùng Gemini 2.5 Flash đọc file PDF dạng ảnh. <br/>
                                <span className="text-purple-600 font-bold">Thích hợp cho file scan/ảnh chụp.</span>
                            </p>
                        </div>

                        {/* MODE 3: SIMPLE */}
                        <div onClick={()=>setTab('simple')} className="bg-white p-8 rounded-2xl shadow-lg hover:shadow-2xl transition cursor-pointer border-t-4 border-green-600 group">
                            <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4 group-hover:scale-110 transition">
                                <i className="fas fa-font"></i>
                            </div>
                            <h3 className="text-xl font-bold text-center mb-2">Trộn Text (Offline)</h3>
                            <p className="text-sm text-gray-500 text-center">
                                Tách văn bản thuần túy ngay trên trình duyệt. <br/>
                                <span className="text-gray-600 font-bold">Nhanh, không cần mạng, không công thức.</span>
                            </p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-6">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={()=>setTab(null)} className="text-gray-500 font-bold hover:text-indigo-600 flex items-center gap-2">
                            <i className="fas fa-arrow-left"></i> Chọn lại chế độ
                        </button>
                        <h2 className="text-xl font-bold text-indigo-800">
                            {tab==='server' && "SERVER MIXER (Hỗ trợ Toán)"}
                            {tab==='ai' && "AI VISION MIXER (Gemini 2.5)"}
                            {tab==='simple' && "TEXT MIXER (Offline)"}
                        </h2>
                    </div>

                    <div className="bg-white p-8 rounded-xl shadow-lg border border-gray-200 mb-8">
                        <div className="border-2 border-dashed border-indigo-200 rounded-xl bg-indigo-50 p-10 text-center cursor-pointer hover:bg-indigo-100 transition relative" onClick={()=>fileRef.current.click()}>
                            {loading ? (
                                <div className="loader"></div>
                            ) : (
                                <div>
                                    <i className="fas fa-cloud-upload-alt text-5xl text-indigo-400 mb-4"></i>
                                    <p className="font-bold text-indigo-700 text-lg">Nhấn để chọn file đề thi ({tab==='ai'?'.pdf':'.docx'})</p>
                                    <p className="text-sm text-gray-500 mt-2">Hệ thống sẽ tự động xử lý theo chế độ đã chọn</p>
                                </div>
                            )}
                            <input ref={fileRef} type="file" accept={tab==='ai'?".pdf":".docx,.doc"} className="hidden" onChange={handleFileChange} />
                        </div>
                        {status && <p className="text-center mt-4 font-bold text-blue-600">{status}</p>}
                    </div>

                    {questions.length > 0 && (
                        <div className="bg-white p-6 rounded-xl shadow-lg fade-in">
                            <div className="flex justify-between items-center mb-4 border-b pb-4">
                                <div>
                                    <h3 className="font-bold text-lg">Kết quả: {questions.length} câu</h3>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className="text-sm font-bold">Số mã đề:</span>
                                    <input type="number" min="1" max="10" value={numVariants} onChange={e=>setNumVariants(e.target.value)} className="border p-1 rounded w-16 text-center"/>
                                    <button onClick={downloadZip} className="bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700 shadow flex items-center gap-2">
                                        <i className="fas fa-download"></i> TẢI BỘ ĐỀ & ĐÁP ÁN
                                    </button>
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-1 gap-4 max-h-[500px] overflow-y-auto p-2">
                                {questions.map((q,i) => (
                                    <div key={i} className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                        <div className="font-bold text-indigo-700 mb-2">Câu {q.number}</div>
                                        <div className="mb-3"><MathText text={q.question}/></div>
                                        <div className="grid grid-cols-2 gap-2 text-sm">
                                            {q.options && q.options.map((o, idx) => (
                                                <div key={idx} className="p-2 bg-white border rounded">
                                                    <b>{String.fromCharCode(65+idx)}.</b> <MathText text={o}/>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
