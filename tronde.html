<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Trộn Đề Thi AI Vision Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; }
        .katex { font-size: 1.1em; color: #1e3a8a; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 50; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal-content { background: white; padding: 2rem; border-radius: 1rem; width: 90%; max-width: 600px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .img-preview { max-width: 100%; height: auto; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const MODEL_NAME = "gemini-2.5-flash";
        
        // --- HELPER: CLEAN TEXT (FIX LỖI LẶP CÂU HỎI) ---
        const normalizeText = (text) => text ? text.normalize('NFC').trim() : "";
        const cleanOptionText = (text) => normalizeText(text?.replace(/^([A-Da-d]+)([\.\)\:\-])\s*/, ''));
        const cleanQuestionText = (text) => { 
            if (!text) return ""; 
            // Regex loại bỏ triệt để tiền tố câu hỏi (Câu 1. Câu 1: **Câu 1**)
            return normalizeText(text).replace(/^(\**\s*(Câu|Bài|Question)\s*\d+[\.\:\)]\s*\**\s*)+/gi, '').trim(); 
        };

        // --- HELPER: FORMAT MATH CHO WORD (FIX LỖI MẤT CÔNG THỨC) ---
        const formatMathForWord = (text) => {
            if (!text) return "";
            let content = normalizeText(text);
            
            // Tự động thêm $ nếu thiếu
            if (!content.includes('$') && (content.includes('\\frac') || content.includes('\\sqrt') || content.includes('^'))) {
                content = content.replace(/(\\frac\{.*?\}(\{.*?\})?|\\sqrt\{.*?\})/g, '$$$1$$');
            }

            // Chuyển LaTeX sang MathML
            return content.replace(/\$([^$]+)\$/g, (match, tex) => {
                try {
                    let mathml = katex.renderToString(tex, { throwOnError: false, output: 'mathml', displayMode: false });
                    return mathml.replace(/<annotation encoding="application\/x-tex">[\s\S]*?<\/annotation>/g, '');
                } catch (e) { return match; }
            });
        };

        const SYSTEM_PROMPT = `
        Bạn là một trợ lý soạn đề thi chuyên nghiệp. Nhiệm vụ: Trích xuất câu hỏi trắc nghiệm từ file PDF.
        Output JSON strict (Array): [{"question":"...","options":["...","...","...","..."],"correctAnswerIndex":-1}]
        `;

        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if (!text) return;
                let processed = normalizeText(text);
                const imgRegex = /<img src="([^"]+)"/g;
                processed = processed.replace(imgRegex, (match, src) => `<br/><img src="${src}" class="img-preview"/><br/>`);
                if (!processed.includes('$') && (processed.includes('\\frac') || processed.includes('\\sqrt'))) {
                    processed = processed.replace(/(\\frac\{.*?\}(\{.*?\})?|\\sqrt\{.*?\})/g, '$$$1$$');
                }
                const parts = processed.split(/(\$[^$]+\$|<br\/>|<img[^>]+>)/g);
                ref.current.innerHTML = "";
                parts.forEach(part => {
                    if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false }); } catch { span.innerText = part; }
                        ref.current.appendChild(span);
                    } else if (part.startsWith("<img") || part === "<br/>") {
                        const span = document.createElement("span"); span.innerHTML = part; ref.current.appendChild(span);
                    } else { ref.current.appendChild(document.createTextNode(part)); }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        const AnswerModal = ({ isOpen, onClose, onApply, apiKeys }) => {
            if (!isOpen) return null;
            const [text, setText] = useState("");
            const [status, setStatus] = useState("");
            const handlePaste = async (e) => {
                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.indexOf("image") !== -1) {
                        e.preventDefault();
                        if (apiKeys.length === 0) return alert("Cần có API Key!");
                        await processImage(item.getAsFile()); return;
                    }
                }
            };
            const processImage = async (blob) => {
                setStatus("🤖 AI đang quét bảng đáp án...");
                try {
                    const reader = new FileReader(); reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        const base64 = reader.result.split(',')[1];
                        const currentKey = apiKeys[Math.floor(Math.random() * apiKeys.length)];
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${currentKey}`, {
                            method: 'POST', headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ contents: [{parts: [{text: "Trích xuất đáp án (1A 2B...)"}, {inline_data: {mime_type: "image/jpeg", data: base64}}]}] })
                        });
                        const data = await res.json();
                        if (data.candidates) { setText(prev => prev + (prev ? "\n" : "") + data.candidates[0].content.parts[0].text.trim()); setStatus("✅ Xong!"); } else setStatus("⚠️ Không tìm thấy.");
                    };
                } catch (e) { setStatus("❌ Lỗi: " + e.message); }
            };
            return (
                <div className="modal-overlay" onClick={onClose}><div className="modal-content" onClick={e => e.stopPropagation()}>
                    <h3 className="text-xl font-bold text-indigo-800 mb-4">Nạp Đáp Án</h3>
                    <div className="bg-indigo-50 p-3 rounded text-sm text-indigo-800 mb-3"><b>Cách dùng:</b> Dán ảnh bảng đáp án (Ctrl+V) hoặc nhập 1A 2B...</div>
                    {status && <div className="mb-2 text-sm font-bold text-green-600 animate-pulse">{status}</div>}
                    <textarea value={text} onChange={e => setText(e.target.value)} onPaste={handlePaste} className="w-full h-40 border p-3 rounded outline-none" placeholder="Dán ảnh hoặc nhập..."></textarea>
                    <div className="flex justify-end gap-3 mt-4"><button onClick={onClose} className="px-4 py-2 bg-gray-200 rounded">Hủy</button><button onClick={() => { onApply(text); onClose(); }} className="px-6 py-2 bg-indigo-600 text-white rounded font-bold">Cập Nhật</button></div>
                </div></div>
            );
        };

        const QuestionEditor = ({ q, index, onUpdate }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [localQ, setLocalQ] = useState(q);
            useEffect(() => { setLocalQ(q); }, [q]);
            const handlePaste = (e) => {
                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.indexOf("image") !== -1) {
                        e.preventDefault();
                        const blob = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = (event) => setLocalQ({...localQ, question: localQ.question + "\n" + `<img src="${event.target.result}" />`});
                        reader.readAsDataURL(blob);
                    }
                }
            };
            if (isEditing) return (<div className="bg-white p-6 rounded-lg shadow border-2 border-indigo-400 mb-6"><div className="flex justify-between mb-3"><span className="font-bold text-indigo-700">Câu {index+1}</span><button onClick={()=>{onUpdate(index, localQ); setIsEditing(false)}} className="bg-indigo-600 text-white px-3 py-1 rounded">Lưu</button></div><textarea className="w-full p-2 border rounded mb-4" value={localQ.question} onChange={e=>setLocalQ({...localQ, question: e.target.value})} onPaste={handlePaste} placeholder="Dán ảnh (Ctrl+V)..."/><div className="grid grid-cols-2 gap-2">{localQ.options.map((o,i)=>(<div key={i} className="flex gap-2"><input type="radio" checked={localQ.correctAnswerIndex===i} onChange={()=>setLocalQ({...localQ, correctAnswerIndex:i})}/><input className="border-b w-full" value={o} onChange={e=>{const n=[...localQ.options]; n[i]=e.target.value; setLocalQ({...localQ, options:n})}}/></div>))}</div></div>);
            return (<div className="bg-white p-6 rounded border mb-4 hover:shadow group relative"><button onClick={()=>setIsEditing(true)} className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 bg-gray-100 px-3 py-1 rounded text-sm">Sửa</button><div className="flex justify-between mb-2"><span className="font-bold text-indigo-700">Câu {q.number}</span>{q.correctAnswerIndex===-1&&<span className="text-red-500 text-xs bg-red-100 px-2 rounded">Chưa có đáp án</span>}</div><div className="mb-3"><MathText text={cleanQuestionText(q.question)}/></div><div className="grid grid-cols-2 gap-2 text-sm">{q.options.map((o,i)=>(<div key={i} className={`p-2 border rounded flex justify-between ${i===q.correctAnswerIndex?'bg-green-100 border-green-500':''}`}><span>{String.fromCharCode(65+i)}. <MathText text={cleanOptionText(o)}/></span></div>))}</div></div>);
        };

        const App = () => {
            const [apiKeys, setApiKeys] = useState([]);
            const [questions, setQuestions] = useState([]);
            const [status, setStatus] = useState("");
            const [loading, setLoading] = useState(false);
            const [numVariants, setNumVariants] = useState(4);
            const [showAnsModal, setShowAnsModal] = useState(false);
            const fileRef = useRef();
            
            useEffect(() => { const k = localStorage.getItem('global_gemini_keys'); if(k) setApiKeys(JSON.parse(k)); }, []);

            const handleApplyAnswers = (text) => {
                const raw = text.toUpperCase().replace(/[^0-9A-D]/g, ' ');
                const regex = /(\d+)\s*[\.\:\-]?\s*([A-D])/g;
                let match, newMap = {}, count = 0;
                while ((match = regex.exec(raw)) !== null) { newMap[parseInt(match[1])] = match[2].charCodeAt(0) - 65; count++; }
                if (count === 0) return alert("Không tìm thấy đáp án!");
                setQuestions(questions.map((q, i) => { const ans = newMap[q.number] !== undefined ? newMap[q.number] : newMap[i+1]; return ans !== undefined ? { ...q, correctAnswerIndex: ans } : q; }));
                alert(`Đã cập nhật ${count} câu!`);
            };

            const processPageWithAI = async (page, pageNum, key) => {
                const vp = page.getViewport({scale: 2});
                const cvs = document.createElement('canvas');
                cvs.width = vp.width; cvs.height = vp.height;
                await page.render({canvasContext: cvs.getContext('2d'), viewport: vp}).promise;
                const img = cvs.toDataURL('image/jpeg', 0.8).split(',')[1];
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${key}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ contents: [{parts: [{text: SYSTEM_PROMPT}, {inline_data: {mime_type: "image/jpeg", data: img}}]}] }) });
                const data = await res.json();
                if(data.candidates) {
                    let txt = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                    const s = txt.indexOf('['), e = txt.lastIndexOf(']');
                    if (s!==-1 && e!==-1) return JSON.parse(txt.substring(s, e+1));
                }
                return [];
            };

            const handleAIMix = async (e) => {
                const file = e.target.files[0];
                if(!file || !apiKeys.length) return alert("Cần file và API Key!");
                setLoading(true); setStatus("🚀 Đang xử lý đa luồng...");
                try {
                    const buffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(buffer).promise;
                    const pagePromises = [];
                    for(let i = 1; i <= pdf.numPages; i++) {
                        const key = apiKeys[(i-1)%apiKeys.length];
                        setStatus(`⚡ Đang đọc trang ${i}/${pdf.numPages}...`);
                        pagePromises.push(pdf.getPage(i).then(page => processPageWithAI(page, i, key)).catch(err => []));
                    }
                    const results = await Promise.all(pagePromises);
                    const allQs = results.flat().map((q, i) => ({ id: i, number: i+1, question: q.question, options: q.options.map(o => o.replace(/^[A-D][\.\)\:]\s*/, '').trim()), correctAnswerIndex: q.correctAnswerIndex !== undefined ? q.correctAnswerIndex : -1 }));
                    setQuestions(allQs); setStatus(`✅ Đã đọc ${allQs.length} câu.`);
                } catch(e) { setStatus("❌ Lỗi: " + e.message); }
                setLoading(false);
            };

            const downloadZip = () => {
                if(!questions.length) return alert("Chưa có dữ liệu!");
                const zip = new JSZip();
                const codes = Array.from({length: numVariants}, (_, i) => 101 + i);
                let excelData = [];
                codes.forEach(code => {
                    const shuffled = [...questions].sort(()=>Math.random()-0.5);
                    const variant = shuffled.map((q,i) => {
                        const opts = q.options.map((txt,idx)=>({txt, isC: idx===q.correctAnswerIndex})).sort(()=>Math.random()-0.5);
                        const newC = opts.findIndex(o=>o.isC);
                        return { number: i+1, question: q.question, options: opts.map(o=>o.txt), correctAnswerLetter: String.fromCharCode(65+newC) };
                    });
                    
                    // SỬ DỤNG MATHML ĐỂ WORD HIỂN THỊ CÔNG THỨC
                    let body = `<h2 style='text-align:center'>MÃ ĐỀ: ${code}</h2>`;
                    variant.forEach(q => {
                        body += `<p><b>Câu ${q.number}:</b> ${formatMathForWord(cleanQuestionText(q.question))}</p>`;
                        q.options.forEach((o, idx) => body += `<p style="margin-left: 20px;">${String.fromCharCode(65+idx)}. ${formatMathForWord(cleanOptionText(o))}</p>`);
                    });
                    zip.file(`De_${code}.doc`, `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'></head><body>${body}</body></html>`);
                    let row = {"Mã Đề": code}; variant.forEach(q => row[`Câu ${q.number}`] = q.correctAnswerLetter); excelData.push(row);
                });
                const ws = XLSX.utils.json_to_sheet(excelData);
                const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "DapAn");
                zip.file("Bang_Dap_An.xlsx", XLSX.write(wb, {bookType:'xlsx', type:'array'}));
                zip.generateAsync({type:"blob"}).then(c => saveAs(c, "Bo_De_Tron_AI.zip"));
            };

            return (
                <div className="max-w-4xl mx-auto p-6 min-h-screen">
                    <AnswerModal isOpen={showAnsModal} onClose={()=>setShowAnsModal(false)} onApply={handleApplyAnswers} apiKeys={apiKeys} />
                    <div className="flex justify-between items-center mb-6"><button onClick={()=>window.location.href='index.html'} className="text-gray-500 font-bold"><i className="fas fa-arrow-left"></i> Trang Chủ</button><div className={`text-sm font-bold px-3 py-1 rounded-full border ${apiKeys.length ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{apiKeys.length ? `✅ ${apiKeys.length} Keys` : '❌ Chưa có Key'}</div></div>
                    <div className="text-center mb-8"><h1 className="text-3xl font-bold text-indigo-800 mb-2"><i className="fas fa-eye"></i> AI VISION EXAM MIXER</h1></div>
                    <div className="bg-white p-6 rounded-xl shadow border-2 border-dashed border-indigo-200 mb-6 text-center cursor-pointer hover:bg-indigo-50" onClick={()=>fileRef.current.click()}>
                        {loading ? <div className="loader"></div> : <i className="fas fa-cloud-upload-alt text-5xl text-indigo-500 mb-3"></i>}
                        <p className="font-bold text-lg text-indigo-700">{loading ? status : "Chọn file PDF đề thi gốc"}</p>
                        <input ref={fileRef} type="file" accept=".pdf" className="hidden" onChange={handleAIMix} />
                    </div>
                    {questions.length > 0 && (<div className="bg-white p-6 rounded-xl shadow fade-in"><div className="flex justify-between items-center mb-6 border-b pb-4"><h3 className="font-bold text-xl">Kết quả: {questions.length} câu</h3><div className="flex gap-2"><button onClick={()=>setShowAnsModal(true)} className="bg-orange-500 text-white px-4 py-2 rounded font-bold">Nạp Đáp Án</button><div className="flex items-center bg-gray-100 rounded px-2"><span className="text-sm font-bold mr-2">Số mã:</span><input type="number" min="1" max="20" value={numVariants} onChange={e=>setNumVariants(e.target.value)} className="bg-transparent w-10 font-bold"/></div><button onClick={downloadZip} className="bg-green-600 text-white px-4 py-2 rounded font-bold">Tải Về</button></div></div><div className="space-y-4">{questions.map((q, i) => (<QuestionEditor key={q.id} q={q} index={i} onUpdate={(idx, newQ) => { const newQs = [...questions]; newQs[idx] = newQ; setQuestions(newQs); }} />))}</div></div>)}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
