<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trộn Đề Thi AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- KaTeX: Hiển thị công thức Toán -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .latex-content { font-size: 1.15em; line-height: 1.6; color: #1f2937; }
        .latex-content img { display: inline-block; max-width: 100%; }
        .question-card { transition: all 0.2s ease; border-left: 4px solid transparent; }
        .question-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-left-color: #3b82f6; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CẤU HÌNH SERVER ---
        const API_BASE = "https://hoangthiencm-giangbai.hf.space"; 

        // --- COMPONENT HIỂN THỊ CÔNG THỨC TOÁN ---
        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if (ref.current && text) {
                    // Xử lý xuống dòng để hiển thị đúng trên HTML
                    let clean = text.replace(/\n/g, '<br/>');
                    ref.current.innerHTML = clean;
                    // Kích hoạt KaTeX render
                    try {
                        renderMathInElement(ref.current, {
                            delimiters: [
                                {left: "$$", right: "$$", display: true},
                                {left: "$", right: "$", display: false},
                                {left: "\\(", right: "\\)", display: false},
                                {left: "\\[", right: "\\]", display: true}
                            ],
                            throwOnError: false
                        });
                    } catch(e) { console.error("KaTeX Error:", e); }
                } else if (ref.current) {
                    ref.current.innerHTML = "";
                }
            }, [text]);
            return <div ref={ref} className="latex-content"></div>;
        };

        const App = () => {
            const [step, setStep] = useState(1); // 1: Upload, 2: Editor/Review
            const [loading, setLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState("");
            const [questions, setQuestions] = useState([]);
            
            // Thông tin đề thi
            const [examInfo, setExamInfo] = useState({ 
                title: "KIỂM TRA 15 PHÚT", 
                school: "TRƯỜNG THCS...", 
                time: "15" 
            });
            const [numVariants, setNumVariants] = useState(4);
            
            // Cấu hình AI (Lấy từ localStorage)
            const [config, setConfig] = useState({ keys: [], model: 'gemini-2.5-flash' });

            useEffect(() => {
                // Tự động load cấu hình từ Index (Dashboard)
                const storedKeys = localStorage.getItem('global_gemini_keys');
                const storedModel = localStorage.getItem('default_gemini_module');
                
                if (storedKeys) {
                    setConfig({
                        keys: JSON.parse(storedKeys),
                        model: storedModel || 'gemini-2.5-flash'
                    });
                } else {
                    alert("⚠️ Chưa có API Key! Vui lòng quay lại trang chủ (Dashboard) để nạp Key.");
                }
            }, []);

            // --- BƯỚC 1: UPLOAD & PHÂN TÍCH ---
            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                if (config.keys.length === 0) return alert("Thiếu API Key!");

                setLoading(true);
                setLoadingMsg(`Đang đọc đề thi bằng AI (${config.model})...`);
                
                const fd = new FormData();
                fd.append("file", file);
                fd.append("api_keys_json", JSON.stringify(config.keys));
                fd.append("gemini_model", config.model); // Gửi model lên server

                try {
                    const res = await fetch(`${API_BASE}/api/tronde/parse-ai`, { 
                        method: "POST", 
                        body: fd 
                    });
                    
                    const data = await res.json();
                    
                    if (res.ok && data.status === "success") {
                        // Thêm ID và mảng ảnh rỗng cho mỗi câu hỏi
                        const processed = data.data.map((q, i) => ({ 
                            ...q, 
                            id: Date.now() + i, 
                            images: [],
                            // Đảm bảo có đủ 4 lựa chọn nếu AI đọc thiếu
                            a: q.a && q.a.length >= 4 ? q.a : [...(q.a || []), "", "", "", ""].slice(0,4)
                        }));
                        setQuestions(processed);
                        setStep(2);
                    } else {
                        throw new Error(data.error || "Không đọc được dữ liệu từ file.");
                    }
                } catch (err) {
                    alert("Lỗi: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            // --- CÁC HÀM CHỈNH SỬA (EDITOR) ---
            
            // Cập nhật nội dung câu hỏi/đáp án
            const updateQuestion = (idx, field, val, optIdx = null) => {
                const newQs = [...questions];
                if (field === 'a' && optIdx !== null) {
                    newQs[idx].a[optIdx] = val;
                } else {
                    newQs[idx][field] = val;
                }
                setQuestions(newQs);
            };

            // Dán ảnh (Ctrl+V) vào câu hỏi
            const handlePasteImage = (e, qIdx) => {
                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.startsWith("image/")) {
                        e.preventDefault();
                        const blob = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = (evt) => {
                            const newQs = [...questions];
                            // Giới hạn kích thước ảnh base64 nếu cần thiết
                            newQs[qIdx].images.push(evt.target.result); 
                            setQuestions(newQs);
                        };
                        reader.readAsDataURL(blob);
                    }
                }
            };

            // Xóa câu hỏi
            const deleteQuestion = (idx) => {
                if (confirm("Bạn muốn xóa câu hỏi này?")) {
                    setQuestions(questions.filter((_, i) => i !== idx));
                }
            };

            // Xóa ảnh trong câu hỏi
            const removeImage = (qIdx, imgIdx) => {
                const newQs = [...questions];
                newQs[qIdx].images.splice(imgIdx, 1);
                setQuestions(newQs);
            };

            // Thêm câu hỏi thủ công
            const addManualQuestion = () => {
                setQuestions([
                    ...questions, 
                    {
                        id: Date.now(), 
                        q: "Câu hỏi mới...", 
                        a: ["", "", "", ""], 
                        correct: null, 
                        images: []
                    }
                ]);
                // Cuộn xuống cuối trang
                setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 100);
            };

            // --- CÁC HÀM NHẬP ĐÁP ÁN ---

            // 1. Quét ảnh đáp án
            const handleKeyImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true); setLoadingMsg("Đang quét ảnh bảng đáp án...");
                
                const fd = new FormData();
                fd.append("file", file);
                fd.append("api_keys_json", JSON.stringify(config.keys));
                fd.append("gemini_model", config.model);
                
                try {
                    const res = await fetch(`${API_BASE}/api/tronde/parse-key-image`, { method: "POST", body: fd });
                    const result = await res.json();
                    if (result.status === "success") {
                        const keyData = result.data; // {"1": "A", "2": "B"}
                        const newQs = [...questions];
                        Object.keys(keyData).forEach(k => {
                            const idx = parseInt(k) - 1;
                            if (newQs[idx]) newQs[idx].correct = keyData[k];
                        });
                        setQuestions(newQs);
                        alert("Đã cập nhật đáp án từ ảnh!");
                    } else {
                        throw new Error(result.error);
                    }
                } catch (e) { alert("Lỗi quét đáp án: " + e.message); }
                finally { setLoading(false); }
            };

            // 2. Nhập chuỗi thủ công (1A 2B...)
            const handleManualKeyInput = () => {
                const input = prompt("Nhập chuỗi đáp án (Ví dụ: 1A 2B 3C...):");
                if (!input) return;
                // Regex tìm các cặp số+chữ cái (VD: 1A, 2B, 10D)
                const tokens = input.toUpperCase().match(/(\d+)\s*([A-D])/g); 
                if (tokens) {
                    const newQs = [...questions];
                    tokens.forEach(t => {
                        const match = t.match(/(\d+)\s*([A-D])/);
                        if (match) {
                            const num = parseInt(match[1]);
                            const ans = match[2];
                            if (newQs[num - 1]) newQs[num - 1].correct = ans;
                        }
                    });
                    setQuestions(newQs);
                    alert(`Đã cập nhật ${tokens.length} đáp án.`);
                } else {
                    alert("Không tìm thấy định dạng đáp án hợp lệ.");
                }
            };

            // --- BƯỚC 3: XUẤT ĐỀ (TRỘN) ---
            const handleExport = async () => {
                if (questions.length === 0) return alert("Chưa có câu hỏi nào!");
                
                // Kiểm tra xem có câu nào chưa chọn đáp án không
                const missingAns = questions.filter(q => !q.correct).length;
                if (missingAns > 0) {
                    if(!confirm(`Cảnh báo: Có ${missingAns} câu chưa chọn đáp án đúng. Bạn có muốn tiếp tục xuất đề không?`)) return;
                }

                setLoading(true); setLoadingMsg("Đang trộn đề và tạo file Word/Excel...");
                
                const payload = {
                    questions: questions,
                    num_variants: parseInt(numVariants),
                    exam_info: examInfo
                };

                try {
                    const res = await fetch(`${API_BASE}/api/tronde/export`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    
                    if (res.ok) {
                        const blob = await res.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `Bo_De_Tron_${Date.now()}.zip`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    } else {
                        const err = await res.json();
                        throw new Error(err.error || "Lỗi xuất file");
                    }
                } catch (e) { alert("Lỗi: " + e.message); }
                finally { setLoading(false); }
            };

            // --- GIAO DIỆN ---
            return (
                <div className="min-h-screen pb-20">
                    {/* LOADING OVERLAY */}
                    {loading && (
                        <div className="loading-overlay">
                            <div className="spinner mb-4"></div>
                            <div className="text-xl font-bold text-blue-600 animate-pulse">{loadingMsg}</div>
                        </div>
                    )}

                    {/* HEADER */}
                    <div className="bg-white shadow-sm border-b sticky top-0 z-30">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <a href="index.html" className="text-gray-500 hover:text-blue-600 transition"><i className="fas fa-arrow-left text-xl"></i></a>
                                <h1 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                    <i className="fas fa-random text-blue-600"></i> TRỘN ĐỀ THI AI
                                </h1>
                            </div>
                            
                            {step === 2 && (
                                <div className="flex items-center gap-3">
                                    <div className="hidden md:flex items-center bg-gray-100 rounded-lg p-1">
                                        <input type="number" className="bg-transparent w-12 text-center font-bold text-gray-700 outline-none" 
                                            value={numVariants} onChange={e=>setNumVariants(e.target.value)} min="1" max="20" title="Số mã đề"/>
                                        <span className="text-xs font-bold text-gray-500 mr-2">Mã đề</span>
                                    </div>
                                    <button onClick={handleExport} className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-5 py-2 rounded-full font-bold shadow hover:shadow-lg transition transform hover:scale-105 flex items-center gap-2">
                                        <i className="fas fa-file-export"></i> <span className="hidden sm:inline">XUẤT ĐỀ</span>
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto p-4 md:p-6">
                        {/* STEP 1: UPLOAD */}
                        {step === 1 && (
                            <div className="max-w-2xl mx-auto mt-10">
                                <div className="bg-white p-8 rounded-2xl shadow-lg text-center border-2 border-dashed border-blue-200 hover:border-blue-400 transition cursor-pointer group"
                                     onClick={() => document.getElementById('file-upload').click()}>
                                    <div className="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-blue-100 transition">
                                        <i className="fas fa-cloud-upload-alt text-4xl text-blue-500"></i>
                                    </div>
                                    <h2 className="text-2xl font-bold text-gray-800 mb-2">Tải lên đề thi gốc</h2>
                                    <p className="text-gray-500 mb-6">Hỗ trợ file PDF, Word (.docx) hoặc Ảnh chụp.</p>
                                    
                                    <input type="file" id="file-upload" className="hidden" accept=".pdf,.png,.jpg,.jpeg,.docx,.doc" onChange={handleFileUpload}/>
                                    
                                    <button className="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition">
                                        Chọn File
                                    </button>
                                    
                                    <div className="mt-6 text-sm text-gray-400">
                                        <i className="fas fa-info-circle mr-1"></i> Sử dụng Model: <b>{config.model}</b>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* STEP 2: EDITOR */}
                        {step === 2 && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                {/* LEFT COLUMN: LIST QUESTIONS */}
                                <div className="lg:col-span-2 space-y-6">
                                    {/* INFO BAR */}
                                    <div className="bg-white p-4 rounded-xl shadow-sm grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <input className="border p-2 rounded focus:ring-2 focus:ring-blue-200 outline-none" placeholder="Tên Trường" value={examInfo.school} onChange={e=>setExamInfo({...examInfo, school: e.target.value})}/>
                                        <input className="border p-2 rounded focus:ring-2 focus:ring-blue-200 outline-none" placeholder="Tên Kỳ Thi" value={examInfo.title} onChange={e=>setExamInfo({...examInfo, title: e.target.value})}/>
                                        <input className="border p-2 rounded focus:ring-2 focus:ring-blue-200 outline-none" placeholder="Thời gian (phút)" value={examInfo.time} onChange={e=>setExamInfo({...examInfo, time: e.target.value})}/>
                                    </div>

                                    {/* QUESTION LIST */}
                                    {questions.map((q, idx) => (
                                        <div key={q.id} className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 question-card relative group">
                                            {/* Toolbar */}
                                            <div className="absolute top-3 right-3 flex gap-2 opacity-50 group-hover:opacity-100 transition">
                                                <button onClick={() => deleteQuestion(idx)} className="text-red-400 hover:text-red-600 p-2 rounded-full hover:bg-red-50" title="Xóa câu hỏi"><i className="fas fa-trash"></i></button>
                                            </div>

                                            <div className="flex gap-4">
                                                {/* Question Number */}
                                                <div className="flex flex-col items-center gap-2">
                                                    <div className="w-8 h-8 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center font-bold text-sm shrink-0">
                                                        {idx + 1}
                                                    </div>
                                                </div>
                                                
                                                <div className="flex-1 space-y-3">
                                                    {/* Question Content */}
                                                    <div className="relative">
                                                        <textarea 
                                                            className="w-full p-3 border rounded-lg bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-200 outline-none transition text-base min-h-[80px]"
                                                            value={q.q}
                                                            onChange={(e) => updateQuestion(idx, 'q', e.target.value)}
                                                            onPaste={(e) => handlePasteImage(e, idx)}
                                                            placeholder="Nội dung câu hỏi..."
                                                        ></textarea>
                                                        
                                                        {/* Math Preview */}
                                                        {q.q && (
                                                            <div className="mt-2 p-3 bg-blue-50/50 rounded-lg border border-blue-100 text-sm">
                                                                <div className="text-xs font-bold text-blue-400 mb-1 uppercase">Xem trước:</div>
                                                                <MathText text={q.q} />
                                                            </div>
                                                        )}

                                                        {/* Images */}
                                                        {q.images && q.images.length > 0 && (
                                                            <div className="mt-2 flex flex-wrap gap-2">
                                                                {q.images.map((img, imgIdx) => (
                                                                    <div key={imgIdx} className="relative group/img">
                                                                        <img src={img} className="h-20 w-auto rounded border bg-white object-contain"/>
                                                                        <button onClick={()=>removeImage(idx, imgIdx)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center shadow opacity-0 group-hover/img:opacity-100 transition"><i className="fas fa-times"></i></button>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* Options */}
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                        {q.a.map((opt, optIdx) => {
                                                            const label = ["A", "B", "C", "D"][optIdx];
                                                            const isCorrect = q.correct === label;
                                                            return (
                                                                <div key={optIdx} className={`flex items-center gap-2 p-2 border rounded-lg transition ${isCorrect ? 'bg-green-50 border-green-500 ring-1 ring-green-400' : 'bg-white hover:border-gray-300'}`}>
                                                                    <button 
                                                                        className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shrink-0 transition ${isCorrect ? 'bg-green-600 text-white shadow' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                                                                        onClick={() => updateQuestion(idx, 'correct', label)}
                                                                        title="Chọn làm đáp án đúng"
                                                                    >
                                                                        {label}
                                                                    </button>
                                                                    <input 
                                                                        className="flex-1 bg-transparent outline-none text-sm text-gray-700"
                                                                        value={opt}
                                                                        onChange={(e) => updateQuestion(idx, 'a', e.target.value, optIdx)}
                                                                        placeholder={`Đáp án ${label}`}
                                                                    />
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}

                                    <button onClick={addManualQuestion} className="w-full py-4 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 font-bold hover:border-blue-400 hover:text-blue-600 hover:bg-blue-50 transition flex items-center justify-center gap-2">
                                        <i className="fas fa-plus-circle"></i> Thêm câu hỏi thủ công
                                    </button>
                                </div>

                                {/* RIGHT COLUMN: TOOLS */}
                                <div className="lg:col-span-1">
                                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 sticky top-24">
                                        <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2">
                                            <i className="fas fa-tools text-blue-500"></i> Công cụ Đáp Án
                                        </h3>
                                        
                                        <div className="space-y-3">
                                            <button onClick={() => document.getElementById('key-upload').click()} className="w-full bg-purple-50 text-purple-700 border border-purple-200 px-4 py-3 rounded-lg font-bold text-sm hover:bg-purple-100 transition flex items-center justify-center gap-2">
                                                <i className="fas fa-camera"></i> Quét ảnh Đáp Án
                                            </button>
                                            <input type="file" id="key-upload" className="hidden" accept="image/*" onChange={handleKeyImageUpload}/>
                                            
                                            <button onClick={handleManualKeyInput} className="w-full bg-indigo-50 text-indigo-700 border border-indigo-200 px-4 py-3 rounded-lg font-bold text-sm hover:bg-indigo-100 transition flex items-center justify-center gap-2">
                                                <i className="fas fa-keyboard"></i> Nhập chuỗi (1A 2B...)
                                            </button>
                                        </div>

                                        <hr className="my-4 border-gray-100"/>
                                        
                                        <div className="text-sm text-gray-500 space-y-2">
                                            <p><i className="fas fa-check-circle text-green-500 mr-1"></i> <b>Số câu hỏi:</b> {questions.length}</p>
                                            <p><i className="fas fa-exclamation-circle text-yellow-500 mr-1"></i> <b>Chưa chọn đáp án:</b> {questions.filter(q => !q.correct).length}</p>
                                        </div>

                                        <div className="mt-4 p-3 bg-blue-50 rounded-lg text-xs text-blue-700 border border-blue-100">
                                            <i className="fas fa-lightbulb mr-1"></i> <b>Mẹo:</b> Bạn có thể dán ảnh (Ctrl+V) trực tiếp vào khung nội dung câu hỏi để thêm hình vẽ.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
