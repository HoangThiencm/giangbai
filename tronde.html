<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Trộn Đề Thi Pro - Dual OCR</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; }
        .katex { font-size: 1.1em; color: #1e3a8a; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7c7c7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // === CẤU HÌNH ===
        // URL Server Backend hiện tại (tronde.py)
        const SERVER_URL = "https://hoangthiencm-giangbai.hf.space"; 

        // --- COMPONENTS ---
        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if (!text) return;
                // Fix lỗi hiển thị công thức cơ bản
                let processed = text;
                if (!text.includes('$') && (text.includes('\\{') || text.includes('\\['))) {
                    processed = `$${text}$`;
                }
                const parts = processed.split(/(\$[^$]+\$)/g);
                ref.current.innerHTML = "";
                parts.forEach(part => {
                    if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false }); } catch { span.innerText = part; }
                        ref.current.appendChild(span);
                    } else { ref.current.appendChild(document.createTextNode(part)); }
                });
            }, [text]);
            return <span ref={ref} className="text-gray-800" />;
        };

        const App = () => {
            const [mode, setMode] = useState("ai"); // 'ai' | 'local'
            const [apiKeys, setApiKeys] = useState([]);
            const [file, setFile] = useState(null);
            const [status, setStatus] = useState("");
            const [loading, setLoading] = useState(false);
            const [questions, setQuestions] = useState([]);
            const [numVariants, setNumVariants] = useState(4);
            const [hfUrl, setHfUrl] = useState("https://your-ocr-space.hf.space"); // URL Server OCR riêng (nếu dùng mode local)
            const fileRef = useRef();

            useEffect(() => {
                const k = localStorage.getItem('global_gemini_keys');
                if(k) setApiKeys(JSON.parse(k));
            }, []);

            // Xử lý File Input
            const handleFileChange = (e) => {
                if(e.target.files[0]) setFile(e.target.files[0]);
            };

            // Gửi yêu cầu trộn đề
            const handleProcess = async () => {
                if (!file) return alert("Vui lòng chọn file đề thi (PDF/Word/Ảnh)!");
                if (mode === 'ai' && apiKeys.length === 0) return alert("Chế độ AI cần ít nhất 1 Gemini API Key!");

                setLoading(true);
                setStatus("Đang tải file lên & xử lý...");
                setQuestions([]); // Reset kết quả cũ

                try {
                    const fd = new FormData();
                    fd.append("file", file);
                    fd.append("mode", mode); // Gửi chế độ đã chọn
                    
                    // Nếu là AI mode, gửi keys. Nếu Local mode, có thể gửi URL server OCR
                    if (mode === 'ai') {
                        fd.append("api_keys", JSON.stringify(apiKeys)); 
                    } else {
                        fd.append("ocr_server_url", hfUrl);
                    }

                    // Gọi về Backend (tronde.py)
                    const res = await fetch(`${SERVER_URL}/convert-and-quiz`, { 
                        method: "POST", 
                        body: fd 
                    });
                    
                    const data = await res.json();
                    if(data.error) throw new Error(data.error);
                    
                    setQuestions(data.questions); // Backend trả về cấu trúc đã chuẩn hóa
                    setStatus(`✅ Hoàn tất! Nhận diện được ${data.total_questions} câu hỏi (bao gồm câu chùm).`);

                } catch(e) {
                    setStatus("❌ Lỗi: " + e.message);
                    console.error(e);
                } finally {
                    setLoading(false);
                }
            };

            // Xuất file Zip
            const downloadZip = async () => {
                if(!questions.length) return alert("Chưa có dữ liệu để tải!");
                setStatus("Đang tạo file đề...");
                const zip = new JSZip();
                
                // Mã đề từ 101 -> ...
                const codes = Array.from({length: numVariants}, (_, i) => 101 + i);
                let excelData = [];

                codes.forEach(code => {
                    // --- THUẬT TOÁN TRỘN (SHUFFLE) ---
                    // 1. Sao chép danh sách gốc
                    let deck = [...questions];
                    
                    // 2. Trộn ngẫu nhiên danh sách câu hỏi (Giữ nguyên cụm Cluster)
                    deck.sort(() => Math.random() - 0.5);
                    
                    // 3. Đánh số lại & Trộn đáp án từng câu
                    let examContent = `<h2 style='text-align:center'>MÃ ĐỀ: ${code}</h2>`;
                    let qIndex = 1;
                    let answerRow = {"Mã Đề": code};

                    deck.forEach(item => {
                        // Xử lý CLUSTER (Chùm câu hỏi)
                        if (item.type === 'cluster') {
                            examContent += `<div style='margin-bottom:15pt; border:1px dashed #ccc; padding:10px;'>
                                <p><b>${item.stem}</b></p>`; // Đề chung
                            
                            // Các câu hỏi con trong chùm (Có thể trộn hoặc giữ nguyên thứ tự con)
                            // Ở đây ta giữ nguyên thứ tự con để đảm bảo logic bài đọc
                            item.questions.forEach(subQ => {
                                const { html, correctChar } = processSingleQuestion(subQ, qIndex);
                                examContent += html;
                                answerRow[`Câu ${qIndex}`] = correctChar;
                                qIndex++;
                            });
                            examContent += `</div>`;
                        } 
                        // Xử lý SINGLE (Câu đơn)
                        else {
                            const { html, correctChar } = processSingleQuestion(item, qIndex);
                            examContent += html;
                            answerRow[`Câu ${qIndex}`] = correctChar;
                            qIndex++;
                        }
                    });

                    // Tạo file HTML cho Word
                    const docContent = `
                        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                        <head><meta charset='utf-8'><title>${code}</title>
                        <style>body{font-family:'Times New Roman';font-size:13pt}</style>
                        </head><body>${examContent}</body></html>
                    `;
                    
                    zip.file(`De_${code}.doc`, docContent);
                    excelData.push(answerRow);
                });

                // Tạo file Excel đáp án
                const ws = XLSX.utils.json_to_sheet(excelData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "DapAn");
                const excelBuffer = XLSX.write(wb, {bookType:'xlsx', type:'array'});
                zip.file("Bang_Dap_An.xlsx", excelBuffer);

                // Tải xuống
                const content = await zip.generateAsync({type:"blob"});
                saveAs(content, "Bo_De_Tron_Thong_Minh.zip");
                setStatus("✅ Đã tải xong!");
            };

            // Helper: Xử lý hiển thị 1 câu hỏi và trộn đáp án
            const processSingleQuestion = (q, index) => {
                // Trộn đáp án
                const opts = q.options.map((txt, idx) => ({
                    txt, 
                    isCorrect: idx === q.correct_index
                })).sort(() => Math.random() - 0.5);

                // Tìm lại index đúng mới
                const newCorrectIndex = opts.findIndex(o => o.isCorrect);
                const correctChar = String.fromCharCode(65 + newCorrectIndex);

                // Format HTML cho Word
                let html = `<p style='margin-bottom:6pt; text-align:justify'><b>Câu ${index}:</b> ${formatMath(q.question)}</p>`;
                
                // Layout đáp án (4 cột hoặc 2 cột hoặc 1 cột)
                const maxLen = Math.max(...opts.map(o => o.txt.length));
                if (maxLen < 15) {
                    html += `<table style='width:100%; border:none; margin-bottom:12pt'><tr>
                        <td style='width:25%'><b>A.</b> ${formatMath(opts[0].txt)}</td>
                        <td style='width:25%'><b>B.</b> ${formatMath(opts[1].txt)}</td>
                        <td style='width:25%'><b>C.</b> ${formatMath(opts[2].txt)}</td>
                        <td style='width:25%'><b>D.</b> ${formatMath(opts[3].txt)}</td>
                    </tr></table>`;
                } else if (maxLen < 40) {
                    html += `<table style='width:100%; border:none; margin-bottom:12pt'><tr>
                        <td style='width:50%'><b>A.</b> ${formatMath(opts[0].txt)}</td>
                        <td style='width:50%'><b>B.</b> ${formatMath(opts[1].txt)}</td>
                    </tr><tr>
                        <td style='width:50%'><b>C.</b> ${formatMath(opts[2].txt)}</td>
                        <td style='width:50%'><b>D.</b> ${formatMath(opts[3].txt)}</td>
                    </tr></table>`;
                } else {
                    html += opts.map((o,i) => `<p><b>${String.fromCharCode(65+i)}.</b> ${formatMath(o.txt)}</p>`).join('');
                }

                return { html, correctChar };
            };

            const formatMath = (text) => {
                if (!text) return "";
                // Chuyển đổi ký tự đặc biệt cho Word nếu cần, hoặc để nguyên LaTeX
                // Ở đây ta giữ nguyên LaTeX trong $$, Word (nếu cài MathType) hoặc LibreOffice sẽ đọc tốt
                // Hoặc dùng MathML nếu muốn pro hơn (nhưng phức tạp cho frontend thuần)
                return text.replace(/\n/g, "<br/>");
            };

            return (
                <div className="max-w-6xl mx-auto p-6 font-sans">
                    <button onClick={()=>window.location.href='index.html'} className="mb-6 text-gray-500 hover:text-indigo-600 font-bold flex items-center gap-2 transition">
                        <i className="fas fa-arrow-left"></i> Về Trang Chủ
                    </button>

                    <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-indigo-50">
                        {/* Header */}
                        <div className="bg-indigo-600 p-6 text-white text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-full bg-white opacity-10" style={{backgroundImage: 'radial-gradient(#fff 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>
                            <h1 className="text-3xl font-bold relative z-10 uppercase tracking-wide">Hệ Thống Trộn Đề Thông Minh</h1>
                            <p className="text-indigo-200 text-sm mt-2 relative z-10">Hỗ trợ nhận diện AI & Server OCR riêng biệt</p>
                        </div>

                        <div className="p-8">
                            {/* 1. CHỌN CHẾ ĐỘ */}
                            <div className="mb-8">
                                <h3 className="text-lg font-bold text-gray-700 mb-4 border-l-4 border-indigo-500 pl-3">1. Chọn Chế độ Nhận diện (OCR)</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div onClick={() => setMode('ai')} className={`cursor-pointer p-4 rounded-xl border-2 transition flex items-center gap-4 ${mode === 'ai' ? 'border-indigo-600 bg-indigo-50' : 'border-gray-200 hover:border-indigo-300'}`}>
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center text-xl ${mode === 'ai' ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-500'}`}><i className="fas fa-robot"></i></div>
                                        <div>
                                            <div className="font-bold text-gray-800">AI Vision Mode (Gemini)</div>
                                            <div className="text-xs text-gray-500">Chính xác cao, hỗ trợ công thức Toán/Hóa. Cần API Key.</div>
                                        </div>
                                        {mode === 'ai' && <i className="fas fa-check-circle text-indigo-600 ml-auto text-xl"></i>}
                                    </div>

                                    <div onClick={() => setMode('local')} className={`cursor-pointer p-4 rounded-xl border-2 transition flex items-center gap-4 ${mode === 'local' ? 'border-green-600 bg-green-50' : 'border-gray-200 hover:border-green-300'}`}>
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center text-xl ${mode === 'local' ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-500'}`}><i className="fas fa-server"></i></div>
                                        <div>
                                            <div className="font-bold text-gray-800">Server OCR Mode</div>
                                            <div className="text-xs text-gray-500">Chạy trên Server riêng (HuggingFace). Không lo chặn IP Google.</div>
                                        </div>
                                        {mode === 'local' && <i className="fas fa-check-circle text-green-600 ml-auto text-xl"></i>}
                                    </div>
                                </div>

                                {mode === 'local' && (
                                    <div className="mt-3 ml-2 animate-fade-in">
                                        <label className="text-xs font-bold text-gray-500 uppercase">OCR Server URL:</label>
                                        <input value={hfUrl} onChange={e => setHfUrl(e.target.value)} className="w-full border p-2 rounded text-sm bg-gray-50 focus:bg-white transition" placeholder="https://..." />
                                    </div>
                                )}
                            </div>

                            {/* 2. UPLOAD FILE */}
                            <div className="mb-8">
                                <h3 className="text-lg font-bold text-gray-700 mb-4 border-l-4 border-indigo-500 pl-3">2. Tải lên Đề thi gốc</h3>
                                <div onClick={() => fileRef.current.click()} className="border-2 border-dashed border-indigo-200 bg-indigo-50/50 rounded-xl p-8 text-center cursor-pointer hover:bg-indigo-100 transition group">
                                    <input ref={fileRef} type="file" className="hidden" onChange={handleFileChange} accept=".pdf,.docx,.doc,.png,.jpg,.jpeg" />
                                    {file ? (
                                        <div className="text-indigo-700 font-bold flex flex-col items-center animate-fade-in">
                                            <i className="fas fa-file-alt text-4xl mb-2"></i>
                                            {file.name}
                                            <span className="text-xs font-normal text-gray-500 mt-1">Nhấn để chọn file khác</span>
                                        </div>
                                    ) : (
                                        <div className="text-gray-500 group-hover:text-indigo-600 transition">
                                            <i className="fas fa-cloud-upload-alt text-4xl mb-2"></i>
                                            <p className="font-bold">Chọn file (PDF, Word, Ảnh chụp)</p>
                                            <p className="text-xs mt-1">Hệ thống sẽ tự động tách câu hỏi và đáp án</p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* 3. ACTION */}
                            <div className="flex items-center gap-4">
                                <div className="flex items-center bg-gray-100 rounded-lg px-4 py-3 border">
                                    <span className="text-sm font-bold text-gray-600 mr-3">Số mã đề cần tạo:</span>
                                    <input type="number" min="1" max="20" value={numVariants} onChange={e => setNumVariants(e.target.value)} className="w-16 bg-transparent text-center font-bold text-indigo-700 outline-none text-lg" />
                                </div>
                                <button onClick={handleProcess} disabled={loading} className="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition shadow-lg disabled:opacity-50 flex justify-center items-center gap-2">
                                    {loading ? <><div className="loader w-5 h-5 border-2 border-white/30 border-t-white"></div> Đang xử lý...</> : <><i className="fas fa-cogs"></i> Bắt đầu Trộn Đề</>}
                                </button>
                            </div>

                            {/* STATUS LOG */}
                            {status && (
                                <div className={`mt-6 p-4 rounded-lg text-center font-medium animate-fade-in ${status.includes('❌') ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-800 border border-green-200'}`}>
                                    {status}
                                </div>
                            )}

                            {/* PREVIEW & DOWNLOAD */}
                            {questions.length > 0 && (
                                <div className="mt-8 pt-8 border-t fade-in">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-gray-700"><i className="fas fa-eye text-indigo-500"></i> Xem trước ({questions.length} mục)</h3>
                                        <button onClick={downloadZip} className="bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700 shadow flex items-center gap-2">
                                            <i className="fas fa-download"></i> Tải Xuống Ngay
                                        </button>
                                    </div>
                                    <div className="bg-gray-50 rounded-xl p-4 max-h-[400px] overflow-y-auto border border-gray-200">
                                        {questions.map((q, i) => (
                                            <div key={i} className="mb-4 bg-white p-4 rounded shadow-sm border border-gray-100">
                                                {q.type === 'cluster' ? (
                                                    <div className="border-l-4 border-purple-500 pl-3">
                                                        <div className="font-bold text-purple-700 mb-2">📦 Cụm câu hỏi (Giữ nguyên khi trộn):</div>
                                                        <div className="text-sm italic mb-2 bg-gray-50 p-2 rounded">{q.stem}</div>
                                                        {q.questions.map((sub, j) => (
                                                            <div key={j} className="ml-4 mt-2 border-t pt-2">
                                                                <div className="font-bold text-gray-800">Câu con {j+1}: <MathText text={sub.question}/></div>
                                                                <div className="grid grid-cols-2 gap-2 mt-1 text-sm text-gray-600">
                                                                    {sub.options.map((o, k) => (
                                                                        <div key={k} className={k === sub.correct_index ? "text-green-600 font-bold" : ""}>
                                                                            {String.fromCharCode(65+k)}. <MathText text={o}/>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <div>
                                                        <div className="font-bold text-gray-800 text-sm mb-2"><span className="text-indigo-600">Câu {i+1}:</span> <MathText text={q.question}/></div>
                                                        <div className="grid grid-cols-2 gap-2 text-sm text-gray-600">
                                                            {q.options.map((o, k) => (
                                                                <div key={k} className={k === q.correct_index ? "text-green-600 font-bold bg-green-50 p-1 rounded" : "p-1"}>
                                                                    {String.fromCharCode(65+k)}. <MathText text={o}/>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
