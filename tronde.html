<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Trộn Đề Thi Pro (Fixed)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF.js cho chế độ AI -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <style>
        .gradient-text { background: linear-gradient(to right, #2563eb, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [mode, setMode] = useState('xml'); // xml, ai
            const [file, setFile] = useState(null);
            const [status, setStatus] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [apiKeys, setApiKeys] = useState([]);
            const [numVariants, setNumVariants] = useState(4);
            
            // --- CẤU HÌNH SERVER ---
            const DEFAULT_SERVER = "https://hoangthiencm-giangbai.hf.space";
            const [serverUrl, setServerUrl] = useState(DEFAULT_SERVER);

            // AI Mode State
            const [aiQuestions, setAiQuestions] = useState([]);
            const [manualAnswers, setManualAnswers] = useState("");

            useEffect(() => {
                const keys = localStorage.getItem('global_gemini_keys');
                if (keys) setApiKeys(JSON.parse(keys));
                
                const savedUrl = localStorage.getItem('tronde_server_url');
                if (savedUrl) setServerUrl(savedUrl);
            }, []);

            const saveServerUrl = (url) => {
                setServerUrl(url);
                localStorage.setItem('tronde_server_url', url);
            };

            // === 1. LOGIC TRỘN XML (SERVER) ===
            const handleXMLShuffle = async () => {
                if (!file) return alert("Vui lòng chọn file Word (.docx)!");
                if (!file.name.endsWith('.docx')) return alert("Chế độ này chỉ hỗ trợ file .docx");
                
                setIsLoading(true);
                setStatus("Đang kết nối Server để xử lý...");

                try {
                    const formData = new FormData();
                    formData.append("file", file);
                    formData.append("num_variants", numVariants);

                    // Xử lý endpoint
                    const baseUrl = serverUrl.replace(/\/$/, ""); 
                    const endpoint = `${baseUrl}/shuffle-word-xml`;
                    
                    console.log("Calling endpoint:", endpoint);

                    const response = await fetch(endpoint, {
                        method: "POST",
                        body: formData
                    }).catch(err => {
                        throw new Error("Không thể kết nối đến Server! Vui lòng kiểm tra đường dẫn hoặc CORS.");
                    });

                    if (!response.ok) {
                        const contentType = response.headers.get("content-type");
                        if (contentType && contentType.indexOf("application/json") !== -1) {
                            const errData = await response.json();
                            throw new Error(errData.error || `Lỗi Server (${response.status})`);
                        } else {
                            throw new Error(`Server trả về lỗi ${response.status}. Có thể Endpoint chưa được deploy hoặc sai đường dẫn.`);
                        }
                    }

                    // Tải file Zip về
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Bo_De_Tron_${new Date().getTime()}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    setStatus("✅ Đã xong! File giữ nguyên định dạng MathType/Ảnh.");
                } catch (e) {
                    setStatus("❌ Lỗi: " + e.message);
                } finally {
                    setIsLoading(false);
                }
            };

            // === 2. LOGIC TRỘN AI (CLIENT SIDE DIRECT CALL) ===
            const handleDirectAICall = async () => {
                if (!file) return alert("Chọn file PDF/Ảnh đề thi!");
                if (apiKeys.length === 0) return alert("Vui lòng nhập API Key trong phần cấu hình!");

                setIsLoading(true);
                setStatus("Đang đọc file bằng AI (Client Side)...");
                setAiQuestions([]);

                try {
                    const buffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(buffer).promise;
                    
                    let extractedQs = [];

                    for (let i = 1; i <= pdf.numPages; i++) {
                        setStatus(`Đang quét trang ${i}/${pdf.numPages} với Gemini...`);
                        const page = await pdf.getPage(i);
                        const viewport = page.getViewport({ scale: 1.5 });
                        const canvas = document.createElement('canvas');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        const ctx = canvas.getContext('2d');
                        await page.render({ canvasContext: ctx, viewport }).promise;
                        
                        const base64Img = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                        
                        const key = apiKeys[i % apiKeys.length]; 
                        const prompt = `Bạn là trợ lý chấm thi. Hãy nhìn vào ảnh đề thi này.
                        Nhiệm vụ: Trích xuất câu hỏi và đáp án đúng.
                        QUAN TRỌNG: Tìm các đáp án được KHOANH TRÒN, GẠCH CHÂN, hoặc TÔ ĐỎ. Đó là đáp án đúng.
                        
                        Trả về JSON thuần (không Markdown) dạng mảng:
                        [
                          { "q": "Nội dung câu hỏi...", "opts": ["A...", "B...", "C...", "D..."], "correct": "A" }
                        ]
                        Nếu không tìm thấy dấu hiệu đáp án đúng, để correct là null.`;

                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: prompt },
                                        { inline_data: { mime_type: "image/jpeg", data: base64Img } }
                                    ]
                                }]
                            })
                        });

                        const data = await res.json();
                        if(data.error) throw new Error(data.error.message);
                        
                        if(data.candidates && data.candidates[0].content) {
                            const raw = data.candidates[0].content.parts[0].text;
                            const jsonStr = raw.replace(/```json|```/g, '').trim();
                            try {
                                const parsed = JSON.parse(jsonStr);
                                if(Array.isArray(parsed)) extractedQs = [...extractedQs, ...parsed];
                            } catch (e) { console.error("Parse JSON lỗi", e); }
                        }
                    }

                    setAiQuestions(extractedQs);
                    setStatus(`✅ Đã đọc được ${extractedQs.length} câu hỏi!`);

                } catch (e) {
                    setStatus("❌ Lỗi AI: " + e.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const applyManualAnswers = () => {
                const map = {};
                manualAnswers.toUpperCase().split(/\s+/).forEach(token => {
                    const match = token.match(/(\d+)([A-D])/);
                    if(match) map[match[1]] = match[2];
                });
                const updated = aiQuestions.map((q, idx) => ({
                    ...q,
                    correct: map[idx + 1] || q.correct 
                }));
                setAiQuestions(updated);
                alert("Đã cập nhật đáp án!");
            };

            return (
                <div className="max-w-4xl mx-auto p-6 bg-white shadow-xl rounded-xl mt-10 min-h-[600px]">
                    <h1 className="text-3xl font-bold text-center mb-6 gradient-text uppercase">
                        <i className="fa-solid fa-shuffle mr-2"></i> Trộn Đề Thi Pro
                    </h1>

                    {/* TABS */}
                    <div className="flex border-b mb-6">
                        <button onClick={()=>setMode('xml')} className={`flex-1 py-3 ${mode==='xml'?'tab-active bg-blue-50':''}`}>
                            <i className="fa-solid fa-file-word mr-2"></i> Trộn Giữ Định Dạng (Word XML)
                        </button>
                        <button onClick={()=>setMode('ai')} className={`flex-1 py-3 ${mode==='ai'?'tab-active bg-purple-50':''}`}>
                            <i className="fa-solid fa-robot mr-2"></i> Trộn Bằng AI (Client-Side)
                        </button>
                    </div>

                    {/* CONFIG AREA */}
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
                        {mode === 'xml' && (
                            <div className="mb-4">
                                <label className="block text-sm font-bold text-blue-600 mb-1">Server URL (Hugging Face Space):</label>
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        value={serverUrl} 
                                        onChange={e => saveServerUrl(e.target.value)}
                                        className="flex-1 p-2 border border-blue-200 rounded text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                                    />
                                </div>
                            </div>
                        )}

                        <div className="flex gap-4 items-center">
                            <div className="flex-1">
                                <label className="block text-sm font-bold text-gray-700 mb-1">Chọn file đề gốc:</label>
                                <input type="file" onChange={e => setFile(e.target.files[0])} 
                                    accept={mode === 'xml' ? ".docx" : ".pdf,.png,.jpg"}
                                    className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
                            </div>
                            <div className="w-32">
                                <label className="block text-sm font-bold text-gray-700 mb-1">Số mã đề:</label>
                                <input type="number" value={numVariants} onChange={e=>setNumVariants(e.target.value)} className="w-full p-2 border rounded" min="1" max="10"/>
                            </div>
                        </div>
                    </div>

                    {/* MAIN ACTION AREA */}
                    <div className="text-center">
                        {isLoading && <div className="mb-4 text-blue-600 font-bold"><span className="loader mr-2"></span> {status}</div>}
                        {!isLoading && status && <div className={`mb-4 font-bold ${status.includes("❌") ? "text-red-600" : "text-green-600"}`}>{status}</div>}
                        
                        {mode === 'xml' && (
                            <div className="space-y-4">
                                <div className="bg-yellow-50 p-3 text-sm text-yellow-800 rounded text-left mb-4 border border-yellow-200">
                                    <div className="font-bold mb-1"><i className="fa-solid fa-triangle-exclamation"></i> Chế độ Word XML:</div>
                                    <ul className="list-disc pl-5 mt-1 space-y-1">
                                        <li>Yêu cầu: Server Backend đang chạy ổn định.</li>
                                        <li>File Word (.docx) có đáp án <b>Tô Đỏ</b> hoặc <u>Gạch Chân</u>.</li>
                                        <li>Giữ nguyên 100% MathType, Hình ảnh.</li>
                                    </ul>
                                </div>
                                <button onClick={handleXMLShuffle} className="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg transition transform hover:scale-105">
                                    <i className="fa-solid fa-gears mr-2"></i> Phân Tích & Trộn (Server XML)
                                </button>
                            </div>
                        )}

                        {mode === 'ai' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-start gap-4">
                                    <div className="flex-1 text-left">
                                        <label className="font-bold text-sm block mb-1">Nhập đáp án thủ công (nếu AI sót):</label>
                                        <textarea 
                                            value={manualAnswers}
                                            onChange={e => setManualAnswers(e.target.value)}
                                            placeholder="Ví dụ: 1A 2B 3C..." 
                                            className="w-full p-2 border rounded h-24 text-sm font-mono"
                                        ></textarea>
                                        <button onClick={applyManualAnswers} className="mt-2 text-xs bg-gray-200 px-2 py-1 rounded hover:bg-gray-300">Cập nhật đáp án</button>
                                    </div>
                                    <div className="flex-1">
                                         <button onClick={handleDirectAICall} className="w-full bg-purple-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-purple-700 shadow-lg mb-2">
                                            <i className="fa-solid fa-wand-magic-sparkles mr-2"></i> Quét Đề Bằng AI
                                        </button>
                                        <p className="text-xs text-gray-500 text-left">* Chạy trực tiếp trên trình duyệt. Không cần Server Python.</p>
                                    </div>
                                </div>

                                {aiQuestions.length > 0 && (
                                    <div className="mt-6 text-left border rounded-lg p-4 max-h-[400px] overflow-y-auto bg-gray-50">
                                        <h3 className="font-bold mb-2">Kết quả nhận diện ({aiQuestions.length} câu):</h3>
                                        {aiQuestions.map((q, i) => (
                                            <div key={i} className="mb-3 p-3 bg-white border rounded shadow-sm">
                                                <div className="font-bold text-blue-800">Câu {i+1}: {q.q}</div>
                                                <div className="grid grid-cols-2 gap-2 mt-1 text-sm">
                                                    {q.opts.map((opt, oi) => (
                                                        <div key={oi} className={`${(q.correct && (opt.startsWith(q.correct) || String.fromCharCode(65+oi) === q.correct)) ? 'text-green-600 font-bold bg-green-50 p-1 rounded' : 'p-1'}`}>
                                                            {opt}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
