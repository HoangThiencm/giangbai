<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Thi Trực Tuyến</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE = "https://hoangthiencm-giangbai.hf.space";

        const TeacherDashboard = ({ onCreate, onViewDetail }) => {
            const [exams, setExams] = useState([]);
            const userEmail = localStorage.getItem('userEmail');

            const loadExams = () => {
                axios.get(`${API_BASE}/api/exam/my-exams?email=${userEmail}`)
                    .then(res => setExams(res.data))
                    .catch(err => console.error(err));
            };

            useEffect(loadExams, []);

            const deleteExam = async (id) => {
                if(!confirm("CẢNH BÁO: Xóa đề thi và toàn bộ bài làm?")) return;
                try {
                    await axios.delete(`${API_BASE}/api/exam/delete/${id}`);
                    alert("Đã xóa!");
                    loadExams();
                } catch(e) { alert("Lỗi: " + e.message); }
            };

            const editExam = async (exam) => {
                const newTitle = prompt("Nhập tên mới:", exam.title);
                if(!newTitle) return;
                try {
                    await axios.put(`${API_BASE}/api/exam/update/${exam.id}`, {
                        title: newTitle,
                        end_time: exam.end_time 
                    });
                    alert("Cập nhật thành công!");
                    loadExams();
                } catch(e) { alert("Lỗi: " + e.message); }
            };

            const showQR = (id) => {
                const link = `${window.location.href.split('?')[0]}?mode=student&examId=${id}`;
                // Ở đây demo hiển thị link, có thể tích hợp modal QR
                prompt("Copy link hoặc tạo QR từ link này:", link);
            };

            return (
                <div className="max-w-6xl mx-auto p-6">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={()=>window.location.href='index.html'} className="text-gray-500 font-bold"><i className="fas fa-home"></i> Trang Chủ</button>
                        <h1 className="text-2xl font-bold text-indigo-800">Quản Lý Kỳ Thi</h1>
                        <button onClick={onCreate} className="bg-indigo-600 text-white px-4 py-2 rounded font-bold hover:bg-indigo-700"><i className="fas fa-plus"></i> Tạo Đề Mới</button>
                    </div>
                    <div className="bg-white rounded-xl shadow overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-gray-50 border-b">
                                <tr>
                                    <th className="p-4">Tên Kỳ Thi</th>
                                    <th className="p-4">Thời gian</th>
                                    <th className="p-4 text-right">Hành Động</th>
                                </tr>
                            </thead>
                            <tbody>
                                {exams.map(ex => (
                                    <tr key={ex.id} className="border-b hover:bg-gray-50">
                                        <td className="p-4 font-bold">{ex.title}</td>
                                        <td className="p-4 text-sm text-gray-500">{new Date(ex.start_time).toLocaleString()}</td>
                                        <td className="p-4 text-right flex justify-end gap-2">
                                            <button onClick={()=>onViewDetail(ex.id)} className="text-green-600 bg-green-100 p-2 rounded" title="Xem Kết Quả"><i className="fas fa-chart-bar"></i></button>
                                            <button onClick={()=>showQR(ex.id)} className="text-blue-600 bg-blue-100 p-2 rounded" title="Link/QR"><i className="fas fa-qrcode"></i></button>
                                            <button onClick={()=>editExam(ex)} className="text-yellow-600 bg-yellow-100 p-2 rounded" title="Sửa"><i className="fas fa-edit"></i></button>
                                            <button onClick={()=>deleteExam(ex.id)} className="text-red-600 bg-red-100 p-2 rounded" title="Xóa"><i className="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const CreateExam = ({ onBack }) => {
            const [form, setForm] = useState({ title: "", school: "", subject: "", grade: "", duration: 45, startTime: "", endTime: "" });
            const [apiKeys, setApiKeys] = useState([]);
            const [loading, setLoading] = useState(false);
            const userEmail = localStorage.getItem('userEmail');
            const fileRef = useRef();

            const handleKeyFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const text = await file.text();
                setApiKeys(text.split('\n').map(k => k.trim()).filter(k => k.length > 0));
            };

            const handleUpload = async () => {
                if (apiKeys.length === 0) return alert("Thiếu API Key!");
                const file = fileRef.current.files[0];
                if (!file) return alert("Thiếu file đề!");
                setLoading(true);
                const fd = new FormData();
                fd.append("file", file);
                Object.keys(form).forEach(k => fd.append(k.replace(/[A-Z]/g, letter => `_${letter.toLowerCase()}`), form[k])); 
                fd.append("api_keys_json", JSON.stringify(apiKeys));
                fd.append("teacher_email", userEmail);
                try {
                    await axios.post(`${API_BASE}/api/exam/upload`, fd);
                    alert("Tạo thành công!");
                    onBack();
                } catch (e) { alert("Lỗi: " + e.message); } 
                finally { setLoading(false); }
            };

            return (
                <div className="max-w-3xl mx-auto p-8 bg-white rounded-xl shadow">
                    <h2 className="text-2xl font-bold mb-6">Tạo Đề Mới</h2>
                    <input className="border p-3 rounded w-full mb-4" placeholder="Tên Kỳ Thi" onChange={e=>setForm({...form, title: e.target.value})} />
                    <div className="grid grid-cols-2 gap-4 mb-4">
                        <input className="border p-3 rounded" placeholder="Trường" onChange={e=>setForm({...form, school: e.target.value})} />
                        <input className="border p-3 rounded" placeholder="Môn học" onChange={e=>setForm({...form, subject: e.target.value})} />
                        <input className="border p-3 rounded" placeholder="Khối" onChange={e=>setForm({...form, grade: e.target.value})} />
                        <input type="number" className="border p-3 rounded" placeholder="Thời lượng (phút)" value={form.duration} onChange={e=>setForm({...form, duration: e.target.value})} />
                    </div>
                    <div className="grid grid-cols-2 gap-4 mb-4">
                        <div><label>Bắt đầu</label><input type="datetime-local" className="border p-3 rounded w-full" onChange={e=>setForm({...form, startTime: e.target.value})} /></div>
                        <div><label>Kết thúc</label><input type="datetime-local" className="border p-3 rounded w-full" onChange={e=>setForm({...form, endTime: e.target.value})} /></div>
                    </div>
                    <div className="mb-4">
                        <label className="block mb-1 font-bold">File API Key (.txt):</label>
                        <input type="file" accept=".txt" onChange={handleKeyFile} className="border p-2 rounded w-full" />
                    </div>
                    <div className="mb-6 border-2 border-dashed p-6 text-center rounded bg-gray-50">
                        <input ref={fileRef} type="file" accept=".docx,.pdf" />
                    </div>
                    <div className="flex gap-4">
                        <button onClick={onBack} className="px-4 py-2 border rounded hover:bg-gray-100">Hủy</button>
                        <button onClick={handleUpload} disabled={loading} className="bg-indigo-600 text-white px-6 py-2 rounded font-bold hover:bg-indigo-700 flex-1">
                            {loading ? "Đang xử lý..." : "Hoàn Tất"}
                        </button>
                    </div>
                </div>
            );
        };

        const ResultDetail = ({ examId, onBack }) => {
            const [results, setResults] = useState([]);
            useEffect(() => {
                axios.get(`${API_BASE}/api/exam/results/${examId}`).then(res => setResults(res.data));
            }, [examId]);

            const exportExcel = () => {
                const ws = XLSX.utils.json_to_sheet(results);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "KetQua");
                XLSX.writeFile(wb, `KetQua_${examId}.xlsx`);
            };

            return (
                <div className="max-w-6xl mx-auto p-6">
                    <button onClick={onBack} className="mb-4 text-gray-500 font-bold">Back</button>
                    <div className="flex justify-between mb-4">
                        <h2 className="text-2xl font-bold">Kết Quả Chi Tiết</h2>
                        <button onClick={exportExcel} className="bg-green-600 text-white px-4 py-2 rounded">Xuất Excel</button>
                    </div>
                    <table className="w-full border bg-white shadow">
                        <thead>
                            <tr className="bg-gray-100 border-b text-left">
                                <th className="p-3">Họ Tên</th>
                                <th className="p-3">SBD</th>
                                <th className="p-3">Điểm</th>
                                <th className="p-3">Nhận Xét</th>
                            </tr>
                        </thead>
                        <tbody>
                            {results.map((r, i) => (
                                <tr key={i} className="border-b hover:bg-gray-50">
                                    <td className="p-3">{r.student_name}</td>
                                    <td className="p-3">{r.sbd}</td>
                                    <td className="p-3 font-bold">{r.score}</td>
                                    <td className="p-3 text-sm italic">{r.ai_feedback}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        const StudentView = ({ examId }) => {
            const [info, setInfo] = useState({ name: "", class: "", sbd: "" });
            const [step, setStep] = useState("info");
            const [exam, setExam] = useState(null);
            const [answers, setAnswers] = useState({});
            const [result, setResult] = useState(null);

            useEffect(() => {
                axios.get(`${API_BASE}/api/exam/get/${examId}`).then(res => setExam(res.data));
            }, [examId]);

            const submit = async () => {
                if(!confirm("Nộp bài?")) return;
                const payload = { exam_id: examId, student_name: info.name, sbd: info.sbd, student_class: info.class, answers: {} };
                exam.questions.forEach((q, i) => { if(answers[i] !== undefined) payload.answers[q.originalIndex || i] = answers[i]; });
                const res = await axios.post(`${API_BASE}/api/exam/submit`, payload);
                setResult(res.data); setStep("result");
            };

            if(step === "info") return (
                <div className="max-w-md mx-auto mt-10 p-6 bg-white shadow rounded">
                    <h2 className="text-xl font-bold mb-4 text-center">Vào Phòng Thi</h2>
                    <input className="w-full p-2 border mb-2" placeholder="Họ tên" onChange={e=>setInfo({...info, name: e.target.value})} />
                    <input className="w-full p-2 border mb-2" placeholder="SBD" onChange={e=>setInfo({...info, sbd: e.target.value})} />
                    <input className="w-full p-2 border mb-4" placeholder="Lớp" onChange={e=>setInfo({...info, class: e.target.value})} />
                    <button onClick={()=>setStep("exam")} className="w-full bg-blue-600 text-white p-2 rounded">Bắt Đầu</button>
                </div>
            );

            if(step === "result") return (
                <div className="max-w-md mx-auto mt-10 p-6 bg-white shadow rounded text-center">
                    <h2 className="text-2xl font-bold text-green-600 mb-2">Hoàn Thành!</h2>
                    <p className="text-4xl font-bold mb-4">{result.score} điểm</p>
                    <p className="italic bg-yellow-50 p-2 rounded">{result.feedback}</p>
                </div>
            );

            return (
                <div className="max-w-2xl mx-auto p-6 pb-20">
                    <div className="sticky top-0 bg-white p-4 shadow mb-4 flex justify-between items-center">
                        <b>{info.name}</b>
                        <button onClick={submit} className="bg-green-600 text-white px-4 py-2 rounded font-bold">Nộp Bài</button>
                    </div>
                    {exam && exam.questions.map((q, i) => (
                        <div key={i} className="bg-white p-4 rounded shadow mb-4">
                            <p className="font-bold mb-2">Câu {i+1}: {q.question}</p>
                            <div className="grid grid-cols-2 gap-2">
                                {q.options.map((opt, idx) => (
                                    <div key={idx} onClick={()=>setAnswers({...answers, [i]: idx})} className={`p-2 border rounded cursor-pointer ${answers[i]===idx ? 'bg-blue-100 border-blue-500' : ''}`}>
                                        {String.fromCharCode(65+idx)}. {opt}
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState("dashboard");
            const [selectedId, setSelectedId] = useState(null);
            const [isStudent, setIsStudent] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get("mode") === "student") { setSelectedId(params.get("examId")); setIsStudent(true); }
                else if (!localStorage.getItem('userEmail')) window.location.href = 'login.html';
            }, []);

            if (isStudent) return <StudentView examId={selectedId} />;

            return (
                <div>
                    {view === "dashboard" && <TeacherDashboard onCreate={()=>setView("create")} onViewDetail={(id)=>{setSelectedId(id); setView("detail");}} />}
                    {view === "create" && <CreateExam onBack={()=>setView("dashboard")} />}
                    {view === "detail" && <ResultDetail examId={selectedId} onBack={()=>setView("dashboard")} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
