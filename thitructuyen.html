    <script>
        function shouldIgnoreGlobalError(msg, url, error) {
            const text = String(msg || "").trim();
            if (/zaloJSV2|zaloJS|ZaloJSBridge/i.test(text)) return true;
            if (!url && /is not defined/i.test(text)) return true;
            if (/^script error\.?$/i.test(text)) return true;
            return false;
        }

        function logIgnoredGlobalError(kind, msg, url, line, col, error) {
            try {
                console.warn(`[thitructuyen] ${kind} (ẩn trên giao diện):`, msg, url || "", line, col, error);
            } catch { }
        }

        window.onerror = function (msg, url, line, col, error) {
            if (shouldIgnoreGlobalError(msg, url, error)) {
                logIgnoredGlobalError("onerror", msg, url, line, col, error);
                return true;
            }
            const el = document.getElementById('react-error');
            if (!el) return false;
            el.style.display = 'block';
            el.innerHTML = `<strong>Lỗi Hệ Thống:</strong> ${msg}<br><small>${url || "nội bộ"}:${line || "?"}</small><br><pre>${error?.stack || ""}</pre>`;
            return false;
        };

        window.addEventListener("error", function (event) {
            if (!event || event.target === window) return;
            const tag = (event.target.tagName || "").toLowerCase();
            if (tag !== "script" && tag !== "link") return;
            logIgnoredGlobalError("resource", `${tag} load failed`, event.target.src || event.target.href || "", "", "", null);
        }, true);

        window.addEventListener("unhandledrejection", function (event) {
            const reason = event?.reason;
            const message = reason?.message || String(reason || "");
            if (shouldIgnoreGlobalError(message, "", reason)) {
                logIgnoredGlobalError("promise", message, "", "", "", reason);
                event.preventDefault();
            }
        });

        // Chặn phím tắt
        document.addEventListener('keydown', function (e) {
            // Cho phép các phím chức năng nếu đang ở trong input .allow-select (để giáo viên paste/copy)
            if (e.target.classList.contains('allow-select') || e.target.classList.contains('qr-link') || e.target.tagName === 'TEXTAREA') {
                return;
            }

            if (e.key === 'F12' || e.key === 'PrintScreen' ||
                (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 'p' || e.key === 'P' || e.key === 's' || e.key === 'S')) ||
                (e.ctrlKey && e.shiftKey && (e.key === 'i' || e.key === 'I'))) {
                e.preventDefault();
                e.stopPropagation();
                // alert("CẢNH BÁO: Thao tác này bị cấm trong giờ thi!");
            }
        });

        // Xử lý sự kiện Copy (Cho phép nếu là .qr-link hoặc .allow-select)
        document.addEventListener('copy', function (e) {
            if (document.activeElement.classList.contains("qr-link") || document.activeElement.classList.contains("allow-select")) {
                return true; // CHO PHÉP COPY
            }
            e.preventDefault();
        });

        // Xử lý sự kiện Paste toàn cục cho Modal Nạp Đáp Án
        document.addEventListener("paste", function (e) {
            const modal = document.querySelector(".answer-import-modal-active");
            if (!modal) return; // Chỉ xử lý khi modal đang mở

            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf("image") !== -1) {
                    e.preventDefault();
                    const file = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        // Gọi hàm xử lý được expose từ React Component
                        if (window.handleGlobalAnswerImagePaste) {
                            window.handleGlobalAnswerImagePaste(ev.target.result);
                        }
                    };
                    reader.readAsDataURL(file);
                    break;
                }
            }
        });
    </script>

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;
        const examUrl = (route) => GiangBaiApi.examUrl(route);

        const aiPost = async (route, body, config = {}) => {
            const { res } = await GiangBaiApi.axiosPostWithFallback(
                axios,
                GiangBaiApi.examAiUrl(route),
                GiangBaiApi.hfExamUrl(route),
                body,
                config,
                'exam-ai'
            );
            return res;
        };

        const aiPostForm = async (route, formData) => {
            const res = await GiangBaiApi.fetchWithFallback(
                GiangBaiApi.examAiUrl(route),
                GiangBaiApi.hfExamUrl(route),
                { method: 'POST', body: formData },
                'process_paper'
            );
            return res.json();
        };

        const formatApiError = (err, fallback = "Đã xảy ra lỗi.") => {
            const data = err?.response?.data;
            if (!data) return err?.message || fallback;
            const detail = data.detail ?? data.message ?? data.error;
            if (!detail) return fallback;
            if (typeof detail === "string") return detail;
            if (Array.isArray(detail)) {
                return detail.map(item => {
                    if (typeof item === "string") return item;
                    const field = Array.isArray(item.loc) ? item.loc.filter(part => part !== "body").join(".") : "";
                    const msg = item.msg || item.message || JSON.stringify(item);
                    return field ? `${field}: ${msg}` : msg;
                }).join("\n");
            }
            if (typeof detail === "object") {
                return detail.message || detail.msg || JSON.stringify(detail);
            }
            return String(detail);
        };

        const isMobileExamClient = () => {
            const ua = navigator.userAgent || "";
            return /Android|iPhone|iPad|iPod|Mobile|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua)
                || /Zalo|FBAN|FBAV|Line|MicroMessenger|Instagram|Twitter/i.test(ua);
        };

        const isZaloWebView = () => /Zalo/i.test(navigator.userAgent || "");

        // --- HELPER COMPONENTS ---

        const cleanOptionText = (text) => {
            if (!text) return "";
            return text.replace(/^([A-Da-d0-9]+)([\.\)\:\-])\s*/, '').replace(/\n/g, ' ').trim();
        };

        // NEW: Clean question prefix like "Câu 1:", "Bài 2."
        const cleanQuestionPrefix = (text) => {
            if (!text) return "";
            // Regex to remove "Câu/Bài/Question" followed by number and separator at the start
            return text.replace(/^(Câu|Bài|Question)\s*\d+[\.\:\)]\s*/i, '');
        };

        const MathText = ({ text, cleanPrefix = false }) => {
            const ref = useRef();

            const formatTextMode = (str) => {
                if (!str) return '';
                let formatted = str.replace(/\\textbf\{([^\}]+)\}/g, '<span class="tex-bold">$1</span>');
                formatted = formatted.replace(/\\textit\{([^\}]+)\}/g, '<span class="tex-italic">$1</span>');
                formatted = formatted.replace(/\n/g, '<br/>');
                return formatted;
            };

            const processedText = useMemo(() => {
                return cleanPrefix ? cleanQuestionPrefix(text) : text;
            }, [text, cleanPrefix]);

            useEffect(() => {
                if (!processedText || !ref.current) return;
                const el = ref.current;
                el.innerHTML = '';
                const parts = processedText.split(/(\$\$[\s\S]*?\$\$|\$[\s\S]*?\$)/g);
                parts.forEach(part => {
                    if (part.startsWith('$$') && part.endsWith('$$')) {
                        const span = document.createElement('span');
                        const content = part.slice(2, -2);
                        try { katex.render(content, span, { throwOnError: false, displayMode: true }); } catch (e) { span.innerText = content; }
                        el.appendChild(span);
                    } else if (part.startsWith('$') && part.endsWith('$')) {
                        const span = document.createElement('span');
                        const content = part.slice(1, -1);
                        try { katex.render(content, span, { throwOnError: false, displayMode: false }); } catch (e) { span.innerText = content; }
                        el.appendChild(span);
                    } else {
                        if (part.trim().length > 0) {
                            const span = document.createElement('span');
                            span.innerHTML = formatTextMode(part);
                            el.appendChild(span);
                        } else if (part.length > 0) {
                            el.appendChild(document.createTextNode(part));
                        }
                    }
                });
            }, [processedText]);
            return <div ref={ref} className="math-render text-gray-800 leading-relaxed break-words"></div>;
        };

        const QRModal = ({ link, onClose }) => {
            const qrRef = useRef();
            const linkInputRef = useRef(null);
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                if (qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { text: link, width: 200, height: 200 });
                }
            }, [link]);

            const copyLink = async () => {
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(link);
                    } else if (linkInputRef.current) {
                        linkInputRef.current.focus();
                        linkInputRef.current.select();
                        document.execCommand("copy");
                    } else {
                        throw new Error("Không thể truy cập clipboard");
                    }
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch {
                    if (linkInputRef.current) {
                        linkInputRef.current.focus();
                        linkInputRef.current.select();
                    }
                    alert("Không copy tự động được. Vui lòng bấm vào ô link rồi copy thủ công.");
                }
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-box text-center" onClick={e => e.stopPropagation()}>
                        <h3 className="font-bold text-lg mb-2 text-indigo-800">Quét mã để thi</h3>
                        <div ref={qrRef} className="flex justify-center my-4"></div>
                        <div className="mb-3 text-left">
                            <label className="text-xs text-gray-500 font-bold block mb-1">Đường dẫn (gửi Zalo cho học sinh):</label>
                            <div className="flex gap-2">
                                <input
                                    ref={linkInputRef}
                                    value={link}
                                    readOnly
                                    className="qr-link flex-1 border p-2 rounded text-sm bg-gray-50 select-all cursor-text text-blue-600 font-mono"
                                    onClick={(e) => e.target.select()}
                                />
                                <button
                                    type="button"
                                    onClick={copyLink}
                                    className={`shrink-0 px-4 py-2 rounded text-sm font-bold transition ${copied ? "bg-green-600 text-white" : "bg-indigo-600 text-white hover:bg-indigo-700"}`}
                                >
                                    <i className={`fas ${copied ? "fa-check" : "fa-copy"} mr-1`}></i>
                                    {copied ? "Đã copy" : "Copy"}
                                </button>
                            </div>
                        </div>
                        <button onClick={onClose} className="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600 w-full">Đóng</button>
                    </div>
                </div>
            );
        };

        const ImageModal = ({ src, onClose }) => {
            if (!src) return null;
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="close-btn-full" onClick={onClose}>&times;</div>
                    <img src={src} className="modal-image-full" onClick={(e) => e.stopPropagation()} />
                </div>
            );
        };

        // --- NEW: Guide Modal ---
        const GuideModal = ({ onClose }) => {
            return (
                <div className="modal-overlay" onClick={onClose} style={{ zIndex: 2000 }}>
                    <div className="modal-box w-full max-w-4xl h-[90vh] flex flex-col p-0 overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b flex justify-between items-center bg-indigo-600 text-white rounded-t-lg">
                            <h3 className="font-bold text-xl"><i className="fas fa-graduation-cap"></i> Hướng Dẫn Sử Dụng</h3>
                            <button onClick={onClose} className="hover:bg-indigo-700 w-8 h-8 rounded-full flex items-center justify-center transition"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 bg-slate-50">

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <div className="guide-step">
                                        <h4><i className="fas fa-file-upload text-blue-500"></i> 1. Tạo & Nhận Diện Đề</h4>
                                        <p>Tải lên file PDF đề thi. Hệ thống tự động tách trang. Nhấn <b>"Nhận diện AI"</b> để trích xuất câu hỏi tự động.</p>
                                    </div>
                                    <div className="guide-step">
                                        <h4><i className="fas fa-crop-alt text-orange-500"></i> 2. Xử Lý Sót Câu (Quan Trọng)</h4>
                                        <p>Nếu AI bỏ sót câu hỏi (do ảnh mờ, công thức phức tạp):</p>
                                        <ul>
                                            <li>Nhấn nút <b>"Thủ công"</b> ở trang tương ứng.</li>
                                            <li>Kéo chuột khoanh vùng câu hỏi bị thiếu.</li>
                                            <li>Nhấn <b>"Quét & Gộp"</b>. Câu hỏi mới sẽ được thêm vào cuối trang.</li>
                                        </ul>
                                    </div>
                                    <div className="guide-step">
                                        <h4><i className="fas fa-link text-violet-500"></i> 3. Câu Bị Cắt 2 Trang</h4>
                                        <p>Khi câu hỏi nằm giữa ranh giới trang, AI tạo câu <b>[[Tiếp nối]]</b> ở đầu trang sau. Hệ thống <b>tự gộp</b> sau mỗi lần nhận diện. Nếu sót, bấm <b>Gộp xuyên trang</b> trên thanh công cụ.</p>
                                    </div>
                                    <div className="guide-step">
                                        <h4><i className="fas fa-sort text-purple-500"></i> 4. Sắp Xếp Câu Hỏi</h4>
                                        <p>Nếu thứ tự câu bị đảo lộn: Kéo biểu tượng <b>"☰"</b> để sắp xếp lại đúng vị trí mong muốn.</p>
                                    </div>

                            <div className="flex items-center gap-2 bg-gray-50 p-2 rounded">

        };

        const normalizeImportedQuizText = (text) => {
            return String(text || "")
                .replace(/\r/g, "\n")
                .replace(/\u00a0/g, " ")
                .replace(/[“”]/g, '"')
                .replace(/[‘’]/g, "'")
                .replace(/\t/g, " ")
                .replace(/[ ]+\n/g, "\n")
                .replace(/\n{3,}/g, "\n\n")
                .trim();
        };

        const getImportedAnswerKey = (text) => {
            const answerMap = {};
            const answerSectionMatch = text.match(/(?:^|\n)\s*(?:đáp\s*án|dap\s*an|answer\s*key|answers?)\s*[:：][^\n]*(?:\n(?!\s*(?:Câu|Cau|Question|Q)\s*\d+\s*[\.\):：-])[^\n]*)*/i);
            if (!answerSectionMatch) return answerMap;

            const answerSection = answerSectionMatch[0];
            const pairRegex = /(\d{1,3})\s*[\.\)\-:]?\s*([A-D])/gi;
            let match;
            while ((match = pairRegex.exec(answerSection)) !== null) {
                answerMap[parseInt(match[1], 10)] = match[2].toUpperCase();
            }
            return answerMap;
        };

        const stripImportedAnswerKey = (text) => {
            const answerSectionMatch = text.match(/(?:^|\n)\s*(?:đáp\s*án|dap\s*an|answer\s*key|answers?)\s*[:：][^\n]*(?:\n(?!\s*(?:Câu|Cau|Question|Q)\s*\d+\s*[\.\):：-])[^\n]*)*/i);
            if (!answerSectionMatch) return text;

            const pairCount = (answerSectionMatch[0].match(/\d{1,3}\s*[\.\)\-:]?\s*[A-D]/gi) || []).length;
            return pairCount ? text.slice(0, answerSectionMatch.index).trim() : text;
        };

        const parseLatexWordQuiz = (rawText) => {
            const normalized = normalizeImportedQuizText(rawText);
            const answerKey = getImportedAnswerKey(normalized);
            const text = stripImportedAnswerKey(normalized);
            const questionRegex = /(?:^|\n)\s*(?:Câu|Cau|Question|Q)\s*(\d{1,3})\s*[\.\):：-]\s*/gi;
            const questionMatches = [];
            let questionMatch;

            while ((questionMatch = questionRegex.exec(text)) !== null) {
                questionMatches.push({
                    number: parseInt(questionMatch[1], 10),
                    bodyStart: questionRegex.lastIndex,
                    markerStart: questionMatch.index
                });
            }

            if (!questionMatches.length) return [];

            return questionMatches.map((item, index) => {
                const next = questionMatches[index + 1];
                let block = text.slice(item.bodyStart, next ? next.markerStart : text.length).trim();
                const inlineAnswer = block.match(/(?:^|\n)\s*(?:đáp\s*án|dap\s*an|answer)\s*[:：]\s*([A-D])\b/i);
                if (inlineAnswer) {
                    block = block.replace(/(?:^|\n)\s*(?:đáp\s*án|dap\s*an|answer)\s*[:：]\s*[A-D]\b[\s\S]*$/i, "").trim();
                }

                const optionRegex = /(?:^|\n)\s*([A-D])\s*[\.\):：-]\s*/gi;
                const optionMatches = [];
                let optionMatch;
                while ((optionMatch = optionRegex.exec(block)) !== null) {
                    optionMatches.push({
                        letter: optionMatch[1].toUpperCase(),
                        markerStart: optionMatch.index,
                        bodyStart: optionRegex.lastIndex
                    });
                }

                if (optionMatches.length < 2) return null;

                const question = block.slice(0, optionMatches[0].markerStart).trim();
                const optionsByLetter = {};
                optionMatches.forEach((option, optionIndex) => {
                    const optionEnd = optionMatches[optionIndex + 1]?.markerStart ?? block.length;
                    optionsByLetter[option.letter] = block.slice(option.bodyStart, optionEnd).trim();
                });

                const options = ["A", "B", "C", "D"].map(letter => optionsByLetter[letter] || "");
                const answerLetter = (inlineAnswer?.[1] || answerKey[item.number] || "").toUpperCase();
                const correctIndex = "ABCD".indexOf(answerLetter);

                return {
                    id: Date.now() + Math.random(),
                    question: question || `Câu ${item.number}`,
                    options,
                    correct_index: correctIndex >= 0 ? correctIndex : null,
                    question_image: null
                };
            }).filter(Boolean);
        };

        const HybridExamCreator = ({ onBack, initialData }) => {
            const [step, setStep] = useState(initialData ? 2 : 1);
            const [pages, setPages] = useState([]);
            const [pageProgress, setPageProgress] = useState({});
            const [pageQuestions, setPageQuestions] = useState({});

            const defaultExamInfo = {
                title: "",
                school: "",

                start_time: "",
                end_time: "",
                student_mode: "free",
                class_name: "",

            const [examInfo, setExamInfo] = useState(initialData ? {
                ...defaultExamInfo,
                ...initialData.info,
                duration: initialData.info.duration_mins ?? initialData.info.duration ?? 45,
                student_mode: initialData.info.student_mode === "class" ? "class" : "free",
                class_name: initialData.info.class_name || "",
                roster: Array.isArray(initialData.info.roster) ? initialData.info.roster : [],
                max_attempts: Math.max(0, parseInt(initialData.info.max_attempts, 10) || 0)
            } : defaultExamInfo);
            const [availableClasses, setAvailableClasses] = useState([]);
            const [loadingRoster, setLoadingRoster] = useState(false);
            const classOptions = useMemo(() => {
                const merged = new Set(availableClasses);
                if (examInfo.class_name) merged.add(examInfo.class_name);
                return Array.from(merged).sort((a, b) => a.localeCompare(b, "vi"));
            }, [availableClasses, examInfo.class_name]);
            const [showAnswerModal, setShowAnswerModal] = useState(false);
            const [previewImage, setPreviewImage] = useState(null);
            const [cropPage, setCropPage] = useState(null);

            // New state for guide modal
            const [showGuide, setShowGuide] = useState(false);

            const userEmail = localStorage.getItem('userEmail');

            useEffect(() => {
                axios.get(examUrl("student-classes"), { withCredentials: true })
                    .then(res => setAvailableClasses(Array.isArray(res.data?.classes) ? res.data.classes : []))
                    .catch(() => setAvailableClasses([]));
            }, []);

            const loadClassRoster = async (className) => {
                const trimmed = String(className || "").trim();
                if (!trimmed) {
                    setExamInfo(prev => ({ ...prev, class_name: "", roster: [] }));
                    return;
                }
                setLoadingRoster(true);
                try {
                    const res = await axios.get(`${examUrl("class-students")}&class_name=${encodeURIComponent(trimmed)}`, { withCredentials: true });
                    const roster = Array.isArray(res.data?.roster) ? res.data.roster : [];
                    setExamInfo(prev => ({ ...prev, class_name: trimmed, roster }));
                } catch (e) {
                    alert("Không tải được danh sách lớp: " + formatApiError(e, e.message));
                    setExamInfo(prev => ({ ...prev, class_name: trimmed, roster: [] }));
                } finally {
                    setLoadingRoster(false);
                }
            };

            const handleStudentModeChange = (mode) => {
                if (mode === "class") {
                    setExamInfo(prev => ({ ...prev, student_mode: "class" }));
                    return;
                }
                setExamInfo(prev => ({ ...prev, student_mode: "free", class_name: "", roster: [], max_attempts: 0 }));
            };

            // Sync page question counts cleanly
            useEffect(() => {
                setPages(prevPages => prevPages.map(p => {
                    const qs = pageQuestions[p.id];
                    if (qs && qs.length !== p.q_count) {
                        return { ...p, q_count: qs.length };
                    }
                    return p;
                }));
            }, [pageQuestions]);

            // --- SORTABLEJS INTEGRATION ---
            useEffect(() => {
                if (!activePageId) return;
                const el = document.getElementById("question-sortable");
                if (el) {
                    const sortable = new Sortable(el, {
                        animation: 150,
                        handle: ".drag-handle",
                        ghostClass: "bg-blue-50",
                        onEnd: (evt) => {
                            if (evt.oldIndex === evt.newIndex) return;
                            setPageQuestions(prev => {
                                const newList = [...(prev[activePageId] || [])];
                                const [moved] = newList.splice(evt.oldIndex, 1);
                                newList.splice(evt.newIndex, 0, moved);
                                return { ...prev, [activePageId]: newList };
                            });
                        }
                    });
                    return () => sortable.destroy();
                }
            }, [activePageId, pageQuestions[activePageId]?.length]); // Re-init only when page or length changes

            useEffect(() => {
                if (initialData && initialData.questions) {
                    const fakeId = "imported";
                    setPages([{ id: fakeId, page_index: 1, image_data: null, status: "done", q_count: initialData.questions.length }]);
                    setPageQuestions({ [fakeId]: initialData.questions.map((q, i) => ({ ...q, id: Date.now() + i })) });
                    setActivePageId(fakeId);
                }
            }, [initialData]);

            const sortedPages = useMemo(
                () => [...pages].sort((a, b) => a.page_index - b.page_index),
                [pages]
            );

            const stitchPageQuestions = useCallback((sourcePageQuestions, sourcePages) => {
                if (!window.ExamStitch) return sourcePageQuestions;
                const sorted = [...(sourcePages || pages)].sort((a, b) => a.page_index - b.page_index);
                return ExamStitch.stitchPageQuestionsList(sourcePageQuestions, sorted);
            }, [pages]);

            const allQuestions = useMemo(() => {
                if (window.ExamStitch) {
                    return ExamStitch.flattenStitchedQuestions(pageQuestions, sortedPages);
                }
                const merged = [];
                sortedPages.forEach((p) => { if (pageQuestions[p.id]) merged.push(...pageQuestions[p.id]); });
                return merged;
            }, [pageQuestions, sortedPages]);

            const getApiKeys = () => { try { return JSON.parse(localStorage.getItem('global_gemini_keys') || "[]"); } catch { return []; } };

            const counts = useMemo(() => {
                const total = allQuestions.length;
                const hasAns = allQuestions.filter(q => q.correct_index !== null && q.correct_index !== undefined && parseInt(q.correct_index) >= 0).length;
                return { total, hasAns };
            }, [allQuestions]);

            const hasMistralOcr = () => (
                window.MistralOcr
                && window.AiDesignConfig
                && AiDesignConfig.isMistralEnabled()
                && AiDesignConfig.getMistralKeys().length > 0
            );

            const processPdfUpload = async (file) => {
                if (!window.PdfPageClient) {
                    throw new Error('Không tải được pdf-page-client.js. Kiểm tra mạng rồi tải lại trang.');
                }
                if (!hasMistralOcr()) {
                    throw new Error('Thiếu Mistral OCR. Admin cần nhập key Mistral trong global_config.json (hoặc đăng nhập qua trang chủ để đồng bộ).');
                }
                setLoadingMsg('Đang tách PDF và quét Mistral OCR...');
                const [pages, mistralResult] = await Promise.all([
                    PdfPageClient.splitPdfFile(file),
                    MistralOcr.ocrPdfFile(file),
                ]);
                pages.forEach((p, i) => {
                    p.ocr_text = mistralResult.pages[i]?.ocr_text || '';
                });
                return { status: 'ok', pages, source: 'mistral+browser' };
            };

            const handleUpload = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setLoadingMsg("Đang xử lý PDF...");
                try {
                    const data = await processPdfUpload(file);
                    if (data.status === 'ok') {
                        setPages(data.pages);
                        if (data.pages.length) setActivePageId(data.pages[0].id);
                        setStep(2);
                    } else alert(data.message || 'Không xử lý được file.');
                } catch (err) { alert(err.message); } finally { setLoadingMsg(""); }
            };

            const handleWordLatexImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoadingMsg("Đang đọc file Word...");

                try {
                    if (!window.mammoth) throw new Error("Chưa tải được thư viện đọc Word. Vui lòng kiểm tra mạng rồi thử lại.");
                    const arrayBuffer = await file.arrayBuffer();
                    const result = await mammoth.extractRawText({ arrayBuffer });
                    const importedQuestions = parseLatexWordQuiz(result.value);

                    if (!importedQuestions.length) {
                        throw new Error("Không tìm thấy câu hỏi. File nên có dạng: Câu 1..., A..., B..., C..., D..., Đáp án: A.");
                    }

                    const pageId = `word-${Date.now()}`;
                    setPages([{ id: pageId, page_index: 1, image_data: null, status: "done", q_count: importedQuestions.length }]);
                    setPageQuestions({ [pageId]: importedQuestions });
                    setActivePageId(pageId);
                    setStep(2);
                    alert(`Đã nhập ${importedQuestions.length} câu từ Word. Bạn có thể sửa thủ công trước khi lưu.`);
                } catch (err) {
                    alert("Lỗi nhập Word: " + err.message);
                } finally {
                    setLoadingMsg("");
                    e.target.value = "";
                }
            };

            const compressPageImage = (dataUrl, maxWidth = 1400) => new Promise((resolve, reject) => {
                if (!dataUrl) return reject(new Error('Thiếu ảnh trang PDF.'));
                const img = new Image();
                img.onload = () => {
                    const scale = img.width > maxWidth ? (maxWidth / img.width) : 1;
                    const w = Math.max(1, Math.round(img.width * scale));
                    const h = Math.max(1, Math.round(img.height * scale));
                    const canvas = document.createElement('canvas');
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    if (!ctx) return resolve(dataUrl);
                    ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.82));
                };
                img.onerror = () => reject(new Error('Không đọc được ảnh trang PDF.'));
                img.src = dataUrl;
            });

            const runAIForPage = async (page) => {
                const keys = getApiKeys();
                if (!keys.length) return alert("Thiếu Gemini API Key! Bấm Cấu hình AI ở góc trên để nạp key.");

                setPages(prev => prev.map(p => p.id === page.id ? { ...p, status: 'processing' } : p));
                setActivePageId(page.id);
                setPageProgress(prev => ({ ...prev, [page.id]: 5 }));

                const model = localStorage.getItem('default_gemini_module') || 'gemini-2.5-flash';
                let progressStream = null;

                try {
                    const imageData = await compressPageImage(page.image_data);
                    setPageProgress(prev => ({ ...prev, [page.id]: 20 }));

                    let payload = null;
                    let via = 'Mistral OCR + Gemini';

                    try {
                        if (!window.ExamVision) throw new Error('Chưa tải exam-vision-client.js');
                        if (page.ocr_text && String(page.ocr_text).trim()) {
                            payload = await ExamVision.normalizeSegmentFromText(page.ocr_text, keys, model);
                        } else {
                            payload = await ExamVision.normalizeSegment(imageData, keys, model);
                            via = 'Gemini Vision (không có OCR)';
                        }
                    } catch (browserErr) {
                        progressStream = GiangBaiApi.openProgressStream(page.id, (value) => {
                            setPageProgress(prev => ({ ...prev, [page.id]: value }));
                        });
                        const { res } = await GiangBaiApi.axiosPostWithFallback(
                            axios,
                            GiangBaiApi.examAiUrl('normalize_segment'),
                            null,
                            { image_data: imageData, api_keys: keys, model, page_id: page.id },
                            { timeout: 120000 },
                            'exam-ai'
                        );
                        payload = res.data || {};
                        via = 'Hosting';
                        if (!payload || payload.status !== 'ok') {
                            throw new Error(payload?.message || browserErr.message || 'Gemini và hosting đều lỗi.');
                        }
                    }

                    setPageProgress(prev => ({ ...prev, [page.id]: 95 }));

                    if (!payload || payload.status !== 'ok') {
                        throw new Error(payload?.message || `Nhận diện thất bại (${via}).`);
                    }

                    const newQs = (payload.data || []).map((q) => ({ ...q, id: Date.now() + Math.random() }));
                    setPageQuestions((prev) => {
                        const draft = { ...prev, [page.id]: newQs };
                        const stitched = stitchPageQuestions(draft, pages);
                        const mergedCount = window.ExamStitch
                            ? ExamStitch.countStitchMerges(draft, stitched, pages)
                            : 0;
                        if (mergedCount > 0) {
                            setTimeout(() => {
                                alert(`Đã tự gộp ${mergedCount} câu bị cắt ngang với trang trước ([[Tiếp nối]]).`);
                            }, 0);
                        }
                        return stitched;
                    });
                    setPages(prev => prev.map(p => p.id === page.id ? { ...p, status: 'done', q_count: newQs.length } : p));
                    setPageProgress(prev => ({ ...prev, [page.id]: 100 }));

                    if (!newQs.length) {
                        alert(`AI (${via}) không tìm thấy câu hỏi trên trang này.\n\nThử Quét vùng thủ công.`);
                    }
                } catch (e) {
                    setPages(prev => prev.map(p => p.id === page.id ? { ...p, status: 'error' } : p));
                    alert(formatApiError(e, e.message || 'Nhận diện AI thất bại.'));
                } finally {
                    if (progressStream) progressStream.close();
                    setPageProgress(prev => {
                        const next = { ...prev };
                        delete next[page.id];
                        return next;
                    });
                    setPages(prev => prev.map(p => {
                        if (p.id !== page.id || p.status !== 'processing') return p;
                        return { ...p, status: 'error' };
                    }));
                }
            };

            // --- Logic gộp câu hỏi mới ---
            const isDuplicateFront = (q1, listQ) => {
                const clean = t => t.replace(/\s+/g, '').toLowerCase();
                const t1 = clean(q1.question);
                if (t1.length < 10) return false;
                for (let q2 of listQ) {
                    const t2 = clean(q2.question);
                    if (t1.includes(t2) || t2.includes(t1)) return true;
                }
                return false;
            };

            const handleManualMerge = (newQuestions) => {
                if (!cropPage || !newQuestions.length) return;
                const pageId = cropPage.id;

                setPageQuestions(prev => {
                    const existing = prev[pageId] || [];
                    const added = [];
                    newQuestions.forEach(nq => {
                        if (!isDuplicateFront(nq, existing) && !isDuplicateFront(nq, added)) {
                            added.push(nq);
                        }
                    });

                    if (added.length === 0) alert("Không tìm thấy câu hỏi mới hoặc bị trùng lặp!");
                    else alert(`Đã thêm thành công ${added.length} câu hỏi mới!`);

                    // Chỉ cập nhật danh sách câu hỏi, số lượng sẽ được sync bởi useEffect
                    return { ...prev, [pageId]: [...existing, ...added] };
                });
            };

            const updateQuestion = (qId, field, value, optIdx = null) => { if (!activePageId) return; setPageQuestions(prev => ({ ...prev, [activePageId]: prev[activePageId].map(q => { if (q.id === qId) { const newData = { ...q }; if (field === 'options') newData.options[optIdx] = value; else newData[field] = value; return newData; } return q; }) })); };
            const deleteQuestion = (qId) => { if (confirm("Xóa câu này?")) setPageQuestions(prev => ({ ...prev, [activePageId]: prev[activePageId].filter(q => q.id !== qId) })); };
            const addQuestion = () => { if (!activePageId) return alert("Chọn trang trước!"); const newQ = { id: Date.now(), question: "Câu hỏi mới...", options: ["", "", "", ""], correct_index: 0, question_image: null }; setPageQuestions(prev => ({ ...prev, [activePageId]: [...(prev[activePageId] || []), newQ] })); };
            const handleBulkAnswer = (importedData) => {
                const map = { A: 0, B: 1, C: 2, D: 3 };
                const stitchedFlat = allQuestions;
                const indexById = {};
                stitchedFlat.forEach((q, i) => { indexById[q.id] = i + 1; });
                const newPageQs = { ...pageQuestions };
                pages.forEach((p) => {
                    if (!newPageQs[p.id]) return;
                    newPageQs[p.id] = newPageQs[p.id].map((q) => {
                        const globalIdx = indexById[q.id];
                        if (!globalIdx) return q;
                        const found = importedData.find((d) => d.index === globalIdx);
                        if (found && map[found.answer] !== undefined) {
                            return { ...q, correct_index: map[found.answer] };
                        }
                        return q;
                    });
                });
                setPageQuestions(newPageQs);
                alert(`Đã cập nhật ${importedData.length} câu (theo thứ tự sau khi gộp xuyên trang).`);
            };

            const handleStitchAllPages = () => {
                if (!window.ExamStitch) return alert('Chưa tải exam-stitch-client.js');
                const before = pageQuestions;
                const stitched = stitchPageQuestions({ ...pageQuestions }, pages);
                const mergedCount = ExamStitch.countStitchMerges(before, stitched, pages);
                setPageQuestions(stitched);
                alert(mergedCount > 0
                    ? `Đã gộp ${mergedCount} câu mồ côi / [[Tiếp nối]] giữa các trang.`
                    : 'Không tìm thấy câu cần gộp. Kiểm tra câu [[Tiếp nối]] ở đầu trang sau.');
            };

            const handleSave = async () => {
                if (!examInfo.title) return alert("Vui lòng nhập tên đề thi!");
                if (!allQuestions.length) return alert("Đề thi đang trống! Vui lòng tải lên PDF và nhận diện câu hỏi.");

                const questionsWithAnswer = allQuestions.filter(q => q.correct_index !== null && q.correct_index !== undefined && parseInt(q.correct_index) >= 0).length;
                const totalQuestions = allQuestions.length;

                if (questionsWithAnswer < totalQuestions) {
                    return alert(`CHƯA HOÀN THÀNH:\n\n- Tổng số câu hỏi: ${totalQuestions}\n- Số câu đã có đáp án: ${questionsWithAnswer}\n\nVui lòng chọn đáp án đúng cho ${totalQuestions - questionsWithAnswer} câu còn thiếu trước khi lưu!`);
                }

                if (examInfo.student_mode === "class") {
                    if (!examInfo.class_name) return alert("Vui lòng chọn lớp cho danh sách thí sinh.");
                    if (!examInfo.roster?.length) return alert("Lớp đã chọn chưa có học sinh. Kiểm tra lại danh sách trong admin.");
                }

                const payload = {
                    id: initialData ? initialData.info.id : null,
                    ...examInfo,
                    start_time: examInfo.start_time ? new Date(examInfo.start_time).toISOString() : null,
                    end_time: examInfo.end_time ? new Date(examInfo.end_time).toISOString() : null,
                    questions: allQuestions,
                    teacher_email: userEmail,
                    api_keys: getApiKeys(),
                    student_mode: examInfo.student_mode === "class" ? "class" : "free",
                    class_name: examInfo.student_mode === "class" ? examInfo.class_name : "",
                    roster: examInfo.student_mode === "class" ? (examInfo.roster || []) : [],
                    max_attempts: examInfo.student_mode === "class" ? Math.max(0, parseInt(examInfo.max_attempts, 10) || 0) : 0
                };
                try { await axios.post(examUrl("save"), payload, { withCredentials: true }); alert("Đã lưu thành công!"); onBack(); } catch (e) { alert("Lỗi lưu: " + formatApiError(e, e.message)); }
            };

            if (step === 1) return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl text-center max-w-2xl w-full">
                        <h1 className="text-3xl font-bold text-indigo-700 mb-2">Tạo Đề Mới</h1>
                        <div className="bg-yellow-50 border border-yellow-200 p-4 rounded text-left text-sm mb-5 text-gray-700">
                            <p className="font-bold text-yellow-800 mb-1">HƯỚNG DẪN:</p>
                            <ul className="list-disc pl-5 space-y-1">
                                <li>PDF sẽ được nhận diện bằng AI như trước.</li>
                                <li>Word .docx có sẵn LaTeX $...$ sẽ nhập nhanh, không OCR và không dùng quota.</li>
                            </ul>
                        </div>
                        {loadingMsg ? (
                            <div className="text-indigo-600 font-bold animate-pulse py-10">{loadingMsg}</div>
                        ) : (
                            <div className="grid sm:grid-cols-2 gap-4 text-left">
                                <label className="block border-2 border-dashed border-indigo-300 bg-indigo-50 rounded-xl p-6 cursor-pointer hover:bg-indigo-100 transition">
                                    <input type="file" className="hidden" accept=".pdf" onChange={handleUpload} />
                                    <i className="fas fa-file-pdf text-4xl text-indigo-500 mb-3"></i>
                                    <div className="font-bold text-indigo-700">Chọn file PDF</div>
                                    <div className="text-sm text-indigo-500 mt-1">Mistral OCR tách văn bản → Gemini nhận diện câu hỏi</div>
                                </label>
                                <label className="block border-2 border-dashed border-emerald-300 bg-emerald-50 rounded-xl p-6 cursor-pointer hover:bg-emerald-100 transition">
                                    <input type="file" className="hidden" accept=".docx" onChange={handleWordLatexImport} />
                                    <i className="fas fa-file-word text-4xl text-emerald-500 mb-3"></i>
                                    <div className="font-bold text-emerald-700">Nhập Word LaTeX</div>
                                    <div className="text-sm text-emerald-600 mt-1">Đọc Câu/A/B/C/D/Đáp án, giữ nguyên $...$</div>
                                </label>
                            </div>
                        )}
                        <button onClick={onBack} className="mt-6 text-gray-400 underline">Quay lại</button>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen flex-col bg-white">
                    {/* Modals */}
                    {showAnswerModal && <AnswerImportModal onClose={() => setShowAnswerModal(false)} onImport={handleBulkAnswer} />}
                    {cropPage && <ManualCropModal page={cropPage} onClose={() => setCropPage(null)} onMerge={handleManualMerge} />}
                    {showGuide && <GuideModal onClose={() => setShowGuide(false)} />}
                    <ImageModal src={previewImage} onClose={() => setPreviewImage(null)} />

                    <div className="h-16 border-b flex items-center justify-between px-4 shrink-0 shadow-sm z-20 bg-white">
                        <div className="flex items-center gap-4">
                            <button onClick={onBack} className="text-gray-500 hover:text-black"><i className="fas fa-arrow-left"></i></button>
                            <input className="font-bold text-lg border-b border-dashed outline-none w-48 allow-select" placeholder="Tên đề thi..." value={examInfo.title} onChange={e => setExamInfo({ ...examInfo, title: e.target.value })} />
                            <div className="flex items-center gap-2 text-xs">
                                <input type="number" className="w-12 border rounded px-1 allow-select" value={examInfo.duration} onChange={e => setExamInfo({ ...examInfo, duration: e.target.value })} /> phút
                                <span className="text-gray-400">|</span>
                                <input type="datetime-local" className="border rounded px-1 allow-select" value={examInfo.start_time || ""} onChange={e => setExamInfo({ ...examInfo, start_time: e.target.value })} />
                                ➜
                                <input type="datetime-local" className="border rounded px-1 allow-select" value={examInfo.end_time || ""} onChange={e => setExamInfo({ ...examInfo, end_time: e.target.value })} />
                            </div>

                            <div className="text-xs font-bold bg-gray-100 px-3 py-1 rounded-full border border-gray-200">
                                Đã có đáp án: <span className={counts.hasAns < counts.total ? "text-red-600 animate-pulse" : "text-green-600"}>{counts.hasAns}/{counts.total}</span>
                            </div>
                            <div className="flex items-center gap-2 text-xs border rounded-lg px-2 py-1 bg-slate-50">
                                <span className="font-bold text-gray-600 whitespace-nowrap">Thí sinh:</span>
                                <label className="flex items-center gap-1 cursor-pointer whitespace-nowrap">
                                    <input type="radio" name="student_mode" checked={examInfo.student_mode !== "class"} onChange={() => handleStudentModeChange("free")} />
                                    Tự do
                                </label>
                                <label className="flex items-center gap-1 cursor-pointer whitespace-nowrap">
                                    <input type="radio" name="student_mode" checked={examInfo.student_mode === "class"} onChange={() => handleStudentModeChange("class")} />
                                    Từ lớp
                                </label>
                                {examInfo.student_mode === "class" && (
                                    <select
                                        className="border rounded px-2 py-1 bg-white min-w-[120px] max-w-[160px]"
                                        value={examInfo.class_name || ""}
                                        onChange={e => loadClassRoster(e.target.value)}
                                        disabled={loadingRoster}
                                    >
                                        <option value="">-- Chọn lớp --</option>
                                        {classOptions.map(cls => <option key={cls} value={cls}>{cls}</option>)}
                                    </select>
                                )}
                                {examInfo.student_mode === "class" && examInfo.class_name && (
                                    <span className="text-indigo-700 font-bold whitespace-nowrap">
                                        {loadingRoster ? "Đang tải..." : `${examInfo.roster?.length || 0} HS`}
                                    </span>
                                )}
                                {examInfo.student_mode === "class" && (
                                    <label className="flex items-center gap-1 whitespace-nowrap" title="0 = không giới hạn">
                                        <span className="text-gray-600">Tối đa</span>
                                        <input
                                            type="number"
                                            min="0"
                                            max="99"
                                            className="w-12 border rounded px-1 text-center allow-select"
                                            value={examInfo.max_attempts ?? 0}
                                            onChange={e => setExamInfo(prev => ({ ...prev, max_attempts: Math.max(0, parseInt(e.target.value, 10) || 0) }))}
                                        />
                                        <span className="text-gray-600">lần thi</span>
                                    </label>
                                )}
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={handleStitchAllPages} className="bg-violet-100 text-violet-700 px-3 py-1.5 rounded text-sm font-bold" title="Gộp câu [[Tiếp nối]] / đáp án đầu trang với câu cuối trang trước"><i className="fas fa-link"></i> Gộp xuyên trang</button>
                            <button onClick={() => setShowGuide(true)} className="bg-yellow-100 text-yellow-700 px-3 py-1.5 rounded text-sm font-bold"><i className="fas fa-question-circle"></i> Hướng Dẫn</button>
                            <button onClick={() => setShowAnswerModal(true)} className="bg-blue-100 text-blue-700 px-3 py-1.5 rounded text-sm font-bold"><i className="fas fa-key"></i> Nạp Đáp Án</button>
                            <button onClick={handleSave} className="bg-green-600 text-white px-4 py-1.5 rounded text-sm font-bold shadow hover:bg-green-700"><i className="fas fa-save"></i> Lưu Đề</button>
                        </div>
                    </div>
                    <div className="layout-grid bg-slate-50">
                        <div className="col-panel">
                            <div className="col-header"><span>TRANG PDF ({pages.length})</span></div>
                            <div className="p-2 space-y-2">
                                {pages.map(p => (
                                    <div key={p.id} onClick={() => setActivePageId(p.id)} className={`page-thumb ${activePageId === p.id ? 'active' : ''}`}>
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-xs font-bold text-gray-500">Trang {p.page_index}</span>
                                            {p.status === 'done' ? <i className="fas fa-check-circle text-green-500"></i> : p.status === 'processing' ? <div className="loader w-3 h-3 border-blue-500"></div> : ''}
                                        </div>
                                        {p.image_data ? (<img src={p.image_data} onClick={(e) => { e.stopPropagation(); setPreviewImage(p.image_data); }} className="cursor-zoom-in hover:opacity-90 transition" />) : <div className="h-32 bg-gray-100 flex items-center justify-center text-xs">No Image</div>}
                                        {pageProgress[p.id] !== undefined && p.status === 'processing' && (

                                                <div className="bg-indigo-600 h-2 rounded transition-all duration-300" style={{ width: `${pageProgress[p.id]}%` }}></div>
                                            </div>

                                        <div className="flex gap-1 mt-2 flex-wrap">
                                            {p.status === 'done' ? (
                                                <>
                                                    <div className="w-full py-1 text-xs rounded font-bold bg-gray-100 text-gray-600 text-center mb-1">Đã lấy {pageQuestions[p.id]?.length || 0} câu</div>

                                                    <button onClick={(e) => { e.stopPropagation(); if (confirm("Nhận diện lại?")) runAIForPage(p) }} className="px-2 py-1 text-xs rounded font-bold bg-indigo-100 text-indigo-600 hover:bg-indigo-200" title="Nhận diện lại"><i className="fas fa-sync-alt"></i></button>
                                                </>
                                            ) : (
                                                <button onClick={(e) => { e.stopPropagation(); runAIForPage(p) }} disabled={p.status === 'processing'} className={`w-full py-1 text-xs rounded font-bold ${p.status === 'processing' ? 'bg-gray-200 text-gray-500 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>{p.status === 'processing' ? 'Đang đọc...' : 'Nhận diện AI'}</button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="col-panel bg-white border-r"><div className="col-header"><span>CHI TIẾT (Trang {pages.find(p => p.id === activePageId)?.page_index})</span></div><div className="col-content space-y-4">{!activePageId ? <div className="text-center text-gray-400 mt-10">Chọn trang bên trái</div> : (!pageQuestions[activePageId]?.length && pages.find(p => p.id === activePageId)?.status !== 'done') ? <div className="text-center text-gray-400 mt-10">Chưa có câu hỏi. Bấm Nhận diện AI.</div> : (<>
                            <div id="question-sortable" className="space-y-4">
                                {pageQuestions[activePageId]?.map((q, idx) => (<QuestionEditor key={q.id} q={q} idx={idx} updateQuestion={updateQuestion} deleteQuestion={deleteQuestion} />))}
                            </div>
                            <button onClick={addQuestion} className="w-full py-3 border-2 border-dashed border-indigo-300 text-indigo-600 rounded-lg hover:bg-indigo-50 font-bold flex items-center justify-center gap-2"><i className="fas fa-plus-circle"></i> Thêm câu hỏi thủ công</button>
                        </>)}</div></div>
                        <div className="col-panel bg-gray-50">
                            <div className="col-header"><span>TỔNG HỢP ({allQuestions.length} câu)</span></div>
                            <div className="col-content space-y-3">
                                {allQuestions.length === 0 ? <div className="text-center text-gray-400 mt-10">Đề thi trống</div> : allQuestions.map((q, i) => (
                                    <div key={i} className={`bg-white p-3 rounded border text-sm shadow-sm ${q.stitched ? 'border-violet-300 ring-1 ring-violet-100' : 'border-gray-200'}`}>
                                        <div className="font-bold text-gray-700 mb-1 flex items-center gap-2">
                                            <span>Câu {i + 1}</span>
                                            {q.stitched && <span className="text-[10px] font-bold uppercase tracking-wide text-violet-600 bg-violet-50 px-1.5 py-0.5 rounded">Đã gộp 2 trang</span>}
                                        </div>
                                        <div className="mb-2"><MathText text={q.question} /></div>
                                        {q.question_image && <img src={q.question_image} className="h-20 mb-2 block border rounded" />}
                                        <div className="flex flex-col gap-2">
                                            {q.options.map((o, k) => (
                                                <span key={k} className={`px-2 py-1 rounded text-xs border ${q.correct_index === k ? 'bg-green-100 border-green-300 text-green-800 font-bold' : 'bg-gray-50 border-gray-200 text-gray-500'}`}>
                                                    {String.fromCharCode(65 + k)}. <MathText text={cleanOptionText(o)} />
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const normalizeEmail = (email) => String(email || "").trim().toLowerCase();
        const getExamOwnerEmail = (exam) => normalizeEmail(
            exam?.teacher_email ||
            exam?.teacherEmail ||
            exam?.owner_email ||
            exam?.ownerEmail ||
            exam?.created_by ||
            exam?.info?.teacher_email ||
            exam?.info?.teacherEmail ||
            exam?.metadata?.teacher_email
        );
        const getExamGroupName = (exam) => {
            const school = String(exam?.school || exam?.info?.school || "").trim();
            if (school) return school;
            const title = String(exam?.title || exam?.info?.title || "").trim();
            const prefix = title.split(/[-–|]/)[0]?.trim();
            return prefix || "Chưa phân loại";
        };

        const parseExamMetaFromRow = (exam) => {
            try {
                const raw = exam?.variants_json;
                const variants = typeof raw === "string" ? JSON.parse(raw) : raw;
                const meta = variants?.[0]?.meta || {};
                return {
                    student_mode: meta.student_mode === "class" ? "class" : "free",
                    class_name: String(meta.class_name || "").trim(),
                    roster: Array.isArray(meta.roster) ? meta.roster : [],
                    max_attempts: Math.max(0, parseInt(meta.max_attempts, 10) || 0)
                };
            } catch {
                return { student_mode: "free", class_name: "", roster: [], max_attempts: 0 };
            }
        };

        const getExamStudentModeLabel = (exam) => {
            const parsed = exam?.info?.student_mode ? exam.info : parseExamMetaFromRow(exam);
            const mode = parsed?.student_mode || exam?.info?.student_mode || exam?.student_mode;
            if (mode === "class") {
                const className = String(parsed?.class_name || exam?.info?.class_name || exam?.class_name || "").trim();
                const count = Array.isArray(parsed?.roster) ? parsed.roster.length : (Array.isArray(exam?.info?.roster) ? exam.info.roster.length : 0);
                return className ? `Lớp ${className}${count ? ` (${count} HS)` : ""}` : "Danh sách lớp";
            }
            return "Thí sinh tự do";
        };

        const TeacherDashboard = ({ onViewDetail, onCreateNew, onEdit }) => {
            const [exams, setExams] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searchText, setSearchText] = useState("");
            const [groupFilter, setGroupFilter] = useState("all");
            const [showLegacyExams, setShowLegacyExams] = useState(false);
            const [qrLink, setQrLink] = useState(null);
            const [showGuide, setShowGuide] = useState(false);
            const userEmail = localStorage.getItem('userEmail');
            const normalizedUserEmail = normalizeEmail(userEmail);

            useEffect(() => {
                if (!userEmail) return;
                let cancelled = false;
                setLoading(true);
                axios.get(`${examUrl("my-exams")}&email=${encodeURIComponent(userEmail)}`, { withCredentials: true })
                    .then(async res => {
                        const data = Array.isArray(res.data) ? res.data : [];
                        const enriched = await Promise.all(data.map(async ex => {
                            const meta = parseExamMetaFromRow(ex);
                            const base = {
                                ...ex,
                                info: { ...(ex.info || {}), ...meta }
                            };
                            if (getExamOwnerEmail(ex) || !ex.id) return base;
                            try {
                                const detailRes = await axios.get(examUrl(`get/${ex.id}`), { withCredentials: true });
                                const detail = detailRes.data || {};
                                const info = detail.info || {};
                                return {
                                    ...base,
                                    teacher_email: detail.teacher_email || info.teacher_email || ex.teacher_email,
                                    info: { ...(base.info || {}), ...info }
                                };
                            } catch {
                                return base;
                            }
                        }));
                        enriched.sort((a, b) => new Date(b.created_at || b.updated_at || b.start_time || 0) - new Date(a.created_at || a.updated_at || a.start_time || 0));
                        if (!cancelled) setExams(enriched);
                    })
                    .catch(err => {
                        console.error("Load exams failed:", err);
                        if (!cancelled) setExams([]);
                    })
                    .finally(() => { if (!cancelled) setLoading(false); });
                return () => { cancelled = true; };
            }, [userEmail]);

            const visibleBaseExams = useMemo(() => {
                return exams.filter(ex => {
                    const ownerEmail = getExamOwnerEmail(ex);
                    if (ownerEmail) return ownerEmail === normalizedUserEmail;
                    return showLegacyExams;
                });
            }, [exams, normalizedUserEmail, showLegacyExams]);
            const legacyExamCount = useMemo(() => exams.filter(ex => !getExamOwnerEmail(ex)).length, [exams]);
            const groups = useMemo(() => Array.from(new Set(visibleBaseExams.map(getExamGroupName))).sort((a, b) => a.localeCompare(b, "vi")), [visibleBaseExams]);
            const filteredExams = useMemo(() => {
                const keyword = searchText.trim().toLowerCase();
                return visibleBaseExams.filter(ex => {
                    const groupName = getExamGroupName(ex);
                    if (groupFilter !== "all" && groupName !== groupFilter) return false;
                    if (!keyword) return true;
                    return [ex.title, ex.school, ex.id, ex.info?.title, ex.info?.school].some(value => String(value || "").toLowerCase().includes(keyword));
                });
            }, [visibleBaseExams, searchText, groupFilter]);
            const handleDelete = async (id) => { if (confirm("Xóa đề này?")) { await axios.delete(examUrl(`delete/${id}`), { withCredentials: true }); setExams(exams.filter(e => e.id !== id)); } };
            const handleDuplicate = async (id) => { await axios.post(examUrl(`duplicate/${id}`), null, { withCredentials: true }); window.location.reload(); };

            return (
                <div className="max-w-6xl mx-auto p-6">
                    {qrLink && <QRModal link={qrLink} onClose={() => setQrLink(null)} />}
                    {showGuide && <GuideModal onClose={() => setShowGuide(false)} />}
                    <div className="flex justify-between items-center mb-6 bg-white p-6 rounded-xl shadow border border-indigo-100">
                        <div className="flex items-center gap-4"><div className="w-12 h-12 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-2xl"><i className="fas fa-user-tie"></i></div><div><h1 className="text-2xl font-bold text-gray-800">Quản Lý Thi</h1><p className="text-gray-500">{userEmail}</p></div></div>
                        <div className="flex gap-2">
                            <button onClick={() => window.location.href = 'index.html'} className="px-4 py-2 border rounded hover:bg-gray-50 font-bold text-gray-600">Home</button>
                            <button onClick={() => setShowGuide(true)} className="bg-yellow-100 text-yellow-700 px-4 py-2 rounded font-bold hover:bg-yellow-200"><i className="fas fa-question-circle"></i> Hướng Dẫn</button>
                            <button onClick={onCreateNew} className="bg-indigo-600 text-white px-4 py-2 rounded font-bold hover:bg-indigo-700 shadow"><i className="fas fa-plus"></i> Tạo Đề Mới</button>
                        </div>
                    </div>
                    <div className="bg-white rounded-xl shadow overflow-hidden">
                        <div className="p-4 border-b bg-gray-50 flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
                            <div>
                                <div className="font-bold text-gray-800">Kho đề của tôi</div>
                                <div className="text-xs text-gray-500">{filteredExams.length}/{visibleBaseExams.length} đề đang hiển thị{legacyExamCount ? ` · ${legacyExamCount} đề cũ đang ẩn` : ""}</div>
                            </div>
                            <div className="flex flex-col sm:flex-row gap-2">
                                <label className="flex items-center gap-2 border rounded-lg px-3 py-2 text-sm bg-white text-gray-600">
                                    <input type="checkbox" checked={showLegacyExams} onChange={e => setShowLegacyExams(e.target.checked)} />
                                    Hiện đề cũ
                                </label>
                                <select value={groupFilter} onChange={e => setGroupFilter(e.target.value)} className="border rounded-lg px-3 py-2 text-sm bg-white min-w-[180px]">
                                    <option value="all">Tất cả phân loại</option>
                                    {groups.map(group => <option key={group} value={group}>{group}</option>)}
                                </select>
                                <input value={searchText} onChange={e => setSearchText(e.target.value)} className="border rounded-lg px-3 py-2 text-sm min-w-[220px]" placeholder="Tìm tên đề, trường, mã đề..." />
                            </div>
                        </div>
                        {loading ? <div className="p-10 text-center text-indigo-600 font-bold">Đang tải kho đề...</div> : filteredExams.length === 0 ? <div className="p-10 text-center text-gray-400">Chưa có đề phù hợp.</div> : <table className="w-full text-left"><thead className="bg-gray-50 border-b"><tr><th className="p-4">Kỳ Thi</th><th className="p-4">Phân Loại</th><th className="p-4">Thí sinh</th><th className="p-4">Thời Gian</th><th className="p-4 text-right">Công Cụ</th></tr></thead><tbody>{filteredExams.map((ex) => (<tr key={ex.id} className="border-b hover:bg-indigo-50/30"><td className="p-4"><div className="font-bold text-lg text-indigo-900">{ex.title}</div><div className="text-xs text-gray-500">{ex.id}</div></td><td className="p-4 text-sm text-gray-600">{getExamGroupName(ex)}</td><td className="p-4 text-sm"><span className={`inline-flex px-2 py-1 rounded-full text-xs font-bold ${(ex.info?.student_mode || ex.student_mode) === "class" ? "bg-emerald-100 text-emerald-700" : "bg-slate-100 text-slate-600"}`}>{getExamStudentModeLabel(ex)}</span></td><td className="p-4 text-sm text-gray-600">{ex.duration_mins} phút<br /><span className="text-xs text-gray-400">{ex.start_time ? new Date(ex.start_time).toLocaleDateString() : 'Tự do'}</span></td><td className="p-4 text-right"><div className="flex justify-end gap-2"><button onClick={() => setQrLink(`${window.location.href.split('?')[0]}?mode=student&examId=${ex.id}`)} className="bg-blue-100 text-blue-600 p-2 rounded" title="QR Code"><i className="fas fa-qrcode"></i></button><button onClick={() => onEdit(ex.id)} className="bg-yellow-100 text-yellow-600 p-2 rounded" title="Sửa đề"><i className="fas fa-edit"></i></button><button onClick={() => handleDuplicate(ex.id)} className="bg-purple-100 text-purple-600 p-2 rounded" title="Nhân bản"><i className="fas fa-copy"></i></button><button onClick={() => onViewDetail(ex.id)} className="bg-green-100 text-green-600 p-2 rounded" title="Kết quả"><i className="fas fa-chart-bar"></i></button><button onClick={() => handleDelete(ex.id)} className="bg-red-100 text-red-600 p-2 rounded" title="Xóa"><i className="fas fa-trash"></i></button></div></td></tr>))}</tbody></table>}
                    </div>
                </div>
            );
        };

        const StudentView = ({ examId }) => {
            const isMobileClient = useMemo(() => isMobileExamClient(), []);
            const [step, setStep] = useState("loading");
            const [info, setInfo] = useState({ name: "", sbd: "", class: "" });
            const [selectedRosterKey, setSelectedRosterKey] = useState("");
            const [rosterSearch, setRosterSearch] = useState("");
            const [exam, setExam] = useState(null);
            const [shuffledQuestions, setShuffledQuestions] = useState([]);
            const [answers, setAnswers] = useState({});
            const [timeLeft, setTimeLeft] = useState(0);
            const [error, setError] = useState(null);
            const [violationCount, setViolationCount] = useState(0);
            const [isLockedOut, setIsLockedOut] = useState(false);
            const [showSubmitConfirm, setShowSubmitConfirm] = useState(false);
            const [studentToast, setStudentToast] = useState("");
            const [submitting, setSubmitting] = useState(false);
            const toastTimerRef = useRef(null);
            const [attemptInfo, setAttemptInfo] = useState(null);
            const [checkingAttempts, setCheckingAttempts] = useState(false);
            const answersRef = useRef({});
            const infoRef = useRef({ name: "", sbd: "", class: "" });
            const nameInputRef = useRef(null);
            const sbdInputRef = useRef(null);
            const classInputRef = useRef(null);
            const examRef = useRef(null);
            const submittingRef = useRef(false);
            const timeUpHandledRef = useRef(false);
            const cleanupListenersRef = useRef(null);
            const infoStorageKey = `exam_student_info_${examId}`;

            const showStudentAlert = useCallback((message) => {
                if (!message) return;
                if (isMobileClient || isZaloWebView()) {
                    setStudentToast(String(message));
                    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                    toastTimerRef.current = setTimeout(() => setStudentToast(""), 4200);
                    return;
                }
                alert(message);
            }, [isMobileClient]);

            useEffect(() => () => {
                if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
            }, []);

            const withStudentToast = (node) => (
                <>
                    {node}
                    {studentToast ? (
                        <div className="student-toast" role="alert" onClick={() => setStudentToast("")}>{studentToast}</div>
                    ) : null}
                </>
            );

            const persistInfo = (nextInfo) => {
                const snapshot = {
                    name: (nextInfo.name || "").trim(),
                    sbd: (nextInfo.sbd || "").trim(),
                    class: (nextInfo.class || "").trim()
                };
                infoRef.current = snapshot;
                try { sessionStorage.setItem(infoStorageKey, JSON.stringify(snapshot)); } catch { }
                return snapshot;
            };

            const readStoredInfo = () => {
                try {
                    const raw = sessionStorage.getItem(infoStorageKey);
                    return raw ? JSON.parse(raw) : null;
                } catch {
                    return null;
                }
            };

            const readInfoFromInputs = () => ({
                name: (nameInputRef.current?.value || "").trim(),
                sbd: (sbdInputRef.current?.value || "").trim(),
                class: (classInputRef.current?.value || "").trim()
            });

            const getSubmitInfo = () => {
                const stored = readStoredInfo() || {};
                const refInfo = infoRef.current || {};
                const stateInfo = info || {};
                return {
                    name: (refInfo.name || stored.name || stateInfo.name || "").trim(),
                    sbd: (refInfo.sbd || stored.sbd || stateInfo.sbd || "").trim(),
                    class: (refInfo.class || stored.class || stateInfo.class || "").trim()
                };
            };

            const updateInfoField = (field, value) => {
                setInfo(prev => persistInfo({ ...prev, [field]: value }));
            };

            const isClassRosterMode = exam?.info?.student_mode === "class";
            const examRoster = useMemo(() => {
                if (!Array.isArray(exam?.info?.roster)) return [];
                return exam.info.roster
                    .map(item => ({
                        student_id: item.student_id || 0,
                        full_name: String(item.full_name || "").trim(),
                        sbd: String(item.sbd || item.username || "").trim(),
                        class_name: String(item.class_name || exam?.info?.class_name || "").trim()
                    }))
                    .filter(item => item.full_name && item.sbd);
            }, [exam]);

            const rosterKey = (item) => `${item.sbd}::${item.full_name}`;

            const filteredExamRoster = useMemo(() => {
                const keyword = rosterSearch.trim().toLowerCase();
                if (!keyword) return examRoster;
                return examRoster.filter(student => {
                    const haystack = `${student.full_name} ${student.sbd} ${student.class_name}`.toLowerCase();
                    return haystack.includes(keyword);
                });
            }, [examRoster, rosterSearch]);

            const fetchAttemptInfo = async (name, sbd) => {
                const trimmedName = String(name || "").trim();
                const trimmedSbd = String(sbd || "").trim();
                if (!trimmedName || !trimmedSbd) {
                    setAttemptInfo(null);
                    return null;
                }
                setCheckingAttempts(true);
                try {
                    const res = await axios.get(
                        `${examUrl("student-attempts")}&exam_id=${encodeURIComponent(examId)}&student_name=${encodeURIComponent(trimmedName)}&sbd=${encodeURIComponent(trimmedSbd)}`
                    );
                    setAttemptInfo(res.data || null);
                    return res.data || null;
                } catch {
                    setAttemptInfo(null);
                    return null;
                } finally {
                    setCheckingAttempts(false);
                }
            };

            const selectRosterStudent = (key) => {
                setSelectedRosterKey(key);
                const student = examRoster.find(item => rosterKey(item) === key);
                if (!student) {
                    persistInfo({ name: "", sbd: "", class: "" });
                    setInfo({ name: "", sbd: "", class: "" });
                    setAttemptInfo(null);
                    return;
                }
                const snapshot = persistInfo({
                    name: student.full_name,
                    sbd: student.sbd,
                    class: student.class_name || exam?.info?.class_name || ""
                });
                setInfo(snapshot);
                fetchAttemptInfo(snapshot.name, snapshot.sbd);
            };

            useEffect(() => { answersRef.current = answers; }, [answers]);
            useEffect(() => { examRef.current = exam; }, [exam]);

            useEffect(() => {
                axios.get(examUrl(`get/${examId}`)).then(res => {
                    const data = res.data;
                    if (data.info.status === "not_started") { setError(`Chưa đến giờ thi! Mở lúc: ${new Date(data.info.start_time).toLocaleString()}`); setStep("locked"); }
                    else if (data.info.status === "expired") { setError("Đã hết giờ làm bài."); setStep("locked"); }
                    else { setExam(data); setTimeLeft(data.info.duration_mins * 60); setStep("info"); }
                }).catch(() => { setError("Không tìm thấy đề thi!"); setStep("locked"); });
            }, [examId]);

            useEffect(() => {
                if (step === 'exam' && exam && exam.questions) {
                    const mappedQuestions = exam.questions.map((q, originalIdx) => {
                        const originalOptions = q.options.map((opt, optIdx) => ({ text: opt, originalOptIdx: optIdx }));
                        const shuffledOptions = [...originalOptions].sort(() => Math.random() - 0.5);
                        return { ...q, originalIdx: originalIdx, shuffledOptions: shuffledOptions };
                    });
                    setShuffledQuestions(mappedQuestions.sort(() => Math.random() - 0.5));
                }
            }, [step, exam]);

            const safeExitFullscreen = async () => {
                if (isMobileClient) return;
