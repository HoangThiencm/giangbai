<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Thi Trực Tuyến AI</title>
    
    <!-- === BẢO MẬT: KIỂM TRA ĐĂNG NHẬP === -->
    <script>
        (function() {
            const token = localStorage.getItem('authToken');
            const params = new URLSearchParams(window.location.search);
            
            // Nếu là Học sinh (có ?mode=student) thì CHO PHÉP vào
            const isStudentMode = params.get('mode') === 'student';

            // Kiểm tra môi trường preview
            const isPreview = window.location.protocol === 'about:' || window.location.protocol === 'data:';

            if (!token && !isStudentMode) {
                if (isPreview) {
                    console.warn("Preview Mode: Bỏ qua Login redirect.");
                } else {
                    // Nếu không phải học sinh và chưa đăng nhập -> Về trang login
                    alert("Vui lòng đăng nhập để truy cập hệ thống quản lý thi.");
                    window.location.href = 'login.html';
                }
            }
        })();
    </script>
    <!-- ==================================== -->

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Excel Export Library -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .katex { font-size: 1.2em; color: #1e3a8a; }
        input[type="datetime-local"] { color: #333; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const API_BASE = "https://hoangthiencm-giangbai.hf.space"; 

        // --- UTILS ---
        const formatDate = (isoString) => {
            if (!isoString) return "";
            return new Date(isoString).toLocaleString('vi-VN');
        };

        const goBackHome = () => {
             window.location.href = 'index.html';
        };

        // --- COMPONENT RENDER TOÁN ---
        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if (!text) return;
                const parts = text.split(/(\$[^$]+\$)/g);
                ref.current.innerHTML = "";
                parts.forEach(part => {
                    if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false }); } catch { span.innerText = part; }
                        ref.current.appendChild(span);
                    } else { ref.current.appendChild(document.createTextNode(part)); }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        // --- VIEW 1: GIÁO VIÊN UPLOAD ---
        const TeacherView = ({ onExamReady }) => {
            const [form, setForm] = useState({ title: "", school: "", subject: "", grade: "", duration: 45, startTime: "", endTime: "" });
            const [apiKeys, setApiKeys] = useState([]);
            const [keyMessage, setKeyMessage] = useState("");
            const [loading, setLoading] = useState(false);
            const fileRef = useRef();
            const userEmail = localStorage.getItem('userEmail') || 'unknown_teacher';

            const handleKeyFile = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                const text = await file.text();
                const keys = text.split('\n').map(k => k.trim()).filter(k => k.length > 0);
                setApiKeys(keys); setKeyMessage(`✅ Đã nhận được ${keys.length} API keys.`);
            };

            const handleUpload = async () => {
                if (apiKeys.length === 0) return alert("Chưa tải lên file API Key!");
                const file = fileRef.current.files[0];
                if (!file) return alert("Chưa chọn file đề thi!");
                if (!form.startTime || !form.endTime) return alert("Vui lòng chọn thời gian bắt đầu và kết thúc!");

                setLoading(true);
                const fd = new FormData();
                fd.append("file", file);
                fd.append("title", form.title); fd.append("school", form.school); fd.append("subject", form.subject);
                fd.append("grade", form.grade); fd.append("duration", form.duration);
                fd.append("start_time", form.startTime); fd.append("end_time", form.endTime);
                fd.append("api_keys_json", JSON.stringify(apiKeys));
                fd.append("username", userEmail); // Gửi kèm username giáo viên

                try {
                    const res = await axios.post(`${API_BASE}/api/exam/upload`, fd);
                    alert(`✅ Tạo kỳ thi thành công!\nSẵn sàng tổ chức thi.`);
                    onExamReady(res.data.exam_id, form.title);
                } catch (e) { alert("Lỗi: " + (e.response?.data?.detail || e.message)); } finally { setLoading(false); }
            };

            return (
                <div className="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg border-t-4 border-indigo-600 relative">
                    <button onClick={goBackHome} className="absolute top-4 right-4 text-gray-500 hover:text-indigo-600 text-sm font-bold flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                        Về Trang Chủ
                    </button>
                    <h2 className="text-2xl font-bold text-indigo-700 mb-6 flex items-center gap-2"><span>📝</span> TẠO KỲ THI MỚI</h2>
                    <div className="grid grid-cols-2 gap-4 mb-4">
                        <input className="border p-2 rounded" placeholder="Tên Trường" value={form.school} onChange={e=>setForm({...form, school: e.target.value})} />
                        <input className="border p-2 rounded" placeholder="Tên Đợt Thi (VD: Giữa Kỳ 1)" value={form.title} onChange={e=>setForm({...form, title: e.target.value})} />
                        <input className="border p-2 rounded" placeholder="Môn học" value={form.subject} onChange={e=>setForm({...form, subject: e.target.value})} />
                        <input className="border p-2 rounded" placeholder="Lớp/Khối" value={form.grade} onChange={e=>setForm({...form, grade: e.target.value})} />
                    </div>
                    <hr className="my-4"/>
                    <div className="mb-4">
                        <label className="block font-bold mb-1">File API Key (Gemini .txt):</label>
                        <input className="w-full border p-2 rounded bg-gray-50" type="file" accept=".txt" onChange={handleKeyFile} />
                        {keyMessage && <p className="text-sm mt-1 font-semibold text-green-600">{keyMessage}</p>}
                    </div>
                    <div className="grid grid-cols-3 gap-4 mb-4 bg-blue-50 p-4 rounded border border-blue-100">
                        <div><label className="block text-xs font-bold mb-1 text-blue-800">Thời lượng (phút)</label><input type="number" className="border p-2 rounded w-full" value={form.duration} onChange={e=>setForm({...form, duration: e.target.value})} /></div>
                        <div><label className="block text-xs font-bold mb-1 text-blue-800">Bắt đầu</label><input type="datetime-local" className="border p-2 rounded w-full" onChange={e=>setForm({...form, startTime: e.target.value})} /></div>
                        <div><label className="block text-xs font-bold mb-1 text-blue-800">Kết thúc</label><input type="datetime-local" className="border p-2 rounded w-full" onChange={e=>setForm({...form, endTime: e.target.value})} /></div>
                    </div>
                    <div className="mb-6 border-2 border-dashed border-gray-300 p-6 text-center rounded-lg hover:bg-gray-50 transition">
                        <input ref={fileRef} type="file" accept=".docx,.pdf" />
                        <p className="text-sm text-gray-500 mt-2">Upload file đề thi (PDF/Word). Hệ thống tự tách câu hỏi.</p>
                    </div>
                    <button onClick={handleUpload} disabled={loading} className="w-full bg-indigo-600 text-white py-3 rounded font-bold hover:bg-indigo-700 transition shadow-lg">{loading ? "Đang xử lý AI..." : "TẠO KỲ THI NGAY"}</button>
                </div>
            );
        };

        // --- VIEW 2: LOBBY ---
        const LobbyView = ({ examId, examTitle, onTeacherMonitor }) => {
            const qrRef = useRef();
            const [examLink, setExamLink] = useState("");
            useEffect(() => {
                const link = `${window.location.href.split('?')[0]}?mode=student&examId=${examId}`;
                setExamLink(link);
                if (qrRef.current) { qrRef.current.innerHTML = ""; new QRCode(qrRef.current, { text: link, width: 180, height: 180 }); }
            }, [examId]);
            const copyLink = () => { navigator.clipboard.writeText(examLink); alert("Đã sao chép link!"); };

            return (
                <div className="max-w-4xl mx-auto mt-10 grid grid-cols-1 md:grid-cols-2 gap-8 relative">
                    <button onClick={goBackHome} className="absolute top-0 right-full mr-4 text-gray-500 hover:text-indigo-600 text-sm font-bold flex items-center gap-1 bg-white px-3 py-2 rounded shadow">
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                        Trang Chủ
                    </button>
                    <div className="bg-white p-8 rounded-xl shadow-lg text-center border-t-4 border-green-500">
                        <h2 className="text-xl font-bold text-green-700 mb-2">PHÒNG THI SẴN SÀNG</h2>
                        <p className="text-gray-600 font-bold mb-4">{examTitle}</p>
                        <div ref={qrRef} className="inline-block p-2 border rounded mx-auto mb-4 bg-white shadow-sm"></div>
                        <div className="mt-2">
                             <div className="flex items-center gap-2 bg-gray-100 p-2 rounded border">
                                <input readOnly value={examLink} className="bg-transparent text-xs w-full outline-none text-gray-600 font-mono"/>
                                <button onClick={copyLink} className="text-white bg-green-600 px-3 py-1 rounded text-xs font-bold hover:bg-green-700">COPY</button>
                             </div>
                        </div>
                        <div className="mt-4 bg-blue-50 p-2 rounded text-blue-800 font-mono text-xs">ID Phòng: <b>{examId}</b></div>
                    </div>
                    <div className="bg-white p-8 rounded-xl shadow-lg flex flex-col justify-center items-center border-t-4 border-indigo-500">
                        <div className="text-6xl mb-4">📊</div>
                        <h3 className="text-xl font-bold mb-2">Khu vực Giáo viên</h3>
                        <p className="text-gray-500 mb-6 text-center text-sm">Theo dõi tiến độ, xem điểm số và xuất báo cáo Excel.</p>
                        <button onClick={onTeacherMonitor} className="bg-indigo-600 text-white px-6 py-3 rounded-full font-bold hover:bg-indigo-700 shadow-lg transform hover:scale-105 transition">XEM KẾT QUẢ & QUẢN LÝ</button>
                    </div>
                </div>
            );
        };

        // --- VIEW 3: STUDENT EXAM (Không đổi) ---
        const StudentView = ({ examId }) => {
            const [step, setStep] = useState("check");
            const [info, setInfo] = useState({ name: "", class: "", sbd: "" });
            const [exam, setExam] = useState(null);
            const [answers, setAnswers] = useState({});
            const [submitted, setSubmitted] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");
            const [timeLeft, setTimeLeft] = useState(0);

            useEffect(() => {
                axios.get(`${API_BASE}/api/exam/get/${examId}`).then(res => {
                        const data = res.data;
                        const now = new Date().getTime();
                        const start = new Date(data.info.start_time).getTime();
                        const end = new Date(data.info.end_time).getTime();
                        if (now < start) { setStep("error"); setErrorMsg(`Chưa đến giờ làm bài!\nMở đề: ${formatDate(data.info.start_time)}`); return; }
                        if (now > end) { setStep("error"); setErrorMsg(`Kỳ thi đã kết thúc lúc: ${formatDate(data.info.end_time)}`); return; }
                        setExam(data); setStep("info");
                        const durationMs = data.info.duration_mins * 60 * 1000;
                        const timeUntilEnd = end - now;
                        setTimeLeft(Math.floor(Math.min(durationMs, timeUntilEnd) / 1000));
                    }).catch(() => { setStep("error"); setErrorMsg("Không tìm thấy đề thi hoặc lỗi kết nối."); });
            }, [examId]);

            useEffect(() => {
                if (step !== "exam") return;
                if (timeLeft <= 0) { handleSubmit(true); return; }
                const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                return () => clearInterval(timer);
            }, [step, timeLeft]);

            const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;

            const handleStart = () => {
                if (!info.name || !info.sbd) return alert("Vui lòng nhập đủ thông tin!");
                setStep("exam");
                if (exam && exam.questions) {
                    const qWithIdx = exam.questions.map((q, i) => ({...q, originalIndex: i}));
                    setExam({ ...exam, questions: qWithIdx.sort(() => Math.random() - 0.5) });
                }
            };

            const handleSubmit = async (auto = false) => {
                if (!auto && !confirm("Nộp bài ngay?")) return;
                const payload = { exam_id: examId, student_name: info.name, sbd: info.sbd, student_class: info.class, answers: {} };
                exam.questions.forEach((q, currentIdx) => {
                    if (answers[currentIdx] !== undefined) { payload.answers[q.originalIndex] = answers[currentIdx]; }
                });
                try {
                    setStep("loading");
                    const res = await axios.post(`${API_BASE}/api/exam/submit`, payload);
                    setSubmitted(res.data); setStep("result");
                } catch (e) { alert("Lỗi nộp bài: " + e.message); setStep("exam"); }
            };

            if (step === "error") return <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4"><div className="bg-white p-8 rounded shadow text-center"><h3 className="text-xl font-bold text-red-600">Thông Báo</h3><p>{errorMsg}</p></div></div>;
            if (step === "result" && submitted) return <div className="min-h-screen bg-green-50 flex items-center justify-center p-4"><div className="bg-white p-8 rounded shadow text-center"><h2 className="text-2xl font-bold text-green-700">Hoàn thành!</h2><p className="text-4xl font-extrabold my-4">{submitted.score} điểm</p><p className="italic bg-yellow-50 p-3 rounded">"{submitted.feedback}"</p></div></div>;
            if (step === "info") return <div className="max-w-md mx-auto mt-20 bg-white p-8 rounded shadow text-center"><h2 className="text-xl font-bold text-blue-800">{exam?.info?.school}</h2><h3 className="mb-4">{exam?.info?.title}</h3><input className="w-full border p-2 mb-2 rounded" placeholder="Họ và tên" value={info.name} onChange={e=>setInfo({...info, name: e.target.value})} /><input className="w-full border p-2 mb-2 rounded" placeholder="Lớp" value={info.class} onChange={e=>setInfo({...info, class: e.target.value})} /><input className="w-full border p-2 mb-4 rounded" placeholder="Số Báo Danh" value={info.sbd} onChange={e=>setInfo({...info, sbd: e.target.value})} /><button onClick={handleStart} className="w-full bg-blue-600 text-white py-2 rounded font-bold">VÀO THI</button></div>;
            if (step === "loading") return <div className="text-center mt-20">Đang nộp bài...</div>;

            return (
                <div className="max-w-3xl mx-auto p-4 pb-20">
                    <div className="sticky top-0 bg-white p-4 shadow z-10 flex justify-between items-center mb-4 rounded">
                        <div><b>{info.name}</b> - {info.sbd}</div>
                        <div className="font-mono text-xl font-bold text-blue-600">{formatTime(timeLeft)}</div>
                        <button onClick={()=>handleSubmit(false)} className="bg-green-600 text-white px-3 py-1 rounded">Nộp Bài</button>
                    </div>
                    {exam && exam.questions.map((q, idx) => (
                        <div key={idx} className="bg-white p-4 rounded shadow mb-4">
                            <div className="font-bold mb-2">Câu {idx+1}: <MathText text={q.question} /></div>
                            <div className="space-y-2">{q.options.map((opt, oIdx) => (
                                <div key={oIdx} onClick={()=>setAnswers({...answers, [idx]: oIdx})} className={`p-2 border rounded cursor-pointer ${answers[idx]===oIdx ? 'bg-blue-100 border-blue-500' : 'hover:bg-gray-50'}`}>
                                    <b>{String.fromCharCode(65+oIdx)}.</b> <MathText text={opt} />
                                </div>
                            ))}</div>
                        </div>
                    ))}
                </div>
            );
        };

        // --- VIEW 4: RESULTS DASHBOARD (Đã cập nhật xuất Excel) ---
        const ResultsDashboard = ({ examId, onBack }) => {
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetch = async () => {
                    try { const res = await axios.get(`${API_BASE}/api/exam/results/${examId}`); setResults(res.data); } 
                    catch (e) { console.error(e); } finally { setLoading(false); }
                };
                fetch();
                const interval = setInterval(fetch, 5000);
                return () => clearInterval(interval);
            }, [examId]);

            const exportExcel = () => {
                if (results.length === 0) return alert("Chưa có dữ liệu để xuất!");
                const data = results.map(r => ({
                    "Họ và Tên": r.student_name,
                    "Lớp": r.student_class,
                    "Số Báo Danh": r.sbd,
                    "Số Câu Đúng": r.correct_count,
                    "Số Câu Sai": r.total_questions - r.correct_count,
                    "Điểm Số": r.score,
                    "Ngày Nộp": new Date(r.created_at).toLocaleString('vi-VN'),
                    "AI Nhận Xét": r.ai_feedback
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "KetQuaThi");
                XLSX.writeFile(wb, `KetQua_${examId}.xlsx`);
            };

            return (
                <div className="max-w-6xl mx-auto p-6">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onBack} className="text-gray-500 hover:text-black flex items-center gap-2"><span>⬅</span> Quay lại Lobby</button>
                        <button onClick={exportExcel} className="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700 font-bold flex items-center gap-2">
                            <span>📥</span> Xuất Excel
                        </button>
                    </div>
                    <div className="bg-white rounded-xl shadow overflow-hidden">
                        <table className="w-full text-left border-collapse">
                            <thead className="bg-gray-100 text-gray-600 uppercase text-sm font-bold">
                                <tr>
                                    <th className="p-4">SBD</th>
                                    <th className="p-4">Họ Tên</th>
                                    <th className="p-4">Lớp</th>
                                    <th className="p-4 text-center">Đúng/Tổng</th>
                                    <th className="p-4 text-center">Sai</th>
                                    <th className="p-4 text-center">Điểm</th>
                                    <th className="p-4 w-1/3">Nhận Xét</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {results.map((r, i) => (
                                    <tr key={i} className="hover:bg-gray-50 transition">
                                        <td className="p-4 font-mono text-blue-600 font-bold">{r.sbd}</td>
                                        <td className="p-4 font-bold text-gray-800">{r.student_name}</td>
                                        <td className="p-4">{r.student_class}</td>
                                        <td className="p-4 text-center">{r.correct_count}/{r.total_questions}</td>
                                        <td className="p-4 text-center text-red-500 font-bold">{r.total_questions - r.correct_count}</td>
                                        <td className="p-4 text-center font-bold text-lg text-indigo-600">{r.score}</td>
                                        <td className="p-4 text-sm text-gray-600 italic">"{r.ai_feedback}"</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {!loading && results.length === 0 && <div className="p-10 text-center text-gray-400">Chưa có bài nộp nào.</div>}
                    </div>
                </div>
            );
        };

        // --- APP MAIN ---
        const App = () => {
            const [view, setView] = useState("upload");
            const [examId, setExamId] = useState(null);
            const [examTitle, setExamTitle] = useState("");

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get("mode") === "student") {
                    setExamId(params.get("examId"));
                    setView("student");
                }
            }, []);

            return (
                <div>
                    {view === "upload" && <TeacherView onExamReady={(id, title) => { setExamId(id); setExamTitle(title); setView("lobby"); }} />}
                    {view === "lobby" && <LobbyView examId={examId} examTitle={examTitle} onTeacherMonitor={() => setView("results")} />}
                    {view === "student" && <StudentView examId={examId} />}
                    {view === "results" && <ResultsDashboard examId={examId} onBack={() => setView("lobby")} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
