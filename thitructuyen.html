<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Thi Trực Tuyến Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script crossorigin src="[https://unpkg.com/react@18/umd/react.development.js](https://unpkg.com/react@18/umd/react.development.js)"></script>
    <script crossorigin src="[https://unpkg.com/react-dom@18/umd/react-dom.development.js](https://unpkg.com/react-dom@18/umd/react-dom.development.js)"></script>
    <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
    <script src="[https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js](https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js)"></script>
    <script src="[https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js](https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js)"></script>
    <script src="[https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js](https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js)"></script>
    <link rel="stylesheet" href="[https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css](https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css)">
    <script src="[https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js](https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js)"></script>
    <link rel="stylesheet" href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; }
        .segment-card { transition: all 0.2s; border: 1px solid #e5e7eb; }
        .segment-card.active { border: 2px solid #4f46e5; background: #eef2ff; }
        .math-preview { font-size: 1.1em; color: #1e3a8a; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Layout chia đôi */
        .split-pane { display: flex; height: calc(100vh - 64px); }
        .left-pane { width: 40%; overflow-y: auto; border-right: 1px solid #ddd; background: #fff; }
        .right-pane { width: 60%; overflow-y: auto; background: #f9fafb; padding: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const API_BASE = "[https://hoangthiencm-giangbai.hf.space](https://hoangthiencm-giangbai.hf.space)"; 
        const userEmail = localStorage.getItem('userEmail');
        
        // --- COMPONENTS ---
        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if (!text || !ref.current) return;
                try {
                    const html = text.replace(/\$([^$]+)\$/g, (m, c) => katex.renderToString(c, { throwOnError: false, displayMode: false }));
                    ref.current.innerHTML = html.replace(/\n/g, '<br>');
                } catch(e) { ref.current.textContent = text; }
            }, [text]);
            return <div ref={ref} className="math-preview leading-relaxed inline-block"></div>;
        };

        const QRModal = ({ link, onClose }) => {
            const qrRef = useRef();
            useEffect(() => { if(qrRef.current) { qrRef.current.innerHTML = ""; new QRCode(qrRef.current, { text: link, width: 200, height: 200 }); } }, [link]);
            return <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={onClose}><div className="bg-white p-6 rounded-lg shadow-xl text-center" onClick={e=>e.stopPropagation()}><h3 className="font-bold text-lg mb-2 text-indigo-800">Quét mã để vào thi</h3><div ref={qrRef} className="flex justify-center my-4"></div><input value={link} readOnly className="w-full border p-2 rounded text-sm bg-gray-50 mb-3"/><button onClick={onClose} className="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600 w-full">Đóng</button></div></div>;
        };

        // --- NEW EXAM CREATOR (PIPELINE) ---
        const HybridExamCreator = ({ onBack, initialData }) => {
            const [step, setStep] = useState(initialData ? 2 : 1);
            const [segments, setSegments] = useState([]);
            const [activeSegId, setActiveSegId] = useState(null);
            const [loadingMsg, setLoadingMsg] = useState("");
            const [examInfo, setExamInfo] = useState(initialData ? initialData.info : { title: "", school: "", duration: 45 });
            const [aiProcessing, setAiProcessing] = useState(false);

            // Load Data if Edit Mode
            useEffect(() => {
                if (initialData && initialData.questions) {
                    const loadedSegments = initialData.questions.map((q, i) => ({
                        id: `existing_${i}`,
                        raw_text: q.question, // Giả lập raw text từ câu hỏi đã lưu
                        crop_image: "[https://via.placeholder.com/300x100?text=No+Image+Available](https://via.placeholder.com/300x100?text=No+Image+Available)", 
                        status: 'done',
                        data: { 
                            question: q.question, 
                            options: q.options || ["","","",""], 
                            correct_index: q.correct_index 
                        }
                    }));
                    setSegments(loadedSegments);
                    if(loadedSegments.length > 0) setActiveSegId(loadedSegments[0].id);
                }
            }, [initialData]);

            const getApiKeys = () => { try { return JSON.parse(localStorage.getItem('global_gemini_keys') || "[]"); } catch { return []; } };

            // BƯỚC 1: UPLOAD & OCR & HEURISTIC GROUPING
            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoadingMsg("Đang xử lý PDF (OCR + Cắt câu hỏi)...");
                const fd = new FormData(); fd.append("file", file);
                try {
                    const res = await axios.post(`${API_BASE}/api/exam/process_paper`, fd);
                    if (res.data.status === 'ok') {
                        setSegments(res.data.segments);
                        if(res.data.segments.length > 0) setActiveSegId(res.data.segments[0].id);
                        setStep(2);
                    } else alert("Lỗi xử lý: " + res.data.message);
                } catch (err) { alert("Lỗi: " + err.message); } finally { setLoadingMsg(""); }
            };

            // BƯỚC 2: AI NORMALIZE (SINGLE OR ALL)
            const normalizeSegment = async (segId) => {
                const keys = getApiKeys(); if(!keys.length) return alert("Thiếu API Key!");
                
                // Update UI status
                setSegments(prev => prev.map(s => s.id === segId ? {...s, status: 'loading'} : s));
                
                const seg = segments.find(s => s.id === segId);
                try {
                    const res = await axios.post(`${API_BASE}/api/exam/normalize_segment`, { 
                        raw_text: seg.raw_text, 
                        api_keys: keys 
                    });
                    
                    if(res.data.status === 'ok') {
                        setSegments(prev => prev.map(s => s.id === segId ? { 
                            ...s, 
                            status: 'done', 
                            data: res.data.data 
                        } : s));
                    } else throw new Error(res.data.message);
                } catch(e) {
                    setSegments(prev => prev.map(s => s.id === segId ? {...s, status: 'error'} : s));
                    console.error(e);
                }
            };

            const normalizeAll = async () => {
                if(aiProcessing) return;
                setAiProcessing(true);
                const pending = segments.filter(s => s.status === 'pending');
                // Chạy tuần tự hoặc song song giới hạn để tránh Rate Limit
                // Ở đây chạy song song 3 request một lúc
                const BATCH_SIZE = 3;
                for (let i = 0; i < pending.length; i += BATCH_SIZE) {
                    const batch = pending.slice(i, i + BATCH_SIZE);
                    await Promise.all(batch.map(s => normalizeSegment(s.id)));
                }
                setAiProcessing(false);
            };

            const updateActiveData = (field, value, optIdx=null) => {
                setSegments(prev => prev.map(s => {
                    if(s.id === activeSegId) {
                        const newData = {...s.data};
                        if(field === 'options') newData.options[optIdx] = value; else newData[field] = value;
                        return {...s, data: newData};
                    } return s;
                }));
            };
            
            const updateRawText = (val) => {
                setSegments(prev => prev.map(s => s.id === activeSegId ? {...s, raw_text: val} : s));
            };

            const handleSaveExam = async () => {
                if(!examInfo.title) return alert("Vui lòng nhập Tên đề thi!");
                const finalQuestions = segments.map(s => s.data);
                if(finalQuestions.length === 0) return alert("Chưa có câu hỏi nào!");
                try {
                    await axios.post(`${API_BASE}/api/exam/save`, {
                        id: initialData ? initialData.info.id : null, 
                        title: examInfo.title, school: examInfo.school, duration: examInfo.duration,
                        questions: finalQuestions, teacher_email: userEmail, api_keys: getApiKeys()
                    });
                    alert("✅ Đã lưu đề thi thành công!"); onBack();
                } catch(e) { alert("Lỗi lưu: " + e.message); }
            };

            const activeSeg = segments.find(s => s.id === activeSegId);

            // --- RENDER STEP 1: UPLOAD ---
            if(step === 1) return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                    <div className="bg-white p-10 rounded-2xl shadow-xl text-center max-w-lg w-full">
                        <h1 className="text-3xl font-bold text-indigo-700 mb-2">Tạo Đề Từ PDF/Ảnh</h1>
                        <p className="text-gray-500 mb-6">Pipeline: OCR -> Cắt câu hỏi -> AI Chuẩn hoá</p>
                        {loadingMsg ? <div className="text-indigo-600 font-bold animate-pulse flex flex-col items-center gap-2"><div className="loader w-8 h-8"></div>{loadingMsg}</div> : (
                            <label className="block w-full border-2 border-dashed border-indigo-300 bg-indigo-50 rounded-xl p-8 cursor-pointer hover:bg-indigo-100 transition group">
                                <input type="file" className="hidden" accept=".pdf,.png,.jpg" onChange={handleUpload}/>
                                <i className="fas fa-file-pdf text-4xl text-indigo-500 mb-2 group-hover:scale-110 transition"></i>
                                <div className="font-bold text-indigo-700">Chọn file Đề thi (PDF/Ảnh)</div>
                                <p className="text-xs text-gray-400 mt-2">Nên dùng file PDF gốc để OCR chuẩn nhất</p>
                            </label>
                        )}
                        <button onClick={onBack} className="mt-6 text-gray-400 hover:text-gray-600 underline">Quay lại</button>
                    </div>
                </div>
            );

            // --- RENDER STEP 2: REVIEW & EDIT ---
            return (
                <div className="flex h-screen flex-col bg-white">
                    {/* Header */}
                    <div className="h-16 border-b flex items-center justify-between px-4 shrink-0 shadow-sm z-20 bg-gray-50">
                        <div className="flex items-center gap-4">
                            <button onClick={onBack} className="text-gray-500 hover:text-gray-800"><i className="fas fa-arrow-left"></i></button>
                            <input className="font-bold text-lg bg-transparent border-b border-dashed outline-none w-64" placeholder="Tên đề thi..." value={examInfo.title} onChange={e=>setExamInfo({...examInfo, title:e.target.value})}/>
                            <input className="text-sm bg-transparent border-b border-dashed outline-none w-32" placeholder="Trường..." value={examInfo.school} onChange={e=>setExamInfo({...examInfo, school:e.target.value})}/>
                            <div className="flex items-center gap-1 text-sm text-gray-600"><i className="fas fa-clock"></i><input type="number" className="w-12 bg-transparent border-b border-dashed text-center outline-none" value={examInfo.duration} onChange={e=>setExamInfo({...examInfo, duration:e.target.value})}/> phút</div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={normalizeAll} disabled={aiProcessing} className="bg-indigo-600 text-white px-4 py-1.5 rounded hover:bg-indigo-700 text-sm font-bold shadow disabled:opacity-50 flex items-center gap-2">
                                {aiProcessing ? <div className="loader w-4 h-4 border-white border-t-transparent"></div> : <i className="fas fa-magic"></i>} 
                                Chuẩn hoá AI ({segments.filter(s=>s.status==='pending').length})
                            </button>
                            <button onClick={handleSaveExam} className="bg-green-600 text-white px-4 py-1.5 rounded hover:bg-green-700 text-sm font-bold shadow"><i className="fas fa-save"></i> Lưu Đề</button>
                        </div>
                    </div>

                    {/* Main Content Split View */}
                    <div className="split-pane">
                        {/* LEFT: List of Segments */}
                        <div className="left-pane p-4 space-y-3">
                            <h3 className="font-bold text-gray-500 text-xs uppercase mb-2">Danh sách câu hỏi ({segments.length})</h3>
                            {segments.map((seg, idx) => (
                                <div key={seg.id} onClick={() => setActiveSegId(seg.id)} className={`segment-card p-3 rounded cursor-pointer flex flex-col gap-2 ${activeSegId === seg.id ? 'active' : 'bg-white hover:bg-gray-50'}`}>
                                    <div className="flex justify-between items-center">
                                        <span className="font-bold text-sm text-gray-700">Câu {idx + 1}</span>
                                        <div className="flex items-center gap-1">
                                            {seg.status === 'pending' && <span className="text-[10px] bg-gray-200 px-2 py-0.5 rounded text-gray-600">Chưa AI</span>}
                                            {seg.status === 'loading' && <span className="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded animate-pulse">Đang AI...</span>}
                                            {seg.status === 'done' && <span className="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded font-bold">Đã xong</span>}
                                            {seg.status === 'error' && <span className="text-[10px] bg-red-100 text-red-700 px-2 py-0.5 rounded">Lỗi</span>}
                                        </div>
                                    </div>
                                    {/* Ảnh crop bằng chứng */}
                                    <img src={seg.crop_image} className="w-full h-auto object-contain border rounded bg-gray-100" />
                                    {/* Raw text preview */}
                                    <div className="text-xs text-gray-400 truncate font-mono">{seg.raw_text.substring(0, 50)}...</div>
                                </div>
                            ))}
                        </div>

                        {/* RIGHT: Editor */}
                        <div className="right-pane flex flex-col">
                            {activeSeg ? (
                                <div className="bg-white p-6 rounded-xl shadow-sm border h-full flex flex-col">
                                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                                        <h3 className="font-bold text-lg text-indigo-900">Chi tiết Câu hỏi</h3>
                                        <button onClick={()=>normalizeSegment(activeSeg.id)} className="text-xs bg-indigo-50 text-indigo-600 px-3 py-1 rounded hover:bg-indigo-100 font-bold">
                                            <i className="fas fa-sync-alt mr-1"></i> Chạy lại AI
                                        </button>
                                    </div>

                                    <div className="flex-1 overflow-y-auto space-y-6">
                                        {/* So sánh Raw vs AI */}
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-gray-500 uppercase mb-1">OCR Text (Có thể sửa)</label>
                                                <textarea className="w-full h-32 p-2 border rounded text-xs font-mono bg-gray-50 focus:bg-white transition" 
                                                    value={activeSeg.raw_text} 
                                                    onChange={(e) => updateRawText(e.target.value)}
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-indigo-500 uppercase mb-1">AI Output (Kết quả)</label>
                                                <div className="w-full h-32 p-2 border rounded text-sm bg-indigo-50 overflow-y-auto">
                                                    <div className="font-bold mb-1">{activeSeg.data.question}</div>
                                                    <ul className="list-disc pl-4 text-xs text-gray-600">
                                                        {activeSeg.data.options.map((o,i) => <li key={i} className={i===activeSeg.data.correct_index?'text-green-600 font-bold':''}>{o}</li>)}
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Form chỉnh sửa chính thức */}
                                        <div className="border-t pt-4">
                                            <label className="block font-bold text-gray-700 text-sm mb-1">Nội dung câu hỏi (Đã chuẩn hoá)</label>
                                            <textarea className="w-full h-24 p-3 border rounded focus:ring-2 focus:ring-indigo-500 outline-none text-sm mb-2" 
                                                value={activeSeg.data.question} 
                                                onChange={e=>updateActiveData('question', e.target.value)}
                                            />
                                            <div className="p-2 bg-gray-50 rounded border mb-4 text-sm"><MathText text={activeSeg.data.question}/></div>

                                            <label className="block font-bold text-gray-700 text-sm mb-2">Đáp án</label>
                                            <div className="grid grid-cols-1 gap-2">
                                                {activeSeg.data.options.map((opt, i) => (
                                                    <div key={i} className={`flex items-center gap-2 p-2 border rounded hover:shadow-sm transition ${activeSeg.data.correct_index === i ? 'bg-green-50 border-green-500' : 'bg-white'}`}>
                                                        <div onClick={()=>updateActiveData('correct_index', i)} className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm cursor-pointer transition ${activeSeg.data.correct_index === i ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}>
                                                            {String.fromCharCode(65+i)}
                                                        </div>
                                                        <input className="flex-1 bg-transparent text-sm outline-none" value={opt} onChange={e=>updateActiveData('options', e.target.value, i)}/>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-full flex items-center justify-center text-gray-400 flex-col">
                                    <i className="fas fa-hand-point-left text-4xl mb-2"></i>
                                    <p>Chọn câu hỏi bên trái để chỉnh sửa</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- DASHBOARD & STUDENT VIEW (GIỮ NGUYÊN) ---
        const TeacherDashboard = ({ onViewDetail, onCreateNew, onEdit }) => {
            const [exams, setExams] = useState([]);
            const [qrLink, setQrLink] = useState(null);
            useEffect(() => { if(userEmail) axios.get(`${API_BASE}/api/exam/my-exams?email=${userEmail}`).then(res => setExams(res.data)).catch(console.error); }, []);
            const handleDelete = async (id) => { if(confirm("Xóa?")) try { await axios.delete(`${API_BASE}/api/exam/delete/${id}`); setExams(exams.filter(e=>e.id!==id)); } catch(e){alert("Lỗi");} };
            const handleDuplicate = async (id) => { if(confirm("Nhân bản đề này?")) try { await axios.post(`${API_BASE}/api/exam/duplicate/${id}`); alert("Đã nhân bản!"); window.location.reload(); } catch(e){alert("Lỗi");} };
            const handleRename = async (id, old) => { const n=prompt("Tên mới:", old); if(n) try { await axios.put(`${API_BASE}/api/exam/rename/${id}`, {new_title: n}); window.location.reload(); } catch(e){} };

            return (
                <div className="max-w-6xl mx-auto p-6">
                    {qrLink && <QRModal link={qrLink} onClose={()=>setQrLink(null)} />}
                    <div className="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow border border-indigo-100">
                        <div className="flex items-center gap-4"><div className="w-12 h-12 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-2xl"><i className="fas fa-user-tie"></i></div><div><h1 className="text-2xl font-bold text-gray-800">Quản Lý Thi</h1><p className="text-gray-500">{userEmail}</p></div></div>
                        <div className="flex gap-2"><button onClick={()=>window.location.href='index.html'} className="px-4 py-2 border rounded hover:bg-gray-50 font-bold text-gray-600">Home</button><button onClick={onCreateNew} className="bg-indigo-600 text-white px-4 py-2 rounded font-bold hover:bg-indigo-700 shadow"><i className="fas fa-plus"></i> Tạo Đề Mới</button></div>
                    </div>
                    <div className="bg-white rounded-xl shadow overflow-hidden">
                        <table className="w-full text-left"><thead className="bg-gray-50 border-b"><tr><th className="p-4">Kỳ Thi</th><th className="p-4">Thời Gian</th><th className="p-4 text-right">Công Cụ</th></tr></thead><tbody>
                            {exams.map((ex) => (<tr key={ex.id} className="border-b hover:bg-indigo-50/30"><td className="p-4"><div className="font-bold text-lg text-indigo-900">{ex.title}</div><div className="text-xs text-gray-500">{ex.school}</div></td><td className="p-4 text-sm text-gray-600">{ex.duration_mins} phút</td><td className="p-4 text-right"><div className="flex justify-end gap-2">
                                <button onClick={()=>setQrLink(`${window.location.href.split('?')[0]}?mode=student&examId=${ex.id}`)} className="bg-blue-100 text-blue-600 p-2 rounded" title="QR Code"><i className="fas fa-qrcode"></i></button>
                                <button onClick={()=>onEdit(ex.id)} className="bg-yellow-100 text-yellow-600 p-2 rounded" title="Sửa đề"><i className="fas fa-edit"></i></button>
                                <button onClick={()=>handleDuplicate(ex.id)} className="bg-purple-100 text-purple-600 p-2 rounded" title="Nhân bản"><i className="fas fa-copy"></i></button>
                                <button onClick={()=>handleRename(ex.id, ex.title)} className="bg-gray-100 text-gray-600 p-2 rounded" title="Đổi tên"><i className="fas fa-i-cursor"></i></button>
                                <button onClick={()=>onViewDetail(ex.id)} className="bg-green-100 text-green-600 p-2 rounded" title="Kết quả"><i className="fas fa-chart-bar"></i></button>
                                <button onClick={()=>handleDelete(ex.id)} className="bg-red-100 text-red-600 p-2 rounded" title="Xóa"><i className="fas fa-trash"></i></button>
                            </div></td></tr>))}
                        </tbody></table>
                    </div>
                </div>
            );
        };

        const StudentView = ({ examId }) => { 
            const [step, setStep] = useState("info");
            const [info, setInfo] = useState({ name: "", class: "", sbd: "" });
            const [exam, setExam] = useState(null);
            const [answers, setAnswers] = useState({});
            const [timeLeft, setTimeLeft] = useState(0);
            
            useEffect(() => { axios.get(`${API_BASE}/api/exam/get/${examId}`).then(res => { setExam(res.data); setTimeLeft(res.data.info.duration_mins*60); }).catch(()=>alert("Lỗi tải đề!")); }, [examId]);
            useEffect(() => { if(step==="exam") { const t = setInterval(()=>setTimeLeft(v=>{if(v<=1){handleSubmit(true);return 0;}return v-1;}),1000); return ()=>clearInterval(t); } }, [step]);
            
            const handleStart = () => { if(!info.name || !info.sbd) return alert("Nhập tên & SBD!"); document.documentElement.requestFullscreen().catch(()=>{}); setStep("exam"); };
            const handleSubmit = async (auto=false) => { 
                if(!auto && !confirm("Nộp bài?")) return;
                try { const res = await axios.post(`${API_BASE}/api/exam/submit`, { exam_id: examId, student_name: info.name, sbd: info.sbd, student_class: info.class, answers: answers }); setExam(res.data); setStep("result"); document.exitFullscreen().catch(()=>{}); } catch(e) { alert("Lỗi nộp!"); }
            };

            if(!exam) return <div className="flex justify-center h-screen items-center"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div></div>;
            if(step==="info") return <div className="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg text-center"><h2 className="text-2xl font-bold mb-4 text-indigo-800">{exam.info.title}</h2><p className="mb-6 text-gray-500">Thời gian: {exam.info.duration_mins} phút</p><input className="border p-3 w-full mb-3 rounded" placeholder="Họ và Tên" onChange={e=>setInfo({...info, name: e.target.value})}/><input className="border p-3 w-full mb-3 rounded" placeholder="Lớp" onChange={e=>setInfo({...info, class: e.target.value})}/><input className="border p-3 w-full mb-6 rounded" placeholder="SBD" onChange={e=>setInfo({...info, sbd: e.target.value})}/><button onClick={handleStart} className="bg-indigo-600 text-white w-full py-3 rounded font-bold shadow hover:bg-indigo-700">VÀO THI</button></div>;
            if(step==="result") return <div className="min-h-screen bg-green-50 flex items-center justify-center"><div className="bg-white p-10 rounded-xl shadow-lg text-center max-w-2xl"><h2 className="text-3xl font-bold text-gray-800 mb-2">Hoàn Thành!</h2><p className="text-xl text-indigo-600 font-bold mb-4">Điểm số: {exam.score}</p><div className="bg-gray-50 p-4 rounded text-left text-sm text-gray-700 italic border-l-4 border-indigo-500">💡 Nhận xét: {exam.feedback}</div></div></div>;

            return (
                <div className="fixed top-0 left-0 w-full h-full bg-white z-50 overflow-y-auto">
                    <div className="max-w-4xl mx-auto pb-20">
                        <div className="sticky top-0 bg-white/95 backdrop-blur shadow p-4 rounded-b-xl flex justify-between items-center z-20 mb-6 border-t-4 border-indigo-600"><div><div className="font-bold text-gray-800">{info.name}</div><div className="text-xs text-gray-500">{info.sbd}</div></div><div className="font-mono text-2xl font-bold text-red-600">{Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,'0')}</div><button onClick={()=>handleSubmit(false)} className="bg-indigo-600 text-white px-4 py-2 rounded font-bold hover:bg-indigo-700">Nộp Bài</button></div>
                        {exam.questions.map((q, i) => (
                            <div key={i} className="bg-white p-6 rounded-xl shadow-sm mb-6 border border-gray-100">
                                <div className="flex gap-3 mb-4"><span className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded font-bold h-fit text-sm">Câu {i+1}</span><div className="flex-1"><div className="text-lg font-medium text-gray-800"><MathText text={q.question}/></div></div></div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 pl-2">{q.options.map((o, idx) => (<div key={idx} onClick={()=>setAnswers({...answers, [i]: idx})} className={`p-3 rounded-lg border cursor-pointer flex gap-3 items-center ${answers[i]===idx?'border-indigo-500 bg-indigo-50 ring-1 ring-indigo-200':'border-gray-200 hover:bg-gray-50'}`}><div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${answers[i]===idx?'bg-indigo-600 text-white':'bg-gray-200 text-gray-600'}`}>{String.fromCharCode(65+idx)}</div><div className="text-gray-700"><MathText text={o}/></div></div>))}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ResultDetail = ({ examId, onBack }) => {
            const [results, setResults] = useState([]);
            useEffect(() => { axios.get(`${API_BASE}/api/exam/results/${examId}`).then(res => setResults(res.data)); }, [examId]);
            const exportExcel = () => { if(!results.length) return; const ws = XLSX.utils.json_to_sheet(results); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "KQ"); XLSX.writeFile(wb, "KetQua.xlsx"); };
            return (
                <div className="max-w-6xl mx-auto p-6">
                    <div className="flex justify-between mb-6"><button onClick={onBack} className="text-gray-500 font-bold"><i className="fas fa-arrow-left"></i> Quay lại</button><button onClick={exportExcel} className="bg-green-600 text-white px-4 py-2 rounded font-bold hover:bg-green-700"><i className="fas fa-file-excel mr-2"></i> Xuất Excel</button></div>
                    <div className="bg-white rounded-xl shadow overflow-hidden"><table className="w-full text-left"><thead className="bg-gray-50 border-b"><tr><th className="p-4">SBD</th><th className="p-4">Tên</th><th className="p-4">Lớp</th><th className="p-4">Điểm</th><th className="p-4">Nhận xét</th></tr></thead><tbody>{results.map((r,i)=>(<tr key={i} className="border-b hover:bg-gray-50"><td className="p-4">{r.sbd}</td><td className="p-4 font-bold text-indigo-900">{r.student_name}</td><td className="p-4">{r.student_class}</td><td className="p-4 font-bold text-red-600">{r.score}</td><td className="p-4 text-sm text-gray-600 italic">{r.ai_feedback}</td></tr>))}</tbody></table></div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState("dashboard"); 
            const [selectedId, setSelectedId] = useState(null);
            const [isStudent, setIsStudent] = useState(false);
            const [editingData, setEditingData] = useState(null);

            useEffect(() => { 
                const p = new URLSearchParams(window.location.search); 
                if(p.get("mode") === "student") { setSelectedId(p.get("examId")); setIsStudent(true); } 
                else if(!userEmail) window.location.href='login.html'; 
            }, []);

            const handleEdit = async (id) => {
                try {
                    const res = await axios.get(`${API_BASE}/api/exam/get/${id}`);
                    setEditingData(res.data);
                    setView("create");
                } catch(e) { alert("Lỗi tải đề: " + e.message); }
            };

            if(isStudent) return <StudentView examId={selectedId} />;

            return (
                <div>
                    {view==="dashboard" && <TeacherDashboard onCreateNew={()=>{setEditingData(null); setView("create");}} onEdit={handleEdit} onViewDetail={(id)=>{setSelectedId(id); setView("detail")}} />}
                    {view==="create" && <HybridExamCreator initialData={editingData} onBack={()=>setView("dashboard")} />}
                    {view==="detail" && <ResultDetail examId={selectedId} onBack={()=>setView("dashboard")} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
