<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Thi Trực Tuyến Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .katex { font-size: 1.1em; color: #1e3a8a; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 50; display: flex; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE = "https://hoangthiencm-giangbai.hf.space"; 

        // --- UTILS ---
        const userEmail = localStorage.getItem('userEmail');
        const formatDate = (isoString) => isoString ? new Date(isoString).toLocaleString('vi-VN') : "";

        const cleanOptionText = (text) => {
            if(!text) return "";
            return text.replace(/^([A-Da-d0-9]+)([\.\)\:\-])\s*/, '').trim();
        };

        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if (!text) return;
                let processedText = text;
                if (!text.includes('$') && (text.includes('\\{') || text.includes('\\['))) {
                    processedText = `$${text}$`;
                }
                const parts = processedText.split(/(\$[^$]+\$)/g);
                ref.current.innerHTML = "";
                parts.forEach(part => {
                    if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false }); } catch { span.innerText = part; }
                        ref.current.appendChild(span);
                    } else { ref.current.appendChild(document.createTextNode(part)); }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        const QRModal = ({ link, onClose }) => {
            const qrRef = useRef();
            useEffect(() => {
                if(qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { text: link, width: 200, height: 200 });
                }
            }, [link]);
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e=>e.stopPropagation()}>
                        <h3 className="font-bold text-lg mb-2 text-indigo-800">Quét mã để vào thi</h3>
                        <div ref={qrRef} className="flex justify-center my-4"></div>
                        <input value={link} readOnly className="w-full border p-2 rounded text-xs bg-gray-50 mb-3"/>
                        <button onClick={onClose} className="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">Đóng</button>
                    </div>
                </div>
            );
        };

        // --- COMPONENT: REVIEW EXAM (Bước Duyệt Đề) ---
        const ReviewExam = ({ questions, onSave, onBack, onUpdateQuestions }) => {
            // Cho phép sửa câu hỏi và chọn đáp án đúng
            const handleOptionChange = (qIndex, optIndex) => {
                const newQs = [...questions];
                newQs[qIndex].correct_index = optIndex;
                onUpdateQuestions(newQs);
            };

            const handleTextChange = (qIndex, field, value, optIndex = null) => {
                const newQs = [...questions];
                if (optIndex !== null) newQs[qIndex].options[optIndex] = value;
                else newQs[qIndex][field] = value;
                onUpdateQuestions(newQs);
            };

            return (
                <div className="max-w-5xl mx-auto p-4">
                    <div className="bg-white p-6 rounded-xl shadow-lg mb-6 sticky top-0 z-10 border-b border-indigo-100">
                        <div className="flex justify-between items-center">
                            <h2 className="text-2xl font-bold text-indigo-800">Duyệt Đề ({questions.length} câu)</h2>
                            <div className="flex gap-2">
                                <button onClick={onBack} className="bg-gray-200 text-gray-700 px-4 py-2 rounded font-bold hover:bg-gray-300">Hủy</button>
                                <button onClick={onSave} className="bg-green-600 text-white px-6 py-2 rounded font-bold hover:bg-green-700 shadow flex items-center gap-2">
                                    <i className="fas fa-check"></i> HOÀN TẤT & TỔ CHỨC THI
                                </button>
                            </div>
                        </div>
                        <p className="text-sm text-red-500 mt-2 italic">* Vui lòng kiểm tra kỹ nội dung và chọn đáp án đúng trước khi lưu.</p>
                    </div>

                    <div className="space-y-4">
                        {questions.map((q, i) => (
                            <div key={i} className={`bg-white p-6 rounded-lg shadow border ${q.correct_index === -1 ? 'border-red-300 bg-red-50' : 'border-gray-200'}`}>
                                <div className="flex justify-between mb-2">
                                    <span className="font-bold text-indigo-700">Câu {i + 1}</span>
                                    {q.correct_index === -1 && <span className="text-xs bg-red-100 text-red-600 px-2 py-1 rounded font-bold">Chưa chọn đáp án</span>}
                                </div>
                                
                                {/* Edit Question */}
                                <textarea 
                                    className="w-full p-2 border rounded mb-3 font-medium focus:ring-2 focus:ring-blue-200"
                                    value={q.question}
                                    onChange={(e) => handleTextChange(i, 'question', e.target.value)}
                                    rows={2}
                                />

                                {/* Options */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    {q.options.map((opt, idx) => (
                                        <div key={idx} className={`flex items-center gap-2 p-2 rounded border ${q.correct_index === idx ? 'bg-green-100 border-green-500' : 'bg-gray-50'}`}>
                                            <input 
                                                type="radio" 
                                                name={`q-${i}`} 
                                                checked={q.correct_index === idx} 
                                                onChange={() => handleOptionChange(i, idx)}
                                                className="w-5 h-5 cursor-pointer"
                                            />
                                            <input 
                                                className="flex-1 bg-transparent border-none outline-none"
                                                value={opt}
                                                onChange={(e) => handleTextChange(i, 'options', e.target.value, idx)}
                                            />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 1. DASHBOARD ---
        const TeacherDashboard = ({ onViewDetail, onCreateNew }) => {
            const [exams, setExams] = useState([]);
            const [loading, setLoading] = useState(false);
            const [qrLink, setQrLink] = useState(null);

            useEffect(() => {
                if (userEmail) {
                    setLoading(true);
                    axios.get(`${API_BASE}/api/exam/my-exams?email=${userEmail}`)
                        .then(res => setExams(res.data))
                        .catch(err => console.error(err))
                        .finally(() => setLoading(false));
                }
            }, []);

            const handleDelete = async (id) => {
                if(!confirm("Xóa đề này?")) return;
                try {
                    await axios.delete(`${API_BASE}/api/exam/delete/${id}`);
                    alert("Đã xóa!"); 
                    // Reload list local
                    setExams(exams.filter(e => e.id !== id));
                } catch(e) { alert("Lỗi xóa"); }
            };

            return (
                <div className="max-w-6xl mx-auto p-6 fade-in">
                    {qrLink && <QRModal link={qrLink} onClose={()=>setQrLink(null)} />}
                    
                    <div className="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow border border-indigo-100">
                        <div className="flex items-center gap-4">
                             <div className="w-12 h-12 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-2xl"><i className="fas fa-user-tie"></i></div>
                             <div><h1 className="text-2xl font-bold text-gray-800">Quản Lý Thi</h1><p className="text-gray-500">{userEmail}</p></div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={()=>window.location.href='index.html'} className="px-4 py-2 border rounded hover:bg-gray-50 font-bold text-gray-600"><i className="fas fa-home"></i> Home</button>
                            <button onClick={onCreateNew} className="bg-indigo-600 text-white px-4 py-2 rounded font-bold hover:bg-indigo-700 shadow"><i className="fas fa-plus"></i> Tạo Đề</button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-gray-50 border-b"><tr><th className="p-4">Kỳ Thi</th><th className="p-4">Thời Gian</th><th className="p-4 text-right">Công Cụ</th></tr></thead>
                            <tbody>
                                {exams.map((ex) => (
                                    <tr key={ex.id} className="border-b hover:bg-indigo-50/30">
                                        <td className="p-4"><div className="font-bold text-lg text-indigo-900">{ex.title}</div><div className="text-xs text-gray-500">{ex.school}</div></td>
                                        <td className="p-4 text-sm text-gray-600">{formatDate(ex.start_time)} - {formatDate(ex.end_time)}</td>
                                        <td className="p-4 text-right">
                                            <div className="flex justify-end gap-2">
                                                <button onClick={()=>setQrLink(`${window.location.href.split('?')[0]}?mode=student&examId=${ex.id}`)} className="bg-blue-100 text-blue-600 p-2 rounded"><i className="fas fa-qrcode"></i></button>
                                                <button onClick={()=>onViewDetail(ex.id)} className="bg-green-100 text-green-600 p-2 rounded"><i className="fas fa-chart-bar"></i></button>
                                                <button onClick={()=>handleDelete(ex.id)} className="bg-red-100 text-red-600 p-2 rounded"><i className="fas fa-trash"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {exams.length===0 && <div className="p-10 text-center text-gray-400">Chưa có đề thi nào.</div>}
                    </div>
                </div>
            );
        };

        // --- 2. TẠO ĐỀ (WIZARD) ---
        const CreateExam = ({ onBack }) => {
            const [step, setStep] = useState("upload"); // upload -> review
            const [form, setForm] = useState({ title: "", school: "", subject: "", grade: "", duration: 45, startTime: "", endTime: "" });
            const [apiKeys, setApiKeys] = useState([]);
            const [fileName, setFileName] = useState("");
            const [loading, setLoading] = useState(false);
            const [parsedQuestions, setParsedQuestions] = useState([]);
            const fileRef = useRef();

            useEffect(() => {
                const savedKeys = localStorage.getItem('global_gemini_keys');
                if (savedKeys) setApiKeys(JSON.parse(savedKeys));
            }, []);

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if(file) setFileName(file.name);
            }

            // BƯỚC 1: PARSE ĐỀ (Gửi lên AI đọc)
            const handleParse = async () => {
                if (apiKeys.length === 0) return alert("Thiếu API Key!");
                if (!form.title || !form.startTime) return alert("Nhập đủ thông tin!");
                const file = fileRef.current.files[0];
                if (!file) return alert("Thiếu file!");
                
                setLoading(true);
                const fd = new FormData();
                fd.append("file", file);
                fd.append("api_keys_json", JSON.stringify(apiKeys));

                try {
                    const res = await axios.post(`${API_BASE}/api/exam/parse`, fd);
                    setParsedQuestions(res.data.questions);
                    setStep("review"); // Chuyển sang bước duyệt
                } catch (e) { 
                    alert("Lỗi đọc file: " + (e.response?.data?.detail || e.message));
                } 
                finally { setLoading(false); }
            };

            // BƯỚC 2: SAVE ĐỀ (Lưu vào DB)
            const handleSave = async () => {
                setLoading(true);
                const payload = {
                    ...form,
                    api_keys: apiKeys,
                    teacher_email: userEmail,
                    questions: parsedQuestions
                };

                try {
                    await axios.post(`${API_BASE}/api/exam/save`, payload);
                    alert("✅ Tạo đề thi thành công!"); 
                    onBack();
                } catch (e) {
                    alert("Lỗi lưu DB: " + e.message);
                } finally { setLoading(false); }
            };

            if (step === "review") {
                return (
                    <ReviewExam 
                        questions={parsedQuestions} 
                        onUpdateQuestions={setParsedQuestions}
                        onSave={handleSave}
                        onBack={()=>setStep("upload")}
                    />
                );
            }

            return (
                <div className="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg">
                    <button onClick={onBack} className="mb-4 text-gray-500 font-bold"><i className="fas fa-arrow-left"></i> Quay lại</button>
                    <h2 className="text-2xl font-bold text-indigo-700 mb-6">Bước 1: Thiết lập & Upload</h2>
                    
                    <div className="grid grid-cols-2 gap-4 mb-4">
                        <input className="border p-3 rounded" placeholder="Tên Kỳ Thi (VD: Kiểm tra 15p)" value={form.title} onChange={e=>setForm({...form, title: e.target.value})} />
                        <input className="border p-3 rounded" placeholder="Trường" value={form.school} onChange={e=>setForm({...form, school: e.target.value})} />
                    </div>
                    
                    <div className="grid grid-cols-3 gap-4 mb-4">
                        <div><label className="text-xs font-bold">Thời lượng (phút)</label><input type="number" className="border p-3 rounded w-full" value={form.duration} onChange={e=>setForm({...form, duration: e.target.value})} /></div>
                        <div><label className="text-xs font-bold">Bắt đầu</label><input type="datetime-local" className="border p-3 rounded w-full" onChange={e=>setForm({...form, startTime: e.target.value})} /></div>
                        <div><label className="text-xs font-bold">Kết thúc</label><input type="datetime-local" className="border p-3 rounded w-full" onChange={e=>setForm({...form, endTime: e.target.value})} /></div>
                    </div>
                    
                    <div className="mb-6 border-2 border-dashed border-indigo-200 p-6 text-center rounded hover:bg-indigo-50 cursor-pointer transition" onClick={()=>fileRef.current.click()}>
                        <input ref={fileRef} type="file" accept=".docx,.pdf" className="hidden" onChange={handleFileSelect}/>
                        {fileName ? <p className="text-green-600 font-bold">{fileName}</p> : <><i className="fas fa-cloud-upload-alt text-4xl text-indigo-400 mb-2"></i><p>Chọn file đề thi (Word/PDF)</p></>}
                    </div>
                    
                    <button onClick={handleParse} disabled={loading || apiKeys.length===0} className="w-full bg-indigo-600 text-white py-3 rounded font-bold hover:bg-indigo-700 disabled:opacity-50 flex justify-center items-center gap-2">
                        {loading ? <><i className="fas fa-spinner fa-spin"></i> Đang phân tích đề...</> : "Tiếp tục: Duyệt Đề"}
                    </button>
                </div>
            );
        };

        // --- 3. HỌC SINH THI ---
        const StudentView = ({ examId }) => {
            const [step, setStep] = useState("check");
            const [info, setInfo] = useState({ name: "", class: "", sbd: "" });
            const [exam, setExam] = useState(null);
            const [answers, setAnswers] = useState({});
            const [timeLeft, setTimeLeft] = useState(0);
            const [examCode, setExamCode] = useState(""); // Mã đề ngẫu nhiên

            useEffect(() => {
                // Sinh mã đề ngẫu nhiên khi vào trang (User Requirement #3)
                setExamCode(Math.floor(Math.random() * 899) + 100);
                
                axios.get(`${API_BASE}/api/exam/get/${examId}`).then(res => {
                    const data = res.data;
                    setExam(data); setStep("info");
                    setTimeLeft(data.info.duration_mins * 60);
                }).catch(() => alert("Lỗi tải đề!"));
            }, [examId]);

            useEffect(() => {
                if (step !== "exam") return;
                if (timeLeft <= 0) { handleSubmit(true); return; }
                const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                return () => clearInterval(timer);
            }, [step, timeLeft]);

            const handleStart = () => {
                if(!info.name) return alert("Nhập tên!");
                // Trộn đề ngẫu nhiên cho thiết bị này
                const shuffled = exam.questions.map((q,i)=>({...q, originalIndex:i})).sort(()=>Math.random()-0.5);
                setExam({...exam, questions: shuffled});
                setStep("exam");
            };

            const handleSubmit = async (auto = false) => {
                if (!auto && !confirm("Nộp bài?")) return;
                const payload = { exam_id: examId, student_name: info.name, sbd: info.sbd, student_class: info.class, answers: {} };
                // Map lại đáp án về đúng câu hỏi gốc (dù đã trộn)
                exam.questions.forEach((q, i) => { if (answers[i] !== undefined) payload.answers[q.originalIndex] = answers[i]; });
                
                try {
                    const res = await axios.post(`${API_BASE}/api/exam/submit`, payload);
                    setStep("result"); setExam(res.data);
                } catch(e) { alert("Lỗi nộp bài!"); }
            };

            if(step === "info") return (
                <div className="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow text-center">
                    <h2 className="text-xl font-bold">{exam?.info?.title}</h2>
                    <div className="bg-blue-50 text-blue-800 p-2 rounded my-4 font-mono text-lg">Mã đề của bạn: <b>{examCode}</b></div>
                    <input className="border p-3 rounded w-full mb-3" placeholder="Họ và tên" onChange={e=>setInfo({...info, name: e.target.value})}/>
                    <input className="border p-3 rounded w-full mb-3" placeholder="Lớp" onChange={e=>setInfo({...info, class: e.target.value})}/>
                    <button onClick={handleStart} className="bg-indigo-600 text-white w-full py-3 rounded font-bold">VÀO THI</button>
                </div>
            );

            if(step === "result") return (
                <div className="min-h-screen bg-green-50 flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-xl shadow-xl text-center w-full max-w-lg">
                        <div className="text-6xl mb-4">🎉</div>
                        <h2 className="text-2xl font-bold text-green-700">Kết Quả</h2>
                        <p className="text-5xl font-extrabold my-4 text-indigo-600">{exam.score} <span className="text-xl text-gray-400">điểm</span></p>
                        <div className="bg-yellow-50 p-4 rounded text-left text-sm text-gray-700 border border-yellow-200">
                            <p className="font-bold text-yellow-800 mb-2"><i className="fas fa-comment-dots"></i> Nhận xét của AI:</p>
                            {exam.feedback}
                        </div>
                    </div>
                </div>
            );

            if(step === "exam") return (
                <div className="max-w-3xl mx-auto p-4 pb-20">
                    <div className="sticky top-0 bg-white p-4 shadow-md z-10 flex justify-between items-center rounded-lg mb-4">
                        <div><b>{info.name}</b> <span className="text-xs bg-gray-200 px-2 rounded">Mã {examCode}</span></div>
                        <div className="flex items-center gap-4">
                            <span className="font-mono font-bold text-xl text-blue-600">{Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,'0')}</span>
                            <button onClick={()=>handleSubmit(false)} className="bg-green-600 text-white px-4 py-2 rounded font-bold">Nộp</button>
                        </div>
                    </div>
                    {exam.questions.map((q, i) => (
                        <div key={i} className="bg-white p-6 rounded-lg shadow-sm border border-gray-100 mb-4">
                            <div className="flex gap-2 mb-3"><span className="font-bold text-blue-600">Câu {i+1}:</span> <MathText text={q.question}/></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 ml-4">
                                {q.options.map((o, idx) => (
                                    <div key={idx} onClick={()=>setAnswers({...answers, [i]: idx})} className={`p-3 border rounded cursor-pointer flex items-center gap-2 transition ${answers[i]===idx?'bg-blue-100 border-blue-500':'hover:bg-gray-50'}`}>
                                        <span className={`w-6 h-6 flex items-center justify-center rounded-full font-bold text-xs ${answers[i]===idx ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700'}`}>{String.fromCharCode(65+idx)}</span>
                                        <MathText text={cleanOptionText(o)}/>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
            return <div>Loading...</div>;
        };

        const App = () => {
            const [view, setView] = useState("dashboard");
            const [selectedId, setSelectedId] = useState(null);
            const [isStudent, setIsStudent] = useState(false);
            const [needsLogin, setNeedsLogin] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if(params.get("mode") === "student") { 
                    setSelectedId(params.get("examId")); 
                    setIsStudent(true); 
                } else if(!userEmail) setNeedsLogin(true);
            }, []);

            const goToLogin = () => { try { window.location.href = 'login.html'; } catch(e) { alert("Mở file login.html thủ công"); } };

            if (needsLogin) return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100">
                    <div className="bg-white p-8 rounded-xl shadow-lg text-center max-w-sm">
                        <h2 className="text-xl font-bold mb-4">Yêu cầu đăng nhập</h2>
                        <button onClick={goToLogin} className="bg-indigo-600 text-white px-6 py-2 rounded font-bold">Đăng Nhập</button>
                    </div>
                </div>
            );

            if(isStudent) return <StudentView examId={selectedId} />;

            return (
                <div>
                    {view==="dashboard" && <TeacherDashboard onCreateNew={()=>setView("create")} onViewDetail={(id)=>{setSelectedId(id); setView("detail")}}/>}
                    {view==="create" && <CreateExam onBack={()=>setView("dashboard")}/>}
                    {/* ResultDetail component needs to be defined or imported if used */}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
