<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Thi Trực Tuyến Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- KaTeX cho hiển thị toán học -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .katex { font-size: 1.1em; color: #1e3a8a; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 50; display: flex; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; text-align: center; max-width: 600px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE = "https://hoangthiencm-giangbai.hf.space"; 
        const MODEL_NAME = "gemini-2.5-flash";

        // --- UTILS ---
        const userEmail = localStorage.getItem('userEmail');
        const formatDate = (isoString) => isoString ? new Date(isoString).toLocaleString('vi-VN') : "";

        // --- HELPER: LÀM SẠCH & CHUẨN HÓA FONT ---
        const normalizeText = (text) => text ? text.trim() : ""; 
        const cleanOptionText = (text) => {
            if (!text) return "";
            return text.replace(/^([A-Da-d0-9]+)([\.\)\:\-])\s+/, '');
        };

        // --- COMPONENT HIỂN THỊ TOÁN ---
        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if (!text) return;
                const parts = text.split(/(\$[^$]+\$)/g);
                if (ref.current) {
                    ref.current.innerHTML = "";
                    parts.forEach(part => {
                        if (part.startsWith("$") && part.endsWith("$")) {
                            const span = document.createElement("span");
                            try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); } 
                            catch { span.textContent = part; }
                            ref.current.appendChild(span);
                        } else {
                            ref.current.appendChild(document.createTextNode(part)); 
                        }
                    });
                }
            }, [text]);
            return <span ref={ref} className="math-content font-serif text-lg text-gray-800 inline-block leading-relaxed" />;
        };

        const QRModal = ({ link, onClose }) => {
            const qrRef = useRef();
            useEffect(() => {
                if(qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { text: link, width: 200, height: 200 });
                }
            }, [link]);
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e=>e.stopPropagation()}>
                        <h3 className="font-bold text-lg mb-2 text-indigo-800">Quét mã để vào thi</h3>
                        <div ref={qrRef} className="flex justify-center my-4"></div>
                        <input value={link} readOnly className="w-full border p-2 rounded text-xs bg-gray-50 mb-3"/>
                        <button onClick={onClose} className="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">Đóng</button>
                    </div>
                </div>
            );
        };

        const AnswerModal = ({ isOpen, onClose, onApply, apiKeys }) => {
            if (!isOpen) return null;
            const [text, setText] = useState("");
            const [status, setStatus] = useState("");
            
            const handlePaste = async (e) => {
                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.indexOf("image") !== -1) {
                        e.preventDefault();
                        if (apiKeys.length === 0) return alert("Cần có API Key để đọc ảnh!");
                        await processImage(item.getAsFile());
                        return;
                    }
                }
            };

            const processImage = async (blob) => {
                setStatus("🤖 AI đang quét ảnh tìm đáp án...");
                try {
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        const base64 = reader.result.split(',')[1];
                        const prompt = `Bạn là trợ lý chấm thi. Hãy nhìn vào ảnh và trích xuất đáp án đúng. Chỉ trả về chuỗi: 1A 2B 3C...`;
                        const currentKey = apiKeys[0];
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${currentKey}`, {
                            method: 'POST', headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ contents: [{parts: [{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: base64}}]}] })
                        });
                        const data = await res.json();
                        if (data.candidates) {
                            setText(prev => prev + (prev ? "\n" : "") + data.candidates[0].content.parts[0].text.trim());
                            setStatus("✅ Đã nhận diện xong!");
                        } else setStatus("⚠️ Không tìm thấy đáp án.");
                    };
                } catch (e) { setStatus("❌ Lỗi AI: " + e.message); }
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <h3 className="text-xl font-bold text-indigo-800 mb-4">Nạp Đáp Án</h3>
                        <div className="bg-indigo-50 p-3 rounded text-sm text-indigo-800 mb-3 text-left">
                            <b>Cách dùng:</b> Dán ảnh bảng đáp án (Ctrl+V) hoặc nhập 1A 2B...
                        </div>
                        {status && <div className="mb-2 text-sm font-bold text-green-600 animate-pulse">{status}</div>}
                        <textarea value={text} onChange={e => setText(e.target.value)} onPaste={handlePaste} className="w-full h-40 border p-3 rounded font-mono outline-none" placeholder="Dán ảnh hoặc nhập 1A 2B..."></textarea>
                        <div className="flex justify-end gap-3 mt-4">
                            <button onClick={onClose} className="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">Hủy</button>
                            <button onClick={() => { onApply(text); onClose(); }} className="px-6 py-2 bg-indigo-600 text-white rounded font-bold hover:bg-indigo-700 shadow">Cập Nhật</button>
                        </div>
                    </div>
                </div>
            );
        };

        const QuestionItem = ({ q, index, onUpdate, onOptionChange }) => {
            const [isEditing, setIsEditing] = useState(false);
            const handleQChange = (val) => onUpdate('question', val);
            const handleOptChange = (val, idx) => onUpdate('options', val, idx);

            if (isEditing) {
                return (
                    <div className="bg-white p-6 rounded-lg shadow-md border-2 border-blue-400 mb-6 relative">
                        <div className="absolute top-4 right-4 z-10">
                            <button onClick={() => setIsEditing(false)} className="bg-blue-600 text-white px-4 py-1.5 rounded text-sm font-bold hover:bg-blue-700 shadow flex items-center gap-1">
                                <i className="fas fa-check"></i> Xong
                            </button>
                        </div>
                        <div className="mb-3"><span className="font-bold text-blue-700 text-lg">Câu {index + 1} (Đang sửa):</span></div>
                        <div className="mb-4">
                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Nội dung câu hỏi</label>
                            <textarea className="w-full p-3 border rounded focus:ring-2 focus:ring-blue-200 outline-none font-medium bg-blue-50" value={q.question} onChange={(e) => handleQChange(e.target.value)} rows={3} />
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {q.options.map((opt, idx) => (
                                <div key={idx} className={`flex items-center gap-2 p-3 rounded border ${q.correct_index === idx ? 'border-green-500 bg-green-50' : 'border-gray-200'}`}>
                                    <input type="radio" name={`q-${index}`} checked={q.correct_index === idx} onChange={() => onOptionChange(idx)} className="w-5 h-5 cursor-pointer accent-green-600" />
                                    <div className="flex-1"><input className="w-full bg-transparent border-b border-gray-300 focus:border-blue-500 outline-none py-1" value={opt} onChange={(e) => handleOptChange(e.target.value, idx)} placeholder={`Đáp án ${String.fromCharCode(65+idx)}`}/></div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }
            return (
                <div className="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-6 hover:shadow-md transition relative group">
                    <div className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition duration-200">
                        <button onClick={() => setIsEditing(true)} className="bg-gray-100 text-gray-600 border border-gray-300 px-3 py-1.5 rounded text-sm font-bold hover:bg-blue-50 hover:text-blue-600 hover:border-blue-300 flex items-center gap-1 shadow-sm"><i className="fas fa-pencil-alt"></i> Sửa</button>
                    </div>
                    <div className="flex gap-2 mb-4 pr-20"><span className="font-bold text-indigo-800 whitespace-nowrap text-lg">Câu {index + 1}:</span><div className="font-medium text-gray-800 text-lg leading-relaxed"><MathText text={q.question} /></div></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {q.options.map((opt, idx) => (
                            <div key={idx} className={`flex items-start gap-3 p-3 rounded-lg border ${q.correct_index === idx ? 'bg-green-50 border-green-200 ring-1 ring-green-400' : 'bg-slate-50 border-transparent'}`}>
                                <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 mt-0.5 ${q.correct_index === idx ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-500'}`}>{String.fromCharCode(65+idx)}</div>
                                <div className={`text-base ${q.correct_index === idx ? 'font-medium text-green-900' : 'text-gray-700'}`}><MathText text={cleanOptionText(opt)} /></div>
                                {q.correct_index === idx && <i className="fas fa-check-circle text-green-500 ml-auto mt-1 text-lg"></i>}
                            </div>
                        ))}
                    </div>
                    {q.correct_index === -1 && (<div className="mt-4 text-red-600 text-sm font-bold bg-red-50 px-3 py-2 rounded border border-red-200 inline-block"><i className="fas fa-exclamation-triangle mr-1"></i> Chưa chọn đáp án đúng! Vui lòng bấm "Sửa".</div>)}
                </div>
            );
        };

        const ReviewExam = ({ questions, onSave, onBack, onUpdateQuestions, apiKeys }) => {
            const [showAnsModal, setShowAnsModal] = useState(false);
            const handleApplyAnswers = (text) => {
                const raw = text.toUpperCase().replace(/[^0-9A-D]/g, ' ');
                const regex = /(\d+)\s*([A-D])/g;
                let match, newMap = {};
                while ((match = regex.exec(raw)) !== null) newMap[parseInt(match[1]) - 1] = match[2].charCodeAt(0) - 65;
                const newQs = questions.map((q, i) => {
                    if (newMap[i] !== undefined) return { ...q, correct_index: newMap[i] };
                    return q;
                });
                onUpdateQuestions(newQs);
                alert(`Đã cập nhật đáp án cho ${Object.keys(newMap).length} câu!`);
            };
            const handleQuestionUpdate = (idx, field, value, optIdx = null) => {
                const newQs = [...questions];
                if (field === 'options') newQs[idx].options[optIdx] = value;
                else if (field === 'question') newQs[idx].question = value;
                onUpdateQuestions(newQs);
            };
            const handleCorrectChange = (qIdx, optIdx) => {
                const newQs = [...questions];
                newQs[qIdx].correct_index = optIdx;
                onUpdateQuestions(newQs);
            };
            return (
                <div className="max-w-5xl mx-auto p-4">
                    <AnswerModal isOpen={showAnsModal} onClose={()=>setShowAnsModal(false)} onApply={handleApplyAnswers} apiKeys={apiKeys} />
                    <div className="bg-white p-6 rounded-xl shadow-lg mb-6 sticky top-0 z-10 border-b border-indigo-100 flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-indigo-800">Duyệt Đề ({questions.length} câu)</h2>
                        <div className="flex gap-2">
                            <button onClick={()=>setShowAnsModal(true)} className="bg-orange-500 text-white px-4 py-2 rounded font-bold hover:bg-orange-600 shadow flex items-center gap-2"><i className="fas fa-magic"></i> Nạp Đáp Án</button>
                            <button onClick={onBack} className="bg-gray-200 text-gray-700 px-4 py-2 rounded font-bold hover:bg-gray-300">Hủy</button>
                            <button onClick={onSave} className="bg-green-600 text-white px-6 py-2 rounded font-bold hover:bg-green-700 shadow flex items-center gap-2"><i className="fas fa-check"></i> LƯU & TỔ CHỨC</button>
                        </div>
                    </div>
                    <div className="space-y-2 pb-20">
                        {questions.map((q, i) => (<QuestionItem key={i} q={q} index={i} onUpdate={(field, val, optIdx) => handleQuestionUpdate(i, field, val, optIdx)} onOptionChange={(optIdx) => handleCorrectChange(i, optIdx)}/>))}
                    </div>
                </div>
            );
        };

        const TeacherDashboard = ({ onViewDetail, onCreateNew }) => {
            const [exams, setExams] = useState([]);
            const [qrLink, setQrLink] = useState(null);
            useEffect(() => { if(userEmail) axios.get(`${API_BASE}/api/exam/my-exams?email=${userEmail}`).then(res => setExams(res.data)).catch(console.error); }, []);
            const handleDelete = async (id) => { if(confirm("Xóa?")) try { await axios.delete(`${API_BASE}/api/exam/delete/${id}`); alert("Xóa xong"); setExams(exams.filter(e=>e.id!==id)); } catch(e){alert("Lỗi");} };
            return (
                <div className="max-w-6xl mx-auto p-6 fade-in">
                    {qrLink && <QRModal link={qrLink} onClose={()=>setQrLink(null)} />}
                    <div className="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow border border-indigo-100">
                        <div className="flex items-center gap-4"><div className="w-12 h-12 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-2xl"><i className="fas fa-user-tie"></i></div><div><h1 className="text-2xl font-bold text-gray-800">Quản Lý Thi</h1><p className="text-gray-500">{userEmail}</p></div></div>
                        <div className="flex gap-2"><button onClick={()=>window.location.href='index.html'} className="px-4 py-2 border rounded hover:bg-gray-50 font-bold text-gray-600">Home</button><button onClick={onCreateNew} className="bg-indigo-600 text-white px-4 py-2 rounded font-bold hover:bg-indigo-700 shadow"><i className="fas fa-plus"></i> Tạo Đề</button></div>
                    </div>
                    <div className="bg-white rounded-xl shadow overflow-hidden">
                        <table className="w-full text-left"><thead className="bg-gray-50 border-b"><tr><th className="p-4">Kỳ Thi</th><th className="p-4">Thời Gian</th><th className="p-4 text-right">Công Cụ</th></tr></thead><tbody>
                            {exams.map((ex) => (<tr key={ex.id} className="border-b hover:bg-indigo-50/30"><td className="p-4"><div className="font-bold text-lg text-indigo-900">{ex.title}</div><div className="text-xs text-gray-500">{ex.school}</div></td><td className="p-4 text-sm text-gray-600">{formatDate(ex.start_time)} - {formatDate(ex.end_time)}</td><td className="p-4 text-right"><div className="flex justify-end gap-2"><button onClick={()=>setQrLink(`${window.location.href.split('?')[0]}?mode=student&examId=${ex.id}`)} className="bg-blue-100 text-blue-600 p-2 rounded"><i className="fas fa-qrcode"></i></button><button onClick={()=>onViewDetail(ex.id)} className="bg-green-100 text-green-600 p-2 rounded"><i className="fas fa-chart-bar"></i></button><button onClick={()=>handleDelete(ex.id)} className="bg-red-100 text-red-600 p-2 rounded"><i className="fas fa-trash"></i></button></div></td></tr>))}
                        </tbody></table>
                    </div>
                </div>
            );
        };

        const CreateExam = ({ onBack }) => {
            const [step, setStep] = useState("upload");
            const [form, setForm] = useState({ title: "", school: "", subject: "", grade: "", duration: 45, startTime: "", endTime: "" });
            const [apiKeys, setApiKeys] = useState([]);
            const [fileName, setFileName] = useState("");
            const [loading, setLoading] = useState(false);
            const [parsedQuestions, setParsedQuestions] = useState([]);
            const fileRef = useRef();

            useEffect(() => { const k = localStorage.getItem('global_gemini_keys'); if(k) setApiKeys(JSON.parse(k)); }, []);
            const handleFileSelect = (e) => { const f = e.target.files[0]; if(f) setFileName(f.name); }

            const handleParse = async () => {
                if (!apiKeys.length) return alert("Thiếu API Key!");
                if (!form.title || !form.startTime) return alert("Nhập thông tin!");
                if (!fileRef.current.files[0]) return alert("Thiếu file!");
                setLoading(true);
                const fd = new FormData();
                fd.append("file", fileRef.current.files[0]);
                fd.append("api_keys_json", JSON.stringify(apiKeys));
                try {
                    const res = await axios.post(`${API_BASE}/api/exam/parse`, fd);
                    const data = res.data;
                    if (!data.questions) throw new Error("Không có câu hỏi trả về");
                    const mapped = data.questions.map((q) => {
                        return { 
                            question: normalizeText(q.question), 
                            options: q.options.map(o => cleanOptionText(o)), 
                            correct_index: q.correct_index !== undefined ? q.correct_index : -1 
                        };
                    });
                    setParsedQuestions(mapped);
                    setStep("review");
                } catch (e) { alert("Lỗi đọc file: " + (e.response?.data?.detail || e.message)); } 
                finally { setLoading(false); }
            };

            const handleSave = async () => {
                setLoading(true);
                try {
                    const payload = {
                        title: form.title, school: form.school, subject: form.subject, grade: form.grade,
                        duration: form.duration, start_time: form.startTime, end_time: form.endTime,
                        api_keys: apiKeys, teacher_email: userEmail, questions: parsedQuestions
                    };
                    await axios.post(`${API_BASE}/api/exam/save`, payload);
                    alert("✅ Tạo đề thành công!"); onBack();
                } catch (e) { alert("Lỗi lưu: " + e.message); } finally { setLoading(false); }
            };

            if (step === "review") return <ReviewExam questions={parsedQuestions} onUpdateQuestions={setParsedQuestions} onSave={handleSave} onBack={()=>setStep("upload")} apiKeys={apiKeys} />;

            return (
                <div className="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg">
                    <button onClick={onBack} className="mb-4 text-gray-500 font-bold"><i className="fas fa-arrow-left"></i> Quay lại</button>
                    <h2 className="text-2xl font-bold text-indigo-700 mb-6">Bước 1: Thiết lập & Upload</h2>
                    <div className="grid grid-cols-2 gap-4 mb-4">
                        <input className="border p-3 rounded" placeholder="Tên Kỳ Thi" value={form.title} onChange={e=>setForm({...form, title: e.target.value})} />
                        <input className="border p-3 rounded" placeholder="Trường" value={form.school} onChange={e=>setForm({...form, school: e.target.value})} />
                    </div>
                    <div className="grid grid-cols-3 gap-4 mb-4">
                        <div><label className="text-xs font-bold">Thời lượng (phút)</label><input type="number" className="border p-3 rounded w-full" value={form.duration} onChange={e=>setForm({...form, duration: e.target.value})} /></div>
                        <div><label className="text-xs font-bold">Bắt đầu</label><input type="datetime-local" className="border p-3 rounded w-full" onChange={e=>setForm({...form, startTime: e.target.value})} /></div>
                        <div><label className="text-xs font-bold">Kết thúc</label><input type="datetime-local" className="border p-3 rounded w-full" onChange={e=>setForm({...form, endTime: e.target.value})} /></div>
                    </div>
                    <div className="mb-6 border-2 border-dashed border-indigo-200 p-6 text-center rounded hover:bg-indigo-50 cursor-pointer transition" onClick={()=>fileRef.current.click()}>
                        <input ref={fileRef} type="file" accept=".docx,.pdf" className="hidden" onChange={handleFileSelect}/>
                        {fileName ? <p className="text-green-600 font-bold">{fileName}</p> : <><i className="fas fa-cloud-upload-alt text-4xl text-indigo-400 mb-2"></i><p>Chọn file đề thi (Word/PDF)</p></>}
                    </div>
                    <button onClick={handleParse} disabled={loading || !apiKeys.length} className="w-full bg-indigo-600 text-white py-3 rounded font-bold hover:bg-indigo-700 disabled:opacity-50 flex justify-center items-center gap-2">{loading ? "Đang phân tích..." : "Tiếp tục: Duyệt Đề"}</button>
                </div>
            );
        };

        const ResultDetail = ({ examId, onBack }) => {
            const [results, setResults] = useState([]);
            useEffect(() => { const f = () => axios.get(`${API_BASE}/api/exam/results/${examId}`).then(res => setResults(res.data)); f(); const i = setInterval(f, 5000); return () => clearInterval(i); }, [examId]);
            const exportExcel = () => {
                const exportData = results.map((row, index) => {
                    let wrongDetailsStr = "Không có câu sai";
                    try {
                        if (row.details_json) {
                            const details = JSON.parse(row.details_json);
                            if (details.length > 0) {
                                wrongDetailsStr = details.map((d, i) => {
                                    return `${i+1}. ${d.question}\n   -> Chọn: ${d.student_choice} | Đáp án đúng: ${d.correct_answer}`;
                                }).join("\n\n");
                            }
                        }
                    } catch (e) { wrongDetailsStr = "Lỗi đọc dữ liệu chi tiết"; }
                    return {
                        "STT": index + 1, "Số Báo Danh": row.sbd, "Họ và Tên": row.student_name, "Lớp": row.student_class, "Điểm số": row.score,
                        "Số câu đúng": row.correct_count, "Số câu sai": row.total_questions - row.correct_count, "Tổng số câu": row.total_questions,
                        "Nhận xét của AI": row.ai_feedback, "Chi tiết các câu làm sai": wrongDetailsStr, "Thời gian nộp bài": new Date(row.created_at).toLocaleString('vi-VN')
                    };
                });
                const ws = XLSX.utils.json_to_sheet(exportData);
                ws['!cols'] = [{wch: 5}, {wch: 10}, {wch: 25}, {wch: 10}, {wch: 10}, {wch: 12}, {wch: 12}, {wch: 12}, {wch: 50}, {wch: 80}, {wch: 20}];
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "KetQuaThi");
                XLSX.writeFile(wb, `KetQua_Thi_${examId}.xlsx`);
            };
            return (
                <div className="max-w-6xl mx-auto p-6"><div className="flex justify-between mb-6"><button onClick={onBack} className="font-bold text-gray-500">Quay lại</button><button onClick={exportExcel} className="bg-green-600 text-white px-4 py-2 rounded font-bold hover:bg-green-700 shadow flex items-center gap-2"><i className="fas fa-file-excel"></i> Xuất Excel</button></div>
                <div className="bg-white rounded shadow overflow-hidden"><table className="w-full text-left"><thead className="bg-gray-100 border-b"><tr><th className="p-3">SBD</th><th className="p-3">Tên</th><th className="p-3">Lớp</th><th className="p-3">Điểm</th><th className="p-3">Nhận Xét</th></tr></thead><tbody>{results.map((r,i)=>(<tr key={i} className="border-b hover:bg-gray-50"><td className="p-3">{r.sbd}</td><td className="p-3 font-bold text-indigo-900">{r.student_name}</td><td className="p-3">{r.student_class}</td><td className="p-3 font-bold text-red-600">{r.score}</td><td className="p-3 text-sm italic text-gray-600">{r.ai_feedback}</td></tr>))}</tbody></table></div></div>
            );
        };

        const StudentView = ({ examId }) => {
            const [step, setStep] = useState("check");
            const [info, setInfo] = useState({ name: "", class: "", sbd: "" });
            const [exam, setExam] = useState(null);
            const [answers, setAnswers] = useState({});
            const [timeLeft, setTimeLeft] = useState(0);
            const [examCode, setExamCode] = useState("");
            const [warnings, setWarnings] = useState(0);
            const [aiGenerating, setAiGenerating] = useState(false);

            useEffect(() => {
                if (step !== "exam") return;
                const handleVisibilityChange = () => {
                    if (document.hidden) {
                        setWarnings(prev => {
                            const newVal = prev + 1;
                            if (newVal >= 3) { alert("Bạn đã vi phạm quy chế thi quá 3 lần. Hệ thống sẽ tự động nộp bài."); handleSubmit(true); } 
                            else { alert(`CẢNH BÁO: Bạn đã rời khỏi màn hình thi! (${newVal}/3)`); }
                            return newVal;
                        });
                    }
                };
                document.addEventListener("visibilitychange", handleVisibilityChange);
                return () => document.removeEventListener("visibilitychange", handleVisibilityChange);
            }, [step]);

            useEffect(() => { setExamCode(Math.floor(Math.random() * 899) + 100); axios.get(`${API_BASE}/api/exam/get/${examId}`).then(res => { setExam(res.data); setStep("info"); setTimeLeft(res.data.info.duration_mins * 60); }).catch(() => alert("Lỗi tải đề!")); }, [examId]);
            useEffect(() => { if (step === "exam") { if (timeLeft <= 0) handleSubmit(true); const t = setInterval(() => setTimeLeft(v => v - 1), 1000); return () => clearInterval(t); } }, [step, timeLeft]);

            const handleStart = () => { 
                if(!info.name || !info.class || !info.sbd) return alert("Vui lòng nhập đầy đủ Tên, Lớp, SBD!"); 
                setExam({...exam, questions: exam.questions.map((q,i)=>({...q, originalIndex:i})).sort(()=>Math.random()-0.5)}); 
                setStep("exam"); 
            };
            
            // --- HÀM GỌI AI NHẬN XÉT (Client Side) ---
            const generateAiFeedback = async (score, correctCount, totalQuestions) => {
                setAiGenerating(true);
                // Cố gắng lấy key từ local storage (của giáo viên nếu test chung máy) hoặc từ config
                // Lưu ý: Trong thực tế, student không có key này, đây là demo để chạy được trên máy test
                let apiKey = "";
                const localKeys = localStorage.getItem('global_gemini_keys');
                if (localKeys) {
                    const keys = JSON.parse(localKeys);
                    if (keys.length > 0) apiKey = keys[0];
                }
                
                if (!apiKey) {
                    // Nếu không có key, trả về default để không lỗi
                    setAiGenerating(false);
                    return "Chúc mừng bạn đã hoàn thành bài thi!";
                }

                try {
                    const prompt = `Bạn là giáo viên. Học sinh ${info.name} (Lớp ${info.class}) vừa làm bài thi.
                    Kết quả: ${score} điểm.
                    Số câu đúng: ${correctCount}/${totalQuestions}.
                    Hãy đưa ra một nhận xét ngắn gọn (dưới 50 từ), hài hước và động viên học sinh này dựa trên kết quả.
                    Dùng giọng điệu thân thiện.`;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    if (data.candidates && data.candidates[0].content) {
                        return data.candidates[0].content.parts[0].text;
                    }
                } catch (e) { console.error("AI Error:", e); }
                finally { setAiGenerating(false); }
                return "Đã ghi nhận kết quả thi.";
            };

            const handleSubmit = async (auto = false) => { 
                if (!auto && !confirm("Nộp?")) return; 
                
                // 1. Tính toán điểm số client-side để gọi AI ngay lập tức
                let correct = 0;
                let total = exam.questions.length;
                exam.questions.forEach((q, i) => {
                    const userAns = answers[i]; // answers theo index hiện tại (đã shuffle)
                    // Check đúng sai: so sánh userAns với correct_index của câu hỏi q
                    if (userAns !== undefined && userAns === q.correct_index) {
                        correct++;
                    }
                });
                const score = ((correct / total) * 10).toFixed(1);

                // 2. Gọi AI nhận xét
                const aiFeedback = await generateAiFeedback(score, correct, total);

                // 3. Gửi về server lưu trữ
                const payload = { 
                    exam_id: examId, 
                    student_name: info.name, 
                    sbd: info.sbd, 
                    student_class: info.class, 
                    answers: {},
                    // Gửi kèm feedback do client sinh ra (nếu server hỗ trợ lưu)
                    // Hoặc chỉ để hiển thị client
                }; 
                exam.questions.forEach((q, i) => { if (answers[i] !== undefined) payload.answers[q.originalIndex] = answers[i]; }); 
                
                try { 
                    const res = await axios.post(`${API_BASE}/api/exam/submit`, payload); 
                    // Merge kết quả từ server với feedback AI vừa tạo
                    setExam({ ...res.data, feedback: aiFeedback, score: score }); 
                    setStep("result"); 
                } catch(e) { alert("Lỗi nộp!"); } 
            };

            if(step === "check") return <div className="flex items-center justify-center h-screen"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div></div>;
            if(step === "info") return <div className="max-w-md mx-auto mt-10 bg-white p-8 rounded shadow text-center"><h2 className="text-xl font-bold"><MathText text={exam?.info?.title} /></h2><p className="text-sm text-gray-500 mb-4">Mã đề: {examCode}</p><input className="border p-2 w-full mb-2 rounded" placeholder="Họ và Tên" onChange={e=>setInfo({...info, name: e.target.value})}/><input className="border p-2 w-full mb-2 rounded" placeholder="Lớp (VD: 12A1)" onChange={e=>setInfo({...info, class: e.target.value})}/><input className="border p-2 w-full mb-4 rounded" placeholder="Số Báo Danh" onChange={e=>setInfo({...info, sbd: e.target.value})}/><button onClick={handleStart} className="bg-blue-600 text-white w-full py-2 rounded font-bold hover:bg-blue-700">VÀO THI</button></div>;
            
            if(step === "result") return (
                <div className="min-h-screen bg-green-50 flex items-center justify-center p-4">
                    <div className="bg-white p-10 rounded-xl shadow-xl text-center max-w-lg w-full">
                        <div className="text-6xl mb-4">🎉</div>
                        <h2 className="text-3xl font-bold text-green-700 mb-2">Hoàn thành!</h2>
                        <div className="text-5xl font-extrabold text-gray-800 mb-6">{exam.score} <span className="text-2xl text-gray-500 font-medium">điểm</span></div>
                        
                        <div className="bg-yellow-50 border border-yellow-200 p-4 rounded-lg text-left relative">
                            <div className="absolute -top-3 left-4 bg-yellow-100 text-yellow-800 text-xs font-bold px-2 py-1 rounded uppercase tracking-wide">
                                <i className="fas fa-robot mr-1"></i> AI Nhận Xét
                            </div>
                            <p className="mt-2 text-gray-700 italic text-lg leading-relaxed">
                                {aiGenerating ? "Đang suy nghĩ..." : `"${exam.feedback}"`}
                            </p>
                        </div>
                        
                        <button onClick={()=>window.location.reload()} className="mt-8 text-gray-400 hover:text-gray-600 text-sm underline">Làm bài khác</button>
                    </div>
                </div>
            );
            
            return <div className="max-w-3xl mx-auto p-4 pb-20 select-none"><div className="sticky top-0 bg-white p-4 shadow flex justify-between mb-4 z-50 rounded-lg"><div><b className="block">{info.name} - {info.class}</b>{warnings > 0 && <span className="text-red-500 text-xs font-bold">Vi phạm: {warnings}/3</span>}</div><div className="flex items-center gap-3"><span className={`font-mono font-bold text-xl ${timeLeft < 300 ? 'text-red-600 animate-pulse' : 'text-gray-700'}`}>{Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,'0')}</span><button onClick={()=>handleSubmit(false)} className="bg-green-600 text-white px-4 py-1 rounded shadow hover:bg-green-700">{aiGenerating ? "Đang nộp..." : "Nộp Bài"}</button></div></div>{exam.questions.map((q, i) => (<div key={i} className="bg-white p-6 rounded-lg shadow mb-4 border border-gray-100"><div className="flex gap-2 mb-3"><span className="font-bold text-indigo-600 whitespace-nowrap">Câu {i+1}:</span><div className="font-medium"><MathText text={q.question}/></div></div><div className="grid grid-cols-1 md:grid-cols-2 gap-3">{q.options.map((o, idx) => (<div key={idx} onClick={()=>setAnswers({...answers, [i]: idx})} className={`p-3 border rounded-lg cursor-pointer transition hover:bg-gray-50 flex items-start gap-2 ${answers[i]===idx?'bg-blue-50 border-blue-500 ring-1 ring-blue-500':''}`}><div className={`w-6 h-6 rounded-full border flex items-center justify-center text-xs font-bold flex-shrink-0 mt-0.5 ${answers[i]===idx ? 'bg-blue-500 text-white border-blue-500' : 'bg-gray-100 text-gray-500'}`}>{String.fromCharCode(65+idx)}</div><div className="text-sm"><MathText text={cleanOptionText(o)}/></div></div>))}</div></div>))}</div>;
        };

        const App = () => {
            const [view, setView] = useState("dashboard");
            const [selectedId, setSelectedId] = useState(null);
            const [isStudent, setIsStudent] = useState(false);
            const [needsLogin, setNeedsLogin] = useState(false);

            useEffect(() => { const p = new URLSearchParams(window.location.search); if(p.get("mode") === "student") { setSelectedId(p.get("examId")); setIsStudent(true); } else if(!userEmail) setNeedsLogin(true); }, []);
            const goToLogin = () => { try { window.location.href = 'login.html'; } catch(e) { alert("Mở file login.html thủ công"); } };

            if (needsLogin) return <div className="min-h-screen flex items-center justify-center bg-gray-100"><div className="bg-white p-8 rounded shadow text-center"><h2>Yêu cầu đăng nhập</h2><button onClick={goToLogin} className="bg-blue-600 text-white px-4 py-2 rounded mt-4">Đăng Nhập</button></div></div>;
            if(isStudent) return <StudentView examId={selectedId} />;

            return <div>{view==="dashboard" && <TeacherDashboard onCreateNew={()=>setView("create")} onViewDetail={(id)=>{setSelectedId(id); setView("detail")}}/>}{view==="create" && <CreateExam onBack={()=>setView("dashboard")}/>}{view==="detail" && <ResultDetail examId={selectedId} onBack={()=>setView("dashboard")}/>}</div>;
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
