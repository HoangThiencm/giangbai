<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Thi Trực Tuyến Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; overscroll-behavior: none; }
        .math-render { font-family: 'Times New Roman', serif; font-size: 1.15em; line-height: 1.6; }
        .math-render .katex { font-size: 1.1em; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Layout */
        .layout-grid { display: grid; grid-template-columns: 260px 420px 1fr; height: calc(100vh - 64px); }
        .col-panel { overflow-y: auto; border-right: 1px solid #ddd; background: white; display: flex; flex-direction: column; }
        .col-header { padding: 12px; font-weight: bold; background: #f8fafc; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; font-size: 0.9rem; color: #475569; display: flex; justify-content: space-between; align-items: center; }
        .col-content { padding: 12px; flex: 1; overflow-y: auto; }

        /* Items */
        .page-thumb { cursor: pointer; padding: 10px; border-bottom: 1px solid #f1f1f1; transition: background 0.2s; border-left: 4px solid transparent; }
        .page-thumb:hover { background: #f8fafc; }
        .page-thumb.active { background: #eef2ff; border-left-color: #4f46e5; }
        .page-thumb img { width: 100%; border: 1px solid #ddd; border-radius: 4px; display: block; margin-bottom: 8px; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: white; border-radius: 12px; width: 90%; max-width: 600px; padding: 24px; shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .modal-image-full { max-width: 95vw; max-height: 95vh; object-fit: contain; background: black; border-radius: 4px; }
        .close-btn-full { position: absolute; top: 20px; right: 20px; color: white; font-size: 2rem; cursor: pointer; z-index: 101; background: rgba(0,0,0,0.5); width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        /* Anti-Cheat */
        .noselect {
            -webkit-touch-callout: none; -webkit-user-select: none; -khtml-user-select: none;
            -moz-user-select: none; -ms-user-select: none; user-select: none;
        }
        
        /* Violation Overlay */
        .violation-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        
        /* Error Box */
        #react-error { display: none; padding: 20px; background: #fee2e2; color: #b91c1c; border: 1px solid #ef4444; margin: 20px; border-radius: 8px; }
        
        /* Chống in ấn */
        @media print { html { display: none; } }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="noselect" oncontextmenu="return false;">
    <div id="root"></div>
    <div id="react-error"></div>

    <script>
        window.onerror = function(msg, url, line, col, error) {
            const el = document.getElementById('react-error');
            el.style.display = 'block';
            el.innerHTML = `<strong>Lỗi Hệ Thống:</strong> ${msg}<br><small>${url}:${line}</small><br><pre>${error?.stack}</pre>`;
            return false;
        };
        
        // Chặn phím tắt cấp hệ thống trình duyệt
        document.addEventListener('keydown', function(e) {
            // F12, PrintScreen, Ctrl+U (Source), Ctrl+P (Print), Ctrl+Shift+I (DevTools)
            if (e.key === 'F12' || e.key === 'PrintScreen' || 
                (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 'p' || e.key === 'P' || e.key === 's' || e.key === 'S')) ||
                (e.ctrlKey && e.shiftKey && (e.key === 'i' || e.key === 'I'))) {
                e.preventDefault();
                e.stopPropagation();
                alert("CẢNH BÁO: Thao tác này bị cấm trong giờ thi!");
            }
        });
        
        // Xóa clipboard khi cố copy
        document.addEventListener('copy', function(e) {
            e.preventDefault();
            alert("Cấm sao chép!");
        });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const API_BASE = localStorage.getItem("omr_backend_url") || "https://hoangthiencm-giangbai.hf.space"; 
        
        // --- HELPER COMPONENTS ---
        
        const cleanOptionText = (text) => {
            if (!text) return "";
            return text.replace(/^([A-Da-d0-9]+)([\.\)\:\-])\s*/, '').replace(/\n/g, ' ').trim();
        };

        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if (!text || !ref.current) return;
                const el = ref.current;
                const parts = text.split(/(\$\$[\s\S]*?\$\$|\$[\s\S]*?\$)/g);
                el.innerHTML = '';
                parts.forEach(part => {
                    if (part.startsWith('$$') && part.endsWith('$$')) {
                        const span = document.createElement('span');
                        try { katex.render(part.slice(2, -2), span, { throwOnError: false, displayMode: true }); } catch(e) { span.innerText = part; }
                        el.appendChild(span);
                    } else if (part.startsWith('$') && part.endsWith('$')) {
                        const span = document.createElement('span');
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); } catch(e) { span.innerText = part; }
                        el.appendChild(span);
                    } else {
                        el.appendChild(document.createTextNode(part));
                    }
                });
            }, [text]);
            return <div ref={ref} className="math-render text-gray-800 leading-relaxed break-words"></div>;
        };

        const QRModal = ({ link, onClose }) => {
            const qrRef = useRef();
            useEffect(() => { if(qrRef.current) { qrRef.current.innerHTML = ""; new QRCode(qrRef.current, { text: link, width: 200, height: 200 }); } }, [link]);
            return <div className="modal-overlay" onClick={onClose}><div className="modal-box text-center" onClick={e=>e.stopPropagation()}><h3 className="font-bold text-lg mb-2 text-indigo-800">Quét mã để thi</h3><div ref={qrRef} className="flex justify-center my-4"></div><input value={link} readOnly className="w-full border p-2 rounded text-sm bg-gray-50 mb-3"/><button onClick={onClose} className="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600 w-full">Đóng</button></div></div>;
        };

        const ImageModal = ({ src, onClose }) => {
            if (!src) return null;
            return <div className="modal-overlay" onClick={onClose}><div className="close-btn-full" onClick={onClose}>&times;</div><img src={src} className="modal-image-full" onClick={(e) => e.stopPropagation()} /></div>;
        };

        const AnswerImportModal = ({ onClose, onImport }) => { 
            const [mode, setMode] = useState("manual"); const [textInput, setTextInput] = useState(""); const [loading, setLoading] = useState(false); const [preview, setPreview] = useState(null); const [aiResult, setAiResult] = useState(null); const fileInputRef = useRef();
            const processImage = async (dataUrl) => { setLoading(true); setPreview(dataUrl); try { const keys = JSON.parse(localStorage.getItem('global_gemini_keys') || "[]"); const model = localStorage.getItem('default_gemini_module') || 'gemini-2.5-flash'; const res = await axios.post(`${API_BASE}/api/exam/import_answer_sheet`, { image_data: dataUrl, api_keys: keys, model: model }); if (res.data.status === 'ok') setAiResult(res.data.data); else alert("Lỗi: " + res.data.message); } catch(err) { alert("Lỗi: " + err.message); } finally { setLoading(false); } };
            const handleManualImport = () => { const parts = textInput.toUpperCase().match(/(\d+)[\.\-\:\s]*([A-D])/g); if (!parts) return alert("Sai định dạng! VD: 1A 2B"); const results = parts.map(p => { const m = p.match(/(\d+)[\.\-\:\s]*([A-D])/); return { index: parseInt(m[1]), answer: m[2] }; }); onImport(results); onClose(); };
            const handlePaste = (e) => { const items = e.clipboardData.items; for (let i = 0; i < items.length; i++) { if (items[i].type.indexOf("image") !== -1) { e.preventDefault(); const file = items[i].getAsFile(); const reader = new FileReader(); reader.onload = (ev) => processImage(ev.target.result); reader.readAsDataURL(file); return; } } };
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-box" onClick={e=>e.stopPropagation()}>
                        <div className="flex justify-between mb-4"><h3 className="font-bold text-lg">Nạp Đáp Án</h3><button onClick={onClose}><i className="fas fa-times"></i></button></div>
                        <div className="flex gap-2 mb-4 border-b"><button onClick={()=>setMode("manual")} className={`px-4 py-2 border-b-2 ${mode==="manual"?"border-indigo-600 font-bold":"border-transparent text-gray-500"}`}>Nhập tay</button><button onClick={()=>setMode("image")} className={`px-4 py-2 border-b-2 ${mode==="image"?"border-indigo-600 font-bold":"border-transparent text-gray-500"}`}>Từ ảnh</button></div>
                        {mode === "manual" ? (<div><textarea value={textInput} onChange={e=>setTextInput(e.target.value)} className="w-full border p-2 rounded h-32 mb-4 font-mono text-sm" placeholder="VD: 1.A 2.B 3.C ..."></textarea><button onClick={handleManualImport} className="w-full bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700">Lưu</button></div>) : (
                            <div className="space-y-4">
                                <div className="relative border-2 border-dashed border-gray-300 rounded-lg bg-gray-50 p-4 text-center cursor-pointer" onPaste={handlePaste} tabIndex="0" onClick={(e)=>{if(!loading&&!preview&&!e.target.closest('.delete-btn')) fileInputRef.current.click()}}>
                                    {loading ? "Đang đọc..." : preview ? <div className="relative"><img src={preview} className="max-h-60 mx-auto"/><div className="delete-btn absolute top-0 right-0 bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center" onClick={(e)=>{e.stopPropagation();setPreview(null);setAiResult(null);fileInputRef.current.value=""}}>×</div></div> : "Chọn ảnh hoặc Dán (Ctrl+V)"}
                                    <input type="file" className="hidden" ref={fileInputRef} accept="image/*" onChange={(e)=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=(ev)=>processImage(ev.target.result);r.readAsDataURL(f)}}}/>
                                </div>
                                {aiResult && <button onClick={()=>{onImport(aiResult);onClose()}} className="w-full bg-green-600 text-white py-2 rounded font-bold">Xác nhận ({aiResult.length} câu)</button>}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const QuestionEditor = ({ q, idx, updateQuestion, deleteQuestion }) => { 
            const [isEditing, setIsEditing] = useState(false);
            const handlePasteImage = (e) => { const items = e.clipboardData.items; for (let i = 0; i < items.length; i++) { if (items[i].type.indexOf("image") !== -1) { e.preventDefault(); const file = items[i].getAsFile(); const reader = new FileReader(); reader.onload = function(ev) { updateQuestion(q.id, 'question_image', ev.target.result); }; reader.readAsDataURL(file); return; } } };
            return (
                <div className={`border rounded-lg p-3 shadow-sm transition relative bg-white group hover:border-indigo-400 ${isEditing ? 'ring-2 ring-indigo-100' : ''}`}>
                    <div className="flex justify-between mb-2">
                        <span className="text-xs font-bold text-gray-500 bg-gray-100 px-2 py-0.5 rounded">Câu {idx+1}</span>
                        <div className="flex gap-2">
                            <button onClick={()=>setIsEditing(!isEditing)} className="text-indigo-500 hover:text-indigo-700 text-xs font-bold"><i className={`fas ${isEditing?'fa-check':'fa-pencil-alt'}`}></i> {isEditing?'Xong':'Sửa'}</button>
                            <button onClick={()=>deleteQuestion(q.id)} className="text-red-400 hover:text-red-600 text-xs"><i className="fas fa-trash"></i></button>
                        </div>
                    </div>
                    {!isEditing && (
                        <div>
                            <div className="mb-2 text-sm"><MathText text={q.question}/></div>
                            {q.question_image && <img src={q.question_image} className="max-h-40 rounded border mb-2 object-contain block"/>}
                            <div className="flex flex-wrap gap-2">
                                {q.options.map((o, k) => (
                                    <span key={k} className={`px-2 py-0.5 rounded text-xs border ${q.correct_index===k?'bg-green-100 border-green-300 text-green-800 font-bold':'bg-gray-50 border-gray-200 text-gray-500'}`}>
                                        {String.fromCharCode(65+k)}. {cleanOptionText(o)}
                                    </span>
                                ))}
                            </div>
                        </div>
                    )}
                    {isEditing && (
                        <div className="space-y-3 animation-fade-in">
                            <textarea className="w-full text-sm border rounded p-2 font-mono h-24 focus:ring-1 focus:ring-indigo-500" value={q.question} onChange={e=>updateQuestion(q.id, 'question', e.target.value)} onPaste={handlePasteImage} placeholder="Nhập LaTeX hoặc dán ảnh..."></textarea>
                            <div className="flex items-center gap-2 bg-gray-50 p-2 rounded">
                                {q.question_image ? (
                                    <div className="relative"><img src={q.question_image} className="h-16 rounded border"/><button onClick={()=>updateQuestion(q.id, 'question_image', null)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">×</button></div>
                                ) : (
                                    <label className="text-xs text-blue-600 cursor-pointer flex items-center gap-1 hover:underline">
                                        <i className="fas fa-image"></i> Dán ảnh
                                        <input type="file" accept="image/*" className="hidden" onChange={(e)=>{const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=(ev)=>updateQuestion(q.id,'question_image',ev.target.result); r.readAsDataURL(f); }}}/>
                                    </label>
                                )}
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                {q.options.map((opt, oIdx) => (
                                    <div key={oIdx} className={`flex items-center border rounded px-1 py-1 ${q.correct_index===oIdx?'border-green-500 bg-green-50':''}`}>
                                        <div onClick={()=>updateQuestion(q.id, 'correct_index', oIdx)} className={`w-5 h-5 flex-shrink-0 rounded-full flex items-center justify-center text-xs font-bold cursor-pointer mr-1 ${q.correct_index===oIdx?'bg-green-500 text-white':'bg-gray-200 text-gray-500 hover:bg-gray-300'}`}>{String.fromCharCode(65+oIdx)}</div>
                                        <input className="w-full text-xs bg-transparent outline-none" value={opt} onChange={e=>updateQuestion(q.id, 'options', e.target.value, oIdx)}/>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const HybridExamCreator = ({ onBack, initialData }) => { 
            const [step, setStep] = useState(initialData ? 2 : 1); const [pages, setPages] = useState([]); const [pageQuestions, setPageQuestions] = useState({}); const [activePageId, setActivePageId] = useState(null); const [loadingMsg, setLoadingMsg] = useState(""); const [examInfo, setExamInfo] = useState(initialData ? initialData.info : { title: "", school: "", duration: 45, start_time: "", end_time: "" }); const [showAnswerModal, setShowAnswerModal] = useState(false); const [previewImage, setPreviewImage] = useState(null); const userEmail = localStorage.getItem('userEmail');
            useEffect(() => { if (initialData && initialData.questions) { const fakeId = "imported"; setPages([{ id: fakeId, page_index: 1, image_data: null, status: "done", q_count: initialData.questions.length }]); setPageQuestions({ [fakeId]: initialData.questions.map((q,i)=>({...q, id: Date.now()+i})) }); setActivePageId(fakeId); } }, [initialData]);
            const allQuestions = useMemo(() => { let merged = []; const sortedPages = [...pages].sort((a,b) => a.page_index - b.page_index); sortedPages.forEach(p => { if (pageQuestions[p.id]) merged.push(...pageQuestions[p.id]); }); return merged; }, [pages, pageQuestions]);
            const getApiKeys = () => { try { return JSON.parse(localStorage.getItem('global_gemini_keys') || "[]"); } catch { return []; } };
            
            // [NEW] Tính toán số câu có đáp án để hiển thị
            const counts = useMemo(() => {
                const total = allQuestions.length;
                const hasAns = allQuestions.filter(q => q.correct_index !== null && q.correct_index !== undefined && parseInt(q.correct_index) >= 0).length;
                return { total, hasAns };
            }, [allQuestions]);

            const handleUpload = async (e) => { const file = e.target.files[0]; if (!file) return; setLoadingMsg("Đang xử lý PDF..."); const fd = new FormData(); fd.append("file", file); try { const res = await axios.post(`${API_BASE}/api/exam/process_paper`, fd); if (res.data.status === 'ok') { setPages(res.data.pages); if(res.data.pages.length) setActivePageId(res.data.pages[0].id); setStep(2); } else alert(res.data.message); } catch (err) { alert(err.message); } finally { setLoadingMsg(""); } };
            const runAIForPage = async (page) => { const keys = getApiKeys(); if(!keys.length) return alert("Thiếu API Key!"); setPages(prev => prev.map(p => p.id === page.id ? {...p, status: 'processing'} : p)); setActivePageId(page.id); const model = localStorage.getItem('default_gemini_module') || 'gemini-2.5-flash'; try { const res = await axios.post(`${API_BASE}/api/exam/normalize_segment`, { image_data: page.image_data, api_keys: keys, model: model }, { timeout: 60000 }); if(res.data.status === 'ok') { const newQs = res.data.data.map((q, i) => ({ ...q, id: Date.now() + Math.random() })); setPageQuestions(prev => ({ ...prev, [page.id]: newQs })); setPages(prev => prev.map(p => p.id === page.id ? {...p, status: 'done', q_count: newQs.length} : p)); } } catch(e) { setPages(prev => prev.map(p => p.id === page.id ? {...p, status: 'error'} : p)); alert(e.message); } };
            const updateQuestion = (qId, field, value, optIdx=null) => { if(!activePageId) return; setPageQuestions(prev => ({ ...prev, [activePageId]: prev[activePageId].map(q => { if(q.id === qId) { const newData = {...q}; if(field === 'options') newData.options[optIdx] = value; else newData[field] = value; return newData; } return q; }) })); };
            const deleteQuestion = (qId) => { if(confirm("Xóa câu này?")) setPageQuestions(prev => ({ ...prev, [activePageId]: prev[activePageId].filter(q => q.id !== qId) })); };
            const addQuestion = () => { if(!activePageId) return alert("Chọn trang trước!"); const newQ = { id: Date.now(), question: "Câu hỏi mới...", options: ["", "", "", ""], correct_index: 0, question_image: null }; setPageQuestions(prev => ({ ...prev, [activePageId]: [...(prev[activePageId] || []), newQ] })); };
            const handleBulkAnswer = (importedData) => { const map = {"A":0,"B":1,"C":2,"D":3}; const newPageQs = {...pageQuestions}; let globalIdx = 0; pages.forEach(p => { if (newPageQs[p.id]) { newPageQs[p.id] = newPageQs[p.id].map(q => { globalIdx++; const found = importedData.find(d => d.index === globalIdx); if (found && map[found.answer] !== undefined) return { ...q, correct_index: map[found.answer] }; return q; }); } }); setPageQuestions(newPageQs); alert(`Đã cập nhật ${importedData.length} câu.`); };
            
            const handleSave = async () => {
                if(!examInfo.title) return alert("Vui lòng nhập tên đề thi!");
                if(!allQuestions.length) return alert("Đề thi đang trống! Vui lòng tải lên PDF và nhận diện câu hỏi.");
                
                // Kiểm tra lại số lượng đáp án trước khi lưu
                const questionsWithAnswer = allQuestions.filter(q => q.correct_index !== null && q.correct_index !== undefined && parseInt(q.correct_index) >= 0).length;
                const totalQuestions = allQuestions.length;
                
                if (questionsWithAnswer < totalQuestions) {
                    return alert(`CHƯA HOÀN THÀNH:\n\n- Tổng số câu hỏi: ${totalQuestions}\n- Số câu đã có đáp án: ${questionsWithAnswer}\n\nVui lòng chọn đáp án đúng cho ${totalQuestions - questionsWithAnswer} câu còn thiếu trước khi lưu!`);
                }

                const payload = { id: initialData ? initialData.info.id : null, ...examInfo, start_time: examInfo.start_time ? new Date(examInfo.start_time).toISOString() : null, end_time: examInfo.end_time ? new Date(examInfo.end_time).toISOString() : null, questions: allQuestions, teacher_email: userEmail, api_keys: getApiKeys() }; 
                try { await axios.post(`${API_BASE}/api/exam/save`, payload); alert("Đã lưu thành công!"); onBack(); } catch(e) { alert("Lỗi lưu: " + e.message); } 
            };
            
            if(step === 1) return (<div className="min-h-screen flex items-center justify-center bg-gray-100 p-4"><div className="bg-white p-10 rounded-2xl shadow-xl text-center max-w-lg w-full"><h1 className="text-3xl font-bold text-indigo-700 mb-2">Tạo Đề Mới</h1><div className="bg-yellow-50 border border-yellow-200 p-4 rounded text-left text-sm mb-4 text-gray-700"><p className="font-bold text-yellow-800 mb-1">HƯỚNG DẪN:</p><ul className="list-disc pl-5 space-y-1"><li>Sử dụng PDF.</li><li>Câu hỏi và đáp án nên nằm cùng 1 trang.</li></ul></div><p className="text-gray-500 mb-6">Upload PDF để bắt đầu</p>{loadingMsg ? <div className="text-indigo-600 font-bold animate-pulse">{loadingMsg}</div> : (<label className="block w-full border-2 border-dashed border-indigo-300 bg-indigo-50 rounded-xl p-8 cursor-pointer hover:bg-indigo-100 transition"><input type="file" className="hidden" accept=".pdf" onChange={handleUpload}/><i className="fas fa-file-pdf text-4xl text-indigo-500 mb-2"></i><div className="font-bold text-indigo-700">Chọn file PDF</div></label>)}<button onClick={onBack} className="mt-6 text-gray-400 underline">Quay lại</button></div></div>);
            
            return (
                <div className="flex h-screen flex-col bg-white">
                    {showAnswerModal && <AnswerImportModal onClose={()=>setShowAnswerModal(false)} onImport={handleBulkAnswer}/>}
                    <ImageModal src={previewImage} onClose={() => setPreviewImage(null)} />
                    <div className="h-16 border-b flex items-center justify-between px-4 shrink-0 shadow-sm z-20 bg-white">
                        <div className="flex items-center gap-4">
                            <button onClick={onBack} className="text-gray-500 hover:text-black"><i className="fas fa-arrow-left"></i></button>
                            <input className="font-bold text-lg border-b border-dashed outline-none w-48" placeholder="Tên đề thi..." value={examInfo.title} onChange={e=>setExamInfo({...examInfo, title:e.target.value})}/>
                            <div className="flex items-center gap-2 text-xs">
                                <input type="number" className="w-12 border rounded px-1" value={examInfo.duration} onChange={e=>setExamInfo({...examInfo, duration:e.target.value})}/> phút 
                                <span className="text-gray-400">|</span> 
                                <input type="datetime-local" className="border rounded px-1" value={examInfo.start_time||""} onChange={e=>setExamInfo({...examInfo, start_time:e.target.value})}/> 
                                ➜ 
                                <input type="datetime-local" className="border rounded px-1" value={examInfo.end_time||""} onChange={e=>setExamInfo({...examInfo, end_time:e.target.value})}/>
                            </div>
                            
                            {/* [NEW] Hiển thị tiến độ đáp án */}
                            <div className="text-xs font-bold bg-gray-100 px-3 py-1 rounded-full border border-gray-200">
                                Đã có đáp án: <span className={counts.hasAns < counts.total ? "text-red-600 animate-pulse" : "text-green-600"}>{counts.hasAns}/{counts.total}</span>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={()=>setShowAnswerModal(true)} className="bg-blue-100 text-blue-700 px-3 py-1.5 rounded text-sm font-bold"><i className="fas fa-key"></i> Nạp Đáp Án</button>
                            <button onClick={handleSave} className="bg-green-600 text-white px-4 py-1.5 rounded text-sm font-bold shadow hover:bg-green-700"><i className="fas fa-save"></i> Lưu Đề</button>
                        </div>
                    </div>
                    <div className="layout-grid bg-slate-50">
                        <div className="col-panel"><div className="col-header"><span>TRANG PDF ({pages.length})</span></div><div className="p-2 space-y-2">{pages.map(p => (<div key={p.id} onClick={()=>setActivePageId(p.id)} className={`page-thumb ${activePageId===p.id?'active':''}`}><div className="flex justify-between items-center mb-1"><span className="text-xs font-bold text-gray-500">Trang {p.page_index}</span>{p.status==='done' ? <i className="fas fa-check-circle text-green-500"></i> : p.status==='processing' ? <div className="loader w-3 h-3 border-blue-500"></div> : ''}</div>{p.image_data ? (<img src={p.image_data} onClick={(e) => { e.stopPropagation(); setPreviewImage(p.image_data); }} className="cursor-zoom-in hover:opacity-90 transition"/>) : <div className="h-32 bg-gray-100 flex items-center justify-center text-xs">No Image</div>}<div className="flex gap-1 mt-2">{p.status === 'done' ? (<><div className="flex-1 py-1 text-xs rounded font-bold bg-gray-100 text-gray-600 text-center">Đã lấy {pageQuestions[p.id]?.length || 0} câu</div><button onClick={(e)=>{e.stopPropagation(); if(confirm("Nhận diện lại?")) runAIForPage(p)}} className="px-2 py-1 text-xs rounded font-bold bg-indigo-100 text-indigo-600 hover:bg-indigo-200"><i className="fas fa-sync-alt"></i></button></>) : (<button onClick={(e)=>{e.stopPropagation(); runAIForPage(p)}} disabled={p.status === 'processing'} className={`w-full py-1 text-xs rounded font-bold ${p.status==='processing' ? 'bg-gray-200 text-gray-500 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>{p.status==='processing' ? 'Đang đọc...' : 'Nhận diện AI'}</button>)}</div></div>))}</div></div>
                        <div className="col-panel bg-white border-r"><div className="col-header"><span>CHI TIẾT (Trang {pages.find(p=>p.id===activePageId)?.page_index})</span></div><div className="col-content space-y-4">{!activePageId ? <div className="text-center text-gray-400 mt-10">Chọn trang bên trái</div> : (!pageQuestions[activePageId]?.length && pages.find(p=>p.id===activePageId)?.status !== 'done') ? <div className="text-center text-gray-400 mt-10">Chưa có câu hỏi. Bấm Nhận diện AI.</div> : (<>{pageQuestions[activePageId]?.map((q, idx) => (<QuestionEditor key={q.id} q={q} idx={idx} updateQuestion={updateQuestion} deleteQuestion={deleteQuestion} />))}<button onClick={addQuestion} className="w-full py-3 border-2 border-dashed border-indigo-300 text-indigo-600 rounded-lg hover:bg-indigo-50 font-bold flex items-center justify-center gap-2"><i className="fas fa-plus-circle"></i> Thêm câu hỏi thủ công</button></>)}</div></div>
                        <div className="col-panel bg-gray-50">
                            <div className="col-header"><span>TỔNG HỢP ({allQuestions.length} câu)</span></div>
                            <div className="col-content space-y-3">
                                {allQuestions.length === 0 ? <div className="text-center text-gray-400 mt-10">Đề thi trống</div> : allQuestions.map((q, i) => (
                                    <div key={i} className="bg-white p-3 rounded border border-gray-200 text-sm shadow-sm">
                                        <div className="font-bold text-gray-700 mb-1">Câu {i+1}</div>
                                        <div className="mb-2"><MathText text={q.question} /></div>
                                        {q.question_image && <img src={q.question_image} className="h-20 mb-2 block border rounded"/>}
                                        <div className="flex flex-col gap-2">
                                            {q.options.map((o, k) => (
                                                <span key={k} className={`px-2 py-1 rounded text-xs border ${q.correct_index===k?'bg-green-100 border-green-300 text-green-800 font-bold':'bg-gray-50 border-gray-200 text-gray-500'}`}>
                                                    {String.fromCharCode(65+k)}. <MathText text={cleanOptionText(o)} />
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const TeacherDashboard = ({ onViewDetail, onCreateNew, onEdit }) => {
            const [exams, setExams] = useState([]); const [qrLink, setQrLink] = useState(null); const userEmail = localStorage.getItem('userEmail');
            useEffect(() => { if(userEmail) axios.get(`${API_BASE}/api/exam/my-exams?email=${userEmail}`).then(res => setExams(res.data||[])); }, []);
            const handleDelete = async (id) => { if(confirm("Xóa đề này?")) { await axios.delete(`${API_BASE}/api/exam/delete/${id}`); setExams(exams.filter(e=>e.id!==id)); } };
            const handleDuplicate = async (id) => { await axios.post(`${API_BASE}/api/exam/duplicate/${id}`); window.location.reload(); };
            
            return (
                <div className="max-w-6xl mx-auto p-6">
                    {qrLink && <QRModal link={qrLink} onClose={()=>setQrLink(null)} />}
                    <div className="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow border border-indigo-100">
                        <div className="flex items-center gap-4"><div className="w-12 h-12 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-2xl"><i className="fas fa-user-tie"></i></div><div><h1 className="text-2xl font-bold text-gray-800">Quản Lý Thi</h1><p className="text-gray-500">{userEmail}</p></div></div>
                        <div className="flex gap-2"><button onClick={()=>window.location.href='index.html'} className="px-4 py-2 border rounded hover:bg-gray-50 font-bold text-gray-600">Home</button><button onClick={onCreateNew} className="bg-indigo-600 text-white px-4 py-2 rounded font-bold hover:bg-indigo-700 shadow"><i className="fas fa-plus"></i> Tạo Đề Mới</button></div>
                    </div>
                    <div className="bg-white rounded-xl shadow overflow-hidden">
                        <table className="w-full text-left"><thead className="bg-gray-50 border-b"><tr><th className="p-4">Kỳ Thi</th><th className="p-4">Thời Gian</th><th className="p-4 text-right">Công Cụ</th></tr></thead><tbody>{exams.map((ex) => (<tr key={ex.id} className="border-b hover:bg-indigo-50/30"><td className="p-4"><div className="font-bold text-lg text-indigo-900">{ex.title}</div><div className="text-xs text-gray-500">{ex.school}</div></td><td className="p-4 text-sm text-gray-600">{ex.duration_mins} phút<br/><span className="text-xs text-gray-400">{ex.start_time ? new Date(ex.start_time).toLocaleDateString() : 'Tự do'}</span></td><td className="p-4 text-right"><div className="flex justify-end gap-2"><button onClick={()=>setQrLink(`${window.location.href.split('?')[0]}?mode=student&examId=${ex.id}`)} className="bg-blue-100 text-blue-600 p-2 rounded" title="QR Code"><i className="fas fa-qrcode"></i></button><button onClick={()=>onEdit(ex.id)} className="bg-yellow-100 text-yellow-600 p-2 rounded" title="Sửa đề"><i className="fas fa-edit"></i></button><button onClick={()=>handleDuplicate(ex.id)} className="bg-purple-100 text-purple-600 p-2 rounded" title="Nhân bản"><i className="fas fa-copy"></i></button><button onClick={()=>onViewDetail(ex.id)} className="bg-green-100 text-green-600 p-2 rounded" title="Kết quả"><i className="fas fa-chart-bar"></i></button><button onClick={()=>handleDelete(ex.id)} className="bg-red-100 text-red-600 p-2 rounded" title="Xóa"><i className="fas fa-trash"></i></button></div></td></tr>))}</tbody></table>
                    </div>
                </div>
            );
        };

        const StudentView = ({ examId }) => { 
            const [step, setStep] = useState("loading");
            const [info, setInfo] = useState({});
            const [exam, setExam] = useState(null);
            const [shuffledQuestions, setShuffledQuestions] = useState([]);
            const [answers, setAnswers] = useState({});
            const [timeLeft, setTimeLeft] = useState(0);
            const [error, setError] = useState(null);
            const [violationCount, setViolationCount] = useState(0);
            const [isLockedOut, setIsLockedOut] = useState(false);
            
            useEffect(() => { 
                axios.get(`${API_BASE}/api/exam/get/${examId}`).then(res => {
                    const data = res.data;
                    if (data.info.status === "not_started") { setError(`Chưa đến giờ thi! Mở lúc: ${new Date(data.info.start_time).toLocaleString()}`); setStep("locked"); }
                    else if (data.info.status === "expired") { setError("Đã hết giờ làm bài."); setStep("locked"); }
                    else { setExam(data); setTimeLeft(data.info.duration_mins*60); setStep("info"); }
                }).catch(()=> { setError("Không tìm thấy đề thi!"); setStep("locked"); }); 
            }, [examId]);

            useEffect(() => {
                if (step === 'exam' && exam && exam.questions) {
                    const mappedQuestions = exam.questions.map((q, originalIdx) => {
                        const originalOptions = q.options.map((opt, optIdx) => ({ text: opt, originalOptIdx: optIdx }));
                        const shuffledOptions = [...originalOptions].sort(() => Math.random() - 0.5);
                        return { ...q, originalIdx: originalIdx, shuffledOptions: shuffledOptions };
                    });
                    setShuffledQuestions(mappedQuestions.sort(() => Math.random() - 0.5));
                }
            }, [step, exam]);

            useEffect(() => {
                if (step === "exam") {
                    const timer = setInterval(() => setTimeLeft(v => { 
                        if (v <= 1) { handleSubmit(true); return 0; } 
                        return v - 1; 
                    }), 1000);

                    const handleViolation = () => {
                        setViolationCount(prev => {
                            const newCount = prev + 1;
                            if (newCount >= 3) {
                                alert("Vi phạm quy chế (thoát màn hình) quá 3 lần. Hệ thống tự động thu bài!");
                                handleSubmit(true);
                            } else {
                                setIsLockedOut(true); // Khóa màn hình
                            }
                            return newCount;
                        });
                    };

                    const checkFullscreen = () => {
                        if (!document.fullscreenElement) {
                            handleViolation();
                        }
                    };

                    const checkVisibility = () => {
                        if (document.hidden) {
                            handleViolation();
                        }
                    };

                    document.addEventListener("fullscreenchange", checkFullscreen);
                    document.addEventListener("visibilitychange", checkVisibility);
                    window.addEventListener("blur", checkVisibility);

                    return () => {
                        clearInterval(timer);
                        document.removeEventListener("fullscreenchange", checkFullscreen);
                        document.removeEventListener("visibilitychange", checkVisibility);
                        window.removeEventListener("blur", checkVisibility);
                    };
                }
            }, [step]);

            const enterFullscreen = () => {
                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen().catch(() => {});
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
            };

            const startExam = () => {
                if(!info.name || !info.sbd) return alert("Vui lòng nhập Họ tên và SBD!");
                enterFullscreen();
                setStep("exam");
            };

            const unlockExam = () => {
                enterFullscreen();
                setIsLockedOut(false);
            };

            const handleSubmit = async (auto = false) => {
                const answeredCount = Object.keys(answers).length;
                const totalCount = exam.questions.length;
                
                if (!auto) {
                    if (answeredCount < totalCount) {
                        alert(`Bạn mới làm ${answeredCount}/${totalCount} câu. Vui lòng hoàn thành hết các câu hỏi!`);
                        return;
                    }
                    if (!confirm("Bạn chắc chắn muốn nộp bài?")) return;
                }

                try {
                    const res = await axios.post(`${API_BASE}/api/exam/submit`, {
                        exam_id: examId,
                        student_name: info.name,
                        sbd: info.sbd,
                        student_class: info.class,
                        answers: answers
                    });
                    setExam(res.data);
                    setStep("result");
                    if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
                } catch (e) {
                    alert(e.response?.data?.detail || "Lỗi nộp bài!");
                }
            };

            const handleSelectAnswer = (originalQIdx, originalOptIdx) => {
                setAnswers(prev => ({...prev, [originalQIdx]: originalOptIdx}));
            };

            if(step === "locked") return <div className="flex justify-center h-screen items-center bg-gray-100"><div className="bg-white p-8 rounded shadow text-center"><h2 className="text-xl font-bold text-red-500 mb-2"><i className="fas fa-lock"></i> Đóng Cửa</h2><p>{error}</p></div></div>;
            if(step === "loading") return <div className="flex justify-center h-screen items-center"><div className="loader border-indigo-600"></div></div>;
            
            if(step === "info") return (
                <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white p-8 rounded-xl shadow-lg text-center">
                        <div className="mb-4 text-indigo-600"><i className="fas fa-user-graduate text-5xl"></i></div>
                        <h2 className="text-2xl font-bold mb-2 text-gray-800">{exam.info.title}</h2>
                        <div className="flex justify-center gap-4 text-sm text-gray-500 mb-6"><span><i className="fas fa-clock"></i> {exam.info.duration_mins} phút</span><span><i className="fas fa-question-circle"></i> {exam.questions.length} câu</span></div>
                        <div className="space-y-3 text-left">
                            <div><label className="text-xs font-bold text-gray-700">Họ và Tên (*)</label><input className="border p-3 w-full rounded focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Nguyễn Văn A" onChange={e=>setInfo({...info, name: e.target.value})}/></div>
                            <div><label className="text-xs font-bold text-gray-700">Số Báo Danh (*)</label><input className="border p-3 w-full rounded focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="SBD123456" onChange={e=>setInfo({...info, sbd: e.target.value})}/></div>
                            <div><label className="text-xs font-bold text-gray-700">Lớp</label><input className="border p-3 w-full rounded focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="12A1" onChange={e=>setInfo({...info, class: e.target.value})}/></div>
                        </div>
                        <div className="mt-6 bg-yellow-50 text-yellow-800 p-3 rounded text-xs text-left border border-yellow-200"><strong><i className="fas fa-exclamation-triangle"></i> CẢNH BÁO QUAN TRỌNG:</strong><br/>- Hệ thống bật chế độ <b>TOÀN MÀN HÌNH</b>.<br/>- <b>TUYỆT ĐỐI KHÔNG</b> thoát màn hình hoặc chuyển tab.<br/>- Nếu vi phạm <b>3 lần</b> sẽ bị <b>THU BÀI</b> ngay lập tức.</div>
                        <button onClick={startExam} className="mt-6 bg-indigo-600 text-white w-full py-3 rounded-lg font-bold shadow-lg hover:bg-indigo-700 transition transform active:scale-95">VÀO THI NGAY</button>
                    </div>
                </div>
            );

            if(step === "result") return (
                <div className="min-h-screen bg-gradient-to-b from-green-50 to-white flex items-center justify-center p-4">
                    <div className="bg-white p-10 rounded-2xl shadow-2xl text-center max-w-lg w-full border border-green-100">
                        <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-600 text-4xl shadow-inner"><i className="fas fa-check"></i></div>
                        <h2 className="text-3xl font-bold text-gray-800 mb-2">Hoàn Thành!</h2><p className="text-gray-500 mb-6">Bạn đã nộp bài thành công.</p>
                        <div className="bg-gray-50 p-6 rounded-xl border border-gray-200 mb-6"><p className="text-sm text-gray-500 uppercase tracking-wide font-bold mb-2">Kết quả</p><p className="text-5xl font-extrabold text-indigo-600 mb-2">{exam.score}</p><p className="text-sm font-bold text-gray-400">Điểm số</p></div>
                        <div className="bg-blue-50 p-4 rounded text-left text-sm text-blue-800 italic border-l-4 border-blue-500">💡 {exam.feedback}</div>
                    </div>
                </div>
            );

            return (
                <div className="fixed top-0 left-0 w-full h-full bg-white z-50 overflow-y-auto noselect">
                    {/* Anti-Cheat Overlay */}
                    {isLockedOut && (
                        <div className="violation-overlay">
                            <div className="text-6xl text-red-500 mb-4"><i className="fas fa-exclamation-triangle"></i></div>
                            <h2 className="text-2xl font-bold mb-2 text-red-500">CẢNH BÁO VI PHẠM!</h2>
                            <p className="mb-6 max-w-md">Bạn đã rời khỏi màn hình thi. Đây là hành động vi phạm quy chế.<br/>Bạn còn <b>{3 - violationCount}</b> lần vi phạm trước khi bị thu bài.</p>
                            <button onClick={unlockExam} className="bg-white text-red-600 px-6 py-3 rounded-full font-bold shadow-lg hover:bg-gray-100 transition">Quay lại làm bài</button>
                        </div>
                    )}

                    <div className={`max-w-4xl mx-auto pb-20 ${isLockedOut ? 'blur-sm pointer-events-none' : ''}`}>
                        <div className="sticky top-0 bg-white/95 backdrop-blur shadow-md px-4 py-3 rounded-b-xl flex justify-between items-center z-30 border-t-4 border-indigo-600">
                            <div><div className="font-bold text-gray-800 text-sm truncate w-32">{info.name}</div><div className="text-xs text-gray-500 font-mono">{info.sbd}</div></div>
                            <div className="hidden md:block bg-gray-100 px-3 py-1 rounded-full text-xs font-bold text-gray-600">Đã làm: <span className="text-indigo-600">{Object.keys(answers).length}</span>/{shuffledQuestions.length}</div>
                            <div className="flex items-center gap-3"><div className={`font-mono text-xl font-bold ${timeLeft < 300 ? 'text-red-600 animate-pulse' : 'text-indigo-700'}`}>{Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,'0')}</div><button onClick={()=>handleSubmit(false)} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-indigo-700 shadow transition">Nộp Bài</button></div>
                        </div>
                        <div className="h-1 w-full bg-gray-200 fixed top-[68px] left-0 z-20 md:hidden"><div className="h-full bg-indigo-500 transition-all duration-300" style={{width: `${(Object.keys(answers).length / shuffledQuestions.length) * 100}%`}}></div></div>
                        <div className="p-4 space-y-6 mt-2">
                            {shuffledQuestions.map((q, i) => (
                                <div key={q.id} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 relative group hover:shadow-md transition">
                                    <div className="flex gap-4 mb-4">
                                        <div className="flex flex-col items-center gap-1"><span className="bg-indigo-100 text-indigo-700 w-8 h-8 flex items-center justify-center rounded-full font-bold text-sm shadow-sm">{i+1}</span>{answers[q.originalIdx] !== undefined && <i className="fas fa-check-circle text-green-500 text-xs"></i>}</div>
                                        <div className="flex-1">
                                            {/* Corrected logic for showing image */}
                                            {q.question_image && <img src={q.question_image} className="max-h-60 rounded-lg border mb-3 block object-contain bg-gray-50"/>}
                                            <div className="text-gray-800 text-base leading-relaxed font-medium"><MathText text={q.question}/></div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 pl-0 md:pl-12">
                                        {q.shuffledOptions.map((opt, visualIdx) => {
                                            const isSelected = answers[q.originalIdx] === opt.originalOptIdx;
                                            return (<div key={visualIdx} onClick={() => handleSelectAnswer(q.originalIdx, opt.originalOptIdx)} className={`p-3 rounded-xl border-2 cursor-pointer flex gap-3 items-center transition-all duration-200 active:scale-[0.98] ${isSelected ? 'border-indigo-500 bg-indigo-50 shadow-inner' : 'border-gray-100 hover:border-indigo-200 hover:bg-gray-50'}`}><div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-colors ${isSelected ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-500'}`}>{String.fromCharCode(65 + visualIdx)}</div><div className={`text-sm ${isSelected ? 'text-indigo-900 font-medium' : 'text-gray-600'}`}><MathText text={cleanOptionText(opt.text)}/></div></div>);
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const ResultDetail = ({ examId, onBack }) => {
            const [results, setResults] = useState([]); useEffect(() => { axios.get(`${API_BASE}/api/exam/results/${examId}`).then(res => setResults(res.data)); }, [examId]);
            return (<div className="max-w-6xl mx-auto p-6"><button onClick={onBack} className="mb-4 text-gray-600 hover:text-indigo-600 flex items-center gap-2 font-bold"><i className="fas fa-arrow-left"></i> Quay lại</button><div className="bg-white rounded-xl shadow overflow-hidden"><div className="p-4 border-b bg-gray-50 flex justify-between items-center"><h3 className="font-bold text-lg text-gray-800">Kết quả thi</h3><button onClick={()=>{ const ws = XLSX.utils.json_to_sheet(results); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "KetQua"); XLSX.writeFile(wb, "KetQuaThi.xlsx"); }} className="text-green-600 hover:bg-green-50 px-3 py-1 rounded border border-green-200 text-sm font-bold"><i className="fas fa-file-excel mr-1"></i> Xuất Excel</button></div><table className="w-full text-left"><thead className="bg-indigo-50 border-b"><tr><th className="p-3">Tên HS</th><th className="p-3">SBD</th><th className="p-3">Lớp</th><th className="p-3">Điểm</th><th className="p-3">Số câu đúng</th></tr></thead><tbody>{results.map((r, i) => (<tr key={i} className="border-b hover:bg-gray-50"><td className="p-3 font-bold text-gray-700">{r.student_name}</td><td className="p-3 text-gray-600">{r.sbd}</td><td className="p-3 text-gray-600">{r.student_class}</td><td className="p-3 font-bold text-indigo-600">{r.score}</td><td className="p-3 text-sm">{r.correct_count} / {r.total_questions}</td></tr>))}</tbody></table></div></div>);
        };

        const App = () => {
            const [view, setView] = useState("dashboard"); const [selectedId, setSelectedId] = useState(null); const [isStudent, setIsStudent] = useState(false); const [editingData, setEditingData] = useState(null); const userEmail = localStorage.getItem('userEmail');
            useEffect(() => { const p = new URLSearchParams(window.location.search); if(p.get("mode") === "student") { setSelectedId(p.get("examId")); setIsStudent(true); } }, []);
            const handleEdit = async (id) => { try { const res = await axios.get(`${API_BASE}/api/exam/get/${id}`); setEditingData(res.data); setView("create"); } catch(e) { alert("Lỗi tải đề: " + e.message); } };
            if(isStudent) return <StudentView examId={selectedId} />;
            if (!userEmail) return (<div className="flex h-screen items-center justify-center bg-gray-100 flex-col gap-4"><div className="text-xl font-bold text-gray-700">Phiên đăng nhập hết hạn</div><a href="login.html" className="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">Đăng nhập ngay</a></div>);
            return (<div>{view==="dashboard" && <TeacherDashboard onCreateNew={()=>{setEditingData(null); setView("create");}} onEdit={handleEdit} onViewDetail={(id)=>{setSelectedId(id); setView("detail")}} />}{view==="create" && <HybridExamCreator initialData={editingData} onBack={()=>setView("dashboard")} />}{view==="detail" && <ResultDetail examId={selectedId} onBack={()=>setView("dashboard")} />}</div>);
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
