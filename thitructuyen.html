<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Thi Trực Tuyến Pro (Client-Side AI)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        :root { --font-main: 'Times New Roman', 'Noto Serif', serif; }
        body, input, button, textarea, select, .font-sans, .font-serif { font-family: var(--font-main) !important; font-size: 17px; }
        .katex { font-size: 1.15em; color: #1e3a8a; font-family: var(--font-main); }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 50; display: flex; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
        .exam-lockdown { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: #fff; overflow-y: auto; padding: 20px; }
        .lockdown-warning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(220, 38, 38, 0.98); z-index: 10000; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE = "https://hoangthiencm-giangbai.hf.space"; 
        const MODEL_NAME = localStorage.getItem('global_gemini_model') || "gemini-2.5-flash"; 
        const userEmail = localStorage.getItem('userEmail');
        
        const formatDate = (isoString) => isoString ? new Date(isoString).toLocaleString('vi-VN') : "";
        const normalizeText = (text) => text ? text.normalize('NFC').trim() : "";
        const cleanOptionText = (text) => normalizeText(text?.replace(/^([A-Da-d]+)([\.\)\:\-])\s*/, ''));
        const cleanQuestionText = (text) => { if (!text) return ""; return normalizeText(text).replace(/^(Câu|Bài|Question)\s*\d+[\.\:\)]\s*/i, '').trim(); };

        // === ERROR BOUNDARY: BẮT LỖI TRẮNG TRANG ===
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("React Error:", error, errorInfo); }
            render() {
                if (this.state.hasError) {
                    return <div className="p-10 text-center text-red-600"><h1>Đã xảy ra lỗi hệ thống!</h1><p>{this.state.error && this.state.error.toString()}</p><button onClick={()=>window.location.reload()} className="mt-4 bg-blue-500 text-white px-4 py-2 rounded">Tải lại trang</button></div>;
                }
                return this.props.children;
            }
        }

        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if (!text || !ref.current) return;
                let processed = normalizeText(text);
                // Xóa wrapper LaTeX văn bản nhưng giữ nội dung
                for(let i=0; i<3; i++) {
                     processed = processed.replace(/\\(textbf|textit|text|underline|emph|uppercase|lowercase)\{([^}]*)\}/g, '$2');
                }
                // Chuẩn hóa toán học (không unescape {})
                processed = processed
                    .replace(/\\\\/g, '\\') 
                    .replace(/\\\((.*?)\\\)/gs, '$$$1$$')
                    .replace(/\\\[(.*?)\\\]/gs, '$$$1$$')
                    .replace(/`([^`]+)`/g, '$$$1$$');
                
                const parts = processed.split(/(\$[^$]+\$)/g); 
                ref.current.innerHTML = "";
                parts.forEach(part => {
                    if (!part) return;
                    if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); } catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else {
                        const textNode = document.createElement("span");
                        textNode.innerHTML = part.replace(/\n/g, '<br/>');
                        ref.current.appendChild(textNode);
                    }
                });
            }, [text]);
            return <span ref={ref} className="math-content text-xl leading-relaxed inline-block" />;
        };

        const QRModal = ({ link, onClose }) => {
            const qrRef = useRef();
            useEffect(() => { if(qrRef.current) { qrRef.current.innerHTML = ""; new QRCode(qrRef.current, { text: link, width: 200, height: 200 }); } }, [link]);
            return <div className="modal-overlay" onClick={onClose}><div className="modal-content" onClick={e=>e.stopPropagation()}><h3 className="font-bold text-lg mb-2 text-indigo-800">Quét mã để vào thi</h3><div ref={qrRef} className="flex justify-center my-4"></div><input value={link} readOnly className="w-full border p-2 rounded text-sm bg-gray-50 mb-3"/><button onClick={onClose} className="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">Đóng</button></div></div>;
        };

        const AnswerModal = ({ isOpen, onClose, onApply }) => {
            if (!isOpen) return null;
            const [text, setText] = useState("");
            const processAnswers = () => {
                const map = {};
                const regex = /(\d+)[\.\:\-\s]*([A-Da-d])/g;
                let match;
                while ((match = regex.exec(text)) !== null) map[parseInt(match[1])] = match[2].toUpperCase().charCodeAt(0) - 65;
                onApply(map); onClose();
            };
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <h3 className="text-xl font-bold text-indigo-800 mb-4">Nạp Đáp Án Nhanh</h3>
                        <textarea value={text} onChange={e => setText(e.target.value)} className="w-full h-40 border p-3 rounded font-mono outline-none" placeholder="1A 2B 3C..."></textarea>
                        <div className="flex justify-end gap-3 mt-4">
                            <button onClick={onClose} className="px-4 py-2 bg-gray-200 rounded">Hủy</button>
                            <button onClick={processAnswers} className="px-6 py-2 bg-indigo-600 text-white rounded font-bold">Cập Nhật</button>
                        </div>
                    </div>
                </div>
            );
        };

        const QuestionItem = ({ q, index, onUpdate, onOptionChange }) => {
            const [isEditing, setIsEditing] = useState(false);
            const handlePaste = (e) => {
                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.indexOf("image") !== -1) {
                        e.preventDefault();
                        const blob = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = (evt) => onUpdate('image', evt.target.result);
                        reader.readAsDataURL(blob);
                        return;
                    }
                }
            };
            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = (evt) => onUpdate('image', evt.target.result);
                    reader.readAsDataURL(file);
                }
            }
            const handleAddOption = () => onUpdate('options_full', [...q.options, ""]);
            const handleDeleteOption = (optIdx) => {
                onUpdate('options_full', q.options.filter((_, i) => i !== optIdx));
                if (q.correct_index === optIdx) onOptionChange(-1);
                else if (q.correct_index > optIdx) onOptionChange(q.correct_index - 1);
            };

            if (isEditing) {
                return (
                    <div className="bg-white p-6 rounded-lg shadow-md border-2 border-blue-400 mb-6 relative">
                        <div className="absolute top-4 right-4 z-10"><button onClick={() => setIsEditing(false)} className="bg-blue-600 text-white px-4 py-1.5 rounded text-sm font-bold flex items-center gap-1"><i className="fas fa-check"></i> Xong</button></div>
                        <div className="mb-3"><span className="font-bold text-blue-700 text-lg">Câu {index + 1} (Đang sửa):</span></div>
                        <div className="mb-4">
                            <textarea className="w-full p-3 border rounded font-medium bg-blue-50 text-lg mb-2" value={q.question} onChange={(e) => onUpdate('question', e.target.value)} rows={3} />
                            <div className="border-2 border-dashed border-gray-300 p-2 rounded bg-gray-50 flex items-center gap-4" onPaste={handlePaste}>
                                <div className="flex-1 text-sm text-gray-500"><i className="fas fa-image mr-2"></i> Dán ảnh (Ctrl+V) hoặc chọn file: <input type="file" accept="image/*" className="ml-2 text-xs" onChange={handleFileSelect} /></div>
                                {q.image && <div className="relative"><img src={q.image} className="h-20 object-contain border bg-white" /><button onClick={()=>onUpdate('image', null)} className="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs"><i className="fas fa-times"></i></button></div>}
                            </div>
                        </div>
                        <div className="space-y-3">
                            {q.options.map((opt, idx) => (
                                <div key={idx} className={`flex items-center gap-2 p-2 rounded border ${q.correct_index === idx ? 'border-green-500 bg-green-50' : 'border-gray-200'}`}>
                                    <input type="radio" checked={q.correct_index === idx} onChange={() => onOptionChange(idx)} className="w-5 h-5 cursor-pointer accent-green-600" />
                                    <div className="w-8 font-bold text-gray-500 text-center">{String.fromCharCode(65+idx)}</div>
                                    <input className="flex-1 bg-transparent border-b border-gray-300 outline-none py-1 text-lg" value={opt} onChange={(e) => onUpdate('options', e.target.value, idx)} placeholder={`Đáp án ${String.fromCharCode(65+idx)}`}/>
                                    <button onClick={() => handleDeleteOption(idx)} className="text-red-400 hover:text-red-600 w-8 h-8 rounded hover:bg-red-50"><i className="fas fa-trash-alt"></i></button>
                                </div>
                            ))}
                            <button onClick={handleAddOption} className="w-full py-2 border-2 border-dashed border-gray-300 text-gray-500 font-bold rounded hover:bg-blue-50"><i className="fas fa-plus mr-1"></i> Thêm lựa chọn</button>
                        </div>
                    </div>
                );
            }
            return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6 hover:shadow-md transition relative group">
                    <div className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition duration-200"><button onClick={() => setIsEditing(true)} className="bg-gray-100 text-gray-600 border border-gray-300 px-3 py-1.5 rounded text-sm font-bold hover:bg-blue-50 hover:text-blue-600"><i className="fas fa-pencil-alt"></i> Sửa</button></div>
                    <div className="flex gap-3 mb-4 pr-16 items-start">
                        <span className="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-lg font-bold whitespace-nowrap text-lg mt-1">Câu {index + 1}</span>
                        <div className="w-full">
                            <div className="font-medium text-gray-900 text-xl leading-relaxed mb-3"><MathText text={cleanQuestionText(q.question)} /></div>
                            {q.image && <div className="mb-4"><img src={q.image} className="max-h-60 rounded border shadow-sm max-w-full" alt="Hình minh họa" /></div>}
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pl-0 md:pl-4">
                        {q.options.map((opt, idx) => (
                            <div key={idx} className={`flex items-start gap-4 p-4 rounded-xl border transition-all ${q.correct_index === idx ? 'bg-green-50 border-green-500 ring-1 ring-green-400' : 'bg-white border-gray-200 hover:border-indigo-200'}`}>
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-base font-bold flex-shrink-0 mt-0.5 ${q.correct_index === idx ? 'bg-green-600 text-white shadow' : 'bg-gray-100 text-gray-500 border border-gray-300'}`}>{String.fromCharCode(65+idx)}</div>
                                <div className={`text-xl ${q.correct_index === idx ? 'font-bold text-green-900' : 'text-gray-800'}`}><MathText text={cleanOptionText(opt)} /></div>
                                {q.correct_index === idx && <i className="fas fa-check-circle text-green-600 ml-auto mt-1 text-xl"></i>}
                            </div>
                        ))}
                    </div>
                    {q.correct_index === -1 && <div className="mt-4 text-red-600 text-sm font-bold bg-red-50 px-3 py-2 rounded border border-red-200 inline-block"><i className="fas fa-exclamation-triangle mr-1"></i> Chưa chọn đáp án đúng!</div>}
                </div>
            );
        };

        const ReviewExam = ({ questions, onSave, onBack, onUpdateQuestions }) => {
            const [showAnsModal, setShowAnsModal] = useState(false);
            const handleQuestionUpdate = (idx, field, value, optIdx = null) => { 
                const newQs = [...questions]; 
                if (field === 'options_full') newQs[idx].options = value; 
                else if (field === 'options') newQs[idx].options[optIdx] = value;
                else newQs[idx][field] = value; 
                onUpdateQuestions(newQs); 
            };
            const handleCorrectChange = (qIdx, optIdx) => { const newQs = [...questions]; newQs[qIdx].correct_index = optIdx; onUpdateQuestions(newQs); };
            const handleApplyAnswers = (map) => {
                const newQs = questions.map(q => {
                    const match = q.question.match(/(\d+)/);
                    if (match && map[parseInt(match[1])] !== undefined) return { ...q, correct_index: map[parseInt(match[1])] };
                    return q;
                });
                onUpdateQuestions(newQs); alert("Đã cập nhật đáp án!");
            };

            return (
                <div className="flex flex-col h-screen bg-gray-100 overflow-hidden">
                    <AnswerModal isOpen={showAnsModal} onClose={()=>setShowAnsModal(false)} onApply={handleApplyAnswers} />
                    <div className="bg-white p-4 shadow-md z-20 border-b border-indigo-200 flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-3"><button onClick={onBack} className="text-gray-500 hover:text-gray-800"><i className="fas fa-arrow-left text-xl"></i></button><h2 className="text-2xl font-bold text-indigo-800">Duyệt & Chỉnh Sửa Đề</h2><span className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-bold">{questions.length} câu</span></div>
                        <div className="flex gap-2">
                            <button onClick={()=>setShowAnsModal(true)} className="bg-orange-500 text-white px-4 py-2 rounded font-bold hover:bg-orange-600 shadow flex items-center gap-2"><i className="fas fa-key"></i> Nạp Đáp Án</button>
                            <button onClick={onSave} className="bg-green-600 text-white px-6 py-2 rounded font-bold hover:bg-green-700 shadow flex items-center gap-2"><i className="fas fa-save"></i> LƯU & TỔ CHỨC THI</button>
                        </div>
                    </div>
                    <div className="flex-1 flex overflow-hidden relative">
                        <div className="flex-1 overflow-y-auto p-6 bg-gray-50 custom-scrollbar">
                            <div className="max-w-4xl mx-auto">{questions.map((q, i) => (<QuestionItem key={i} q={q} index={i} onUpdate={(field, val, optIdx) => handleQuestionUpdate(i, field, val, optIdx)} onOptionChange={(optIdx) => handleCorrectChange(i, optIdx)} />))}</div>
                        </div>
                    </div>
                </div>
            );
        };

        const TeacherDashboard = ({ onViewDetail, onCreateNew, onEditExam }) => {
            const [exams, setExams] = useState([]);
            const [qrLink, setQrLink] = useState(null);
            const fetchExams = () => { if(userEmail) axios.get(`${API_BASE}/api/exam/my-exams?email=${userEmail}`).then(res => setExams(res.data)).catch(console.error); };
            useEffect(() => { fetchExams(); }, []);
            const handleDelete = async (id) => { if(confirm("Xóa?")) try { await axios.delete(`${API_BASE}/api/exam/delete/${id}`); fetchExams(); } catch(e){alert("Lỗi");} };
            const handleDuplicate = async (id) => { if(confirm("Nhân bản?")) try { await axios.post(`${API_BASE}/api/exam/duplicate/${id}`); fetchExams(); } catch(e) { alert("Lỗi"); } };
            const handleRename = async (id, oldTitle) => { const newTitle = prompt("Tên mới:", oldTitle); if(newTitle && newTitle !== oldTitle) { await axios.put(`${API_BASE}/api/exam/rename/${id}`, { new_title: newTitle }); fetchExams(); } };

            return (
                <div className="max-w-6xl mx-auto p-6 fade-in">
                    {qrLink && <QRModal link={qrLink} onClose={()=>setQrLink(null)} />}
                    <div className="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow border border-indigo-100">
                        <div className="flex items-center gap-4"><div className="w-12 h-12 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-2xl"><i className="fas fa-user-tie"></i></div><div><h1 className="text-2xl font-bold text-gray-800">Quản Lý Thi</h1><p className="text-gray-500">{userEmail}</p></div></div>
                        <div className="flex gap-2"><button onClick={()=>window.location.href='index.html'} className="px-4 py-2 border rounded hover:bg-gray-50 font-bold text-gray-600">Home</button><button onClick={onCreateNew} className="bg-indigo-600 text-white px-4 py-2 rounded font-bold hover:bg-indigo-700 shadow"><i className="fas fa-plus"></i> Tạo Đề Mới</button></div>
                    </div>
                    <div className="bg-white rounded-xl shadow overflow-hidden">
                        <table className="w-full text-left"><thead className="bg-gray-50 border-b"><tr><th className="p-4">Kỳ Thi</th><th className="p-4">Thời Gian</th><th className="p-4 text-right">Công Cụ</th></tr></thead><tbody>
                            {exams.map((ex) => (<tr key={ex.id} className="border-b hover:bg-indigo-50/30"><td className="p-4"><div className="font-bold text-lg text-indigo-900">{ex.title}</div><div className="text-xs text-gray-500">{ex.school}</div></td><td className="p-4 text-sm text-gray-600">{formatDate(ex.start_time)} - {formatDate(ex.end_time)}</td><td className="p-4 text-right"><div className="flex justify-end gap-2">
                                <button onClick={()=>setQrLink(`${window.location.href.split('?')[0]}?mode=student&examId=${ex.id}`)} className="bg-blue-100 text-blue-600 p-2 rounded" title="Lấy mã QR"><i className="fas fa-qrcode"></i></button>
                                <button onClick={()=>handleDuplicate(ex.id)} className="bg-purple-100 text-purple-600 p-2 rounded" title="Nhân bản"><i className="fas fa-copy"></i></button>
                                <button onClick={()=>handleRename(ex.id, ex.title)} className="bg-orange-100 text-orange-600 p-2 rounded" title="Đổi tên"><i className="fas fa-i-cursor"></i></button>
                                <button onClick={()=>onEditExam(ex.id)} className="bg-yellow-100 text-yellow-700 p-2 rounded" title="Sửa nội dung"><i className="fas fa-edit"></i></button>
                                <button onClick={()=>onViewDetail(ex.id)} className="bg-green-100 text-green-600 p-2 rounded" title="Xem kết quả"><i className="fas fa-chart-bar"></i></button>
                                <button onClick={()=>handleDelete(ex.id)} className="bg-red-100 text-red-600 p-2 rounded" title="Xóa"><i className="fas fa-trash"></i></button>
                            </div></td></tr>))}
                        </tbody></table>
                    </div>
                </div>
            );
        };

        const CreateExam = ({ onBack, initialData = null }) => {
            const [step, setStep] = useState("upload");
            const [form, setForm] = useState({ title: "", school: "", subject: "", grade: "", duration: 45, startTime: "", endTime: "" });
            const [parsedQuestions, setParsedQuestions] = useState([]);
            const [loading, setLoading] = useState(false);
            const [progress, setProgress] = useState("");
            const [apiKeys, setApiKeys] = useState([]);
            const [fileName, setFileName] = useState("");
            const fileRef = useRef();

            useEffect(() => { 
                const k = localStorage.getItem('global_gemini_keys'); 
                if(k) setApiKeys(JSON.parse(k));
                if (initialData) {
                    setForm({ ...initialData.info }); // FIX: An toàn nếu initialData.info thiếu
                    setParsedQuestions(initialData.questions || []); // FIX: Tránh lỗi trắng trang nếu questions null
                    setStep("review");
                }
            }, [initialData]);

            // === TEXT ONLY MODE: Không xử lý hình ảnh ===
            const callGeminiVision = async (img1, img2, key, pageLabel) => {
                const prompt = `
                Bạn là OCR chuyên đọc đề thi. Đây là HAI TRANG LIÊN TIẾP của đề thi.
                NHIỆM VỤ: Trích xuất TOÀN BỘ VĂN BẢN (Câu hỏi và Đáp án) dưới dạng JSON.
                BỎ QUA HÌNH ẢNH, BẢNG BIỂU (chỉ cần lấy text nội dung).

                QUY TẮC:
                1. GHÉP CÂU: Nếu câu hỏi ở cuối trang 1 và đáp án ở đầu trang 2 -> Ghép thành 1 câu hoàn chỉnh.
                2. TEXT & TOÁN: Dùng LaTeX $...$ cho công thức toán. Dùng Markdown cho format văn bản (đậm, nghiêng).
                3. ĐÁP ÁN ĐÚNG: Quan sát màu sắc (đỏ/khác biệt) hoặc gạch chân/khoanh tròn/dấu tích để xác định 'correct_index' (0=A, 1=B...). Nếu không có, để -1.
                4. RÀ SOÁT ĐÁP ÁN HÀNG NGANG: Hãy tìm kỹ trên cùng 1 dòng, nếu có các đáp án A, B, C, D nằm ngang, hãy tách chúng ra.
                5. KHÔNG TRẢ VỀ HÌNH ẢNH.

                OUTPUT JSON FORMAT:
                [
                  {
                    "question": "Nội dung câu hỏi đầy đủ...",
                    "options": ["A. ...", "B. ...", "C. ...", "D. ..."],
                    "correct_index": -1,
                    "image": null
                  }
                ]
                KHÔNG GIẢI THÍCH THÊM.
                `;

                const parts = [
                    { text: prompt },
                    { inline_data: { mime_type: "image/jpeg", data: img1 } }
                ];
                if (img2) {
                    parts.push({ inline_data: { mime_type: "image/jpeg", data: img2 } });
                }

                // CƠ CHẾ RETRY: Thử lại tối đa 3 lần nếu gặp lỗi 500 hoặc 503
                let retryCount = 0;
                const maxRetries = 3;
                
                while(retryCount < maxRetries) {
                    try {
                        const res = await fetch(
                            `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${key}`,
                            {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ contents: [{ parts: parts }] })
                            }
                        );

                        if (!res.ok) {
                            if (res.status >= 500) {
                                throw new Error(`Server Error ${res.status}`);
                            }
                            const errData = await res.json();
                            throw new Error(errData.error?.message || "Unknown Error");
                        }

                        const data = await res.json();
                        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                        
                        // Tìm kiếm tất cả các khối JSON và lấy khối lớn nhất
                        const matches = text.match(/\[[\s\S]*?\]/g);
                        if (!matches) throw new Error("Không tìm thấy JSON trong phản hồi AI.");

                        let best = null;
                        let max = 0;

                        for (const block of matches) {
                            try {
                                const arr = JSON.parse(block);
                                if (Array.isArray(arr) && arr.length >= max) {
                                    best = arr;
                                    max = arr.length;
                                }
                            } catch (e) {}
                        }

                        if (!best) throw new Error("Không parse được JSON.");
                        return best; // Thành công -> thoát loop

                    } catch (err) {
                        console.warn(`Lần thử ${retryCount + 1} thất bại: ${err.message}`);
                        retryCount++;
                        if (retryCount === maxRetries) throw err; // Ném lỗi nếu hết lượt
                        await new Promise(r => setTimeout(r, 2000)); // Chờ 2s trước khi thử lại
                    }
                }
            };

            const renderPageToCanvas = async (page) => {
                const viewport = page.getViewport({scale: 1.3}); // GIẢM SCALE XUỐNG 1.3 ĐỂ GIẢM DUNG LƯỢNG ẢNH
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
                return canvas;
            };

            const processPagePair = async (pageNum1, pageNum2, pdf, apiKeys) => {
                try {
                    const page1 = await pdf.getPage(pageNum1);
                    const canvas1 = await renderPageToCanvas(page1);
                    // GIẢM QUALITY 0.6 ĐỂ KHẮC PHỤC LỖI 500
                    const base64_1 = canvas1.toDataURL('image/jpeg', 0.6).split(',')[1]; 
                    
                    let base64_2 = null;
                    if (pageNum2) {
                        const page2 = await pdf.getPage(pageNum2);
                        const canvas2 = await renderPageToCanvas(page2);
                        base64_2 = canvas2.toDataURL('image/jpeg', 0.6).split(',')[1];
                    }
                    
                    const label = pageNum2 ? `${pageNum1} & ${pageNum2}` : `${pageNum1}`;
                    const rawQs = await callGeminiVision(base64_1, base64_2, apiKeys[(pageNum1 - 1) % apiKeys.length], label);
                    
                    const processedQs = rawQs.map(q => ({ ...q, image: null }));
                    
                    return { page: label, questions: processedQs, error: null };
                } catch (e) {
                    console.warn(`Lỗi xử lý trang ${pageNum1}:`, e);
                    return { page: pageNum1, questions: [], error: e.message };
                }
            };
            
            const mergeSplitQuestions = (questions) => {
                if (!questions || questions.length === 0) return [];
                const merged = [];
                let prev = null;
                for (const q of questions) {
                    const isNewNumbering = /^(Câu|Bài|Question|Số)\s*\d+/i.test(q.question);
                    const prevIsIncomplete = prev && (!prev.options || prev.options.length === 0);
                    if (prevIsIncomplete && !isNewNumbering) {
                        prev.question += " " + q.question;
                        prev.options = q.options; prev.correct_index = q.correct_index;
                    } else {
                        if (prev) merged.push(prev); prev = q;
                    }
                }
                if (prev) merged.push(prev);
                return merged;
            };

            const handleClientParse = async () => {
                if (!apiKeys.length) return alert("Chưa nạp API Key!");
                if (!fileRef.current.files[0]) return alert("Chưa chọn file!");
                setLoading(true); setProgress("Đang khởi động...");
                try {
                    const buffer = await fileRef.current.files[0].arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(buffer).promise;
                    const BATCH_SIZE = 3; 
                    let allResults = [];
                    const pairs = [];
                    for(let i=1; i<=pdf.numPages; i+=2) pairs.push([i, (i + 1 <= pdf.numPages) ? i + 1 : null]);

                    for (let i = 0; i < pairs.length; i += BATCH_SIZE) {
                        const currentBatch = pairs.slice(i, i + BATCH_SIZE);
                        const batchLabel = `${currentBatch[0][0]}...${currentBatch[currentBatch.length-1][1] || currentBatch[currentBatch.length-1][0]}`;
                        setProgress(`Đang xử lý cặp trang ${batchLabel} / ${pdf.numPages}...`);
                        const batchResults = await Promise.all(currentBatch.map(pair => processPagePair(pair[0], pair[1], pdf, apiKeys)));
                        allResults = [...allResults, ...batchResults];
                    }

                    allResults.sort((a, b) => parseInt(a.page) - parseInt(b.page));
                    let rawQuestions = [];
                    let errorCount = 0;
                    allResults.forEach(res => {
                        if (res.error) errorCount++;
                        if (res.questions) rawQuestions = [...rawQuestions, ...res.questions];
                    });

                    if(rawQuestions.length === 0) throw new Error(`Không tìm thấy câu hỏi nào! (Lỗi ${errorCount} cặp trang).`);
                    setParsedQuestions(mergeSplitQuestions(rawQuestions));
                    setStep("review");
                } catch (e) { alert("Lỗi xử lý: " + e.message); } finally { setLoading(false); }
            };

            const handleSave = async () => {
                setLoading(true); setProgress("Đang lưu lên Cloud...");
                try {
                    await axios.post(`${API_BASE}/api/exam/save`, { 
                        id: initialData ? initialData.info.id : null,
                        title: form.title, school: form.school, subject: form.subject, grade: form.grade, duration: form.duration, 
                        start_time: form.startTime, end_time: form.endTime, 
                        api_keys: [], teacher_email: userEmail, questions: parsedQuestions 
                    });
                    alert("✅ Lưu thành công!"); onBack();
                } catch (e) { alert("Lỗi lưu: " + e.message); } finally { setLoading(false); }
            };

            if (step === "review") return <ReviewExam questions={parsedQuestions} onUpdateQuestions={setParsedQuestions} onSave={handleSave} onBack={()=>setStep("upload")} />;

            return (
                <div className="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg fade-in">
                    <button onClick={onBack} className="mb-4 text-gray-500 font-bold"><i className="fas fa-arrow-left"></i> Quay lại</button>
                    <h2 className="text-2xl font-bold text-indigo-700 mb-6">{initialData ? "Cập Nhật" : "Tạo Đề Thi Mới"}</h2>
                    <div className="grid grid-cols-2 gap-4 mb-4"><input className="border p-3 rounded" placeholder="Tên Kỳ Thi" value={form.title} onChange={e=>setForm({...form, title: e.target.value})} /><input className="border p-3 rounded" placeholder="Trường" value={form.school} onChange={e=>setForm({...form, school: e.target.value})} /></div>
                    <div className="grid grid-cols-3 gap-4 mb-4">
                        <div><label className="text-xs font-bold">Phút</label><input type="number" className="border p-3 rounded w-full" value={form.duration} onChange={e=>setForm({...form, duration: e.target.value})} /></div>
                        <div><label className="text-xs font-bold">Bắt đầu</label><input type="datetime-local" className="border p-3 rounded w-full" value={form.startTime || ""} onChange={e=>setForm({...form, startTime: e.target.value})} /></div>
                        <div><label className="text-xs font-bold">Kết thúc</label><input type="datetime-local" className="border p-3 rounded w-full" value={form.endTime || ""} onChange={e=>setForm({...form, endTime: e.target.value})} /></div>
                    </div>
                    <div className="mb-6 border-2 border-dashed border-indigo-200 p-6 text-center rounded hover:bg-indigo-50 cursor-pointer" onClick={()=>fileRef.current.click()}>
                        <input ref={fileRef} type="file" accept=".pdf" className="hidden" onChange={(e)=>{if(e.target.files.length) setFileName(e.target.files[0].name);}}/>
                        <i className="fas fa-cloud-upload-alt text-4xl text-indigo-400 mb-2"></i><p className="font-bold text-gray-600">{fileName || "Chọn file PDF đề thi"}</p>
                    </div>
                    {loading && <div className="mb-4"><div className="text-center text-indigo-600 font-bold mb-2">{progress}</div><div className="w-full bg-gray-200 rounded-full h-2.5"><div className="bg-indigo-600 h-2.5 rounded-full" style={{width: '100%'}}></div></div></div>}
                    <div className="flex gap-4">
                        {initialData && <button onClick={()=>setStep("review")} className="flex-1 bg-gray-500 text-white py-3 rounded font-bold">Giữ nguyên câu hỏi cũ</button>}
                        <button onClick={handleClientParse} disabled={loading || !apiKeys.length} className="flex-1 bg-indigo-600 text-white py-3 rounded font-bold hover:bg-indigo-700 disabled:opacity-50">{loading ? "Đang xử lý..." : "PHÂN TÍCH VĂN BẢN TỰ ĐỘNG (Bỏ qua hình ảnh)"}</button>
                    </div>
                    {!apiKeys.length && <p className="text-red-500 text-xs mt-2 text-center">⚠️ Bạn cần nạp API Key ở trang chủ trước khi dùng.</p>}
                </div>
            );
        };

        const ResultDetail = ({ examId, onBack }) => {
            const [results, setResults] = useState([]);
            useEffect(() => { axios.get(`${API_BASE}/api/exam/results/${examId}`).then(res => setResults(res.data)); }, [examId]);
            const exportExcel = () => {
                if(!results.length) return alert("Chưa có dữ liệu!");
                const wsData = results.map(r => ({ "SBD": r.sbd, "Họ Tên": r.student_name, "Lớp": r.student_class, "Điểm": r.score, "Chi tiết": r.ai_feedback }));
                const ws = XLSX.utils.json_to_sheet(wsData); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "KQ"); XLSX.writeFile(wb, `KetQua_${examId}.xlsx`);
            };
            return (
                <div className="max-w-6xl mx-auto p-6 fade-in">
                    <div className="flex justify-between mb-6"><button onClick={onBack} className="font-bold text-gray-500"><i className="fas fa-arrow-left"></i> Quay lại</button><button onClick={exportExcel} className="bg-green-600 text-white px-4 py-2 rounded font-bold"><i className="fas fa-file-excel"></i> Xuất Excel</button></div>
                    <div className="bg-white rounded shadow overflow-hidden"><table className="w-full text-left"><thead className="bg-gray-100"><tr><th className="p-3">SBD</th><th className="p-3">Tên</th><th className="p-3">Điểm</th><th className="p-3">Nhận xét</th></tr></thead><tbody>{results.map((r,i)=>(<tr key={i} className="border-b"><td className="p-3">{r.sbd}</td><td className="p-3 font-bold">{r.student_name}</td><td className="p-3 font-bold text-red-600">{r.score}</td><td className="p-3 italic">{r.ai_feedback}</td></tr>))}</tbody></table></div>
                </div>
            );
        };

        const StudentView = ({ examId }) => { 
            return <div className="text-center p-10 mt-10"><i className="fas fa-laptop-code text-6xl text-gray-300 mb-4"></i><p className="text-xl font-bold text-gray-600">Giao diện làm bài của học sinh</p><p className="text-gray-500">Chức năng này đang được cập nhật...</p></div>; 
        };

        const App = () => {
            const [view, setView] = useState("dashboard");
            const [selectedId, setSelectedId] = useState(null);
            const [editData, setEditData] = useState(null);
            const [isStudent, setIsStudent] = useState(false);
            
            useEffect(() => { const p = new URLSearchParams(window.location.search); if(p.get("mode") === "student") { setSelectedId(p.get("examId")); setIsStudent(true); } }, []);
            const handleEditExam = async (id) => { try { const res = await axios.get(`${API_BASE}/api/exam/get/${id}`); setEditData(res.data); setView("create"); } catch(e) { alert("Lỗi tải đề: " + e.message); } };

            if(!userEmail && !isStudent) return <div className="p-10 text-center"><a href="login.html" className="text-blue-600 underline font-bold">Vui lòng đăng nhập để tiếp tục</a></div>;
            if(isStudent) return <StudentView examId={selectedId} />;

            return (
                <ErrorBoundary>
                    <div>
                        {view==="dashboard" && <TeacherDashboard onCreateNew={()=>{setEditData(null); setView("create");}} onEditExam={handleEditExam} onViewDetail={(id)=>{setSelectedId(id); setView("detail")}}/>}
                        {view==="create" && <CreateExam onBack={()=>setView("dashboard")} initialData={editData} />}
                        {view==="detail" && <ResultDetail examId={selectedId} onBack={()=>setView("dashboard")}/>}
                    </div>
                </ErrorBoundary>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
