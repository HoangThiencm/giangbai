<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Thi Trực Tuyến - Teacher Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .katex { font-size: 1.1em; color: #1e3a8a; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_BASE = "https://hoangthiencm-giangbai.hf.space"; 

        // --- AUTH & UTILS ---
        const userEmail = localStorage.getItem('userEmail');
        
        const formatDate = (isoString) => {
            if (!isoString) return "";
            return new Date(isoString).toLocaleString('vi-VN');
        };

        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if (!text) return;
                const parts = text.split(/(\$[^$]+\$)/g);
                ref.current.innerHTML = "";
                parts.forEach(part => {
                    if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false }); } catch { span.innerText = part; }
                        ref.current.appendChild(span);
                    } else { ref.current.appendChild(document.createTextNode(part)); }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        // --- 1. DASHBOARD CHÍNH (Hiện danh sách đề của giáo viên) ---
        const TeacherDashboard = ({ onViewDetail, onCreateNew }) => {
            const [exams, setExams] = useState([]);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (!userEmail) return;
                setLoading(true);
                axios.get(`${API_BASE}/api/exam/my-exams?email=${userEmail}`)
                    .then(res => setExams(res.data))
                    .catch(err => console.error(err))
                    .finally(() => setLoading(false));
            }, []);

            return (
                <div className="max-w-6xl mx-auto p-6 fade-in">
                    <div className="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-sm border border-indigo-100">
                        <div className="flex items-center gap-4">
                             <div className="w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-2xl shadow"><i className="fas fa-chalkboard-teacher"></i></div>
                             <div>
                                <h1 className="text-2xl font-bold text-gray-800">Quản Lý Thi Trực Tuyến</h1>
                                <p className="text-gray-500">Giáo viên: <b className="text-indigo-600">{userEmail}</b></p>
                             </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={()=>window.location.href='index.html'} className="px-5 py-2 text-gray-600 hover:text-indigo-600 font-bold border rounded-lg hover:bg-gray-50 transition">
                                <i className="fas fa-home mr-2"></i> Trang Chủ
                            </button>
                            <button onClick={onCreateNew} className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-bold shadow-lg flex items-center gap-2 transition transform hover:scale-105">
                                <i className="fas fa-plus-circle"></i> TẠO ĐỀ MỚI
                            </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow overflow-hidden border border-gray-200">
                        <div className="px-6 py-4 border-b bg-gray-50 font-bold text-gray-700 flex justify-between items-center">
                            <span><i className="fas fa-list mr-2"></i> Danh Sách Đợt Thi Của Bạn</span>
                            <span className="text-xs bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full font-bold">{exams.length} đề</span>
                        </div>
                        
                        {loading ? (
                            <div className="p-10 text-center text-gray-500"><i className="fas fa-spinner fa-spin mr-2"></i> Đang tải dữ liệu từ Server...</div>
                        ) : exams.length === 0 ? (
                            <div className="p-16 text-center">
                                <div className="text-6xl text-gray-200 mb-4"><i className="fas fa-folder-open"></i></div>
                                <p className="text-gray-500 mb-4">Bạn chưa tạo đợt thi nào.</p>
                                <button onClick={onCreateNew} className="text-indigo-600 font-bold hover:underline">Tạo ngay</button>
                            </div>
                        ) : (
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-gray-50 text-gray-500 text-sm uppercase">
                                    <tr>
                                        <th className="p-4">Tên Kỳ Thi</th>
                                        <th className="p-4">Lớp/Môn</th>
                                        <th className="p-4">Thời Gian</th>
                                        <th className="p-4 text-center">Trạng Thái</th>
                                        <th className="p-4 text-right">Hành Động</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {exams.map((exam) => {
                                        const now = new Date();
                                        const start = new Date(exam.start_time);
                                        const end = new Date(exam.end_time);
                                        let status = <span className="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded">Sắp diễn ra</span>;
                                        if (now > end) status = <span className="bg-red-100 text-red-600 text-xs px-2 py-1 rounded">Đã kết thúc</span>;
                                        else if (now >= start) status = <span className="bg-green-100 text-green-600 text-xs px-2 py-1 rounded animate-pulse">Đang diễn ra</span>;

                                        return (
                                            <tr key={exam.id} className="hover:bg-indigo-50/30 transition group">
                                                <td className="p-4">
                                                    <div className="font-bold text-gray-800 text-lg">{exam.title}</div>
                                                    <div className="text-xs text-gray-400 font-mono">ID: {exam.id}</div>
                                                </td>
                                                <td className="p-4">
                                                    <div className="font-semibold text-gray-700">{exam.school}</div>
                                                    <div className="text-xs font-bold text-indigo-500">{exam.grade} - {exam.subject}</div>
                                                </td>
                                                <td className="p-4 text-sm text-gray-500">
                                                    <div><i className="fas fa-clock mr-1 text-gray-400"></i> {formatDate(exam.start_time)}</div>
                                                    <div><i className="fas fa-flag-checkered mr-1 text-gray-400"></i> {formatDate(exam.end_time)}</div>
                                                </td>
                                                <td className="p-4 text-center">{status}</td>
                                                <td className="p-4 text-right">
                                                    <button onClick={()=>onViewDetail(exam.id)} className="bg-white border border-blue-200 text-blue-600 hover:bg-blue-600 hover:text-white px-4 py-2 rounded-lg text-sm font-bold transition shadow-sm">
                                                        Xem Kết Quả <i className="fas fa-arrow-right ml-1"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>
                        )}
                    </div>
                </div>
            );
        };

        // --- 2. TẠO ĐỀ THI MỚI (Có gửi teacher_email) ---
        const CreateExam = ({ onBack }) => {
            const [form, setForm] = useState({ title: "", school: "", subject: "", grade: "", duration: 45, startTime: "", endTime: "" });
            const [apiKeys, setApiKeys] = useState([]);
            const [loading, setLoading] = useState(false);
            const fileRef = useRef();

            const handleKeyFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const text = await file.text();
                setApiKeys(text.split('\n').map(k => k.trim()).filter(k => k.length > 0));
            };

            const handleUpload = async () => {
                if (apiKeys.length === 0) return alert("Thiếu API Key!");
                const file = fileRef.current.files[0];
                if (!file) return alert("Thiếu file đề!");
                
                setLoading(true);
                const fd = new FormData();
                fd.append("file", file);
                Object.keys(form).forEach(k => fd.append(k.replace(/[A-Z]/g, letter => `_${letter.toLowerCase()}`), form[k])); 
                fd.append("api_keys_json", JSON.stringify(apiKeys));
                fd.append("teacher_email", userEmail); // QUAN TRỌNG: Gắn đề với giáo viên

                try {
                    await axios.post(`${API_BASE}/api/exam/upload`, fd);
                    alert("Tạo thành công!");
                    onBack();
                } catch (e) { alert("Lỗi: " + e.message); } 
                finally { setLoading(false); }
            };

            return (
                <div className="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg fade-in border border-gray-200">
                    <button onClick={onBack} className="mb-6 text-gray-500 hover:text-indigo-600 font-bold flex items-center gap-2"><i className="fas fa-arrow-left"></i> Quay lại danh sách</button>
                    <h2 className="text-2xl font-bold text-indigo-700 mb-6 border-b pb-2">Thiết Lập Kỳ Thi Mới</h2>
                    
                    <div className="grid grid-cols-2 gap-4 mb-4">
                        <input className="border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Tên Trường" onChange={e=>setForm({...form, school: e.target.value})} />
                        <input className="border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Tên Kỳ Thi (VD: Giữa kỳ 1)" onChange={e=>setForm({...form, title: e.target.value})} />
                        <input className="border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Môn học" onChange={e=>setForm({...form, subject: e.target.value})} />
                        <input className="border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Lớp/Khối" onChange={e=>setForm({...form, grade: e.target.value})} />
                    </div>
                    
                    <div className="mb-4 bg-yellow-50 p-4 rounded-lg border border-yellow-200">
                        <label className="block font-bold text-sm mb-1 text-yellow-800">File API Key (Gemini .txt):</label>
                        <input type="file" accept=".txt" onChange={handleKeyFile} className="w-full text-sm bg-white p-2 rounded border" />
                        <p className="text-xs text-gray-500 mt-1">* Hệ thống dùng key này để AI chấm bài tự động.</p>
                    </div>

                    <div className="grid grid-cols-3 gap-4 mb-6">
                        <div><label className="text-xs font-bold block mb-1 text-gray-600">Thời lượng (phút)</label><input type="number" className="border p-2 rounded w-full" value={form.duration} onChange={e=>setForm({...form, duration: e.target.value})} /></div>
                        <div><label className="text-xs font-bold block mb-1 text-gray-600">Bắt đầu</label><input type="datetime-local" className="border p-2 rounded w-full" onChange={e=>setForm({...form, startTime: e.target.value})} /></div>
                        <div><label className="text-xs font-bold block mb-1 text-gray-600">Kết thúc</label><input type="datetime-local" className="border p-2 rounded w-full" onChange={e=>setForm({...form, endTime: e.target.value})} /></div>
                    </div>

                    <div className="mb-6 p-8 border-2 border-dashed border-indigo-200 rounded-xl text-center bg-indigo-50 hover:bg-indigo-100 transition cursor-pointer" onClick={()=>fileRef.current.click()}>
                        <i className="fas fa-cloud-upload-alt text-4xl text-indigo-400 mb-2"></i>
                        <input ref={fileRef} type="file" accept=".docx,.pdf" className="hidden" />
                        <h3 className="font-bold text-indigo-700">Chọn file đề thi (PDF/Word)</h3>
                        <p className="text-xs text-gray-500 mt-2">Hệ thống sẽ tự động nhận diện câu hỏi</p>
                    </div>

                    <button onClick={handleUpload} disabled={loading} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 disabled:bg-gray-400 shadow-lg transition transform hover:-translate-y-1">
                        {loading ? <span><i className="fas fa-spinner fa-spin mr-2"></i> Đang xử lý AI...</span> : "HOÀN TẤT & TẠO ĐỀ"}
                    </button>
                </div>
            );
        };

        // --- 3. CHI TIẾT KẾT QUẢ + EXPORT EXCEL ---
        const ResultDetail = ({ examId, onBack }) => {
            const [results, setResults] = useState([]);
            const [examInfo, setExamInfo] = useState(null);

            useEffect(() => {
                const fetchData = async () => {
                    const [res1, res2] = await Promise.all([
                        axios.get(`${API_BASE}/api/exam/results/${examId}`),
                        axios.get(`${API_BASE}/api/exam/get/${examId}`)
                    ]);
                    setResults(res1.data);
                    setExamInfo(res2.data.info);
                };
                fetchData();
                const interval = setInterval(fetchData, 10000); // Auto refresh mỗi 10s
                return () => clearInterval(interval);
            }, [examId]);

            const exportExcel = () => {
                const ws = XLSX.utils.json_to_sheet(results.map(r => ({
                    "SBD": r.sbd, "Họ Tên": r.student_name, "Lớp": r.student_class,
                    "Điểm": r.score, "Số câu đúng": r.correct_count, "Tổng câu": r.total_questions, "Nhận xét AI": r.ai_feedback, "Nộp lúc": formatDate(r.created_at)
                })));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "KetQua");
                XLSX.writeFile(wb, `KetQua_${examId}.xlsx`);
            };

            const studentLink = `${window.location.href.split('?')[0]}?mode=student&examId=${examId}`;

            return (
                <div className="max-w-6xl mx-auto p-6 fade-in">
                    <button onClick={onBack} className="mb-4 text-gray-500 hover:text-indigo-600 font-bold flex items-center gap-2"><i className="fas fa-arrow-left"></i> Quay lại</button>
                    
                    <div className="bg-white p-6 rounded-xl shadow mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h2 className="text-2xl font-bold text-indigo-900">{examInfo?.title}</h2>
                            <p className="text-gray-500">{examInfo?.school} - {examInfo?.grade} - {examInfo?.subject}</p>
                            <div className="mt-2 flex gap-2">
                                <span className="bg-green-100 text-green-800 text-xs px-2 py-1 rounded font-bold">ID: {examId}</span>
                                <span className="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded font-bold"><i className="fas fa-user-graduate"></i> {results.length} bài nộp</span>
                            </div>
                        </div>
                        <div className="text-right w-full md:w-auto">
                             <p className="text-sm text-gray-500 mb-1">Link cho học sinh:</p>
                             <div className="flex items-center gap-2 bg-gray-100 p-2 rounded mb-3 border">
                                <input readOnly value={studentLink} className="bg-transparent text-xs w-full outline-none font-mono text-gray-600"/>
                                <button onClick={()=>{navigator.clipboard.writeText(studentLink); alert("Đã copy!")}} className="text-blue-600 font-bold text-xs hover:bg-blue-100 px-2 py-1 rounded">COPY</button>
                             </div>
                             <button onClick={exportExcel} className="w-full bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow hover:bg-green-700 flex justify-center items-center gap-2">
                                <i className="fas fa-file-excel"></i> Xuất Báo Cáo Excel
                             </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow overflow-hidden">
                        <table className="w-full text-left border-collapse">
                            <thead className="bg-gray-100 text-gray-600 font-bold text-sm uppercase">
                                <tr>
                                    <th className="p-4">SBD</th>
                                    <th className="p-4">Họ Tên</th>
                                    <th className="p-4">Điểm Số</th>
                                    <th className="p-4 w-1/3">Nhận Xét Của AI</th>
                                    <th className="p-4">Thời gian</th>
                                </tr>
                            </thead>
                            <tbody>
                                {results.map((r, i) => (
                                    <tr key={i} className="border-t hover:bg-gray-50 transition">
                                        <td className="p-4 font-mono font-bold text-blue-600">{r.sbd}</td>
                                        <td className="p-4">
                                            <div className="font-bold text-gray-800">{r.student_name}</div>
                                            <div className="text-xs text-gray-400">{r.student_class}</div>
                                        </td>
                                        <td className="p-4">
                                            <span className={`text-lg font-bold px-3 py-1 rounded-lg ${r.score >= 5 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{r.score}</span>
                                        </td>
                                        <td className="p-4 text-sm italic text-gray-600 border-l border-r bg-yellow-50/30">
                                            <i className="fas fa-robot text-indigo-400 mr-2"></i>"{r.ai_feedback}"
                                        </td>
                                        <td className="p-4 text-sm text-gray-400">{formatDate(r.created_at)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {results.length === 0 && <div className="p-10 text-center text-gray-400 italic">Chưa có học sinh nào nộp bài.</div>}
                    </div>
                </div>
            );
        };

        // --- 4. HỌC SINH LÀM BÀI (Logic cũ nhưng đẹp hơn) ---
        const StudentView = ({ examId }) => {
            const [step, setStep] = useState("check");
            const [info, setInfo] = useState({ name: "", class: "", sbd: "" });
            const [exam, setExam] = useState(null);
            const [answers, setAnswers] = useState({});
            const [submitted, setSubmitted] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");
            const [timeLeft, setTimeLeft] = useState(0);

            useEffect(() => {
                axios.get(`${API_BASE}/api/exam/get/${examId}`)
                    .then(res => {
                        const data = res.data;
                        const now = new Date().getTime();
                        const start = new Date(data.info.start_time).getTime();
                        const end = new Date(data.info.end_time).getTime();
                        if (now < start) { setErrorMsg(`Chưa đến giờ làm bài!\nMở lúc: ${formatDate(data.info.start_time)}`); setStep("error"); return; }
                        if (now > end) { setErrorMsg(`Kỳ thi đã kết thúc lúc: ${formatDate(data.info.end_time)}`); setStep("error"); return; }
                        setExam(data); setStep("info");
                        const durationMs = data.info.duration_mins * 60 * 1000;
                        const timeUntilEnd = end - now;
                        setTimeLeft(Math.floor(Math.min(durationMs, timeUntilEnd) / 1000));
                    })
                    .catch(() => { setErrorMsg("Không tìm thấy đề thi hoặc lỗi kết nối."); setStep("error"); });
            }, [examId]);

            useEffect(() => {
                if (step !== "exam") return;
                if (timeLeft <= 0) { handleSubmit(true); return; }
                const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                return () => clearInterval(timer);
            }, [step, timeLeft]);

            const formatTime = (s) => `${Math.floor(s / 60)}:${s % 60 < 10 ? '0' : ''}${s % 60}`;

            const handleStart = () => {
                if (!info.name || !info.sbd) return alert("Vui lòng nhập đủ thông tin!");
                setStep("exam");
                // Shuffle questions locally
                const qWithIdx = exam.questions.map((q, i) => ({...q, originalIndex: i}));
                setExam({ ...exam, questions: qWithIdx.sort(() => Math.random() - 0.5) });
            };

            const handleSubmit = async (auto = false) => {
                if (!auto && !confirm("Bạn chắc chắn muốn nộp bài?")) return;
                const payload = { exam_id: examId, student_name: info.name, sbd: info.sbd, student_class: info.class, answers: {} };
                exam.questions.forEach((q, currentIdx) => { if (answers[currentIdx] !== undefined) payload.answers[q.originalIndex] = answers[currentIdx]; });
                try {
                    setStep("loading");
                    const res = await axios.post(`${API_BASE}/api/exam/submit`, payload);
                    setSubmitted(res.data); setStep("result");
                } catch (e) { alert("Lỗi nộp bài: " + e.message); setStep("exam"); }
            };

            if (step === "error") return <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4"><div className="bg-white p-8 rounded-xl shadow text-center max-w-md"><h3 className="text-xl font-bold text-red-600 mb-2">Thông Báo</h3><p className="whitespace-pre-line text-gray-700">{errorMsg}</p></div></div>;
            if (step === "result" && submitted) return <div className="min-h-screen bg-green-50 flex items-center justify-center p-4"><div className="bg-white p-8 rounded-xl shadow-xl max-w-md w-full text-center"><div className="text-6xl mb-4">🎉</div><h2 className="text-2xl font-bold text-green-700 mb-2">Hoàn thành!</h2><p className="text-4xl font-extrabold text-gray-800 mb-4">{submitted.score} điểm</p><div className="bg-yellow-50 p-4 rounded text-left text-sm text-gray-700 border border-yellow-200"><strong>🤖 AI Nhận xét:</strong><p className="mt-1 italic">"{submitted.feedback}"</p></div></div></div>;
            if (step === "info") return <div className="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg border-t-4 border-blue-600"><h2 className="text-xl font-bold mb-2 text-center text-blue-800">{exam?.info?.school}</h2><h3 className="text-lg font-semibold mb-6 text-center">{exam?.info?.title}</h3><div className="bg-gray-50 p-3 rounded mb-4 text-sm border"><p>⏰ Thời gian: <b>{exam?.info?.duration_mins} phút</b></p><p>📅 Hạn chót: {formatDate(exam?.info?.end_time)}</p></div><div className="space-y-3"><input className="w-full border p-3 rounded" placeholder="Họ và tên" value={info.name} onChange={e=>setInfo({...info, name: e.target.value})} /><input className="w-full border p-3 rounded" placeholder="Lớp" value={info.class} onChange={e=>setInfo({...info, class: e.target.value})} /><input className="w-full border p-3 rounded" placeholder="Số Báo Danh (SBD)" value={info.sbd} onChange={e=>setInfo({...info, sbd: e.target.value})} /><button onClick={handleStart} className="w-full bg-blue-600 text-white py-3 rounded font-bold shadow hover:bg-blue-700 transition">VÀO THI</button></div></div>;
            if (step === "loading") return <div className="min-h-screen flex items-center justify-center"><div className="text-xl font-bold text-indigo-600 animate-pulse">Đang nộp bài...</div></div>;

            return (
                <div className="max-w-3xl mx-auto p-4 pb-20 font-sans">
                    <div className="sticky top-0 bg-white p-4 shadow-md z-10 flex justify-between items-center mb-4 rounded-lg ring-1 ring-gray-200">
                        <div><div className="font-bold text-gray-800">{info.name}</div><div className="text-xs text-gray-500">SBD: {info.sbd}</div></div>
                        <div className="flex items-center gap-4"><div className={`text-xl font-mono font-bold ${timeLeft < 60 ? 'text-red-600 animate-pulse' : 'text-blue-600'}`}>{formatTime(timeLeft)}</div><button onClick={()=>handleSubmit(false)} className="bg-green-600 text-white px-4 py-2 rounded font-bold hover:bg-green-700 shadow">Nộp Bài</button></div>
                    </div>
                    {exam && exam.questions.map((q, idx) => (
                        <div key={idx} className="bg-white p-6 rounded-lg shadow-sm mb-4 border border-gray-100">
                            <div className="flex gap-2 mb-3"><span className="font-bold text-blue-600 whitespace-nowrap bg-blue-50 px-2 py-1 rounded h-fit">Câu {idx+1}:</span><div className="text-gray-800 text-lg"><MathText text={q.question} /></div></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 ml-4">
                                {q.options.map((opt, oIdx) => (
                                    <div key={oIdx} onClick={()=>setAnswers({...answers, [idx]: oIdx})} className={`p-3 border rounded-lg cursor-pointer transition flex gap-2 items-center ${answers[idx]===oIdx ? 'border-blue-500 bg-blue-50 ring-1 ring-blue-500' : 'hover:bg-gray-50 border-gray-200'}`}><div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold border transition ${answers[idx]===oIdx ? 'bg-blue-600 text-white border-blue-600' : 'text-gray-500 border-gray-300 bg-gray-50'}`}>{String.fromCharCode(65+oIdx)}</div><div className="flex-1"><MathText text={opt} /></div></div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState("dashboard");
            const [selectedExamId, setSelectedExamId] = useState(null);
            const [isStudentMode, setIsStudentMode] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get("mode") === "student") {
                    setSelectedExamId(params.get("examId"));
                    setIsStudentMode(true);
                } else if (!userEmail) {
                    window.location.href = 'login.html';
                }
            }, []);

            if (isStudentMode) return <StudentView examId={selectedExamId} />;

            return (
                <div>
                    {view === "dashboard" && <TeacherDashboard onCreateNew={()=>setView("create")} onViewDetail={(id)=>{setSelectedExamId(id); setView("detail");}} />}
                    {view === "create" && <CreateExam onBack={()=>setView("dashboard")} />}
                    {view === "detail" && <ResultDetail examId={selectedExamId} onBack={()=>setView("dashboard")} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
