                try {
                    const active = document.fullscreenElement || document.webkitFullscreenElement;
                    if (!active) return;
                    const exit = document.exitFullscreen || document.webkitExitFullscreen;
                    if (!exit) return;
                    await Promise.race([
                        exit.call(document),
                        new Promise(resolve => setTimeout(resolve, 1200))
                    ]);
                } catch { }
            };

            const normalizeAnswersPayload = (rawAnswers) => {
                const payload = {};
                Object.entries(rawAnswers || {}).forEach(([key, value]) => {
                    if (value === undefined || value === null || value === "") return;
                    payload[String(key)] = Number(value);
                });
                return payload;
            };

            const handleSubmit = useCallback(async (auto = false) => {
                const currentExam = examRef.current;
                if (!currentExam?.questions?.length) {
                    showStudentAlert("Không tải được đề thi. Vui lòng tải lại trang.");
                    return;
                }
                if (submittingRef.current) return;

                const currentAnswers = answersRef.current;
                const currentInfo = getSubmitInfo();
                const answeredCount = Object.keys(currentAnswers).length;
                const totalCount = currentExam.questions.length;

                if (!currentInfo.name || !currentInfo.sbd) {
                    showStudentAlert("Thiếu Họ tên hoặc SBD. Vui lòng tải lại trang, nhập đầy đủ thông tin rồi làm bài lại.");
                    submittingRef.current = false;
                    setSubmitting(false);
                    return;
                }

                if (!auto) {
                    if (answeredCount < totalCount) {
                        showStudentAlert(`Bạn mới làm ${answeredCount}/${totalCount} câu. Vui lòng hoàn thành hết các câu hỏi!`);
                        return;
                    }
                    if (!isMobileClient && !window.confirm("Bạn chắc chắn muốn nộp bài?")) return;
                }

                submittingRef.current = true;
                setSubmitting(true);
                setShowSubmitConfirm(false);

                if (cleanupListenersRef.current) {
                    cleanupListenersRef.current();
                    cleanupListenersRef.current = null;
                }

                try {
                    await safeExitFullscreen();
                    const res = await axios.post(examUrl("submit"), {
                        exam_id: examId,
                        student_name: currentInfo.name,
                        sbd: currentInfo.sbd,
                        student_class: currentInfo.class,
                        answers: normalizeAnswersPayload(currentAnswers)
                    }, { timeout: 45000 });
                    setExam(prev => ({ ...(prev || {}), ...res.data }));
                    setStep("result");
                } catch (e) {
                    const message = formatApiError(e, "Lỗi nộp bài!");
                    showStudentAlert(message);
                    submittingRef.current = false;
                    setSubmitting(false);
                }
            }, [examId, isMobileClient, showStudentAlert]);

            const requestManualSubmit = () => {
                const currentExam = examRef.current;
                const currentAnswers = answersRef.current;
                const answeredCount = Object.keys(currentAnswers).length;
                const totalCount = currentExam?.questions?.length || 0;
                if (answeredCount < totalCount) {
                    showStudentAlert(`Bạn mới làm ${answeredCount}/${totalCount} câu. Vui lòng hoàn thành hết các câu hỏi!`);
                    return;
                }
                if (isMobileClient) {
                    setShowSubmitConfirm(true);
                    return;
                }
                handleSubmit(false);
            };

            useEffect(() => {
                if (step !== "exam") return;

                timeUpHandledRef.current = false;
                const timer = setInterval(() => {
                    setTimeLeft(v => {
                        if (v <= 1) {
                            if (!timeUpHandledRef.current) {
                                timeUpHandledRef.current = true;
                                handleSubmit(true);
                            }
                            return 0;
                        }
                        return v - 1;
                    });
                }, 1000);

                if (!isMobileClient) {
                    const handleViolation = () => {
                        setViolationCount(prev => {
                            const newCount = prev + 1;
                            if (newCount >= 3) {
                                alert("Vi phạm quy chế (thoát màn hình) quá 3 lần. Hệ thống tự động thu bài!");
                                handleSubmit(true);
                            } else {
                                setIsLockedOut(true);
                            }
                            return newCount;
                        });
                    };

                    const checkFullscreen = () => {
                        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                            handleViolation();
                        }
                    };

                    const checkVisibility = () => {
                        if (document.hidden) handleViolation();
                    };

                    document.addEventListener("fullscreenchange", checkFullscreen);
                    document.addEventListener("visibilitychange", checkVisibility);
                    window.addEventListener("blur", checkVisibility);

                    cleanupListenersRef.current = () => {
                        document.removeEventListener("fullscreenchange", checkFullscreen);
                        document.removeEventListener("visibilitychange", checkVisibility);
                        window.removeEventListener("blur", checkVisibility);
                    };
                } else {
                    cleanupListenersRef.current = null;
                }

                return () => {
                    clearInterval(timer);
                    if (cleanupListenersRef.current) cleanupListenersRef.current();
                };
            }, [step, isMobileClient, handleSubmit]);

            const enterFullscreen = () => {
                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen().catch(() => { });
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
            };

            const startExam = async () => {
                let snapshot;
                if (isClassRosterMode) {
                    if (!selectedRosterKey) return showStudentAlert("Vui lòng chọn tên của bạn trong danh sách lớp!");
                    const student = examRoster.find(item => rosterKey(item) === selectedRosterKey);
                    if (!student) return showStudentAlert("Thí sinh không hợp lệ. Vui lòng chọn lại.");
                    snapshot = persistInfo({
                        name: student.full_name,
                        sbd: student.sbd,
                        class: student.class_name || exam?.info?.class_name || ""
                    });
                    const latestAttemptInfo = await fetchAttemptInfo(snapshot.name, snapshot.sbd);
                    if (latestAttemptInfo && latestAttemptInfo.can_attempt === false) {
                        const maxAttempts = latestAttemptInfo.max_attempts || exam?.info?.max_attempts || 0;
                        return showStudentAlert(`Bạn đã thi đủ ${maxAttempts} lần cho đề này. Không thể làm thêm.`);
                    }
                } else {
                    const fromInputs = readInfoFromInputs();
                    snapshot = persistInfo({
                        name: fromInputs.name || info.name,
                        sbd: fromInputs.sbd || info.sbd,
                        class: fromInputs.class || info.class
                    });
                    if (!snapshot.name || !snapshot.sbd) {
                        return showStudentAlert("Vui lòng nhập Họ tên và SBD!");
                    }
                }
                setInfo(snapshot);
                if (!isMobileClient) enterFullscreen();
                setStep("exam");
            };

            const unlockExam = () => {
                if (!isMobileClient) enterFullscreen();
                setIsLockedOut(false);
            };

            const handleSelectAnswer = (originalQIdx, originalOptIdx) => {
                setAnswers(prev => ({ ...prev, [originalQIdx]: originalOptIdx }));
            };

            if (step === "locked") return withStudentToast(<div className="flex justify-center h-screen items-center bg-gray-100"><div className="bg-white p-8 rounded shadow text-center"><h2 className="text-xl font-bold text-red-500 mb-2"><i className="fas fa-lock"></i> Đóng Cửa</h2><p>{error}</p></div></div>);
            if (step === "loading") return withStudentToast(<div className="flex justify-center h-screen items-center"><div className="loader border-indigo-600"></div></div>);

            if (step === "info" && isClassRosterMode && examRoster.length === 0) {
                return withStudentToast(
                    <div className="flex justify-center h-screen items-center bg-gray-100 p-4">
                        <div className="bg-white p-8 rounded shadow text-center max-w-md">
                            <h2 className="text-xl font-bold text-red-500 mb-2"><i className="fas fa-exclamation-circle"></i> Không vào thi được</h2>
                            <p className="text-gray-600">Đề thi đang dùng danh sách lớp nhưng chưa có thí sinh. Vui lòng báo giáo viên kiểm tra lại cấu hình đề.</p>
                        </div>
                    </div>
                ));
            }

            if (step === "info") return withStudentToast(
                <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white p-8 rounded-xl shadow-lg text-center">
                        <div className="mb-4 text-indigo-600"><i className="fas fa-user-graduate text-5xl"></i></div>
                        <h2 className="text-2xl font-bold mb-2 text-gray-800">{exam.info.title}</h2>
                        <div className="flex justify-center gap-4 text-sm text-gray-500 mb-6"><span><i className="fas fa-clock"></i> {exam.info.duration_mins} phút</span><span><i className="fas fa-question-circle"></i> {exam.questions.length} câu</span></div>
                        <div className="space-y-3 text-left">
                            {isClassRosterMode ? (
                                <>
                                    <div className="bg-indigo-50 border border-indigo-100 rounded-lg p-3 text-sm text-indigo-900">
                                        <div className="font-bold mb-1"><i className="fas fa-users"></i> Danh sách lớp: {exam.info.class_name || "—"}</div>
                                        <div className="text-xs text-indigo-700">Chọn đúng tên của bạn trong danh sách giáo viên đã gửi.</div>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-700">Tìm tên hoặc SBD</label>
                                        <input
                                            className="border p-3 w-full rounded focus:ring-2 focus:ring-indigo-500 outline-none allow-select mb-2"
                                            placeholder="Gõ họ tên hoặc SBD để lọc..."
                                            value={rosterSearch}
                                            onChange={e => setRosterSearch(e.target.value)}
                                        />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-gray-700">Chọn tên của bạn (*)</label>
                                        <select
                                            className="border p-3 w-full rounded focus:ring-2 focus:ring-indigo-500 outline-none bg-white allow-select"
                                            value={selectedRosterKey}
                                            onChange={e => selectRosterStudent(e.target.value)}
                                        >
                                            <option value="">{filteredExamRoster.length ? "-- Chọn họ và tên --" : (rosterSearch.trim() ? "Không tìm thấy thí sinh" : "-- Chọn họ và tên --")}</option>
                                            {filteredExamRoster.map(student => {
                                                const key = rosterKey(student);
                                                return (
                                                    <option key={key} value={key}>
                                                        {student.full_name} · SBD {student.sbd}
                                                    </option>
                                                );
                                            })}
                                        </select>
                                        {rosterSearch.trim() && (
                                            <div className="text-xs text-gray-500 mt-1">Hiển thị {filteredExamRoster.length}/{examRoster.length} thí sinh</div>
                                        )}
                                    </div>
                                    {selectedRosterKey && (
                                        <>
                                            <div className="grid grid-cols-2 gap-2 text-sm">
                                                <div className="bg-gray-50 border rounded p-2">
                                                    <div className="text-[11px] font-bold text-gray-500">SBD</div>
                                                    <div className="font-semibold text-gray-800">{info.sbd}</div>
                                                </div>
                                                <div className="bg-gray-50 border rounded p-2">
                                                    <div className="text-[11px] font-bold text-gray-500">Lớp</div>
                                                    <div className="font-semibold text-gray-800">{info.class || exam.info.class_name || "—"}</div>
                                                </div>
                                            </div>
                                            {checkingAttempts ? (
                                                <div className="text-xs text-gray-500">Đang kiểm tra số lần thi...</div>
                                            ) : attemptInfo && (exam.info.max_attempts > 0 || attemptInfo.max_attempts > 0) ? (
                                                <div className={`text-xs rounded-lg p-3 border ${attemptInfo.can_attempt ? "bg-emerald-50 border-emerald-200 text-emerald-800" : "bg-rose-50 border-rose-200 text-rose-800"}`}>
                                                    {attemptInfo.can_attempt
                                                        ? `Bạn còn ${attemptInfo.remaining} / ${attemptInfo.max_attempts} lượt thi.`
                                                        : `Bạn đã thi đủ ${attemptInfo.max_attempts} lần. Không thể làm thêm.`}
                                                </div>
                                            ) : null}
                                        </>
                                    )}
                                </>
                            ) : (
                                <>
                                    <div><label className="text-xs font-bold text-gray-700">Họ và Tên (*)</label><input ref={nameInputRef} name="student_name" autoComplete="name" value={info.name} className="border p-3 w-full rounded focus:ring-2 focus:ring-indigo-500 outline-none allow-select" placeholder="Nguyễn Văn A" onChange={e => updateInfoField("name", e.target.value)} onBlur={e => updateInfoField("name", e.target.value)} /></div>
                                    <div><label className="text-xs font-bold text-gray-700">Số Báo Danh (*)</label><input ref={sbdInputRef} name="student_sbd" autoComplete="off" value={info.sbd} className="border p-3 w-full rounded focus:ring-2 focus:ring-indigo-500 outline-none allow-select" placeholder="SBD123456" onChange={e => updateInfoField("sbd", e.target.value)} onBlur={e => updateInfoField("sbd", e.target.value)} /></div>
                                    <div><label className="text-xs font-bold text-gray-700">Lớp</label><input ref={classInputRef} name="student_class" autoComplete="off" value={info.class} className="border p-3 w-full rounded focus:ring-2 focus:ring-indigo-500 outline-none allow-select" placeholder="12A1" onChange={e => updateInfoField("class", e.target.value)} onBlur={e => updateInfoField("class", e.target.value)} /></div>
                                </>
                            )}
                        </div>
                        <div className="mt-6 bg-yellow-50 text-yellow-800 p-3 rounded text-xs text-left border border-yellow-200">
                            <strong><i className="fas fa-exclamation-triangle"></i> LƯU Ý:</strong><br />
                            {isMobileClient ? (
                                <>
                                    - Làm bài trên điện thoại/Zalo: giữ nguyên màn hình thi, không thoát app giữa chừng.<br />
                                    - Làm hết tất cả câu rồi bấm <b>Nộp Bài</b>. Hết giờ hệ thống tự nộp.<br />
                                    - Nếu lỗi, thử mở link bằng Chrome/Safari thay vì Zalo.
                                </>
                            ) : (
                                <>
                                    - Hệ thống bật chế độ <b>TOÀN MÀN HÌNH</b>.<br />
                                    - <b>TUYỆT ĐỐI KHÔNG</b> thoát màn hình hoặc chuyển tab.<br />
                                    - Nếu vi phạm <b>3 lần</b> sẽ bị <b>THU BÀI</b> ngay lập tức.
                                </>
                            )}
                        </div>
                        <button
                            onClick={startExam}
                            disabled={checkingAttempts || (isClassRosterMode && attemptInfo && attemptInfo.can_attempt === false)}
                            className="mt-6 bg-indigo-600 text-white w-full py-3 rounded-lg font-bold shadow-lg hover:bg-indigo-700 transition transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-indigo-600 disabled:active:scale-100"
                        >
                            {checkingAttempts ? "ĐANG KIỂM TRA..." : (isClassRosterMode && attemptInfo && attemptInfo.can_attempt === false ? "ĐÃ HẾT LƯỢT THI" : "VÀO THI NGAY")}
                        </button>
                    </div>
                </div>
            ));

            if (step === "result") return withStudentToast(
                <div className="min-h-screen bg-gradient-to-b from-green-50 to-white flex items-center justify-center p-4">
                    <div className="bg-white p-10 rounded-2xl shadow-2xl text-center max-w-lg w-full border border-green-100">
                        <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-600 text-4xl shadow-inner"><i className="fas fa-check"></i></div>
                        <h2 className="text-3xl font-bold text-gray-800 mb-2">Hoàn Thành!</h2><p className="text-gray-500 mb-6">Bạn đã nộp bài thành công.</p>
                        <div className="bg-gray-50 p-6 rounded-xl border border-gray-200 mb-6"><p className="text-sm text-gray-500 uppercase tracking-wide font-bold mb-2">Kết quả</p><p className="text-5xl font-extrabold text-indigo-600 mb-2">{exam.score}</p><p className="text-sm font-bold text-gray-400">Điểm số</p></div>
                        <div className="bg-blue-50 p-4 rounded text-left text-sm text-blue-800 italic border-l-4 border-blue-500">
                            <strong><i className="fas fa-robot"></i> Nhận xét từ AI:</strong><br />
                            {exam.feedback || exam.ai_feedback}
                        </div>
                    </div>
                </div>
            ));

            return withStudentToast(
                <div className="fixed top-0 left-0 w-full h-full bg-white z-50 overflow-y-auto noselect">
                    {showSubmitConfirm && (
                        <div className="modal-overlay" onClick={() => !submitting && setShowSubmitConfirm(false)}>
                            <div className="modal-box text-center" onClick={e => e.stopPropagation()}>
                                <h3 className="font-bold text-lg mb-2 text-indigo-800">Xác nhận nộp bài</h3>
                                <p className="text-sm text-gray-600 mb-5">Bạn đã hoàn thành tất cả câu hỏi. Bấm <b>Nộp bài</b> để gửi kết quả.</p>
                                <div className="flex gap-2">
                                    <button type="button" disabled={submitting} onClick={() => setShowSubmitConfirm(false)} className="flex-1 bg-gray-100 text-gray-700 px-4 py-3 rounded-lg font-bold">Làm tiếp</button>
                                    <button type="button" disabled={submitting} onClick={() => handleSubmit(false)} className="flex-1 bg-indigo-600 text-white px-4 py-3 rounded-lg font-bold disabled:opacity-60">
                                        {submitting ? "Đang nộp..." : "Nộp bài"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Anti-Cheat Overlay - chỉ máy tính */}
                    {!isMobileClient && isLockedOut && (
                        <div className="violation-overlay">
                            <div className="text-6xl text-red-500 mb-4"><i className="fas fa-exclamation-triangle"></i></div>
                            <h2 className="text-2xl font-bold mb-2 text-red-500">CẢNH BÁO VI PHẠM!</h2>
                            <p className="mb-6 max-w-md">Bạn đã rời khỏi màn hình thi. Đây là hành động vi phạm quy chế.<br />Bạn còn <b>{3 - violationCount}</b> lần vi phạm trước khi bị thu bài.</p>
                            <button onClick={unlockExam} className="bg-white text-red-600 px-6 py-3 rounded-full font-bold shadow-lg hover:bg-gray-100 transition">Quay lại làm bài</button>
                        </div>
                    )}

                    <div className={`max-w-4xl mx-auto pb-20 ${!isMobileClient && isLockedOut ? 'blur-sm pointer-events-none' : ''}`}>
                        <div className="sticky top-0 bg-white/95 backdrop-blur shadow-md px-4 py-3 rounded-b-xl flex justify-between items-center z-30 border-t-4 border-indigo-600">
                            <div><div className="font-bold text-gray-800 text-sm truncate w-32">{info.name}</div><div className="text-xs text-gray-500 font-mono">{info.sbd}</div></div>
                            <div className="bg-gray-100 px-3 py-1 rounded-full text-xs font-bold text-gray-600">Đã làm: <span className="text-indigo-600">{Object.keys(answers).length}</span>/{shuffledQuestions.length}</div>
                            <div className="flex items-center gap-3">
                                <div className={`font-mono text-xl font-bold ${timeLeft < 300 ? 'text-red-600 animate-pulse' : 'text-indigo-700'}`}>{Math.floor(timeLeft / 60)}:{String(timeLeft % 60).padStart(2, '0')}</div>
                                <button type="button" disabled={submitting} onClick={requestManualSubmit} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-indigo-700 shadow transition disabled:opacity-60">
                                    {submitting ? "Đang nộp..." : "Nộp Bài"}
                                </button>
                            </div>
                        </div>
                        <div className="h-1 w-full bg-gray-200 fixed top-[68px] left-0 z-20 md:hidden"><div className="h-full bg-indigo-500 transition-all duration-300" style={{ width: `${(Object.keys(answers).length / shuffledQuestions.length) * 100}%` }}></div></div>
                        <div className="p-4 space-y-6 mt-2">
                            {shuffledQuestions.map((q, i) => (
                                <div key={q.id} className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 relative group hover:shadow-md transition">
                                    <div className="flex gap-4 mb-4">
                                        <div className="flex flex-col items-center gap-1"><span className="bg-indigo-100 text-indigo-700 w-8 h-8 flex items-center justify-center rounded-full font-bold text-sm shadow-sm">{i + 1}</span>{answers[q.originalIdx] !== undefined && <i className="fas fa-check-circle text-green-500 text-xs"></i>}</div>
                                        <div className="flex-1">
                                            {/* Corrected logic for showing image */}
                                            {q.question_image && <img src={q.question_image} className="max-h-60 rounded-lg border mb-3 block object-contain bg-gray-50" />}
                                            <div className="text-gray-800 text-base leading-relaxed font-medium"><MathText text={q.question} cleanPrefix={true} /></div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 pl-0 md:pl-12">
                                        {q.shuffledOptions.map((opt, visualIdx) => {
                                            const isSelected = answers[q.originalIdx] === opt.originalOptIdx;
                                            return (<div key={visualIdx} onClick={() => handleSelectAnswer(q.originalIdx, opt.originalOptIdx)} className={`p-3 rounded-xl border-2 cursor-pointer flex gap-3 items-center transition-all duration-200 active:scale-[0.98] ${isSelected ? 'border-indigo-500 bg-indigo-50 shadow-inner' : 'border-gray-100 hover:border-indigo-200 hover:bg-gray-50'}`}><div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-colors ${isSelected ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-500'}`}>{String.fromCharCode(65 + visualIdx)}</div><div className={`text-sm ${isSelected ? 'text-indigo-900 font-medium' : 'text-gray-600'}`}><MathText text={cleanOptionText(opt.text)} /></div></div>);
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            ));
        };

        const studentResultKey = (name, sbd) => `${String(sbd || "").trim().toLowerCase()}|${String(name || "").trim().toLowerCase()}`;

        const ResultDetail = ({ examId, onBack }) => {
            const [results, setResults] = useState([]);
            const [examQuestions, setExamQuestions] = useState([]);
            const [examInfo, setExamInfo] = useState(null);
            const [expandedKeys, setExpandedKeys] = useState({});
            const [deletingId, setDeletingId] = useState(null);
            const [deletingBatch, setDeletingBatch] = useState(false);

            useEffect(() => {
                Promise.all([
                    axios.get(examUrl(`results/${examId}`), { withCredentials: true }),
                    axios.get(examUrl(`get/${examId}`), { withCredentials: true })
                ]).then(([resResults, resExam]) => {
                    setResults(resResults.data || []);
                    setExamQuestions(resExam.data?.questions || []);
                    setExamInfo(resExam.data?.info || null);
                }).catch(() => {
                    axios.get(examUrl(`results/${examId}`), { withCredentials: true })
                        .then(res => setResults(res.data || []))
                        .catch(() => setResults([]));
                });
            }, [examId]);

            const studentSummaries = useMemo(() => {
                const grouped = {};
                const sorted = [...results].sort((a, b) => new Date(a.created_at || 0) - new Date(b.created_at || 0));
                sorted.forEach((r, index) => {
                    const key = studentResultKey(r.student_name, r.sbd);
                    if (!grouped[key]) {
                        grouped[key] = {
                            key,
                            name: r.student_name,
                            sbd: r.sbd,
                            className: r.student_class,
                            attempts: []
                        };
                    }
                    const attemptNo = grouped[key].attempts.length + 1;
                    grouped[key].attempts.push({
                        ...r,
                        attemptNo,
                        rowKey: `${r.id || index}-${r.created_at || index}`
                    });
                });

                return Object.values(grouped).map(group => {
                    const best = group.attempts.reduce((currentBest, attempt) => {
                        if (!currentBest) return attempt;
                        const bestScore = Number(currentBest.score) || 0;
                        const attemptScore = Number(attempt.score) || 0;
                        if (attemptScore > bestScore) return attempt;
                        if (attemptScore === bestScore && attempt.attemptNo < currentBest.attemptNo) return attempt;
                        return currentBest;
                    }, null);
                    return {
                        ...group,
                        best,
                        attemptCount: group.attempts.length,
                        hasMultipleAttempts: group.attempts.length > 1
                    };
                }).sort((a, b) => {
                    const scoreDiff = (Number(b.best?.score) || 0) - (Number(a.best?.score) || 0);
                    if (scoreDiff !== 0) return scoreDiff;
                    return (a.name || "").localeCompare(b.name || "", "vi");
                });
            }, [results]);

            const notTakenStudents = useMemo(() => {
                if (examInfo?.student_mode !== "class") return [];
                const roster = Array.isArray(examInfo.roster) ? examInfo.roster : [];
                const takenKeys = new Set(results.map(r => studentResultKey(r.student_name, r.sbd)));
                return roster
                    .filter(item => {
                        const key = studentResultKey(item.full_name, item.sbd || item.username);
                        return key !== "|" && !takenKeys.has(key);
                    })
                    .sort((a, b) => (a.full_name || "").localeCompare(b.full_name || "", "vi"));
            }, [examInfo, results]);

            const toggleExpanded = (key) => {
                setExpandedKeys(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const stripMathDelimiters = (text) => String(text || "").replace(/\$/g, "").replace(/\\textbf\{([^}]+)\}/g, "$1").replace(/\\textit\{([^}]+)\}/g, "$1").replace(/\s+/g, " ").trim();

            const normalizeQuestionText = (text) => stripMathDelimiters(text)
                .replace(/^(Câu|Bài|Question)\s*\d+[\.\:\)]\s*/i, "")
                .toLowerCase();

            const originalQuestionList = useMemo(() => (
                examQuestions.map((q, idx) => ({
                    no: idx + 1,
                    text: normalizeQuestionText(q.question || q.q || "")
                }))
            ), [examQuestions]);

            const questionLookup = useMemo(() => {
                const map = new Map();
                originalQuestionList.forEach(item => {
                    if (item.text) map.set(item.text, item.no);
                });
                return map;
            }, [originalQuestionList]);

            const findOriginalQuestionNo = (questionText) => {
                const key = normalizeQuestionText(questionText);
                if (!key) return null;
                if (questionLookup.has(key)) return questionLookup.get(key);
                let best = null;
                let bestLen = 0;
                originalQuestionList.forEach(item => {
                    if (!item.text) return;
                    if (item.text === key || item.text.includes(key) || key.includes(item.text)) {
                        const overlap = Math.min(item.text.length, key.length);
                        if (overlap > bestLen) {
                            bestLen = overlap;
                            best = item.no;
                        }
                    }
                });
                return best;
            };

            const parseWrongItems = (detailsJson) => {
                if (!detailsJson) return [];
                try {
                    const details = typeof detailsJson === "string" ? JSON.parse(detailsJson) : detailsJson;
                    return Array.isArray(details) ? details : [];
                } catch {
                    return [];
                }
            };

            const splitCorrectWrong = (result) => {
                const total = Number(result.total_questions) || examQuestions.length || 0;
                const wrongItems = parseWrongItems(result.details_json);
                const wrongNums = [];
                wrongItems.forEach(item => {
                    const num = findOriginalQuestionNo(item.q || item.question || "");
                    if (num && !wrongNums.includes(num)) wrongNums.push(num);
                });
                wrongNums.sort((a, b) => a - b);

                const expectedWrong = Math.max(0, total - Number(result.correct_count || 0));
                if (wrongNums.length !== expectedWrong && expectedWrong > 0 && wrongItems.length === expectedWrong) {
                    const used = new Set(wrongNums);
                    wrongItems.forEach(item => {
                        if (wrongNums.length >= expectedWrong) return;
                        const key = normalizeQuestionText(item.q || item.question || "");
                        originalQuestionList.forEach(q => {
                            if (wrongNums.length >= expectedWrong) return;
                            if (used.has(q.no)) return;
                            if (q.text && key && (q.text.startsWith(key.slice(0, 24)) || key.startsWith(q.text.slice(0, 24)))) {
                                wrongNums.push(q.no);
                                used.add(q.no);
                            }
                        });
                    });
                    wrongNums.sort((a, b) => a - b);
                }

                const wrongSet = new Set(wrongNums);
                const correctNums = [];
                for (let i = 1; i <= total; i++) {
                    if (!wrongSet.has(i)) correctNums.push(i);
                }
                return { correctNums, wrongNums };
            };

            const formatQuestionNums = (nums) => nums.length ? nums.map(n => `Câu ${n}`).join(", ") : "—";

            const isTestResult = (row) => {
                const sbd = (row.sbd || "").trim().toUpperCase();
                const name = (row.student_name || "").trim();
                return sbd.startsWith("TEST") || /^Test(\s|$)/i.test(name);
            };

            const testResults = useMemo(() => results.filter(isTestResult), [results]);

            const handleDeleteResult = async (row) => {
                if (!row?.id) return alert("Không xác định được bản ghi để xóa.");
                const label = `${(row.student_name || "").trim() || "Học sinh"} · ${(row.sbd || "").trim() || "?"}`;
                if (!confirm(`Xóa kết quả: ${label}?`)) return;
                setDeletingId(row.id);
                try {
                    await axios.delete(examUrl(`result/${row.id}`), { withCredentials: true });
                    setResults(prev => prev.filter(item => item.id !== row.id));
                } catch (e) {
                    alert(formatApiError(e, "Không xóa được kết quả."));
                } finally {
                    setDeletingId(null);
                }
            };

            const handleDeleteTestResults = async () => {
                if (!testResults.length) return alert("Không có bản ghi test để xóa.");
                if (!confirm(`Xóa ${testResults.length} bản ghi test (TEST999, TESTMAP01...)?`)) return;
                setDeletingBatch(true);
                try {
                    const ids = testResults.map(r => r.id).filter(Boolean);
                    if (ids.length === 1) {
                        await axios.delete(examUrl(`result/${ids[0]}`), { withCredentials: true });
                    } else {
                        await axios.post(examUrl("results/delete-batch"), { ids }, { withCredentials: true });
                    }
                    setResults(prev => prev.filter(item => !ids.includes(item.id)));
                } catch (e) {
                    alert(formatApiError(e, "Không xóa được bản ghi test."));
                } finally {
                    setDeletingBatch(false);
                }
            };

            const exportExcel = () => {
                const header = ["STT", "Họ và tên", "Số báo danh", "Lớp học", "Điểm cao nhất", "Lần đạt điểm cao", "Tổng lần thi", "Kết quả", "Các câu đúng (đề gốc)", "Các câu sai (đề gốc)"];
                const note = "Ghi chú: Xuất theo điểm cao nhất của từng học sinh. STT câu đúng/sai theo đề gốc của giáo viên.";
                const dataRows = [...studentSummaries]
                    .sort((a, b) => (a.name || "").localeCompare(b.name || "", "vi"))
                    .map((group, index) => {
                        const r = group.best;
                        const { correctNums, wrongNums } = splitCorrectWrong(r);
                        return [
                            index + 1,
                            (group.name || "").trim(),
                            (group.sbd || "").trim(),
                            (group.className || "").trim(),
                            r.score,
                            `Lần ${r.attemptNo}`,
                            group.attemptCount,
                            `${r.correct_count ?? 0}/${r.total_questions ?? 0}`,
                            formatQuestionNums(correctNums),
                            formatQuestionNums(wrongNums)
                        ];
                    });
                const ws = XLSX.utils.aoa_to_sheet([[note], [], header, ...dataRows]);
                ws["!cols"] = [
                    { wch: 5 }, { wch: 22 }, { wch: 14 }, { wch: 12 },
                    { wch: 8 }, { wch: 10 }, { wch: 28 }, { wch: 28 }
                ];
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "KetQua");
                XLSX.writeFile(wb, "KetQuaThi.xlsx");
            };

            return (
                <div className="max-w-6xl mx-auto p-6">
                    <button onClick={onBack} className="mb-4 text-gray-600 hover:text-indigo-600 flex items-center gap-2 font-bold">
                        <i className="fas fa-arrow-left"></i> Quay lại
                    </button>

                    {examInfo?.student_mode === "class" && (
                        <div className="mb-6 bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
                            <div className="p-4 border-b bg-slate-50 flex flex-wrap gap-3 justify-between items-center">
                                <div>
                                    <h3 className="font-bold text-lg text-gray-800">Thống kê lớp {examInfo.class_name || "—"}</h3>
                                    <p className="text-sm text-gray-500 mt-1">
                                        {studentSummaries.length}/{examInfo.roster?.length || 0} học sinh đã thi
                                        {notTakenStudents.length > 0 ? ` · ${notTakenStudents.length} chưa thi` : " · Đã đủ lớp"}
                                    </p>
                                </div>
                                {examInfo.max_attempts > 0 && (
                                    <span className="text-xs font-bold bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full">
                                        Giới hạn {examInfo.max_attempts} lần thi / HS
                                    </span>
                                )}
                            </div>
                            {notTakenStudents.length > 0 && (
                                <div className="p-4">
                                    <div className="font-bold text-rose-700 mb-2">
                                        <i className="fas fa-user-clock mr-1"></i> Chưa thi ({notTakenStudents.length} em)
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        {notTakenStudents.map((student, idx) => (
                                            <span key={`${student.sbd}-${idx}`} className="inline-flex items-center gap-2 bg-rose-50 border border-rose-200 rounded-full px-3 py-1 text-sm text-gray-700">
                                                <span className="font-semibold">{student.full_name}</span>
                                                <span className="text-gray-400 font-mono text-xs">{student.sbd}</span>
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    <div className="bg-white rounded-xl shadow overflow-hidden">
                        <div className="p-4 border-b bg-gray-50 flex flex-wrap gap-2 justify-between items-center">
                            <h3 className="font-bold text-lg text-gray-800">
                                Kết quả thi ({studentSummaries.length} học sinh · {results.length} lượt)
                            </h3>
                            <div className="flex flex-wrap gap-2">
                                {testResults.length > 0 && (
                                    <button type="button" disabled={deletingBatch} onClick={handleDeleteTestResults} className="text-red-600 hover:bg-red-50 px-3 py-1 rounded border border-red-200 text-sm font-bold disabled:opacity-60">
                                        <i className="fas fa-broom mr-1"></i> Xóa {testResults.length} bản ghi test
                                    </button>
                                )}
                                <button type="button" onClick={exportExcel} className="text-green-600 hover:bg-green-50 px-3 py-1 rounded border border-green-200 text-sm font-bold">
                                    <i className="fas fa-file-excel mr-1"></i> Xuất Excel
                                </button>
                            </div>
                        </div>
                        <table className="w-full text-left">
                            <thead className="bg-indigo-50 border-b">
                                <tr>
                                    <th className="p-3 w-12 text-center">STT</th>
                                    <th className="p-3">Tên HS</th>
                                    <th className="p-3">SBD</th>
                                    <th className="p-3">Lớp</th>
                                    <th className="p-3">Điểm cao nhất</th>
                                    <th className="p-3">Lần đạt điểm cao</th>
                                    <th className="p-3">Số câu đúng</th>
                                    <th className="p-3">Thời gian</th>
                                    <th className="p-3 text-right">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                {studentSummaries.map((group, index) => {
                                    const best = group.best;
                                    const expanded = !!expandedKeys[group.key];
                                    return (
                                        <React.Fragment key={group.key}>
                                            <tr className={`border-b hover:bg-gray-50 ${group.hasMultipleAttempts ? "bg-amber-50/20" : ""} ${isTestResult(best) ? "bg-red-50/30" : ""}`}>
                                                <td className="p-3 text-center text-sm font-bold text-gray-500">{index + 1}</td>
                                                <td className="p-3 font-bold text-gray-700">
                                                    <button
                                                        type="button"
                                                        onClick={() => toggleExpanded(group.key)}
                                                        className={`text-left hover:text-indigo-600 ${group.hasMultipleAttempts ? "underline decoration-dotted" : ""}`}
                                                        title={group.hasMultipleAttempts ? "Bấm để xem từng lần thi" : "Chỉ có 1 lần thi"}
                                                    >
                                                        <i className={`fas fa-chevron-${expanded ? "down" : "right"} text-xs mr-2 text-gray-400`}></i>
                                                        {group.name || "—"}
                                                        {group.hasMultipleAttempts && <span className="ml-2 text-xs font-normal text-amber-700">({group.attemptCount} lần)</span>}
                                                    </button>
                                                </td>
                                                <td className="p-3 text-gray-600">{group.sbd}</td>
                                                <td className="p-3 text-gray-600">{group.className || "—"}</td>
                                                <td className="p-3 font-bold text-indigo-600">{best.score}</td>
                                                <td className="p-3 text-sm font-bold text-amber-700">Lần {best.attemptNo}</td>
                                                <td className="p-3 text-sm">{best.correct_count} / {best.total_questions}</td>
                                                <td className="p-3 text-xs text-gray-500">{best.created_at ? new Date(best.created_at).toLocaleString("vi-VN") : "—"}</td>
                                                <td className="p-3 text-right">
                                                    <button type="button" disabled={deletingId === best.id} onClick={() => handleDeleteResult(best)} className="text-red-600 hover:bg-red-50 px-2 py-1 rounded border border-red-200 text-xs font-bold disabled:opacity-60" title="Xóa lần thi đạt điểm cao nhất">
                                                        <i className="fas fa-trash-alt"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                            {expanded && group.attempts.slice().sort((a, b) => b.attemptNo - a.attemptNo).map(attempt => (
                                                <tr key={attempt.rowKey} className={`border-b bg-slate-50/80 ${attempt.id === best.id ? "ring-1 ring-inset ring-indigo-200" : ""} ${isTestResult(attempt) ? "bg-red-50/40" : ""}`}>
                                                    <td className="p-3 text-center text-xs text-gray-300">—</td>
                                                    <td className="p-3 pl-10 text-sm text-gray-600">↳ Lần {attempt.attemptNo}</td>
                                                    <td className="p-3 text-gray-500">{attempt.sbd}</td>
                                                    <td className="p-3 text-gray-500">{attempt.student_class || "—"}</td>
                                                    <td className="p-3 font-semibold text-gray-700">{attempt.score}</td>
                                                    <td className="p-3 text-xs text-gray-500">{attempt.id === best.id ? "Điểm cao nhất" : "—"}</td>
                                                    <td className="p-3 text-sm text-gray-600">{attempt.correct_count} / {attempt.total_questions}</td>
                                                    <td className="p-3 text-xs text-gray-500">{attempt.created_at ? new Date(attempt.created_at).toLocaleString("vi-VN") : "—"}</td>
                                                    <td className="p-3 text-right">
                                                        <button type="button" disabled={deletingId === attempt.id} onClick={() => handleDeleteResult(attempt)} className="text-red-600 hover:bg-red-50 px-2 py-1 rounded border border-red-200 text-xs font-bold disabled:opacity-60" title="Xóa lần thi này">
                                                            <i className="fas fa-trash-alt"></i>
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </React.Fragment>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const readStudentExamId = () => {
            const p = new URLSearchParams(window.location.search);
            const examId = (p.get("examId") || "").trim();
            return p.get("mode") === "student" && examId ? examId : null;
        };

        const App = () => {
            const studentExamId = useMemo(() => readStudentExamId(), []);
            const [view, setView] = useState("dashboard");
            const [selectedId, setSelectedId] = useState(studentExamId);
            const [editingData, setEditingData] = useState(null);
            const userEmail = localStorage.getItem('userEmail');

            const handleEdit = async (id) => {
                try {
                    const res = await axios.get(examUrl(`get/${id}`), { withCredentials: true });
                    setEditingData(res.data);
                    setView("create");
                } catch (e) {
                    alert("Lỗi tải đề: " + e.message);
                }
            };

            if (studentExamId) return <StudentView examId={studentExamId} />;

            if (!userEmail) return (
                <div className="flex h-screen items-center justify-center bg-gray-100 flex-col gap-4">
                    <div className="text-xl font-bold text-gray-700">Phiên đăng nhập hết hạn</div>
                    <a href="login.html" className="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">Đăng nhập ngay</a>
                </div>
            );

            return (
                <div>
                    {view === "dashboard" && <TeacherDashboard onCreateNew={() => { setEditingData(null); setView("create"); }} onEdit={handleEdit} onViewDetail={(id) => { setSelectedId(id); setView("detail") }} />}
                    {view === "create" && <HybridExamCreator initialData={editingData} onBack={() => setView("dashboard")} />}
                    {view === "detail" && <ResultDetail examId={selectedId} onBack={() => setView("dashboard")} />}
                </div>
            );
        };

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (bootErr) {
            console.error("[thitructuyen] React boot failed:", bootErr);
            const el = document.getElementById('react-error');
            if (el) {
                el.style.display = 'block';
                el.innerHTML = '<strong>Lỗi khởi tạo giao diện.</strong> Vui lòng tải lại trang (Ctrl+F5).';
            }
        }
    </script>
    <script>
        setTimeout(function () {
            const root = document.getElementById('root');
            if (!root || root.childElementCount > 0) return;
            root.innerHTML = '<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Segoe UI,sans-serif;text-align:center;color:#334155"><div><p style="font-weight:700;margin-bottom:8px">Không tải được giao diện thi</p><p style="font-size:14px;margin-bottom:16px">Thử tải lại trang hoặc mở bằng Chrome/Safari.</p><button type="button" onclick="location.reload()" style="background:#4f46e5;color:#fff;border:0;border-radius:8px;padding:10px 16px;font-weight:700;cursor:pointer">Tải lại</button></div></div>';
        }, 5000);
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            const isStudentExam = params.get('mode') === 'student' && params.get('examId');
            const toolbar = document.getElementById('gb-ai-toolbar');
            if (isStudentExam) {
                if (toolbar) toolbar.style.display = 'none';
                return;
            }
            if (window.AiDesignConfig) AiDesignConfig.mountBar('gb-ai-toolbar');
        });
    </script>
</body>

</html>
