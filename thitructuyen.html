<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Trộn Đề Thi (Client-Side)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Các thư viện xử lý file tại Client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <!-- Thư viện đọc file Word tại client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; }
        .katex { font-size: 1.1em; color: #1e3a8a; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const MODEL_NAME = "gemini-2.5-flash";

        // --- HELPER FUNCTIONS ---
        const cleanOptionText = (text) => text ? text.replace(/^([A-Da-d0-9]+)([\.\)\:\-])\s*/, '').trim() : "";
        
        // --- WORD EXPORT HELPER ---
        const createDocContent = (code, questions) => {
            // ... (Logic tạo HTML cho Word giữ nguyên như cũ để tiết kiệm chỗ hiển thị)
            let body = `<h2 style='text-align:center; font-size:16pt; margin-bottom:20pt'>MÃ ĐỀ: ${code}</h2>`;
            questions.forEach(q => {
                body += `<p style='margin-bottom:6pt; text-align:justify'><b>Câu ${q.number}:</b> ${q.question}</p>`;
                const opts = q.options || [];
                const maxLen = Math.max(...opts.map(o => o.length));
                if (maxLen < 15) body += `<table style='width:100%'><tr><td>A. ${opts[0]}</td><td>B. ${opts[1]}</td><td>C. ${opts[2]}</td><td>D. ${opts[3]}</td></tr></table>`;
                else body += opts.map((o,i) => `<p><b>${String.fromCharCode(65+i)}.</b> ${o}</p>`).join('');
            });
            return `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'><head><meta charset='utf-8'><title>${code}</title></head><body>${body}</body></html>`;
        };

        const App = () => {
            const [tab, setTab] = useState(null); 
            const [apiKeys, setApiKeys] = useState([]);
            const [status, setStatus] = useState("");
            const [loading, setLoading] = useState(false);
            const [questions, setQuestions] = useState([]);
            const [numVariants, setNumVariants] = useState(4);
            const fileRef = useRef();

            useEffect(() => {
                const k = localStorage.getItem('global_gemini_keys');
                if(k) setApiKeys(JSON.parse(k));
            }, []);

            // 1. AI VISION MIX (PDF) - Chạy Client-side
            const handleAIMix = async (file) => {
                if(!apiKeys.length) return alert("Cần API Key!");
                setLoading(true); setStatus("Đang đọc PDF...");
                
                try {
                    const buffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(buffer).promise;
                    let allQuestions = [];
                    
                    for(let i = 1; i <= pdf.numPages; i++) {
                        setStatus(`Đang phân tích trang ${i}/${pdf.numPages}...`);
                        const page = await pdf.getPage(i); 
                        const vp = page.getViewport({scale: 2});
                        const cvs = document.createElement('canvas'); cvs.width = vp.width; cvs.height = vp.height;
                        await page.render({canvasContext: cvs.getContext('2d'), viewport: vp}).promise;
                        const img = cvs.toDataURL('image/jpeg', 0.8).split(',')[1];

                        const prompt = `Đọc đề thi từ ảnh. Trả về JSON: [{"question":"...","options":["...","...","...","..."],"correctAnswerIndex":-1}]. Nếu thấy đáp án tô đỏ/gạch chân thì lấy index.`;
                        
                        const key = apiKeys[i % apiKeys.length];
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${key}`, {
                            method: 'POST', headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ contents: [{parts: [{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: img}}]}] })
                        });
                        
                        const data = await res.json();
                        if(data.candidates) {
                            const txt = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                            allQuestions = [...allQuestions, ...JSON.parse(txt)];
                        }
                    }

                    setQuestions(allQuestions.map((q, i) => ({ ...q, id: i, number: i+1 })));
                    setStatus(`Xong! Đã đọc ${allQuestions.length} câu.`);
                } catch(e) { setStatus("Lỗi AI: " + e.message); }
                setLoading(false);
            };

            // 2. SERVER MIX (WORD) - Giờ chuyển thành Client Text Mix nâng cao
            const handleWordMix = async (file) => {
                setLoading(true); setStatus("Đang đọc file Word...");
                try {
                    // Dùng Mammoth để trích xuất text thô từ Word ngay tại browser
                    const arrayBuffer = await file.arrayBuffer();
                    const result = await mammoth.extractRawText({arrayBuffer: arrayBuffer});
                    const text = result.value;
                    
                    // Gửi text lên Gemini (Client-side) để phân tích câu hỏi
                    setStatus("Đang gửi văn bản lên AI phân tích...");
                    const chunks = text.match(/[\s\S]{1,10000}/g) || []; // Chia nhỏ nếu dài
                    let allQuestions = [];

                    for(let i=0; i<chunks.length; i++) {
                        const chunk = chunks[i];
                        const prompt = `Trích xuất câu hỏi trắc nghiệm từ văn bản sau thành JSON: [{"question":"...","options":["...","...","...","..."],"correctAnswerIndex":-1}].\n\nVăn bản: ${chunk}`;
                        
                        const key = apiKeys[i % apiKeys.length];
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${key}`, {
                            method: 'POST', headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ contents: [{parts: [{text: prompt}]}] })
                        });
                        const data = await res.json();
                        try {
                            const txt = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                            const parsed = JSON.parse(txt);
                            if(Array.isArray(parsed)) allQuestions = [...allQuestions, ...parsed];
                        } catch(e) {}
                    }
                    
                    if(allQuestions.length === 0) throw new Error("Không tìm thấy câu hỏi nào.");
                    setQuestions(allQuestions.map((q, i) => ({ ...q, id: i, number: i+1 })));
                    setStatus(`Thành công! Đã đọc ${allQuestions.length} câu.`);

                } catch(e) { setStatus("Lỗi: " + e.message); }
                setLoading(false);
            };

            const downloadZip = () => {
                if(!questions.length) return alert("Chưa có dữ liệu!");
                const zip = new JSZip();
                const codes = Array.from({length: numVariants}, (_, i) => 101 + i);
                let excelData = [];

                codes.forEach(code => {
                    const shuffled = [...questions].sort(()=>Math.random()-0.5);
                    const variant = shuffled.map((q,i) => {
                        const opts = q.options.map((txt,idx)=>({txt, isC: idx===q.correctAnswerIndex})).sort(()=>Math.random()-0.5);
                        const newC = opts.findIndex(o=>o.isC);
                        return { number: i+1, question: q.question, options: opts.map(o=>o.txt), correctAnswerLetter: String.fromCharCode(65+newC) };
                    });
                    zip.file(`De_${code}.doc`, createDocContent(code, variant));
                    let row = {"Mã Đề": code}; variant.forEach(q => row[`Câu ${q.number}`] = q.correctAnswerLetter); excelData.push(row);
                });

                const ws = XLSX.utils.json_to_sheet(excelData);
                const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "DapAn");
                zip.file("Bang_Dap_An.xlsx", XLSX.write(wb, {bookType:'xlsx', type:'array'}));
                zip.generateAsync({type:"blob"}).then(c => saveAs(c, "Bo_De_Tron.zip"));
            };

            const handleFileChange = (e) => {
                const f = e.target.files[0]; if(!f) return;
                if(tab==='ai') handleAIMix(f);
                else handleWordMix(f);
            };

            if(!tab) return (
                <div className="max-w-5xl mx-auto p-8">
                    <button onClick={()=>window.location.href='index.html'} className="mb-8 text-gray-500 hover:text-indigo-600 font-bold flex items-center gap-2"><i className="fas fa-arrow-left"></i> Về Trang Chủ</button>
                    <h1 className="text-3xl font-bold text-center text-indigo-900 mb-10">CHỌN CHẾ ĐỘ TRỘN ĐỀ (CLIENT-SIDE)</h1>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto">
                        <div onClick={()=>setTab('word')} className="bg-white p-8 rounded-2xl shadow-lg hover:shadow-2xl transition cursor-pointer border-t-4 border-blue-600 text-center group">
                            <i className="fas fa-file-word text-5xl text-blue-500 mb-4 group-hover:scale-110 transition"></i>
                            <h3 className="text-xl font-bold mb-2">Word Mix</h3>
                            <p className="text-gray-500 text-sm">Dành cho file .docx (Text only)</p>
                        </div>
                        <div onClick={()=>setTab('ai')} className="bg-white p-8 rounded-2xl shadow-lg hover:shadow-2xl transition cursor-pointer border-t-4 border-red-600 text-center group">
                            <i className="fas fa-file-pdf text-5xl text-red-500 mb-4 group-hover:scale-110 transition"></i>
                            <h3 className="text-xl font-bold mb-2">AI Vision Mix</h3>
                            <p className="text-gray-500 text-sm">Dành cho PDF (Quét ảnh thông minh)</p>
                        </div>
                    </div>
                    <p className="text-center mt-8 text-gray-400 text-sm">Tất cả xử lý đều diễn ra trên trình duyệt của bạn. Không gửi file lên Server.</p>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-6">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={()=>setTab(null)} className="text-gray-500 font-bold hover:text-indigo-600 flex items-center gap-2"><i className="fas fa-arrow-left"></i> Chọn lại chế độ</button>
                        <h2 className="text-xl font-bold text-indigo-800">{tab==='ai'?"AI VISION MIX (PDF)":"WORD MIX (DOCX)"}</h2>
                    </div>

                    <div className="bg-white p-8 rounded-xl shadow-lg border border-gray-200 mb-8 text-center border-2 border-dashed border-indigo-200 hover:bg-indigo-50 cursor-pointer transition" onClick={()=>fileRef.current.click()}>
                        {loading ? <div className="loader"></div> : (
                            <div>
                                <i className="fas fa-file-upload text-5xl text-indigo-400 mb-3"></i>
                                <p className="font-bold text-lg text-indigo-700">Nhấn để chọn file {tab==='ai' ? 'PDF' : 'Word (.docx)'}</p>
                                {status && <p className="mt-2 text-blue-600 font-bold animate-pulse">{status}</p>}
                            </div>
                        )}
                        <input ref={fileRef} type="file" accept={tab==='ai'?".pdf":".docx"} className="hidden" onChange={handleFileChange} />
                    </div>

                    {questions.length > 0 && (
                        <div className="bg-white p-6 rounded-xl shadow-lg fade-in">
                            <div className="flex justify-between items-center mb-6 border-b pb-4">
                                <h3 className="font-bold text-xl text-gray-800">Kết quả: {questions.length} câu</h3>
                                <div className="flex items-center gap-3">
                                    <span className="text-sm font-bold">Số đề:</span>
                                    <input type="number" min="1" max="10" value={numVariants} onChange={e=>setNumVariants(e.target.value)} className="bg-gray-100 w-12 text-center font-bold p-1 rounded border"/>
                                    <button onClick={downloadZip} className="bg-green-600 text-white px-6 py-2 rounded-lg font-bold shadow hover:bg-green-700 flex items-center gap-2"><i className="fas fa-download"></i> Tải Về</button>
                                </div>
                            </div>
                            <div className="grid gap-4 max-h-[500px] overflow-y-auto p-2">
                                {questions.map((q,i) => (
                                    <div key={i} className="p-4 rounded border bg-gray-50 border-gray-200">
                                        <div className="font-bold text-indigo-700 mb-2">Câu {q.number}</div>
                                        <div className="mb-3">{q.question}</div>
                                        <div className="grid grid-cols-2 gap-2 text-sm">
                                            {q.options.map((o, idx) => (
                                                <div key={idx} className={`p-2 border rounded ${idx===q.correctAnswerIndex?'bg-green-100 border-green-500 font-bold':'bg-white'}`}>
                                                    {String.fromCharCode(65+idx)}. {o}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
