<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Soạn Đề Thông Minh (Hybrid OCR)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script crossorigin src="[https://unpkg.com/react@18/umd/react.development.js](https://unpkg.com/react@18/umd/react.development.js)"></script>
    <script crossorigin src="[https://unpkg.com/react-dom@18/umd/react-dom.development.js](https://unpkg.com/react-dom@18/umd/react-dom.development.js)"></script>
    <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
    <script src="[https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js](https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js)"></script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="[https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css](https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css)">
    <script src="[https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js](https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js)"></script>
    
    <link rel="stylesheet" href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; overflow: hidden; }
        .crop-canvas-container { position: relative; cursor: crosshair; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .question-card.active { border: 2px solid #4f46e5; background: #eef2ff; }
        .question-card:hover { transform: translateY(-2px); }
        .math-preview { font-size: 1.1em; color: #1e3a8a; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const API_BASE = "[https://hoangthiencm-giangbai.hf.space](https://hoangthiencm-giangbai.hf.space)"; 

        // --- MATH COMPONENT ---
        const MathText = ({ text }) => {
            const ref = useRef();
            useEffect(() => {
                if (!text || !ref.current) return;
                try {
                    // Simple render logic
                    const html = text.replace(/\$([^$]+)\$/g, (m, c) => {
                        return katex.renderToString(c, { throwOnError: false, displayMode: false });
                    });
                    ref.current.innerHTML = html.replace(/\n/g, '<br>');
                } catch(e) { ref.current.textContent = text; }
            }, [text]);
            return <div ref={ref} className="math-preview leading-relaxed"></div>;
        };

        const App = () => {
            const [step, setStep] = useState(1); // 1: Upload, 2: Editor
            const [pages, setPages] = useState([]);
            const [activePageIndex, setActivePageIndex] = useState(0);
            const [fullImage, setFullImage] = useState(null);
            const [segments, setSegments] = useState([]); // {id, image, data: {question, options...}, status: 'pending'|'loading'|'done'}
            const [activeSegId, setActiveSegId] = useState(null);
            
            // Crop State
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [cropStart, setCropStart] = useState({x:0, y:0});
            const [cropRect, setCropRect] = useState(null);

            // API Keys
            const getApiKeys = () => JSON.parse(localStorage.getItem('global_gemini_keys') || "[]");

            // --- STEP 1: UPLOAD ---
            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const fd = new FormData();
                fd.append("file", file);
                try {
                    // Upload file
                    const res = await axios.post(`${API_BASE}/api/exam/upload_step1`, fd);
                    setPages(res.data.page_files);
                    setActivePageIndex(0);
                    
                    // Auto segment trang đầu tiên
                    await loadAndSegmentPage(res.data.page_files[0]);
                    setStep(2);
                } catch (err) { alert("Lỗi upload: " + err.message); }
            };

            const loadAndSegmentPage = async (filename) => {
                setFullImage(null);
                setCropRect(null);
                try {
                    const fd = new FormData();
                    fd.append("filename", filename);
                    // Gọi API cắt thông minh (PaddleOCR)
                    const res = await axios.post(`${API_BASE}/api/exam/segment_page`, fd);
                    setFullImage(res.data.full_image);
                    
                    // Merge segments mới vào list cũ (hoặc replace tùy logic - ở đây replace cho trang hiện tại)
                    // Ở phiên bản pro hơn nên quản lý segment theo pageIndex
                    setSegments(res.data.segments.map(s => ({
                        ...s, 
                        data: { question: "", options: ["","","",""], correct_index: -1 }
                    })));
                } catch(e) { console.error(e); alert("Lỗi xử lý ảnh trang"); }
            };

            // --- CROPPER LOGIC (CANVAS) ---
            const handleMouseDown = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                setIsDrawing(true);
                setCropStart({x, y});
                setCropRect({x, y, w:0, h:0});
            };
            const handleMouseMove = (e) => {
                if(!isDrawing) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                setCropRect({
                    x: Math.min(x, cropStart.x),
                    y: Math.min(y, cropStart.y),
                    w: Math.abs(x - cropStart.x),
                    h: Math.abs(y - cropStart.y)
                });
            };
            const handleMouseUp = () => { setIsDrawing(false); };

            // Vẽ Canvas (Ảnh nền + Khung crop)
            useEffect(() => {
                const canvas = canvasRef.current;
                if(!canvas || !fullImage) return;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.src = fullImage;
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    // Vẽ khung crop đang kéo
                    if(cropRect && cropRect.w > 5) {
                        ctx.strokeStyle = '#ef4444';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
                        ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
                        ctx.fillRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);
                    }
                };
            }, [fullImage, cropRect]);

            // Thực hiện Crop thủ công
            const executeManualCrop = () => {
                if(!cropRect || cropRect.w < 10) return;
                const canvas = document.createElement('canvas');
                canvas.width = cropRect.w;
                canvas.height = cropRect.h;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.src = fullImage;
                ctx.drawImage(img, cropRect.x, cropRect.y, cropRect.w, cropRect.h, 0, 0, cropRect.w, cropRect.h);
                
                const base64 = canvas.toDataURL('image/jpeg');
                const newSeg = {
                    id: Date.now().toString(),
                    label: "Câu thủ công",
                    image: base64,
                    status: "pending",
                    data: { question: "", options: ["","","",""], correct_index: -1 }
                };
                setSegments([...segments, newSeg]);
                setActiveSegId(newSeg.id);
                setCropRect(null); // Reset crop box
                
                // Auto OCR luôn
                processSegment(newSeg.id, base64);
            };

            // --- AI PROCESSING ---
            const processSegment = async (segId, imageBase64) => {
                const keys = getApiKeys();
                if(!keys.length) return alert("Chưa có API Key!");
                
                // Update loading state
                setSegments(prev => prev.map(s => s.id === segId ? {...s, status: 'loading'} : s));

                try {
                    const res = await axios.post(`${API_BASE}/api/exam/ocr_crop`, {
                        image_base64: imageBase64,
                        api_keys: keys
                    });
                    
                    if(res.data.status === 'ok') {
                        const aiData = res.data.data;
                        setSegments(prev => prev.map(s => s.id === segId ? {
                            ...s, 
                            status: 'done',
                            data: {
                                question: aiData.question,
                                options: aiData.options.length === 4 ? aiData.options : ["","","",""],
                                correct_index: aiData.correct_index
                            }
                        } : s));
                    } else { throw new Error(res.data.message); }
                } catch(e) {
                    console.error(e);
                    setSegments(prev => prev.map(s => s.id === segId ? {...s, status: 'error'} : s));
                }
            };

            const processAllPending = async () => {
                const pendings = segments.filter(s => s.status === 'pending');
                if(!pendings.length) return alert("Không có câu nào cần xử lý!");
                if(!confirm(`Xử lý ${pendings.length} câu hỏi?`)) return;
                
                // Chạy tuần tự hoặc song song (song song 3 request)
                for(let seg of pendings) {
                    await processSegment(seg.id, seg.image);
                }
            };

            // --- EDITOR UPDATE ---
            const updateActiveData = (field, value, optIdx=null) => {
                setSegments(prev => prev.map(s => {
                    if(s.id === activeSegId) {
                        const newData = {...s.data};
                        if(field === 'options') newData.options[optIdx] = value;
                        else newData[field] = value;
                        return {...s, data: newData};
                    }
                    return s;
                }));
            };

            // --- EXPORT ---
            const handleExport = () => {
                 const questions = segments.map(s => s.data);
                 console.log("Exporting:", questions);
                 alert("Đã log dữ liệu ra console (Giả lập lưu DB)");
                 // Ở đây bạn gọi API /save_exam cũ
            };

            // RENDER UI
            if (step === 1) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100">
                        <div className="bg-white p-10 rounded-2xl shadow-xl text-center max-w-lg w-full">
                            <h1 className="text-3xl font-bold text-indigo-700 mb-2">Soạn Đề Hybrid OCR</h1>
                            <p className="text-gray-500 mb-6">Công nghệ OCR kết hợp AI - Chính xác 99%</p>
                            <label className="block w-full border-2 border-dashed border-indigo-300 bg-indigo-50 rounded-xl p-8 cursor-pointer hover:bg-indigo-100 transition">
                                <input type="file" className="hidden" accept=".pdf,.png,.jpg" onChange={handleUpload}/>
                                <i className="fas fa-cloud-upload-alt text-4xl text-indigo-500 mb-2"></i>
                                <div className="font-bold text-indigo-700">Chọn file đề thi (PDF/Ảnh)</div>
                            </label>
                            <a href="index.html" className="block mt-6 text-gray-400 hover:text-gray-600">Quay lại trang chủ</a>
                        </div>
                    </div>
                );
            }

            const activeSeg = segments.find(s => s.id === activeSegId);

            return (
                <div className="flex h-screen flex-col">
                    {/* TOOLBAR */}
                    <div className="h-14 bg-white border-b flex items-center justify-between px-4 shrink-0 shadow-sm z-20">
                        <div className="font-bold text-lg text-indigo-800"><i className="fas fa-layer-group mr-2"></i> Trình Soạn Thảo Hybrid</div>
                        <div className="flex gap-2">
                             {pages.length > 1 && (
                                <select className="border rounded p-1" onChange={(e)=>loadAndSegmentPage(e.target.value)}>
                                    {pages.map((p,i) => <option key={i} value={p}>Trang {i+1}</option>)}
                                </select>
                            )}
                            <button onClick={processAllPending} className="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700 text-sm font-bold"><i className="fas fa-magic"></i> AI Đọc Tất Cả ({segments.filter(s=>s.status==='pending').length})</button>
                            <button onClick={handleExport} className="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 text-sm font-bold"><i className="fas fa-save"></i> Lưu Đề</button>
                        </div>
                    </div>

                    <div className="flex-1 flex overflow-hidden">
                        {/* COL 1: ẢNH GỐC + CROPPER */}
                        <div className="w-[40%] bg-gray-800 relative overflow-auto flex items-center justify-center p-4">
                            <div className="relative shadow-2xl bg-white">
                                <canvas 
                                    ref={canvasRef} 
                                    className="crop-canvas-container max-w-full"
                                    onMouseDown={handleMouseDown}
                                    onMouseMove={handleMouseMove}
                                    onMouseUp={handleMouseUp}
                                />
                                {cropRect && cropRect.w > 10 && (
                                    <button 
                                        onClick={executeManualCrop}
                                        className="absolute bg-red-600 text-white px-3 py-1 rounded shadow-lg font-bold text-xs hover:scale-105 transition"
                                        style={{top: cropRect.y + cropRect.h + 5, left: cropRect.x}}
                                    >
                                        <i className="fas fa-crop-alt"></i> Cắt câu này
                                    </button>
                                )}
                            </div>
                            <div className="absolute bottom-4 left-4 bg-black/70 text-white px-3 py-1 rounded text-xs pointer-events-none">
                                <i className="fas fa-mouse-pointer"></i> Kéo chuột để cắt thủ công câu hỏi bị sót
                            </div>
                        </div>

                        {/* COL 2: LIST CÂU HỎI (THUMBNAILS) */}
                        <div className="w-[20%] bg-white border-r overflow-y-auto p-2 space-y-2">
                            <div className="text-xs font-bold text-gray-500 uppercase px-2 mb-2">Danh sách câu ({segments.length})</div>
                            {segments.map((seg, idx) => (
                                <div 
                                    key={seg.id} 
                                    onClick={() => setActiveSegId(seg.id)}
                                    className={`question-card p-2 rounded cursor-pointer transition flex gap-2 items-start ${activeSegId === seg.id ? 'active' : 'bg-white border border-gray-200 hover:bg-gray-50'}`}
                                >
                                    <img src={seg.image} className="w-16 h-16 object-cover rounded bg-gray-100 border" />
                                    <div className="flex-1 min-w-0">
                                        <div className="font-bold text-xs truncate mb-1 text-gray-700">{seg.label || `Câu ${idx+1}`}</div>
                                        <div className="flex items-center gap-1">
                                            {seg.status === 'pending' && <span className="text-[10px] bg-gray-100 text-gray-600 px-1 rounded">Chờ AI</span>}
                                            {seg.status === 'loading' && <span className="text-[10px] bg-blue-100 text-blue-600 px-1 rounded"><i className="fas fa-spinner fa-spin"></i> Đang đọc</span>}
                                            {seg.status === 'done' && <span className="text-[10px] bg-green-100 text-green-600 px-1 rounded">Xong</span>}
                                            {seg.status === 'error' && <span className="text-[10px] bg-red-100 text-red-600 px-1 rounded">Lỗi</span>}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* COL 3: EDITOR */}
                        <div className="flex-1 bg-gray-50 flex flex-col overflow-hidden">
                            {activeSeg ? (
                                <div className="flex-1 flex flex-col h-full">
                                    {/* Ảnh crop preview */}
                                    <div className="h-32 bg-gray-200 flex items-center justify-center border-b p-2 shrink-0">
                                        <img src={activeSeg.image} className="h-full object-contain shadow-sm bg-white" />
                                    </div>
                                    
                                    {/* Form Edit */}
                                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                                        <div>
                                            <div className="flex justify-between mb-1">
                                                <label className="font-bold text-gray-700 text-sm">Nội dung câu hỏi</label>
                                                <button onClick={()=>processSegment(activeSeg.id, activeSeg.image)} className="text-xs text-blue-600 hover:underline"><i className="fas fa-sync"></i> Đọc lại AI</button>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 h-48">
                                                <textarea 
                                                    className="w-full h-full p-3 border rounded text-sm font-mono focus:ring-2 focus:ring-indigo-500 outline-none" 
                                                    value={activeSeg.data.question}
                                                    onChange={e=>updateActiveData('question', e.target.value)}
                                                />
                                                <div className="w-full h-full p-3 bg-white border rounded overflow-y-auto">
                                                    <MathText text={activeSeg.data.question} />
                                                </div>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="font-bold text-gray-700 text-sm mb-2 block">Đáp án</label>
                                            <div className="grid grid-cols-2 gap-4">
                                                {activeSeg.data.options.map((opt, i) => (
                                                    <div key={i} className={`flex items-center gap-2 p-2 border rounded ${activeSeg.data.correct_index === i ? 'bg-green-50 border-green-500' : 'bg-white'}`}>
                                                        <div 
                                                            onClick={()=>updateActiveData('correct_index', i)}
                                                            className={`w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs cursor-pointer ${activeSeg.data.correct_index === i ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-600'}`}
                                                        >
                                                            {String.fromCharCode(65+i)}
                                                        </div>
                                                        <input 
                                                            className="flex-1 bg-transparent text-sm outline-none"
                                                            value={opt}
                                                            onChange={e=>updateActiveData('options', e.target.value, i)}
                                                        />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex-1 flex items-center justify-center text-gray-400 flex-col">
                                    <i className="fas fa-hand-pointer text-4xl mb-2"></i>
                                    <p>Chọn một câu hỏi bên trái để chỉnh sửa</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
