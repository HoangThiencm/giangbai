<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Game 5: Leo Tháp Kiến Thức</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex {
            font-size: 1.1em;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes climbUp {
            0% {
                transform: translateY(0);
            }

            20% {
                transform: translateY(-10px);
            }

            40% {
                transform: translateY(0);
            }

            60% {
                transform: translateY(-10px);
            }

            80% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-32px);
            }

            /* Assuming 32px is roughly one level height or consistent step */
        }

        @keyframes fallDown {
            0% {
                transform: translateY(0) rotate(0deg);
            }

            20% {
                transform: translateY(10px) rotate(5deg);
            }

            40% {
                transform: translateY(0) rotate(-5deg);
            }

            100% {
                transform: translateY(32px) rotate(0deg);
            }
        }

        @keyframes celebrate {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3) rotate(10deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .climb-up {
            animation: climbUp 2s ease-in-out forwards;
        }

        .fall-down {
            animation: fallDown 2s ease-in-out forwards;
        }

        .celebrate {
            animation: celebrate 1s ease-in-out infinite;
        }

        .tower-level {
            transition: all 0.5s ease;
        }

        .tower-level.active {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.6);
            z-index: 10;
        }

        .tower-bg-forest {
            background: linear-gradient(to right, #4ade80, #10b981);
        }

        .tower-bg-cloud {
            background: linear-gradient(to right, #60a5fa, #3b82f6);
        }

        .tower-bg-ice {
            background: linear-gradient(to right, #2563eb, #1e40af);
        }

        .tower-bg-fire {
            background: linear-gradient(to right, #f97316, #dc2626);
        }

        .confetti {
            position: fixed;
            top: -10px;
            animation: confetti 4s ease-out forwards;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes confetti {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Drag & Drop */
        .draggable-item {
            cursor: grab;
            transition: all 0.2s;
        }

        .draggable-item:active {
            cursor: grabbing;
            transform: scale(1.02);
        }

        .drop-zone {
            min-height: 50px;
            border: 2px dashed #cbd5e1;
            transition: all 0.2s;
        }

        .drop-zone.drag-over {
            border-color: #8b5cf6;
            background-color: #f3e8ff;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen font-sans text-gray-800">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============ MATH TEXT ============
        const MathText = ({ text }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!text || !ref.current) return;
                ref.current.innerHTML = "";
                // Handle Images
                const imgPattern = /!\[([^\]]*)\]\(([^)]+)\)/g;
                const fragments = [];
                let lastIndex = 0, match;
                while ((match = imgPattern.exec(text)) !== null) {
                    if (match.index > lastIndex) fragments.push({ type: 'text', content: text.substring(lastIndex, match.index) });
                    fragments.push({ type: 'image', alt: match[1], src: match[2] });
                    lastIndex = match.index + match[0].length;
                }
                if (lastIndex < text.length) fragments.push({ type: 'text', content: text.substring(lastIndex) });
                if (fragments.length === 0) fragments.push({ type: 'text', content: text });

                fragments.forEach(fragment => {
                    if (fragment.type === 'image') {
                        const img = document.createElement('img');
                        img.src = fragment.src; img.alt = fragment.alt;
                        img.className = 'max-h-48 rounded-lg my-2 border border-gray-200 shadow-sm inline-block';
                        ref.current.appendChild(img);
                    } else {
                        // Math rendering
                        let processed = fragment.content.replace(/`([^`]+)`/g, '$$$1$$').replace(/\\\((.+?)\\\)/g, '$$$1$$');
                        // Basic LaTeX wrapping detection
                        const parts = processed.split(/($$[\s\S]+?$$|\$[\s\S]+?\$)/g);
                        parts.forEach(part => {
                            if (part.startsWith('$$') || part.startsWith('$')) {
                                const span = document.createElement("span");
                                const tex = part.startsWith('$$') ? part.slice(2, -2) : part.slice(1, -1);
                                try { katex.render(tex, span, { throwOnError: false, displayMode: part.startsWith('$$') }); } catch { span.textContent = part; }
                                ref.current.appendChild(span);
                            } else {
                                ref.current.appendChild(document.createTextNode(part));
                            }
                        });
                    }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        // ============ GEMINI SERVICE ============
        const GeminiService = {
            getApiKeys: () => { const k = localStorage.getItem('global_gemini_keys'); return k ? JSON.parse(k) : []; },
            generate: async (params) => {
                const { subject, gradeMax, topic, counts } = params;
                const totalQ = counts.easy + counts.medium + counts.hard;
                const prompt = `Bạn là trợ lý tạo câu hỏi game.
Chủ đề: ${topic}. Môn: ${subject}. Lớp max: ${gradeMax}.
Số lượng: ${counts.easy} Dễ, ${counts.medium} Vừa, ${counts.hard} Khó.

YÊU CẦU DẠNG CÂU HỎI ĐA DẠNG:
- mcq: Trắc nghiệm 4 đáp án
- truefalse: Đúng/Sai
- fill-blank: Điền khuyết (dạng trắc nghiệm chọn từ điền vào)
- multi-select: Chọn nhiều đáp án đúng
- matching: Nối cặp (leftItems, rightItems)
- drag-drop: Sắp xếp thứ tự (items, correctOrder index array)

JSON format:
{"questions":[
  {"id":"q1","type":"mcq","level":"easy","prompt":"...","choices":["A","B","C","D"],"answer":0},
  {"id":"q2","type":"truefalse","level":"easy","prompt":"...","answer":true},
  {"id":"q3","type":"matching","level":"medium","prompt":"Nối...","leftItems":["A","B"],"rightItems":["1","2"],"correctPairs":[[0,1],[1,0]]},
  {"id":"q4","type":"drag-drop","level":"hard","prompt":"Sắp xếp...","items":["B1","B2","B3"],"correctOrder":[0,1,2]}
]}`;
                const keys = GeminiService.getApiKeys();
                if (!keys.length) throw new Error("Chưa có API Key!");

                // Simple retry loop with defined keys
                for (const key of keys) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${key}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await res.json();
                        if (data.error) throw new Error(data.error.message);
                        let text = data.candidates[0].content.parts[0].text;
                        text = text.replace(/```json|```/g, '');
                        try { return JSON.parse(text); } catch { const f = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1); return JSON.parse(f); }
                    } catch (e) {
                        console.error("AI Gen Error:", e);
                        if (key === keys[keys.length - 1]) throw e;
                    }
                }
            }
        };

        // ============ MAIN GAME ============
        const TowerGame = () => {
            // Screen: SETUP, GAME, GAME_OVER
            const [screen, setScreen] = useState('SETUP');
            const [playerName, setPlayerName] = useState('Player 1');
            const [avatar, setAvatar] = useState('🧑‍🎓');

            // Configuration
            const [qCounts, setQCounts] = useState({ easy: 3, medium: 4, hard: 3 });
            const [aiParams, setAiParams] = useState({ subject: 'Toán', topic: '', gradeMax: 5 });
            const [timeMode, setTimeMode] = useState('custom'); // free, custom
            const [timePerQ, setTimePerQ] = useState(30);

            // Game Data
            const [questions, setQuestions] = useState([]);
            const [currentQIdx, setCurrentQIdx] = useState(0);

            // Game State
            const [level, setLevel] = useState(1);
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);
            const [hp, setHp] = useState(3); // Maybe add lives? Or stick to tower mechanics? Tower mechanic: fall down.
            const [timeLeft, setTimeLeft] = useState(30);
            const [timerActive, setTimerActive] = useState(false);

            // Answer State
            const [userAns, setUserAns] = useState(null); // format depends on type
            const [showResult, setShowResult] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);

            // Visuals
            const [charAction, setCharAction] = useState('standing'); // standing, climbing, falling, celebrating
            const [message, setMessage] = useState('');
            const [confetti, setConfetti] = useState(false);
            const [powerUps, setPowerUps] = useState({ shield: 1, ladder: 0, hint: 1 });

            // Timer Effect
            useEffect(() => {
                if (timerActive && timeLeft > 0 && !showResult) {
                    const t = setTimeout(() => setTimeLeft(prev => prev - 1), 1000);
                    return () => clearTimeout(t);
                } else if (timeLeft === 0 && timerActive && !showResult) {
                    checkAnswer(true); // Auto submit on timeout
                }
            }, [timeLeft, timerActive, showResult]);

            // Question Generation
            const generateQuestions = async () => {
                if (!aiParams.topic) return alert("Nhập chủ đề!");
                setMessage('Đang tạo câu hỏi...');
                try {
                    const data = await GeminiService.generate({ ...aiParams, counts: qCounts });
                    if (data.questions) {
                        // Shuffle and assign ID
                        const qs = data.questions.map((q, i) => ({ ...q, id: i, used: false }));
                        setQuestions(qs);
                        setScreen('PREIEW'); // Let user see/edit before start
                        setMessage('');
                    }
                } catch (e) { alert("Lỗi tạo câu hỏi: " + e.message); setMessage(''); }
            };

            const startGame = () => {
                setScreen('GAME');
                setLevel(1);
                setScore(0);
                setStreak(0);
                setCurrentQIdx(0);
                setConfetti(false);
                setCharAction('standing');
                startQuestion(0);
            };

            const startQuestion = (idx) => {
                setCurrentQIdx(idx);
                setUserAns(null);
                setShowResult(false);
                setIsCorrect(false);
                setCharAction('standing');
                setMessage('');

                if (timeMode === 'custom') {
                    setTimeLeft(timePerQ);
                    setTimerActive(true);
                } else {
                    setTimeLeft(999);
                    setTimerActive(false);
                }
            };

            const checkAnswer = (isTimeout = false) => {
                setTimerActive(false); // STOP TIMER IMMEDIATELY
                setShowResult(true);

                const q = questions[currentQIdx];
                let correct = false;

                // Validate based on type
                if (isTimeout) correct = false;
                else {
                    if (q.type === 'mcq' || q.type === 'fill-blank') correct = userAns === q.answer;
                    else if (q.type === 'truefalse') correct = userAns === q.answer;
                    else if (q.type === 'multi-select') {
                        // userAns is array of indices
                        const ansSet = new Set(userAns || []);
                        const correctSet = new Set(q.answers || []); // Gen model needs to return 'answers' for multi
                        // Fallback if model uses 'answer' for multi (should be array)
                        const correctArr = Array.isArray(q.answer) ? q.answer : [q.answer];
                        correct = ansSet.size === correctArr.length && correctArr.every(a => ansSet.has(a));
                    }
                    else if (q.type === 'matching') {
                        // userAns is array of pairs [[0,1], [1,0]]
                        // Check if all pairs match q.correctPairs
                        // Simplification: just check count
                        correct = JSON.stringify(userAns?.sort()) === JSON.stringify(q.correctPairs?.sort());
                    }
                    else if (q.type === 'drag-drop') {
                        // userAns is array of item indices in order
                        correct = JSON.stringify(userAns) === JSON.stringify(q.correctOrder);
                    }
                }

                setIsCorrect(correct);

                // Animation & Logic Delay
                setTimeout(() => {
                    handleGameProgress(correct);
                }, 1500); // 1.5s delay to see result
            };

            const handleGameProgress = (correct) => {
                if (correct) {
                    setCharAction('climbing');
                    setScore(s => s + 10 + streak * 2);
                    setStreak(s => s + 1);
                    setMessage("Lên tầng!");
                    setTimeout(() => {
                        // Move logic
                        const nextLevel = Math.min(10, level + 1);
                        setLevel(nextLevel);
                        if (nextLevel === 10 && level !== 10) setConfetti(true);
                        nextQ();
                    }, 2000); // Climbing duration
                } else {
                    if (powerUps.shield > 0) {
                        setPowerUps(p => ({ ...p, shield: p.shield - 1 }));
                        setMessage("Khiên bảo vệ!");
                        setTimeout(nextQ, 1000);
                    } else {
                        setCharAction('falling');
                        setStreak(0);
                        setMessage("Tụt dốc!");
                        setTimeout(() => {
                            setLevel(l => Math.max(1, l - 1));
                            nextQ();
                        }, 2000); // Falling duration
                    }
                }
            };

            const nextQ = () => {
                const nextIdx = currentQIdx + 1;
                if (nextIdx >= questions.length) {
                    setScreen('GAME_OVER');
                } else {
                    startQuestion(nextIdx);
                }
            };

            // Helpers for rendering inputs
            const toggleSelection = (idx, multi = false) => {
                if (showResult) return;
                if (!multi) setUserAns(idx);
                else {
                    const arr = userAns || [];
                    if (arr.includes(idx)) setUserAns(arr.filter(i => i !== idx));
                    else setUserAns([...arr, idx]);
                }
            };

            // Renders
            const renderSetup = () => (
                <div className="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-xl mt-10">
                    <h1 className="text-4xl font-bold text-center text-purple-700 mb-6">Leo Tháp Kiến Thức</h1>

                    <div className="mb-6">
                        <label className="block font-bold mb-2">Tên người chơi</label>
                        <input className="w-full border p-3 rounded-xl" value={playerName} onChange={e => setPlayerName(e.target.value)} />
                    </div>

                    <div className="mb-6">
                        <label className="block font-bold mb-2">Cấu hình câu hỏi (Tổng: {qCounts.easy + qCounts.medium + qCounts.hard})</label>
                        <div className="flex gap-4 mb-2">
                            <div className="flex-1">
                                <span className="text-green-600 font-bold">Dễ: {qCounts.easy}</span>
                                <input type="range" min="0" max="10" value={qCounts.easy} onChange={e => setQCounts({ ...qCounts, easy: parseInt(e.target.value) })} className="w-full accent-green-600" />
                            </div>
                            <div className="flex-1">
                                <span className="text-blue-600 font-bold">Vừa: {qCounts.medium}</span>
                                <input type="range" min="0" max="10" value={qCounts.medium} onChange={e => setQCounts({ ...qCounts, medium: parseInt(e.target.value) })} className="w-full accent-blue-600" />
                            </div>
                            <div className="flex-1">
                                <span className="text-red-600 font-bold">Khó: {qCounts.hard}</span>
                                <input type="range" min="0" max="10" value={qCounts.hard} onChange={e => setQCounts({ ...qCounts, hard: parseInt(e.target.value) })} className="w-full accent-red-600" />
                            </div>
                        </div>
                    </div>

                    <div className="mb-6 grid grid-cols-2 gap-4">
                        <div>
                            <label className="block font-bold mb-2">AI Chủ đề</label>
                            <input className="w-full border p-3 rounded-xl" placeholder="VD: Phép cộng" value={aiParams.topic} onChange={e => setAiParams({ ...aiParams, topic: e.target.value })} />
                        </div>
                        <div>
                            <label className="block font-bold mb-2">Thời gian (giây/câu)</label>
                            <div className="flex gap-2">
                                <button onClick={() => setTimeMode(timeMode === 'free' ? 'custom' : 'free')} className={`p-3 rounded-xl border ${timeMode === 'free' ? 'bg-green-100 border-green-500' : 'bg-gray-100'}`}>
                                    {timeMode === 'free' ? 'Tự do' : 'Giới hạn'}
                                </button>
                                {timeMode === 'custom' && <input type="number" className="w-full border p-3 rounded-xl" value={timePerQ} onChange={e => setTimePerQ(parseInt(e.target.value))} />}
                            </div>
                        </div>
                    </div>

                    <div className="flex gap-4">
                        <button onClick={() => generateQuestions()} className="flex-1 bg-gradient-to-r from-purple-600 to-blue-600 text-white p-4 rounded-xl font-bold hover:shadow-lg">
                            {message || 'Tạo bằng AI'}
                        </button>
                        {/* Manual create could go here, omitting for brevity in this fix focus */}
                    </div>
                </div>
            );

            const renderPreview = () => (
                <div className="max-w-4xl mx-auto bg-white p-6 rounded-3xl shadow-xl mt-10">
                    <h2 className="text-2xl font-bold mb-4">Danh sách câu hỏi ({questions.length})</h2>
                    <div className="max-h-96 overflow-y-auto mb-6 space-y-2">
                        {questions.map((q, i) => (
                            <div key={i} className="p-3 border rounded-lg flex justify-between">
                                <div>
                                    <span className={`font-bold mr-2 ${q.level === 'easy' ? 'text-green-600' : q.level === 'medium' ? 'text-blue-600' : 'text-red-600'}`}>[{q.level}]</span>
                                    <span className="text-sm text-gray-500 mr-2">({q.type})</span>
                                    <MathText text={q.prompt.substring(0, 50) + '...'} />
                                </div>
                                <button onClick={() => setQuestions(questions.filter((_, idx) => idx !== i))} className="text-red-500"><i className="fas fa-trash"></i></button>
                            </div>
                        ))}
                    </div>
                    <div className="flex gap-4">
                        <button onClick={() => setScreen('SETUP')} className="bg-gray-500 text-white px-6 py-3 rounded-xl">Quay lại</button>
                        <button onClick={startGame} className="bg-green-600 text-white px-6 py-3 rounded-xl font-bold flex-1">Bắt đầu chơi</button>
                    </div>
                </div>
            );

            const renderGame = () => {
                const q = questions[currentQIdx];
                return (
                    <div className="flex h-screen items-center justify-center p-4 gap-4">
                        {/* Visual Tower */}
                        <div className="w-64 h-[600px] bg-white rounded-2xl shadow-2xl relative overflow-hidden flex flex-col-reverse p-2">
                            {/* Backgrounds */}
                            <div className="absolute inset-0 opacity-10" />

                            {/* Levels */}
                            {Array.from({ length: 10 }).map((_, i) => {
                                const lvl = i + 1;
                                let bgClass = 'bg-gray-200';
                                if (lvl <= 3) bgClass = 'tower-bg-forest';
                                else if (lvl <= 6) bgClass = 'tower-bg-cloud';
                                else if (lvl <= 9) bgClass = 'tower-bg-ice';
                                else bgClass = 'tower-bg-fire';

                                const isCurrent = level === lvl;
                                return (
                                    <div key={lvl} className={`flex-1 w-full mb-1 rounded flex items-center justify-center text-white font-bold relative ${isCurrent ? 'active' : 'opacity-40'} ${bgClass}`}>
                                        {lvl === 5 && '🐲'}
                                        {lvl === 10 && '👹'}
                                        Tầng {lvl}

                                        {/* Character */}
                                        {isCurrent && (
                                            <div className={`absolute left-1/2 transform -translate-x-1/2 text-4xl transition-all duration-500
                                                ${charAction === 'climbing' ? 'climb-up' : charAction === 'falling' ? 'fall-down' : charAction === 'celebrating' ? 'celebrate' : ''}
                                             `}>
                                                {avatar}
                                            </div>
                                        )}
                                    </div>
                                )
                            })}
                        </div>

                        {/* Question Area */}
                        <div className="flex-1 max-w-2xl">
                            <div className="bg-white rounded-3xl shadow-2xl p-8 min-h-[500px] flex flex-col">
                                {/* Header */}
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex gap-2">
                                        <span className="bg-purple-100 text-purple-700 font-bold px-3 py-1 rounded-lg">Level {level}</span>
                                        <span className="bg-orange-100 text-orange-700 font-bold px-3 py-1 rounded-lg">Score: {score}</span>
                                    </div>
                                    <div className={`text-2xl font-bold ${timerActive && timeLeft < 5 ? 'text-red-500 animate-pulse' : 'text-gray-700'}`}>
                                        {timeMode === 'free' ? '∞' : `${timeLeft}s`}
                                    </div>
                                </div>

                                {/* Prompt */}
                                <div className="text-2xl mb-6 font-medium">
                                    <MathText text={q.prompt} />
                                </div>

                                {/* Answer Inputs */}
                                <div className="flex-1">
                                    {/* MCQ & Fill-Blank (similar UI) */}
                                    {(q.type === 'mcq' || q.type === 'fill-blank') && (
                                        <div className="grid grid-cols-2 gap-4">
                                            {q.choices.map((c, i) => {
                                                let bg = 'bg-gray-50 hover:bg-gray-100';
                                                if (showResult) {
                                                    if (i === q.answer) bg = 'bg-green-100 border-green-500'; // Correct
                                                    else if (i === userAns) bg = 'bg-red-100 border-red-500'; // Wrong
                                                } else if (userAns === i) {
                                                    bg = 'bg-purple-100 border-purple-500';
                                                }
                                                return (
                                                    <button key={i} onClick={() => toggleSelection(i)} disabled={showResult} className={`p-4 rounded-xl border-2 text-left transition-all ${bg}`}>
                                                        <span className="font-bold mr-2">{String.fromCharCode(65 + i)}.</span>
                                                        <MathText text={c} />
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    )}

                                    {/* True/False */}
                                    {q.type === 'truefalse' && (
                                        <div className="flex gap-4 h-full">
                                            {[true, false].map((val) => {
                                                let bg = 'bg-gray-50';
                                                if (showResult) {
                                                    if (val === q.answer) bg = 'bg-green-100 border-green-500';
                                                    else if (val === userAns) bg = 'bg-red-100 border-red-500';
                                                } else if (userAns === val) bg = 'bg-purple-100 border-purple-500';

                                                return (
                                                    <button key={val.toString()} onClick={() => !showResult && setUserAns(val)} className={`flex-1 rounded-xl border-2 text-3xl font-bold ${bg}`}>
                                                        {val ? 'ĐÚNG' : 'SAI'}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    )}

                                    {/* Matching Type */}
                                    {q.type === 'matching' && (
                                        <div className="flex flex-col h-full">
                                            <div className="grid grid-cols-2 gap-8 flex-1">
                                                <div className="space-y-4">
                                                    <h4 className="font-bold text-center text-blue-600">Cột A</h4>
                                                    {q.leftItems.map((item, idx) => {
                                                        const isSelected = userAns?.selectedLeft === idx;
                                                        const isMatched = userAns?.pairs?.some(p => p[0] === idx);
                                                        // Find color for matched
                                                        const pairIdx = userAns?.pairs?.findIndex(p => p[0] === idx);
                                                        const colors = ['bg-red-100 border-red-500', 'bg-blue-100 border-blue-500', 'bg-green-100 border-green-500', 'bg-yellow-100 border-yellow-500'];
                                                        const colorClass = pairIdx >= 0 ? colors[pairIdx % 4] : (isSelected ? 'bg-purple-100 border-purple-500' : 'bg-white border-gray-300');

                                                        return (
                                                            <button key={idx}
                                                                onClick={() => {
                                                                    if (showResult || isMatched) return;
                                                                    setUserAns(prev => ({ ...prev, selectedLeft: idx }));
                                                                }}
                                                                className={`w-full p-4 rounded-xl border-2 transition-all ${colorClass} ${isMatched ? 'opacity-50' : ''}`}
                                                            >
                                                                <MathText text={item} />
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                                <div className="space-y-4">
                                                    <h4 className="font-bold text-center text-green-600">Cột B</h4>
                                                    {q.rightItems.map((item, idx) => {
                                                        const isMatched = userAns?.pairs?.some(p => p[1] === idx);
                                                        const pairIdx = userAns?.pairs?.findIndex(p => p[1] === idx);
                                                        const colors = ['bg-red-100 border-red-500', 'bg-blue-100 border-blue-500', 'bg-green-100 border-green-500', 'bg-yellow-100 border-yellow-500'];
                                                        const colorClass = pairIdx >= 0 ? colors[pairIdx % 4] : 'bg-white border-gray-300';

                                                        return (
                                                            <button key={idx}
                                                                onClick={() => {
                                                                    if (showResult || isMatched) return;
                                                                    if (userAns?.selectedLeft !== undefined) {
                                                                        // Form a pair
                                                                        const newPairs = [...(userAns?.pairs || []), [userAns.selectedLeft, idx]];
                                                                        setUserAns({ pairs: newPairs, selectedLeft: undefined });
                                                                    }
                                                                }}
                                                                className={`w-full p-4 rounded-xl border-2 transition-all ${colorClass} ${isMatched ? 'opacity-50' : ''}`}
                                                            >
                                                                <MathText text={item} />
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                            <div className="text-center mt-4 text-sm text-gray-500">Chọn 1 ô bên trái rồi chọn 1 ô bên phải để nối</div>
                                        </div>
                                    )}

                                    {/* Drag Drop Type */}
                                    {q.type === 'drag-drop' && (
                                        <div className="space-y-3">
                                            <p className="text-center text-gray-500 italic mb-4">Kéo thả để sắp xếp thứ tự đúng</p>
                                            {(userAns || q.items.map((_, i) => i)).map((itemIdx, renderIdx) => (
                                                <div key={itemIdx}
                                                    draggable={!showResult}
                                                    onDragStart={(e) => {
                                                        e.dataTransfer.setData('text/plain', renderIdx);
                                                    }}
                                                    onDragOver={(e) => e.preventDefault()}
                                                    onDrop={(e) => {
                                                        if (showResult) return;
                                                        e.preventDefault();
                                                        const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
                                                        const toIdx = renderIdx;
                                                        if (fromIdx === toIdx) return;

                                                        const newOrder = [...(userAns || q.items.map((_, i) => i))];
                                                        const [moved] = newOrder.splice(fromIdx, 1);
                                                        newOrder.splice(toIdx, 0, moved);
                                                        setUserAns(newOrder);
                                                    }}
                                                    className={`p-4 rounded-xl border-2 bg-white flex items-center gap-4 shadow-sm cursor-grab active:cursor-grabbing ${showResult
                                                        ? (JSON.stringify(userAns) === JSON.stringify(q.correctOrder) ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50')
                                                        : 'border-gray-300 hover:border-purple-400'}`}
                                                >
                                                    <div className="font-bold text-gray-400">#{renderIdx + 1}</div>
                                                    <div className="flex-1 font-medium"><MathText text={q.items[itemIdx]} /></div>
                                                    <i className="fas fa-grip-lines text-gray-300"></i>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {/* Submit Button */}
                                {(!showResult && userAns !== null) && (
                                    <button onClick={() => checkAnswer(false)} className="w-full mt-6 bg-purple-600 text-white py-4 rounded-xl font-bold text-xl hover:bg-purple-700 shadow-lg">
                                        Trả lời
                                    </button>
                                )}

                                {/* Feedback */}
                                {showResult && (
                                    <div className={`mt-4 text-center text-xl font-bold ${isCorrect ? 'text-green-600' : 'text-red-600'}`}>
                                        {message || (isCorrect ? 'Chính xác!' : 'Sai rồi!')}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                )
            };

            const renderGameOver = () => (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-10 rounded-3xl shadow-2xl text-center max-w-2xl w-full">
                        <div className="text-6xl mb-4">🏆</div>
                        <h1 className="text-4xl font-bold mb-6 text-purple-700">Hoàn thành!</h1>
                        <div className="grid grid-cols-2 gap-6 mb-8">
                            <div className="bg-gray-100 p-6 rounded-2xl">
                                <p className="text-gray-500">Điểm số</p>
                                <p className="text-4xl font-bold">{score}</p>
                            </div>
                            <div className="bg-gray-100 p-6 rounded-2xl">
                                <p className="text-gray-500">Tầng cao nhất</p>
                                <p className="text-4xl font-bold">{level}</p>
                            </div>
                        </div>
                        <button onClick={() => setScreen('SETUP')} className="bg-purple-600 text-white px-8 py-4 rounded-xl font-bold text-lg hover:shadow-xl">
                            Chơi lại
                        </button>
                    </div>
                </div>
            );

            if (confetti) {
                // Render pure HTML confetti outside React if needed or inside
                // Here we just rely on CSS animation 'confetti' class usage on elements if we spawned them
                // For simplicity, we can spawn div elements in a Portal or just absolute
            }

            return (
                <div className="min-h-screen">
                    {screen === 'SETUP' && renderSetup()}
                    {screen === 'PREIEW' && renderPreview()}
                    {screen === 'GAME' && renderGame()}
                    {screen === 'GAME_OVER' && renderGameOver()}
                </div>
            )
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TowerGame />);
    </script>
</body>

</html>
