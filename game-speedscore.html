<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Game 2: ДҗГәng Nhanh Ghi Дҗiб»ғm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex {
            font-size: 1.1em;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pulse-correct {
            animation: pulseCorrect 0.5s ease-out;
        }

        @keyframes pulseCorrect {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .commentary-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
            }

            to {
                transform: translateX(0);
            }
        }

        .combo-badge {
            animation: comboUp 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes comboUp {
            0% {
                transform: scale(0.5) rotate(-10deg);
                opacity: 0;
            }

            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-yellow-50 to-orange-100 min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============ MATH RENDERER (FIXED) ============
        const MathText = ({ text }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!text || !ref.current) return;
                ref.current.innerHTML = "";
                const imgPattern = /!\[([^\]]*)\]\(([^)]+)\)/g;
                const fragments = [];
                let lastIndex = 0, match;
                while ((match = imgPattern.exec(text)) !== null) {
                    if (match.index > lastIndex) fragments.push({ type: 'text', content: text.substring(lastIndex, match.index) });
                    fragments.push({ type: 'image', alt: match[1], src: match[2] });
                    lastIndex = match.index + match[0].length;
                }
                if (lastIndex < text.length) fragments.push({ type: 'text', content: text.substring(lastIndex) });
                if (fragments.length === 0) fragments.push({ type: 'text', content: text });
                fragments.forEach(fragment => {
                    if (fragment.type === 'image') {
                        const img = document.createElement('img');
                        img.src = fragment.src;
                        img.alt = fragment.alt || 'HГ¬nh minh hб»Қa';
                        img.className = 'max-h-48 rounded-lg my-2 border border-gray-200 shadow-sm inline-block';
                        ref.current.appendChild(img);
                    } else {
                        let processed = fragment.content.replace(/`([^`]+)`/g, '$$$1$$').replace(/\\\[(.+?)\\\]/g, '$$$$1$$').replace(/\\\((.+?)\\\)/g, '$$$1$$');
                        if (processed.includes('\\') && !processed.includes('$')) processed = `$${processed}$`;
                        const parts = processed.split(/($$[\s\S]+?$$|\$[\s\S]+?\$)/g);
                        parts.forEach(part => {
                            if (!part) return;
                            if (part.startsWith('$$') && part.endsWith('$$')) {
                                const span = document.createElement("span");
                                try { katex.render(part.slice(2, -2), span, { throwOnError: false, displayMode: true }); } catch { span.textContent = part; }
                                ref.current.appendChild(span);
                            } else if (part.startsWith("$") && part.endsWith("$")) {
                                const span = document.createElement("span");
                                try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); } catch { span.textContent = part; }
                                ref.current.appendChild(span);
                            } else if (part.trim()) {
                                ref.current.appendChild(document.createTextNode(part));
                            }
                        });
                    }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        // ============ GEMINI SERVICE ============
        const GeminiService = {
            getApiKeys: () => { const keys = localStorage.getItem('global_gemini_keys'); return keys ? JSON.parse(keys) : []; },
            getDefaultModule: () => localStorage.getItem('default_gemini_module') || 'gemini-2.0-flash-exp',
            buildPrompt: (questionType, params) => {
                const { subject, gradeMax, topic, difficulty, numQuestions } = params;
                let typeInstructions = '';
                if (questionType === 'mixed') typeInstructions = `TбәЎo MIX cбәЈ 3 dбәЎng: MCQ (60%), Drag-Drop (20%), Matching (20%)`;
                else if (questionType === 'mcq') typeInstructions = 'Chб»ү tбәЎo TRбә®C NGHIб»ҶM (MCQ)';
                else if (questionType === 'drag-drop') typeInstructions = 'Chб»ү tбәЎo KГүO THбәў (sбәҜp xбәҝp)';
                else if (questionType === 'matching') typeInstructions = 'Chб»ү tбәЎo Nб»җI Г” (ghГ©p cбә·p)';
                return `BбәЎn lГ  trб»Ј lГҪ tбәЎo cГўu hб»Ҹi game SPEED SCORE.
MГҙn: ${subject}, Chб»§ Д‘б»Ғ: ${topic}, Lб»ӣp tб»‘i Д‘a: ${gradeMax}, Дҗб»ҷ khГі: ${difficulty}, Sб»‘ cГўu: ${numQuestions}
${typeInstructions}

TrбәЈ vб»Ғ JSON ДҗГҡNG format sau, KHГ”NG thГӘm chб»Ҝ nГ o:
{"questions":[{"id":"q1","type":"mcq","prompt":"CГўu hб»Ҹi","choices":["A","B","C","D"],"answer":0,"powerUp":null},{"id":"q2","type":"drag-drop","prompt":"SбәҜp xбәҝp","items":["1","2","3"],"correctOrder":[0,1,2]},{"id":"q3","type":"matching","prompt":"Nб»‘i","leftItems":["A","B"],"rightItems":["Def B","Def A"],"correctPairs":[[0,1],[1,0]]}]}

LЖҜU Гқ: 20% cГўu cГі powerUp ("double","streakSaver","timeBonus"), cГҙng thб»©c LaTeX dГ№ng \\( \\) hoбә·c \\[ \\]`;
            },
            generate: async (questionType, params) => {
                const prompt = GeminiService.buildPrompt(questionType, params);
                const apiKeys = GeminiService.getApiKeys();
                if (!apiKeys.length) throw new Error("ChЖ°a cГі API Keys!");
                const defaultModule = GeminiService.getDefaultModule();
                const shuffledKeys = [...apiKeys].sort(() => Math.random() - 0.5);
                for (let i = 0; i < shuffledKeys.length; i++) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${defaultModule}:generateContent?key=${shuffledKeys[i]}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await res.json();
                        if (data.error) throw new Error(data.error.message);
                        const text = data.candidates[0].content.parts[0].text;
                        return GeminiService.parseJSON(text);
                    } catch (e) {
                        console.error(`Key ${i + 1} lб»—i:`, e.message);
                        if (i === shuffledKeys.length - 1) throw e;
                    }
                }
            },
            parseJSON: (text) => {
                let jsonStr = text.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                const startIdx = Math.min(jsonStr.indexOf('{') >= 0 ? jsonStr.indexOf('{') : Infinity, jsonStr.indexOf('[') >= 0 ? jsonStr.indexOf('[') : Infinity);
                const endIdx = Math.max(jsonStr.lastIndexOf('}'), jsonStr.lastIndexOf(']'));
                if (startIdx !== Infinity && endIdx >= 0) jsonStr = jsonStr.substring(startIdx, endIdx + 1);
                try { return JSON.parse(jsonStr); } catch (e) {
                    const fixed = jsonStr.replace(/"([^"]*)"/g, (match, str) => `"${str.replace(/\\/g, '\\\\')}"`);
                    return JSON.parse(fixed);
                }
            }
        };

        // ============ MAIN APP ============
        const SpeedScoreGame = () => {
            const [currentScreen, setCurrentScreen] = useState('SETUP');
            const [questions, setQuestions] = useState([]);
            const [showInstructions, setShowInstructions] = useState(true);
            const [playerName, setPlayerName] = useState('');
            const [playerAvatar, setPlayerAvatar] = useState('рҹ‘ЁвҖҚрҹҺ“');
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);
            const [aiGenParams, setAiGenParams] = useState({ questionType: 'mixed', subject: 'ToГЎn hб»Қc', gradeMax: 9, topic: '', difficulty: 'Vб»«a', numQuestions: 10 });
            const [aiGenerating, setAiGenerating] = useState(false);
            const [editingQuestion, setEditingQuestion] = useState({ type: 'mcq', prompt: '', choices: ['', '', '', ''], answer: 0, items: ['', '', ''], leftItems: ['', ''], rightItems: ['', ''], powerUp: null });
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [timeLeft, setTimeLeft] = useState(20);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showAnswer, setShowAnswer] = useState(false);
            const [timerActive, setTimerActive] = useState(false);
            const [commentary, setCommentary] = useState('');
            const [combo, setCombo] = useState(1);
            const [consecutiveCorrect, setConsecutiveCorrect] = useState(0);
            const [achievements, setAchievements] = useState([]);
            const [showAchievement, setShowAchievement] = useState(null);
            const [draggedItems, setDraggedItems] = useState([]);
            const [draggedIndex, setDraggedIndex] = useState(null);
            const [matchingPairs, setMatchingPairs] = useState([]);

            useEffect(() => { const token = localStorage.getItem('authToken'); if (!token) { alert("ChЖ°a Д‘Дғng nhбәӯp!"); window.location.href = 'login.html'; } }, []);

            const showCommentary = (message) => { setCommentary(message); setTimeout(() => setCommentary(''), 2000); };
            const unlockAchievement = (badge) => {
                const existing = achievements.find(a => a.id === badge.id);
                if (!existing) { setAchievements([...achievements, badge]); setShowAchievement(badge); setTimeout(() => setShowAchievement(null), 3000); }
            };

            const handleGenerateQuestions = async () => {
                if (!aiGenParams.topic.trim()) { alert('Vui lГІng nhбәӯp chб»§ Д‘б»Ғ!'); return; }
                setAiGenerating(true);
                try {
                    const result = await GeminiService.generate(aiGenParams.questionType, aiGenParams);
                    if (result.questions && result.questions.length > 0) { setQuestions(result.questions); setCurrentScreen('QUESTION_LIST'); }
                    else alert('KhГҙng tбәЎo Д‘Ж°б»Јc cГўu hб»Ҹi!');
                } catch (error) { alert('Lб»—i: ' + error.message); } finally { setAiGenerating(false); }
            };

            const handleAddQuestion = () => {
                if (!editingQuestion.prompt.trim()) { alert('Vui lГІng nhбәӯp cГўu hб»Ҹi!'); return; }
                const newQ = { ...editingQuestion, id: `q${questions.length + 1}` };
                setQuestions([...questions, newQ]);
                setEditingQuestion({ type: 'mcq', prompt: '', choices: ['', '', '', ''], answer: 0, items: ['', '', ''], leftItems: ['', ''], rightItems: ['', ''], powerUp: null });
            };

            const handleImagePaste = (e) => {
                const items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') !== -1) {
                        e.preventDefault();
                        const blob = items[i].getAsFile();
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const imgTag = `\n![HГ¬nh minh hб»Қa](${event.target.result})\n`;
                            setEditingQuestion({ ...editingQuestion, prompt: editingQuestion.prompt + imgTag });
                        };
                        reader.readAsDataURL(blob);
                        break;
                    }
                }
            };

            const handleRemoveImage = (imgSrc) => {
                const newPrompt = editingQuestion.prompt.replace(new RegExp(`!\\[.*?\\]\\(${imgSrc.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\)`, 'g'), '');
                setEditingQuestion({ ...editingQuestion, prompt: newPrompt });
            };

            const startGame = () => {
                if (questions.length === 0) { alert('Cбә§n Гӯt nhбәҘt 1 cГўu hб»Ҹi!'); return; }
                if (!playerName.trim()) { alert('Vui lГІng nhбәӯp tГӘn!'); return; }
                setScore(0); setStreak(0); setCombo(1); setConsecutiveCorrect(0); setCurrentQuestionIndex(0); setCurrentScreen('GAME');
                showCommentary("BбәҜt Д‘бә§u!"); startQuestion();
            };

            const startQuestion = () => {
                setShowAnswer(false); setSelectedAnswer(null); setTimeLeft(20); setTimerActive(true); setMatchingPairs([]);
                const currentQ = questions[currentQuestionIndex];
                if (currentQ.type === 'drag-drop') setDraggedItems([...currentQ.items].sort(() => Math.random() - 0.5));
            };

            useEffect(() => {
                if (timerActive && timeLeft > 0 && !showAnswer) {
                    const timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
                    return () => clearTimeout(timer);
                } else if (timeLeft === 0 && timerActive && !showAnswer) handleTimeUp();
            }, [timeLeft, timerActive, showAnswer]);

            const handleTimeUp = () => { if (!showAnswer) handleRevealAnswer(); };

            const handleRevealAnswer = () => {
                setTimerActive(false); setShowAnswer(true);
                const currentQ = questions[currentQuestionIndex];
                let isPlayerCorrect = false;
                if (currentQ.type === 'mcq') isPlayerCorrect = selectedAnswer === currentQ.answer;
                else if (currentQ.type === 'drag-drop') isPlayerCorrect = JSON.stringify(draggedItems) === JSON.stringify(currentQ.items);
                else if (currentQ.type === 'matching') isPlayerCorrect = matchingPairs.length === (currentQ.leftItems?.length || 0);
                setTimeout(() => {
                    if (isPlayerCorrect) {
                        let baseScore = Math.floor(100 * (timeLeft / 20));
                        if (currentQ.powerUp === 'double') baseScore *= 2;
                        if (currentQ.powerUp === 'timeBonus') baseScore += 50;
                        baseScore = Math.floor(baseScore * combo);
                        setScore(score + baseScore); setStreak(streak + 1);
                        const newConsecutive = consecutiveCorrect + 1; setConsecutiveCorrect(newConsecutive);
                        if (newConsecutive === 3) { setCombo(1.5); showCommentary("Combo x1.5! рҹ”Ҙ"); }
                        else if (newConsecutive === 5) { setCombo(2); showCommentary("Combo x2!! рҹ”Ҙрҹ”Ҙ"); }
                        else if (newConsecutive >= 7) { setCombo(3); showCommentary("Combo x3!!! вңЁрҹ”Ҙ"); }
                        else showCommentary(["Tuyб»Үt vб»қi!", "ChГӯnh xГЎc!", "ДҗГәng rб»“i!"][Math.floor(Math.random() * 3)]);
                        if (timeLeft >= 15) unlockAchievement({ id: 'speed-demon', name: 'Speed Demon', icon: 'рҹ”Ҙ' });
                    } else { setConsecutiveCorrect(0); setCombo(1); setStreak(0); showCommentary(["б»’ khГҙng!", "Sai rб»“i!", "Cб»‘ lГӘn!"][Math.floor(Math.random() * 3)]); }
                }, 1500);
                setTimeout(handleNextQuestion, 3000);
            };

            const handleNextQuestion = () => {
                if (currentQuestionIndex < questions.length - 1) { setCurrentQuestionIndex(currentQuestionIndex + 1); startQuestion(); }
                else endGame();
            };

            const endGame = () => {
                setTimerActive(false); setCurrentScreen('GAME_OVER'); showCommentary(`HoГ n thГ nh! ${score} Д‘iб»ғm!`);
                const allCorrect = streak === questions.length;
                if (allCorrect) unlockAchievement({ id: 'perfect', name: 'Perfect', icon: 'рҹҺҜ' });
                if (score >= 1000) unlockAchievement({ id: 'high-scorer', name: 'High Scorer', icon: 'рҹ’Ҝ' });
            };

            // ========== SCREENS ==========
            if (currentScreen === 'SETUP') {
                return (
                    <div className="max-w-4xl mx-auto p-6 fade-in">
                        {showInstructions && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-3xl w-full max-h-[90vh] overflow-y-auto">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-3xl font-bold text-orange-700"><i className="fas fa-bolt mr-3"></i>ДҗГҡNG NHANH GHI ДҗIб»ӮM</h2>
                                        <button onClick={() => setShowInstructions(false)} className="text-gray-500 hover:text-gray-700"><i className="fas fa-times text-2xl"></i></button>
                                    </div>
                                    <div className="space-y-4 text-gray-700">
                                        <div className="bg-orange-50 border-2 border-orange-200 rounded-xl p-4">
                                            <h3 className="font-bold text-lg text-orange-800 mb-2"><i className="fas fa-bullseye mr-2"></i>Mб»Ҙc tiГӘu</h3>
                                            <p>Game khб»ҹi Д‘б»ҷng vui vбә»! TrбәЈ lб»қi nhanh ghi Д‘iб»ғm cao. <strong>KHГ”NG loбәЎi ai</strong>!</p>
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-lg text-gray-800 mb-2"><i className="fas fa-gamepad mr-2"></i>Luбәӯt chЖЎi</h3>
                                            <ul className="space-y-2 ml-6">
                                                <li className="flex items-start gap-2"><span className="text-orange-600 font-bold">1.</span><span>Mб»—i cГўu <strong>20 giГўy</strong></span></li>
                                                <li className="flex items-start gap-2"><span className="text-orange-600 font-bold">2.</span><span>3 dбәЎng: <strong>TrбәҜc nghiб»Үm, KГ©o thбәЈ, Nб»‘i Гҙ</strong></span></li>
                                                <li className="flex items-start gap-2"><span className="text-orange-600 font-bold">3.</span><span>ДҗГәng sб»ӣm вҶ’ <strong className="text-green-600">Nhiб»Ғu Д‘iб»ғm!</strong></span></li>
                                                <li className="flex items-start gap-2"><span className="text-orange-600 font-bold">4.</span><span>Sai вҶ’ 0 Д‘iб»ғm nhЖ°ng <strong>VбәӘN CHЖ I TIбәҫP</strong></span></li>
                                            </ul>
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-lg text-gray-800 mb-2"><i className="fas fa-fire mr-2"></i>Combo & Power-ups</h3>
                                            <div className="bg-gradient-to-r from-orange-50 to-yellow-50 border border-orange-200 rounded-lg p-3 mb-3">
                                                <p className="font-bold text-orange-700 mb-2">рҹ”Ҙ Combo:</p>
                                                <ul className="text-sm space-y-1 ml-4">
                                                    <li>вҖў 3 Д‘Гәng вҶ’ <strong>x1.5</strong></li>
                                                    <li>вҖў 5 Д‘Гәng вҶ’ <strong>x2</strong></li>
                                                    <li>вҖў 7+ Д‘Гәng вҶ’ <strong>x3</strong> вңЁ</li>
                                                </ul>
                                            </div>
                                            <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                                                <p className="font-bold text-blue-700 mb-2">вҡЎ Power-ups:</p>
                                                <p className="text-sm">вҡЎ 2x Д‘iб»ғm пҪҘ рҹҺҜ Giб»Ҝ streak пҪҘ вҸ° +5s</p>
                                            </div>
                                        </div>
                                        <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                                            <p><strong>Дҗiб»ғm = 100 Г— (Thб»қi gian cГІn / 20) Г— Combo</strong></p>
                                            <p className="text-sm mt-1">VD: 15s cГІn, combo x2 = 150Д‘</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowInstructions(false)} className="w-full mt-6 py-4 bg-gradient-to-r from-yellow-600 to-orange-600 text-white rounded-xl font-bold text-lg hover:shadow-xl"><i className="fas fa-play mr-2"></i>BбәҜt Д‘бә§u</button>
                                </div>
                            </div>
                        )}
                        <div className="flex justify-between items-center mb-8">
                            <button onClick={() => window.location.href = 'index.html'} className="text-gray-500 hover:text-orange-600 font-bold"><i className="fas fa-arrow-left mr-2"></i>Quay lбәЎi</button>
                            <h1 className="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-600 to-orange-600"><i className="fas fa-bolt mr-2"></i>SPEED SCORE</h1>
                            <button onClick={() => setShowInstructions(true)} className="w-10 h-10 bg-blue-500 text-white rounded-full hover:bg-blue-600" title="HЖ°б»ӣng dбә«n"><i className="fas fa-question"></i></button>
                        </div>
                        <div className="bg-white rounded-3xl shadow-2xl p-8 mb-6">
                            <h2 className="text-2xl font-bold text-gray-800 mb-6"><i className="fas fa-user mr-2"></i>ThГҙng tin ngЖ°б»қi chЖЎi</h2>
                            <div className="space-y-4">
                                <div>
                                    <label className="block font-bold mb-2 text-gray-700">TГӘn (cГЎ nhГўn hoбә·c nhГіm):</label>
                                    <input type="text" value={playerName} onChange={(e) => setPlayerName(e.target.value)} className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-orange-500 outline-none" placeholder="VD: BбәЎn An, NhГіm 1, Lб»ӣp 9A..." />
                                </div>
                                <div>
                                    <label className="block font-bold mb-2 text-gray-700">Avatar:</label>
                                    <div className="flex gap-2">
                                        {['рҹ‘ЁвҖҚрҹҺ“', 'рҹ‘©вҖҚрҹҺ“', 'рҹ§‘вҖҚрҹ’ј', 'рҹ‘ЁвҖҚрҹ’»', 'рҹ‘©вҖҚрҹ’»', 'рҹҰёвҖҚвҷӮпёҸ', 'рҹҰёвҖҚвҷҖпёҸ', 'рҹ§ҷвҖҚвҷӮпёҸ'].map(emoji => (
                                            <button key={emoji} onClick={() => setPlayerAvatar(emoji)} className={`text-4xl p-3 rounded-xl border-2 transition ${playerAvatar === emoji ? 'border-orange-500 bg-orange-50' : 'border-gray-200 hover:border-orange-300'}`}>{emoji}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div onClick={() => setCurrentScreen('AI_GEN')} className="bg-white rounded-3xl shadow-xl p-8 cursor-pointer hover:shadow-2xl transition transform hover:-translate-y-2">
                                <div className="w-20 h-20 bg-gradient-to-br from-purple-500 to-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4"><i className="fas fa-robot text-4xl text-white"></i></div>
                                <h2 className="text-2xl font-bold text-gray-800 text-center mb-3">TбәЎo bбәұng AI</h2>

                                            {currentQ.leftItems.map((item, idx) => {
                                                const pair = matchingPairs.find(p => p[0] === idx);
                                                const pairNumber = pair ? matchingPairs.indexOf(pair) + 1 : null;
                                                const isCorrect = showAnswer && pair && currentQ.correctPairs && currentQ.correctPairs[idx] && currentQ.correctPairs[idx][1] === pair[1];
                                                return (
                                                    <div key={idx} onClick={() => { if (!showAnswer) { const existing = matchingPairs.find(p => p[0] === idx); if (!existing) setMatchingPairs([...matchingPairs, [idx, null]]); } }} className={`p-4 rounded-xl border-2 cursor-pointer transition relative ${showAnswer
                                                        ? (isCorrect ? 'bg-green-100 border-green-500' : pair ? 'bg-red-100 border-red-500' : 'bg-gray-100 border-gray-300')
                                                        : (pair ? 'bg-blue-100 border-blue-500' : 'bg-blue-50 border-blue-300 hover:border-blue-500')
                                                        }`}>
                                                        {pairNumber && (
                                                            <div className="absolute -top-2 -right-2 w-6 h-6 bg-orange-500 text-white rounded-full flex items-center justify-center text-sm font-bold">
                                                                {pairNumber}
                                                            </div>
                                                        )}
                                                        <MathText text={item} />
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        <div className="space-y-3">
                                            {currentQ.rightItems.map((item, idx) => {
                                                const pair = matchingPairs.find(p => p[1] === idx);
                                                const pairNumber = pair ? matchingPairs.indexOf(pair) + 1 : null;
                                                const leftIdx = pair ? pair[0] : null;
                                                const isCorrect = showAnswer && pair && currentQ.correctPairs && currentQ.correctPairs[leftIdx] && currentQ.correctPairs[leftIdx][1] === idx;
                                                return (
                                                    <div key={idx} onClick={() => { if (!showAnswer) { const incomplete = matchingPairs.find(p => p[1] === null); if (incomplete) { const updated = matchingPairs.map(p => p === incomplete ? [p[0], idx] : p); setMatchingPairs(updated); } } }} className={`p-4 rounded-xl border-2 cursor-pointer transition relative ${showAnswer
                                                        ? (isCorrect ? 'bg-green-100 border-green-500' : pair ? 'bg-red-100 border-red-500' : 'bg-gray-100 border-gray-300')
                                                        : (pair ? 'bg-green-100 border-green-500' : 'bg-green-50 border-green-300 hover:border-green-500')
                                                        }`}>
                                                        {pairNumber && (
                                                            <div className="absolute -top-2 -right-2 w-6 h-6 bg-orange-500 text-white rounded-full flex items-center justify-center text-sm font-bold">
                                                                {pairNumber}
                                                            </div>
                                                        )}
                                                        <MathText text={item} />
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    {!showAnswer && matchingPairs.length > 0 && (
                                        <div className="mt-4 p-4 bg-blue-50 border border-blue-300 rounded-xl">
                                            <p className="text-sm font-bold text-blue-800">
                                                <i className="fas fa-info-circle mr-2"></i>
                                                ДҗГЈ nб»‘i {matchingPairs.filter(p => p[1] !== null).length}/{currentQ.leftItems.length} cбә·p
                                            </p>
                                        </div>
                                    )}
                                </div>
                            )}
                            {!showAnswer && <button onClick={handleRevealAnswer} className="w-full mt-6 py-4 bg-gradient-to-r from-orange-600 to-red-600 text-white rounded-xl font-bold text-lg hover:shadow-xl"><i className="fas fa-check mr-2"></i>TrбәЈ lб»қi</button>}
                        </div>
                    </div>
                );
            }

            if (currentScreen === 'GAME_OVER') {
                return (
                    <div className="max-w-4xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-12 text-center">
                            <div className="text-8xl mb-6">рҹҺү</div>
                            <h1 className="text-5xl font-bold text-orange-600 mb-4">HoГ n thГ nh!</h1>
                            <div className="mb-8"><div className="text-7xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-600 to-orange-600 mb-2">{score}</div><div className="text-2xl text-gray-600">Д‘iб»ғm</div></div>
                            <div className="grid grid-cols-3 gap-6 mb-8">
                                <div className="bg-blue-50 rounded-2xl p-6"><div className="text-3xl mb-2">рҹҺҜ</div><div className="text-2xl font-bold text-blue-600">{streak}</div><div className="text-gray-600">Streak cao nhбәҘt</div></div>
                                <div className="bg-purple-50 rounded-2xl p-6"><div className="text-3xl mb-2">вҡЎ</div><div className="text-2xl font-bold text-purple-600">x{combo}</div><div className="text-gray-600">Combo tб»‘i Д‘a</div></div>
                                <div className="bg-green-50 rounded-2xl p-6"><div className="text-3xl mb-2">вң…</div><div className="text-2xl font-bold text-green-600">{questions.length}</div><div className="text-gray-600">CГўu hoГ n thГ nh</div></div>
                            </div>
                            {achievements.length > 0 && (
                                <div className="mb-8"><h3 className="text-xl font-bold mb-4">ThГ nh tГӯch:</h3><div className="flex justify-center gap-4">{achievements.map((badge, idx) => <div key={idx} className="bg-yellow-50 border-2 border-yellow-400 rounded-xl p-4"><div className="text-4xl mb-2">{badge.icon}</div><div className="font-bold text-yellow-800">{badge.name}</div></div>)}</div></div>
                            )}
                            <div className="flex gap-4 justify-center">
                                <button onClick={() => { setCurrentQuestionIndex(0); startGame(); }} className="px-8 py-4 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded-2xl font-bold text-lg hover:shadow-xl"><i className="fas fa-redo mr-2"></i>ChЖЎi lбәЎi</button>
                                <button onClick={() => setCurrentScreen('SETUP')} className="px-8 py-4 bg-gray-500 text-white rounded-2xl font-bold text-lg hover:bg-gray-600"><i className="fas fa-home mr-2"></i>Trang chб»§</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        ReactDOM.render(<SpeedScoreGame />, document.getElementById('root'));
    </script>
</body>

</html>
