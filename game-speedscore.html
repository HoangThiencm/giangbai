                            <div className="mt-8">
                                <div className="bg-green-50 border-2 border-green-300 rounded-2xl p-6">
                                    <div className="flex justify-between items-center">
                                        <div>
                                            <i className="fas fa-check-circle text-green-600 mr-2"></i>
                                            <span className="font-bold text-green-800">Đã có {questions.length} câu hỏi</span>
                                        </div>
                                        <div className="flex gap-3">
                                            <button
                                                onClick={() => setCurrentScreen('QUESTION_LIST')}
                                                className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
                                            >
                                                <i className="fas fa-list mr-2"></i>Xem danh sách
                                            </button>
                                            <button
                                                onClick={startGame}
                                                className="px-6 py-2 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded-lg font-bold hover:shadow-xl"
                                            >
                                                <i className="fas fa-play mr-2"></i>Chơi ngay
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // SCREEN: AI_GEN
            if (currentScreen === 'AI_GEN') {
                return (
                    <div className="max-w-3xl mx-auto p-6 fade-in">
                        <button
                            onClick={() => setCurrentScreen('SETUP')}
                            className="text-gray-500 hover:text-orange-600 font-bold transition mb-6"
                        >
                            <i className="fas fa-arrow-left mr-2"></i>Quay lại
                        </button>

                        <div className="bg-white rounded-3xl shadow-2xl p-8">
                            <div className="text-center mb-6">
                                <div className="w-20 h-20 bg-gradient-to-br from-purple-500 to-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-4">
                                    <i className="fas fa-robot text-4xl text-white"></i>
                                </div>
                                <h2 className="text-3xl font-bold text-gray-800 mb-2">Tạo câu hỏi bằng AI</h2>
                                <p className="text-gray-600">Gemini sẽ tạo câu hỏi thông minh theo chủ đề của bạn</p>
                            </div>

                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block font-bold mb-2 text-gray-700">Dạng câu hỏi</label>
                                        <select
                                            value={aiGenParams.questionType}
                                            onChange={(e) => setAiGenParams({ ...aiGenParams, questionType: e.target.value })}
                                            className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none"
                                        >
                                            <option value="mixed">Trộn lẫn (MCQ + Kéo thả + Nối ô)</option>
                                            <option value="mcq">Chỉ trắc nghiệm</option>
                                            <option value="drag-drop">Chỉ kéo thả</option>
                                            <option value="matching">Chỉ nối ô</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block font-bold mb-2 text-gray-700">Môn học</label>
                                        <select
                                            value={aiGenParams.subject}
                                            onChange={(e) => setAiGenParams({ ...aiGenParams, subject: e.target.value })}
                                            className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none"
                                        >
                                            <option>Toán</option>
                                            <option>Lý</option>
                                            <option>Hóa</option>
                                            <option>Sinh</option>
                                            <option>Văn</option>
                                            <option>Anh</option>
                                            <option>Sử</option>
                                            <option>Địa</option>
                                        </select>
                                    </div>
                                </div>

                                <div>
                                    <label className="block font-bold mb-2 text-gray-700">Chủ đề</label>
                                    <input
                                        type="text"
                                        value={aiGenParams.topic}
                                        onChange={(e) => setAiGenParams({ ...aiGenParams, topic: e.target.value })}
                                        className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none"
                                        placeholder="VD: Phương trình bậc 2, Định luật Ôm..."
                                    />
                                </div>

                                <div className="grid grid-cols-3 gap-4">
                                    <div>
                                        <label className="block font-bold mb-2 text-gray-700">Lớp tối đa</label>
                                        <select
                                            value={aiGenParams.gradeMax}
                                            onChange={(e) => setAiGenParams({ ...aiGenParams, gradeMax: parseInt(e.target.value) })}
                                            className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none"
                                        >
                                            {[6, 7, 8, 9, 10, 11, 12].map(g => (
                                                <option key={g} value={g}>Lớp {g}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block font-bold mb-2 text-gray-700">Độ khó</label>
                                        <select
                                            value={aiGenParams.difficulty}
                                            onChange={(e) => setAiGenParams({ ...aiGenParams, difficulty: e.target.value })}
                                            className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none"
                                        >
                                            <option>Dễ</option>
                                            <option>Vừa</option>
                                            <option>Khó</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block font-bold mb-2 text-gray-700">Số câu</label>
                                        <input
                                            type="number"
                                            min="5"
                                            max="20"
                                            value={aiGenParams.numQuestions}
                                            onChange={(e) => setAiGenParams({ ...aiGenParams, numQuestions: parseInt(e.target.value) })}
                                            className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none"
                                        />
                                    </div>
                                </div>

                                <button
                                    onClick={handleGenerateQuestions}
                                    disabled={aiGenerating}
                                    className="w-full py-4 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-xl font-bold text-lg hover:shadow-xl transition disabled:opacity-50"
                                >
                                    {aiGenerating ? (
                                        <><i className="fas fa-spinner fa-spin mr-2"></i>Đang tạo...</>
                                    ) : (
                                        <><i className="fas fa-magic mr-2"></i>Tạo câu hỏi với AI</>
                                    )}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // SCREEN: MANUAL
            if (currentScreen === 'MANUAL') {
                return (
                    <div className="max-w-4xl mx-auto p-6 fade-in">
                        <button
                            onClick={() => setCurrentScreen('SETUP')}
                            className="text-gray-500 hover:text-orange-600 font-bold transition mb-6"
                        >
                            <i className="fas fa-arrow-left mr-2"></i>Quay lại
                        </button>

                        <div className="bg-white rounded-3xl shadow-2xl p-8">
                            <h2 className="text-3xl font-bold text-gray-800 mb-6">
                                <i className="fas fa-pen text-green-600 mr-3"></i>
                                Tạo câu hỏi thủ công
                            </h2>

                            <div className="space-y-4">
                                <div>
                                    <label className="block font-bold mb-2 text-gray-700">Dạng câu hỏi</label>
                                    <select
                                        value={editingQuestion.type}
                                        onChange={(e) => setEditingQuestion({ ...editingQuestion, type: e.target.value })}
                                        className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-green-500 outline-none"
                                    >
                                        <option value="mcq">Trắc nghiệm (A/B/C/D)</option>
                                        <option value="drag-drop">Kéo thả (Sắp xếp thứ tự)</option>
                                        <option value="matching">Nối ô (Ghép cặp)</option>
                                    </select>
                                </div>

                                <div>
                                    <div className="flex items-center justify-between mb-2">
                                        <label className="block font-bold text-gray-700">Câu hỏi:</label>
                                        <label className="cursor-pointer px-3 py-1.5 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600 transition flex items-center gap-2">
                                            <i className="fas fa-image"></i>
                                            <span>Chèn ảnh hoặc Ctrl+V</span>
                                            <input
                                                type="file"
                                                accept="image/*"
                                                className="hidden"
                                                onChange={(e) => {
                                                    const file = e.target.files[0];
                                                    if (file) {
                                                        const reader = new FileReader();
                                                        reader.onload = (event) => {
                                                            const imgTag = `\n![Hình minh họa](${event.target.result})\n`;
                                                            setEditingQuestion({ ...editingQuestion, prompt: editingQuestion.prompt + imgTag });
                                                        };
                                                        reader.readAsDataURL(file);
                                                    }
                                                    e.target.value = '';
                                                }}
                                            />
                                        </label>
                                    </div>
                                    <textarea
                                        value={editingQuestion.prompt}
                                        onChange={(e) => setEditingQuestion({ ...editingQuestion, prompt: e.target.value })}
                                        onPaste={handleImagePaste}
                                        placeholder="Nhập câu hỏi... (Ctrl+V để dán hình ảnh)"
                                        className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-green-500 focus:outline-none"
                                        rows="3"
                                    />
                                    {editingQuestion.prompt && editingQuestion.prompt.includes('![') && (
                                        <div className="mt-3 p-3 bg-gray-50 rounded-xl border-2 border-dashed border-gray-300">
                                            <div className="text-sm font-bold text-gray-600 mb-2">
                                                <i className="fas fa-image mr-2"></i>Hình ảnh đính kèm:
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {editingQuestion.prompt.match(/!\[.*?\]\((data:image\/[^)]+)\)/g)?.map((match, idx) => {
                                                    const src = match.match(/\((data:image\/[^)]+)\)/)?.[1];
                                                    return src ? (
                                                        <div key={idx} className="relative group">
                                                            <img src={src} alt="Preview" className="max-h-32 rounded-lg border-2 border-gray-300" />
                                                            <button
                                                                onClick={() => handleRemoveImage(src)}
                                                                className="absolute top-1 right-1 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center opacity-0 group-hover:opacity-100 transition"
                                                            >
                                                                <i className="fas fa-times text-xs"></i>
                                                            </button>
                                                        </div>
                                                    ) : null;
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {editingQuestion.type === 'mcq' && (
                                    <>
                                        <div>
                                            <label className="block font-bold mb-2 text-gray-700">Các đáp án:</label>
                                            {editingQuestion.choices.map((choice, idx) => (
                                                <div key={idx} className="flex gap-2 mb-2">
                                                    <span className="w-8 h-10 bg-gray-200 rounded-lg flex items-center justify-center font-bold">
                                                        {String.fromCharCode(65 + idx)}
                                                    </span>
                                                    <input
                                                        type="text"
                                                        value={choice}
                                                        onChange={(e) => {
                                                            const newChoices = [...editingQuestion.choices];
                                                            newChoices[idx] = e.target.value;
                                                            setEditingQuestion({ ...editingQuestion, choices: newChoices });
                                                        }}
                                                        className="flex-1 px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-green-500 outline-none"
                                                        placeholder={`Đáp án ${String.fromCharCode(65 + idx)}`}
                                                    />
                                                </div>
                                            ))}
                                        </div>
                                        <div>
                                            <label className="block font-bold mb-2 text-gray-700">Đáp án đúng:</label>
                                            <select
                                                value={editingQuestion.answer}
                                                onChange={(e) => setEditingQuestion({ ...editingQuestion, answer: parseInt(e.target.value) })}
                                                className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-green-500 outline-none"
                                            >
                                                {editingQuestion.choices.map((_, idx) => (
                                                    <option key={idx} value={idx}>{String.fromCharCode(65 + idx)}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </>
                                )}

                                {editingQuestion.type === 'drag-drop' && (
                                    <div>
                                        <label className="block font-bold mb-2 text-gray-700">Các mục cần sắp xếp (theo thứ tự ĐÚNG):</label>
                                        {editingQuestion.items.map((item, idx) => (
                                            <div key={idx} className="flex gap-2 mb-2">
                                                <span className="w-8 h-10 bg-blue-200 rounded-lg flex items-center justify-center font-bold">
                                                    {idx + 1}
                                                </span>
                                                <input
                                                    type="text"
                                                    value={item}
                                                    onChange={(e) => {
                                                        const newItems = [...editingQuestion.items];
                                                        newItems[idx] = e.target.value;
                                                        setEditingQuestion({ ...editingQuestion, items: newItems });
                                                    }}
                                                    className="flex-1 px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-green-500 outline-none"
                                                    placeholder={`Bước ${idx + 1}`}
                                                />
                                            </div>
                                        ))}
                                        <button
                                            onClick={() => setEditingQuestion({ ...editingQuestion, items: [...editingQuestion.items, ''] })}
                                            className="w-full py-2 border-2 border-dashed border-gray-300 rounded-lg text-gray-600 hover:border-green-500 hover:text-green-600"
                                        >
                                            <i className="fas fa-plus mr-2"></i>Thêm mục
                                        </button>
                                    </div>
                                )}

                                {editingQuestion.type === 'matching' && (
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block font-bold mb-2 text-gray-700">Cột trái (Khái niệm):</label>
                                            {editingQuestion.leftItems.map((item, idx) => (
                                                <input
                                                    key={idx}
                                                    type="text"
                                                    value={item}
                                                    onChange={(e) => {
                                                        const newLeft = [...editingQuestion.leftItems];
                                                        newLeft[idx] = e.target.value;
                                                        setEditingQuestion({ ...editingQuestion, leftItems: newLeft });
                                                    }}
                                                    className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-green-500 outline-none mb-2"
                                                    placeholder={`Khái niệm ${idx + 1}`}
                                                />
                                            ))}
                                        </div>
                                        <div>
                                            <label className="block font-bold mb-2 text-gray-700">Cột phải (Định nghĩa):</label>
                                            {editingQuestion.rightItems.map((item, idx) => (
                                                <input
                                                    key={idx}
                                                    type="text"
                                                    value={item}
                                                    onChange={(e) => {
                                                        const newRight = [...editingQuestion.rightItems];
                                                        newRight[idx] = e.target.value;
                                                        setEditingQuestion({ ...editingQuestion, rightItems: newRight });
                                                    }}
                                                    className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-green-500 outline-none mb-2"
                                                    placeholder={`Định nghĩa ${idx + 1}`}
                                                />
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div>
                                    <label className="block font-bold mb-2 text-gray-700">Power-up (tùy chọn):</label>
                                    <select
                                        value={editingQuestion.powerUp || ''}
                                        onChange={(e) => setEditingQuestion({ ...editingQuestion, powerUp: e.target.value || null })}
                                        className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-green-500 outline-none"
                                    >
                                        <option value="">Không có</option>
                                        <option value="double">⚡ Double Points (điểm x2)</option>
                                        <option value="streakSaver">🎯 Streak Saver (giữ streak khi sai)</option>
                                        <option value="timeBonus">⏰ Time Bonus (+5s)</option>
                                    </select>
                                </div>

                                <div className="flex gap-3">
                                    <button
                                        onClick={handleAddQuestion}
                                        className="flex-1 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700"
                                    >
                                        <i className="fas fa-plus mr-2"></i>Thêm câu hỏi
                                    </button>
                                    {questions.length > 0 && (
                                        <button
                                            onClick={() => setCurrentScreen('QUESTION_LIST')}
                                            className="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700"
                                        >
                                            Xem danh sách ({questions.length})
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // SCREEN: QUESTION_LIST
            if (currentScreen === 'QUESTION_LIST') {
                return (
                    <div className="max-w-5xl mx-auto p-6 fade-in">
                        <div className="flex justify-between items-center mb-6">
                            <button
                                onClick={() => setCurrentScreen('SETUP')}
                                className="text-gray-500 hover:text-orange-600 font-bold transition"
                            >
                                <i className="fas fa-arrow-left mr-2"></i>Quay lại
                            </button>
                            <h1 className="text-3xl font-bold text-gray-800">
                                <i className="fas fa-list mr-2 text-orange-600"></i>
                                Danh sách câu hỏi ({questions.length})
                            </h1>
                            <button
                                onClick={startGame}
                                className="px-6 py-3 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded-xl font-bold hover:shadow-xl"
                            >
                                <i className="fas fa-play mr-2"></i>Chơi ngay
                            </button>
                        </div>

                        <div className="space-y-4">
                            {questions.map((q, idx) => (
                                <div key={idx} className="bg-white rounded-xl shadow p-6">
                                    <div className="flex justify-between items-start mb-3">
                                        <div className="flex gap-3">
                                            <span className="text-2xl font-bold text-gray-400">#{idx + 1}</span>
                                            <div>
                                                <div className="flex gap-2 mb-2">
                                                    <span className={`px-3 py-1 rounded-full text-xs font-bold ${q.type === 'mcq' ? 'bg-blue-100 text-blue-700' :
                                                            q.type === 'drag-drop' ? 'bg-purple-100 text-purple-700' :
                                                                'bg-green-100 text-green-700'
                                                        }`}>
                                                        {q.type === 'mcq' ? 'Trắc nghiệm' :
                                                            q.type === 'drag-drop' ? 'Kéo thả' : 'Nối ô'}
                                                    </span>
                                                    {q.powerUp && (
                                                        <span className="px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-700">
                                                            {q.powerUp === 'double' ? '⚡ 2x điểm' :
                                                                q.powerUp === 'streakSaver' ? '🎯 Giữ streak' : '⏰ +5s'}
                                                        </span>
                                                    )}
                                                </div>
                                                <div className="text-lg"><MathText text={q.prompt} /></div>
                                            </div>
                                        </div>
                                        <button
                                            onClick={() => {
                                                const newQuestions = questions.filter((_, i) => i !== idx);
                                                setQuestions(newQuestions);
                                            }}
                                            className="text-red-500 hover:text-red-700"
                                        >
                                            <i className="fas fa-trash"></i>
                                        </button>
                                    </div>

                                    {q.type === 'mcq' && (
                                        <div className="grid grid-cols-2 gap-2 mt-3">
                                            {q.choices.map((choice, cidx) => (
                                                <div key={cidx} className={`p-2 rounded-lg text-sm ${q.answer === cidx ? 'bg-green-100 border-2 border-green-500 font-bold' : 'bg-gray-50'
                                                    }`}>
                                                    {String.fromCharCode(65 + cidx)}. <MathText text={choice} />
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {q.type === 'drag-drop' && (
                                        <div className="mt-3 flex gap-2">
                                            {q.items.map((item, iidx) => (
                                                <div key={iidx} className="bg-blue-50 px-3 py-2 rounded-lg text-sm">
                                                    {iidx + 1}. {item}
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {q.type === 'matching' && (
                                        <div className="mt-3 grid grid-cols-2 gap-3">
                                            <div>
                                                {q.leftItems.map((item, iidx) => (
                                                    <div key={iidx} className="bg-purple-50 px-3 py-2 rounded-lg text-sm mb-2">
                                                        {item}
                                                    </div>
                                                ))}
                                            </div>
                                            <div>
                                                {q.rightItems.map((item, iidx) => (
                                                    <div key={iidx} className="bg-green-50 px-3 py-2 rounded-lg text-sm mb-2">
                                                        {item}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            // SCREEN: GAME
            if (currentScreen === 'GAME' && questions.length > 0) {
                const currentQ = questions[currentQuestionIndex];
                const humanPlayer = players.find(p => p.isHuman);
                const topPlayers = [...players].sort((a, b) => b.score - a.score).slice(0, 5);

                return (
                    <div className="max-w-6xl mx-auto p-6 fade-in">
                        {/* Commentary Toast */}
                        {commentary && (
                            <div className="commentary-toast bg-orange-500 text-white px-6 py-3 rounded-xl shadow-2xl font-bold">
                                <i className="fas fa-bullhorn mr-2"></i>{commentary}
                            </div>
                        )}

                        {/* Achievement Toast */}
                        {showAchievement && (
                            <div className="fixed top-20 right-20 bg-gradient-to-r from-yellow-400 to-orange-500 text-white px-6 py-4 rounded-2xl shadow-2xl z-50">
                                <div className="text-2xl mb-1">{showAchievement.icon}</div>
                                <div className="font-bold">Thành tích mở khóa!</div>
                                <div className="text-sm">{showAchievement.name}</div>
                            </div>
                        )}

                        <div className="grid grid-cols-3 gap-6">
                            {/* Left: Leaderboard */}
                            <div className="bg-white rounded-2xl shadow-lg p-4">
                                <h3 className="text-xl font-bold mb-4 text-gray-800 flex items-center gap-2">
                                    <i className="fas fa-trophy text-yellow-500"></i>
                                    Top 5
                                </h3>
                                <div className="space-y-2">
                                    {topPlayers.map((player, idx) => (
                                        <div key={player.id} className={`flex items-center gap-3 p-3 rounded-xl ${player.isHuman ? 'bg-blue-50 border-2 border-blue-500' : 'bg-gray-50'
                                            }`}>
                                            <span className="text-2xl">
                                                {idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `#${idx + 1}`}
                                            </span>
                                            <span className="text-2xl">{player.avatar}</span>
                                            <div className="flex-1">
                                                <div className="font-bold text-sm">{player.name}</div>
                                                <div className="text-xs text-gray-600">{player.score} điểm</div>
                                            </div>
                                            {player.hasAnswered && (
                                                <i className="fas fa-check text-green-500"></i>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                {/* Combo Display */}
                                {combo > 1 && (
                                    <div className="mt-4 p-4 bg-gradient-to-r from-orange-400 to-red-500 rounded-xl text-white text-center combo-badge">
                                        <div className="text-3xl font-bold">x{combo}</div>
                                        <div className="text-sm">COMBO! 🔥</div>
                                    </div>
                                )}
                            </div>

                            {/* Center: Question */}
                            <div className="col-span-2">
                                {/* Timer & Progress */}
                                <div className="bg-white rounded-xl p-4 mb-4 flex justify-between items-center">
                                    <div className="text-sm text-gray-600">
                                        Câu {currentQuestionIndex + 1} / {questions.length}
                                    </div>
                                    <div className={`text-5xl font-bold ${timeLeft <= 5 ? 'text-red-600 animate-pulse' : 'text-blue-600'}`}>
                                        {timeLeft}s
                                    </div>
                                    {currentQ.powerUp && (
                                        <div className={`px-4 py-2 rounded-lg font-bold text-white ${currentQ.powerUp === 'double' ? 'bg-yellow-500' :
                                                currentQ.powerUp === 'streakSaver' ? 'bg-blue-500' : 'bg-purple-500'
                                            }`}>
                                            {currentQ.powerUp === 'double' ? '⚡ 2X ĐIỂM' :
                                                currentQ.powerUp === 'streakSaver' ? '🎯 STREAK SAVER' : '⏰ +5s'}
                                        </div>
                                    )}
                                </div>

                                {/* Question Content */}
                                <div className="bg-white rounded-3xl shadow-2xl p-8">
                                    <h3 className="text-2xl font-bold text-gray-800 mb-6">
                                        <MathText text={currentQ.prompt} />
                                    </h3>

                                    {/* MCQ */}
                                    {currentQ.type === 'mcq' && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {currentQ.choices.map((choice, idx) => {
                                                const isSelected = selectedAnswer === idx;
                                                const isCorrect = currentQ.answer === idx;
                                                let className = "p-4 rounded-xl border-2 cursor-pointer transition font-medium ";

                                                if (showAnswer) {
                                                    if (isCorrect) className += "bg-green-100 border-green-500 text-green-900 pulse-correct";
                                                    else if (isSelected) className += "bg-red-100 border-red-500 text-red-900";
                                                    else className += "border-gray-200 opacity-50";
                                                } else {
                                                    if (isSelected) className += "bg-blue-100 border-blue-500";
                                                    else className += "border-gray-300 hover:border-blue-400 hover:bg-blue-50";
                                                }

                                                return (
                                                    <button
                                                        key={idx}
                                                        onClick={() => !showAnswer && setSelectedAnswer(idx)}
                                                        disabled={showAnswer}
                                                        className={className}
                                                    >
                                                        <div className="flex items-center gap-3">
                                                            <span className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center font-bold">
                                                                {String.fromCharCode(65 + idx)}
                                                            </span>
                                                            <div className="flex-1 text-left"><MathText text={choice} /></div>
                                                            {showAnswer && isCorrect && <i className="fas fa-check-circle text-green-600 text-2xl"></i>}
                                                        </div>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    )}

                                    {/* Drag-Drop */}
                                    {currentQ.type === 'drag-drop' && !showAnswer && (
                                        <div className="space-y-3">
                                            <p className="text-gray-600 mb-4">Kéo thả để sắp xếp theo thứ tự đúng:</p>
                                            {draggedItems.map((item, idx) => (
                                                <div
                                                    key={idx}
                                                    draggable
                                                    onDragStart={() => setDraggedIndex(idx)}
                                                    onDragOver={(e) => e.preventDefault()}
                                                    onDrop={() => {
                                                        if (draggedIndex !== null && draggedIndex !== idx) {
                                                            const newItems = [...draggedItems];
                                                            const temp = newItems[draggedIndex];
                                                            newItems[draggedIndex] = newItems[idx];
                                                            newItems[idx] = temp;
                                                            setDraggedItems(newItems);
                                                            setDraggedIndex(null);
                                                        }
                                                    }}
                                                    className="p-4 bg-blue-50 border-2 border-blue-300 rounded-xl cursor-move hover:bg-blue-100 flex items-center gap-3"
                                                >
                                                    <i className="fas fa-grip-vertical text-gray-400"></i>
                                                    <span className="font-bold text-blue-600">{idx + 1}.</span>
                                                    <span>{item}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {currentQ.type === 'drag-drop' && showAnswer && (
                                        <div className="space-y-3">
                                            <p className="text-gray-600 mb-4">Thứ tự đúng:</p>
                                            {currentQ.items.map((item, idx) => (
                                                <div key={idx} className={`p-4 rounded-xl flex items-center gap-3 ${JSON.stringify(draggedItems) === JSON.stringify(currentQ.items) ?
                                                        'bg-green-100 border-2 border-green-500' : 'bg-gray-100'
                                                    }`}>
                                                    <span className="font-bold">{idx + 1}.</span>
                                                    <span>{item}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {currentQ.type === 'matching' && (
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-2">
                                                <p className="font-bold text-gray-700 mb-3">Khái niệm:</p>
                                                {currentQ.leftItems.map((item, idx) => (
                                                    <button
                                                        key={idx}
                                                        onClick={() => {
                                                            if (showAnswer) return;
                                                            // Handle matching pairs logic (simplified)
                                                            setMatchingPairs([...matchingPairs, [idx, 0]]);
                                                        }}
                                                        className="w-full p-3 bg-purple-50 border-2 border-purple-300 rounded-lg text-left hover:bg-purple-100"
                                                    >
                                                        {item}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="space-y-2">
                                                <p className="font-bold text-gray-700 mb-3">Định nghĩa:</p>
                                                {currentQ.rightItems.map((item, idx) => (
                                                    <div key={idx} className="p-3 bg-green-50 border-2 border-green-300 rounded-lg">
                                                        {item}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Submit Button */}
                                    {!showAnswer && currentQ.type === 'mcq' && selectedAnswer !== null && (
                                        <button
                                            onClick={handleRevealAnswer}
                                            className="w-full mt-6 py-4 bg-green-600 text-white rounded-xl font-bold text-lg hover:bg-green-700"
                                        >
                                            <i className="fas fa-check mr-2"></i>Gửi câu trả lời
                                        </button>
                                    )}

                                    {!showAnswer && currentQ.type === 'drag-drop' && (
                                        <button
                                            onClick={handleRevealAnswer}
                                            className="w-full mt-6 py-4 bg-green-600 text-white rounded-xl font-bold text-lg hover:bg-green-700"
                                        >
                                            <i className="fas fa-check mr-2"></i>Xác nhận thứ tự
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // SCREEN: GAME_OVER
            if (currentScreen === 'GAME_OVER') {
                const humanPlayer = players.find(p => p.isHuman);
                const playerRank = players.findIndex(p => p.isHuman) + 1;

                return (
                    <div className="max-w-4xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-12 text-center">
                            <div className={`w-32 h-32 rounded-full flex items-center justify-center mx-auto mb-6 ${playerRank === 1 ? 'bg-gradient-to-br from-yellow-400 to-orange-500' :
                                    playerRank <= 3 ? 'bg-gradient-to-br from-blue-400 to-purple-500' :
                                        'bg-gradient-to-br from-gray-400 to-gray-500'
                                }`}>
                                <i className={`text-6xl text-white ${playerRank === 1 ? 'fas fa-trophy' :
                                        playerRank <= 3 ? 'fas fa-medal' : 'fas fa-flag-checkered'
                                    }`}></i>
                            </div>

                            <h2 className="text-5xl font-bold mb-4 text-gray-800">
                                {playerRank === 1 ? '🎉 CHIẾN THẮNG! 🎉' :
                                    playerRank <= 3 ? `Hạng ${playerRank}` : 'Hoàn thành!'}
                            </h2>

                            <div className="text-8xl font-bold text-orange-600 mb-2">{humanPlayer.score}</div>
                            <div className="text-2xl text-gray-600 mb-8">Tổng điểm</div>

                            {/* Final Leaderboard */}
                            <div className="bg-gray-50 rounded-2xl p-6 mb-8">
                                <h3 className="text-xl font-bold mb-4">Bảng xếp hạng cuối cùng:</h3>
                                <div className="space-y-3">
                                    {players.map((player, idx) => (
                                        <div key={player.id} className={`flex items-center gap-4 p-4 rounded-xl ${player.isHuman ? 'bg-blue-100 border-2 border-blue-500' : 'bg-white'
                                            }`}>
                                            <span className="text-3xl">
                                                {idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `#${idx + 1}`}
                                            </span>
                                            <span className="text-3xl">{player.avatar}</span>
                                            <div className="flex-1 text-left">
                                                <div className="font-bold">{player.name}</div>
                                                <div className="text-sm text-gray-600">{player.streak} câu đúng liên tiếp</div>
                                            </div>
                                            <div className="text-2xl font-bold text-orange-600">{player.score}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Achievements */}
                            {achievements.length > 0 && (
                                <div className="bg-yellow-50 rounded-2xl p-6 mb-8">
                                    <h3 className="text-xl font-bold mb-4">🏅 Thành tích đạt được:</h3>
                                    <div className="flex flex-wrap gap-3 justify-center">
                                        {achievements.map((badge, idx) => (
                                            <div key={idx} className="bg-white rounded-xl p-4 shadow">
                                                <div className="text-3xl mb-2">{badge.icon}</div>
                                                <div className="text-sm font-bold">{badge.name}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="flex gap-4 justify-center">
                                <button
                                    onClick={() => {
                                        setCurrentScreen('SETUP');
                                        setQuestions([]);
                                        setCurrentQuestionIndex(0);
                                        setAchievements([]);
                                    }}
                                    className="px-8 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700"
                                >
                                    <i className="fas fa-redo mr-2"></i>Tạo game mới
                                </button>
                                <button
                                    onClick={() => window.location.href = 'index.html'}
                                    className="px-8 py-3 bg-gray-600 text-white rounded-xl font-bold hover:bg-gray-700"
                                >
                                    <i className="fas fa-home mr-2"></i>Về trang chủ
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex items-center justify-center min-h-screen">
                    <div className="text-2xl">Loading...</div>
                </div>
            );
        };

        ReactDOM.render(<SpeedScoreGame />, document.getElementById('root'));
    </script>
</body>

</html>
