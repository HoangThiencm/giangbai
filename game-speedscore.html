<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Game 2: Đúng Nhanh Ghi Điểm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex {
            font-size: 1.1em;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pulse-correct {
            animation: pulseCorrect 0.5s ease-out;
        }

        @keyframes pulseCorrect {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .commentary-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
            }

            to {
                transform: translateX(0);
            }
        }

        .combo-badge {
            animation: comboUp 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes comboUp {
            0% {
                transform: scale(0.5) rotate(-10deg);
                opacity: 0;
            }

            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-yellow-50 to-orange-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============ MATH RENDERER với hỗ trợ ảnh ============
        const MathText = ({ text }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!text || !ref.current) return;
                ref.current.innerHTML = "";

                // Parse ảnh markdown
                const imgPattern = /!\[([^\]]*)\]\(([^)]+)\)/g;
                let lastIndex = 0;
                let match;
                const fragments = [];

                while ((match = imgPattern.exec(text)) !== null) {
                    if (match.index > lastIndex) {
                        fragments.push({ type: 'text', content: text.substring(lastIndex, match.index) });
                    }
                    fragments.push({ type: 'image', alt: match[1], src: match[2] });
                    lastIndex = match.index + match[0].length;
                }
                if (lastIndex < text.length) {
                    fragments.push({ type: 'text', content: text.substring(lastIndex) });
                }

                fragments.forEach(fragment => {
                    if (fragment.type === 'image') {
                        const img = document.createElement('img');
                        img.src = fragment.src;
                        img.alt = fragment.alt || 'Hình minh họa';
                        img.className = 'max-h-48 rounded-lg my-2 border border-gray-200 shadow-sm inline-block';
                        ref.current.appendChild(img);
                    } else {
                        let processed = fragment.content
                            .replace(/`([^`]+)`/g, '$$$1$$')
                            .replace(/\\\[(.+?)\\\]/g, '$$$$1$$')
                            .replace(/\\\((.+?)\\\)/g, '$$$1$$');
                        if (processed.includes('\\') && !processed.includes('$')) processed = `$${processed}$`;
                        const parts = processed.split(/($$[\s\S]+?$$|\$[\s\S]+?\$)/g);

                        parts.forEach(part => {
                            if (part.startsWith('$$') && part.endsWith('$$')) {
                                const span = document.createElement("span");
                                try { katex.render(part.slice(2, -2), span, { throwOnError: false, displayMode: true }); }
                                catch { span.textContent = part; }
                                ref.current.appendChild(span);
                            } else if (part.startsWith("$") && part.endsWith("$")) {
                                const span = document.createElement("span");
                                try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); }
                                catch { span.textContent = part; }
                                ref.current.appendChild(span);
                            } else if (part.trim()) {
                                ref.current.appendChild(document.createTextNode(part));
                            }
                        });
                    }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        // ============ GEMINI API SERVICE ============
        const GeminiService = {
            getApiKeys: () => {
                const keys = localStorage.getItem('global_gemini_keys');
                return keys ? JSON.parse(keys) : [];
            },

            getDefaultModule: () => {
                return localStorage.getItem('default_gemini_module') || 'gemini-2.0-flash-exp';
            },

            buildPrompt: (questionType, params) => {
                const { subject, gradeMax, topic, difficulty, numQuestions } = params;

                let typeInstructions = '';
                if (questionType === 'mixed') {
                    typeInstructions = `Tạo MIX cả 3 dạng câu hỏi: MCQ (60%), Drag-Drop (20%), Matching (20%)`;
                } else if (questionType === 'mcq') {
                    typeInstructions = 'Chỉ tạo câu hỏi TRẮC NGHIỆM (MCQ)';
                } else if (questionType === 'drag-drop') {
                    typeInstructions = 'Chỉ tạo câu hỏi KÉO THẢ (sắp xếp thứ tự)';
                } else if (questionType === 'matching') {
                    typeInstructions = 'Chỉ tạo câu hỏi NỐI Ô (ghép cặp)';
                }

                return `Bạn là trợ lý tạo câu hỏi game học tập SPEED SCORE.
Môn: ${subject}
Chủ đề: ${topic}
Giới hạn kiến thức: KHÔNG vượt quá lớp ${gradeMax}
Độ khó: ${difficulty}
Số câu: ${numQuestions}
${typeInstructions}

QUAN TRỌNG: Trả về JSON với format SAU ĐÂY, KHÔNG thêm chữ nào khác:

{
  "questions": [
    {
      "id": "q1",
      "type": "mcq",
      "prompt": "Câu hỏi (có thể chứa LaTeX)",
      "choices": ["A", "B", "C", "D"],
      "answer": 0,
      "powerUp": null (hoặc "double" hoặc "streakSaver" hoặc "timeBonus")
    },
    {
      "id": "q2",
      "type": "drag-drop",
      "prompt": "Sắp xếp các bước theo thứ tự đúng",
      "items": ["Bước 1", "Bước 2", "Bước 3"],
      "correctOrder": [0, 1, 2]
    },
    {
      "id": "q3",
      "type": "matching",
      "prompt": "Nối khái niệm với định nghĩa",
      "leftItems": ["Khái niệm A", "Khái niệm B"],
      "rightItems": ["Định nghĩa 2", "Định nghĩa 1"],
      "correctPairs": [[0, 1], [1, 0]]
    }
  ]
}

LƯU Ý:
- 20% câu có powerUp ngẫu nhiên
- Câu ngắn gọn, rõ ràng
- Công thức toán dùng LaTeX trong \\( \\) hoặc \\[ \\]`;
            },

            generate: async (questionType, params) => {
                const prompt = GeminiService.buildPrompt(questionType, params);
                const apiKeys = GeminiService.getApiKeys();
                if (!apiKeys.length) throw new Error("Chưa có API Keys!");

                const defaultModule = GeminiService.getDefaultModule();
                const shuffledKeys = [...apiKeys].sort(() => Math.random() - 0.5);

                for (let i = 0; i < shuffledKeys.length; i++) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${defaultModule}:generateContent?key=${shuffledKeys[i]}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });

                        const data = await res.json();
                        if (data.error) throw new Error(data.error.message);

                        const text = data.candidates[0].content.parts[0].text;
                        return GeminiService.parseJSON(text);
                    } catch (e) {
                        console.error(`Key ${i + 1} lỗi:`, e.message);
                        if (i === shuffledKeys.length - 1) throw e;
                    }
                }
            },

            parseJSON: (text) => {
                let jsonStr = text.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                const startIdx = Math.min(
                    jsonStr.indexOf('{') >= 0 ? jsonStr.indexOf('{') : Infinity,
                    jsonStr.indexOf('[') >= 0 ? jsonStr.indexOf('[') : Infinity
                );
                const endIdx = Math.max(jsonStr.lastIndexOf('}'), jsonStr.lastIndexOf(']'));

                if (startIdx !== Infinity && endIdx >= 0) {
                    jsonStr = jsonStr.substring(startIdx, endIdx + 1);
                }

                try {
                    return JSON.parse(jsonStr);
                } catch (e) {
                    const fixed = jsonStr.replace(/"([^"]*)"/g, (match, str) => {
                        const escaped = str.replace(/\\/g, '\\\\');
                        return `"${escaped}"`;
                    });
                    return JSON.parse(fixed);
                }
            }
        };

        // ============ MAIN APP COMPONENT ============
        const SpeedScoreGame = () => {
            // Screen states
            const [currentScreen, setCurrentScreen] = useState('SETUP'); // SETUP, AI_GEN, MANUAL, QUESTION_LIST, GAME, GAME_OVER
            const [questions, setQuestions] = useState([]);

            // AI Generation states
            const [aiGenParams, setAiGenParams] = useState({
                questionType: 'mixed',
                subject: 'Toán',
                gradeMax: 9,
                topic: '',
                difficulty: 'Vừa',
                numQuestions: 10
            });
            const [aiGenerating, setAiGenerating] = useState(false);

            // Manual creation states
            const [editingQuestion, setEditingQuestion] = useState({
                type: 'mcq',
                prompt: '',
                choices: ['', '', '', ''],
                answer: 0,
                items: ['', '', ''],
                correctOrder: [0, 1, 2],
                leftItems: ['', ''],
                rightItems: ['', ''],
                correctPairs: [[0, 1], [1, 0]],
                powerUp: null
            });
            const [editingIndex, setEditingIndex] = useState(-1);

            // Game states
            const [playerProfile, setPlayerProfile] = useState(null);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [players, setPlayers] = useState([]);
            const [timeLeft, setTimeLeft] = useState(20);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showAnswer, setShowAnswer] = useState(false);
            const [timerActive, setTimerActive] = useState(false);

            // Advanced features states
            const [commentary, setCommentary] = useState('');
            const [combo, setCombo] = useState(1);
            const [consecutiveCorrect, setConsecutiveCorrect] = useState(0);
            const [achievements, setAchievements] = useState([]);
            const [showAchievement, setShowAchievement] = useState(null);

            // Drag-drop states
            const [draggedItems, setDraggedItems] = useState([]);
            const [draggedIndex, setDraggedIndex] = useState(null);

            // Matching states
            const [matchingPairs, setMatchingPairs] = useState([]);

            // Load player profile
            useEffect(() => {
                const profile = localStorage.getItem('playerProfile');
                if (profile) {
                    setPlayerProfile(JSON.parse(profile));
                }
            }, []);

            // ============ COMMENTARY SYSTEM ============
            const showCommentary = (message) => {
                setCommentary(message);
                setTimeout(() => setCommentary(''), 2000);
            };

            // ============ ACHIEVEMENT SYSTEM ============
            const unlockAchievement = (badge) => {
                const existing = achievements.find(a => a.id === badge.id);
                if (!existing) {
                    setAchievements([...achievements, badge]);
                    setShowAchievement(badge);
                    setTimeout(() => setShowAchievement(null), 3000);
                }
            };

            // Check auth
            useEffect(() => {
                const token = localStorage.getItem('authToken');
                if (!token) {
                    alert("Bạn chưa đăng nhập!");
                    window.location.href = 'login.html';
                }
            }, []);

            // ============ AI GENERATION HANDLERS ============
            const handleGenerateQuestions = async () => {
                if (!aiGenParams.topic.trim()) {
                    alert('Vui lòng nhập chủ đề!');
                    return;
                }

                setAiGenerating(true);
                try {
                    const result = await GeminiService.generate(aiGenParams.questionType, aiGenParams);
                    if (result.questions && result.questions.length > 0) {
                        setQuestions(result.questions);
                        setCurrentScreen('QUESTION_LIST');
                    } else {
                        alert('Không tạo được câu hỏi!');
                    }
                } catch (error) {
                    alert('Lỗi: ' + error.message);
                } finally {
                    setAiGenerating(false);
                }
            };

            // ============ MANUAL CREATION HANDLERS ============
            const handleAddQuestion = () => {
                if (!editingQuestion.prompt.trim()) {
                    alert('Vui lòng nhập câu hỏi!');
                    return;
                }

                const newQ = { ...editingQuestion, id: `q${questions.length + 1}` };
                setQuestions([...questions, newQ]);

                // Reset form
                setEditingQuestion({
                    type: 'mcq',
                    prompt: '',
                    choices: ['', '', '', ''],
                    answer: 0,
                    items: ['', '', ''],
                    correctOrder: [0, 1, 2],
                    leftItems: ['', ''],
                    rightItems: ['', ''],
                    correctPairs: [[0, 1], [1, 0]],
                    powerUp: null
                });
            };

            const handleImagePaste = (e) => {
                const items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') !== -1) {
                        e.preventDefault();
                        const blob = items[i].getAsFile();
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const imgTag = `\n![Hình minh họa](${event.target.result})\n`;
                            setEditingQuestion({ ...editingQuestion, prompt: editingQuestion.prompt + imgTag });
                        };
                        reader.readAsDataURL(blob);
                        break;
                    }
                }
            };

            const handleRemoveImage = (imgSrc) => {
                const newPrompt = editingQuestion.prompt.replace(new RegExp(`!\\[.*?\\]\\(${imgSrc.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\)`, 'g'), '');
                setEditingQuestion({ ...editingQuestion, prompt: newPrompt });
            };

            // ============ GAME FLOW HANDLERS ============
            const startGame = () => {
                if (questions.length === 0) {
                    alert('Cần ít nhất 1 câu hỏi để chơi!');
                    return;
                }

                // Initialize players
                const aiNames = ['Minh', 'Lan', 'Hùng', 'Linh'];
                const aiSkills = [
                    { correctRate: 0.85, answerSpeed: 0.25 },
                    { correctRate: 0.75, answerSpeed: 0.20 },
                    { correctRate: 0.65, answerSpeed: 0.15 },
                    { correctRate: 0.55, answerSpeed: 0.12 }
                ];

                const initialPlayers = [
                    {
                        id: 0,
                        name: playerProfile?.name || 'Bạn',
                        isHuman: true,
                        score: 0,
                        avatar: playerProfile?.avatar || '👨‍🎓',
                        streak: 0
                    }
                ];

                for (let i = 0; i < 4; i++) {
                    initialPlayers.push({
                        id: i + 1,
                        name: aiNames[i],
                        isHuman: false,
                        score: 0,
                        avatar: ['👩‍🎓', '🧑‍💼', '👨‍💻', '👩‍🔬'][i],
                        aiSkill: aiSkills[i],
                        streak: 0
                    });
                }

                setPlayers(initialPlayers);
                setCurrentQuestionIndex(0);
                setCombo(1);
                setConsecutiveCorrect(0);
                setCurrentScreen('GAME');
                showCommentary("Các thí sinh đã sẵn sàng! 3...2...1...Go!");
                startQuestion();
            };

            const startQuestion = () => {
                setShowAnswer(false);
                setSelectedAnswer(null);
                setTimeLeft(20);
                setTimerActive(true);
                setMatchingPairs([]);

                const currentQ = questions[currentQuestionIndex];
                if (currentQ.type === 'drag-drop') {
                    const shuffled = [...currentQ.items].sort(() => Math.random() - 0.5);
                    setDraggedItems(shuffled);
                }

                // Reset AI answers
                setPlayers(prev => prev.map(p => ({ ...p, hasAnswered: false, answer: null })));
            };

            // Timer
            useEffect(() => {
                if (timerActive && timeLeft > 0 && !showAnswer) {
                    const timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
                    return () => clearTimeout(timer);
                } else if (timeLeft === 0 && timerActive && !showAnswer) {
                    handleTimeUp();
                }
            }, [timeLeft, timerActive, showAnswer]);

            // AI simulation
            useEffect(() => {
                if (timerActive && !showAnswer && questions.length > 0) {
                    const interval = setInterval(() => {
                        setPlayers(prev => {
                            const updated = [...prev];
                            const currentQ = questions[currentQuestionIndex];

                            updated.forEach(player => {
                                if (!player.isHuman && !player.hasAnswered && player.aiSkill) {
                                    if (Math.random() < player.aiSkill.answerSpeed) {
                                        const isCorrect = Math.random() < player.aiSkill.correctRate;

                                        if (currentQ.type === 'mcq') {
                                            if (isCorrect) {
                                                player.answer = currentQ.answer;
                                            } else {
                                                const wrongChoices = currentQ.choices.map((_, i) => i).filter(i => i !== currentQ.answer);
                                                player.answer = wrongChoices[Math.floor(Math.random() * wrongChoices.length)];
                                            }
                                        } else {
                                            // Simplified for drag-drop and matching
                                            player.answer = isCorrect ? 'correct' : 'wrong';
                                        }

                                        player.hasAnswered = true;
                                    }
                                }
                            });

                            return updated;
                        });
                    }, 1000);
                    return () => clearInterval(interval);
                }
            }, [timerActive, showAnswer, questions, currentQuestionIndex]);

            const handleTimeUp = () => {
                if (!showAnswer) {
                    handleRevealAnswer();
                }
            };

            const handleRevealAnswer = () => {
                setTimerActive(false);
                setShowAnswer(true);

                const currentQ = questions[currentQuestionIndex];
                let isPlayerCorrect = false;

                // Check player answer
                if (currentQ.type === 'mcq') {
                    isPlayerCorrect = selectedAnswer === currentQ.answer;
                } else if (currentQ.type === 'drag-drop') {
                    isPlayerCorrect = JSON.stringify(draggedItems) === JSON.stringify(currentQ.items);
                } else if (currentQ.type === 'matching') {
                    isPlayerCorrect = matchingPairs.length === currentQ.correctPairs.length &&
                        matchingPairs.every((pair, i) => pair[0] === currentQ.correctPairs[i][0] && pair[1] === currentQ.correctPairs[i][1]);
                }

                // Calculate scores
                setTimeout(() => {
                    setPlayers(prev => prev.map(player => {
                        let isCorrect = false;

                        if (player.isHuman) {
                            isCorrect = isPlayerCorrect;
                        } else {
                            if (currentQ.type === 'mcq') {
                                isCorrect = player.answer === currentQ.answer;
                            } else {
                                isCorrect = player.answer === 'correct';
                            }
                        }

                        if (isCorrect) {
                            let baseScore = Math.floor(100 * (timeLeft / 20));

                            // Apply power-ups
                            if (currentQ.powerUp === 'double') baseScore *= 2;
                            if (currentQ.powerUp === 'timeBonus') baseScore += 50;

                            // Apply combo for human player
                            if (player.isHuman) {
                                baseScore = Math.floor(baseScore * combo);
                            } else {
                                // AI gets random variation
                                const variation = Math.floor(Math.random() * 20);
                                baseScore = Math.max(10, baseScore - variation);
                            }

                            return { ...player, score: player.score + baseScore, streak: player.streak + 1 };
                        } else {
                            return { ...player, streak: 0 };
                        }
                    }));

                    // Update combo and commentary
                    if (isPlayerCorrect) {
                        const newConsecutive = consecutiveCorrect + 1;
                        setConsecutiveCorrect(newConsecutive);

                        if (newConsecutive === 3) {
                            setCombo(1.5);
                            showCommentary("Combo x1.5! 🔥");
                        } else if (newConsecutive === 5) {
                            setCombo(2);
                            showCommentary("Combo x2!! 🔥🔥");
                        } else if (newConsecutive >= 7) {
                            setCombo(3);
                            showCommentary("Combo x3!!! Bùng nổ! ✨🔥");
                        } else {
                            showCommentary(["Tuyệt vời!", "Chính xác!", "Đúng rồi!"][Math.floor(Math.random() * 3)]);
                        }

                        // Check achievements
                        if (timeLeft >= 15) unlockAchievement({ id: 'speed-demon', name: 'Speed Demon', icon: '🔥' });
                    } else {
                        setConsecutiveCorrect(0);
                        setCombo(1);
                        showCommentary(["Ồ không!", "Sai rồi!", "Cố lên!"][Math.floor(Math.random() * 3)]);
                    }
                }, 1500);

                setTimeout(handleNextQuestion, 3000);
            };

            const handleNextQuestion = () => {
                if (currentQuestionIndex < questions.length - 1) {
                    setCurrentQuestionIndex(currentQuestionIndex + 1);
                    startQuestion();
                } else {
                    endGame();
                }
            };

            const endGame = () => {
                setTimerActive(false);
                setCurrentScreen('GAME_OVER');

                // Sort players by score
                const sorted = [...players].sort((a, b) => b.score - a.score);
                setPlayers(sorted);

                // Final commentary
                const playerRank = sorted.findIndex(p => p.isHuman) + 1;
                if (playerRank === 1) {
                    showCommentary(`Chúc mừng! Bạn về NHẤT với ${sorted[0].score} điểm! 🥇`);
                    unlockAchievement({ id: 'winner', name: 'Người chiến thắng', icon: '🏆' });
                } else if (playerRank <= 3) {
                    showCommentary(`Tốt lắm! Bạn về top ${playerRank}! 🥈`);
                } else {
                    showCommentary(`Hoàn thành! Hãy thử lại để cải thiện điểm số!`);
                }

                // Check perfect achievement
                const humanPlayer = sorted.find(p => p.isHuman);
                const allCorrect = humanPlayer.streak === questions.length;
                if (allCorrect) unlockAchievement({ id: 'perfect', name: 'Perfect', icon: '🎯' });
            };

            // ============ RENDER SCREENS ============

            // SCREEN: SETUP
            if (currentScreen === 'SETUP') {
                return (
                    <div className="max-w-4xl mx-auto p-6 fade-in">
                        <div className="flex justify-between items-center mb-8">
                            <button
                                onClick={() => window.location.href = 'index.html'}
                                className="text-gray-500 hover:text-orange-600 font-bold transition"
                            >
                                <i className="fas fa-arrow-left mr-2"></i>Quay lại
                            </button>
                            <h1 className="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-600 to-orange-600">
                                <i className="fas fa-bolt mr-2"></i>GAME SPEED SCORE
                            </h1>
                            <div></div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div
                                onClick={() => setCurrentScreen('AI_GEN')}
                                className="bg-white rounded-3xl shadow-xl p-8 cursor-pointer hover:shadow-2xl transition transform hover:-translate-y-2"
                            >
                                <div className="w-20 h-20 bg-gradient-to-br from-purple-500 to-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                    <i className="fas fa-robot text-4xl text-white"></i>
                                </div>
                                <h2 className="text-2xl font-bold text-gray-800 text-center mb-3">Tạo bằng AI</h2>
                                <p className="text-gray-600 text-center">Gemini tự động tạo câu hỏi theo chủ đề</p>
                            </div>

                            <div
                                onClick={() => setCurrentScreen('MANUAL')}
                                className="bg-white rounded-3xl shadow-xl p-8 cursor-pointer hover:shadow-2xl transition transform hover:-translate-y-2"
                            >
                                <div className="w-20 h-20 bg-gradient-to-br from-green-500 to-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4">

                                </div>
                                <h2 className="text-2xl font-bold text-gray-800 text-center mb-3">Tạo thủ công</h2>
                                <p className="text-gray-600 text-center">Tự viết câu hỏi, paste ảnh, chỉnh sửa</p>
                            </div>
                        </div>
