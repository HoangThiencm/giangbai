<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Game 2: Đúng Nhanh Ghi Điểm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex {
            font-size: 1.1em;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pulse-correct {
            animation: pulseCorrect 0.5s ease-out;
        }

        @keyframes pulseCorrect {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .commentary-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
            }

            to {
                transform: translateX(0);
            }
        }

        .combo-badge {
            animation: comboUp 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes comboUp {
            0% {
                transform: scale(0.5) rotate(-10deg);
                opacity: 0;
            }

            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-yellow-50 to-orange-100 min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============ MATH RENDERER (FIXED) ============
        const MathText = ({ text }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!text || !ref.current) return;
                ref.current.innerHTML = "";
                const imgPattern = /!\[([^\]]*)\]\(([^)]+)\)/g;
                const fragments = [];
                let lastIndex = 0, match;
                while ((match = imgPattern.exec(text)) !== null) {
                    if (match.index > lastIndex) fragments.push({ type: 'text', content: text.substring(lastIndex, match.index) });
                    fragments.push({ type: 'image', alt: match[1], src: match[2] });
                    lastIndex = match.index + match[0].length;
                }
                if (lastIndex < text.length) fragments.push({ type: 'text', content: text.substring(lastIndex) });
                if (fragments.length === 0) fragments.push({ type: 'text', content: text });
                fragments.forEach(fragment => {
                    if (fragment.type === 'image') {
                        const img = document.createElement('img');
                        img.src = fragment.src;
                        img.alt = fragment.alt || 'Hình minh họa';
                        img.className = 'max-h-48 rounded-lg my-2 border border-gray-200 shadow-sm inline-block';
                        ref.current.appendChild(img);
                    } else {
                        let processed = fragment.content.replace(/`([^`]+)`/g, '$$$1$$').replace(/\\\[(.+?)\\\]/g, '$$$$1$$').replace(/\\\((.+?)\\\)/g, '$$$1$$');
                        if (processed.includes('\\') && !processed.includes('$')) processed = `$${processed}$`;
                        const parts = processed.split(/($$[\s\S]+?$$|\$[\s\S]+?\$)/g);
                        parts.forEach(part => {
                            if (!part) return;
                            if (part.startsWith('$$') && part.endsWith('$$')) {
                                const span = document.createElement("span");
                                try { katex.render(part.slice(2, -2), span, { throwOnError: false, displayMode: true }); } catch { span.textContent = part; }
                                ref.current.appendChild(span);
                            } else if (part.startsWith("$") && part.endsWith("$")) {
                                const span = document.createElement("span");
                                try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); } catch { span.textContent = part; }
                                ref.current.appendChild(span);
                            } else if (part.trim()) {
                                ref.current.appendChild(document.createTextNode(part));
                            }
                        });
                    }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        // ============ GEMINI SERVICE ============
        const GeminiService = {
            getApiKeys: () => { const keys = localStorage.getItem('global_gemini_keys'); return keys ? JSON.parse(keys) : []; },
            getDefaultModule: () => localStorage.getItem('default_gemini_module') || 'gemini-2.0-flash-exp',
            buildPrompt: (questionType, params) => {
                const { subject, gradeMax, topic, difficulty, numQuestions } = params;
                let typeInstructions = '';
                if (questionType === 'mixed') typeInstructions = `Tạo MIX cả 3 dạng: MCQ (60%), Drag-Drop (20%), Matching (20%)`;
                else if (questionType === 'mcq') typeInstructions = 'Chỉ tạo TRẮC NGHIỆM (MCQ)';
                else if (questionType === 'drag-drop') typeInstructions = 'Chỉ tạo KÉO THẢ (sắp xếp)';
                else if (questionType === 'matching') typeInstructions = 'Chỉ tạo NỐI Ô (ghép cặp)';
                return `Bạn là trợ lý tạo câu hỏi game SPEED SCORE.
Môn: ${subject}, Chủ đề: ${topic}, Lớp tối đa: ${gradeMax}, Độ khó: ${difficulty}, Số câu: ${numQuestions}
${typeInstructions}

Trả về JSON ĐÚNG format sau, KHÔNG thêm chữ nào:
{"questions":[{"id":"q1","type":"mcq","prompt":"Câu hỏi","choices":["A","B","C","D"],"answer":0,"powerUp":null},{"id":"q2","type":"drag-drop","prompt":"Sắp xếp","items":["1","2","3"],"correctOrder":[0,1,2]},{"id":"q3","type":"matching","prompt":"Nối","leftItems":["A","B"],"rightItems":["Def B","Def A"],"correctPairs":[[0,1],[1,0]]}]}

LƯU Ý: 20% câu có powerUp ("double","streakSaver","timeBonus"), công thức LaTeX dùng \\( \\) hoặc \\[ \\]`;
            },
            generate: async (questionType, params) => {
                const prompt = GeminiService.buildPrompt(questionType, params);
                const apiKeys = GeminiService.getApiKeys();
                if (!apiKeys.length) throw new Error("Chưa có API Keys!");
                const defaultModule = GeminiService.getDefaultModule();
                const shuffledKeys = [...apiKeys].sort(() => Math.random() - 0.5);
                for (let i = 0; i < shuffledKeys.length; i++) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${defaultModule}:generateContent?key=${shuffledKeys[i]}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await res.json();
                        if (data.error) throw new Error(data.error.message);
                        const text = data.candidates[0].content.parts[0].text;
                        return GeminiService.parseJSON(text);
                    } catch (e) {
                        console.error(`Key ${i + 1} lỗi:`, e.message);
                        if (i === shuffledKeys.length - 1) throw e;
                    }
                }
            },
            parseJSON: (text) => {
                let jsonStr = text.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                const startIdx = Math.min(jsonStr.indexOf('{') >= 0 ? jsonStr.indexOf('{') : Infinity, jsonStr.indexOf('[') >= 0 ? jsonStr.indexOf('[') : Infinity);
                const endIdx = Math.max(jsonStr.lastIndexOf('}'), jsonStr.lastIndexOf(']'));
                if (startIdx !== Infinity && endIdx >= 0) jsonStr = jsonStr.substring(startIdx, endIdx + 1);
                try { return JSON.parse(jsonStr); } catch (e) {
                    const fixed = jsonStr.replace(/"([^"]*)"/g, (match, str) => `"${str.replace(/\\/g, '\\\\')}"`);
                    return JSON.parse(fixed);
                }
            }
        };

        // ============ MAIN APP ============
        const SpeedScoreGame = () => {
            const [currentScreen, setCurrentScreen] = useState('SETUP'); // SETUP, TIME_SETTINGS, AI_GEN, MANUAL, QUESTION_LIST, GAME, GAME_OVER
            const [questions, setQuestions] = useState([]);
            const [showInstructions, setShowInstructions] = useState(true);
            const [playerName, setPlayerName] = useState('');
            const [playerAvatar, setPlayerAvatar] = useState('👨‍🎓');
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);
            const [aiGenParams, setAiGenParams] = useState({ questionType: 'mixed', subject: 'Toán học', gradeMax: 9, topic: '', difficulty: 'Vừa', numQuestions: 10 });
            const [aiGenerating, setAiGenerating] = useState(false);
            const [editingQuestion, setEditingQuestion] = useState({ type: 'mcq', prompt: '', choices: ['', '', '', ''], answer: 0, items: ['', '', ''], leftItems: ['', ''], rightItems: ['', ''], powerUp: null });
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [timeLeft, setTimeLeft] = useState(20);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showAnswer, setShowAnswer] = useState(false);
            const [timerActive, setTimerActive] = useState(false);
            const [commentary, setCommentary] = useState('');
            const [combo, setCombo] = useState(1);
            const [consecutiveCorrect, setConsecutiveCorrect] = useState(0);
            const [achievements, setAchievements] = useState([]);
            const [showAchievement, setShowAchievement] = useState(null);
            const [draggedItems, setDraggedItems] = useState([]);
            const [draggedIndex, setDraggedIndex] = useState(null);
            const [matchingPairs, setMatchingPairs] = useState([]);
            const [timeSettings, setTimeSettings] = useState(() => {
                const saved = localStorage.getItem('speedScoreTimeSettings');
                return saved ? JSON.parse(saved) : { mode: 'custom', duration: 20 };
            });

            useEffect(() => { const token = localStorage.getItem('authToken'); if (!token) { alert("Chưa đăng nhập!"); window.location.href = 'login.html'; } }, []);

            const showCommentary = (message) => { setCommentary(message); setTimeout(() => setCommentary(''), 2000); };
            const unlockAchievement = (badge) => {
                const existing = achievements.find(a => a.id === badge.id);
                if (!existing) { setAchievements([...achievements, badge]); setShowAchievement(badge); setTimeout(() => setShowAchievement(null), 3000); }
            };

            const handleGenerateQuestions = async () => {
                if (!aiGenParams.topic.trim()) { alert('Vui lòng nhập chủ đề!'); return; }
                setAiGenerating(true);
                try {
                    const result = await GeminiService.generate(aiGenParams.questionType, aiGenParams);
                    if (result.questions && result.questions.length > 0) { setQuestions(result.questions); setCurrentScreen('QUESTION_LIST'); }
                    else alert('Không tạo được câu hỏi!');
                } catch (error) { alert('Lỗi: ' + error.message); } finally { setAiGenerating(false); }
            };

            const handleAddQuestion = () => {
                if (!editingQuestion.prompt.trim()) { alert('Vui lòng nhập câu hỏi!'); return; }
                const newQ = { ...editingQuestion, id: `q${questions.length + 1}` };
                setQuestions([...questions, newQ]);
                setEditingQuestion({ type: 'mcq', prompt: '', choices: ['', '', '', ''], answer: 0, items: ['', '', ''], leftItems: ['', ''], rightItems: ['', ''], powerUp: null });
            };

            const handleImagePaste = (e) => {
                const items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') !== -1) {
                        e.preventDefault();
                        const blob = items[i].getAsFile();
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const imgTag = `\n![Hình minh họa](${event.target.result})\n`;
                            setEditingQuestion({ ...editingQuestion, prompt: editingQuestion.prompt + imgTag });
                        };
                        reader.readAsDataURL(blob);
                        break;
                    }
                }
            };

            const handleRemoveImage = (imgSrc) => {
                const newPrompt = editingQuestion.prompt.replace(new RegExp(`!\\[.*?\\]\\(${imgSrc.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\)`, 'g'), '');
                setEditingQuestion({ ...editingQuestion, prompt: newPrompt });
            };

            const startGame = () => {
                if (questions.length === 0) { alert('Cần ít nhất 1 câu hỏi!'); return; }
                if (!playerName.trim()) { alert('Vui lòng nhập tên!'); return; }
                setScore(0); setStreak(0); setCombo(1); setConsecutiveCorrect(0); setCurrentQuestionIndex(0); setCurrentScreen('GAME');
                showCommentary("Bắt đầu!"); startQuestion();
            };


            const startQuestion = () => {
                setShowAnswer(false); setSelectedAnswer(null); setMatchingPairs([]);
                // Use configured time settings
                if (timeSettings.mode === 'free') {
                    setTimeLeft(999);
                    setTimerActive(false);
                } else {
                    setTimeLeft(timeSettings.duration);
                    setTimerActive(true);
                }
                const currentQ = questions[currentQuestionIndex];
                if (currentQ.type === 'drag-drop' && currentQ.items && currentQ.items.length > 0) {
                    setDraggedItems([...currentQ.items].sort(() => Math.random() - 0.5));
                } else if (currentQ.type === 'drag-drop') {
                    console.error('Câu hỏi drag-drop thiếu items:', currentQ);
                }
            };


            useEffect(() => {
                if (timerActive && timeLeft > 0 && !showAnswer) {
                    const timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
                    return () => clearTimeout(timer);
                } else if (timeLeft === 0 && timerActive && !showAnswer) handleTimeUp();
            }, [timeLeft, timerActive, showAnswer]);

            const handleTimeUp = () => { if (!showAnswer) handleRevealAnswer(); };

            const handleRevealAnswer = () => {
                setTimerActive(false); setShowAnswer(true);
                const currentQ = questions[currentQuestionIndex];
                let isPlayerCorrect = false;
                if (currentQ.type === 'mcq') isPlayerCorrect = selectedAnswer === currentQ.answer;
                else if (currentQ.type === 'drag-drop') isPlayerCorrect = JSON.stringify(draggedItems) === JSON.stringify(currentQ.items);
                else if (currentQ.type === 'matching') isPlayerCorrect = matchingPairs.length === (currentQ.leftItems?.length || 0);
                setTimeout(() => {
                    if (isPlayerCorrect) {
                        let baseScore = Math.floor(100 * (timeLeft / (timeSettings.duration || 20)));
                        if (currentQ.powerUp === 'double') baseScore *= 2;
                        if (currentQ.powerUp === 'timeBonus') baseScore += 50;
                        baseScore = Math.floor(baseScore * combo);
                        setScore(score + baseScore); setStreak(streak + 1);
                        const newConsecutive = consecutiveCorrect + 1; setConsecutiveCorrect(newConsecutive);
                        if (newConsecutive === 3) { setCombo(1.5); showCommentary("Combo x1.5! 🔥"); }
                        else if (newConsecutive === 5) { setCombo(2); showCommentary("Combo x2!! 🔥🔥"); }
                        else if (newConsecutive >= 7) { setCombo(3); showCommentary("Combo x3!!! ✨🔥"); }
                        else showCommentary(["Tuyệt vời!", "Chính xác!", "Đúng rồi!"][Math.floor(Math.random() * 3)]);
                        if (timeLeft >= 15) unlockAchievement({ id: 'speed-demon', name: 'Speed Demon', icon: '🔥' });
                    } else { setConsecutiveCorrect(0); setCombo(1); setStreak(0); showCommentary(["Ồ không!", "Sai rồi!", "Cố lên!"][Math.floor(Math.random() * 3)]); }
                }, 1500);
                setTimeout(handleNextQuestion, 3000);
            };

            const handleNextQuestion = () => {
                if (currentQuestionIndex < questions.length - 1) { setCurrentQuestionIndex(currentQuestionIndex + 1); startQuestion(); }
                else endGame();
            };

            const endGame = () => {
                setTimerActive(false); setCurrentScreen('GAME_OVER'); showCommentary(`Hoàn thành! ${score} điểm!`);
                const allCorrect = streak === questions.length;
                if (allCorrect) unlockAchievement({ id: 'perfect', name: 'Perfect', icon: '🎯' });
                if (score >= 1000) unlockAchievement({ id: 'high-scorer', name: 'High Scorer', icon: '💯' });
            };

            // ========== SCREENS ==========
            if (currentScreen === 'SETUP') {
                return (
                    <div className="max-w-4xl mx-auto p-6 fade-in">
                        {showInstructions && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-3xl w-full max-h-[90vh] overflow-y-auto">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-3xl font-bold text-orange-700"><i className="fas fa-bolt mr-3"></i>ĐÚNG NHANH GHI ĐIỂM</h2>
                                        <button onClick={() => setShowInstructions(false)} className="text-gray-500 hover:text-gray-700"><i className="fas fa-times text-2xl"></i></button>
                                    </div>
                                    <div className="space-y-4 text-gray-700">
                                        <div className="bg-orange-50 border-2 border-orange-200 rounded-xl p-4">
                                            <h3 className="font-bold text-lg text-orange-800 mb-2"><i className="fas fa-bullseye mr-2"></i>Mục tiêu</h3>
                                            <p>Game khởi động vui vẻ! Trả lời nhanh ghi điểm cao. <strong>KHÔNG loại ai</strong>!</p>
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-lg text-gray-800 mb-2"><i className="fas fa-gamepad mr-2"></i>Luật chơi</h3>
                                            <ul className="space-y-2 ml-6">
                                                <li className="flex items-start gap-2"><span className="text-orange-600 font-bold">1.</span><span>Mỗi câu <strong>20 giây</strong></span></li>
                                                <li className="flex items-start gap-2"><span className="text-orange-600 font-bold">2.</span><span>3 dạng: <strong>Trắc nghiệm, Kéo thả, Nối ô</strong></span></li>
                                                <li className="flex items-start gap-2"><span className="text-orange-600 font-bold">3.</span><span>Đúng sớm → <strong className="text-green-600">Nhiều điểm!</strong></span></li>
                                                <li className="flex items-start gap-2"><span className="text-orange-600 font-bold">4.</span><span>Sai → 0 điểm nhưng <strong>VẪN CHƠI TIẾP</strong></span></li>
                                            </ul>
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-lg text-gray-800 mb-2"><i className="fas fa-fire mr-2"></i>Combo & Power-ups</h3>
                                            <div className="bg-gradient-to-r from-orange-50 to-yellow-50 border border-orange-200 rounded-lg p-3 mb-3">
                                                <p className="font-bold text-orange-700 mb-2">🔥 Combo:</p>
                                                <ul className="text-sm space-y-1 ml-4">
                                                    <li>• 3 đúng → <strong>x1.5</strong></li>
                                                    <li>• 5 đúng → <strong>x2</strong></li>
                                                    <li>• 7+ đúng → <strong>x3</strong> ✨</li>
                                                </ul>
                                            </div>
                                            <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                                                <p className="font-bold text-blue-700 mb-2">⚡ Power-ups:</p>
                                                <p className="text-sm">⚡ 2x điểm ･ 🎯 Giữ streak ･ ⏰ +5s</p>
                                            </div>
                                        </div>
                                        <div className="bg-blue-50 border border-blue-200 rounded-lg p-3">
                                            <p><strong>Điểm = 100 × (Thời gian còn / 20) × Combo</strong></p>
                                            <p className="text-sm mt-1">VD: 15s còn, combo x2 = 150đ</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowInstructions(false)} className="w-full mt-6 py-4 bg-gradient-to-r from-yellow-600 to-orange-600 text-white rounded-xl font-bold text-lg hover:shadow-xl"><i className="fas fa-play mr-2"></i>Bắt đầu</button>
                                </div>
                            </div>
                        )}
                        <div className="flex justify-between items-center mb-8">
                            <button onClick={() => window.location.href = 'index.html'} className="text-gray-500 hover:text-orange-600 font-bold"><i className="fas fa-arrow-left mr-2"></i>Quay lại</button>
                            <h1 className="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-600 to-orange-600"><i className="fas fa-bolt mr-2"></i>SPEED SCORE</h1>
                            <button onClick={() => setShowInstructions(true)} className="w-10 h-10 bg-blue-500 text-white rounded-full hover:bg-blue-600" title="Hướng dẫn"><i className="fas fa-question"></i></button>
                        </div>
                        <div className="bg-white rounded-3xl shadow-2xl p-8 mb-6">
                            <h2 className="text-2xl font-bold text-gray-800 mb-6"><i className="fas fa-user mr-2"></i>Thông tin người chơi</h2>
                            <div className="space-y-4">
                                <div>
                                    <label className="block font-bold mb-2 text-gray-700">Tên (cá nhân hoặc nhóm):</label>
                                    <input type="text" value={playerName} onChange={(e) => setPlayerName(e.target.value)} className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:border-orange-500 outline-none" placeholder="VD: Bạn An, Nhóm 1, Lớp 9A..." />
                                </div>
                                <div>
                                    <label className="block font-bold mb-2 text-gray-700">Avatar:</label>
                                    <div className="flex gap-2">
                                        {['👨‍🎓', '👩‍🎓', '🧑‍💼', '👨‍💻', '👩‍💻', '🦸‍♂️', '🦸‍♀️', '🧙‍♂️'].map(emoji => (
                                            <button key={emoji} onClick={() => setPlayerAvatar(emoji)} className={`text-4xl p-3 rounded-xl border-2 transition ${playerAvatar === emoji ? 'border-orange-500 bg-orange-50' : 'border-gray-200 hover:border-orange-300'}`}>{emoji}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div onClick={() => setCurrentScreen('AI_GEN')} className="bg-white rounded-3xl shadow-xl p-8 cursor-pointer hover:shadow-2xl transition transform hover:-translate-y-2">
                                <div className="w-20 h-20 bg-gradient-to-br from-purple-500 to-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4"><i className="fas fa-robot text-4xl text-white"></i></div>
                                <h2 className="text-2xl font-bold text-gray-800 text-center mb-3">Tạo bằng AI</h2>
                                <p className="text-gray-600 text-center">Gemini tự động tạo</p>
                            </div>
                            <div onClick={() => setCurrentScreen('MANUAL')} className="bg-white rounded-3xl shadow-xl p-8 cursor-pointer hover:shadow-2xl transition transform hover:-translate-y-2">
                                <div className="w-20 h-20 bg-gradient-to-br from-green-500 to-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4"><i className="fas fa-pen text-4xl text-white"></i></div>
                                <h2 className="text-2xl font-bold text-gray-800 text-center mb-3">Tạo thủ công</h2>
                                <p className="text-gray-600 text-center">Tự viết, paste ảnh</p>
                            </div>
                        </div>
                        {questions.length > 0 && (
                            <div className="mt-8 bg-green-50 border-2 border-green-300 rounded-2xl p-6">
                                <div className="flex justify-between items-center">
                                    <div><i className="fas fa-check-circle text-green-600 mr-2"></i><span className="font-bold text-green-800">Đã có {questions.length} câu</span></div>
                                    <div className="flex gap-3">

                                </div>

                                        <p className="text-gray-600 mb-2">• Suy nghĩ thỏa mái</p>
                                        <p className="text-gray-600">• Không có áp lực!</p>
                                    </button>

                                        onClick={() => setTimeSettings({ ...timeSettings, mode: 'custom' })}
                                        className={`border-4 rounded-2xl p-6 transition text-left ${timeSettings.mode === 'custom'

                                                : 'border-gray-300 hover:bg-gray-50'
                                            }`}

                                        <div className="text-5xl mb-4 text-center">⏱️</div>
                                        <h3 className="text-2xl font-bold text-orange-700 mb-3">Tùy chỉnh</h3>

                                        <p className="text-gray-600 mb-2">• Điều chỉnh độ khó</p>

                                    </button>

                                            <input
                                                type="range"
                                                min="10"
                                                max="120"
                                                step="5"
                                                value={timeSettings.duration}
                                                onChange={(e) => setTimeSettings({ ...timeSettings, duration: parseInt(e.target.value) })}
                                                className="flex-1"
                                            />

                                                <input
                                                    type="number"
                                                    min="10"
                                                    max="120"
                                                    value={timeSettings.duration}
                                                    onChange={(e) => {
                                                        const val = parseInt(e.target.value) || 10;
                                                        setTimeSettings({ ...timeSettings, duration: Math.min(120, Math.max(10, val)) });
                                                    }}
                                                    className="w-full px-3 py-2 border-2 border-gray-300 rounded-lg text-center font-bold text-xl focus:border-orange-500 focus:outline-none"
                                                />
                                            </div>
                                            <span className="text-gray-600 font-medium">giây</span>
                                        </div>
                                        <div className="mt-4 flex justify-between text-sm text-gray-600">
                                            <span>Dễ (60-120s)</span>
                                            <span>Trung bình (30-60s)</span>
                                            <span>Khó (10-30s)</span>
                                        </div>
                                    </div>
                                )}

                                    <p className="text-sm text-gray-700">
                                        <strong>💡 Gợi ý:</strong><br />

                                        • <strong>Tùy chỉnh:</strong> Tạo thử thách, tăng tính cạnh tranh
                                    </p>
                                </div>
                            </div>

                            <div className="flex gap-4 mt-6">
                                <button
                                    onClick={() => setCurrentScreen('SETUP')}
                                    className="flex-1 py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600 transition"
                                >
                                    <i className="fas fa-arrow-left mr-2"></i>Quay lại
                                </button>

                                    onClick={() => {
                                        localStorage.setItem('speedScoreTimeSettings', JSON.stringify(timeSettings));

                                    }}

                                    <i className="fas fa-play mr-2"></i>Bắt đầu

                                        </select>
                                    </div>

                                        <label className="block font-bold mb-2">Số câu:</label>

                                </div>
                                <div>
                                    <label className="block font-bold mb-2">Dạng câu hỏi:</label>
                                    <select value={aiGenParams.questionType} onChange={(e) => setAiGenParams({ ...aiGenParams, questionType: e.target.value })} className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none">

                                    </select>
                                </div>

                                </button>
                                <button onClick={() => setCurrentScreen('SETUP')} className="w-full py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600"><i className="fas fa-arrow-left mr-2"></i>Quay lại</button>
                            </div>
                        </div>
                    </div>

                            <div className="space-y-4">
                                <div>
                                    <div className="flex justify-between items-center mb-2">

                                                const file = e.target.files[0];
                                                if (file) { const reader = new FileReader(); reader.onload = (ev) => setEditingQuestion({ ...editingQuestion, prompt: editingQuestion.prompt + `\n![Hình](${ev.target.result})\n` }); reader.readAsDataURL(file); }
                                            }} />
                                        </label>
                                    </div>
                                    <textarea value={editingQuestion.prompt} onChange={(e) => setEditingQuestion({ ...editingQuestion, prompt: e.target.value })} onPaste={handleImagePaste} className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-green-500 outline-none" rows="3" placeholder="Nhập câu hỏi... (Ctrl+V để dán ảnh)" />

                                        <div className="mt-2 p-3 bg-gray-50 rounded-xl border-2 border-dashed">
                                            <div className="text-sm font-bold mb-2">Preview:</div>
                                            <div className="flex flex-wrap gap-2">
                                                {editingQuestion.prompt.match(/!\[.*?\]\((data:image\/[^)]+)\)/g)?.map((match, idx) => {
                                                    const src = match.match(/\((data:image\/[^)]+)\)/)?.[1];
                                                    return src ? (
                                                        <div key={idx} className="relative group">
                                                            <img src={src} alt={`Ảnh ${idx + 1}`} className="max-h-32 rounded border" />
                                                            <button onClick={() => handleRemoveImage(src)} className="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full text-xs opacity-0 group-hover:opacity-100"><i className="fas fa-times"></i></button>
                                                        </div>
                                                    ) : null;
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                {editingQuestion.type === 'mcq' && (
                                    <div className="grid grid-cols-2 gap-3">
                                        {editingQuestion.choices.map((choice, idx) => (
                                            <div key={idx} className="flex items-center gap-2">
                                                <input type="radio" checked={editingQuestion.answer === idx} onChange={() => setEditingQuestion({ ...editingQuestion, answer: idx })} />
                                                <input type="text" value={choice} onChange={(e) => { const newChoices = [...editingQuestion.choices]; newChoices[idx] = e.target.value; setEditingQuestion({ ...editingQuestion, choices: newChoices }); }} className="flex-1 p-2 border-2 border-gray-200 rounded-lg focus:border-green-500 outline-none" placeholder={`Đáp án ${String.fromCharCode(65 + idx)}`} />
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {editingQuestion.type === 'drag-drop' && (
                                    <div>
                                        <label className="block font-bold mb-2">Các bước (thứ tự đúng):</label>
                                        {editingQuestion.items.map((item, idx) => <input key={idx} type="text" value={item} onChange={(e) => { const newItems = [...editingQuestion.items]; newItems[idx] = e.target.value; setEditingQuestion({ ...editingQuestion, items: newItems }); }} className="w-full p-2 mb-2 border-2 border-gray-200 rounded-lg focus:border-green-500 outline-none" placeholder={`Bước ${idx + 1}`} />)}
                                        <button onClick={() => setEditingQuestion({ ...editingQuestion, items: [...editingQuestion.items, ''] })} className="text-green-600 text-sm hover:underline">+ Thêm bước</button>
                                    </div>
                                )}
                                {editingQuestion.type === 'matching' && (
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block font-bold mb-2">Cột trái:</label>
                                            {editingQuestion.leftItems.map((item, idx) => <input key={idx} type="text" value={item} onChange={(e) => { const newItems = [...editingQuestion.leftItems]; newItems[idx] = e.target.value; setEditingQuestion({ ...editingQuestion, leftItems: newItems }); }} className="w-full p-2 mb-2 border-2 border-gray-200 rounded-lg focus:border-green-500 outline-none" placeholder={`Mục ${idx + 1}`} />)}
                                        </div>
                                        <div>
                                            <label className="block font-bold mb-2">Cột phải (đáp án):</label>
                                            {editingQuestion.rightItems.map((item, idx) => <input key={idx} type="text" value={item} onChange={(e) => { const newItems = [...editingQuestion.rightItems]; newItems[idx] = e.target.value; setEditingQuestion({ ...editingQuestion, rightItems: newItems }); }} className="w-full p-2 mb-2 border-2 border-gray-200 rounded-lg focus:border-green-500 outline-none" placeholder={`Đáp án ${idx + 1}`} />)}
                                        </div>
                                    </div>
                                )}

                                    <button onClick={() => {
                                        if (!editingQuestion.prompt.trim()) { alert('Vui lòng nhập câu hỏi!'); return; }
                                        if (editingQuestion.id) {
                                            // Edit mode: update existing question
                                            const updated = questions.map(q => q.id === editingQuestion.id ? editingQuestion : q);
                                            setQuestions(updated);
                                        } else {
                                            // Add mode: create new question
                                            const newQ = { ...editingQuestion, id: `q${questions.length + 1}` };
                                            setQuestions([...questions, newQ]);
                                        }
                                        setEditingQuestion({ type: 'mcq', prompt: '', choices: ['', '', '', ''], answer: 0, items: ['', '', ''], leftItems: ['', ''], rightItems: ['', ''], powerUp: null });
                                        setCurrentScreen('QUESTION_LIST');
                                    }} className="flex-1 py-3 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded-xl font-bold hover:shadow-xl">
                                        <i className={`fas ${editingQuestion.id ? 'fa-save' : 'fa-plus'} mr-2`}></i>{editingQuestion.id ? 'Cập nhật' : 'Thêm câu hỏi'}
                                    </button>
                                    <button onClick={() => setCurrentScreen('SETUP')} className="px-6 py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600"><i className="fas fa-arrow-left mr-2"></i>Quay lại</button>
                                </div>
                                {questions.length > 0 && (
                                    <div className="bg-green-50 border-2 border-green-300 rounded-xl p-4 text-center">
                                        <span className="font-bold text-green-800">Đã có {questions.length} câu</span>
                                        <button onClick={() => setCurrentScreen('QUESTION_LIST')} className="ml-4 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Xem danh sách</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            if (currentScreen === 'QUESTION_LIST') {
                return (
                    <div className="max-w-5xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-8">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-3xl font-bold text-gray-800"><i className="fas fa-list mr-2"></i>Danh sách ({questions.length})</h2>
                                <div className="flex gap-3">
                                    <button onClick={() => setCurrentScreen('MANUAL')} className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700"><i className="fas fa-plus mr-2"></i>Thêm</button>

                                </div>
                            </div>
                            <div className="space-y-3">
                                {questions.map((q, idx) => (
                                    <div key={idx} className="border-2 border-gray-200 rounded-xl p-4 hover:border-orange-400 transition">
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2 mb-2">
                                                    <span className="text-lg font-bold text-orange-600">#{idx + 1}</span>
                                                    <span className="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-full font-bold">{q.type === 'mcq' ? 'Trắc nghiệm' : q.type === 'drag-drop' ? 'Kéo thả' : 'Nối ô'}</span>
                                                    {q.powerUp && <span className="px-2 py-1 bg-purple-100 text-purple-700 text-xs rounded-full">{q.powerUp === 'double' ? '⚡ 2x' : q.powerUp === 'streakSaver' ? '🎯 Saver' : '⏰ +5s'}</span>}
                                                </div>
                                                <div className="text-gray-800"><MathText text={q.prompt} /></div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setEditingQuestion(q); setCurrentScreen('MANUAL'); }} className="px-3 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 text-sm"><i className="fas fa-edit"></i></button>
                                                <button onClick={() => { if (confirm('Xóa câu này?')) setQuestions(questions.filter((_, i) => i !== idx)); }} className="px-3 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 text-sm"><i className="fas fa-trash"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setCurrentScreen('SETUP')} className="w-full mt-6 py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600"><i className="fas fa-arrow-left mr-2"></i>Quay lại</button>
                        </div>
                    </div>
                );
            }

            if (currentScreen === 'GAME') {
                const currentQ = questions[currentQuestionIndex];
                if (!currentQ) return null;
                return (
                    <div className="max-w-6xl mx-auto p-6 fade-in">
                        {commentary && (
                            <div className="commentary-toast bg-gradient-to-r from-purple-600 to-blue-600 text-white px-6 py-3 rounded-2xl shadow-2xl">
                                <div className="flex items-center gap-3"><i className="fas fa-bullhorn text-2xl"></i><span className="font-bold text-lg">{commentary}</span></div>
                            </div>
                        )}
                        {showAchievement && (
                            <div className="fixed inset-0 flex items-center justify-center z-50 pointer-events-none">

                                    <div className="text-center"><div className="text-6xl mb-2">{showAchievement.icon}</div><div className="text-2xl font-bold">Mở khóa!</div><div className="text-lg">{showAchievement.name}</div></div>
                                </div>

                                    <div className="text-4xl">{playerAvatar}</div>

                                <div className="text-center">
                                    <div className="text-sm text-gray-600">Câu {currentQuestionIndex + 1}/{questions.length}</div>

                                                ? 'text-red-600 animate-pulse'
                                                : 'text-blue-600'
                                        }`}>
                                        {timeSettings.mode === 'free' ? '♾️ Tự do' : `${timeLeft}s`}

                                <div className="text-right">
                                    {streak > 0 && <div className="text-2xl font-bold text-orange-600">🔥 Streak: {streak}</div>}
                                    {combo > 1 && <div className="inline-block px-4 py-2 bg-gradient-to-r from-red-500 to-orange-500 text-white rounded-full font-bold text-lg combo-badge">Combo x{combo}</div>}
                                </div>
                            </div>
                        </div>
                        <div className="bg-white rounded-3xl shadow-xl p-8 mb-6">
                            <div className="text-2xl font-bold text-gray-800 mb-6"><MathText text={currentQ.prompt} /></div>
                            {currentQ.type === 'mcq' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {currentQ.choices.map((choice, idx) => (
                                        <button key={idx} onClick={() => !showAnswer && setSelectedAnswer(idx)} disabled={showAnswer} className={`p-6 rounded-2xl border-4 transition text-left text-lg font-bold ${showAnswer ? (idx === currentQ.answer ? 'bg-green-100 border-green-500 text-green-800' : selectedAnswer === idx ? 'bg-red-100 border-red-500 text-red-800' : 'bg-gray-100 border-gray-300') : (selectedAnswer === idx ? 'bg-orange-100 border-orange-500' : 'bg-white border-gray-300 hover:border-orange-400')}`}>
                                            <div className="flex items-center gap-3"><span className="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center">{String.fromCharCode(65 + idx)}</span><MathText text={choice} /></div>
                                        </button>
                                    ))}
                                </div>
                            )}
                            {currentQ.type === 'drag-drop' && (
                                <div className="space-y-3">
                                    {(draggedItems.length > 0 ? draggedItems : currentQ.items || []).map((item, idx) => (
                                        <div key={`${item}-${idx}`} draggable={!showAnswer} onDragStart={() => setDraggedIndex(idx)} onDragOver={(e) => e.preventDefault()} onDrop={() => {
                                            if (draggedIndex !== null && draggedIndex !== idx) { const newItems = draggedItems.length > 0 ? [...draggedItems] : [...(currentQ.items || [])];[newItems[draggedIndex], newItems[idx]] = [newItems[idx], newItems[draggedIndex]]; setDraggedItems(newItems); }
                                        }} className={`p-4 rounded-xl border-2 cursor-move transition ${showAnswer ? (item === currentQ.items[idx] ? 'bg-green-100 border-green-500' : 'bg-red-100 border-red-500') : 'bg-white border-gray-300 hover:border-orange-400'}`}>
                                            <div className="flex items-center gap-3"><span className="text-2xl"><i className="fas fa-grip-vertical"></i></span><span className="font-bold">{idx + 1}.</span><span className="flex-1"><MathText text={item} /></span></div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            {currentQ.type === 'matching' && (
                                <div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="space-y-3">
                                            {currentQ.leftItems.map((item, idx) => {
                                                const pair = matchingPairs.find(p => p[0] === idx);
                                                const pairNumber = pair ? matchingPairs.indexOf(pair) + 1 : null;
                                                const isCorrect = showAnswer && pair && currentQ.correctPairs && currentQ.correctPairs[idx] && currentQ.correctPairs[idx][1] === pair[1];
                                                return (
                                                    <div key={idx} onClick={() => { if (!showAnswer) { const existing = matchingPairs.find(p => p[0] === idx); if (existing) { setMatchingPairs(matchingPairs.filter(p => p[0] !== idx)); } else { setMatchingPairs([...matchingPairs, [idx, null]]); } } }} className={`p-4 rounded-xl border-2 cursor-pointer transition relative ${showAnswer
                                                        ? (isCorrect ? 'bg-green-100 border-green-500' : pair ? 'bg-red-100 border-red-500' : 'bg-gray-100 border-gray-300')
                                                        : (pair ? 'bg-blue-100 border-blue-500' : 'bg-blue-50 border-blue-300 hover:border-blue-500')
                                                        }`}>
                                                        {pairNumber && (
                                                            <div className="absolute -top-2 -right-2 w-6 h-6 bg-orange-500 text-white rounded-full flex items-center justify-center text-sm font-bold">
                                                                {pairNumber}
                                                            </div>
                                                        )}
                                                        <MathText text={item} />
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        <div className="space-y-3">
                                            {currentQ.rightItems.map((item, idx) => {
                                                const pair = matchingPairs.find(p => p[1] === idx);
                                                const pairNumber = pair ? matchingPairs.indexOf(pair) + 1 : null;
                                                const leftIdx = pair ? pair[0] : null;
                                                const isCorrect = showAnswer && pair && currentQ.correctPairs && currentQ.correctPairs[leftIdx] && currentQ.correctPairs[leftIdx][1] === idx;
                                                return (
                                                    <div key={idx} onClick={() => { if (!showAnswer) { const existingPair = matchingPairs.find(p => p[1] === idx); if (existingPair) { setMatchingPairs(matchingPairs.filter(p => p[1] !== idx)); } else { const incomplete = matchingPairs.find(p => p[1] === null); if (incomplete) { const updated = matchingPairs.map(p => p === incomplete ? [p[0], idx] : p); setMatchingPairs(updated); } } } }} className={`p-4 rounded-xl border-2 cursor-pointer transition relative ${showAnswer
                                                        ? (isCorrect ? 'bg-green-100 border-green-500' : pair ? 'bg-red-100 border-red-500' : 'bg-gray-100 border-gray-300')
                                                        : (pair ? 'bg-green-100 border-green-500' : 'bg-green-50 border-green-300 hover:border-green-500')
                                                        }`}>
                                                        {pairNumber && (
                                                            <div className="absolute -top-2 -right-2 w-6 h-6 bg-orange-500 text-white rounded-full flex items-center justify-center text-sm font-bold">
                                                                {pairNumber}
                                                            </div>
                                                        )}
                                                        <MathText text={item} />
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    {!showAnswer && matchingPairs.length > 0 && (
                                        <div className="mt-4 p-4 bg-blue-50 border border-blue-300 rounded-xl">
                                            <p className="text-sm font-bold text-blue-800">
                                                <i className="fas fa-info-circle mr-2"></i>
                                                Đã nối {matchingPairs.filter(p => p[1] !== null).length}/{currentQ.leftItems.length} cặp
                                            </p>
                                        </div>
                                    )}
                                </div>
                            )}
                            {!showAnswer && <button onClick={handleRevealAnswer} className="w-full mt-6 py-4 bg-gradient-to-r from-orange-600 to-red-600 text-white rounded-xl font-bold text-lg hover:shadow-xl"><i className="fas fa-check mr-2"></i>Trả lời</button>}
                        </div>
                    </div>
                );
            }

            if (currentScreen === 'GAME_OVER') {
                return (
                    <div className="max-w-4xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-12 text-center">
                            <div className="text-8xl mb-6">🎉</div>
                            <h1 className="text-5xl font-bold text-orange-600 mb-4">Hoàn thành!</h1>
                            <div className="mb-8"><div className="text-7xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-600 to-orange-600 mb-2">{score}</div><div className="text-2xl text-gray-600">điểm</div></div>
                            <div className="grid grid-cols-3 gap-6 mb-8">
                                <div className="bg-blue-50 rounded-2xl p-6"><div className="text-3xl mb-2">🎯</div><div className="text-2xl font-bold text-blue-600">{streak}</div><div className="text-gray-600">Streak cao nhất</div></div>
                                <div className="bg-purple-50 rounded-2xl p-6"><div className="text-3xl mb-2">⚡</div><div className="text-2xl font-bold text-purple-600">x{combo}</div><div className="text-gray-600">Combo tối đa</div></div>
                                <div className="bg-green-50 rounded-2xl p-6"><div className="text-3xl mb-2">✅</div><div className="text-2xl font-bold text-green-600">{questions.length}</div><div className="text-gray-600">Câu hoàn thành</div></div>
                            </div>
                            {achievements.length > 0 && (
                                <div className="mb-8"><h3 className="text-xl font-bold mb-4">Thành tích:</h3><div className="flex justify-center gap-4">{achievements.map((badge, idx) => <div key={idx} className="bg-yellow-50 border-2 border-yellow-400 rounded-xl p-4"><div className="text-4xl mb-2">{badge.icon}</div><div className="font-bold text-yellow-800">{badge.name}</div></div>)}</div></div>
                            )}
                            <div className="flex gap-4 justify-center">
                                <button onClick={() => { setCurrentQuestionIndex(0); startGame(); }} className="px-8 py-4 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded-2xl font-bold text-lg hover:shadow-xl"><i className="fas fa-redo mr-2"></i>Chơi lại</button>
                                <button onClick={() => setCurrentScreen('SETUP')} className="px-8 py-4 bg-gray-500 text-white rounded-2xl font-bold text-lg hover:bg-gray-600"><i className="fas fa-home mr-2"></i>Trang chủ</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        ReactDOM.render(<SpeedScoreGame />, document.getElementById('root'));
    </script>
</body>

</html>
