<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Game 6: Truy Tìm Kho Báu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/babel.min.js"></script>
    <link rel="stylesheet" href="vendor/katex.min.css">
    <script src="vendor/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .katex {
            font-size: 1.1em;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cell-opened {
            animation: openCell 0.5s ease-out;
        }

        @keyframes openCell {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-pink-50 to-rose-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MathText = ({ text }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!text || !ref.current) return;
                let processed = text.replace(/`([^`]+)`/g, '$$$1$$').replace(/\\\[(.+?)\\\]/g, '$$$$1$$').replace(/\\\((.+?)\\\)/g, '$$$1$$');
                if (processed.includes('\\') && !processed.includes('$')) processed = `$${processed}$`;
                const parts = processed.split(/($$[\s\S]+?$$|\$[\s\S]+?\$)/g);
                ref.current.innerHTML = "";
                parts.forEach(part => {
                    if (part.startsWith('$$') && part.endsWith('$$')) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(2, -2), span, { throwOnError: false, displayMode: true }); } catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else if (part.startsWith("$") && part.endsWith("$")) {
                        const span = document.createElement("span");
                        try { katex.render(part.slice(1, -1), span, { throwOnError: false, displayMode: false }); } catch { span.textContent = part; }
                        ref.current.appendChild(span);
                    } else {
                        ref.current.appendChild(document.createTextNode(part));
                    }
                });
            }, [text]);
            return <span ref={ref} />;
        };

        const TreasureGame = () => {
            const [gameData, setGameData] = useState(null);
            const [grid, setGrid] = useState([]);
            const [openedCells, setOpenedCells] = useState([]);
            const [currentCell, setCurrentCell] = useState(null);
            const [showQuestion, setShowQuestion] = useState(false);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [score, setScore] = useState(0);
            const [gameOver, setGameOver] = useState(false);
            const [showInstructions, setShowInstructions] = useState(true);

            useEffect(() => {
                const data = localStorage.getItem('gameData');
                if (!data) {
                    alert('Không có dữ liệu game!');
                    window.location.href = 'trochoi.html';
                    return;
                }
                const parsed = JSON.parse(data);
                setGameData(parsed);

                const questions = parsed.content.questions || [];
                const gridSize = 3;
                const newGrid = Array(gridSize * gridSize).fill(null).map((_, idx) => {
                    if (idx < questions.length) {
                        const cellTypes = ['normal', 'normal', 'normal', 'bonus', 'trap'];
                        return {
                            question: questions[idx],
                            cellType: cellTypes[Math.floor(Math.random() * cellTypes.length)],
                            index: idx
                        };
                    }
                    return null;
                }).filter(c => c);
                setGrid(newGrid);
            }, []);

            const handleCellClick = (cell) => {
                if (openedCells.includes(cell.index)) return;
                setCurrentCell(cell);
                setShowQuestion(true);
                setSelectedAnswer(null);
            };

            const handleAnswer = () => {
                if (selectedAnswer === null) return;

                const isCorrect = selectedAnswer === currentCell.question.answer;
                let points = 0;

                if (isCorrect) {
                    points = currentCell.cellType === 'bonus' ? 50 :
                        currentCell.cellType === 'trap' ? -50 : 10;
                }

                setScore(score + points);
                setOpenedCells([...openedCells, currentCell.index]);
                setShowQuestion(false);
                setCurrentCell(null);

                if (openedCells.length + 1 >= grid.length) {
                    setTimeout(() => setGameOver(true), 1000);
                }
            };

            if (!gameData) return <div className="flex items-center justify-center min-h-screen"><div className="text-2xl">Đang tải...</div></div>;

            if (showInstructions) {
                return (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-3xl font-bold text-pink-700">
                                    <i className="fas fa-gem mr-3"></i>TRUY TÌM KHO BÁU
                                </h2>
                                <button onClick={() => setShowInstructions(false)} className="text-gray-500 hover:text-gray-700">
                                    <i className="fas fa-times text-2xl"></i>
                                </button>
                            </div>
                            <div className="space-y-4 text-gray-700">
                                <div className="bg-pink-50 border-2 border-pink-200 rounded-xl p-4">
                                    <h3 className="font-bold text-lg text-pink-800 mb-2">
                                        <i className="fas fa-bullseye mr-2"></i>Mục tiêu
                                    </h3>
                                    <p>Ôn tập cuối bài với yếu tố may mắn!</p>
                                </div>
                                <div>
                                    <h3 className="font-bold text-lg text-gray-800 mb-2">
                                        <i className="fas fa-gamepad mr-2"></i>Luật chơi
                                    </h3>
                                    <ul className="space-y-2 ml-6">
                                        <li className="flex items-start gap-2">
                                            <span className="text-pink-600 font-bold">1.</span>
                                            <span>Lưới <strong>3×3</strong> với 9 ô</span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-pink-600 font-bold">2.</span>
                                            <span>Click ô → trả lời câu hỏi</span>
                                        </li>
                                        <li className="flex items-start gap-2">
                                            <span className="text-pink-600 font-bold">3.</span>
                                            <span>Ô đặc biệt: <strong className="text-yellow-600">Bonus (+50)</strong>, <strong className="text-red-600">Trap (-50)</strong></span>
                                        </li>
                                    </ul>
                                </div>
                                <div>
                                    <h3 className="font-bold text-lg text-gray-800 mb-2">
                                        <i className="fas fa-calculator mr-2"></i>Tính điểm
                                    </h3>
                                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 space-y-2">
                                        <p>Ô thường: <strong>+10 điểm</strong></p>
                                        <p>Ô Bonus: <strong className="text-yellow-600">+50 điểm</strong></p>
                                        <p>Ô Trap: <strong className="text-red-600">-50 điểm</strong></p>
                                    </div>
                                </div>
                            </div>
                            <button
                                onClick={() => setShowInstructions(false)}
                                className="w-full mt-6 py-4 bg-gradient-to-r from-pink-600 to-rose-600 text-white rounded-xl font-bold text-lg hover:shadow-xl transition"
                            >
                                <i className="fas fa-play mr-2"></i>Bắt đầu chơi
                            </button>
                        </div>
                    </div>
                );
            }

            if (showQuestion && currentCell) {
                const q = currentCell.question;
                return (
                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-2xl w-full">
                            <div className={`p-4 rounded-xl mb-4 ${currentCell.cellType === 'bonus' ? 'bg-yellow-100 border-2 border-yellow-500' :
                                    currentCell.cellType === 'trap' ? 'bg-red-100 border-2 border-red-500' :
                                        'bg-gray-100'
                                }`}>
                                <div className="font-bold text-center">
                                    {currentCell.cellType === 'bonus' && <span className="text-yellow-600">🎁 Ô BONUS +50</span>}
                                    {currentCell.cellType === 'trap' && <span className="text-red-600">⚠️ Ô TRAP -50</span>}
                                    {currentCell.cellType === 'normal' && <span>Ô thường +10</span>}
                                </div>
                            </div>

                            <h3 className="text-xl font-bold mb-4"><MathText text={q.prompt} /></h3>

                            <div className="grid grid-cols-2 gap-3 mb-4">
                                {q.choices.map((choice, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => setSelectedAnswer(idx)}
                                        className={`p-3 rounded-xl border-2 transition ${selectedAnswer === idx ? 'bg-blue-100 border-blue-500' : 'border-gray-300 hover:border-blue-400'
                                            }`}
                                    >
                                        <MathText text={choice} />
                                    </button>
                                ))}
                            </div>

                            <div className="flex gap-3">
                                <button onClick={() => setShowQuestion(false)} className="flex-1 py-3 bg-gray-500 text-white rounded-xl font-bold hover:bg-gray-600">
                                    Hủy
                                </button>
                                <button onClick={handleAnswer} disabled={selectedAnswer === null} className="flex-1 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 disabled:opacity-50">
                                    Xác nhận
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameOver) {
                return (
                    <div className="max-w-3xl mx-auto p-6 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-12 text-center">
                            <div className="w-24 h-24 bg-pink-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i className="fas fa-gem text-5xl text-pink-600"></i>
                            </div>
                            <h2 className="text-4xl font-bold mb-4">Hoàn thành!</h2>
                            <div className="text-6xl font-bold text-pink-600 mb-8">{score}đ</div>
                            <div className="flex gap-4 justify-center">
                                <button onClick={() => window.location.reload()} className="px-8 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700">
                                    <i className="fas fa-redo mr-2"></i>Chơi lại
                                </button>
                                <button onClick={() => window.location.href = 'trochoi.html'} className="px-8 py-3 bg-gray-600 text-white rounded-xl font-bold hover:bg-gray-700">
                                    <i className="fas fa-home mr-2"></i>Về menu
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto p-6 fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex gap-2">
                            <button onClick={() => window.location.href = 'trochoi.html'} className="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                                <i className="fas fa-arrow-left mr-2"></i>Thoát
                            </button>
                            <button onClick={() => setShowInstructions(true)} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                <i className="fas fa-question-circle"></i>
                            </button>
                        </div>

                        <h1 className="text-3xl font-bold text-pink-700">
                            <i className="fas fa-gem mr-2"></i>TRUY TÌM KHO BÁU
                        </h1>

                        <div className="px-6 py-3 bg-pink-600 text-white rounded-lg font-bold text-xl">
                            {score}đ
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl shadow-2xl p-8">
                        <div className="text-center mb-6">
                            <div className="text-sm text-gray-600">Đã mở: {openedCells.length}/{grid.length} ô</div>
                        </div>

                        <div className="grid grid-cols-3 gap-4">
                            {grid.map((cell) => {
                                const isOpened = openedCells.includes(cell.index);
                                return (
                                    <button
                                        key={cell.index}
                                        onClick={() => handleCellClick(cell)}
                                        disabled={isOpened}
                                        className={`aspect-square rounded-2xl border-4 flex items-center justify-center text-4xl font-bold transition ${isOpened
                                                ? cell.cellType === 'bonus' ? 'bg-yellow-100 border-yellow-500 cell-opened' :
                                                    cell.cellType === 'trap' ? 'bg-red-100 border-red-500 cell-opened' :
                                                        'bg-green-100 border-green-500 cell-opened'
                                                : 'bg-gradient-to-br from-pink-200 to-rose-300 border-pink-400 hover:scale-105 hover:shadow-xl cursor-pointer'
                                            }`}
                                    >
                                        {isOpened ? (
                                            cell.cellType === 'bonus' ? '🎁' :
                                                cell.cellType === 'trap' ? '⚠️' : '✓'
                                        ) : '?'}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<TreasureGame />, document.getElementById('root'));
    </script>
</body>

</html>
