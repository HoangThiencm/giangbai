<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hỗ trợ dạy học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
    </style>
</head>

<body class="p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
        <div class="text-center mb-8">
            <div class="inline-block p-3 rounded-full bg-blue-600 text-white mb-3">
                <i class="fas fa-robot text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Trợ Lý Dạy học</h2>
            <p class="text-slate-500 text-sm">Vui lòng đăng nhập để tiếp tục</p>
        </div>

        <!-- TABS -->
        <div class="flex mb-6 border-b border-gray-200">
            <button id="tabLogin" onclick="switchTab('login')"
                class="flex-1 py-2 text-blue-600 font-bold border-b-2 border-blue-600">Đăng Nhập</button>
            <button id="tabRegister" onclick="switchTab('register')"
                class="flex-1 py-2 text-slate-500 font-medium hover:text-blue-500">Đăng Ký</button>
        </div>

        <!-- FORM -->
        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-slate-400"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" required
                        class="pl-10 w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none"
                        placeholder="email@example.com">
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-slate-700 mb-1">Mật khẩu</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-slate-400"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" required
                        class="pl-10 w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded shadow transition flex justify-center items-center">
                <span>Đăng Nhập</span>
            </button>

            <p id="message" class="text-center text-sm mt-4 text-red-500 hidden font-medium px-2 py-1 rounded"></p>
        </form>
    </div>

    <script>
        // === QUAN TRỌNG: Hãy dán link Server Hugging Face của bạn vào đây ===
        const HF_API_URL = "https://hoangthiencm-giangbai.hf.space";

        let isLoginMode = true;

        function switchTab(mode) {
            isLoginMode = (mode === 'login');
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');

            // FIX LỖI NULL: Kiểm tra xem thẻ span có tồn tại không trước khi đổi chữ
            const btnSpan = document.querySelector('#submitBtn span');

            const msg = document.getElementById('message');
            msg.classList.add('hidden');

            if (isLoginMode) {
                tabLogin.className = "flex-1 py-2 text-blue-600 font-bold border-b-2 border-blue-600";
                tabRegister.className = "flex-1 py-2 text-slate-500 font-medium hover:text-blue-500";
                // Chỉ đổi chữ khi nút đang hiển thị chữ (không phải đang quay loading)
                if (btnSpan) btnSpan.textContent = "Đăng Nhập";
            } else {
                tabRegister.className = "flex-1 py-2 text-blue-600 font-bold border-b-2 border-blue-600";
                tabLogin.className = "flex-1 py-2 text-slate-500 font-medium hover:text-blue-500";
                // Chỉ đổi chữ khi nút đang hiển thị chữ
                if (btnSpan) btnSpan.textContent = "Đăng Ký Tài Khoản";
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            const btn = document.getElementById('submitBtn');

            // Kiểm tra xem người dùng đã thay link API chưa
            if (HF_API_URL.includes("YOUR_HUGGINGFACE")) {
                msg.textContent = "Lỗi: Bạn chưa thay link API thật vào file login.html!";
                msg.className = "text-center text-sm mt-4 text-red-500 block";
                return;
            }

            btn.disabled = true;
            // Lúc này nút bấm biến thành icon xoay, thẻ span chứa chữ bị mất tạm thời
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const endpoint = isLoginMode ? "/login" : "/register";

            try {
                const response = await fetch(`${HF_API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (isLoginMode) {
                        try {
                            // Fetch user_features expiry from global_config.json on Github
                            const configRes = await fetch('global_config.json', { cache: 'no-store' });
                            if (configRes.ok) {
                                const config = await configRes.json();
                                if (config.user_features && config.user_features[email]) {
                                    const userExpiry = config.user_features[email].expiry;
                                    if (userExpiry) {
                                        const expiryDate = new Date(userExpiry);
                                        if (expiryDate < new Date()) {
                                            msg.textContent = "Tài khoản của bạn đã hết hạn, vui lòng liên hệ Admin.";
                                            msg.className = "text-center text-sm mt-4 text-red-500 block font-bold border border-red-200 bg-red-50 p-2 rounded";
                                            return; // Stop login process
                                        }
                                    }
                                }
                            }
                        } catch (e) {
                            console.warn("Không thể kiểm tra hạn sử dụng tài khoản", e);
                        }

                        localStorage.setItem('authToken', data.token);
                        localStorage.setItem('userEmail', email);
                        window.location.href = 'index.html';
                    } else {
                        // Đăng ký thành công
                        msg.textContent = "Đăng ký thành công! Vui lòng chờ Admin duyệt tài khoản.";
                        msg.className = "text-center text-sm mt-4 text-yellow-600 bg-yellow-50 p-2 rounded block border border-yellow-200";

                        // Chuyển tab về Login (Code mới đã an toàn, không còn lỗi null)
                        switchTab('login');
                    }
                } else {
                    throw new Error(data.detail || "Có lỗi xảy ra");
                }
            } catch (err) {
                msg.textContent = err.message;
                if (err.message.includes("chưa được kích hoạt")) {
                    msg.className = "text-center text-sm mt-4 text-yellow-700 bg-yellow-50 p-2 rounded block border border-yellow-200";
                } else {
                    msg.className = "text-center text-sm mt-4 text-red-500 block";
                }
            } finally {
                // Khôi phục lại nút bấm
                msg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = isLoginMode ? '<span>Đăng Nhập</span>' : '<span>Đăng Ký Tài Khoản</span>';
            }
        }

        function clearLocalAuth() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userName');
            localStorage.removeItem('userRole');
            localStorage.removeItem('allowedPages');
            localStorage.removeItem('userClassName');
        }

        function landingPageFor(user) {
            const pageUrls = {
                lotrinhtoan4: 'lotrinhtoan4.html',
                lotrinhtoan5: 'lotrinhtoan5.html',
                lotrinhtoan6: 'lotrinhtoan6.html',
                lotrinhtoan7: 'lotrinhtoan7.html',
                lotrinhtoan8: 'lotrinhtoan8.html',
                lotrinhtoan9: 'lotrinhtoan9.html'
            };
            const routeOrder = ['lotrinhtoan4', 'lotrinhtoan5', 'lotrinhtoan6', 'lotrinhtoan7', 'lotrinhtoan8', 'lotrinhtoan9'];
            const allowedPages = user?.allowed_pages || [];
            const canOpen = (pageKey) => allowedPages.includes(pageKey)
                || (pageKey === 'lotrinhtoan6' && allowedPages.includes('lotrinh'));
            if (user?.role === 'teacher') {
                return 'index.html';
            }
            if (user?.role === 'student') {
                const primary = routeOrder.find(pageKey => canOpen(pageKey) && pageUrls[pageKey]);
                return primary ? pageUrls[primary] : 'lotrinhtoan6.html';
            }
            return 'index.html';
        }

        async function redirectIfSessionIsValid() {
            if (!localStorage.getItem('authToken')) return;
            try {
                const response = await fetch('api/me.php', { cache: 'no-store', credentials: 'include' });
                if (!response.ok) throw new Error('Phiên đăng nhập đã hết hạn.');
                const data = await response.json();
                localStorage.setItem('userEmail', data.user.username);
                localStorage.setItem('userName', data.user.full_name);
                localStorage.setItem('userRole', data.user.role);
                localStorage.setItem('allowedPages', JSON.stringify(data.user.allowed_pages || []));
                localStorage.setItem('userClassName', data.user.class_name || '');
                window.location.href = landingPageFor(data.user);
            } catch {
                clearLocalAuth();
            }
        }

        redirectIfSessionIsValid();
    </script>
    <script>
        // Hosting mode: student accounts are created by the teacher/admin only.
        // This overrides the old public register flow that used the external HF API.
        document.addEventListener('DOMContentLoaded', () => {
            const tabRegister = document.getElementById('tabRegister');
            const tabLogin = document.getElementById('tabLogin');
            const title = document.querySelector('h2');
            const subtitle = document.querySelector('.text-slate-500.text-sm');
            const emailLabel = document.querySelector('label[for="email"], label.block');
            const emailInput = document.getElementById('email');

            if (tabRegister) tabRegister.classList.add('hidden');
            if (tabLogin) tabLogin.className = "flex-1 py-2 text-blue-600 font-bold border-b-2 border-blue-600";
            if (title) title.textContent = "Đăng nhập học tập";
            if (subtitle) subtitle.textContent = "Tài khoản do giáo viên cấp";
            if (emailLabel) emailLabel.textContent = "Tài khoản";
            if (emailInput) {
                emailInput.type = "text";
                emailInput.placeholder = "Ví dụ: HS001";
                emailInput.autocomplete = "username";
            }
        });

        window.switchTab = function () {
            isLoginMode = true;
        };

        window.handleAuth = async function (e) {
            e.preventDefault();
            const username = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            msg.classList.add('hidden');

            try {
                const response = await fetch('api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Không đăng nhập được.');

                localStorage.setItem('authToken', 'php-session');
                localStorage.setItem('userEmail', data.user.username);
                localStorage.setItem('userName', data.user.full_name);
                localStorage.setItem('userRole', data.user.role);
                localStorage.setItem('allowedPages', JSON.stringify(data.user.allowed_pages || []));
                localStorage.setItem('userClassName', data.user.class_name || '');

                window.location.href = landingPageFor(data.user);
            } catch (err) {
                msg.textContent = err.message;
                msg.className = "text-center text-sm mt-4 text-red-500 block";
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Đăng nhập</span>';
            }
        };
    </script>
</body>

</html>
