<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chấm Thi OMR Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin="anonymous"
        src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin="anonymous"
        src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script crossorigin="anonymous"
        src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- Load OpenCV -->
    <script async src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.min.js" onload="window.cvLoaded=true"
        onerror="window.cvLoadError=true"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Roboto+Mono:wght@500&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #e5e7eb;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-radius: 50%;
            border-top: 4px solid #3498db;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .ai-loading {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            border-radius: 0.5rem;
        }

        .tab-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .tab-active {
            background: #4f46e5;
            color: white;
        }

        .tab-inactive {
            color: #6b7280;
            hover: bg-gray-100;
        }

        #error-display {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            z-index: 9999;
            border-bottom: 3px solid #b91c1c;
            text-align: center;
            font-weight: bold;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 12px;
            background: black;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        canvas.overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .countdown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 6px solid rgba(255, 255, 255, 0.8);
            border-top-color: #00ff00;
            animation: spin 1s linear infinite;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-weight: bold;
        }

        @media print {
            @page {
                size: A4;
                margin: 0;
            }

            body {
                margin: 0;
                padding: 0;
                background: white;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .no-print {
                display: none !important;
            }

            .main-header,
            .main-tabs,
            .sidebar-controls {
                display: none !important;
            }

            .sheet-container {
                overflow: visible !important;
                height: auto !important;
            }
        }
    </style>
</head>

<body>
    <div id="error-display"></div>
    <div id="loading" class="fixed inset-0 bg-white z-50 flex items-center justify-center flex-col gap-3">
        <div class="loader"></div>
        <p class="text-gray-600 font-medium" id="loading-text">Đang tải ứng dụng & AI...</p>
        <button onclick="document.getElementById('loading').style.display='none'"
            class="mt-4 text-sm text-blue-500 underline hidden" id="force-load-btn">Bỏ qua Loading</button>
    </div>
    <div id="root"></div>

    <script>
        setTimeout(() => {
            const btn = document.getElementById('force-load-btn');
            const txt = document.getElementById('loading-text');
            if (btn) btn.classList.remove('hidden');
            if (txt) txt.innerText = "Mạng chậm hoặc lỗi thư viện AI...";
        }, 5000);

        window.onerror = function (msg, url, line) {
            document.getElementById('loading').style.display = 'none';
            var errDiv = document.getElementById('error-display');
            errDiv.style.display = 'block';
            errDiv.innerText = "⚠️ LỖI JS: " + msg;
            return false;
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- UTILS ---
        const toInt = (x) => Math.floor(x);
        const parseMultiKey = (text) => {
            if (!text) return {};
            const keys = {};
            text.split('\n').forEach(line => {
                line = line.trim();
                if (!line) return;
                let code = "DEFAULT", ans = line;
                if (line.includes(':')) { const p = line.split(':'); code = p[0].trim(); ans = p[1].trim(); }
                if (!keys[code]) keys[code] = {};
                const pairs = ans.toUpperCase().split(/\s+/);
                pairs.forEach(p => {
                    const num = p.match(/^\d+/);
                    const char = p.match(/[A-D]$/);
                    if (num && char) keys[code][parseInt(num[0])] = char[0];
                });
            });
            return keys;
        };
        const getGlobalKeys = () => { try { return JSON.parse(localStorage.getItem('global_gemini_keys')) || []; } catch { return []; } };
        const getRandomKey = () => { const k = getGlobalKeys(); return k.length ? k[Math.floor(Math.random() * k.length)] : null; };

        // --- OPENCV HELPER ---
        const ScanHelper = {
            videoStream: null,
            isScanning: false,

            startCamera: async (videoEl, onFrame) => {
                try {
                    // Yêu cầu camera sau (environment)
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: "environment",
                            width: { ideal: 1920 }, // Cố gắng lấy độ phân giải cao
                            height: { ideal: 1080 }
                        }
                    });
                    videoEl.srcObject = stream;
                    // Phải gọi play() để video bắt đầu chạy
                    await videoEl.play();

                    ScanHelper.videoStream = stream;
                    ScanHelper.isScanning = true;
                    requestAnimationFrame(() => ScanHelper.processFrame(videoEl, onFrame));
                } catch (err) {
                    alert("Không mở được Camera: " + err.message + "\nHãy kiểm tra quyền truy cập hoặc thử trình duyệt khác (Chrome/Safari).");
                }
            },

            stopCamera: () => {
                ScanHelper.isScanning = false;
                if (ScanHelper.videoStream) {
                    ScanHelper.videoStream.getTracks().forEach(track => track.stop());
                    ScanHelper.videoStream = null;
                }
            },

            processFrame: (videoEl, callback) => {
                if (!ScanHelper.isScanning) return;

                // Nếu OpenCV chưa tải xong, vẫn lặp lại để giữ luồng nhưng không xử lý
                if (!window.cv || !window.cvLoaded) {
                    requestAnimationFrame(() => ScanHelper.processFrame(videoEl, callback));
                    return;
                }

                try {
                    let cap = new cv.VideoCapture(videoEl);
                    let src = new cv.Mat(videoEl.videoHeight, videoEl.videoWidth, cv.CV_8UC4);
                    cap.read(src);

                    let gray = new cv.Mat();
                    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                    // Giảm nhiễu
                    cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);
                    cv.Canny(gray, gray, 75, 200);

                    let contours = new cv.MatVector();
                    let hierarchy = new cv.Mat();
                    cv.findContours(gray, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                    let docCnt = null;
                    let maxArea = 0;

                    for (let i = 0; i < contours.size(); ++i) {
                        let cnt = contours.get(i);
                        let area = cv.contourArea(cnt);
                        // Chỉ lấy khung lớn > 5000px
                        if (area > 5000) {
                            let peri = cv.arcLength(cnt, true);
                            let approx = new cv.Mat();
                            cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
                            if (approx.rows === 4 && area > maxArea) {
                                maxArea = area;
                                if (docCnt) docCnt.delete();
                                docCnt = approx;
                            } else {
                                approx.delete();
                            }
                        }
                    }

                    callback(docCnt, src);

                    gray.delete(); contours.delete(); hierarchy.delete();
                } catch (e) {
                    // Silent fail to keep loop running
                }

                if (ScanHelper.isScanning) requestAnimationFrame(() => ScanHelper.processFrame(videoEl, callback));
            },

            warpImage: (srcMat, contour) => {
                let pts = [];
                for (let i = 0; i < 4; i++) pts.push({ x: contour.data32S[i * 2], y: contour.data32S[i * 2 + 1] });

                // Sắp xếp 4 điểm
                pts.sort((a, b) => a.y - b.y);
                let top = pts.slice(0, 2).sort((a, b) => a.x - b.x);
                let bottom = pts.slice(2, 4).sort((a, b) => a.x - b.x);
                let tl = top[0], tr = top[1], br = bottom[1], bl = bottom[0];

                let widthA = Math.sqrt(Math.pow(br.x - bl.x, 2) + Math.pow(br.y - bl.y, 2));
                let widthB = Math.sqrt(Math.pow(tr.x - tl.x, 2) + Math.pow(tr.y - tl.y, 2));
                let maxWidth = Math.max(toInt(widthA), toInt(widthB));

                let heightA = Math.sqrt(Math.pow(tr.x - br.x, 2) + Math.pow(tr.y - br.y, 2));
                let heightB = Math.sqrt(Math.pow(tl.x - bl.x, 2) + Math.pow(tl.y - bl.y, 2));
                let maxHeight = Math.max(toInt(heightA), toInt(heightB));

                // Kích thước chuẩn A4 (tỷ lệ) hoặc fix cứng để OCR tốt hơn
                let dstWidth = 1600;
                let dstHeight = 2260;

                let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
                let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, dstWidth, 0, dstWidth, dstHeight, 0, dstHeight]);

                let M = cv.getPerspectiveTransform(srcTri, dstTri);
                let warped = new cv.Mat();
                cv.warpPerspective(srcMat, warped, M, new cv.Size(dstWidth, dstHeight));

                srcTri.delete(); dstTri.delete(); M.delete();
                return warped;
            }
        };

        // --- CAMERA COMPONENT ---
        const CameraScanner = ({ onCaptured, onClose }) => {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [canCapture, setCanCapture] = useState(false);
            const cvState = useRef({ src: null, contour: null });

            // Auto Capture Refs
            const autoCaptureTimer = useRef(null);
            const [isAutoCapturing, setIsAutoCapturing] = useState(false);
            const capturedRef = useRef(false);

            useEffect(() => {
                ScanHelper.startCamera(videoRef.current, (contour, srcMat) => {
                    const canvas = canvasRef.current;
                    if (!canvas) { if (srcMat) srcMat.delete(); if (contour) contour.delete(); return; }

                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    if (cvState.current.contour) cvState.current.contour.delete();
                    if (cvState.current.src) cvState.current.src.delete();

                    if (contour) {
                        // Vẽ khung xanh
                        const pts = contour.data32S;
                        ctx.strokeStyle = '#00FF00'; ctx.lineWidth = 5;
                        ctx.beginPath(); ctx.moveTo(pts[0], pts[1]); ctx.lineTo(pts[2], pts[3]); ctx.lineTo(pts[4], pts[5]); ctx.lineTo(pts[6], pts[7]); ctx.closePath(); ctx.stroke();

                        setCanCapture(true);
                        cvState.current.contour = contour.clone();
                        cvState.current.src = srcMat.clone();
                    } else {
                        // Không có khung, nhưng vẫn lưu src để fallback manual capture
                        setCanCapture(false);
                        cvState.current.contour = null;
                        cvState.current.src = srcMat.clone();
                    }

                    if (srcMat) srcMat.delete();
                    if (contour) contour.delete();
                });

                return () => {
                    ScanHelper.stopCamera();
                    if (cvState.current.contour) cvState.current.contour.delete();
                    if (cvState.current.src) cvState.current.src.delete();
                    if (autoCaptureTimer.current) clearTimeout(autoCaptureTimer.current);
                };
            }, []);

            // --- HÀM CHỤP ẢNH (QUAN TRỌNG) ---
            const handleCapture = useCallback(() => {
                if (capturedRef.current) return;

                // 1. Kiểm tra Video
                const video = videoRef.current;
                if (!video || video.readyState !== 4) return alert("Camera chưa sẵn sàng (đang tải stream)...");

                try {
                    const { src, contour } = cvState.current;
                    let outCanvas = document.createElement('canvas');

                    // 2. Ưu tiên dùng OpenCV nếu đã load xong và có frame
                    if (src && window.cv && window.cvLoaded) {
                        let outMat;
                        if (contour) {
                            // Có khung -> Warp cho đẹp
                            outMat = ScanHelper.warpImage(src, contour);
                        } else {
                            // Không khung -> Lấy ảnh gốc OpenCV
                            outMat = src.clone();
                        }
                        outCanvas.width = outMat.cols;
                        outCanvas.height = outMat.rows;
                        cv.imshow(outCanvas, outMat);
                        outMat.delete();
                    }
                    // 3. FALLBACK: Nếu OpenCV lỗi/chậm -> Chụp thẳng từ Video Tag
                    else {
                        outCanvas.width = video.videoWidth;
                        outCanvas.height = video.videoHeight;
                        const ctx = outCanvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, outCanvas.width, outCanvas.height);
                    }

                    capturedRef.current = true;

                    // 4. Xuất ảnh
                    outCanvas.toBlob(blob => {
                        if (blob) {
                            onCaptured(blob);
                        } else {
                            alert("Lỗi tạo ảnh Blob!");
                            capturedRef.current = false;
                        }
                    }, 'image/jpeg', 0.95); // Chất lượng cao

                } catch (e) {
                    capturedRef.current = false;
                    alert("Lỗi chụp ảnh: " + e.message);
                }
            }, [onCaptured]);

            // Auto Capture Logic
            useEffect(() => {
                if (canCapture && !capturedRef.current) {
                    setIsAutoCapturing(true);
                    if (autoCaptureTimer.current) clearTimeout(autoCaptureTimer.current);

                    // Giữ yên 0.7s thì chụp
                    autoCaptureTimer.current = setTimeout(() => {
                        if (canCapture) handleCapture();
                    }, 700);
                } else {
                    setIsAutoCapturing(false);
                    if (autoCaptureTimer.current) clearTimeout(autoCaptureTimer.current);
                }
            }, [canCapture, handleCapture]);

            return (
                <div className="fixed inset-0 bg-black z-50 flex flex-col">
                    <div className="p-4 flex justify-between items-center text-white bg-black/50 absolute top-0 w-full z-20">
                        <h2 className="text-lg font-bold">Quét Phiếu</h2>
                        <button onClick={onClose} className="text-gray-300 px-3 py-1">Đóng</button>
                    </div>

                    <div className="flex-1 flex items-center justify-center bg-black relative overflow-hidden">
                        <div className="video-container w-full h-full">
                            {/* Object-fit contain để thấy toàn bộ khung hình */}
                            <video ref={videoRef} playsInline muted autoPlay className="w-full h-full object-contain"></video>
                            <canvas ref={canvasRef} className="overlay" width={1280} height={720}></canvas>
                        </div>

                        <div className={`absolute top-20 left-1/2 transform -translate-x-1/2 px-4 py-2 rounded-full text-sm font-bold pointer-events-none transition-colors shadow-lg whitespace-nowrap z-30 ${canCapture ? 'bg-green-500 text-white' : 'bg-black/60 text-gray-200'}`}>
                            {canCapture ? "✅ Giữ yên..." : "🔍 Đưa phiếu vào khung"}
                        </div>

                        {isAutoCapturing && !capturedRef.current && (
                            <div className="countdown-overlay"><i className="fas fa-camera text-3xl"></i></div>
                        )}

                        {!window.cvLoaded && <div className="absolute bottom-24 bg-yellow-600/80 text-white px-3 py-1 rounded text-xs">⚠️ AI đang tải... Bấm nút dưới để chụp tay</div>}
                    </div>

                    <div className="p-8 bg-black/80 flex justify-center z-20">
                        <button
                            onClick={handleCapture}
                            className={`w-20 h-20 rounded-full border-4 flex items-center justify-center transition-all active:scale-95 ${canCapture ? 'border-green-400 bg-green-600' : 'border-white bg-white/20'}`}
                        >
                            <i className="fas fa-camera text-3xl text-white"></i>
                        </button>
                    </div>
                </div>
            );
        };

        // --- SHEET GENERATOR (GIỮ NGUYÊN) ---
        const SheetGenerator = () => {
            const [numQuestions, setNumQuestions] = useState(40);
            const [showAnchors, setShowAnchors] = useState(true);
            const [title, setTitle] = useState('PHIẾU TRẢ LỜI TRẮC NGHIỆM');
            const [schoolName, setSchoolName] = useState('');
            const [examSubject, setExamSubject] = useState('');
            const [examDate, setExamDate] = useState('');
            const handlePrint = () => window.print();
            const range = (start, end) => Array.from({ length: end - start + 1 }, (_, i) => start + i);
            const options = ['A', 'B', 'C', 'D'];

            return (
                <div className="flex flex-col lg:flex-row h-[calc(100vh-80px)] bg-gray-100 font-sans overflow-hidden sheet-container">
                    <div className="w-full lg:w-80 bg-white shadow-lg p-6 no-print flex flex-col gap-4 overflow-y-auto border-r z-10 sidebar-controls">
                        <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2 border-b pb-2"><i className="fas fa-cog w-5 h-5 text-gray-600"></i> Thông tin Phiếu</h2>
                        <div className="space-y-3">
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Tiêu đề lớn</label><input type="text" value={title} onChange={(e) => setTitle(e.target.value)} className="w-full px-3 py-2 border rounded-md outline-none" /></div>
                            <div className="grid grid-cols-2 gap-2">
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">Số câu</label><select value={numQuestions} onChange={(e) => setNumQuestions(Number(e.target.value))} className="w-full px-3 py-2 border rounded-md outline-none"><option value={20}>20 câu</option><option value={40}>40 câu</option><option value={50}>50 câu</option><option value={60}>60 câu</option><option value={100}>100 câu</option></select></div>
                                <div><label className="block text-sm font-medium text-gray-700 mb-1">Ngày thi</label><input type="text" value={examDate} onChange={(e) => setExamDate(e.target.value)} className="w-full px-3 py-2 border rounded-md outline-none" /></div>
                            </div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Tên Trường</label><input type="text" value={schoolName} onChange={(e) => setSchoolName(e.target.value)} className="w-full px-3 py-2 border rounded-md outline-none" /></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Môn Thi</label><input type="text" value={examSubject} onChange={(e) => setExamSubject(e.target.value)} className="w-full px-3 py-2 border rounded-md outline-none" /></div>
                            <div className="flex items-center gap-2 mt-2 pt-2 border-t"><input type="checkbox" checked={showAnchors} onChange={(e) => setShowAnchors(e.target.checked)} /><label className="text-gray-700 text-sm">Hiển thị 4 góc định vị</label></div>
                            <button onClick={handlePrint} className="w-full flex items-center justify-center gap-2 bg-blue-700 text-white px-3 py-3 rounded-md hover:bg-blue-800 transition font-bold mt-4"><i className="fas fa-print"></i> IN PHIẾU NGAY</button>
                        </div>
                    </div>
                    <div className="flex-1 overflow-auto p-4 md:p-8 flex justify-center bg-gray-200 print-bg-white print-p-0 print-m-0">
                        <div className="bg-white shadow-2xl relative mx-auto print-shadow-none" style={{ width: '210mm', minHeight: '297mm', padding: '10mm', boxSizing: 'border-box' }}>
                            {showAnchors && <><div className="absolute top-8 left-8 w-4 h-4 bg-black"></div><div className="absolute top-8 right-8 w-4 h-4 bg-black"></div><div className="absolute bottom-8 left-8 w-4 h-4 bg-black"></div><div className="absolute bottom-8 right-8 w-4 h-4 bg-black"></div></>}
                            <div className="w-full h-full border-0 border-transparent relative">
                                <div className="flex justify-between items-start mb-6 px-4 h-[160px] overflow-hidden">
                                    <div className="w-1/2 pr-4"><div className="grid grid-cols-[70px_1fr] gap-y-2 text-sm"><div className="font-bold pt-1">Trường:</div><div className="border-b border-dotted border-gray-400 pt-1 font-semibold text-blue-900 min-h-[24px]">{schoolName}</div><div className="font-bold pt-1">Lớp:</div><div className="border-b border-dotted border-gray-400 pt-1 min-h-[24px]"></div><div className="font-bold pt-1">Họ tên:</div><div className="border-b border-dotted border-gray-400 pt-1 min-h-[24px]"></div></div></div>
                                    <div className="w-1/2 text-center pl-4"><h1 className="font-bold text-xl uppercase leading-tight mb-2">{title}</h1><div className="flex justify-center items-end gap-1 text-sm italic"><span>Môn thi:</span><div className="border-b border-dotted border-gray-400 min-w-[100px] text-blue-900 font-semibold px-2">{examSubject}</div></div><div className="flex justify-center items-end gap-1 text-sm italic mt-1"><span>Ngày thi:</span><div className="border-b border-dotted border-gray-400 min-w-[100px] text-blue-900 font-semibold px-2">{examDate}</div></div></div>
                                </div>
                                <div className="flex gap-8 mb-6 px-4 h-[200px]">
                                    <div className="w-40"><div className="text-center font-bold border border-black text-sm mb-1">SỐ BÁO DANH</div><div className="grid grid-cols-6 border border-black mb-1">{[...Array(6)].map((_, i) => (<div key={i} className="h-6 border-r border-black last:border-r-0"></div>))}</div><div className="grid grid-cols-6 gap-x-1">{[...Array(6)].map((col, colIdx) => (<div key={colIdx} className="flex flex-col items-center gap-1">{[...Array(10)].map((_, num) => (<div key={num} className="w-4 h-4 rounded-full border border-gray-400 flex items-center justify-center text-[9px] font-bold text-gray-600">{num}</div>))}</div>))}</div></div>
                                    <div className="w-28"><div className="text-center font-bold border border-black text-sm mb-1">MÃ ĐỀ</div><div className="grid grid-cols-4 border border-black mb-1">{[...Array(4)].map((_, i) => (<div key={i} className="h-6 border-r border-black last:border-r-0"></div>))}</div><div className="grid grid-cols-4 gap-x-1">{[...Array(4)].map((col, colIdx) => (<div key={colIdx} className="flex flex-col items-center gap-1">{[...Array(10)].map((_, num) => (<div key={num} className="w-4 h-4 rounded-full border border-gray-400 flex items-center justify-center text-[9px] font-bold text-gray-600">{num}</div>))}</div>))}</div></div>
                                    <div className="flex-1 flex flex-col justify-between py-2"><div className="border border-black p-2 h-24 relative"><span className="absolute -top-3 left-2 bg-white px-1 text-sm font-bold">Điểm</span><div className="h-full w-full flex items-center justify-center text-4xl font-bold text-gray-100 select-none">OMR</div></div><div className="text-xs mt-2 text-justify leading-tight"><strong>Lưu ý:</strong> Giữ phẳng phiếu. Tô kín. <div className="flex gap-4 mt-2 justify-center"><span className="flex items-center gap-1"><div className="w-3 h-3 bg-black rounded-full"></div> Đúng</span><span className="flex items-center gap-1"><div className="w-3 h-3 border border-black rounded-full flex justify-center items-center text-[8px]">✕</div> Sai</span></div></div></div>
                                </div>
                                <div className="px-4 mt-8">
                                    <div className="border-t-2 border-black mb-4"></div><h3 className="text-center font-bold mb-4">PHẦN TRẢ LỜI</h3>
                                    <div className="w-full grid grid-cols-4 gap-4">{[0, 1, 2, 3].map(colIndex => { const itemsPerCol = Math.ceil(numQuestions / 4); const start = colIndex * itemsPerCol + 1; const end = Math.min(start + itemsPerCol - 1, numQuestions); if (start > numQuestions) return null; return (<div key={colIndex} className="border-r border-gray-300 last:border-0 pr-2">{range(start, end).map(qNum => (<div key={qNum} className="flex items-center justify-between mb-2 text-sm"><span className="font-bold w-6 text-right mr-2 text-blue-800">{qNum}</span><div className="flex gap-1.5">{options.map(opt => (<div key={opt} className="w-5 h-5 rounded-full border border-gray-500 flex items-center justify-center text-[10px] font-medium text-gray-700">{opt}</div>))}</div></div>))}</div>) })}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const DEFAULT_BACKEND = "https://hoangthiencm-giangbai.hf.space";
            const [view, setView] = useState('grading');
            const [backendUrl, setBackendUrl] = useState(() => localStorage.getItem("omr_backend_url") || DEFAULT_BACKEND);
            const [mobileMode, setMobileMode] = useState(false);
            const [sessionName, setSessionName] = useState("");
            const [inputText, setInputText] = useState("");
            const [sessionId, setSessionId] = useState(null);
            const [results, setResults] = useState([]);
            const [showQr, setShowQr] = useState(false);
            const [historyList, setHistoryList] = useState([]);
            const [historyDetail, setHistoryDetail] = useState(null);
            const [mobileStatus, setMobileStatus] = useState("");
            const [processing, setProcessing] = useState(false);
            const [previewImage, setPreviewImage] = useState(null);
            const [aiReading, setAiReading] = useState(false);
            const [enableHandwriting, setEnableHandwriting] = useState(false);
            const [showCamera, setShowCamera] = useState(false);

            const folderRef = useRef(null);
            const keyImageRef = useRef(null);
            const pollRef = useRef(null);

            useEffect(() => {
                // Tắt màn hình loading ngay khi App mount thành công
                const loader = document.getElementById('loading');
                if (loader) loader.style.display = 'none';

                const params = new URLSearchParams(window.location.search);
                if (params.get('mode') === 'mobile') setMobileMode(true);
                if (params.get('session')) setSessionId(params.get('session'));
            }, []);

            const callGeminiVision = async (base64) => {
                const key = getRandomKey();
                if (!key) { alert("Chưa nạp API Key ở trang chủ!"); return; }
                setAiReading(true);
                try {
                    const prompt = "Hãy trích xuất đáp án trắc nghiệm từ ảnh này. Trả về dạng chuỗi: 1A 2B 3C 4D... (Số câu và chữ cái). Chỉ trả về nội dung text, không giải thích.";
                    const model = localStorage.getItem('default_gemini_module') || 'gemini-2.5-flash';
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }] })
                    });
                    const d = await res.json();
                    if (d.candidates) {
                        let txt = d.candidates[0].content.parts[0].text.replace(/[*#]/g, '').trim();
                        setInputText(prev => (prev ? prev + "\n" + txt : txt));
                    }
                } catch (e) { alert("Lỗi AI: " + e.message); } finally { setAiReading(false); }
            };

            const handleKeyImageUpload = (e) => { const file = e.target.files[0]; if (!file) return; const r = new FileReader(); r.onload = (ev) => callGeminiVision(ev.target.result.split(',')[1]); r.readAsDataURL(file); };
            const handlePaste = (e) => { const items = e.clipboardData.items; for (let i = 0; i < items.length; i++) { if (items[i].type.indexOf("image") !== -1) { e.preventDefault(); const blob = items[i].getAsFile(); const r = new FileReader(); r.onload = (ev) => callGeminiVision(ev.target.result.split(',')[1]); r.readAsDataURL(blob); return; } } };

            const createSession = async () => {
                if (!sessionName || !inputText) return alert("Nhập đủ thông tin!");
                const fd = new FormData(); fd.append("name", sessionName); fd.append("answer_key_json", JSON.stringify(parseMultiKey(inputText)));
                try {
                    const res = await fetch(`${backendUrl}/api/omr/create_session`, { method: 'POST', body: fd });
                    if (!res.ok) throw new Error("Lỗi kết nối Server");
                    const d = await res.json(); setSessionId(d.session_id); setShowQr(true);
                    setTimeout(() => {
                        const qrDiv = document.getElementById("qrcode");
                        if (qrDiv) { qrDiv.innerHTML = ""; new QRCode(qrDiv, { text: `${window.location.href.split('?')[0]}?mode=mobile&session=${d.session_id}`, width: 200, height: 200 }); }
                    }, 100);
                } catch (e) { alert("Lỗi: " + e.message); }
            };

            const loadHistory = async () => { try { const res = await fetch(`${backendUrl}/api/omr/history`); const d = await res.json(); if (Array.isArray(d)) setHistoryList(d); } catch (e) { } };
            const viewDetail = async (sid) => { try { const res = await fetch(`${backendUrl}/api/omr/history/${sid}`); const d = await res.json(); if (Array.isArray(d)) setHistoryDetail(d); } catch (e) { } };
            const editSession = async (e, s) => { e.stopPropagation(); const newName = prompt("Nhập tên mới cho đợt thi:", s.session_name); if (newName && newName !== s.session_name) { const fd = new FormData(); fd.append("name", newName); try { const res = await fetch(`${backendUrl}/api/omr/update_session/${s.session_id}`, { method: 'PUT', body: fd }); if (res.ok) { setHistoryList(historyList.map(h => h.session_id === s.session_id ? { ...h, session_name: newName } : h)); } else alert("Lỗi khi cập nhật"); } catch (e) { alert("Lỗi kết nối"); } } };
            const deleteSession = async (e, sid) => { e.stopPropagation(); if (!confirm("Bạn có chắc chắn muốn xóa đợt thi này và TẤT CẢ kết quả của nó không?")) return; try { const res = await fetch(`${backendUrl}/api/omr/delete_session/${sid}`, { method: 'DELETE' }); if (res.ok) { setHistoryList(historyList.filter(h => h.session_id !== sid)); if (historyDetail && historyDetail.length && historyDetail[0].session_id === sid) setHistoryDetail(null); } else alert("Lỗi khi xóa"); } catch (e) { alert("Lỗi kết nối"); } };

            const processImagesPC = async (files) => {
                if (!files.length) return;
                setProcessing(true);
                const keys = parseMultiKey(inputText);
                for (let f of files) {
                    const fd = new FormData();
                    fd.append("file", f);
                    fd.append("answer_key_json", JSON.stringify(keys));
                    if (enableHandwriting) fd.append("handwriting", "true");
                    try {
                        const res = await fetch(`${backendUrl}/api/omr/grade`, { method: 'POST', body: fd });
                        const data = await res.json();
                        setResults(p => [{ filename: f.name, ...data }, ...p]);
                    } catch (e) { }
                }
                setProcessing(false);
            };

            const handleMobileCapture = async (blob) => {
                setShowCamera(false);
                setProcessing(true);
                setMobileStatus("Đang gửi ảnh...");
                const sid = new URLSearchParams(window.location.search).get('session');
                try {
                    const fd = new FormData();
                    fd.append("file", blob, "capture.jpg");
                    fd.append("session_id", sid);
                    fd.append("pre_warped", "true");
                    const res = await fetch(`${backendUrl}/api/omr/grade_mobile`, { method: 'POST', body: fd });
                    const d = await res.json();
                    setMobileStatus(res.ok ? `✓ SBD: ${d.student_id} | Điểm: ${d.score}` : `⚠ ${d.error}`);
                } catch (e) { setMobileStatus("Lỗi Mạng"); }
                setProcessing(false);
            };

            useEffect(() => {
                if (view === 'history') loadHistory();
                if (sessionId && !mobileMode) { pollRef.current = setInterval(async () => { try { const res = await fetch(`${backendUrl}/api/omr/poll_results/${sessionId}`); const d = await res.json(); if (d && d.length) setResults(p => [...d, ...p]); } catch (e) { } }, 2000); }
                return () => clearInterval(pollRef.current);
            }, [view, sessionId, backendUrl, mobileMode]);

            if (mobileMode) {
                return (
                    <div className="bg-gray-900 min-h-screen text-white flex flex-col">
                        {showCamera && <CameraScanner onCaptured={handleMobileCapture} onClose={() => setShowCamera(false)} />}
                        <div className="p-6 flex-1 flex flex-col items-center justify-center text-center">
                            <h1 className="text-2xl font-bold mb-4 text-indigo-400">Camera Chấm Thi AI</h1>
                            {mobileStatus && <div className={`mb-6 p-4 rounded-lg font-bold w-full ${mobileStatus.includes('✓') ? 'bg-green-600' : 'bg-red-600'}`}>{mobileStatus}</div>}
                            <button onClick={() => setShowCamera(true)} className="w-64 h-64 rounded-full border-4 border-white flex flex-col items-center justify-center shadow-xl cursor-pointer bg-indigo-600 hover:bg-indigo-500 active:scale-95 transition-all">
                                {processing ? <div className="loader border-white border-t-indigo-500"></div> : <><i className="fas fa-camera text-6xl mb-2"></i><span className="font-bold text-xl">QUÉT PHIẾU</span></>}
                            </button>
                            <p className="mt-6 text-gray-400 text-sm px-4">Đưa phiếu vào camera. Máy sẽ tự chụp khi có khung xanh hoặc bạn bấm chụp.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-gray-50 font-sans">
                    <div className="bg-white border-b px-6 py-3 flex justify-between items-center shadow-sm sticky top-0 z-20 no-print main-header">
                        <div className="flex items-center gap-2"><div className="bg-indigo-600 text-white w-8 h-8 rounded flex items-center justify-center font-bold">OMR</div><h1 className="font-bold text-lg text-indigo-900">Quản Lý Chấm Thi</h1></div>
                        <div className="flex gap-2 main-tabs"><button onClick={() => window.location.href = 'index.html'} className="tab-btn text-gray-600 hover:bg-gray-100"><i className="fas fa-home"></i></button><div className="w-px bg-gray-300 my-1"></div><button onClick={() => setView('grading')} className={`tab-btn ${view === 'grading' ? 'tab-active' : 'tab-inactive'}`}><i className="fas fa-play-circle mr-2"></i>Chấm Thi</button><button onClick={() => setView('history')} className={`tab-btn ${view === 'history' ? 'tab-active' : 'tab-inactive'}`}><i className="fas fa-history mr-2"></i>Lịch Sử</button><button onClick={() => setView('sheet')} className={`tab-btn ${view === 'sheet' ? 'tab-active' : 'tab-inactive'}`}><i className="fas fa-print mr-2"></i>Tạo Phiếu</button></div>
                    </div>
                    <div className={`flex-1 w-full overflow-hidden ${view === 'sheet' ? 'p-0' : 'p-6 max-w-7xl mx-auto'}`}>
                        {view === 'grading' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
                                <div className="lg:col-span-4 space-y-4">
                                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 relative">{aiReading && (<div className="ai-loading"><div className="pulse-ring"></div><span className="mt-3 text-indigo-700 font-bold text-sm animate-pulse">AI Đang Đọc Ảnh...</span></div>)}<h3 className="font-bold text-gray-800 mb-3">1. Tạo Đợt Chấm</h3><input value={sessionName} onChange={e => setSessionName(e.target.value)} className="w-full border p-2 rounded mb-2 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Tên đợt (VD: Toán 12...)" /><div className="relative"><textarea value={inputText} onChange={e => setInputText(e.target.value)} onPaste={handlePaste} className="w-full border p-2 rounded h-40 font-mono text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Nhập đáp án (101: 1A...) hoặc Dán ảnh (Ctrl+V)..."></textarea><button onClick={() => keyImageRef.current.click()} className="absolute bottom-2 right-2 bg-gray-100 hover:bg-gray-200 text-gray-700 px-2 py-1 rounded text-xs font-bold border border-gray-300 shadow-sm flex items-center gap-1"><i className="fas fa-image"></i> Ảnh Key</button><input type="file" ref={keyImageRef} className="hidden" accept="image/*" onChange={handleKeyImageUpload} /></div>
                                        <div className="mt-2 flex items-center p-2 bg-pink-50 rounded border border-pink-100"><input type="checkbox" id="handwriting_toggle" checked={enableHandwriting} onChange={(e) => setEnableHandwriting(e.target.checked)} className="w-4 h-4 text-pink-600 rounded focus:ring-pink-500 cursor-pointer" /><label htmlFor="handwriting_toggle" className="ml-2 text-sm font-medium text-pink-700 cursor-pointer select-none"><i className="fas fa-pen-nib mr-1"></i> Tự động đọc SBD viết tay</label></div>
                                        <div className="grid grid-cols-2 gap-2 mt-3"><button onClick={createSession} className="bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700 transition shadow">Tạo Session</button><button onClick={() => folderRef.current.click()} className="bg-white border border-gray-300 text-gray-700 py-2 rounded font-bold hover:bg-gray-50 transition shadow-sm">Upload File</button><input type="file" multiple ref={folderRef} className="hidden" onChange={e => processImagesPC(Array.from(e.target.files))} /></div></div>
                                    {showQr && <div className="bg-white p-5 rounded-xl text-center border border-green-200 shadow-sm"><div id="qrcode" className="flex justify-center mb-2"></div><p className="text-xs text-green-700 font-bold">Quét để chấm trên Mobile</p></div>}
                                </div>
                                <div className="lg:col-span-8 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col h-[600px]"><div className="p-4 border-b font-bold text-gray-700 flex justify-between bg-gray-50 rounded-t-xl"><span>Kết Quả ({results.length})</span>{results.length > 0 && <button onClick={() => { const ws = XLSX.utils.json_to_sheet(results); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "KQ"); XLSX.writeFile(wb, "KetQua.xlsx") }} className="text-green-600 text-sm hover:bg-green-100 px-2 py-1 rounded transition"><i className="fas fa-file-excel"></i> Excel</button>}</div><div className="flex-1 overflow-auto"><table className="w-full text-left text-sm"><thead className="bg-gray-100 sticky top-0"><tr><th className="p-3">SBD</th><th className="p-3">Mã</th><th className="p-3">Điểm</th><th className="p-3">Ảnh</th></tr></thead><tbody>{results.map((r, i) => (<tr key={i} className="border-b hover:bg-indigo-50"><td className="p-3 font-bold">{r.student_id}</td><td className="p-3">{r.exam_code}</td><td className="p-3 text-indigo-600 font-bold">{r.score}</td><td className="p-3"><button onClick={() => setPreviewImage(r.image_base64)} className="text-blue-500 hover:underline">Xem</button></td></tr>))}</tbody></table></div></div>
                            </div>
                        )}
                        {view === 'history' && (
                            <div className="grid grid-cols-12 gap-6 h-full">
                                <div className="col-span-4 bg-white rounded-xl shadow-sm border overflow-hidden flex flex-col h-[600px]"><div className="p-4 border-b bg-gray-50 font-bold text-gray-700">Danh Sách Đợt</div><div className="flex-1 overflow-auto">{historyList.map(h => (<div key={h.session_id} className="p-3 border-b hover:bg-indigo-50 transition group flex justify-between items-center"><div onClick={() => viewDetail(h.session_id)} className="cursor-pointer flex-1"><div className="font-bold text-indigo-900">{h.session_name}</div><div className="text-xs text-gray-500 mt-1">{new Date(h.created_at).toLocaleString()}</div></div><div className="flex gap-2 opacity-0 group-hover:opacity-100 transition"><button onClick={(e) => editSession(e, h)} className="text-blue-600 hover:text-blue-800" title="Sửa tên"><i className="fas fa-edit"></i></button><button onClick={(e) => deleteSession(e, h.session_id)} className="text-red-600 hover:text-red-800" title="Xóa đợt"><i className="fas fa-trash"></i></button></div></div>))}</div></div>
                                <div className="col-span-8 bg-white rounded-xl shadow-sm border flex flex-col h-[600px]"><div className="p-4 border-b font-bold flex justify-between bg-gray-50 rounded-t-xl"><span>Chi Tiết</span>{historyDetail && <button onClick={() => { const ws = XLSX.utils.json_to_sheet(historyDetail); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "KQ"); XLSX.writeFile(wb, "History.xlsx") }} className="text-green-600 text-sm"><i className="fas fa-download"></i> Tải Excel</button>}</div><div className="flex-1 overflow-auto"><table className="w-full text-left text-sm"><thead className="bg-gray-100 sticky top-0"><tr><th className="p-3">SBD</th><th className="p-3">Điểm</th></tr></thead><tbody>{historyDetail?.map((r, i) => (<tr key={i} className="border-b"><td className="p-3">{r.student_id}</td><td className="p-3 font-bold text-indigo-600">{r.score}</td></tr>))}</tbody></table></div></div>
                            </div>
                        )}
                        {view === 'sheet' && <SheetGenerator />}
                    </div>
                    {previewImage && <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50" onClick={() => setPreviewImage(null)}><img src={`data:image/jpeg;base64,${previewImage}`} className="max-h-full max-w-full rounded shadow-2xl" /></div>}
                </div>
            );
        };

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (err) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-display').style.display = 'block';
            document.getElementById('error-display').innerText = "🔥 CRITICAL ERROR: " + err.message;
        }
    </script>
</body>

</html>
