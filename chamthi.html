<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Phiếu Trả Lời Trắc Nghiệm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #e0e0e0; -webkit-print-color-adjust: exact; }

        /* --- CẤU HÌNH TRANG IN --- */
        @page { size: A4; margin: 0; }
        .sheet-a4 {
            width: 210mm; height: 296mm; background: white; margin: 20px auto;
            position: relative; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        /* --- CẤU TRÚC PHIẾU (ITEM) --- */
        .omr-item {
            position: relative; box-sizing: border-box;
            width: 100%;
        }
        
        /* Container nội dung bên trong để tránh anchor */
        .omr-inner-container {
            margin: 12mm; /* Lề an toàn */
            height: calc(100% - 24mm);
            display: flex; flex-direction: column;
        }

        /* Layout A5 (2 phiếu trên 1 A4) */
        .layout-2up .omr-item { height: 148mm; border-bottom: 1px dashed #ccc; }
        .layout-2up .omr-item:last-child { border-bottom: none; }
        /* Layout A4 (1 phiếu trên 1 A4) */
        .layout-1up .omr-item { height: 296mm; }

        /* --- ĐIỂM ĐỊNH VỊ (ANCHORS) - CỰC KỲ QUAN TRỌNG CHO AI --- */
        .anchor { position: absolute; width: 10px; height: 10px; background: black; z-index: 99; }
        .tl { top: 8mm; left: 8mm; } 
        .tr { top: 8mm; right: 8mm; }
        .bl { bottom: 8mm; left: 8mm; } 
        .br { bottom: 8mm; right: 8mm; }

        /* --- HEADER --- */
        .header-section { border-bottom: 2px solid black; padding-bottom: 5px; margin-bottom: 10px; }
        .header-title h1 { font-size: 16pt; font-weight: 900; text-align: center; text-transform: uppercase; letter-spacing: 1px; line-height: 1.1; }
        
        .info-row { display: flex; gap: 15px; margin-top: 4px; }
        .info-line { display: flex; align-items: flex-end; font-size: 10pt; flex: 1; }
        .info-label { font-weight: bold; white-space: nowrap; margin-right: 5px; font-size: 9pt;}
        .info-dots { border-bottom: 1px dotted #555; flex: 1; height: 16px; }

        /* --- BODY --- */
        .body-section { display: flex; flex: 1; gap: 10px; align-items: stretch; overflow: hidden; }
        
        /* Cột trái: SBD & Mã đề */
        .left-panel { width: 28%; display: flex; flex-direction: column; gap: 8px; }
        .id-box { border: 2px solid black; padding: 5px; border-radius: 4px; flex: 1; display: flex; flex-direction: column; }
        .box-title { font-size: 8pt; font-weight: bold; text-align: center; margin-bottom: 5px; background: #000; color: #fff; padding: 2px 0; }
        
        .grid-bubbles { display: flex; justify-content: space-between; flex: 1; }
        .col-bubble { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        /* Ô viết số ở trên (Hỗ trợ nhận diện kép nếu cần) */
        .write-box { width: 100%; height: 16px; border: 1px solid #333; margin-bottom: 4px; }
        
        /* Bong bóng tô */
        .b { 
            width: 12px; height: 12px; border: 1px solid #333; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 7px; font-weight: 700; margin-bottom: 2px;
            font-family: monospace; transition: background 0.2s;
        }
        /* Bong bóng đáp án */
        .q-b { width: 11px; height: 11px; font-size: 7px; margin-right: 4px; cursor: pointer; }
        .q-b:hover { background: #eee; }

        /* Cột phải: Câu hỏi */
        .right-panel { flex: 1; border: 2px solid black; padding: 5px; border-radius: 4px; position: relative; display: flex; flex-direction: column; }
        .ans-grid { display: flex; flex: 1; height: 100%; }
        /* Dàn đều các cột câu hỏi */
        .ans-col { flex: 1; border-right: 1px dashed #ccc; padding: 0 2px; display: flex; flex-direction: column; justify-content: space-around; }
        .ans-col:last-child { border-right: none; }
        
        .q-row { display: flex; align-items: center; }
        .q-num { width: 20px; font-size: 9pt; font-weight: bold; text-align: right; margin-right: 4px; }
        
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .sheet-a4 { box-shadow: none; margin: 0; page-break-after: always; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Component cột tô số (SBD/Mã đề)
        const BubbleColumn = () => (
            <div className="col-bubble">
                <div className="write-box"></div>
                {Array.from({length: 10}).map((_, i) => <div key={i} className="b">{i}</div>)}
            </div>
        );

        // Component hàng câu hỏi
        const QuestionRow = ({ num }) => (
            <div className="q-row">
                <div className="q-num">{num}</div>
                {['A','B','C','D'].map(opt => <div key={opt} className="b q-b">{opt}</div>)}
            </div>
        );

        // Component Phiếu đơn lẻ
        const OmrItem = ({ type, data }) => {
            const isA5 = type === 'A5'; 
            const totalQ = isA5 ? 30 : 100;
            const cols = isA5 ? 3 : 4; 
            const rowsPerCol = isA5 ? 10 : 25;

            return (
                <div className="omr-item">
                    {/* 4 GÓC ĐỊNH VỊ (ANCHORS) - KHÔNG ĐƯỢC XOÁ */}
                    <div className="anchor tl"></div><div className="anchor tr"></div>
                    <div className="anchor bl"></div><div className="anchor br"></div>

                    <div className="omr-inner-container">
                        {/* Header */}
                        <div className="header-section">
                            <div className="header-title">
                                <h1>PHIẾU TRẢ LỜI TRẮC NGHIỆM</h1>
                            </div>
                            <div className="flex flex-col gap-1">
                                <div className="info-row">
                                    <div className="info-line flex-[2]"><span className="info-label">Họ tên thí sinh:</span><div className="info-dots"></div></div>
                                    <div className="info-line flex-1"><span className="info-label">SBD (Chữ):</span><div className="info-dots"></div></div>
                                </div>
                                <div className="info-row">
                                    <div className="info-line flex-1"><span className="info-label">Lớp:</span><div className="info-dots"></div></div>
                                    <div className="info-line flex-1"><span className="info-label">Ngày thi:</span><div className="info-dots"></div></div>
                                    <div className="info-line flex-1"><span className="info-label">Phòng:</span><div className="info-dots"></div></div>
                                </div>
                                <div className="info-row mt-2 pt-1 border-t border-gray-300">
                                    <div className="info-line flex-[2]"><span className="info-label">Môn thi:</span><div className="info-dots font-bold pl-2">{data.subject}</div></div>
                                    <div className="info-line flex-1"><span className="info-label text-red-600">ĐIỂM:</span><div className="info-dots"></div></div>
                                    <div className="info-line flex-1"><span className="info-label text-gray-500">Giám khảo:</span><div className="info-dots"></div></div>
                                </div>
                            </div>
                        </div>

                        {/* Body */}
                        <div className="body-section">
                            {/* Cột trái: SBD & Mã đề */}
                            <div className="left-panel">
                                <div className="id-box">
                                    <div className="box-title">SỐ BÁO DANH</div>
                                    <div className="grid-bubbles">
                                        {Array.from({length: 6}).map((_,i) => <BubbleColumn key={i}/>)}
                                    </div>
                                </div>
                                <div className="id-box">
                                    <div className="box-title">MÃ ĐỀ</div>
                                    <div className="grid-bubbles">
                                        {Array.from({length: 3}).map((_,i) => <BubbleColumn key={i}/>)}
                                    </div>
                                </div>
                            </div>

                            {/* Cột phải: Câu hỏi */}
                            <div className="right-panel">
                                <div className="box-title" style={{background:'white', color:'black', borderBottom:'1px solid #000', marginBottom:'5px'}}>
                                    PHẦN TRẢ LỜI (Tô kín ô tròn)
                                </div>
                                <div className="ans-grid">
                                    {Array.from({length: cols}).map((_, cIdx) => (
                                        <div key={cIdx} className="ans-col">
                                            {Array.from({length: rowsPerCol}).map((_, rIdx) => {
                                                const qNum = cIdx * rowsPerCol + rIdx + 1;
                                                return qNum <= totalQ ? <QuestionRow key={qNum} num={qNum} /> : null;
                                            })}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('30'); // '30' hoặc '100'
            const [subject, setSubject] = useState("TOÁN"); 

            return (
                <div className="min-h-screen flex flex-col bg-gray-100">
                    {/* Toolbar */}
                    <div className="bg-indigo-900 text-white p-3 shadow-lg flex flex-wrap justify-between items-center no-print z-50 sticky top-0">
                        <div className="flex items-center gap-4">
                            <h2 className="font-bold text-lg hidden md:block uppercase tracking-wide">
                                <i className="fas fa-print mr-2 text-yellow-400"></i>Tạo Phiếu OMR
                            </h2>
                            <div className="flex bg-indigo-800 rounded-md p-1 gap-1">
                                <button onClick={() => setMode('30')} className={`px-3 py-1.5 rounded text-sm font-bold transition ${mode==='30' ? 'bg-white text-indigo-900 shadow' : 'text-indigo-300 hover:text-white'}`}>
                                    A5 (30 Câu)
                                </button>
                                <button onClick={() => setMode('100')} className={`px-3 py-1.5 rounded text-sm font-bold transition ${mode==='100' ? 'bg-white text-indigo-900 shadow' : 'text-indigo-300 hover:text-white'}`}>
                                    A4 (100 Câu)
                                </button>
                            </div>
                            <div className="flex items-center gap-2 bg-indigo-800 p-1 rounded-md px-3">
                                <span className="text-xs font-bold text-indigo-300 uppercase">Môn:</span>
                                <input type="text" value={subject} onChange={(e)=>setSubject(e.target.value.toUpperCase())} className="bg-transparent border-b border-indigo-400 text-white font-bold w-32 focus:outline-none focus:border-yellow-400 text-sm uppercase placeholder-indigo-400" placeholder="NHẬP MÔN..."/>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={()=>window.location.href='index.html'} className="bg-indigo-700 hover:bg-indigo-600 px-4 py-2 rounded font-bold text-sm transition flex items-center gap-2"><i className="fas fa-home"></i> <span className="hidden md:inline">Trang chủ</span></button>
                            <button onClick={()=>window.print()} className="bg-yellow-500 hover:bg-yellow-400 text-indigo-900 px-5 py-2 rounded font-bold shadow text-sm transition flex items-center gap-2 animate-pulse"><i className="fas fa-print"></i> IN PHIẾU</button>
                        </div>
                    </div>

                    {/* Preview Area */}
                    <div className="flex-1 p-4 md:p-8 overflow-auto flex justify-center items-start">
                        <div className={`sheet-a4 ${mode==='30' ? 'layout-2up' : 'layout-1up'}`}>
                            {mode === '30' ? (
                                <>
                                    <OmrItem type="A5" data={{subject}} />
                                    <OmrItem type="A5" data={{subject}} />
                                    <div className="absolute w-full border-b-2 border-dashed border-gray-400 top-1/2 left-0 flex justify-center items-center no-print z-20">
                                        <span className="bg-white px-2 text-[10px] text-gray-500 font-mono border rounded">✄ CẮT ĐÔI (KHỔ A5)</span>
                                    </div>
                                </>
                            ) : (
                                <OmrItem type="A4" data={{subject}} />
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
