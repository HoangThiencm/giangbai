<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chấm Thi OMR Pro - Print Layout Fixed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Roboto+Mono:wght@500&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #e5e7eb; }

        /* --- CẤU HÌNH IN ẤN TUYỆT ĐỐI --- */
        @page { 
            size: A4; 
            margin: 0; /* Xóa lề trình duyệt */
        }

        .sheet-a4 {
            width: 210mm; 
            height: 296mm; /* Chuẩn A4 */
            background: white; 
            margin: 20px auto;
            position: relative; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden; /* Chặn tràn trang */
            page-break-after: always;
        }

        /* Layout A5: Sử dụng Grid để chia đôi chính xác */
        .layout-2up {
            display: grid;
            grid-template-rows: 1fr 1fr; /* Chia đôi chiều cao đều nhau */
            height: 100%;
        }
        
        .layout-2up .omr-item { 
            border-bottom: 1px dashed #999; 
            overflow: hidden;
            height: 100%; /* Lấp đầy grid cell */
            position: relative;
        }
        
        /* Layout A4 full */
        .layout-1up { display: block; height: 100%; }
        .layout-1up .omr-item { height: 100%; position: relative; }

        /* Nội dung bên trong: Padding an toàn */
        .omr-inner-container {
            padding: 8mm 10mm; /* Lề: Trên dưới 8mm, Trái phải 10mm */
            height: 100%;
            display: flex; 
            flex-direction: column;
            box-sizing: border-box;
            justify-content: space-between;
        }

        /* Anchors */
        .anchor { position: absolute; width: 10px; height: 10px; background: black; z-index: 99; }
        .tl { top: 6mm; left: 6mm; } .tr { top: 6mm; right: 6mm; }
        .bl { bottom: 6mm; left: 6mm; } .br { bottom: 6mm; right: 6mm; }

        /* --- GIAO DIỆN PHIẾU --- */
        .header-section { border-bottom: 2px solid black; padding-bottom: 4px; margin-bottom: 4px; flex-shrink: 0; }
        .header-title h1 { font-size: 15pt; font-weight: 900; text-align: center; text-transform: uppercase; line-height: 1.1; margin: 0;}
        
        .info-row { display: flex; gap: 10px; margin-top: 2px; align-items: flex-end;}
        .info-line { display: flex; align-items: flex-end; font-size: 9pt; flex: 1; white-space: nowrap; }
        .info-label { font-weight: bold; margin-right: 4px; font-size: 9pt;}
        .info-dots { border-bottom: 1px dotted #000; flex: 1; height: 14px; }

        .body-section { 
            display: flex; 
            flex: 1; 
            gap: 10px; 
            align-items: stretch; 
            overflow: hidden; 
            padding-top: 4px;
        }
        
        .left-panel { width: 28%; display: flex; flex-direction: column; gap: 6px; }
        .id-box { border: 2px solid black; padding: 4px; border-radius: 4px; flex: 1; display: flex; flex-direction: column; }
        .box-title { font-size: 8pt; font-weight: bold; text-align: center; background: #000; color: #fff; padding: 2px 0; margin-bottom: 4px; }
        
        .grid-bubbles { display: flex; justify-content: space-around; height: 100%; align-items: flex-start; }
        .col-bubble { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 98%; }
        .write-box { width: 100%; height: 14px; border: 1px solid #333; margin-bottom: 2px; }
        .b { width: 12px; height: 12px; border: 1px solid #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 7px; font-weight: 700; font-family: 'Roboto Mono', monospace; line-height: 1; }

        .right-panel { flex: 1; border: 2px solid black; padding: 6px; border-radius: 4px; display: flex; flex-direction: column; }
        .ans-grid { display: flex; flex: 1; height: 100%; }
        .ans-col { flex: 1; border-right: 1px dashed #999; padding: 0 6px; display: flex; flex-direction: column; justify-content: space-between; }
        .ans-col:last-child { border-right: none; }
        
        .q-row { display: flex; align-items: center; justify-content: flex-end; }
        .q-num { width: 20px; font-size: 10pt; font-weight: bold; text-align: right; margin-right: 4px; line-height: 1; }
        .q-b { width: 13px; height: 13px; font-size: 8px; font-weight: bold; margin-right: 3px; cursor: pointer; border: 1px solid #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .q-b:hover { background-color: #ddd; }

        /* --- UI TIỆN ÍCH --- */
        /* Loading AI */
        .ai-loading {
            position: absolute; inset: 0;
            background: rgba(255,255,255,0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 20; border-radius: 0.5rem;
            border: 2px solid #4f46e5;
        }
        .pulse-ring {
            width: 40px; height: 40px; border-radius: 50%;
            border: 4px solid #4f46e5;
            animation: pulse-ring 1.2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring { 0% { transform: scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }

        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .sheet-a4 { box-shadow: none; margin: 0; width: 210mm; height: 296mm; page-break-after: always; }
            @page { margin: 0; }
        }
        
        .tab-btn { padding: 8px 16px; border-radius: 8px; font-weight: bold; transition: all 0.2s; }
        .tab-active { background: #4f46e5; color: white; }
        .tab-inactive { color: #6b7280; hover:bg-gray-100; }
        #error-display { display: none; position: fixed; top: 0; left: 0; width: 100%; background: #fee2e2; color: #991b1b; padding: 15px; z-index: 9999; border-bottom: 3px solid #b91c1c; text-align: center; font-weight: bold;}
    </style>
    <script>
        window.onerror = function(msg, url, line) {
            document.getElementById('loading').style.display = 'none';
            var errDiv = document.getElementById('error-display');
            errDiv.style.display = 'block';
            errDiv.innerText = "⚠️ LỖI: " + msg + " (Dòng " + line + ")";
            return false;
        };
    </script>
</head>
<body>
    <div id="error-display"></div>
    <div id="loading" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="loader mb-4"></div>
        <p class="text-gray-600">Đang tải ứng dụng...</p>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- UTILS ---
        const dataURLtoBlob = (dataurl) => { try { var arr=dataurl.split(','),mime=arr[0].match(/:(.*?);/)[1],bstr=atob(arr[1]),n=bstr.length,u8arr=new Uint8Array(n);while(n--)u8arr[n]=bstr.charCodeAt(n);return new Blob([u8arr],{type:mime});}catch(e){return null;}}
        
        const compressImage = (file, maxWidth=1000, quality=0.7) => { 
            return new Promise((resolve)=>{ 
                if(!file || !file.type.startsWith('image/')){resolve(file);return;} 
                const reader=new FileReader();
                reader.readAsDataURL(file);
                reader.onload=(event)=>{
                    const img=new Image();
                    img.src=event.target.result;
                    img.onload=()=>{
                        try{
                            const canvas=document.createElement('canvas');
                            let w=img.width,h=img.height;
                            if(w>maxWidth){h=Math.round((h*maxWidth)/w);w=maxWidth;}
                            canvas.width=w;canvas.height=h;
                            const ctx=canvas.getContext('2d');
                            ctx.drawImage(img,0,0,w,h);
                            const blob=dataURLtoBlob(canvas.toDataURL('image/jpeg',quality));
                            resolve(blob?new File([blob],file.name,{type:'image/jpeg'}):file);
                        }catch(e){resolve(file);}
                    };
                    img.onerror=()=>resolve(file);
                };
                reader.onerror=()=>resolve(file);
            });
        };

        const parseMultiKey = (text) => { 
            if(!text) return {};
            const keys={}; 
            text.split('\n').forEach(line=>{ 
                line=line.trim(); if(!line)return; 
                let code="DEFAULT", ans=line; 
                if(line.includes(':')){const p=line.split(':');code=p[0].trim();ans=p[1].trim();} 
                if(!keys[code])keys[code]={}; 
                const pairs=ans.toUpperCase().split(/\s+/); 
                pairs.forEach(p=>{
                    const num=p.match(/^\d+/);
                    const char=p.match(/[A-D]$/);
                    if(num&&char) keys[code][parseInt(num[0])]=char[0];
                });
            }); 
            return keys; 
        };

        const getGlobalKeys = () => { try { return JSON.parse(localStorage.getItem('global_gemini_keys')) || []; } catch { return []; } };
        const getRandomKey = () => { const k=getGlobalKeys(); return k.length?k[Math.floor(Math.random()*k.length)]:null; };

        // --- SHEET COMPONENTS ---
        const BubbleColumn = () => (<div className="col-bubble"><div className="write-box"></div>{Array.from({length: 10}).map((_, i) => <div key={i} className="b">{i}</div>)}</div>);
        const QuestionRow = ({ num }) => (<div className="q-row"><div className="q-num">{num}</div>{['A','B','C','D'].map(opt => <div key={opt} className="q-b">{opt}</div>)}</div>);

        const OmrItem = ({ type, data }) => {
            const isA5 = type === 'A5'; 
            const totalQ = isA5 ? 30 : 100;
            const cols = isA5 ? 3 : 4; 
            const rowsPerCol = isA5 ? 10 : 25;

            return (
                <div className="omr-item">
                    <div className="anchor tl"></div><div className="anchor tr"></div><div className="anchor bl"></div><div className="anchor br"></div>
                    <div className="omr-inner-container">
                        <div className="header-section">
                            <div className="header-title"><h1>PHIẾU TRẢ LỜI TRẮC NGHIỆM</h1></div>
                            <div className="flex flex-col gap-1">
                                <div className="info-row"><div className="info-line flex-[2]"><span className="info-label">Họ tên:</span><div className="info-dots"></div></div><div className="info-line flex-1"><span className="info-label">SBD:</span><div className="info-dots"></div></div></div>
                                <div className="info-row mt-1 pt-1 border-t border-gray-300"><div className="info-line flex-[2]"><span className="info-label">Môn:</span><div className="info-dots font-bold pl-2">{data.subject}</div></div><div className="info-line flex-1"><span className="info-label text-red-600">ĐIỂM:</span><div className="info-dots"></div></div></div>
                            </div>
                        </div>
                        <div className="body-section">
                            <div className="left-panel">
                                <div className="id-box"><div className="box-title">SỐ BÁO DANH</div><div className="grid-bubbles">{Array.from({length: 6}).map((_,i) => <BubbleColumn key={i}/>)}</div></div>
                                <div className="id-box"><div className="box-title">MÃ ĐỀ</div><div className="grid-bubbles">{Array.from({length: 3}).map((_,i) => <BubbleColumn key={i}/>)}</div></div>
                            </div>
                            <div className="right-panel">
                                <div className="box-title" style={{background:'white', color:'black', borderBottom:'1px solid #000', marginBottom:'2px'}}>PHẦN TRẢ LỜI (Tô kín ô tròn)</div>
                                <div className="ans-grid">
                                    {Array.from({length: cols}).map((_, cIdx) => (
                                        <div key={cIdx} className="ans-col">
                                            {Array.from({length: rowsPerCol}).map((_, rIdx) => {
                                                const qNum = cIdx * rowsPerCol + rIdx + 1;
                                                return qNum <= totalQ ? <QuestionRow key={qNum} num={qNum} /> : null;
                                            })}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const DEFAULT_BACKEND = "https://hoangthiencm-giangbai.hf.space";
            const [view, setView] = useState('grading');
            const [backendUrl, setBackendUrl] = useState(() => localStorage.getItem("omr_backend_url") || DEFAULT_BACKEND);
            const [mobileMode, setMobileMode] = useState(false);
            
            // States
            const [sessionName, setSessionName] = useState("");
            const [inputText, setInputText] = useState("");
            const [sessionId, setSessionId] = useState(null);
            const [results, setResults] = useState([]);
            const [showQr, setShowQr] = useState(false);
            const [historyList, setHistoryList] = useState([]);
            const [historyDetail, setHistoryDetail] = useState(null);
            const [sheetMode, setSheetMode] = useState('30');
            const [subject, setSubject] = useState("TOÁN");
            const [mobileStatus, setMobileStatus] = useState("");
            const [processing, setProcessing] = useState(false);
            const [previewImage, setPreviewImage] = useState(null);
            const [aiReading, setAiReading] = useState(false);
            
            const folderRef = useRef(null);
            const keyImageRef = useRef(null);
            const pollRef = useRef(null);

            useEffect(() => {
                document.getElementById('loading').style.display = 'none';
                const params = new URLSearchParams(window.location.search);
                if (params.get('mode') === 'mobile') setMobileMode(true);
                if (params.get('session')) setSessionId(params.get('session'));
            }, []);

            const saveConfig = (url) => {
                let clean = url.trim().replace(/\/$/, "");
                if (!clean.startsWith("http")) clean = "https://" + clean;
                setBackendUrl(clean); localStorage.setItem("omr_backend_url", clean);
                alert("Đã lưu cấu hình!");
            };

            // --- AI KEY READER ---
            const callGeminiVision = async (base64) => {
                const key = getRandomKey();
                if (!key) { alert("Chưa nạp API Key ở trang chủ!"); return; }
                setAiReading(true);
                try {
                    const prompt = "Hãy trích xuất đáp án trắc nghiệm từ ảnh này. Trả về dạng chuỗi: 1A 2B 3C 4D... (Số câu và chữ cái). Chỉ trả về nội dung text, không giải thích.";
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({contents:[{parts:[{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: base64}}]}]})
                    });
                    const d = await res.json();
                    if(d.candidates){
                        let txt = d.candidates[0].content.parts[0].text.replace(/[*#]/g,'').trim();
                        setInputText(prev => (prev ? prev + "\n" + txt : txt));
                    }
                } catch(e) { alert("Lỗi AI: " + e.message); } 
                finally { setAiReading(false); }
            };

            const handleKeyImageUpload = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const r = new FileReader();
                r.onload = (ev) => callGeminiVision(ev.target.result.split(',')[1]);
                r.readAsDataURL(file);
            };

            const handlePaste = (e) => {
                const items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf("image") !== -1) {
                        e.preventDefault();
                        const blob = items[i].getAsFile();
                        const r = new FileReader();
                        r.onload = (ev) => callGeminiVision(ev.target.result.split(',')[1]);
                        r.readAsDataURL(blob);
                        return;
                    }
                }
            };

            // --- LOGIC ---
            const createSession = async () => {
                if (!sessionName || !inputText) return alert("Nhập đủ thông tin!");
                const fd = new FormData(); fd.append("name", sessionName); fd.append("answer_key_json", JSON.stringify(parseMultiKey(inputText)));
                try {
                    const res = await fetch(`${backendUrl}/api/omr/create_session`, { method: 'POST', body: fd });
                    if(!res.ok) throw new Error("Lỗi kết nối Server");
                    const d = await res.json();
                    setSessionId(d.session_id); setShowQr(true);
                    setTimeout(() => {
                        document.getElementById("qrcode").innerHTML = "";
                        new QRCode(document.getElementById("qrcode"), { text: `${window.location.href.split('?')[0]}?mode=mobile&session=${d.session_id}`, width: 200, height: 200 });
                    }, 100);
                } catch(e) { alert("Lỗi: " + e.message); }
            };

            const loadHistory = async () => { try { const res = await fetch(`${backendUrl}/api/omr/history`); const d=await res.json(); if(Array.isArray(d)) setHistoryList(d); } catch(e){} };
            const viewDetail = async (sid) => { try { const res = await fetch(`${backendUrl}/api/omr/history/${sid}`); const d=await res.json(); if(Array.isArray(d)) setHistoryDetail(d); } catch(e){} };

            const processImagesPC = async (files) => {
                if(!files.length) return; setProcessing(true);
                const keys = parseMultiKey(inputText);
                for(let f of files) {
                    let fileToSend = await compressImage(f);
                    const fd = new FormData(); fd.append("file", fileToSend); fd.append("answer_key_json", JSON.stringify(keys));
                    try { 
                        const res = await fetch(`${backendUrl}/api/omr/grade`, { method: 'POST', body: fd }); 
                        const data = await res.json();
                        setResults(p => [{filename: f.name, ...data}, ...p]); 
                    } catch(e) {}
                }
                setProcessing(false);
            };

            const handleMobileUpload = async (files) => {
                if(!files.length) return; setProcessing(true); setMobileStatus("Đang gửi...");
                const sid = new URLSearchParams(window.location.search).get('session');
                for(let f of files) {
                    try {
                        let fileToSend = await compressImage(f);
                        const fd = new FormData(); fd.append("file", fileToSend); fd.append("session_id", sid);
                        const res = await fetch(`${backendUrl}/api/omr/grade_mobile`, { method: 'POST', body: fd });
                        const d = await res.json();
                        setMobileStatus(res.ok ? `✓ Điểm: ${d.score}` : `⚠ ${d.error}`);
                    } catch(e) { setMobileStatus("Lỗi Mạng"); }
                }
                setProcessing(false);
            };

            const historyItems = historyDetail ? historyDetail.map((r, i) => (
                <tr key={i} className="border-b"><td className="p-3">{r.student_id}</td><td className="p-3 font-bold">{r.score}</td></tr>
            )) : null;

            useEffect(() => {
                if(view === 'history') loadHistory();
                if(sessionId && !mobileMode) { 
                    pollRef.current = setInterval(async () => { 
                        try { 
                            const res = await fetch(`${backendUrl}/api/omr/poll_results/${sessionId}`); 
                            const d = await res.json(); 
                            if(d && d.length) setResults(p => [...d, ...p]); 
                        } catch(e){} 
                    }, 2000); 
                }
                return () => clearInterval(pollRef.current);
            }, [view, sessionId, backendUrl, mobileMode]);

            if (mobileMode) return (
                <div className="bg-gray-900 min-h-screen text-white p-6 flex flex-col items-center justify-center text-center">
                    <h1 className="text-2xl font-bold mb-4">Camera Chấm Thi</h1>
                    {mobileStatus && <div className="mb-6 p-3 bg-green-600 rounded font-bold">{mobileStatus}</div>}
                    <input type="file" accept="image/*" capture="environment" className="hidden" id="cam" onChange={(e)=>handleMobileUpload(e.target.files)}/>
                    <label htmlFor="cam" className="w-64 h-64 rounded-full border-4 border-white flex flex-col items-center justify-center shadow-xl cursor-pointer bg-indigo-600">
                        {processing ? <div className="loader"></div> : <><i className="fas fa-camera text-6xl mb-2"></i><span className="font-bold text-xl">CHỤP</span></>}
                    </label>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col bg-gray-50 font-sans">
                    <div className="bg-white border-b px-6 py-3 flex justify-between items-center shadow-sm sticky top-0 z-20 no-print">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 text-white w-8 h-8 rounded flex items-center justify-center font-bold">OMR</div>
                            <h1 className="font-bold text-lg text-indigo-900">Quản Lý Chấm Thi</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={()=>window.location.href='index.html'} className="tab-btn text-gray-600 hover:bg-gray-100"><i className="fas fa-home"></i></button>
                            <div className="w-px bg-gray-300 my-1"></div>
                            <button onClick={()=>setView('grading')} className={`tab-btn ${view==='grading'?'tab-active':'tab-inactive'}`}><i className="fas fa-play-circle mr-2"></i>Chấm Thi</button>
                            <button onClick={()=>setView('history')} className={`tab-btn ${view==='history'?'tab-active':'tab-inactive'}`}><i className="fas fa-history mr-2"></i>Lịch Sử</button>
                            <button onClick={()=>setView('sheet')} className={`tab-btn ${view==='sheet'?'tab-active':'tab-inactive'}`}><i className="fas fa-print mr-2"></i>In Phiếu</button>
                        </div>
                    </div>

                    <div className="flex-1 p-6 max-w-7xl mx-auto w-full overflow-hidden">
                        {view === 'grading' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
                                <div className="lg:col-span-4 space-y-4">
                                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 relative">
                                        {aiReading && (
                                            <div className="ai-loading">
                                                <div className="pulse-ring"></div>
                                                <span className="mt-3 text-indigo-700 font-bold text-sm animate-pulse">AI Đang Đọc Ảnh...</span>
                                            </div>
                                        )}
                                        <h3 className="font-bold text-gray-800 mb-3">1. Tạo Đợt Chấm</h3>
                                        <input value={sessionName} onChange={e=>setSessionName(e.target.value)} className="w-full border p-2 rounded mb-2 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Tên đợt (VD: Toán 12...)"/>
                                        <div className="relative">
                                            <textarea value={inputText} onChange={e=>setInputText(e.target.value)} onPaste={handlePaste} className="w-full border p-2 rounded h-40 font-mono text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Nhập đáp án (101: 1A...) hoặc Dán ảnh (Ctrl+V)..."></textarea>
                                            <button onClick={()=>keyImageRef.current.click()} className="absolute bottom-2 right-2 bg-gray-100 hover:bg-gray-200 text-gray-700 px-2 py-1 rounded text-xs font-bold border border-gray-300 shadow-sm flex items-center gap-1"><i className="fas fa-image"></i> Ảnh Key</button>
                                            <input type="file" ref={keyImageRef} className="hidden" accept="image/*" onChange={handleKeyImageUpload}/>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2 mt-3">
                                            <button onClick={createSession} className="bg-indigo-600 text-white py-2 rounded font-bold hover:bg-indigo-700 transition shadow">Tạo Session</button>
                                            <button onClick={()=>folderRef.current.click()} className="bg-white border border-gray-300 text-gray-700 py-2 rounded font-bold hover:bg-gray-50 transition shadow-sm">Upload File</button>
                                            <input type="file" multiple ref={folderRef} className="hidden" onChange={e=>processImagesPC(Array.from(e.target.files))}/>
                                        </div>
                                    </div>
                                    {showQr && <div className="bg-white p-5 rounded-xl text-center border border-green-200 shadow-sm"><div id="qrcode" className="flex justify-center mb-2"></div><p className="text-xs text-green-700 font-bold">Quét để chấm trên Mobile</p></div>}
                                </div>
                                <div className="lg:col-span-8 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col h-[600px]">
                                    <div className="p-4 border-b font-bold text-gray-700 flex justify-between bg-gray-50 rounded-t-xl">
                                        <span>Kết Quả ({results.length})</span>
                                        {results.length>0 && <button onClick={()=>{const ws=XLSX.utils.json_to_sheet(results);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"KQ");XLSX.writeFile(wb,"KetQua.xlsx")}} className="text-green-600 text-sm hover:bg-green-100 px-2 py-1 rounded transition"><i className="fas fa-file-excel"></i> Excel</button>}
                                    </div>
                                    <div className="flex-1 overflow-auto"><table className="w-full text-left text-sm"><thead className="bg-gray-100 sticky top-0"><tr><th className="p-3">SBD</th><th className="p-3">Mã</th><th className="p-3">Điểm</th><th className="p-3">Ảnh</th></tr></thead><tbody>{results.map((r,i)=>(<tr key={i} className="border-b hover:bg-indigo-50"><td className="p-3 font-bold">{r.student_id}</td><td className="p-3">{r.exam_code}</td><td className="p-3 text-indigo-600 font-bold">{r.score}</td><td className="p-3"><button onClick={()=>setPreviewImage(r.image_base64)} className="text-blue-500 hover:underline">Xem</button></td></tr>))}</tbody></table></div>
                                </div>
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="grid grid-cols-12 gap-6 h-full">
                                <div className="col-span-4 bg-white rounded-xl shadow-sm border overflow-hidden flex flex-col h-[600px]">
                                    <div className="p-4 border-b bg-gray-50 font-bold text-gray-700">Danh Sách Đợt</div>
                                    <div className="flex-1 overflow-auto">{historyList.map(h=>(<div key={h.session_id} onClick={()=>viewDetail(h.session_id)} className="p-3 border-b cursor-pointer hover:bg-indigo-50 transition"><div className="font-bold text-indigo-900">{h.session_name}</div><div className="text-xs text-gray-500 mt-1">{new Date(h.created_at).toLocaleString()}</div></div>))}</div>
                                </div>
                                <div className="col-span-8 bg-white rounded-xl shadow-sm border flex flex-col h-[600px]">
                                    <div className="p-4 border-b font-bold flex justify-between bg-gray-50 rounded-t-xl"><span>Chi Tiết</span>{historyDetail && <button onClick={()=>{const ws=XLSX.utils.json_to_sheet(historyDetail);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"KQ");XLSX.writeFile(wb,"History.xlsx")}} className="text-green-600 text-sm"><i className="fas fa-download"></i> Tải Excel</button>}</div>
                                    <div className="flex-1 overflow-auto"><table className="w-full text-left text-sm"><thead className="bg-gray-100 sticky top-0"><tr><th className="p-3">SBD</th><th className="p-3">Điểm</th></tr></thead><tbody>{historyItems}</tbody></table></div>
                                </div>
                            </div>
                        )}

                        {view === 'sheet' && (
                            <div className="flex flex-col h-full">
                                <div className="bg-white p-3 rounded-lg shadow mb-4 flex gap-4 items-center no-print border border-gray-200">
                                    <button onClick={()=>setSheetMode('30')} className={`px-3 py-1 rounded font-bold transition ${sheetMode==='30'?'bg-indigo-600 text-white shadow':'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}>A5 (30 Câu)</button>
                                    <button onClick={()=>setSheetMode('100')} className={`px-3 py-1 rounded font-bold transition ${sheetMode==='100'?'bg-indigo-600 text-white shadow':'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}>A4 (100 Câu)</button>
                                    <input value={subject} onChange={e=>setSubject(e.target.value.toUpperCase())} className="border p-1 rounded px-3 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Môn thi..."/>
                                    <button onClick={()=>window.print()} className="ml-auto bg-yellow-500 text-indigo-900 px-4 py-1 rounded font-bold hover:bg-yellow-400 transition shadow"><i className="fas fa-print mr-1"></i> IN PHIẾU</button>
                                </div>
                                <div className="flex-1 bg-gray-300 p-8 overflow-auto flex justify-center">
                                    <div className={`sheet-a4 ${sheetMode==='30'?'layout-2up':'layout-1up'}`}>
                                        {sheetMode === '30' ? <><OmrItem type="A5" data={{subject}}/><OmrItem type="A5" data={{subject}}/></> : <OmrItem type="A4" data={{subject}}/>}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    {previewImage && <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50" onClick={()=>setPreviewImage(null)}><img src={`data:image/jpeg;base64,${previewImage}`} className="max-h-full max-w-full rounded shadow-2xl"/></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
