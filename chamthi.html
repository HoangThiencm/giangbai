<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chấm Thi OMR Pro - Smart Sheet</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; touch-action: manipulation; }
        .loader { border: 3px solid #e5e7eb; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* OMR Base */
        .sheet-container-a4 { width: 210mm; height: 297mm; background: white; margin: 0 auto; position: relative; box-shadow: 0 0 10px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Layout Modes */
        .layout-1up { padding: 10mm; display: flex; } /* 1 phiếu A4 */
        .layout-2up { display: flex; flex-direction: column; } /* 2 phiếu A5 */
        .layout-4up { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; } /* 4 phiếu A6 */

        /* Individual Sheet Item */
        .omr-item { position: relative; box-sizing: border-box; border: 1px dashed #e5e7eb; padding: 5mm; display: flex; flex-direction: column; }
        .layout-1up .omr-item { width: 100%; height: 100%; border: none; padding: 0; }
        .layout-2up .omr-item { width: 100%; height: 50%; border-bottom: 2px dashed #999; }
        .layout-4up .omr-item { width: 100%; height: 100%; border-right: 1px dashed #ccc; border-bottom: 1px dashed #ccc; }

        /* Anchors (Định vị 4 góc cho TỪNG phiếu) */
        .anchor { position: absolute; width: 12px; height: 12px; background: black; z-index: 10; }
        .tl { top: 5mm; left: 5mm; } .tr { top: 5mm; right: 5mm; }
        .bl { bottom: 5mm; left: 5mm; } .br { bottom: 5mm; right: 5mm; }

        /* Nội dung bên trong */
        .omr-header { border-bottom: 2px solid black; padding-bottom: 5px; margin-bottom: 5px; display: flex; align-items: center; }
        .omr-title h1 { font-size: 11pt; font-weight: 900; margin: 0; text-transform: uppercase; }
        .field-row { display: flex; align-items: baseline; margin-bottom: 2px; font-size: 10px; }
        .field-label { font-weight: bold; white-space: nowrap; margin-right: 5px; }
        .field-dots { border-bottom: 1px dotted #000; flex: 1; }

        /* Vùng tô SBD/Mã đề */
        .id-section { display: flex; gap: 10px; margin-top: 5px; font-size: 9px; }
        .id-block { display: flex; flex-direction: column; align-items: center; border: 1px solid black; padding: 2px; }
        .id-title { writing-mode: vertical-rl; text-orientation: mixed; font-weight: bold; font-size: 8px; letter-spacing: 2px; transform: rotate(180deg); margin-bottom: 5px;}
        .col-group { display: flex; gap: 2px; }
        .bubble-col { display: flex; flex-direction: column; align-items: center; }
        .write-box { width: 12px; height: 14px; border: 1px solid black; margin-bottom: 2px; }
        .bubble { width: 10px; height: 10px; border: 1px solid black; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 7px; margin-bottom: 1px; line-height: 1; }
        
        /* Vùng câu hỏi */
        .questions-area { flex: 1; margin-top: 5px; display: grid; grid-auto-flow: column; gap: 5px; align-items: start; }
        .q-col { border-right: 1px dotted #ccc; padding-right: 2px; }
        .q-row { display: flex; align-items: center; font-size: 9px; margin-bottom: 1px; }
        .q-num { width: 15px; text-align: right; font-weight: bold; margin-right: 2px; }
        .q-opts { display: flex; gap: 2px; }
        .q-bubble { width: 10px; height: 10px; border: 1px solid black; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 6px; }

        @media print { 
            body * { visibility: hidden; } 
            #print-area, #print-area * { visibility: visible; } 
            #print-area { position: absolute; left: 0; top: 0; width: 100%; height: 100%; } 
            .no-print { display: none !important; } 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const DEFAULT_BACKEND_URL = "https://hoangthiencm-giangbai.hf.space"; 

        // --- COMPONENTS ---
        const OmrItem = ({ config, questionStart, questionEnd }) => {
            const renderBubbles = (n) => Array.from({length: n}, (_, i) => <div key={i} className="bubble">{i}</div>);
            const renderQOpts = () => ['A','B','C','D'].map(c => <div key={c} className="q-bubble">{c}</div>);

            // Tính toán cột câu hỏi
            const qCount = questionEnd - questionStart + 1;
            const cols = Math.ceil(qCount / 10); // Mỗi cột 10 câu (chuẩn A6)

            return (
                <div className="omr-item">
                    {/* 4 Góc Định Vị */}
                    <div className="anchor tl"></div><div className="anchor tr"></div>
                    <div className="anchor bl"></div><div className="anchor br"></div>

                    {/* Header */}
                    <div className="omr-header">
                        <div className="flex-1">
                            <div className="omr-title">
                                <h1>PHIẾU TRẢ LỜI TRẮC NGHIỆM</h1>
                            </div>
                            <div className="mt-2">
                                <div className="field-row"><span className="field-label">Họ và tên:</span><div className="field-dots"></div></div>
                                <div className="field-row"><span className="field-label">Lớp:</span><div className="field-dots"></div><span className="field-label ml-2">Ngày thi:</span><div className="field-dots"></div></div>
                                <div className="field-row"><span className="field-label">Môn thi:</span><div className="field-dots">{config.subject}</div></div>
                            </div>
                        </div>
                    </div>

                    {/* Body: SBD + Mã Đề + Câu Hỏi */}
                    <div className="flex gap-2 h-full">
                        {/* Cột trái: SBD & Mã Đề */}
                        <div className="flex gap-1 shrink-0">
                            {/* SBD */}
                            <div className="id-block">
                                <div className="col-group">
                                    <div className="id-title">SỐ BÁO DANH</div>
                                    {Array.from({length: 6}).map((_, i) => (
                                        <div key={i} className="bubble-col">
                                            <div className="write-box"></div>
                                            {renderBubbles(10)}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            {/* Mã Đề */}
                            <div className="id-block">
                                <div className="col-group">
                                    <div className="id-title">MÃ ĐỀ</div>
                                    {Array.from({length: 3}).map((_, i) => (
                                        <div key={i} className="bubble-col">
                                            <div className="write-box"></div>
                                            {renderBubbles(10)}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Cột phải: Câu hỏi */}
                        <div className="questions-area grid" style={{gridTemplateRows: `repeat(${10}, 1fr)`}}>
                            {Array.from({length: cols}).map((_, colIdx) => {
                                const start = questionStart + colIdx * 10;
                                return (
                                    <div key={colIdx} className="q-col">
                                        {Array.from({length: 10}).map((_, rowIdx) => {
                                            const qNum = start + rowIdx;
                                            if (qNum > questionEnd) return null;
                                            return (
                                                <div key={qNum} className="q-row">
                                                    <span className="q-num">{qNum}</span>
                                                    <div className="q-opts">{renderQOpts()}</div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const SheetRenderer = ({ config }) => {
            const qTotal = config.questionCount;
            
            // LOGIC CHIA GIẤY:
            // <= 20 câu: 4 phiếu / A4 (A6)
            // 21 - 50 câu: 2 phiếu / A4 (A5)
            // > 50 câu: 1 phiếu / A4 (A4)

            let layoutClass = "layout-1up";
            let itemsPerSheet = 1;

            if (qTotal <= 20) {
                layoutClass = "layout-4up";
                itemsPerSheet = 4;
            } else if (qTotal <= 50) {
                layoutClass = "layout-2up";
                itemsPerSheet = 2;
            }

            return (
                <div id="print-area" className={`sheet-container-a4 ${layoutClass}`}>
                    {Array.from({length: itemsPerSheet}).map((_, i) => (
                        <OmrItem 
                            key={i} 
                            config={config} 
                            questionStart={1} 
                            questionEnd={qTotal} 
                        />
                    ))}
                    {itemsPerSheet > 1 && <div className="absolute w-full border-b border-dashed border-gray-400 top-1/2 flex items-center justify-center no-print"><span className="bg-white px-2 text-xs text-gray-500">Cắt tại đây</span></div>}
                    {itemsPerSheet === 4 && <div className="absolute h-full border-r border-dashed border-gray-400 left-1/2 top-0 no-print"></div>}
                </div>
            );
        };

        const App = () => {
            const [sheetConfig, setSheetConfig] = useState({ 
                schoolName: "Trường THPT...", 
                examName: "Kiểm tra 15 phút", 
                questionCount: 20, 
                examDate: "", 
                subject: "Toán" 
            });

            return (
                <div className="min-h-screen bg-gray-100 flex flex-col">
                    <div className="bg-white p-4 shadow flex justify-between items-center no-print">
                        <div className="font-bold text-lg text-indigo-700">Tạo Phiếu OMR Thông Minh</div>
                        <a href="index.html" className="text-gray-500 hover:text-indigo-600 font-bold">🏠 Trang chủ</a>
                    </div>

                    <div className="flex flex-1 p-6 gap-6 overflow-hidden">
                        {/* Sidebar Config */}
                        <div className="w-80 bg-white p-5 rounded-xl shadow h-fit space-y-4 no-print">
                            <h3 className="font-bold border-b pb-2">Cấu hình Phiếu</h3>
                            <div>
                                <label className="block text-xs font-bold text-gray-500">Số câu hỏi (Tự động chọn khổ giấy)</label>
                                <input type="number" value={sheetConfig.questionCount} onChange={e => setSheetConfig({...sheetConfig, questionCount: parseInt(e.target.value) || 20})} className="w-full border p-2 rounded font-bold text-indigo-600 text-lg"/>
                                <p className="text-[10px] text-gray-400 mt-1">
                                    ≤ 20 câu: 4 phiếu/A4 (A6)<br/>
                                    21-50 câu: 2 phiếu/A4 (A5)<br/>
                                    > 50 câu: 1 phiếu/A4
                                </p>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-500">Môn thi</label>
                                <input value={sheetConfig.subject} onChange={e => setSheetConfig({...sheetConfig, subject: e.target.value})} className="w-full border p-2 rounded text-sm"/>
                            </div>
                            <button onClick={() => window.print()} className="w-full bg-indigo-600 text-white py-3 rounded font-bold hover:bg-indigo-700">🖨️ IN PHIẾU NGAY</button>
                        </div>

                        {/* Preview Area */}
                        <div className="flex-1 bg-gray-500 p-8 overflow-auto flex justify-center">
                            <SheetRenderer config={sheetConfig} />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
