<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Phiếu Trả Lời Trắc Nghiệm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #e0e0e0; -webkit-print-color-adjust: exact; }

        /* --- CẤU HÌNH TRANG IN --- */
        @page { size: A4; margin: 0; }
        .sheet-a4 {
            width: 210mm; height: 296mm; background: white; margin: 20px auto;
            position: relative; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        /* --- CẤU TRÚC PHIẾU (ITEM) --- */
        .omr-item {
            position: relative; box-sizing: border-box;
            /* Không padding ở đây nữa, dùng inner container */
            width: 100%;
        }
        /* Container nội dung bên trong để tránh anchor */
        .omr-inner-container {
            margin: 15mm; /* Cách lề 15mm để tránh 4 cục đen ở góc */
            height: calc(100% - 30mm); /* Chiều cao trừ đi lề trên dưới */
            display: flex; flex-direction: column;
        }

        /* Layout A5 (2 phiếu trên 1 A4) */
        .layout-2up .omr-item { height: 148mm; border-bottom: 1px dashed #ccc; }
        .layout-2up .omr-item:last-child { border-bottom: none; }
        /* Layout A4 (1 phiếu trên 1 A4) */
        .layout-1up .omr-item { height: 296mm; }

        /* --- ĐIỂM ĐỊNH VỊ (ANCHORS) --- */
        .anchor { position: absolute; width: 10px; height: 10px; background: black; z-index: 99; }
        .tl { top: 10mm; left: 10mm; } 
        .tr { top: 10mm; right: 10mm; }
        .bl { bottom: 10mm; left: 10mm; } 
        .br { bottom: 10mm; right: 10mm; }

        /* --- HEADER MỚI --- */
        .header-section { border-bottom: 3px solid black; padding-bottom: 10px; margin-bottom: 15px; }
        .header-title h1 { font-size: 18pt; font-weight: 900; text-align: center; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        
        .info-grid { display: flex; flex-direction: column; gap: 8px; }
        .info-row { display: flex; gap: 20px; }
        .info-line { display: flex; align-items: flex-end; font-size: 11pt; flex: 1; }
        .info-label { font-weight: bold; white-space: nowrap; margin-right: 8px; font-size: 10pt;}
        .info-dots { border-bottom: 2px dotted #999; flex: 1; height: 20px; }

        /* --- BODY & BUBBLES --- */
        .body-section { display: flex; flex: 1; gap: 15px; align-items: stretch; }
        
        /* Cột trái: SBD & Mã đề */
        .left-panel { width: 30%; display: flex; flex-direction: column; gap: 15px; }
        .id-box { border: 2px solid black; padding: 8px 5px; border-radius: 4px; height: 100%; display: flex; flex-direction: column; }
        .box-title { font-size: 9pt; font-weight: bold; text-align: center; margin-bottom: 8px; background: #000; color: #fff; padding: 2px 0; }
        
        .grid-bubbles { display: flex; justify-content: space-around; flex: 1; align-items: flex-start; }
        .col-bubble { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .write-box { width: 16px; height: 20px; border: 2px solid black; margin-bottom: 6px; text-align: center; font-weight: bold; font-size: 14px;}
        
        /* Bong bóng tô */
        .b { 
            width: 13px; height: 13px; border: 1px solid #444; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 8px; font-weight: 700;
            font-family: 'Roboto Mono', monospace;
        }
        /* Bong bóng đáp án */
        .q-b { width: 12px; height: 12px; font-size: 8px; margin-right: 5px; }

        /* Cột phải: Câu hỏi */
        .right-panel { flex: 1; border: 2px solid black; padding: 5px; border-radius: 4px; position: relative; display: flex; flex-direction: column; }
        .ans-grid { display: flex; flex: 1; gap: 5px; }
        .ans-col { flex: 1; border-right: 1px dashed #ccc; padding: 0 8px; display: flex; flex-direction: column; justify-content: space-between; /* Dàn đều theo chiều dọc */ }
        .ans-col:last-child { border-right: none; }
        
        .q-row { display: flex; align-items: center; padding: 2px 0; }
        .q-num { width: 22px; font-size: 10pt; font-weight: bold; text-align: right; margin-right: 8px; }
        
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .sheet-a4 { box-shadow: none; margin: 0; page-break-after: always; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const BubbleColumn = () => (
            <div className="col-bubble">
                <div className="write-box"></div>
                {Array.from({length: 10}).map((_, i) => <div key={i} className="b">{i}</div>)}
            </div>
        );

        const QuestionRow = ({ num }) => (
            <div className="q-row">
                <div className="q-num">{num}</div>
                {['A','B','C','D'].map(opt => <div key={opt} className="b q-b">{opt}</div>)}
            </div>
        );

        const OmrItem = ({ type, data }) => {
            const isA5 = type === 'A5'; 
            const totalQ = isA5 ? 30 : 100;
            const cols = isA5 ? 3 : 4; 
            const rowsPerCol = isA5 ? 10 : 25;

            return (
                <div className="omr-item">
                    {/* 4 Điểm định vị máy chấm (Nằm ngoài inner-container) */}
                    <div className="anchor tl"></div><div className="anchor tr"></div>
                    <div className="anchor bl"></div><div className="anchor br"></div>

                    {/* Container nội dung bên trong (Cách lề để tránh anchor) */}
                    <div className="omr-inner-container">
                        {/* Header Mới */}
                        <div className="header-section">
                            <div className="header-title">
                                <h1>PHIẾU TRẢ LỜI TRẮC NGHIỆM</h1>
                            </div>
                            <div className="info-grid">
                                <div className="info-row">
                                    <div className="info-line flex-[2]"><span className="info-label">Họ và tên thí sinh:</span><div className="info-dots"></div></div>
                                    <div className="info-line flex-1"><span className="info-label">SBD (ghi chữ):</span><div className="info-dots"></div></div>
                                </div>
                                <div className="info-row">
                                    <div className="info-line flex-1"><span className="info-label">Lớp:</span><div className="info-dots"></div></div>
                                    <div className="info-line flex-1"><span className="info-label">Ngày thi:</span><div className="info-dots"></div></div>
                                    <div className="info-line flex-1"><span className="info-label">Phòng thi:</span><div className="info-dots"></div></div>
                                </div>
                                {/* Dòng Môn thi và Điểm mới thêm */}
                                <div className="info-row mt-2">
                                    <div className="info-line flex-[2]"><span className="info-label">Môn thi:</span><div className="info-dots" style={{fontWeight:'bold'}}>{data.subject}</div></div>
                                    <div className="info-line flex-1"><span className="info-label" style={{color:'#d00'}}>Điểm:</span><div className="info-dots"></div></div>
                                </div>
                            </div>
                        </div>

                        {/* Body */}
                        <div className="body-section">
                            {/* Panel Trái: SBD & Mã đề */}
                            <div className="left-panel">
                                <div className="id-box flex-[2]">
                                    <div className="box-title">SỐ BÁO DANH</div>
                                    <div className="grid-bubbles">
                                        {Array.from({length: 6}).map((_,i) => <BubbleColumn key={i}/>)}
                                    </div>
                                </div>
                                <div className="id-box flex-1">
                                    <div className="box-title">MÃ ĐỀ</div>
                                    <div className="grid-bubbles">
                                        {Array.from({length: 3}).map((_,i) => <BubbleColumn key={i}/>)}
                                    </div>
                                </div>
                            </div>

                            {/* Panel Phải: Câu hỏi (Dàn trang tự động) */}
                            <div className="right-panel">
                                <div className="box-title" style={{background:'transparent', color:'#000', borderBottom:'2px solid #000'}}>PHẦN TRẢ LỜI (Tô kín ô tròn tương ứng với đáp án đúng)</div>
                                <div className="ans-grid">
                                    {Array.from({length: cols}).map((_, cIdx) => (
                                        <div key={cIdx} className="ans-col">
                                            {Array.from({length: rowsPerCol}).map((_, rIdx) => {
                                                const qNum = cIdx * rowsPerCol + rIdx + 1;
                                                return qNum <= totalQ ? <QuestionRow key={qNum} num={qNum} /> : null;
                                            })}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('30'); // '30' or '100'
            const [subject, setSubject] = useState("TOÁN"); // Chỉ còn nhập môn thi

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Toolbar */}
                    <div className="bg-indigo-900 text-white p-4 shadow-lg flex flex-wrap justify-between items-center no-print z-50 relative gap-4">
                        <div className="flex items-center gap-4">
                            <h2 className="font-bold text-xl hidden md:block"><i className="fas fa-print mr-2"></i>Tạo Phiếu OMR</h2>
                            <div className="flex bg-indigo-800 rounded-lg p-1">
                                <button onClick={() => setMode('30')} className={`px-3 py-2 rounded font-bold transition text-sm ${mode==='30' ? 'bg-white text-indigo-900' : 'text-indigo-300 hover:text-white'}`}>A5 (30 Câu)</button>
                                <button onClick={() => setMode('100')} className={`px-3 py-2 rounded font-bold transition text-sm ${mode==='100' ? 'bg-white text-indigo-900' : 'text-indigo-300 hover:text-white'}`}>A4 (100 Câu)</button>
                            </div>
                            <div className="flex items-center gap-2 bg-indigo-800 p-1 rounded-lg">
                                <span className="text-xs font-bold text-indigo-300 pl-2">Môn:</span>
                                <input type="text" value={subject} onChange={(e)=>setSubject(e.target.value.toUpperCase())} className="bg-transparent border-b border-indigo-400 text-white font-bold w-32 focus:outline-none focus:border-white text-sm px-1"/>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={()=>window.location.href='index.html'} className="bg-indigo-700 hover:bg-indigo-600 px-4 py-2 rounded font-bold text-sm"><i className="fas fa-home mr-2"></i>Home</button>
                            <button onClick={()=>window.print()} className="bg-yellow-500 hover:bg-yellow-400 text-indigo-900 px-6 py-2 rounded font-bold shadow text-sm"><i className="fas fa-print mr-2"></i>IN PHIẾU</button>
                        </div>
                    </div>

                    {/* Preview */}
                    <div className="flex-1 bg-gray-300 p-4 md:p-8 overflow-auto flex justify-center">
                        <div className={`sheet-a4 ${mode==='30' ? 'layout-2up' : 'layout-1up'}`}>
                            {mode === '30' ? (
                                <>
                                    <OmrItem type="A5" data={{subject}} />
                                    <OmrItem type="A5" data={{subject}} />
                                    <div className="absolute w-full border-b-2 border-dashed border-gray-500 top-1/2 left-0 flex justify-center items-center no-print">
                                        <span className="bg-white px-3 py-1 text-xs font-bold text-gray-600 rounded-full border border-gray-300">✂ Cắt đôi tại đây (Khổ A5)</span>
                                    </div>
                                </>
                            ) : (
                                <OmrItem type="A4" data={{subject}} />
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
