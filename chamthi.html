<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Phiếu Trả Lời Trắc Nghiệm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #e0e0e0; -webkit-print-color-adjust: exact; }

        /* --- CẤU HÌNH TRANG IN --- */
        @page { size: A4; margin: 0; }
        .sheet-a4 {
            width: 210mm; height: 296mm; background: white; margin: 20px auto;
            position: relative; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        /* --- CẤU TRÚC PHIẾU (ITEM) --- */
        .omr-item {
            position: relative; box-sizing: border-box; padding: 8mm;
            display: flex; flex-direction: column;
        }
        /* Layout A5 (2 phiếu trên 1 A4) */
        .layout-2up .omr-item { height: 148mm; border-bottom: 1px dashed #999; }
        .layout-2up .omr-item:last-child { border-bottom: none; }
        /* Layout A4 (1 phiếu trên 1 A4) */
        .layout-1up .omr-item { height: 296mm; }

        /* --- ĐIỂM ĐỊNH VỊ (ANCHORS) QUAN TRỌNG --- */
        .anchor { position: absolute; width: 10px; height: 10px; background: black; z-index: 99; }
        .tl { top: 10mm; left: 10mm; } 
        .tr { top: 10mm; right: 10mm; }
        .bl { bottom: 10mm; left: 10mm; } 
        .br { bottom: 10mm; right: 10mm; }

        /* --- NỘI DUNG PHIẾU --- */
        .header-section { display: flex; border-bottom: 2px solid black; padding-bottom: 5px; margin-bottom: 10px; }
        .header-logo { width: 50px; height: 50px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 8px; margin-right: 10px; }
        .header-text h1 { font-size: 14pt; font-weight: 900; margin: 0; text-transform: uppercase; line-height: 1.2; }
        .header-text p { font-size: 9pt; margin: 2px 0 0 0; }
        
        .info-line { display: flex; margin-bottom: 4px; font-size: 10pt; }
        .info-label { font-weight: bold; white-space: nowrap; margin-right: 5px; }
        .info-dots { border-bottom: 1px dotted #000; flex: 1; }

        /* --- KHUNG TRẢ LỜI --- */
        .body-section { display: flex; flex: 1; gap: 10px; }
        
        /* Cột trái: SBD & Mã đề */
        .left-panel { width: 32%; display: flex; flex-direction: column; gap: 10px; }
        .id-box { border: 2px solid black; padding: 5px; border-radius: 4px; }
        .box-title { font-size: 9pt; font-weight: bold; text-align: center; margin-bottom: 5px; background: #000; color: #fff; }
        
        .grid-bubbles { display: flex; justify-content: space-between; }
        .col-bubble { display: flex; flex-direction: column; align-items: center; }
        .write-box { width: 14px; height: 18px; border: 1px solid black; margin-bottom: 4px; }
        
        /* Bong bóng tô */
        .b { 
            width: 12px; height: 12px; border: 1px solid #333; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 8px; font-weight: bold; margin-bottom: 2px;
            font-family: monospace;
        }
        /* Bong bóng đáp án (nhỏ hơn xíu) */
        .q-b { width: 11px; height: 11px; font-size: 7px; margin-right: 3px; cursor: pointer; }
        .q-b:hover { background: #ddd; }

        /* Cột phải: Câu hỏi */
        .right-panel { flex: 1; border: 2px solid black; padding: 5px; border-radius: 4px; position: relative; }
        .ans-grid { display: flex; height: 100%; }
        .ans-col { flex: 1; border-right: 1px dashed #ccc; padding: 0 4px; display: flex; flex-direction: column; }
        .ans-col:last-child { border-right: none; }
        
        .q-row { display: flex; align-items: center; margin-bottom: 4px; }
        .q-num { width: 18px; font-size: 9pt; font-weight: bold; text-align: right; margin-right: 4px; }
        
        /* Ẩn giao diện khi in */
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .sheet-a4 { box-shadow: none; margin: 0; page-break-after: always; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const BubbleColumn = ({ count }) => (
            <div className="col-bubble">
                <div className="write-box"></div>
                {Array.from({length: 10}).map((_, i) => <div key={i} className="b">{i}</div>)}
            </div>
        );

        const QuestionRow = ({ num }) => (
            <div className="q-row">
                <div className="q-num">{num}</div>
                {['A','B','C','D'].map(opt => <div key={opt} className="b q-b">{opt}</div>)}
            </div>
        );

        const OmrItem = ({ type, data }) => {
            // Cấu hình dựa trên loại phiếu
            const isA5 = type === 'A5'; // 30 câu
            const totalQ = isA5 ? 30 : 100;
            const cols = isA5 ? 3 : 4; 
            const rowsPerCol = isA5 ? 10 : 25;

            return (
                <div className="omr-item">
                    {/* 4 Điểm định vị máy chấm */}
                    <div className="anchor tl"></div><div className="anchor tr"></div>
                    <div className="anchor bl"></div><div className="anchor br"></div>

                    {/* Header */}
                    <div className="header-section">
                        <div className="header-logo">LOGO</div>
                        <div className="header-text flex-1">
                            <h1>PHIẾU TRẢ LỜI TRẮC NGHIỆM</h1>
                            <p>{data.schoolName}</p>
                            <div className="mt-2">
                                <div className="info-line"><span className="info-label">Họ và tên:</span><div className="info-dots"></div></div>
                                <div className="flex gap-4">
                                    <div className="info-line flex-1"><span className="info-label">Lớp:</span><div className="info-dots"></div></div>
                                    <div className="info-line flex-1"><span className="info-label">Ngày thi:</span><div className="info-dots"></div></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Body */}
                    <div className="body-section">
                        {/* Panel Trái: Định danh */}
                        <div className="left-panel">
                            <div className="id-box">
                                <div className="box-title">SỐ BÁO DANH</div>
                                <div className="grid-bubbles">
                                    {Array.from({length: 6}).map((_,i) => <BubbleColumn key={i}/>)}
                                </div>
                            </div>
                            <div className="id-box">
                                <div className="box-title">MÃ ĐỀ</div>
                                <div className="grid-bubbles">
                                    {Array.from({length: 3}).map((_,i) => <BubbleColumn key={i}/>)}
                                </div>
                            </div>
                        </div>

                        {/* Panel Phải: Câu hỏi */}
                        <div className="right-panel">
                            <div className="box-title" style={{background:'transparent', color:'#000', borderBottom:'1px solid #000'}}>PHẦN TRẢ LỜI (Tô kín ô tròn)</div>
                            <div className="ans-grid">
                                {Array.from({length: cols}).map((_, cIdx) => (
                                    <div key={cIdx} className="ans-col">
                                        {Array.from({length: rowsPerCol}).map((_, rIdx) => {
                                            const qNum = cIdx * rowsPerCol + rIdx + 1;
                                            return qNum <= totalQ ? <QuestionRow key={qNum} num={qNum} /> : null;
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('30'); // '30' or '100'
            const [info, setInfo] = useState({ schoolName: "TRƯỜNG THPT...", subject: "TOÁN" });

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Toolbar */}
                    <div className="bg-indigo-900 text-white p-4 shadow-lg flex justify-between items-center no-print z-50 relative">
                        <div className="flex items-center gap-4">
                            <h2 className="font-bold text-xl"><i className="fas fa-print mr-2"></i>Tạo Phiếu OMR</h2>
                            <div className="flex bg-indigo-800 rounded-lg p-1">
                                <button 
                                    onClick={() => setMode('30')}
                                    className={`px-4 py-2 rounded font-bold transition ${mode==='30' ? 'bg-white text-indigo-900' : 'text-indigo-300 hover:text-white'}`}
                                >
                                    30 Câu (A5 x2)
                                </button>
                                <button 
                                    onClick={() => setMode('100')}
                                    className={`px-4 py-2 rounded font-bold transition ${mode==='100' ? 'bg-white text-indigo-900' : 'text-indigo-300 hover:text-white'}`}
                                >
                                    100 Câu (A4)
                                </button>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={()=>window.location.href='index.html'} className="bg-indigo-700 hover:bg-indigo-600 px-4 py-2 rounded font-bold"><i className="fas fa-home mr-2"></i>Home</button>
                            <button onClick={()=>window.print()} className="bg-yellow-500 hover:bg-yellow-400 text-indigo-900 px-6 py-2 rounded font-bold shadow"><i className="fas fa-print mr-2"></i>IN PHIẾU</button>
                        </div>
                    </div>

                    {/* Preview */}
                    <div className="flex-1 bg-gray-300 p-8 overflow-auto flex justify-center">
                        <div className={`sheet-a4 ${mode==='30' ? 'layout-2up' : 'layout-1up'}`}>
                            {mode === '30' ? (
                                <>
                                    <OmrItem type="A5" data={info} />
                                    <OmrItem type="A5" data={info} />
                                    <div className="absolute w-full border-b-2 border-dashed border-gray-400 top-1/2 left-0 flex justify-center items-center no-print">
                                        <span className="bg-white px-2 text-xs text-gray-500">✂ Cắt đôi tại đây</span>
                                    </div>
                                </>
                            ) : (
                                <OmrItem type="A4" data={info} />
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
