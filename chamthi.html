<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chấm Thi OMR Pro - AI Grading</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; touch-action: manipulation; }
        .loader { border: 3px solid #e5e7eb; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* OMR Sheet CSS */
        .omr-sheet { width: 210mm; min-height: 297mm; padding: 10mm; background: white; margin: 0 auto; position: relative; box-shadow: 0 0 10px rgba(0,0,0,0.1); color: black; box-sizing: border-box; }
        .sheet-container-a5 { width: 210mm; height: 297mm; background: white; margin: 0 auto; position: relative; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .omr-sheet-a5 { width: 100%; height: 50%; padding: 5mm 10mm; position: relative; box-sizing: border-box; border-bottom: 1px dashed #ccc; }
        .omr-sheet-a5:last-child { border-bottom: none; }
        
        .anchor-tl, .anchor-tr, .anchor-bl, .anchor-br { position: absolute; width: 15px; height: 15px; background: black; z-index: 10; }
        /* A4 Anchor Positions */
        .omr-sheet .anchor-tl { top: 10mm; left: 10mm; } .omr-sheet .anchor-tr { top: 10mm; right: 10mm; }
        .omr-sheet .anchor-bl { bottom: 10mm; left: 10mm; } .omr-sheet .anchor-br { bottom: 10mm; right: 10mm; }
        /* A5 Anchor Positions */
        .omr-sheet-a5 .anchor-tl { top: 5mm; left: 10mm; } .omr-sheet-a5 .anchor-tr { top: 5mm; right: 10mm; }
        .omr-sheet-a5 .anchor-bl { bottom: 5mm; left: 10mm; } .omr-sheet-a5 .anchor-br { bottom: 5mm; right: 10mm; }

        .omr-border { border: 3px solid black; padding: 8px; height: 100%; display: flex; flex-direction: column; }
        .omr-header { display: flex; border-bottom: 2px solid black; padding-bottom: 5px; margin-bottom: 10px; }
        .omr-logo { width: 60px; height: 60px; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; margin-right: 10px; font-size: 10px; }
        .omr-title h1 { font-size: 14pt; font-weight: bold; margin: 0; text-transform: uppercase; }
        .omr-title h2 { font-size: 12pt; font-weight: normal; margin: 2px 0 0 0; }
        
        /* Standard Bubble (Phần trả lời) */
        .omr-bubble { width: 11px; height: 11px; border: 1px solid black; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 8px; margin: 1px; font-weight: 600; }
        
        /* Large Bubble (SBD & Mã đề) - Điều chỉnh to hơn */
        .omr-bubble-lg { width: 14px; height: 14px; border: 1px solid black; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; margin: 1.5px; font-weight: 700; }
        .omr-box-lg { width: 14px; height: 18px; border: 1px solid black; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; }

        .omr-section-title { font-weight: bold; border-bottom: 1px solid black; margin-bottom: 3px; font-size: 9pt; }
        .omr-grid-col { display: flex; flex-direction: column; align-items: center; margin-right: 3px; }
        
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 100%; height: 100%; margin: 0; padding: 0; } .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Default Backend URL - Hãy thay đổi nếu cần thiết hoặc cấu hình trong giao diện
        const DEFAULT_BACKEND_URL = "https://hoangthiencm-giangbai.hf.space"; 

        const Icon = ({ d, className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={d} /></svg>;
        const Icons = {
            Camera: (p) => <Icon {...p} d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />,
            Upload: (p) => <Icon {...p} d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12" />,
            Settings: (p) => <Icon {...p} d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />,
            Check: (p) => <Icon {...p} d="M20 6L9 17l-5-5" />,
            FileText: (p) => <Icon {...p} d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />,
            Image: (p) => <Icon {...p} d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z" />,
            Printer: (p) => <Icon {...p} d="M6 9V2h12v7 M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />,
            QrCode: (p) => <Icon {...p} d="M3 3h6v6H3zm12 0h6v6h-6zM3 15h6v6H3zm12 0h6v6h-6z" />,
            Brain: (p) => <Icon {...p} d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z" />,
            Smartphone: (p) => <Icon {...p} d="M5 2h14a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm7 17h.01" />,
            Refresh: (p) => <Icon {...p} d="M23 4v6h-6 M1 20v-6h6 M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        };

        // --- UTILS (Safe Compress) ---
        const dataURLtoBlob = (dataurl) => {
            try {
                var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
                    bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
                while(n--) u8arr[n] = bstr.charCodeAt(n);
                return new Blob([u8arr], {type:mime});
            } catch (e) { return null; }
        }

        const compressImage = (file, maxWidth = 1000, quality = 0.7) => {
            return new Promise((resolve) => {
                if (!file || !file.type.startsWith('image/')) { resolve(file); return; }
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        try {
                            const canvas = document.createElement('canvas');
                            let w = img.width, h = img.height;
                            if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
                            canvas.width = w; canvas.height = h;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, w, h);
                            const blob = dataURLtoBlob(canvas.toDataURL('image/jpeg', quality));
                            resolve(blob ? new File([blob], file.name, { type: 'image/jpeg' }) : file);
                        } catch (e) { resolve(file); }
                    };
                    img.onerror = () => resolve(file);
                };
                reader.onerror = () => resolve(file);
            });
        };

        const parseMultiKey = (text) => {
            const keys = {};
            text.split('\n').forEach(line => {
                line = line.trim();
                if (!line) return;
                let code = "DEFAULT", ans = line;
                if (line.includes(':')) {
                    const p = line.split(':');
                    code = p[0].trim(); ans = p[1].trim();
                }
                if (!keys[code]) keys[code] = {};
                const pairs = ans.toUpperCase().split(/\s+/);
                pairs.forEach(p => {
                    const num = p.match(/^\d+/); const char = p.match(/[A-D]$/);
                    if (num && char) keys[code][parseInt(num[0])] = char[0];
                });
            });
            return keys;
        };

        // --- UPDATED OMR CONTENT (SBD 4 số, Bubble to hơn) ---
        const OmrContent = ({ config }) => {
            const { schoolName, examName, questionCount, examDate, subject } = config;
            
            const renderBubblesLg = (count, start = 0) => Array.from({ length: count }).map((_, i) => <div key={i} className="omr-bubble-lg">{i + start}</div>);
            const renderBubbles = (count, start = 0) => Array.from({ length: count }).map((_, i) => <div key={i} className="omr-bubble">{i + start}</div>);
            
            const renderQuestionRow = (qNum) => (
                <div key={qNum} className="flex items-center justify-between mb-1 text-[10px]">
                    <span className="font-bold w-5 text-right mr-1">{qNum}</span>
                    <div className="flex gap-1">{['A', 'B', 'C', 'D'].map(opt => <div key={opt} className="omr-bubble w-5 h-5 text-[8px]">{opt}</div>)}</div>
                </div>
            );
            const cols = questionCount <= 30 ? 3 : 4;
            
            return (
                <div className="omr-border">
                    <div className="omr-header">
                        <div className="omr-logo text-xs text-center p-1 text-gray-400 border border-dashed">Logo</div>
                        <div className="omr-title flex-1 ml-3">
                            <h1 className="text-sm font-bold uppercase">{schoolName || "TÊN TRƯỜNG..."}</h1>
                            <h2 className="text-xs font-normal">{examName || "KỲ THI..."}</h2>
                            <div className="flex mt-1 gap-4 text-xs font-semibold"><span>Ngày: {examDate}</span><span>Môn: {subject}</span></div>
                        </div>
                    </div>
                    <div className="grid grid-cols-12 gap-2 mb-2 text-xs">
                        <div className="col-span-7 space-y-2 pr-2">
                            {['Họ tên:', 'Lớp:', 'SBD:'].map(lbl => <div key={lbl} className="flex items-end"><span className="w-12 font-bold shrink-0">{lbl}</span> <div className="border-b border-dotted border-black flex-1 h-4"></div></div>)}
                            <div className="border border-black p-1 mt-2 h-20 flex flex-col"><span className="text-[9px] italic text-center">Giám thị ký</span><div className="flex-1"></div></div>
                        </div>
                        <div className="col-span-5 flex gap-2">
                            {/* SBD - 4 SỐ */}
                            <div className="flex-1 border border-black p-1 flex flex-col items-center">
                                <div className="omr-section-title text-[9px] text-center w-full">SBD</div>
                                <div className="flex justify-center mb-1 gap-0.5">{Array.from({length:4}).map((_,i)=><div key={i} className="omr-box-lg"></div>)}</div>
                                <div className="flex gap-0.5">{Array.from({length:4}).map((_, col) => <div key={col} className="omr-grid-col">{renderBubblesLg(10)}</div>)}</div>
                            </div>
                            {/* MÃ ĐỀ - 3 SỐ */}
                            <div className="flex-1 border border-black p-1 flex flex-col items-center">
                                <div className="omr-section-title text-[9px] text-center w-full">MÃ ĐỀ</div>
                                <div className="flex justify-center mb-1 gap-0.5">{Array.from({length:3}).map((_,i)=><div key={i} className="omr-box-lg"></div>)}</div>
                                <div className="flex gap-0.5">{Array.from({length:3}).map((_, col) => <div key={col} className="omr-grid-col">{renderBubblesLg(10)}</div>)}</div>
                            </div>
                        </div>
                    </div>
                    <div className="border-t-2 border-black pt-1 flex-1">
                        <div className="omr-section-title text-center mb-2 text-sm uppercase bg-black text-white inline-block px-3 py-0.5 mx-auto block w-fit rounded">Trả Lời</div>
                        <div className={`grid grid-cols-${cols} gap-x-2 px-2`}>{Array.from({ length: cols }).map((_, colIndex) => { const itemsPerCol = Math.ceil(questionCount / cols); const start = colIndex * itemsPerCol + 1; return <div key={colIndex} className="border-r border-dotted last:border-0 border-gray-400 pr-1">{Array.from({ length: itemsPerCol }).map((__, idx) => { const qNum = start + idx; return qNum <= questionCount ? renderQuestionRow(qNum) : null; })}</div>; })}</div>
                    </div>
                    <div className="text-[9px] text-center mt-auto pt-1 italic border-t border-gray-300">Tô kín ô tròn. Giữ phiếu phẳng.</div>
                </div>
            );
        }

        const AnswerSheetWrapper = ({ config }) => {
            const isSmall = config.questionCount <= 30;
            if (isSmall) return (
                <div id="print-area" className="sheet-container-a5 text-black">
                    <div className="omr-sheet-a5"><div className="anchor-tl"></div><div className="anchor-tr"></div><div className="anchor-bl"></div><div className="anchor-br"></div><OmrContent config={config} /></div>
                    <div className="omr-sheet-a5"><div className="anchor-tl"></div><div className="anchor-tr"></div><div className="anchor-bl"></div><div className="anchor-br"></div><OmrContent config={config} /></div>
                    <div className="absolute w-full border-b-2 border-dashed border-gray-400 top-1/2 flex items-center justify-center"><span className="bg-white px-2 text-xs text-gray-500">✂ Cắt đôi tại đây</span></div>
                </div>
            );
            return (
                <div id="print-area" className="omr-sheet text-black">
                    <div className="anchor-tl"></div><div className="anchor-tr"></div><div className="anchor-bl"></div><div className="anchor-br"></div>
                    <OmrContent config={config} />
                </div>
            );
        };

        // --- MAIN APP LOGIC ---
        const App = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const mobileMode = urlParams.get('mode') === 'mobile';
            const paramSession = urlParams.get('session');
            const paramApi = urlParams.get('api');

            const [view, setView] = useState('grading');
            const [backendUrl, setBackendUrl] = useState(localStorage.getItem("omr_backend_url") || paramApi || DEFAULT_BACKEND_URL);
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem("omr_gemini_key") || "");
            const [showConfig, setShowConfig] = useState(!localStorage.getItem("omr_backend_url") && !mobileMode);
            const [inputText, setInputText] = useState("");
            const [useAiSbd, setUseAiSbd] = useState(true); 
            const [aiReading, setAiReading] = useState(false);
            const [results, setResults] = useState([]);
            const [sessionId, setSessionId] = useState(null);
            const [showQr, setShowQr] = useState(false);
            const [processing, setProcessing] = useState(false);
            const [mobileStatus, setMobileStatus] = useState("");
            const [serverStatus, setServerStatus] = useState("checking");
            const [statusMsg, setStatusMsg] = useState("Đang kiểm tra...");
            const [previewImage, setPreviewImage] = useState(null);
            
            const [sheetConfig, setSheetConfig] = useState({ schoolName: "", examName: "", questionCount: 50, examDate: "", subject: "" });

            const folderRef = useRef(null);
            const pollRef = useRef(null);
            const keyImageInputRef = useRef(null);

            const checkConnection = async (url) => {
                if (!url) { setServerStatus("error"); setStatusMsg("Thiếu URL"); return; }
                setServerStatus("checking"); setStatusMsg("Đang kết nối...");
                try {
                    // Thử gọi /api/omr/ (vì file chamthi.py có prefix /api/omr)
                    const baseUrl = url.replace(/\/$/, "");
                    const res = await fetch(baseUrl + "/", { method: 'GET', mode: 'cors' }).catch(() => 
                         fetch(baseUrl, { method: 'GET', mode: 'cors' })
                    );
                    
                    if (res && res.ok) { setServerStatus("connected"); setStatusMsg("Đã kết nối"); }
                    else { setServerStatus("error"); setStatusMsg(`Lỗi kết nối`); }
                } catch (e) { setServerStatus("error"); setStatusMsg("Lỗi Mạng"); }
            };

            useEffect(() => { if (backendUrl) checkConnection(backendUrl); }, [backendUrl]);

            const saveConfig = (url, key) => {
                let clean = url.trim().replace(/\/$/, "");
                if (clean.includes("huggingface.co/spaces/")) { 
                    const p = clean.split("huggingface.co/spaces/"); 
                    if (p[1]) { const parts = p[1].split("/"); clean = `https://${parts[0]}-${parts[1]}.hf.space`; }
                }
                if (!clean.startsWith("http")) clean = "https://" + clean;
                
                // Đảm bảo không bị lặp /api/omr nếu user nhập thiếu
                if (!clean.endsWith("/api/omr")) clean += "/api/omr";

                setBackendUrl(clean); localStorage.setItem("omr_backend_url", clean);
                setGeminiKey(key); localStorage.setItem("omr_gemini_key", key);
                setShowConfig(false); checkConnection(clean);
            };

            const handleMobileUpload = async (files) => {
                if (!files.length) return;
                setProcessing(true); setMobileStatus("Đang nén...");
                for (let file of files) {
                    try {
                        let fileToSend = await compressImage(file);
                        setMobileStatus("Đang gửi...");
                        const fd = new FormData(); fd.append("file", fileToSend); fd.append("session_id", paramSession);
                        
                        let apiUrl = backendUrl.replace(/\/$/, "");
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 60000);
                        
                        const res = await fetch(`${apiUrl}/grade_mobile`, { method: 'POST', body: fd, signal: controller.signal, mode: 'cors' });
                        clearTimeout(timeoutId);
                        
                        if (res.ok) {
                            const data = await res.json();
                            setMobileStatus(data.status === 'success' ? `✓ Đã chấm: ${data.score}đ` : `⚠ Lỗi: ${data.error}`);
                            if (navigator.vibrate) navigator.vibrate(200);
                        } else setMobileStatus(`Lỗi HTTP: ${res.status}`);
                    } catch (e) { setMobileStatus("Lỗi Mạng: " + e.message); }
                }
                setProcessing(false);
            };

            const processImagesPC = async (files) => {
                const keys = parseMultiKey(inputText);
                const fdKeys = JSON.stringify(keys);
                setProcessing(true);
                for (let file of files) {
                    let fileToSend = await compressImage(file);
                    const fd = new FormData(); fd.append("file", fileToSend); fd.append("answer_key_json", fdKeys);
                    try {
                        const res = await fetch(`${backendUrl}/grade`, { method: 'POST', body: fd });
                        const data = await res.json();
                        if (useAiSbd && (!data.student_id || data.student_id === "AI_READ") && geminiKey) {
                            const reader = new FileReader();
                            reader.onload = async (e) => {
                                const b64 = e.target.result.split(',')[1];
                                try {
                                    const resAI = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
                                        method: 'POST', headers: {'Content-Type': 'application/json'},
                                        body: JSON.stringify({contents:[{parts:[{text: "Đọc SBD viết tay (chỉ lấy số):"}, {inline_data: {mime_type: "image/jpeg", data: b64}}]}]})
                                    });
                                    const dAI = await resAI.json();
                                    const sbd = dAI.candidates[0].content.parts[0].text.replace(/\D/g,'');
                                    setResults(p => p.map(r => r.filename === file.name ? {...r, student_id: sbd + " (AI)"} : r));
                                } catch(e){}
                            };
                            reader.readAsDataURL(fileToSend);
                        }
                        setResults(prev => [{filename: file.name, ...data}, ...prev]);
                    } catch(e) { console.error(e); }
                }
                setProcessing(false);
            };

            const callGeminiVision = async (base64) => {
                if (!geminiKey) { alert("Cần Gemini Key!"); setShowConfig(true); return; }
                setAiReading(true);
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({contents:[{parts:[{text: "OCR Đáp Án (1A 2B...)"}, {inline_data: {mime_type: "image/jpeg", data: base64}}]}]})
                    });
                    const d = await res.json();
                    let txt = d.candidates[0].content.parts[0].text.replace(/[*#]/g,'').trim();
                    setInputText(p => (p ? p+"\n"+txt : txt));
                } catch(e) { alert(e.message); } finally { setAiReading(false); }
            };

            const handleImagePaste = (e) => {
                const items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) if (items[i].type.indexOf("image") !== -1) {
                    e.preventDefault(); const blob = items[i].getAsFile();
                    const r = new FileReader(); r.onload = (ev) => callGeminiVision(ev.target.result.split(',')[1]); r.readAsDataURL(blob);
                }
            };

            useEffect(() => {
                if (sessionId && !mobileMode) {
                    pollRef.current = setInterval(async () => {
                        try {
                            const res = await fetch(`${backendUrl}/poll_results/${sessionId}`);
                            const d = await res.json();
                            if (d.length) setResults(p => [...d, ...p]);
                        } catch(e){}
                    }, 2000);
                }
                return () => clearInterval(pollRef.current);
            }, [sessionId, backendUrl]);

            const handleStartSession = async () => {
                if (!backendUrl || !inputText) return alert("Thiếu thông tin!");
                const fd = new FormData(); fd.append("answer_key_json", JSON.stringify(parseMultiKey(inputText)));
                try {
                    const res = await fetch(`${backendUrl}/init_session`, { method: 'POST', body: fd });
                    const d = await res.json();
                    setSessionId(d.session_id); setShowQr(true);
                    setTimeout(() => {
                        document.getElementById("qrcode").innerHTML = "";
                        new QRCode(document.getElementById("qrcode"), {
                            text: `${window.location.href.split('?')[0]}?mode=mobile&session=${d.session_id}&api=${encodeURIComponent(backendUrl)}`,
                            width: 200, height: 200
                        });
                    }, 100);
                } catch(e) { alert("Lỗi: " + e.message); }
            };

            if (mobileMode) return (
                <div className="bg-gray-900 min-h-screen text-white p-6 flex flex-col items-center justify-center text-center relative">
                    {showConfig && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
                            <div className="bg-white text-black p-6 rounded-lg w-full max-w-sm relative">
                                <button onClick={()=>setShowConfig(false)} className="absolute top-2 right-2 font-bold text-xl">&times;</button>
                                <h3 className="font-bold mb-4">Cấu Hình</h3>
                                <input value={backendUrl} onChange={e=>setBackendUrl(e.target.value)} className="w-full border p-2 rounded mb-2" placeholder="URL"/>
                                <button onClick={()=>saveConfig(backendUrl, geminiKey)} className="w-full bg-indigo-600 text-white py-2 rounded font-bold">Lưu</button>
                            </div>
                        </div>
                    )}
                    <button onClick={()=>setShowConfig(true)} className="absolute top-4 right-4 p-2 bg-gray-800 rounded-full text-gray-400"><Icons.Settings className="w-5 h-5"/></button>
                    <h1 className="text-2xl font-bold mb-2">Camera Chấm Thi</h1>
                    <div className="bg-gray-800 px-3 py-1 rounded-full mb-4 border border-gray-700"><span className="text-gray-400 text-xs">Phiên: </span><span className="text-yellow-400 font-bold font-mono">{paramSession}</span></div>
                    <div className={`mb-6 px-4 py-2 rounded-full border flex items-center gap-2 text-xs font-bold ${serverStatus==='connected'?'bg-green-900/30 border-green-500 text-green-400':serverStatus==='error'?'bg-red-900/30 border-red-500 text-red-400':'bg-yellow-900/30 border-yellow-500 text-yellow-400'}`}>
                        <span className={`w-2 h-2 rounded-full ${serverStatus==='connected'?'bg-green-500 animate-pulse':serverStatus==='error'?'bg-red-500':'bg-yellow-500 animate-ping'}`}></span> {statusMsg}
                        {serverStatus==='error'&&<button onClick={()=>checkConnection(backendUrl)} className="ml-2"><Icons.Refresh className="w-3 h-3"/></button>}
                    </div>
                    {mobileStatus && <div className={`mb-8 px-4 py-2 rounded-lg font-bold text-sm shadow-lg ${mobileStatus.includes("Lỗi")?"bg-red-600":"bg-green-600"}`}>{mobileStatus}</div>}
                    <input type="file" accept="image/*" capture="environment" className="hidden" id="cam" onChange={(e)=>handleMobileUpload(e.target.files)}/>
                    <label htmlFor="cam" className={`relative w-64 h-64 rounded-full border-4 flex flex-col items-center justify-center active:scale-95 transition shadow-[0_0_30px_rgba(79,70,229,0.3)] cursor-pointer ${processing?'bg-gray-800 border-gray-600':'bg-indigo-600 border-white hover:bg-indigo-500'}`}>
                        {processing ? <div className="loader scale-150"></div> : <><Icons.Camera className="w-24 h-24 mb-2 text-white"/><span className="font-bold text-xl tracking-widest">CHỤP</span></>}
                    </label>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <div className="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm no-print">
                        <div className="flex items-center gap-2"><div className="bg-indigo-600 p-1.5 rounded text-white"><Icons.Camera className="w-6 h-6"/></div><div><h1 className="font-bold text-xl text-indigo-900">OMR PRO</h1><p className="text-[10px] text-gray-500 font-medium">AI Grading</p></div></div>
                        <div className="flex gap-2">
                            <button onClick={()=>setView('grading')} className={`px-3 py-1.5 rounded-lg font-bold text-sm flex items-center gap-2 ${view==='grading'?'bg-indigo-50 text-indigo-700 ring-1 ring-indigo-200':'text-gray-600 hover:bg-gray-50'}`}><Icons.Check className="w-4 h-4"/> Chấm Thi</button>
                            <button onClick={()=>setView('sheet')} className={`px-3 py-1.5 rounded-lg font-bold text-sm flex items-center gap-2 ${view==='sheet'?'bg-indigo-50 text-indigo-700 ring-1 ring-indigo-200':'text-gray-600 hover:bg-gray-50'}`}><Icons.FileText className="w-4 h-4"/> Tạo Phiếu</button>
                            <button onClick={()=>setShowConfig(true)} className="p-2 rounded-lg text-gray-400 hover:bg-gray-100 hover:text-indigo-600"><Icons.Settings className="w-5 h-5"/></button>
                        </div>
                    </div>

                    {showConfig && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white p-6 rounded-xl w-full max-w-sm shadow-2xl relative">
                                <button onClick={()=>setShowConfig(false)} className="absolute top-2 right-3 text-gray-400 font-bold text-xl">&times;</button>
                                <h3 className="font-bold mb-4 border-b pb-2">Cấu Hình</h3>
                                <div className="space-y-3">
                                    <div><label className="text-xs font-bold text-gray-500">URL Backend:</label><input value={backendUrl} onChange={e=>setBackendUrl(e.target.value)} className="w-full border p-2 rounded text-sm" placeholder="https://..."/></div>
                                    <div><label className="text-xs font-bold text-gray-500">Gemini Key:</label><input type="password" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} className="w-full border p-2 rounded text-sm"/></div>
                                    <button onClick={()=>saveConfig(backendUrl, geminiKey)} className="w-full bg-indigo-600 text-white py-2 rounded font-bold">Lưu & Kiểm tra</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showQr && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
                            <div className="bg-white p-8 rounded-2xl text-center relative max-w-md w-full mx-4">
                                <button onClick={()=>setShowQr(false)} className="absolute top-2 right-4 text-2xl text-gray-400">&times;</button>
                                <h3 className="font-bold text-xl mb-1">Quét để chấm thi</h3>
                                <div className="flex justify-center my-4"><div id="qrcode" className="p-2 border-2 border-dashed border-indigo-200 rounded-lg bg-white"></div></div>
                                <p className="text-xs bg-blue-50 p-3 rounded text-blue-800 text-left">Mã QR này đã chứa cấu hình Server.</p>
                            </div>
                        </div>
                    )}

                    {previewImage && (
                        <div className="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4" onClick={()=>setPreviewImage(null)}>
                            <img src={`data:image/jpeg;base64,${previewImage}`} className="max-w-full max-h-full rounded shadow-2xl border border-gray-700"/>
                            <button className="absolute top-4 right-4 text-white text-4xl font-bold">&times;</button>
                        </div>
                    )}

                    <div className="flex-1 bg-gray-50 p-6 overflow-auto">
                        {view === 'grading' && (
                            <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
                                <div className="lg:col-span-4 space-y-4">
                                    <div className="card p-5 bg-white rounded-xl shadow-sm border border-gray-100 relative overflow-hidden">
                                        {aiReading && <div className="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent animate-[shimmer_1s_infinite]"></div>}
                                        <div className="flex justify-between items-center mb-3">
                                            <label className="font-bold text-sm uppercase text-gray-700">Đáp Án (Key)</label>
                                            <div className="flex gap-2">
                                                <button onClick={()=>keyImageInputRef.current.click()} disabled={aiReading} className="text-indigo-600 text-xs font-bold flex items-center gap-1 bg-indigo-50 px-2.5 py-1.5 rounded-md hover:bg-indigo-100">{aiReading?"Đang đọc...":<><Icons.Image className="w-3 h-3"/> Quét Key</>}</button>
                                                <input type="file" ref={keyImageInputRef} accept="image/*" className="hidden" onChange={e=>{if(e.target.files[0]){const r=new FileReader();r.onload=(ev)=>callGeminiVision(ev.target.result.split(',')[1]);r.readAsDataURL(e.target.files[0]);}}}/>
                                            </div>
                                        </div>
                                        <textarea value={inputText} onChange={e=>setInputText(e.target.value)} onPaste={handleImagePaste} className="w-full border rounded-lg p-3 h-48 text-sm font-mono focus:ring-2 focus:ring-indigo-500 outline-none bg-gray-50/50 resize-none" placeholder={"101: 1A 2B...\n102: 1D 2C..."}></textarea>
                                        <div className="mt-3 flex items-center gap-2 p-2 bg-pink-50 rounded border border-pink-100">
                                            <input type="checkbox" checked={useAiSbd} onChange={e=>setUseAiSbd(e.target.checked)} id="aiSbd" className="accent-pink-600"/>
                                            <label htmlFor="aiSbd" className="text-xs font-medium text-pink-800 cursor-pointer flex items-center gap-1"><Icons.Brain className="w-3.5 h-3.5"/> Tự động đọc SBD viết tay</label>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div onClick={()=>folderRef.current.click()} className="group p-4 bg-white rounded-xl shadow-sm border border-gray-200 cursor-pointer hover:border-indigo-500 hover:shadow-md transition flex flex-col items-center justify-center h-32">
                                            <input type="file" multiple ref={folderRef} className="hidden" onChange={e=>processImagesPC(Array.from(e.target.files))}/>
                                            <div className="p-3 bg-gray-100 rounded-full mb-2 group-hover:bg-indigo-50"><Icons.Upload className="w-6 h-6 text-gray-500 group-hover:text-indigo-600"/></div>
                                            <span className="font-bold text-sm text-gray-600 group-hover:text-indigo-700">Upload File</span>
                                        </div>
                                        <div onClick={handleStartSession} className="group p-4 bg-white rounded-xl shadow-sm border border-gray-200 cursor-pointer hover:border-green-500 hover:shadow-md transition flex flex-col items-center justify-center h-32">
                                            <div className="p-3 bg-green-50 rounded-full mb-2 group-hover:bg-green-100"><Icons.QrCode className="w-6 h-6 text-green-600"/></div>
                                            <span className="font-bold text-sm text-gray-600 group-hover:text-green-700">Kết Nối ĐT</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="lg:col-span-8 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col h-[650px] overflow-hidden">
                                    <div className="px-6 py-4 border-b bg-gray-50/80 flex justify-between items-center backdrop-blur">
                                        <h3 className="font-bold text-gray-800 flex items-center gap-2"><span className="bg-indigo-600 text-white text-xs px-2 py-0.5 rounded-full">{results.length}</span> Bài thi đã chấm</h3>
                                        {results.length > 0 && <button onClick={()=>{const ws=XLSX.utils.json_to_sheet(results); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "KQ"); XLSX.writeFile(wb, "KetQua_OMR.xlsx");}} className="text-indigo-600 font-bold text-xs flex items-center gap-1 hover:bg-indigo-50 px-2 py-1 rounded transition"><Icons.FileText className="w-3 h-3"/> Xuất Excel</button>}
                                    </div>
                                    <div className="flex-1 overflow-auto">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-gray-100/80 sticky top-0 z-10 backdrop-blur text-xs uppercase text-gray-500"><tr><th className="p-4 font-semibold">Phiếu</th><th className="p-4 font-semibold">Thông tin</th><th className="p-4 text-center font-semibold">Kết quả</th><th className="p-4 text-center font-semibold">Điểm số</th></tr></thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {results.map((r,i)=>(
                                                    <tr key={i} className="hover:bg-gray-50/80 transition animate-[fadeIn_0.3s]">
                                                        <td className="p-4 w-24">
                                                            {r.image_base64 ? <div className="w-16 h-16 rounded-lg overflow-hidden border border-gray-200 relative group cursor-zoom-in" onClick={()=>setPreviewImage(r.image_base64)}><img src={`data:image/jpeg;base64,${r.image_base64}`} className="w-full h-full object-cover"/><div className="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition"></div></div> : <div className="w-16 h-16 bg-gray-100 rounded flex items-center justify-center text-xs text-gray-400">No Img</div>}
                                                        </td>
                                                        <td className="p-4"><div className="font-bold text-gray-800 text-base">{r.student_id || "---"}</div><div className="text-xs text-gray-500 mt-1 flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-indigo-400"></span> Mã đề: {r.exam_code || "?"}</div></td>
                                                        <td className="p-4 text-center"><div className="inline-flex items-center gap-3 text-xs font-medium bg-gray-100 px-3 py-1 rounded-full"><span className="text-green-600 flex items-center gap-1">✓ {r.correct_count}</span><span className="w-px h-3 bg-gray-300"></span><span className="text-red-500 flex items-center gap-1">✕ {r.wrong_count}</span></div><div className="text-[10px] text-gray-400 mt-1">Tổng: {r.total_questions} câu</div></td>
                                                        <td className="p-4 text-center"><span className={`font-bold text-2xl block ${r.score >= 5 ? 'text-indigo-600' : 'text-orange-500'}`}>{r.score}</span></td>
                                                    </tr>
                                                ))}
                                                {!results.length && <tr><td colSpan="4" className="p-20 text-center text-gray-400 flex flex-col items-center"><Icons.FileText className="w-12 h-12 mb-2 opacity-20"/><p>Chưa có dữ liệu chấm thi</p></td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                        {view === 'sheet' && (
                            <div className="max-w-6xl mx-auto flex gap-6">
                                <div className="w-80 space-y-4 no-print">
                                    <div className="card p-4 bg-white rounded-xl shadow-sm border border-gray-200">
                                        <h3 className="font-bold text-lg mb-3 flex items-center gap-2 text-gray-800"><Icons.Settings className="w-5 h-5 text-indigo-600"/> Tùy Chỉnh Phiếu</h3>
                                        <div className="space-y-3">
                                            {[{l:"Tên Trường",k:"schoolName",p:"THPT..."},{l:"Tên Kỳ Thi",k:"examName",p:"KIỂM TRA..."},{l:"Môn Thi",k:"subject",p:"TOÁN..."},{l:"Ngày Thi",k:"examDate",p:".../..."}].map(f=>(
                                                <div key={f.k}><label className="block text-xs font-bold text-gray-500 mb-1 uppercase">{f.l}</label><input value={sheetConfig[f.k]} onChange={e=>setSheetConfig({...sheetConfig,[f.k]:e.target.value})} className="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder={f.p}/></div>
                                            ))}
                                            <div><label className="block text-xs font-bold text-gray-500 mb-1 uppercase">Số Câu Hỏi</label><input type="number" min="1" max="200" value={sheetConfig.questionCount} onChange={e=>setSheetConfig({...sheetConfig, questionCount: parseInt(e.target.value)})} className="w-full border p-2 rounded text-sm text-center font-bold text-indigo-600"/></div>
                                        </div>
                                    </div>
                                    <button onClick={()=>window.print()} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700 flex justify-center items-center gap-2 transition"><Icons.Printer className="w-5 h-5"/> IN PHIẾU / TẢI PDF</button>
                                </div>
                                <div className="flex-1 bg-gray-200 p-8 rounded-xl overflow-auto flex justify-center shadow-inner border border-gray-300"><AnswerSheetWrapper config={sheetConfig} /></div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
