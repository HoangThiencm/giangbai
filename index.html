<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Trợ Lý Giáo Viên AI (All-in-One)</title>
    
    <script>
        (function() {
            const token = localStorage.getItem('authToken');
            const userEmail = localStorage.getItem('userEmail');
            const isPreview = window.location.protocol === 'about:' || window.location.protocol === 'data:';

            if (!token && !isPreview) {
                // Tránh loop vô tận
                if (!window.location.href.includes('login.html')) {
                    window.location.href = 'login.html';
                }
            }
        })();

        function logout() {
            if(confirm("Bạn có chắc muốn đăng xuất?")) {
                localStorage.clear(); // Xóa sạch token
                window.location.href = 'login.html';
            }
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof pdfjsLib !== 'undefined') {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            }
        });
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .katex .text { font-family: 'Inter', sans-serif !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        .slide-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .question-incomplete { @apply border-2 border-orange-400 bg-orange-50; }
        .logout-btn { @apply absolute top-4 right-4 z-50 bg-white/90 text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-full shadow border border-red-100 text-sm font-bold flex items-center gap-2 transition backdrop-blur-sm cursor-pointer; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen overflow-hidden relative">
    
    <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Thoát</button>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- UTILS ---
        const cleanJsonString = (text) => {
            if (!text) return "[]";
            const start = text.indexOf('[');
            const end = text.lastIndexOf(']');
            if (start === -1 || end === -1) return "[]";
            return text.substring(start, end + 1);
        };

        const formatMathForWord = (text) => {
            if (!text) return "";
            let content = text;
            content = content.replace(/\$([^$]+)\$/g, (match, tex) => {
                try { 
                    let mathml = katex.renderToString(tex, { throwOnError: false, output: 'mathml', displayMode: false });
                    return mathml.replace(/<annotation encoding="application\/x-tex">[\s\S]*?<\/annotation>/g, ''); 
                } catch (e) { return match; }
            });
            content = content.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>").replace(/\*(.*?)\*/g, "<i>$1</i>");
            return content.replace(/\\{/g, "{").replace(/\\}/g, "}").replace(/\\\[/g, "[").replace(/\\\]/g, "]").replace(/\\\(/g, "(").replace(/\\\)/g, ")").replace(/\\([.:])/g, "$1");
        };

        const createDocContentGlobal = (questions, title = "ĐỀ KIỂM TRA") => {
            let bodyContent = `<h2 style='text-align:center; font-size:16pt; margin-bottom:20pt; font-family: "Times New Roman"'>${title.toUpperCase()}</h2>`;
            questions.forEach(q => {
                bodyContent += `<p style='margin-bottom:6pt; text-align:justify; font-size:12pt; font-family: "Times New Roman"'><b>Câu ${q.number}:</b> ${formatMathForWord(q.question)}</p>`;
                const options = q.options || [];
                if(options.length === 4) {
                     const maxLen = Math.max(...options.map(o => o.length));
                     if (maxLen < 15) {
                        bodyContent += `<table style='width:100%; border:none; margin-bottom:12pt; font-family: "Times New Roman"'><tr><td style='width:25%'><b>A.</b> ${formatMathForWord(options[0])}</td><td style='width:25%'><b>B.</b> ${formatMathForWord(options[1])}</td><td style='width:25%'><b>C.</b> ${formatMathForWord(options[2])}</td><td style='width:25%'><b>D.</b> ${formatMathForWord(options[3])}</td></tr></table>`;
                     } else if (maxLen < 40) {
                        bodyContent += `<table style='width:100%; border:none; margin-bottom:12pt; font-family: "Times New Roman"'><tr><td style='width:50%'><b>A.</b> ${formatMathForWord(options[0])}</td><td style='width:50%'><b>B.</b> ${formatMathForWord(options[1])}</td></tr><tr><td style='width:50%'><b>C.</b> ${formatMathForWord(options[2])}</td><td style='width:50%'><b>D.</b> ${formatMathForWord(options[3])}</td></tr></table>`;
                     } else {
                        bodyContent += `<div style='margin-bottom:12pt; font-family: "Times New Roman"'><p><b>A.</b> ${formatMathForWord(options[0])}</p><p><b>B.</b> ${formatMathForWord(options[1])}</p><p><b>C.</b> ${formatMathForWord(options[2])}</p><p><b>D.</b> ${formatMathForWord(options[3])}</p></div>`;
                     }
                }
            });
            bodyContent += `<br/><hr/><br/><h3 style='text-align:center; font-size:14pt; font-family: "Times New Roman"'>BẢNG ĐÁP ÁN</h3>`;
            bodyContent += `<table border="1" style="border-collapse: collapse; width: 100%; text-align: center; font-family: "Times New Roman"">`;
            const totalQs = questions.length;
            const rows = Math.ceil(totalQs / 10);
            for(let r=0; r<rows; r++) {
                bodyContent += `<tr style="background-color: #f0f0f0;">`;
                for(let c=0; c<10; c++) {
                    const qNum = r*10 + c + 1;
                    if(qNum <= totalQs) bodyContent += `<td style="padding: 5px;"><b>${qNum}</b></td>`; else bodyContent += `<td></td>`;
                }
                bodyContent += `</tr><tr>`;
                for(let c=0; c<10; c++) {
                    const qNum = r*10 + c + 1;
                    if(qNum <= totalQs) {
                        const q = questions[qNum-1];
                        const ansLetter = q.correctAnswerIndex !== -1 ? String.fromCharCode(65 + q.correctAnswerIndex) : "?";
                        bodyContent += `<td style="padding: 5px; color: blue;">${ansLetter}</td>`;
                    } else bodyContent += `<td></td>`;
                }
                bodyContent += `</tr>`;
            }
            bodyContent += `</table>`;
            return `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>${title}</title><style>@page { size: A4; margin: 1.5cm 1.5cm 1.5cm 2.5cm; } body { font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.3; }</style></head><body>${bodyContent}</body></html>`;
        };

        const cleanLatexArtifacts = (text) => text ? text.replace(/\\{/g, "{").replace(/\\}/g, "}").replace(/\\\[/g, "[").replace(/\\\]/g, "]").replace(/\\\(/g, "(").replace(/\\\)/g, ")") : "";
        const formatLatexText = (text) => {
            if (!text) return "";
            let clean = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            clean = clean.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>").replace(/\*(.*?)\*/g, "<i>$1</i>");
            return cleanLatexArtifacts(clean);
        };
        const MATH_REGEX = /(\$\$[\s\S]+?\$\$|\$[\s\S]+?\$|\\\[[\s\S]+?\\\]|\\\([\s\S]+?\\\))/g;
        const LatexText = ({ text }) => {
            if (!text) return <span></span>;
            const parts = text.split(MATH_REGEX);
            return (
                <span>
                    {parts.map((part, index) => {
                        if (part.startsWith('$') || part.startsWith('\\(') || part.startsWith('\\[')) {
                            let content = part, isDisplay = false;
                            if (part.startsWith('$$')) { content = part.slice(2, -2); isDisplay = true; }
                            else if (part.startsWith('$')) { content = part.slice(1, -1); }
                            else if (part.startsWith('\\[')) { content = part.slice(2, -2); isDisplay = true; }
                            else if (part.startsWith('\\(')) { content = part.slice(2, -2); }
                            try {
                                const cleanContent = content.replace(/\\\\([{}])/g, "\\$1");
                                const html = katex.renderToString(cleanContent, { throwOnError: false, displayMode: isDisplay });
                                return <span key={index} dangerouslySetInnerHTML={{ __html: html }} className="math-tex text-blue-700" />;
                            } catch (e) { return <span key={index}>{part}</span>; }
                        } 
                        return <span key={index} dangerouslySetInnerHTML={{ __html: formatLatexText(part) }} />;
                    })}
                </span>
            );
        };

        // --- ICONS ---
        const Icon = ({ children, className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
        const Icons = {
            Home: (p) => <Icon {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>,
            Presentation: (p) => <Icon {...p}><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5 5 5-5"/></Icon>,
            Zap: (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>,
            Layers: (p) => <Icon {...p}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></Icon>,
            Globe: (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></Icon>,
            Upload: (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>,
            Check: (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>,
            ArrowLeft: (p) => <Icon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>,
            ArrowRight: (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></Icon>,
            Eye: (p) => <Icon {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></Icon>,
            EyeOff: (p) => <Icon {...p}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M1 1l22 22"/></Icon>,
            Trash: (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2-2v2"/></Icon>,
            AlertTriangle: (p) => <Icon {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>,
            Zip: (p) => <Icon {...p}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></Icon>,
            Server: (p) => <Icon {...p}><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></Icon>,
            Pdf: (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></Icon>,
            Download: (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>,
            Edit: (p) => <Icon {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Icon>,
            Image: (p) => <Icon {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></Icon>,
            Settings: (p) => <Icon {...p}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2 2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1 2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></Icon>,
            X: (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>
        };

        // --- COMPONENTS ---
        const GoogleSlidesViewer = () => {
            const [url, setUrl] = useState("");
            const [embedUrl, setEmbedUrl] = useState("");
            const [showControls, setShowControls] = useState(true);
            const processUrl = () => {
                if(!url) return;
                let finalUrl = url;
                if(url.includes("/pub?")) finalUrl = url.replace("/pub?", "/embed?");
                else if(url.includes("/edit")) finalUrl = url.split("/edit")[0] + "/embed?start=false&loop=false&delayms=3000";
                setEmbedUrl(finalUrl);
                setShowControls(false); 
            };
            return (
                <div className="flex flex-col h-full bg-gray-800 relative group">
                    {showControls && (
                        <div className="bg-gray-900 text-white p-3 flex justify-between items-center shadow-md z-30 absolute top-0 left-0 right-0">
                             <div className="flex-1 flex gap-2 max-w-3xl mx-auto">
                                 <input value={url} onChange={(e)=>setUrl(e.target.value)} placeholder="Dán link Google Slides" className="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-1 text-sm outline-none focus:border-indigo-500" />
                                 <button onClick={processUrl} className="bg-indigo-600 px-3 py-1 rounded hover:bg-indigo-700">Load</button>
                             </div>
                             <button onClick={() => setShowControls(false)} className="text-gray-400 hover:text-white ml-4"><Icons.EyeOff className="w-5 h-5"/></button>
                        </div>
                    )}
                    {!showControls && (<button onClick={() => setShowControls(true)} className="absolute top-2 right-2 z-50 bg-black/50 hover:bg-black/80 text-white p-2 rounded-full transition-all opacity-0 group-hover:opacity-100"><Icons.Settings className="w-5 h-5"/></button>)}
                    <div className="flex-1 relative w-full h-full bg-black flex justify-center items-center">
                        {!embedUrl ? (<div className="text-gray-500 text-center"><Icons.Presentation className="w-20 h-20 mx-auto mb-4 opacity-50"/><p>Chưa có Slide nào.</p></div>) : (<iframe src={embedUrl} frameBorder="0" width="100%" height="100%" allowFullScreen="true" className="absolute inset-0 z-0"></iframe>)}
                    </div>
                </div>
            );
        };

        const SmartQuizDirect = () => {
            const [step, setStep] = useState(0);
            const [questions, setQuestions] = useState([]);
            const [topic, setTopic] = useState("");
            const [loading, setLoading] = useState(false);
            const [apiKeys, setApiKeys] = useState([]);
            const [questionCount, setQuestionCount] = useState(10);
            const [errorMsg, setErrorMsg] = useState('');
            const keyInputRef = useRef(null);

            useEffect(() => { const savedKey = localStorage.getItem('smartquiz_gemini_key'); if (savedKey) setApiKeys([savedKey]); }, []);

            const fetchWithRetry = async (keysToTry, prompt) => {
                if (!keysToTry.length) throw new Error("Hết Key! Vui lòng nạp thêm.");
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${keysToTry[0]}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                    });
                    if(!res.ok) throw new Error(res.status);
                    return await res.json();
                } catch(e) {
                    if(e.message==="429"||e.message==="503") { await new Promise(r=>setTimeout(r,1000)); return fetchWithRetry(keysToTry.slice(1), prompt); }
                    throw e;
                }
            };

            const handleAIGen = async () => {
                if(apiKeys.length === 0) return setErrorMsg("Chưa nạp API Key!");
                setLoading(true); setErrorMsg('');
                try {
                    const prompt = `Tạo ${questionCount} câu trắc nghiệm chủ đề "${topic}". Output JSON format: [{"id":1, "question":"...", "options":["A","B","C","D"], "correctAnswer":"..."}]`;
                    const data = await fetchWithRetry([...apiKeys], prompt);
                    const txt = data.candidates[0].content.parts[0].text;
                    let jsonString = cleanJsonString(txt);
                    let json = JSON.parse(jsonString);
                    const mapped = json.map((q, i) => {
                        const cleanOptions = q.options.map(opt => opt.replace(/^([A-D]|[0-9]+)([\.\)\:\-])\s*/i, '').trim());
                        let cleanCorrectAnswerText = q.correctAnswer.replace(/^([A-D]|[0-9]+)([\.\)\:\-])\s*/i, '').trim();
                        let cIdx = cleanOptions.findIndex(o => o.toLowerCase() === cleanCorrectAnswerText.toLowerCase());
                        if (cIdx === -1 && q.correctAnswer.trim().length === 1) {
                             const charCode = q.correctAnswer.trim().toUpperCase().charCodeAt(0);
                             if (charCode >= 65 && charCode <= 68) cIdx = charCode - 65;
                        }
                        return { ...q, id: Date.now()+i, number: i+1, options: cleanOptions, correctAnswerIndex: cIdx !== -1 ? cIdx : 0, correctAnswerText: cleanCorrectAnswerText };
                    });
                    setQuestions(mapped); setStep(1); 
                } catch(e) { setErrorMsg("Lỗi AI: " + e.message); } finally { setLoading(false); }
            };
            
            const handleReadKeyFile = (e) => {
                const f = e.target.files[0]; if (!f) return; const r = new FileReader();
                r.onload = (ev) => { const k = ev.target.result.split('\n').map(x => x.trim()).filter(x => x); if(k.length) { setApiKeys(k); localStorage.setItem('smartquiz_gemini_key', k[0]); alert(`Đã nạp ${k.length} keys!`); } }; r.readAsText(f);
            };

            const handleExportWord = () => {
                const docContent = createDocContentGlobal(questions, topic || "ĐỀ KIỂM TRA");
                const blob = new Blob([docContent], { type: "application/msword;charset=utf-8" });
                saveAs(blob, `De_Kiem_Tra_AI.doc`);
            };

            return (
                 <div className="h-full bg-gray-50 overflow-y-auto p-4">
                    {step === 0 && (
                        <div className="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg mt-10">
                            <h2 className="text-2xl font-bold mb-6 pb-2 border-b text-indigo-800 flex items-center gap-2"><Icons.Zap className="w-6 h-6"/> Kiểm tra kiến thức</h2>
                            <div className="space-y-6">
                                <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                    <div className="flex justify-between items-center mb-2"><label className="font-semibold text-sm uppercase text-gray-500">1. Cấu hình AI</label><span className={`text-xs font-bold px-2 py-1 rounded ${apiKeys.length > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{apiKeys.length > 0 ? 'Đã có Key' : 'Chưa có Key'}</span></div>
                                    <div className="flex gap-2"><button onClick={()=>keyInputRef.current.click()} className="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-50 transition flex items-center gap-2 w-full justify-center"><Icons.Upload className="w-4 h-4"/> Nạp File Key (.txt)</button></div>
                                    <input type="file" ref={keyInputRef} className="hidden" onChange={handleReadKeyFile} />
                                </div>
                                <div><label className="block font-semibold mb-2 text-gray-700">2. CHỦ ĐỀ</label><input value={topic} onChange={e=>setTopic(e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="VD: Phương trình logarit..."/></div>
                                <div><div className="flex justify-between mb-2"><label className="font-semibold text-gray-700">3. SỐ LƯỢNG</label><span className="font-bold text-indigo-600">{questionCount} câu</span></div><input type="range" min="5" max="100" value={questionCount} onChange={e=>setQuestionCount(parseInt(e.target.value))} className="w-full accent-indigo-600"/></div>
                                {errorMsg && <div className="text-red-500 bg-red-50 p-3 rounded border border-red-200 text-sm flex gap-2"><Icons.AlertTriangle className="shrink-0 w-5 h-5"/> {errorMsg}</div>}
                                <button onClick={handleAIGen} disabled={loading} className="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 transition font-bold shadow flex items-center gap-2 w-full justify-center text-lg">{loading ? "Đang suy nghĩ..." : <><Icons.Zap className="w-6 h-6"/> TẠO ĐỀ</>}</button>
                            </div>
                        </div>
                    )}
                    {step === 1 && (
                        <div className="max-w-4xl mx-auto">
                            <div className="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm sticky top-0 z-20 border-b border-gray-200">
                                <div><button onClick={()=>setStep(0)} className="text-sm text-gray-500 flex items-center gap-1 hover:text-indigo-600 mb-1"><Icons.ArrowLeft className="w-3 h-3"/> Soạn lại</button><h2 className="text-xl font-bold text-gray-800">Duyệt {questions.length} Câu Hỏi</h2></div>
                                <button onClick={handleExportWord} className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 flex gap-2 items-center font-bold shadow"><Icons.Download className="w-4 h-4"/> Xuất Word</button>
                            </div>
                            <div className="space-y-4 pb-20">{questions.map((q, i) => (<div key={q.id} className="bg-white p-6 rounded-xl shadow-sm border border-gray-200"><div className="flex justify-between mb-3"><span className="font-bold text-indigo-600">Câu {q.number}</span></div><div className="mb-4 font-medium text-lg"><LatexText text={q.question}/></div><div className="grid grid-cols-1 md:grid-cols-2 gap-3">{q.options.map((o, idx) => (<div key={idx} className={`p-3 border rounded-lg flex gap-2 items-center ${idx===q.correctAnswerIndex ? 'bg-green-50 border-green-500' : 'hover:bg-gray-50'}`}><span className={`font-bold w-6 h-6 rounded-full flex items-center justify-center text-xs ${idx===q.correctAnswerIndex ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-700'}`}>{String.fromCharCode(65+idx)}</span><div className="flex-1"><LatexText text={o}/></div>{idx===q.correctAnswerIndex && <Icons.Check className="w-5 h-5 text-green-600"/>}</div>))}</div></div>))}</div>
                        </div>
                    )}
                 </div>
            );
        };

        const ServerMixerComponent = () => {
            return (
                <div className="text-center p-10 bg-white rounded-xl shadow">
                    <h3 className="font-bold text-xl mb-4">Server Mixer</h3>
                    <p className="text-gray-500">Chức năng này dùng Backend để xử lý file Word/PDF. <br/> (Code logic đã có trong file cũ của bạn)</p>
                </div>
            )
        };
        
        const GeminiMixerComponent = () => {
             return (
                <div className="text-center p-10 bg-white rounded-xl shadow">
                    <h3 className="font-bold text-xl mb-4">Gemini PDF Mixer</h3>
                    <p className="text-gray-500">Chức năng này dùng AI Vision để đọc đề. <br/> (Code logic đã có trong file cũ của bạn)</p>
                </div>
            )
        };

        const ExamMixerTab = () => {
             const [activeTool, setActiveTool] = useState(null);
            if (!activeTool) {
                return (
                    <div className="p-10 h-full overflow-y-auto">
                        <div className="text-center mb-12">
                            <h1 className="text-4xl font-extrabold text-indigo-900 mb-4">CÔNG CỤ TRỘN ĐỀ THI</h1>
                            <p className="text-lg text-gray-500">Chọn phương thức trộn đề bạn muốn sử dụng</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                            <div onClick={() => setActiveTool('server')} className="bg-white p-8 rounded-2xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 border-l-4 border-blue-500 cursor-pointer group">
                                <div className="mb-4 bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center text-blue-600 mx-auto group-hover:scale-110 transition"><Icons.Server className="w-8 h-8"/></div>
                                <h3 className="text-2xl font-bold text-gray-800 mb-2 text-center">1. Trộn đề Server/Offline</h3>
                                <p className="text-gray-500 text-center">Hỗ trợ Word & PDF. Sử dụng Server backend hoặc thuật toán Offline.</p>
                            </div>
                            <div onClick={() => setActiveTool('gemini')} className="bg-white p-8 rounded-2xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 border-l-4 border-red-500 cursor-pointer group">
                                <div className="mb-4 bg-red-100 w-16 h-16 rounded-full flex items-center justify-center text-red-600 mx-auto group-hover:scale-110 transition"><Icons.Pdf className="w-8 h-8"/></div>
                                <h3 className="text-2xl font-bold text-gray-800 mb-2 text-center">2. Trộn đề Gemini AI</h3>
                                <p className="text-gray-500 text-center">Chuyên trị file PDF. Sử dụng AI Vision để đọc đề và bảng đáp án.</p>
                            </div>
                        </div>
                    </div>
                );
            }
            return (
                <div className="p-4 h-full overflow-y-auto bg-gray-50">
                    <button onClick={() => setActiveTool(null)} className="mb-4 flex items-center gap-2 text-gray-600 hover:text-indigo-600 font-semibold"><Icons.ArrowLeft className="w-5 h-5"/> Quay lại</button>
                    {activeTool === 'server' ? <ServerMixerComponent /> : <GeminiMixerComponent />}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [userEmail, setUserEmail] = useState('');

            useEffect(() => {
                const email = localStorage.getItem('userEmail');
                if(email) setUserEmail(email);
            }, []);

            return (
                <div className="flex h-screen overflow-hidden font-sans">
                    <div className="w-64 bg-indigo-900 text-indigo-100 flex flex-col items-start py-6 gap-2 shadow-xl z-20 shrink-0">
                        <div className="px-6 mb-6 w-full">
                            <h1 className="text-xl font-bold text-white flex items-center gap-2"><i className="fas fa-robot"></i> Trợ Lý AI</h1>
                            <p className="text-xs text-indigo-300 mt-1 truncate">User: {userEmail || "Khách"}</p>
                        </div>

                        <button onClick={()=>setActiveTab('home')} className={`w-full text-left px-6 py-3 transition border-l-4 ${activeTab==='home' ? 'bg-indigo-800 border-yellow-400 text-white' : 'border-transparent hover:bg-indigo-800'}`}>
                            <Icons.Home className="w-5 h-5 inline mr-3"/> Trang chủ
                        </button>
                        <button onClick={()=>setActiveTab('gslides')} className={`w-full text-left px-6 py-3 transition border-l-4 ${activeTab==='gslides' ? 'bg-indigo-800 border-yellow-400 text-white' : 'border-transparent hover:bg-indigo-800'}`}>
                            <Icons.Presentation className="w-5 h-5 inline mr-3"/> Bài giảng Google
                        </button>
                        <button onClick={()=>setActiveTab('smartquiz')} className={`w-full text-left px-6 py-3 transition border-l-4 ${activeTab==='smartquiz' ? 'bg-indigo-800 border-yellow-400 text-white' : 'border-transparent hover:bg-indigo-800'}`}>
                            <Icons.Zap className="w-5 h-5 inline mr-3"/> SmartQuiz AI
                        </button>
                        <button onClick={()=>setActiveTab('mixer')} className={`w-full text-left px-6 py-3 transition border-l-4 ${activeTab==='mixer' ? 'bg-indigo-800 border-yellow-400 text-white' : 'border-transparent hover:bg-indigo-800'}`}>
                            <Icons.Layers className="w-5 h-5 inline mr-3"/> Trộn Đề Thi
                        </button>

                        <div className="mt-4 px-4 w-full">
                            <button onClick={()=>window.location.href='thitructuyen.html'} className="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-bold shadow-lg flex items-center justify-center gap-2 transition transform hover:scale-105">
                                <Icons.Globe className="w-5 h-5"/> Thi Online
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 relative bg-gray-100 overflow-hidden">
                        {activeTab === 'home' && (
                            <div className="absolute inset-0 p-10 flex flex-col items-center justify-center overflow-y-auto">
                                <div className="text-center mb-12">
                                    <h1 className="text-4xl font-extrabold text-indigo-900 mb-4 tracking-tight">HỆ THỐNG DẠY HỌC 4.0</h1>
                                    <p className="text-lg text-gray-500">Tích hợp AI - Tự động hóa - Hiệu quả</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 max-w-7xl w-full px-4">
                                    <div onClick={()=>setActiveTab('gslides')} className="bg-white p-6 rounded-2xl shadow-lg hover:shadow-2xl transition transform hover:-translate-y-1 border-t-4 border-yellow-500 cursor-pointer">
                                        <div className="mb-4"><Icons.Presentation className="w-10 h-10 text-yellow-600"/></div>
                                        <h3 className="text-xl font-bold text-gray-800 mb-2">Bài Giảng</h3>
                                        <p className="text-sm text-gray-500">Trình chiếu Google Slides.</p>
                                    </div>
                                    <div onClick={()=>setActiveTab('smartquiz')} className="bg-white p-6 rounded-2xl shadow-lg hover:shadow-2xl transition transform hover:-translate-y-1 border-t-4 border-indigo-500 cursor-pointer">
                                        <div className="mb-4"><Icons.Zap className="w-10 h-10 text-indigo-600"/></div>
                                        <h3 className="text-xl font-bold text-gray-800 mb-2">Soạn Đề AI</h3>
                                        <p className="text-sm text-gray-500">AI soạn câu hỏi tự động.</p>
                                    </div>
                                     <div onClick={()=>setActiveTab('mixer')} className="bg-white p-6 rounded-2xl shadow-lg hover:shadow-2xl transition transform hover:-translate-y-1 border-t-4 border-blue-500 cursor-pointer">
                                        <div className="mb-4"><Icons.Layers className="w-10 h-10 text-blue-600"/></div>
                                        <h3 className="text-xl font-bold text-gray-800 mb-2">Trộn Đề</h3>
                                        <p className="text-sm text-gray-500">Xử lý PDF/Word/Ảnh.</p>
                                    </div>
                                    <div onClick={()=>window.location.href='thitructuyen.html'} className="bg-gradient-to-br from-green-500 to-green-700 text-white p-6 rounded-2xl shadow-lg hover:shadow-2xl transition transform hover:-translate-y-1 cursor-pointer">
                                        <div className="mb-4"><Icons.Globe className="w-10 h-10 text-white"/></div>
                                        <h3 className="text-xl font-bold mb-2">Tổ Chức Thi</h3>
                                        <p className="text-sm text-green-100">Quản lý kỳ thi, chấm điểm, xem kết quả.</p>
                                    </div>
                                </div>
                            </div>
                        )}
                        <div className={`absolute inset-0 transition-opacity duration-300 ${activeTab === 'gslides' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}><GoogleSlidesViewer /></div>
                        <div className={`absolute inset-0 transition-opacity duration-300 ${activeTab === 'smartquiz' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}><SmartQuizDirect /></div>
                        <div className={`absolute inset-0 transition-opacity duration-300 ${activeTab === 'mixer' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}><ExamMixerTab /></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
