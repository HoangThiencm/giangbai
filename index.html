<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hỗ trợ dạy học online & Trộn đề </title>
    
    <!-- === 1. BẢO MẬT: KIỂM TRA ĐĂNG NHẬP === -->
    <script>
        (function() {
            const token = localStorage.getItem('authToken');
            const isPreview = window.location.protocol === 'about:' || window.location.protocol === 'data:';
            if (!token) {
                if (isPreview) console.warn("Preview Mode: Bỏ qua Login redirect.");
                else window.location.href = 'login.html';
            }
        })();

        function logout() {
            if(confirm("Bạn có chắc muốn đăng xuất?")) {
                localStorage.removeItem('authToken');
                localStorage.removeItem('userEmail_giangbai');
                window.location.href = 'login.html';
            }
        }
    </script>

    <!-- Core Libs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Libs cho Trộn đề -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof pdfjsLib !== 'undefined') {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            }
        });
    </script>

    <!-- Math Display -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        .slide-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-primary { @apply bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 transition font-bold shadow flex items-center gap-2; }
        .btn-secondary { @apply bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-50 transition flex items-center gap-2; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen overflow-hidden relative">
    
    <button onclick="logout()" class="absolute top-4 right-4 z-50 bg-white/90 text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-full shadow border border-red-100 text-sm font-bold flex items-center gap-2 transition backdrop-blur-sm">
        <i class="fas fa-sign-out-alt"></i> Thoát
    </button>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- ICONS ---
        const Icon = ({ children, className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
        const Icons = {
            Home: (p) => <Icon {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>,
            Presentation: (p) => <Icon {...p}><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5 5 5-5"/></Icon>,
            Zap: (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>,
            Layers: (p) => <Icon {...p}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></Icon>,
            Wifi: (p) => <Icon {...p}><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></Icon>,
            Upload: (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>,
            Settings: (p) => <Icon {...p}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2 2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1 2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></Icon>,
            EyeOff: (p) => <Icon {...p}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M1 1l22 22"/></Icon>
        };

        // --- COMPONENTS Placeholder (Giữ nguyên logic cũ của bạn ở đây nếu cần) ---
        // (Tôi lược bỏ phần chi tiết của GSlides/SmartQuiz/Mixer để tập trung vào Menu điều hướng)
        
        const GoogleSlidesViewer = () => {
             const [url, setUrl] = useState("");
             const [embedUrl, setEmbedUrl] = useState("");
             const [showControls, setShowControls] = useState(true);
             const processUrl = () => {
                 if(!url) return;
                 let finalUrl = url.replace("/pub?", "/embed?").replace("/edit", "/embed?");
                 if(!finalUrl.includes("/embed?")) finalUrl += "/embed?";
                 setEmbedUrl(finalUrl); setShowControls(false); 
             };
             return (
                 <div className="flex flex-col h-full bg-gray-800 relative group">
                     {showControls && (
                         <div className="bg-gray-900 text-white p-3 flex justify-between items-center shadow-md z-30 absolute top-0 left-0 right-0">
                              <div className="flex-1 flex gap-2 max-w-3xl mx-auto">
                                  <input value={url} onChange={(e)=>setUrl(e.target.value)} placeholder="Dán link Google Slides" className="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-1 text-sm outline-none" />
                                  <button onClick={processUrl} className="btn-primary">Load</button>
                              </div>
                              <button onClick={() => setShowControls(false)} className="text-gray-400 hover:text-white ml-4"><Icons.EyeOff className="w-5 h-5"/></button>
                         </div>
                     )}
                     {!showControls && (<button onClick={() => setShowControls(true)} className="absolute top-2 right-2 z-50 bg-black/50 hover:bg-black/80 text-white p-2 rounded-full transition-all opacity-0 group-hover:opacity-100"><Icons.Settings className="w-5 h-5"/></button>)}
                     <div className="flex-1 relative w-full h-full bg-black flex justify-center items-center">
                         {!embedUrl ? (<div className="text-gray-500 text-center"><Icons.Presentation className="w-20 h-20 mx-auto mb-4 opacity-50"/><p>Chưa có Slide nào.</p></div>) : (<iframe src={embedUrl} frameBorder="0" width="100%" height="100%" allowFullScreen="true" className="absolute inset-0 z-0"></iframe>)}
                     </div>
                 </div>
             );
        };
        
        // Placeholder cho SmartQuiz và Mixer (để code gọn, bạn giữ nguyên logic cũ của bạn)
        const SmartQuizDirect = () => <div className="p-10 text-center"><h2 className="text-2xl font-bold mb-4">SmartQuiz AI</h2><p>Tính năng tạo đề bằng AI (Giữ nguyên code cũ của bạn ở đây)</p></div>;
        const ExamMixerTab = () => <div className="p-10 text-center"><h2 className="text-2xl font-bold mb-4">Công Cụ Trộn Đề</h2><p>Tính năng trộn đề Offline/Gemini (Giữ nguyên code cũ của bạn ở đây)</p></div>;

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');

            // Hàm mở trang thi trực tuyến
            const openOnlineExam = () => {
                window.open('thitructuyen.html', '_blank');
            };

            return (
                <div className="flex h-screen overflow-hidden font-sans">
                    {/* SIDEBAR */}
                    <div className="w-20 bg-indigo-900 text-indigo-100 flex flex-col items-center py-6 gap-6 shadow-xl z-20 shrink-0">
                        <div className="p-2 bg-indigo-800 rounded-lg mb-2 shadow-inner cursor-pointer" onClick={()=>setActiveTab('home')}><Icons.Home className="w-8 h-8"/></div>
                        
                        <button onClick={()=>setActiveTab('gslides')} className={`p-3 rounded-xl transition group relative ${activeTab==='gslides' ? 'bg-white text-indigo-900 shadow-lg' : 'hover:bg-indigo-800'}`}>
                            <Icons.Presentation className="w-6 h-6"/>
                            <span className="absolute left-14 bg-gray-900 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">Bài giảng</span>
                        </button>
                        
                        <button onClick={()=>setActiveTab('smartquiz')} className={`p-3 rounded-xl transition group relative ${activeTab==='smartquiz' ? 'bg-white text-indigo-900 shadow-lg' : 'hover:bg-indigo-800'}`}>
                            <Icons.Zap className="w-6 h-6"/>
                            <span className="absolute left-14 bg-gray-900 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">SmartQuiz AI</span>
                        </button>
                        
                        <button onClick={()=>setActiveTab('mixer')} className={`p-3 rounded-xl transition group relative ${activeTab==='mixer' ? 'bg-white text-indigo-900 shadow-lg' : 'hover:bg-indigo-800'}`}>
                            <Icons.Layers className="w-6 h-6"/>
                            <span className="absolute left-14 bg-gray-900 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">Trộn Đề</span>
                        </button>

                        {/* NÚT THI TRỰC TUYẾN - MỞ TAB MỚI */}
                        <div className="w-10 border-t border-indigo-700 my-1"></div>
                        <button onClick={openOnlineExam} className="p-3 rounded-xl bg-orange-600 hover:bg-orange-500 text-white shadow-lg group relative transition transform hover:scale-105">
                            <Icons.Wifi className="w-6 h-6"/>
                            <span className="absolute left-14 bg-gray-900 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50 font-bold">Thi Trực Tuyến</span>
                        </button>
                    </div>

                    {/* CONTENT AREA */}
                    <div className="flex-1 relative bg-gray-100 overflow-hidden">
                        {activeTab === 'home' && (
                            <div className="absolute inset-0 p-10 flex flex-col items-center justify-center overflow-y-auto">
                                <div className="text-center mb-12">
                                    <h1 className="text-5xl font-extrabold text-indigo-900 mb-4 tracking-tight">TRỢ LÝ DẠY HỌC 4.0</h1>
                                    <p className="text-xl text-gray-500">Nền tảng tích hợp: Giảng dạy - Soạn đề - Thi trực tuyến</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 max-w-7xl w-full">
                                    <div onClick={()=>setActiveTab('gslides')} className="bg-white p-6 rounded-2xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 border-l-4 border-yellow-500 cursor-pointer">
                                        <div className="mb-4"><Icons.Presentation className="w-10 h-10 text-yellow-600"/></div>
                                        <h3 className="text-xl font-bold text-gray-800 mb-2">1. Bài Giảng Số</h3>
                                        <p className="text-sm text-gray-500">Trình chiếu Google Slides không quảng cáo.</p>
                                    </div>
                                    <div onClick={()=>setActiveTab('smartquiz')} className="bg-white p-6 rounded-2xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 border-l-4 border-indigo-500 cursor-pointer">
                                        <div className="mb-4"><Icons.Zap className="w-10 h-10 text-indigo-600"/></div>
                                        <h3 className="text-xl font-bold text-gray-800 mb-2">2. SmartQuiz AI</h3>
                                        <p className="text-sm text-gray-500">AI soạn bài kiểm tra từ chủ đề bất kỳ.</p>
                                    </div>
                                     <div onClick={()=>setActiveTab('mixer')} className="bg-white p-6 rounded-2xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 border-l-4 border-green-500 cursor-pointer">
                                        <div className="mb-4"><Icons.Layers className="w-10 h-10 text-green-600"/></div>
                                        <h3 className="text-xl font-bold text-gray-800 mb-2">3. Trộn Đề Thi</h3>
                                        <p className="text-sm text-gray-500">Trộn đề từ file PDF/Word nhanh chóng.</p>
                                    </div>
                                    
                                    {/* CARD THI TRỰC TUYẾN MỚI */}
                                    <div onClick={openOnlineExam} className="bg-gradient-to-br from-orange-500 to-red-600 p-6 rounded-2xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 border-l-4 border-orange-800 cursor-pointer text-white">
                                        <div className="mb-4"><Icons.Wifi className="w-10 h-10 text-white"/></div>
                                        <h3 className="text-xl font-bold mb-2">4. Thi Trực Tuyến</h3>
                                        <p className="text-sm text-orange-100">Tổ chức thi, chấm điểm và nhận xét bằng AI.</p>
                                    </div>
                                </div>
                            </div>
                        )}
                        <div className={`absolute inset-0 transition-opacity duration-300 ${activeTab === 'gslides' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}><GoogleSlidesViewer /></div>
                        {/* Lưu ý: Bạn cần paste lại code SmartQuiz và Mixer vào đây nếu muốn giữ full chức năng như cũ */}
                        <div className={`absolute inset-0 transition-opacity duration-300 ${activeTab === 'smartquiz' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}><SmartQuizDirect /></div>
                        <div className={`absolute inset-0 transition-opacity duration-300 ${activeTab === 'mixer' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}><ExamMixerTab /></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
