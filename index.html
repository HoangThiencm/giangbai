<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- === 1. BẢO MẬT: KIỂM TRA ĐĂNG NHẬP === -->
    <script>
        (function() {
            const token = localStorage.getItem('authToken');
            
            // Kiểm tra môi trường để tránh lỗi khi xem trước
            const isPreview = window.location.protocol === 'about:' || window.location.protocol === 'data:';

            if (!token) {
                if (isPreview) {
                    console.warn("Preview Mode: Bỏ qua Login redirect.");
                } else {
                    // Chưa đăng nhập -> Chuyển hướng ngay
                    window.location.href = 'login.html';
                }
            }
        })();

        function logout() {
            if(confirm("Bạn có chắc muốn đăng xuất?")) {
                localStorage.removeItem('authToken');
                localStorage.removeItem('userEmail_giangbai');
                window.location.href = 'login.html';
            }
        }
    </script>

    <style>

        .katex .text { font-family: 'Inter', sans-serif !important; font-style: normal !important; }

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        // --- UTILS ---
        const cleanJsonString = (text) => {
            if (!text) return "[]";
            const start = text.indexOf('[');
            const end = text.lastIndexOf(']');
            if (start === -1 || end === -1) return "[]";
            return text.substring(start, end + 1);
        };


        const formatMathForWord = (text) => {
            if (!text) return "";
            let content = text;
            content = content.replace(/\$([^$]+)\$/g, (match, tex) => {
                try { 
                    let mathml = katex.renderToString(tex, { throwOnError: false, output: 'mathml', displayMode: false });
                    return mathml.replace(/<annotation encoding="application\/x-tex">[\s\S]*?<\/annotation>/g, ''); 
                } catch (e) { return match; }
            });
            content = content.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
            content = content.replace(/\*(.*?)\*/g, "<i>$1</i>");
            content = content
                .replace(/\\{/g, "{").replace(/\\}/g, "}")
                .replace(/\\\[/g, "[").replace(/\\\]/g, "]")
                .replace(/\\\(/g, "(").replace(/\\\)/g, ")")
                .replace(/\\([.:])/g, "$1");

            return content;
        };
        
        const createDocContentGlobal = (questions, title = "ĐỀ KIỂM TRA") => {
            let bodyContent = `<h2 style='text-align:center; font-size:16pt; margin-bottom:20pt; font-family: "Times New Roman"'>${title.toUpperCase()}</h2>`;
            questions.forEach(q => {
                bodyContent += `<p style='margin-bottom:6pt; text-align:justify; font-size:12pt; font-family: "Times New Roman"'><b>Câu ${q.number}:</b> ${formatMathForWord(q.question)}</p>`;
                const options = q.options || [];
                if(options.length === 4) {
                     const maxLen = Math.max(...options.map(o => o.length));
                     if (maxLen < 15) {
                        bodyContent += `<table style='width:100%; border:none; margin-bottom:12pt; font-family: "Times New Roman"'><tr><td style='width:25%'><b>A.</b> ${formatMathForWord(options[0])}</td><td style='width:25%'><b>B.</b> ${formatMathForWord(options[1])}</td><td style='width:25%'><b>C.</b> ${formatMathForWord(options[2])}</td><td style='width:25%'><b>D.</b> ${formatMathForWord(options[3])}</td></tr></table>`;
                     } else if (maxLen < 40) {
                        bodyContent += `<table style='width:100%; border:none; margin-bottom:12pt; font-family: "Times New Roman"'><tr><td style='width:50%'><b>A.</b> ${formatMathForWord(options[0])}</td><td style='width:50%'><b>B.</b> ${formatMathForWord(options[1])}</td></tr><tr><td style='width:50%'><b>C.</b> ${formatMathForWord(options[2])}</td><td style='width:50%'><b>D.</b> ${formatMathForWord(options[3])}</td></tr></table>`;
                     } else {
                        bodyContent += `<div style='margin-bottom:12pt; font-family: "Times New Roman"'><p><b>A.</b> ${formatMathForWord(options[0])}</p><p><b>B.</b> ${formatMathForWord(options[1])}</p><p><b>C.</b> ${formatMathForWord(options[2])}</p><p><b>D.</b> ${formatMathForWord(options[3])}</p></div>`;
                     }
                }
            });
            bodyContent += `<br/><hr/><br/><h3 style='text-align:center; font-size:14pt; font-family: "Times New Roman"'>BẢNG ĐÁP ÁN</h3>`;
            bodyContent += `<table border="1" style="border-collapse: collapse; width: 100%; text-align: center; font-family: "Times New Roman"">`;
            const totalQs = questions.length;
            const rows = Math.ceil(totalQs / 10);
            for(let r=0; r<rows; r++) {
                bodyContent += `<tr style="background-color: #f0f0f0;">`;
                for(let c=0; c<10; c++) {
                    const qNum = r*10 + c + 1;
                    if(qNum <= totalQs) bodyContent += `<td style="padding: 5px;"><b>${qNum}</b></td>`; else bodyContent += `<td></td>`;
                }
                bodyContent += `</tr><tr>`;
                for(let c=0; c<10; c++) {
                    const qNum = r*10 + c + 1;
                    if(qNum <= totalQs) {
                        const q = questions[qNum-1];
                        const ansLetter = q.correctAnswerIndex !== -1 ? String.fromCharCode(65 + q.correctAnswerIndex) : "?";
                        bodyContent += `<td style="padding: 5px; color: blue;">${ansLetter}</td>`;
                    } else bodyContent += `<td></td>`;
                }
                bodyContent += `</tr>`;
            }
            bodyContent += `</table>`;
            return `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>${title}</title><style>@page { size: A4; margin: 1.5cm 1.5cm 1.5cm 2.5cm; } body { font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.3; }</style></head><body>${bodyContent}</body></html>`;
        };

        // --- ICONS ---
        const Icon = ({ children, className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
        const Icons = {
            Home: (p) => <Icon {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>,
            Presentation: (p) => <Icon {...p}><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5 5 5-5"/></Icon>,
            Settings: (p) => <Icon {...p}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2 2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1 2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></Icon>,
            Upload: (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>,
            Check: (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>,
            ArrowLeft: (p) => <Icon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>,
            ArrowRight: (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></Icon>,
            Eye: (p) => <Icon {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></Icon>,
            EyeOff: (p) => <Icon {...p}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M1 1l22 22"/></Icon>,
            Trash: (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2-2v2"/></Icon>,
            AlertTriangle: (p) => <Icon {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>,
            Zap: (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>,
            Book: (p) => <Icon {...p}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></Icon>,
            Zip: (p) => <Icon {...p}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></Icon>,
            Lock: (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>,
            X: (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>,
            Edit: (p) => <Icon {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Icon>,
            Layers: (p) => <Icon {...p}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></Icon>,
            Shuffle: (p) => <Icon {...p}><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></Icon>,
            Download: (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>,
            Pdf: (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></Icon>,
            Excel: (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h8"/><path d="M8 17h8"/><path d="M10 9h4"/></Icon>,
            Server: (p) => <Icon {...p}><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></Icon>,
            Image: (p) => <Icon {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></Icon>,
            Info: (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></Icon>,
            ClipboardCheck: (p) => <Icon {...p}><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2" ry="2"/><path d="M9 14l2 2 4-4"/></Icon>
        };

        // --- MATH DISPLAY FIX ---
        const cleanLatexArtifacts = (text) => {
            if (!text) return "";
            return text
                .replace(/\\{/g, "{").replace(/\\}/g, "}")
                .replace(/\\\[/g, "[").replace(/\\\]/g, "]")
                .replace(/\\\(/g, "(").replace(/\\\)/g, ")");
        };

        const formatLatexText = (text) => {
            if (!text) return "";
            let clean = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            clean = clean.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
            clean = clean.replace(/\*(.*?)\*/g, "<i>$1</i>");
            clean = cleanLatexArtifacts(clean);
            return clean;
        };

        const isMathString = (text) => {
             const mathIndicators = ['\\frac', '\\sqrt', '\\sum', '\\int', '\\alpha', '\\beta', '\\pi', '\\infty', '\\neq', '\\leq', '\\geq', '^', '_', '\\to', '\\rightarrow', '\\lim', '\\vec'];
             return mathIndicators.some(i => text.includes(i)) || (/[a-zA-Z0-9]\s*[=<>]\s*[a-zA-Z0-9]/.test(text) && !text.includes("->"));
        };

        const MATH_REGEX = /(\$\$[\s\S]+?\$\$|\$[\s\S]+?\$|\\\[[\s\S]+?\\\]|\\\([\s\S]+?\\\))/g;

        const LatexText = ({ text }) => {
            if (!text) return <span></span>;
            const parts = text.split(MATH_REGEX);
            return (
                <span>
                    {parts.map((part, index) => {
                        if (part.startsWith('$') || part.startsWith('\\(') || part.startsWith('\\[')) {
                            let content = part;
                            let isDisplay = false;
                            if (part.startsWith('$$')) { content = part.slice(2, -2); isDisplay = true; }
                            else if (part.startsWith('$')) { content = part.slice(1, -1); }
                            else if (part.startsWith('\\[')) { content = part.slice(2, -2); isDisplay = true; }
                            else if (part.startsWith('\\(')) { content = part.slice(2, -2); }
                            try {
                                const cleanContent = content.replace(/\\\\([{}])/g, "\\$1");
                                const html = katex.renderToString(cleanContent, { throwOnError: false, displayMode: isDisplay });
                                return <span key={index} dangerouslySetInnerHTML={{ __html: html }} className="math-tex text-blue-700" />;
                            } catch (e) { return <span key={index}>{part}</span>; }
                        } else if (isMathString(part)) {
                             try {
                                const cleanContent = part.replace(/\\\\([{}])/g, "\\$1");
                                const html = katex.renderToString(cleanContent, { throwOnError: false });
                                return <span key={index} dangerouslySetInnerHTML={{ __html: html }} className="math-tex text-blue-700" />;
                            } catch (e) { return <span key={index} dangerouslySetInnerHTML={{ __html: formatLatexText(part) }} />; }
                        }
                        return <span key={index} dangerouslySetInnerHTML={{ __html: formatLatexText(part) }} />;
                    })}
                </span>
            );
        };

        // --- COMPONENTS ---
        
        const GoogleSlidesViewer = () => {
            const [url, setUrl] = useState("");
            const [embedUrl, setEmbedUrl] = useState("");
            const [showControls, setShowControls] = useState(true);
            const processUrl = () => {
                if(!url) return;
                let finalUrl = url;
                if(url.includes("/pub?")) finalUrl = url.replace("/pub?", "/embed?");
                else if(url.includes("/edit")) finalUrl = url.split("/edit")[0] + "/embed?start=false&loop=false&delayms=3000";
                setEmbedUrl(finalUrl);
                setShowControls(false); 
            };
            return (
                <div className="flex flex-col h-full bg-gray-800 relative group">
                    {showControls && (
                        <div className="bg-gray-900 text-white p-3 flex justify-between items-center shadow-md z-30 absolute top-0 left-0 right-0">
                             <div className="flex-1 flex gap-2 max-w-3xl mx-auto">
                                 <input value={url} onChange={(e)=>setUrl(e.target.value)} placeholder="Dán link Google Slides" className="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-1 text-sm outline-none focus:border-indigo-500" />
                                 <button onClick={processUrl} className="btn-primary">Load</button>
                             </div>
                             <button onClick={() => setShowControls(false)} className="text-gray-400 hover:text-white ml-4"><Icons.EyeOff className="w-5 h-5"/></button>
                        </div>
                    )}
                    {!showControls && (<button onClick={() => setShowControls(true)} className="absolute top-2 right-2 z-50 bg-black/50 hover:bg-black/80 text-white p-2 rounded-full transition-all opacity-0 group-hover:opacity-100"><Icons.Settings className="w-5 h-5"/></button>)}
                    <div className="flex-1 relative w-full h-full bg-black flex justify-center items-center">
                        {!embedUrl ? (<div className="text-gray-500 text-center"><Icons.Presentation className="w-20 h-20 mx-auto mb-4 opacity-50"/><p>Chưa có Slide nào.</p></div>) : (<iframe src={embedUrl} frameBorder="0" width="100%" height="100%" allowFullScreen="true" className="absolute inset-0 z-0"></iframe>)}
                    </div>
                </div>
            );
        };

        const PresentationMode = ({ questions, onBack }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [showAnswer, setShowAnswer] = useState(false);
            const currentQ = questions[currentIndex];
            useEffect(() => { setShowAnswer(false); }, [currentIndex]);
            
            return (
                <div className="flex flex-col h-full bg-slate-900 text-white p-4 font-sans overflow-auto">
                    <div className="flex justify-between items-center mb-4 border-b border-slate-700 pb-2 shrink-0">
                        <button onClick={onBack} className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded flex items-center gap-2"><Icons.ArrowLeft className="w-4 h-4" /> Thoát</button>
                        <span className="text-xl font-bold">Câu hỏi {currentIndex + 1} / {questions.length}</span>
                        <div className="w-24"></div>
                    </div>
                    <div className="flex-1 flex flex-col justify-center items-center max-w-5xl mx-auto w-full slide-enter my-4">
                        <div className="bg-white text-slate-900 p-8 rounded-2xl shadow-2xl w-full min-h-[400px] flex flex-col">
                            <h2 className="text-3xl font-bold mb-8 leading-relaxed select-none"><LatexText text={currentQ.question} /></h2>

                    });
                    if(!res.ok) throw new Error(res.status);
                    return await res.json();
                } catch(e) {
                    if(e.message==="429"||e.message==="503") { await new Promise(r=>setTimeout(r,1000)); return fetchWithRetry(keysToTry.slice(1), prompt); }

            const handleAIGen = async () => {

                try {
                    const prompt = `Tạo ${questionCount} câu trắc nghiệm chủ đề "${topic}". Output JSON format (QUAN TRỌNG: Các ký tự LaTeX như \\frac phải được escape thành \\\\frac): [{"id":1, "question":"Nội dung (dùng $LaTeX$ cho toán)", "options":["A","B","C","D"], "correctAnswer":"Nội dung đúng"}]`;

                    let jsonString = cleanJsonString(txt);

        // --- MODAL COMPONENTS (UPDATED: INPUT ANSWER) ---
        const InputAnswerModal = ({ isOpen, onClose, onApply, apiKeys }) => {

        // --- SERVER MIXER (TOOL 1) --- 
        const ServerMixerComponent = () => {
            const [userApiKeys, setUserApiKeys] = useState([]);
            const [backendUrl, setBackendUrl] = useState("https://hoangthiencm-quiz.hf.space");
            const [showConfig, setShowConfig] = useState(false);

            const [step, setStep] = useState(0);
            const [loading, setLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState("");
            const [useServer, setUseServer] = useState(true); 
            const [numVariants, setNumVariants] = useState(4);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const savedKeys = localStorage.getItem("sq_pro_user_api_keys");
                if(savedKeys) { try { setUserApiKeys(JSON.parse(savedKeys)); } catch(e) {} }
                const savedUrl = localStorage.getItem("sq_pro_backend_url");
                if(savedUrl) setBackendUrl(savedUrl);
            }, []);

            const handleSaveConfig = (url, keys) => {
                setBackendUrl(url); setUserApiKeys(keys);
                localStorage.setItem("sq_pro_backend_url", url); localStorage.setItem("sq_pro_user_api_keys", JSON.stringify(keys));
            };

            const createDocContent = (code, questions) => createDocContentGlobal(questions, `MÃ ĐỀ: ${code}`);

            const generateExamVariant = (originalQuestions, code) => {
                const shuffledQuestions = [...originalQuestions].sort(() => Math.random() - 0.5);
                
                return { code, questions: shuffledQuestions.map((q, i) => {
                    const optsWithMeta = q.options.map((opt, index) => ({ content: opt, isCorrect: index === q.correctAnswerIndex }));
                    const shuffledOpts = optsWithMeta.sort(() => Math.random() - 0.5);
                    const newCorrectAnswerIndex = shuffledOpts.findIndex(o => o.isCorrect);

                    return { 
                        ...q, 
                        number: i + 1, 
                        options: shuffledOpts.map(o => o.content),
                        correctAnswerIndex: newCorrectAnswerIndex, 
                        correctAnswerLetter: String.fromCharCode(65 + newCorrectAnswerIndex) 
                    };
                })};
            };

            const handleExportZip = () => {
                const unanswered = questions.filter(q => q.correctAnswerIndex === -1);
                if(unanswered.length > 0) {
                    if(!confirm(`CẢNH BÁO: Còn ${unanswered.length} câu chưa chọn đáp án (sẽ bị lỗi khi chấm). Bạn có chắc chắn muốn tải không?`)) return;
                }

                const zip = new JSZip(); const codes = Array.from({length: numVariants}, (_, i) => 101 + i);
                let allVariants = [];
                codes.forEach(code => { 
                    const variant = generateExamVariant(questions, code); 
                    allVariants.push(variant); 
                    zip.file(`De_${code}.doc`, createDocContent(code, variant.questions)); 
                });
                
                let table = `<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta http-equiv="content-type" content="text/plain; charset=UTF-8"/></head><body><table border="1"><tr><th>MÃ ĐỀ</th>`;
                for(let i=1; i<=questions.length; i++) { table += `<th>CÂU ${i}</th>`; } table += `</tr>`;
                allVariants.forEach(v => { 
                    table += `<tr><td>${v.code}</td>`; 
                    v.questions.sort((a,b) => a.number - b.number).forEach(q => { 
                        table += `<td>${q.correctAnswerLetter}</td>`; 
                    }); 
                    table += `</tr>`; 
                });
                table += `</table></body></html>`;
                zip.file(`TongHopDapAn.xls`, table);
                zip.generateAsync({type:"blob"}).then(c => saveAs(c, `Bo_De_${codes.length}Ma.zip`));
            };

            const parseDocxAdvanced = async (file) => {
                const zip = new JSZip(); await zip.loadAsync(file);
                const xmlContent = await zip.file("word/document.xml").async("string");
                const parser = new DOMParser(), xmlDoc = parser.parseFromString(xmlContent, "text/xml");
                const paragraphs = xmlDoc.getElementsByTagName("w:p");
                let lines = [];
                for (let i = 0; i < paragraphs.length; i++) {
                    const p = paragraphs[i]; let line = "";
                    for (let j = 0; j < p.childNodes.length; j++) {
                        const node = p.childNodes[j];
                        if (node.nodeName === "w:r") {
                            const tNodes = node.getElementsByTagName("w:t");
                            for(let k=0; k<tNodes.length; k++) line += escapeHtml(tNodes[k].textContent);
                        } else if (node.nodeName === "m:oMath" || node.nodeName === "m:oMathPara") {
                            const mathTexts = node.getElementsByTagName("m:t");
                            let mathExp = ""; for(let k=0; k<mathTexts.length; k++) mathExp += mathTexts[k].textContent;
                            if(mathExp) line += " $" + mathExp + "$ ";
                        }
                    }
                    if (line.trim()) lines.push(line);
                }
                return lines;
            };

            const parseHtmlDoc = (htmlContent) => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                const nodes = doc.querySelectorAll('p, td, div');
                let lines = [];
                nodes.forEach(node => {
                    let text = node.innerText || node.textContent;
                    if(text.trim()) lines.push(text.trim());
                });
                return lines;
            };

            const parseQuestions = (lines) => {
                let processedLines = [];
                lines.forEach(line => { let temp = line.replace(/[\t\s\u00A0]+([A-D][\.:])[\t\s\u00A0]+/g, (m, p1) => `\n${p1} `); temp.split('\n').forEach(s => { if(s.trim()) processedLines.push(s); }); });
                const qs = []; let currentQ = null; const qRegex = /^(?:Câu|Bài)?\s*(\d+)[:.]/i, optRegex = /^([A-D])[\.:]\s*(.*)/i;
                processedLines.forEach(line => {
                    const text = line.trim(), textOnly = text.replace(/<[^>]*>/g, "");
                    const qMatch = textOnly.match(qRegex);
                    if (qMatch) { 
                        if (currentQ) qs.push(currentQ); 
                        currentQ = { id: Math.random(), number: qMatch[1], question: text.replace(qRegex, '').trim(), options: [], correctAnswerIndex: -1 }; 
                    } 
                    else if (currentQ) { const optMatch = textOnly.match(optRegex); if (optMatch) currentQ.options.push(text.replace(/^([A-D])[\.:]\s*/, '').trim()); else if (currentQ.options.length === 0) currentQ.question += " " + text; }
                });
                if (currentQ) qs.push(currentQ); return qs;

                const file = e.target.files[0]; if(!file) return;
                if (useServer) {
                    if (!backendUrl) { alert("Vui lòng cấu hình Link Server trước!"); return; }
                    setLoading(true); setLoadingMsg("Đang kết nối...");
                    try {
                        const formData = new FormData(); formData.append("file", file);
                        const headers = {}; if(userApiKeys.length > 0) headers["X-Gemini-API-Key"] = userApiKeys.join(",");
                        const response = await fetch(`${backendUrl}/convert-and-quiz`, { method: "POST", headers: headers, body: formData });
                        if (!response.ok) throw new Error(response.status);
                        const data = await response.json();
                        const mapped = data.map((q, i) => ({ id: Date.now() + i, number: i + 1, question: q.question, options: q.options.map(o => o.replace(/^[A-D][\.:]\s*/, '')), correctAnswerIndex: -1 }));
                        setQuestions(mapped); setStep(2);
                    } catch (err) { alert("Lỗi Server, chuyển Offline."); setUseServer(false); handleOfflineParse(file); } finally { setLoading(false); }
                } else handleOfflineParse(file);
            };

            const handleOfflineParse = async (file) => {
                setLoading(true);
                try {
                    let lines = [];
                    try {
                        lines = await parseDocxAdvanced(file);
                    } catch (zipError) {
                        console.log("Zip parse failed, trying HTML parse for fake Docx...");
                        const text = await file.text();
                        if (text.trim().startsWith('<html') || text.includes('xmlns:w')) {
                            lines = parseHtmlDoc(text);
                        } else {
                            throw new Error("Không đọc được file. Hãy chắc chắn là file .docx chuẩn hoặc file xuất từ ứng dụng này.");
                        }
                    }
                    setQuestions(parseQuestions(lines)); setStep(2);
                } catch (err) { alert(err.message); } finally { setLoading(false); }
            };

            const handleApplyQuickAnswers = (text) => {
                const matches = text.matchAll(/(\d+)[\.\s:\-\)]*([A-D])/gi);
                const newQuestions = [...questions];
                for (const match of matches) {
                    const qNum = parseInt(match[1]);
                    const ansChar = match[2].toUpperCase();
                    const ansIdx = ansChar.charCodeAt(0) - 65;
                    const qIdx = newQuestions.findIndex(q => parseInt(q.number) === qNum);
                    if (qIdx !== -1 && ansIdx >= 0 && ansIdx <= 3 && newQuestions[qIdx].options.length > ansIdx) { 
                        newQuestions[qIdx].correctAnswerIndex = ansIdx; 
                    }
                }
                setQuestions(newQuestions); alert("Đã cập nhật đáp án!");
            };

            const incompleteCount = questions.filter(q=>q.correctAnswerIndex === -1).length;

            return (
                <div className="p-4 bg-white rounded-xl shadow-sm">
                    {loading && <div className="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center"><div className="loader mb-4"></div><p className="font-bold text-indigo-600 animate-pulse">{loadingMsg || "Đang xử lý..."}</p></div>}
                    <ConfigModal isOpen={showConfig} onClose={()=>setShowConfig(false)} onSave={handleSaveConfig} currentUrl={backendUrl} currentKeys={userApiKeys} />
                    <InputAnswerModal isOpen={showQuickAnswer} onClose={()=>setShowQuickAnswer(false)} onApply={handleApplyQuickAnswers} apiKeys={userApiKeys} />
                    
                    <div className="flex justify-between items-center mb-6 border-b pb-2">
                        <h2 className="font-bold text-xl text-gray-800 flex gap-2 items-center"><Icons.Server className="w-6 h-6 text-indigo-600"/> Công cụ trộn đề: Server/Offline</h2>
                        <button onClick={()=>setShowConfig(true)} className="flex items-center gap-2 bg-gray-100 px-3 py-1 rounded text-sm hover:bg-gray-200 border border-gray-300"><Icons.Settings className="w-4 h-4"/> Cấu Hình</button>
                    </div>

                    {step === 0 && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                             <div onClick={()=>{setStep(1); setUseServer(true)}} className="bg-indigo-50 p-6 rounded-xl border-2 border-indigo-100 hover:border-indigo-500 cursor-pointer transition text-center">
                                <div className="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-3"><Icons.Upload className="w-6 h-6"/></div>
                                <h3 className="font-bold text-lg">Upload File Đề (Server)</h3>
                                <p className="text-sm text-gray-500">Xử lý PDF/Docx chuẩn xác (Cần Backend)</p>
                            </div>
                            <div onClick={()=>{setStep(1); setUseServer(false)}} className="bg-gray-50 p-6 rounded-xl border-2 border-gray-200 hover:border-gray-500 cursor-pointer transition text-center">
                                <div className="w-12 h-12 bg-gray-200 text-gray-600 rounded-full flex items-center justify-center mx-auto mb-3"><Icons.Zap className="w-6 h-6"/></div>
                                <h3 className="font-bold text-lg">Chế độ Offline</h3>
                                <p className="text-sm text-gray-500">Xử lý nhanh file không công thức</p>
                            </div>
                        </div>
                    )}

                    {step === 1 && (
                        <div className="text-center p-8 border-2 border-dashed border-indigo-200 rounded-xl bg-indigo-50 hover:bg-indigo-100 cursor-pointer" onClick={()=>fileInputRef.current.click()}>
                            <input ref={fileInputRef} type="file" accept=".docx,.doc,.pdf" className="hidden" onChange={handleFileUpload} />
                            <Icons.Upload className="w-12 h-12 text-indigo-500 mx-auto mb-3"/>
                            <h3 className="font-bold text-lg">Chọn file .docx / .doc / .pdf</h3>
                            <button onClick={(e)=>{e.stopPropagation(); setStep(0);}} className="mt-4 text-sm text-gray-500 underline">Quay lại</button>
                        </div>
                    )}

                    {step === 2 && (
                        <div>
                             <div className="flex justify-between items-center mb-4 bg-gray-50 p-3 rounded-lg sticky top-0 z-10 shadow-md">
                                <div>
                                    <span className="font-bold">Kết quả: {questions.length} câu</span>
                                    {incompleteCount > 0 && <span className="ml-2 text-red-600 font-bold text-sm animate-pulse">(Còn {incompleteCount} câu chưa có đáp án!)</span>}
                                </div>
                                <div className="flex gap-2 items-center">
                                    <button onClick={()=>setShowQuickAnswer(true)} className="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700 font-bold animate-bounce shadow-lg"><Icons.Edit className="w-4 h-4 inline"/> Nhập Đ.Án Nhanh</button>
                                    <input type="number" min="1" max="20" value={numVariants} onChange={e=>setNumVariants(parseInt(e.target.value))} className="w-12 border rounded text-center p-1"/>
                                    <button onClick={handleExportZip} className={`text-white px-3 py-1 rounded text-sm font-bold flex items-center gap-2 ${incompleteCount > 0 ? 'bg-gray-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700'}`}><Icons.Zip className="w-4 h-4 inline"/> Tải Bộ Đề</button>
                                    <button onClick={()=>setStep(0)} className="text-gray-500 text-sm underline ml-2">Hủy</button>
                                </div>
                            </div>
                            <div className="space-y-3 max-h-[500px] overflow-y-auto">
                                {questions.map((q) => (
                                    <div key={q.id} className={`bg-white p-4 rounded border ${q.correctAnswerIndex === -1 ? 'question-incomplete' : 'border-gray-200'}`}>
                                        <div className="flex justify-between mb-2">
                                            <span className="font-bold text-indigo-600 text-sm">Câu {q.number}</span> 
                                            <div className="flex gap-2">
                                                {q.correctAnswerIndex === -1 && <span className="text-xs font-bold bg-red-100 text-red-600 px-2 py-0.5 rounded">CHƯA CÓ ĐÁP ÁN</span>}
                                                <button onClick={()=>setQuestions(questions.filter(x=>x.id!==q.id))} className="text-red-400 hover:text-red-600"><Icons.Trash className="w-4 h-4"/></button>
                                            </div>
                                        </div>
                                        <div className="mb-3 text-base"><LatexText text={q.question}/></div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                            {q.options.map((o, idx) => (
                                                <div key={idx} onClick={()=>{const n=[...questions]; n.find(x=>x.id===q.id).correctAnswerIndex=idx; setQuestions(n);}} className={`p-2 border rounded flex gap-2 items-center cursor-pointer text-sm ${idx===q.correctAnswerIndex?'bg-green-50 border-green-500':'hover:bg-gray-50'}`}>
                                                    <span className={`font-bold w-5 h-5 rounded-full flex items-center justify-center text-xs shrink-0 ${idx===q.correctAnswerIndex ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-600'}`}>{String.fromCharCode(65+idx)}</span>
                                                    <div className="flex-1"><LatexText text={o}/></div>
                                                    {idx===q.correctAnswerIndex && <Icons.Check className="w-4 h-4 text-green-600 shrink-0"/>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- EXAM MIXER: TOOL 2 - GEMINI AI (UPDATED FLOW) ---
        const GeminiMixerComponent = () => {
            const [apiKeys, setApiKeys] = useState([]);
            const [questions, setQuestions] = useState([]);
            const [step, setStep] = useState(0);
            const [loading, setLoading] = useState(false);
            const [progress, setProgress] = useState("");
            const [numVariants, setNumVariants] = useState(4);
            const [showQuickEdit, setShowQuickEdit] = useState(false);
            const [fileName, setFileName] = useState("");
            const fileInputRef = useRef(null);
            const keyInputRef = useRef(null);

            useEffect(() => { const savedKeys = localStorage.getItem('sq_pro_api_key_autosave_v2'); if (savedKeys) { try { const parsed = JSON.parse(savedKeys); if (Array.isArray(parsed)) setApiKeys(parsed); else setApiKeys([savedKeys]); } catch (e) { setApiKeys([savedKeys]); } } }, []);

            const fetchWithRetry = async (allKeys, prompt, images = [], retryCount = 0) => {
                if (retryCount >= allKeys.length) throw new Error("Tất cả API Key đều hết hạn mức hoặc lỗi!");
                const keyIndex = (Math.floor(Math.random() * allKeys.length) + retryCount) % allKeys.length;
                const currentKey = allKeys[keyIndex];
                let body;
                if(images.length > 0) {
                     const contentParts = [{ text: prompt }];
                     images.forEach(img => contentParts.push({ inline_data: { mime_type: "image/jpeg", data: img } }));
                     body = { contents: [{ parts: contentParts }] };
                } else { body = { contents: [{ parts: [{ text: prompt }] }] }; }
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentKey}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
                    if (res.status === 429 || res.status === 503) return fetchWithRetry(allKeys, prompt, images, retryCount + 1);
                    if(!res.ok) throw new Error(res.status);
                    return await res.json();
                } catch(e) { if(retryCount < allKeys.length - 1) return fetchWithRetry(allKeys, prompt, images, retryCount + 1); throw e; }
            };

            const convertPdfToImages = async (file) => {
                const buffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(buffer).promise;
                const images = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    setProgress(`Đang đọc trang ${i}/${pdf.numPages} (Siêu nét)...`);
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 4.0 }); 
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    images.push(canvas.toDataURL('image/jpeg', 0.9).split(',')[1]);
                }
                return images;
            };

            const handlePdfUpload = async (file) => {
                if(apiKeys.length === 0) { alert("Cần API Key!"); return; }
                setLoading(true); setFileName(file.name);
                try {
                    const images = await convertPdfToImages(file);
                    setProgress("AI Vision đang đọc đề (Không quét đáp án)...");
                    
                    const prompt = `
                        Bạn là chuyên gia số hóa đề thi. Nhiệm vụ: OCR chính xác nội dung câu hỏi.
                        1. KHÔNG TỰ GIẢI ĐÁP ÁN. Hãy để mặc định correctAnswer = "A". Tôi sẽ nạp đáp án sau.
                        2. ĐỊNH DẠNG QUAN TRỌNG:
                        - Tuyệt đối KHÔNG thêm dấu gạch chéo (\\) trước các ký tự { } [ ] ( ) trong văn bản thường.
                        - Toán học: BẮT BUỘC dùng dấu $bao quanh công thức. VÀ thêm khoảng trắng trước/sau công thức toán. Ví dụ: "cho hàm số $ y=x^2 $ đồng biến".
                        - Trả về JSON sạch, không markdown.

                        Output JSON:
                        [{"number":"1","question":"...","options":["...","...","...","..."],"correctAnswer":"A"}]
                    `;
                    
                    const data = await fetchWithRetry(apiKeys, prompt, images);
                    const txt = data.candidates[0].content.parts[0].text;
                    
                    let jsonString = cleanJsonString(txt);
                    let result;
                    try { 
                        result = JSON.parse(jsonString); 
                    } catch (e) { 
                        try { result = JSON.parse(jsonString.replace(/\\([a-zA-Z0-9])/g, "\\\\$1")); } 
                        catch(e2) { throw new Error("Lỗi đọc dữ liệu AI (JSON Error). Hãy thử lại."); } 
                    }

                    const cleanedResult = result.map((q, idx) => {
                        const cleanOptions = q.options.map(opt => {
                            if (!opt) return "";
                            return opt.replace(/^[\s\t]*([A-Da-d0-9]+)[\.\)\:\-]\s*/, '').trim();
                        });

                        return { 
                            ...q, 
                            options: cleanOptions, 
                            id: Date.now() + idx, 
                            number: idx + 1, 
                            correctAnswerIndex: -1, 
                            correctAnswerText: "" 
                        };
                    });

                    setQuestions(cleanedResult); setStep(2); 
                    setTimeout(() => alert("Đã đọc xong đề! Vui lòng dùng chức năng 'Nạp Đáp Án' để nhập đáp án chuẩn."), 500);
                } catch (err) { alert("Lỗi: " + err.message); } finally { setLoading(false); setProgress(""); }
            };

            const handleReadKeyFile = (e) => {
                const f = e.target.files[0]; if (!f) return;
                const r = new FileReader(); r.onload = (ev) => { const k = ev.target.result.split('\n').map(x => x.trim()).filter(x => x); if(k.length) { setApiKeys(k); localStorage.setItem('sq_pro_api_key_autosave_v2', JSON.stringify(k)); alert(`Đã nạp ${k.length} keys!`); } }; r.readAsText(f);
            };

            const handleExportUltimate = () => {
                const unanswered = questions.filter(q => q.correctAnswerIndex === -1);
                if(unanswered.length > 0) {
                    if(!confirm(`CẢNH BÁO: Còn ${unanswered.length} câu chưa chọn đáp án. Bạn có chắc chắn muốn tải không?`)) return;
                }

                const zip = new JSZip();
                const codes = Array.from({length: numVariants}, (_, i) => 101 + i);
                let excelData = [];
                
                codes.forEach(code => {
                    const shuffledQs = [...questions].sort(() => Math.random() - 0.5);
                    
                    const variantQs = shuffledQs.map((q, idx) => {
                        const originalOpts = q.options.map((txt, i) => ({ text: txt, isCorrect: i === q.correctAnswerIndex }));
                        const shuffledOpts = originalOpts.sort(() => Math.random() - 0.5);
                        const newCorrectIndex = shuffledOpts.findIndex(o => o.isCorrect);
                        
                        return { 
                            number: idx + 1, 
                            question: q.question, 
                            options: shuffledOpts.map(o => o.text), 
                            correctAnswerIndex: newCorrectIndex, 
                            correctAnswerLetter: newCorrectIndex !== -1 ? String.fromCharCode(65 + newCorrectIndex) : "?" 
                        };
                    });
                    
                    let rowData = { "Mã Đề": code }; 
                    variantQs.sort((a,b) => a.number - b.number).forEach(q => rowData[`Câu ${q.number}`] = q.correctAnswerLetter); 
                    excelData.push(rowData);
                    
                    const docContent = createDocContentGlobal(variantQs, `MÃ ĐỀ: ${code}`);
                    zip.file(`De_${code}.doc`, docContent);
                });

                const ws = XLSX.utils.json_to_sheet(excelData); 
                const wb = XLSX.utils.book_new(); 
                XLSX.utils.book_append_sheet(wb, ws, "DapAn"); 
                const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' }); 
                zip.file("Bang_Dap_An.xlsx", excelBuffer); 
                zip.generateAsync({type:"blob"}).then(c => saveAs(c, `SmartQuiz_Pro_${Date.now()}.zip`));
            };

            const handleBatchUpdateAnswers = (text) => { const raw = text.toUpperCase().replace(/[^0-9A-D]/g, ' '); const regex = /(\d+)\s*([A-D])/g; let match; const newMap = {}; while ((match = regex.exec(raw)) !== null) { newMap[parseInt(match[1])] = match[2].charCodeAt(0) - 65; } setQuestions(questions.map(q => newMap[q.number] !== undefined ? { ...q, correctAnswerIndex: newMap[q.number] } : q)); alert("Đã cập nhật!"); };
            const handleUpdateAnswer = (qId, newIndex) => { setQuestions(questions.map(q => q.id === qId ? { ...q, correctAnswerIndex: newIndex } : q)); };
            const incompleteCount = questions.filter(q=>q.correctAnswerIndex === -1).length;

            return (
                <div className="p-4 bg-white rounded-xl shadow-sm">
                     <InputAnswerModal isOpen={showQuickEdit} onClose={()=>setShowQuickEdit(false)} onApply={handleBatchUpdateAnswers} apiKeys={apiKeys} />
                     <div className="flex justify-between items-center mb-6 border-b pb-2">
                        <h2 className="font-bold text-xl text-gray-800 flex gap-2 items-center"><Icons.Pdf className="w-6 h-6 text-red-600"/> Công cụ trộn đề: Gemini (PDF AI Vision)</h2>
                        <div className="flex gap-2">
                             <button onClick={()=>keyInputRef.current.click()} className="bg-indigo-600 px-3 py-1 rounded text-sm flex gap-1 items-center text-white hover:bg-indigo-500 transition"><Icons.Upload className="w-4 h-4"/> {apiKeys.length > 0 ? `${apiKeys.length} Keys` : "Nạp Key"}</button>
                             <input type="file" ref={keyInputRef} className="hidden" onChange={handleReadKeyFile} />
                        </div>
                    </div>

                    {step === 0 && (
                        <div className="text-center p-8 border-2 border-dashed border-red-200 rounded-xl bg-red-50 hover:bg-red-100 cursor-pointer" onClick={()=>!loading && fileInputRef.current.click()}>
                            {loading ? (
                                <div><div className="loader mx-auto mb-4"></div><h3 className="font-bold text-indigo-700 text-xl animate-pulse">Đang xử lý AI...</h3><p className="text-gray-500 mt-2 text-sm">{progress}</p></div>
                            ) : ( 
                                <>
                                    <Icons.Pdf className="w-12 h-12 text-red-500 mx-auto mb-3"/>
                                    <h3 className="font-bold text-lg text-gray-700">Chọn file PDF (AI Vision)</h3>
                                    <p className="text-sm text-gray-400 mt-2">Bước 1: Upload đề thi để AI đọc nội dung câu hỏi</p>
                                </> 
                            )}
                            <input ref={fileInputRef} type="file" accept=".pdf" className="hidden" onChange={(e)=>handlePdfUpload(e.target.files[0])} />
                        </div>
                    )}

                    {step === 2 && (
                         <div>
                             <div className="flex justify-between items-center mb-4 bg-gray-50 p-3 rounded-lg border border-blue-100 sticky top-0 z-10 shadow-md">
                                <div>
                                    <span className="font-bold text-lg">Kết quả: {questions.length} câu</span>
                                    {incompleteCount > 0 && <span className="ml-2 text-red-600 font-bold text-sm animate-pulse">(Còn {incompleteCount} câu chưa có đáp án!)</span>}
                                </div>
                                <div className="flex gap-2 items-center">
                                    <button onClick={()=>setShowQuickEdit(true)} className="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-orange-600 animate-bounce shadow-lg font-bold flex items-center gap-2"><Icons.Edit className="w-4 h-4"/> Nạp Đáp Án (Ảnh/Text)</button>
                                    <div className="flex items-center gap-1 bg-white border rounded-lg px-2 py-1">
                                        <span className="text-xs font-semibold text-gray-500">Số đề:</span>
                                        <input type="number" min="1" max="20" value={numVariants} onChange={e=>setNumVariants(parseInt(e.target.value))} className="w-10 text-center font-bold outline-none text-sm"/>
                                    </div>
                                    <button onClick={handleExportUltimate} className={`text-white px-4 py-2 rounded-lg text-sm font-bold shadow flex items-center gap-2 ${incompleteCount > 0 ? 'bg-gray-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700'}`}><Icons.Download className="w-4 h-4"/> Tải Về</button>
                                    <button onClick={()=>setStep(0)} className="text-gray-500 text-sm underline ml-2 hover:text-red-500">Hủy</button>
                                </div>
                            </div>
                            <div className="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                                {questions.map((q, i) => (
                                    <div key={q.id} className={`bg-white p-4 rounded-lg border relative group hover:shadow-md transition ${q.correctAnswerIndex === -1 ? 'question-incomplete' : 'border-gray-200'}`}>
                                        <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100"><button onClick={()=>{if(confirm("Xóa?")) setQuestions(questions.filter(x=>x.id!==q.id))}} className="text-gray-400 hover:text-red-500"><Icons.Trash className="w-4 h-4"/></button></div>
                                        <div className="flex justify-between mb-2">
                                            <span className="font-bold text-indigo-600 text-sm bg-indigo-50 px-2 py-1 rounded">Câu {q.number}</span>
                                            {q.correctAnswerIndex === -1 && <span className="text-xs font-bold bg-red-100 text-red-600 px-2 py-0.5 rounded mr-8">CHƯA CÓ ĐÁP ÁN</span>}
                                        </div>
                                        <div className="mb-3 text-base"><LatexText text={q.question}/></div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                            {q.options.map((o, idx) => (
                                                <div key={idx} onClick={() => handleUpdateAnswer(q.id, idx)} className={`p-2 border rounded-lg flex gap-2 items-center cursor-pointer text-sm transition-all ${idx===q.correctAnswerIndex ? 'bg-green-50 border-green-500 ring-1 ring-green-500' : 'bg-white border-gray-200 hover:bg-gray-50'}`}>
                                                    <span className={`font-bold w-6 h-6 rounded-full flex items-center justify-center text-xs shrink-0 transition ${idx===q.correctAnswerIndex ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-600'}`}>{String.fromCharCode(65+idx)}</span>
                                                    <div className="flex-1"><LatexText text={o.replace(/^[A-D][\.\:]\s*/, '')}/></div>
                                                    {idx===q.correctAnswerIndex && <Icons.Check className="w-4 h-4 text-green-600"/>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- EXAM MIXER ROOT TAB ---
        const ExamMixerTab = () => {
            const [activeTool, setActiveTool] = useState(null);

            if (!activeTool) {
                return (
                    <div className="p-10 h-full overflow-y-auto">
                        <div className="text-center mb-12">
                            <h1 className="text-4xl font-extrabold text-indigo-900 mb-4">CÔNG CỤ TRỘN ĐỀ THI</h1>
                            <p className="text-lg text-gray-500">Chọn phương thức trộn đề bạn muốn sử dụng</p>
