<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQuiz Pro v4.0 - Presentation Master</title>
    
    <!-- Core Libs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Libs hỗ trợ PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Font chữ đẹp */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }

        /* --- HIỆU ỨNG CHUYỂN TRANG NÂNG CAO --- */
        .slide-container {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        
        /* Hiệu ứng Slide (Trượt ngang) */
        .anim-slide-enter { transform: translateX(100%); opacity: 0; }
        .anim-slide-enter-active { transform: translateX(0); opacity: 1; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .anim-slide-exit { transform: translateX(0); opacity: 1; }
        .anim-slide-exit-active { transform: translateX(-20%); opacity: 0; transition: all 0.5s ease-in; }

        /* Hiệu ứng Fade (Mờ dần) */
        .anim-fade-enter { opacity: 0; transform: scale(0.95); }
        .anim-fade-enter-active { opacity: 1; transform: scale(1); transition: all 0.4s ease-out; }
        
        /* Khung Google Slide chuẩn tỷ lệ 16:9 */
        .google-slide-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* Viền đen rạp phim */
        }
        .google-slide-iframe {
            width: 100%;
            aspect-ratio: 16 / 9; /* Bắt buộc tỷ lệ 16:9 */
            max-height: 100vh;
            border: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Con trỏ bút vẽ */
        .cursor-pen { cursor: crosshair; }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- UTILS ---
        // Hàm chuyển đổi link Google Slide Edit -> Embed
        const convertGoogleSlideUrl = (url) => {
            if (!url) return "";
            let finalUrl = url.trim();
            // Nếu là link edit/view thường
            if (finalUrl.includes("/edit") || finalUrl.includes("/view")) {
                // Lấy ID: .../d/FILE_ID/...
                const match = finalUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if (match && match[1]) {
                    // rm=minimal: Ẩn thanh công cụ dưới cùng của Google
                    return `https://docs.google.com/presentation/d/${match[1]}/embed?start=false&loop=false&delayms=3000&rm=minimal`;
                }
            }
            // Nếu là link /pub (Publish to web) -> đổi sang /embed
            if (finalUrl.includes("/pub?")) {
                return finalUrl.replace("/pub?", "/embed?");
            }
            return finalUrl; // Trả về nguyên gốc nếu không nhận diện được
        };

        // --- COMPONENT: DASHBOARD (Màn hình nhập liệu) ---
        const Dashboard = ({ onStart, lastLink }) => {
            const [activeTab, setActiveTab] = useState('gslide'); // gslide, pdf
            const [gLink, setGLink] = useState(lastLink || "");
            const [pdfFile, setPdfFile] = useState(null);

            const handleStart = () => {
                if (activeTab === 'gslide') {
                    if (!gLink) return alert("Vui lòng nhập link Google Slides!");
                    onStart({ type: 'gslide', src: convertGoogleSlideUrl(gLink), rawLink: gLink });
                } else {
                    if (!pdfFile) return alert("Vui lòng chọn file PDF!");
                    onStart({ type: 'pdf', src: pdfFile });
                }
            };

            return (
                <div className="flex h-full">
                    {/* Sidebar Menu */}
                    <div className="w-64 bg-indigo-900 text-white p-6 flex flex-col gap-6 shadow-2xl z-10">
                        <h1 className="text-2xl font-bold flex items-center gap-2"><i className="fa-solid fa-graduation-cap"></i> SmartQuiz Pro</h1>
                        <div className="flex flex-col gap-2">
                            <button onClick={()=>setActiveTab('gslide')} className={`p-3 rounded-lg text-left transition ${activeTab==='gslide' ? 'bg-white text-indigo-900 font-bold shadow' : 'hover:bg-indigo-800 text-indigo-200'}`}>
                                <i className="fa-brands fa-google-drive mr-2"></i> Google Slides
                            </button>
                            <button onClick={()=>setActiveTab('pdf')} className={`p-3 rounded-lg text-left transition ${activeTab==='pdf' ? 'bg-white text-indigo-900 font-bold shadow' : 'hover:bg-indigo-800 text-indigo-200'}`}>
                                <i className="fa-solid fa-file-pdf mr-2"></i> Bài Giảng PDF
                            </button>
                        </div>
                        <div className="mt-auto text-xs text-indigo-400">v4.0 Presentation Master</div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 bg-gray-100 flex items-center justify-center p-10">
                        <div className="bg-white p-10 rounded-2xl shadow-xl w-full max-w-2xl border border-gray-200">
                            
                            {/* TAB: GOOGLE SLIDES */}
                            {activeTab === 'gslide' && (
                                <div className="space-y-6 animate-[fadeIn_0.3s_ease-out]">
                                    <div className="text-center">
                                        <div className="w-20 h-20 bg-yellow-100 text-yellow-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">
                                            <i className="fa-solid fa-presentation-screen"></i>
                                        </div>
                                        <h2 className="text-2xl font-bold text-gray-800">Trình Chiếu Google Slides</h2>
                                        <p className="text-gray-500 mt-1">Giữ nguyên hiệu ứng, video, âm thanh gốc.</p>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">Dán Link Google Slides (Edit hoặc View)</label>
                                        <div className="flex gap-2">
                                            <input 
                                                value={gLink}
                                                onChange={(e)=>setGLink(e.target.value)}
                                                className="flex-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                                                placeholder="https://docs.google.com/presentation/d/..."
                                            />
                                            <button onClick={()=>setGLink('')} className="text-gray-400 hover:text-red-500 px-2"><i className="fa-solid fa-times"></i></button>
                                        </div>
                                        <p className="text-xs text-gray-400 mt-2 italic">* Hệ thống sẽ tự động chuyển đổi link sang chế độ trình chiếu full màn hình.</p>
                                    </div>
                                    <button onClick={handleStart} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-lg font-bold py-4 rounded-xl shadow-lg shadow-indigo-200 transition transform hover:scale-[1.02] flex items-center justify-center gap-2">
                                        <i className="fa-solid fa-play"></i> BẮT ĐẦU DẠY
                                    </button>
                                </div>
                            )}

                            {/* TAB: PDF */}
                            {activeTab === 'pdf' && (
                                <div className="space-y-6 animate-[fadeIn_0.3s_ease-out]">
                                    <div className="text-center">
                                        <div className="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">
                                            <i className="fa-solid fa-file-pdf"></i>
                                        </div>
                                        <h2 className="text-2xl font-bold text-gray-800">Trình Chiếu PDF</h2>
                                        <p className="text-gray-500 mt-1">Hỗ trợ vẽ bảng, che đáp án (Masking).</p>
                                    </div>
                                    <div className="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:bg-gray-50 transition cursor-pointer" onClick={()=>document.getElementById('pdfInput').click()}>
                                        <i className="fa-solid fa-cloud-arrow-up text-4xl text-gray-300 mb-3"></i>
                                        <p className="text-gray-600 font-medium">Click để chọn file PDF</p>
                                        <input id="pdfInput" type="file" accept=".pdf" className="hidden" onChange={(e)=>setPdfFile(e.target.files[0])}/>
                                        {pdfFile && <p className="mt-2 text-green-600 font-bold"><i className="fa-solid fa-check-circle"></i> {pdfFile.name}</p>}
                                    </div>
                                    <button onClick={handleStart} disabled={!pdfFile} className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-400 text-white text-lg font-bold py-4 rounded-xl shadow-lg shadow-indigo-200 transition transform hover:scale-[1.02] flex items-center justify-center gap-2">
                                        <i className="fa-solid fa-play"></i> BẮT ĐẦU DẠY
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENT: TEACHING MODE (Chế độ dạy học) ---
        const TeachingMode = ({ data, onExit }) => {
            const [isDrawing, setIsDrawing] = useState(false);
            const canvasRef = useRef(null);
            const drawContextRef = useRef(null);
            const [penColor, setPenColor] = useState('red');

            // Quản lý PDF state
            const [pdfDoc, setPdfDoc] = useState(null);
            const [pageNum, setPageNum] = useState(1);
            const [pdfScale, setPdfScale] = useState(1.5);
            const pdfCanvasRef = useRef(null);
            
            // Hiệu ứng chuyển trang PDF
            const [animClass, setAnimClass] = useState('anim-slide-enter-active');

            // -- LOGIC VẼ --
            useEffect(() => {
                const canvas = canvasRef.current;
                if (canvas) {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.lineCap = "round";
                    ctx.lineJoin = "round";
                    ctx.lineWidth = 3;
                    drawContextRef.current = ctx;
                    
                    // Handle resize
                    const handleResize = () => {
                        const temp = ctx.getImageData(0,0,canvas.width, canvas.height);
                        canvas.width = window.innerWidth;
                        canvas.height = window.innerHeight;
                        ctx.putImageData(temp, 0, 0);
                        ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.lineWidth = 3; ctx.strokeStyle = penColor;
                    };
                    window.addEventListener('resize', handleResize);
                    return () => window.removeEventListener('resize', handleResize);
                }
            }, []);

            useEffect(() => {
                if(drawContextRef.current) drawContextRef.current.strokeStyle = penColor;
            }, [penColor]);

            const startDrawing = ({nativeEvent}) => {
                if(!isDrawing) return;
                const {offsetX, offsetY} = nativeEvent;
                drawContextRef.current.beginPath();
                drawContextRef.current.moveTo(offsetX, offsetY);
                canvasRef.current.isDrawing = true;
            };
            const draw = ({nativeEvent}) => {
                if(!isDrawing || !canvasRef.current.isDrawing) return;
                const {offsetX, offsetY} = nativeEvent;
                drawContextRef.current.lineTo(offsetX, offsetY);
                drawContextRef.current.stroke();
            };
            const stopDrawing = () => {
                if(canvasRef.current) canvasRef.current.isDrawing = false;
            };
            const clearCanvas = () => {
                const canvas = canvasRef.current;
                drawContextRef.current.clearRect(0, 0, canvas.width, canvas.height);
            };

            // -- LOGIC PDF --
            useEffect(() => {
                if (data.type === 'pdf' && data.src) {
                    const loadPdf = async () => {
                        const buffer = await data.src.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument(new Uint8Array(buffer)).promise;
                        setPdfDoc(pdf);
                    };
                    loadPdf();
                }
            }, [data]);

            useEffect(() => {
                if (pdfDoc && data.type === 'pdf') {
                    renderPdfPage(pageNum);
                }
            }, [pdfDoc, pageNum, pdfScale]);

            const renderPdfPage = async (num) => {
                const page = await pdfDoc.getPage(num);
                const viewport = page.getViewport({ scale: pdfScale });
                const canvas = pdfCanvasRef.current;
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            };

            const changePage = (offset) => {
                if (!pdfDoc) return;
                const newPage = Math.min(Math.max(1, pageNum + offset), pdfDoc.numPages);
                if (newPage !== pageNum) {
                    // Trigger Animation
                    setAnimClass('anim-slide-exit-active'); // Slide out old
                    setTimeout(() => {
                        setPageNum(newPage);
                        setAnimClass('anim-slide-enter'); // Prepare enter
                        setTimeout(() => setAnimClass('anim-slide-enter-active'), 50); // Slide in new
                    }, 200); // Wait for exit anim
                }
            };

            return (
                <div className="relative w-full h-full bg-black overflow-hidden">
                    
                    {/* --- CONTENT LAYER --- */}
                    <div className="absolute inset-0 z-0 flex items-center justify-center">
                        
                        {/* GOOGLE SLIDES */}
                        {data.type === 'gslide' && (
                            <div className="google-slide-wrapper">
                                <iframe 
                                    src={data.src} 
                                    className="google-slide-iframe"
                                    allowFullScreen={true}
                                ></iframe>
                            </div>
                        )}

                        {/* PDF VIEWER */}
                        {data.type === 'pdf' && (
                            <div className={`transition-transform duration-300 ${animClass}`}>
                                <canvas ref={pdfCanvasRef} className="shadow-2xl bg-white rounded-sm" />
                            </div>
                        )}
                    </div>

                    {/* --- DRAWING LAYER (OVERLAY) --- */}
                    <canvas
                        ref={canvasRef}
                        className={`absolute inset-0 z-10 ${isDrawing ? 'cursor-pen pointer-events-auto' : 'pointer-events-none'}`}
                        onMouseDown={startDrawing}
                        onMouseMove={draw}
                        onMouseUp={stopDrawing}
                        onMouseLeave={stopDrawing}
                    />

                    {/* --- CONTROL BAR (FLOATING) --- */}
                    <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900/90 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-6 backdrop-blur-sm z-50 border border-gray-700 transition-opacity hover:opacity-100 opacity-0 md:opacity-100">
                        
                        {/* Nút Thoát */}
                        <button onClick={onExit} className="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2">
                            <i className="fa-solid fa-door-open"></i> Thoát
                        </button>

                        <div className="w-px h-6 bg-gray-600"></div>

                        {/* Điều khiển PDF (Chỉ hiện khi là PDF) */}
                        {data.type === 'pdf' && (
                            <div className="flex items-center gap-3">
                                <button onClick={()=>changePage(-1)} className="w-8 h-8 rounded-full bg-gray-700 hover:bg-indigo-600 flex items-center justify-center"><i className="fa-solid fa-chevron-left"></i></button>
                                <span className="font-mono font-bold w-20 text-center">{pageNum} / {pdfDoc?.numPages}</span>
                                <button onClick={()=>changePage(1)} className="w-8 h-8 rounded-full bg-gray-700 hover:bg-indigo-600 flex items-center justify-center"><i className="fa-solid fa-chevron-right"></i></button>
                            </div>
                        )}

                        {/* Công cụ Vẽ */}
                        <div className="flex items-center gap-2 bg-gray-800 p-1 rounded-lg">
                            <button 
                                onClick={() => setIsDrawing(!isDrawing)} 
                                className={`px-3 py-1.5 rounded-md flex items-center gap-2 transition ${isDrawing ? 'bg-indigo-600 text-white shadow' : 'text-gray-400 hover:bg-gray-700'}`}
                            >
                                <i className={`fa-solid ${isDrawing ? 'fa-pen-nib' : 'fa-mouse-pointer'}`}></i>
                                {isDrawing ? "Đang Vẽ" : "Chuột"}
                            </button>
                            
                            {isDrawing && (
                                <>
                                    <div className="flex gap-1">
                                        {['red', 'blue', 'yellow', 'white'].map(c => (
                                            <button 
                                                key={c}
                                                onClick={() => setPenColor(c)}
                                                className={`w-6 h-6 rounded-full border-2 ${penColor === c ? 'border-white scale-110' : 'border-transparent'}`}
                                                style={{backgroundColor: c}}
                                            />
                                        ))}
                                    </div>
                                    <button onClick={clearCanvas} className="w-8 h-8 text-gray-400 hover:text-red-500" title="Xóa bảng"><i className="fa-solid fa-eraser"></i></button>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [mode, setMode] = useState('dashboard'); // dashboard, teaching
            const [teachData, setTeachData] = useState(null); // { type, src }

            const startTeaching = (data) => {
                setTeachData(data);
                setMode('teaching');
                // Tự động bật Fullscreen
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(e=>{});
                }
            };

            const exitTeaching = () => {
                setMode('dashboard');
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(e=>{});
                }
            };

            return (
                <div className="h-full">
                    {mode === 'dashboard' ? (
                        <Dashboard onStart={startTeaching} lastLink={teachData?.rawLink} />
                    ) : (
                        <TeachingMode data={teachData} onExit={exitTeaching} />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
