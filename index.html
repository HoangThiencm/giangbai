<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hỗ trợ dạy học online</title>
    
    <!-- 1. Core Libs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 2. Math Display -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        /* Animation Transitions */
        .slide-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .math-tex { font-family: 'Times New Roman', serif; font-size: 1.1em; }
        
        /* Presentation Shake */
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        // --- UTILS ---
        const cleanText = (str) => str ? str.replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/\s+/g, ' ').trim() : "";

        // --- ICONS ---
        const Icon = ({ children, className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
        const Icons = {
            Home: (p) => <Icon {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>,
            Presentation: (p) => <Icon {...p}><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5 5 5-5"/></Icon>,
            Settings: (p) => <Icon {...p}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></Icon>,
            Upload: (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>,
            Check: (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>,
            ArrowLeft: (p) => <Icon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>,
            ArrowRight: (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></Icon>,
            Eye: (p) => <Icon {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></Icon>,
            EyeOff: (p) => <Icon {...p}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M1 1l22 22"/></Icon>,
            Trash: (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2-2v2"/></Icon>,
            AlertTriangle: (p) => <Icon {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>,
            Zap: (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>,
        };

        // --- MATH DISPLAY ---
        const LatexText = ({ text }) => {
            if (!text) return <span></span>;
            const parts = text.split(/(\$[^$]+\$)/g);
            return (
                <span>
                    {parts.map((part, index) => {
                        if (part.startsWith('$') && part.endsWith('$') && part.length > 2) {
                            try {
                                const html = katex.renderToString(part.slice(1, -1), { throwOnError: false, displayMode: false });
                                return <span key={index} dangerouslySetInnerHTML={{ __html: html }} className="math-tex text-blue-700" />;
                            } catch (e) { return <span key={index}>{part}</span>; }
                        }
                        return <span key={index}>{part}</span>;
                    })}
                </span>
            );
        };

        // --- COMPONENT: GOOGLE SLIDES VIEWER (UPDATED) ---
        const GoogleSlidesViewer = () => {
            const [url, setUrl] = useState("");
            const [embedUrl, setEmbedUrl] = useState("");
            const [showControls, setShowControls] = useState(true); // New state to control visibility
            
            const processUrl = () => {
                if(!url) return;
                let finalUrl = url;
                if(url.includes("/pub?")) finalUrl = url.replace("/pub?", "/embed?");
                else if(url.includes("/edit")) finalUrl = url.split("/edit")[0] + "/embed?start=false&loop=false&delayms=3000";
                setEmbedUrl(finalUrl);
                setShowControls(false); // HIDE CONTROLS AFTER LOAD
            };

            return (
                <div className="flex flex-col h-full bg-gray-800 relative group">
                    {/* CONTROL BAR - HIDDEN WHEN showControls is false */}
                    {showControls && (
                        <div className="bg-gray-900 text-white p-3 flex justify-between items-center shadow-md z-30 absolute top-0 left-0 right-0">
                             <div className="flex-1 flex gap-2 max-w-3xl mx-auto">
                                 <input value={url} onChange={(e)=>setUrl(e.target.value)} placeholder="Dán link Google Slides (File -> Share -> Publish to web -> Embed -> Copy Link)" className="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-1 text-sm outline-none focus:border-indigo-500" />
                                 <button onClick={processUrl} className="bg-indigo-600 px-4 py-1 rounded text-sm hover:bg-indigo-500 font-bold">Load</button>
                             </div>
                             <button onClick={() => setShowControls(false)} className="text-gray-400 hover:text-white ml-4"><Icons.EyeOff className="w-5 h-5"/></button>
                        </div>
                    )}

                    {/* FLOATING BUTTON TO SHOW CONTROLS */}
                    {!showControls && (
                        <button 
                            onClick={() => setShowControls(true)} 
                            className="absolute top-2 right-2 z-50 bg-black/50 hover:bg-black/80 text-white p-2 rounded-full transition-all opacity-0 group-hover:opacity-100"
                            title="Hiện thanh điều khiển"
                        >
                            <Icons.Settings className="w-5 h-5"/>
                        </button>
                    )}

                    <div className="flex-1 relative w-full h-full bg-black flex justify-center items-center">
                        {!embedUrl ? (
                            <div className="text-gray-500 text-center">
                                <Icons.Presentation className="w-20 h-20 mx-auto mb-4 opacity-50"/>
                                <p>Chưa có Slide nào.</p>
                                <p className="text-sm mt-2">Vào Google Slides {'>'} File {'>'} Share {'>'} Publish to web {'>'} Embed {'>'} Copy link.</p>
                            </div>
                        ) : (
                            <iframe src={embedUrl} frameBorder="0" width="100%" height="100%" allowFullScreen="true" mozallowfullscreen="true" webkitallowfullscreen="true" className="absolute inset-0 z-0"></iframe>
                        )}
                    </div>
                </div>
            );
        };

        // --- COMPONENT: PRESENTATION MODE (UPDATED) ---
        const PresentationMode = ({ questions, onBack }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [showAnswer, setShowAnswer] = useState(false);
            const [userSelection, setUserSelection] = useState(null); 
            const currentQ = questions[currentIndex];

            useEffect(() => { setShowAnswer(false); setUserSelection(null); }, [currentIndex]);

            // Logic: Allows changing selection if answer is not shown yet
            const handleSelectOption = (idx) => { if (!showAnswer) setUserSelection(idx); };

            return (
                <div className="flex flex-col h-full bg-slate-900 text-white p-4 font-sans overflow-auto">
                    <div className="flex justify-between items-center mb-4 border-b border-slate-700 pb-2 shrink-0">
                        <button onClick={onBack} className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded flex items-center gap-2"><Icons.ArrowLeft className="w-4 h-4" /> Thoát</button>
                        <span className="text-xl font-bold">Câu hỏi {currentIndex + 1} / {questions.length}</span>
                        <div className="w-24"></div>
                    </div>
                    <div className="flex-1 flex flex-col justify-center items-center max-w-5xl mx-auto w-full slide-enter my-4">
                        <div className="bg-white text-slate-900 p-8 rounded-2xl shadow-2xl w-full min-h-[400px] flex flex-col">
                            <h2 className="text-3xl font-bold mb-8 leading-relaxed select-none"><LatexText text={currentQ.question} /></h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                {currentQ.options.map((opt, idx) => {
                                    const isCorrect = idx === currentQ.correctAnswerIndex;
                                    const isSelected = userSelection === idx;
                                    
                                    let bgClass = "bg-white border-2 border-gray-600 hover:bg-indigo-50 hover:border-indigo-600 shadow-md";
                                    let textClass = "text-black font-semibold"; 
                                    let icon = null;

                                    if (showAnswer) {
                                        // KHI HIỆN ĐÁP ÁN
                                        if (isCorrect) { 
                                            bgClass = "bg-green-100 border-2 border-green-600 shadow-green-200 shadow-lg scale-105 z-10"; 
                                            textClass = "text-green-900 font-bold"; 
                                            icon = <Icons.Check className="w-6 h-6 text-green-700 stroke-[3]" />; 
                                        } 
                                        else if (isSelected && !isCorrect) { 
                                            bgClass = "bg-red-100 border-2 border-red-500 shake"; 
                                            textClass = "text-red-900 font-semibold"; 
                                        } 
                                        else { 
                                            bgClass = "bg-gray-100 border-2 border-gray-300 opacity-50"; 
                                            textClass = "text-gray-500"; 
                                        }
                                    } else {
                                        // KHI CHƯA HIỆN ĐÁP ÁN (HIGHLIGHT KHI CHỌN)
                                        if (isSelected) { 
                                            bgClass = "bg-indigo-100 border-2 border-indigo-700 shadow-lg ring-2 ring-indigo-200"; 
                                            textClass = "text-indigo-900 font-bold"; 
                                        }
                                    }
                                    return (
                                        <div key={idx} onClick={() => handleSelectOption(idx)} className={`p-5 rounded-xl text-xl transition-all duration-200 cursor-pointer flex justify-between items-center ${bgClass} ${textClass}`}>
                                            <div className="flex items-center w-full">
                                                <span className={`font-bold mr-4 w-10 h-10 flex items-center justify-center rounded-full border-2 text-lg shrink-0 ${isSelected || (showAnswer && isCorrect) ? 'border-current bg-white/30' : 'border-gray-800 text-black bg-gray-100'}`}>
                                                    {String.fromCharCode(65+idx)}
                                                </span>
                                                <span className="flex-1"><LatexText text={opt} /></span>
                                            </div>
                                            {icon}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    <div className="mt-2 flex justify-center items-center gap-6 shrink-0 pb-4">
                        <button onClick={() => setCurrentIndex(Math.max(0, currentIndex - 1))} disabled={currentIndex === 0} className="p-4 rounded-full bg-slate-700 hover:bg-slate-600 disabled:opacity-30 disabled:cursor-not-allowed transition"><Icons.ArrowLeft className="w-8 h-8" /></button>
                        <button onClick={() => setShowAnswer(!showAnswer)} className={`px-8 py-4 rounded-xl font-bold text-xl shadow-lg transition flex items-center gap-3 min-w-[200px] justify-center ${showAnswer ? 'bg-yellow-500 hover:bg-yellow-400 text-black' : 'bg-indigo-600 hover:bg-indigo-500'}`}>{showAnswer ? <><Icons.EyeOff className="w-6 h-6" /> Ẩn Đáp Án</> : <><Icons.Eye className="w-6 h-6" /> Hiện Đáp Án</>}</button>
                        <button onClick={() => setCurrentIndex(Math.min(questions.length - 1, currentIndex + 1))} disabled={currentIndex === questions.length - 1} className="p-4 rounded-full bg-slate-700 hover:bg-slate-600 disabled:opacity-30 disabled:cursor-not-allowed transition"><Icons.ArrowRight className="w-8 h-8" /></button>
                    </div>
                </div>
            );
        };

        // --- COMPONENT: SMART QUIZ DIRECT (AI ONLY) ---
        const SmartQuizDirect = () => {
            const [step, setStep] = useState(0); // 0: Config, 1: Review, 2: Present
            const [questions, setQuestions] = useState([]);
            const [topic, setTopic] = useState("");
            const [loading, setLoading] = useState(false);
            const [apiKeys, setApiKeys] = useState([]);
            const [questionCount, setQuestionCount] = useState(10);
            const [errorMsg, setErrorMsg] = useState('');
            const keyInputRef = useRef(null);

            // AI Logic
            const fetchWithRetry = async (keysToTry, prompt) => {
                if (!keysToTry.length) throw new Error("Hết Key! Vui lòng nạp thêm.");
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${keysToTry[0]}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                    });
                    if(!res.ok) throw new Error(res.status);
                    return await res.json();
                } catch(e) {
                    if(e.message==="429"||e.message==="503") { await new Promise(r=>setTimeout(r,1000)); return fetchWithRetry(keysToTry.slice(1), prompt); }
                    throw e;
                }
            };

            const handleAIGen = async () => {
                if(apiKeys.length === 0) return setErrorMsg("Chưa nạp API Key!");
                setLoading(true); setErrorMsg('');
                try {
                    const prompt = `Tạo ${questionCount} câu trắc nghiệm chủ đề "${topic}". Output JSON format: [{"id":1, "question":"Nội dung (dùng $LaTeX$ cho toán)", "options":["A","B","C","D"], "correctAnswer":"Nội dung đúng"}]`;
                    const data = await fetchWithRetry([...apiKeys], prompt);
                    const txt = data.candidates[0].content.parts[0].text;
                    const jsonStart = txt.indexOf('['); const jsonEnd = txt.lastIndexOf(']') + 1;
                    const json = JSON.parse(txt.substring(jsonStart, jsonEnd));
                    const mapped = json.map((q, i) => {
                        const cIdx = q.options.findIndex(o => o.trim() === q.correctAnswer.trim());
                        return { ...q, id: Date.now()+i, number: i+1, correctAnswerIndex: cIdx !== -1 ? cIdx : 0, correctAnswerText: q.correctAnswer };
                    });
                    setQuestions(mapped); setStep(1); // Go to Review
                } catch(e) { setErrorMsg("Lỗi AI: " + e.message); } finally { setLoading(false); }
            };

            const handleReadKeyFile = (e) => {
                const f = e.target.files[0]; if (!f) return; const r = new FileReader();
                r.onload = (ev) => { const k = ev.target.result.split('\n').map(x => x.trim()).filter(x => x); if(k.length) { setApiKeys(k); alert(`Đã nạp ${k.length} keys!`); } };
                r.readAsText(f);
            };

            if (step === 2) return <PresentationMode questions={questions} onBack={() => setStep(1)} />;

            return (
                <div className="h-full bg-gray-50 overflow-y-auto p-4">
                    {/* STEP 0: CONFIG */}
                    {step === 0 && (
                        <div className="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg mt-10">
                            <h2 className="text-2xl font-bold mb-6 pb-2 border-b text-indigo-800 flex items-center gap-2">
                                <Icons.Zap className="w-6 h-6"/> SmartQuiz AI - Soạn Bài Giảng
                            </h2>
                            
                            <div className="space-y-6">
                                {/* API Key Section */}
                                <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                    <div className="flex justify-between items-center mb-2">
                                        <label className="font-semibold text-sm uppercase text-gray-500">1. Cấu hình AI</label>
                                        <span className={`text-xs font-bold px-2 py-1 rounded ${apiKeys.length > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                            {apiKeys.length > 0 ? `${apiKeys.length} Keys Sẵn Sàng` : "Chưa có Key"}
                                        </span>
                                    </div>
                                    <button onClick={()=>keyInputRef.current.click()} className="w-full bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-50 transition flex items-center justify-center gap-2">
                                        <Icons.Upload className="w-4 h-4"/> Nạp File API Key (.txt)
                                    </button>
                                    <input type="file" ref={keyInputRef} className="hidden" onChange={handleReadKeyFile} />
                                </div>

                                {/* Question Config */}
                                <div>
                                    <label className="block font-semibold mb-2 text-gray-700">2. Chủ đề bài giảng</label>
                                    <input value={topic} onChange={e=>setTopic(e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="VD: Phương trình logarit, Lịch sử chiến dịch Điện Biên Phủ..."/>
                                </div>
                                
                                <div>
                                    <div className="flex justify-between mb-2">
                                        <label className="font-semibold text-gray-700">3. Số lượng câu hỏi</label>
                                        <span className="font-bold text-indigo-600">{questionCount} câu</span>
                                    </div>
                                    <input type="range" min="5" max="30" value={questionCount} onChange={e=>setQuestionCount(parseInt(e.target.value))} className="w-full accent-indigo-600"/>
                                </div>
                                
                                {errorMsg && <div className="text-red-500 bg-red-50 p-3 rounded border border-red-200 text-sm flex gap-2"><Icons.AlertTriangle className="shrink-0 w-5 h-5"/> {errorMsg}</div>}
                                
                                <button onClick={handleAIGen} disabled={loading} className="w-full bg-indigo-600 text-white py-4 rounded-lg font-bold text-lg hover:bg-indigo-700 disabled:opacity-50 flex justify-center items-center gap-2 shadow-lg shadow-indigo-200 transition transform active:scale-95">
                                    {loading ? "Đang suy nghĩ & tạo câu hỏi..." : <><Icons.Zap className="w-6 h-6"/> Tạo Bài Giảng Ngay</>}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* STEP 1: REVIEW */}
                    {step === 1 && (
                        <div className="max-w-4xl mx-auto">
                            <div className="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm sticky top-0 z-20 border-b border-gray-200">
                                <div>
                                    <button onClick={()=>setStep(0)} className="text-sm text-gray-500 flex items-center gap-1 hover:text-indigo-600 mb-1"><Icons.ArrowLeft className="w-3 h-3"/> Soạn lại</button>
                                    <h2 className="text-xl font-bold text-gray-800">Duyệt {questions.length} Câu Hỏi</h2>
                                </div>
                                <button onClick={()=>setStep(2)} className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex gap-2 items-center font-bold shadow-lg shadow-blue-200 transition transform hover:scale-105">
                                    <Icons.Presentation className="w-5 h-5"/> Bắt đầu dạy
                                </button>
                            </div>

                            <div className="space-y-4 pb-20">
                                {questions.map((q, i) => (
                                    <div key={q.id} className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                        <div className="flex justify-between mb-3"><span className="font-bold text-indigo-600">Câu {q.number}</span> <button onClick={()=>setQuestions(questions.filter(x=>x.id!==q.id))} className="text-red-400 hover:text-red-600"><Icons.Trash className="w-4 h-4"/></button></div>
                                        <div className="mb-4 font-medium text-lg"><LatexText text={q.question}/></div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            {q.options.map((o, idx) => (
                                                <div key={idx} className={`p-3 border rounded-lg flex gap-2 items-center ${idx===q.correctAnswerIndex ? 'bg-green-50 border-green-500' : 'hover:bg-gray-50'}`}>
                                                    <span className={`font-bold w-6 h-6 rounded-full flex items-center justify-center text-xs ${idx===q.correctAnswerIndex ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-700'}`}>{String.fromCharCode(65+idx)}</span>
                                                    <div className="flex-1"><LatexText text={o}/></div>
                                                    {idx===q.correctAnswerIndex && <Icons.Check className="w-5 h-5 text-green-600"/>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            
            return (
                <div className="flex h-screen overflow-hidden font-sans">
                    {/* SIDEBAR */}
                    <div className="w-20 bg-indigo-900 text-indigo-100 flex flex-col items-center py-6 gap-8 shadow-xl z-20 shrink-0">
                        <div className="p-2 bg-indigo-800 rounded-lg mb-4 shadow-inner"><Icons.Home className="w-8 h-8"/></div>
                        
                        <button onClick={()=>setActiveTab('home')} className={`p-3 rounded-xl transition group relative ${activeTab==='home' ? 'bg-white text-indigo-900 shadow-lg' : 'hover:bg-indigo-800'}`}>
                            <Icons.Home className="w-6 h-6"/>

                        <button onClick={()=>setActiveTab('gslides')} className={`p-3 rounded-xl transition group relative ${activeTab==='gslides' ? 'bg-white text-indigo-900 shadow-lg' : 'hover:bg-indigo-800'}`}>

                        <button onClick={()=>setActiveTab('smartquiz')} className={`p-3 rounded-xl transition group relative ${activeTab==='smartquiz' ? 'bg-white text-indigo-900 shadow-lg' : 'hover:bg-indigo-800'}`}>

                    {/* MAIN CONTENT */}
                    <div className="flex-1 relative bg-gray-100 overflow-hidden">
                        {activeTab === 'home' && (

                                <div className="text-center mb-12">
                                    <h1 className="text-5xl font-extrabold text-indigo-900 mb-4 tracking-tight">DẠY HỌC - KIỂM TRA TRẮC NGHIỆM BẰNG AI</h1>
                                    <p className="text-xl text-gray-500">Nền tảng dạy học đơn giản hóa</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl w-full">
                                    <div onClick={()=>setActiveTab('gslides')} className="bg-white p-8 rounded-2xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 border-l-4 border-yellow-500 cursor-pointer group">
                                        <div className="mb-4"><Icons.Presentation className="w-12 h-12 text-yellow-600"/></div>
                                        <h3 className="text-2xl font-bold text-gray-800 mb-2">1. Google Slides</h3>
                                        <p className="text-gray-500">Giảng bài trực tuyến từ Google Drive.</p>

                                    <div onClick={()=>setActiveTab('smartquiz')} className="bg-white p-8 rounded-2xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 border-l-4 border-indigo-500 cursor-pointer group">

                                        <h3 className="text-2xl font-bold text-gray-800 mb-2">2. SmartQuiz AI (Direct)</h3>
                                        <p className="text-gray-500">AI soạn bài -> Dạy trực tiếp.</p>
                                    </div>
                                </div>
                            </div>

                        <div className={`absolute inset-0 transition-opacity duration-300 ${activeTab === 'gslides' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>

                        </div>
                        
                        <div className={`absolute inset-0 transition-opacity duration-300 ${activeTab === 'smartquiz' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
