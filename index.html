<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQuiz Pro - Teaching Suite v2 (Fixed)</title>
    
    <!-- Core Libs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- File & PDF Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <!-- Math Lib -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        .math-tex { font-family: 'Times New Roman', serif; font-size: 1.1em; }
        /* Animation Transitions */
        .slide-page-enter { opacity: 0; transform: translateX(50px); }
        .slide-page-enter-active { opacity: 1; transform: translateX(0); transition: all 400ms ease-out; }
        
        .fade-page-enter { opacity: 0; }
        .fade-page-enter-active { opacity: 1; transition: opacity 500ms ease-in-out; }

        .zoom-page-enter { opacity: 0; transform: scale(0.9); }
        .zoom-page-enter-active { opacity: 1; transform: scale(1); transition: all 400ms cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Laser Pointer */
        .cursor-laser { cursor: none; }
        .laser-dot {
            position: fixed; width: 12px; height: 12px; background: red; border-radius: 50%;
            pointer-events: none; z-index: 9999; box-shadow: 0 0 10px red, 0 0 20px red;
            transition: transform 0.05s linear;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- UTILS & LOGIC ---
        const cleanText = (str) => str ? str.replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/\s+/g, ' ').trim() : "";
        const CORRECT_MARKER = "{{#CORRECT#}}";

        // --- ICONS (Đã bổ sung Icons.Book) ---
        const Icon = ({ children, className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
        const Icons = {
            Book: (p) => <Icon {...p}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></Icon>,
            Home: (p) => <Icon {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>,
            BookOpen: (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>,
            CheckSquare: (p) => <Icon {...p}><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></Icon>,
            ArrowLeft: (p) => <Icon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>,
            ArrowRight: (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></Icon>,
            Maximize: (p) => <Icon {...p}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></Icon>,
            Upload: (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>,
            Settings: (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1.82 1.51l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>,
            Zap: (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>,
            Crosshair: (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></Icon>,
            Check: (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>,
            Trash: (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2-2v2"/></Icon>,
            Eye: (p) => <Icon {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></Icon>,
            EyeOff: (p) => <Icon {...p}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M1 1l22 22"/></Icon>,
        };

        // --- MATH DISPLAY ---
        const LatexText = ({ text }) => {
            if (!text) return <span></span>;
            const parts = text.split(/(\$[^$]+\$)/g);
            return (
                <span>
                    {parts.map((part, index) => {
                        if (part.startsWith('$') && part.endsWith('$') && part.length > 2) {
                            try {
                                const html = katex.renderToString(part.slice(1, -1), { throwOnError: false, displayMode: false });
                                return <span key={index} dangerouslySetInnerHTML={{ __html: html }} className="math-tex text-blue-700" />;
                            } catch (e) { return <span key={index}>{part}</span>; }
                        }
                        return <span key={index}>{part}</span>;
                    })}
                </span>
            );
        };

        // --- LOGIC XỬ LÝ DOCX CAO CẤP (NEW: STYLE DETECTION) ---
        const parseDocxAdvanced = async (file) => {
            const zip = new JSZip();
            await zip.loadAsync(file);
            const xmlContent = await zip.file("word/document.xml").async("string");
            
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlContent, "text/xml");
            const paragraphs = xmlDoc.getElementsByTagName("w:p");
            const tables = xmlDoc.getElementsByTagName("w:tbl"); 

            let extractedTextLines = [];
            
            // 1. Đọc nội dung văn bản & CHECK STYLE
            for (let i = 0; i < paragraphs.length; i++) {
                const p = paragraphs[i];
                let line = "";
                for (let j = 0; j < p.childNodes.length; j++) {
                    const node = p.childNodes[j];
                    if (node.nodeName === "w:r") {
                        // --- KIỂM TRA STYLE (Gạch chân / Màu đỏ) ---
                        let isHighlighted = false;
                        const rPr = node.getElementsByTagName("w:rPr")[0];
                        if (rPr) {
                            // Check Gạch chân (<w:u val="..."/>)
                            const u = rPr.getElementsByTagName("w:u")[0];
                            if (u && u.getAttribute("w:val") && u.getAttribute("w:val") !== 'none') {
                                isHighlighted = true;
                            }

                            // Check Màu đỏ (<w:color val="FF0000" .../>)
                            const color = rPr.getElementsByTagName("w:color")[0];
                            if (color) {
                                const cVal = color.getAttribute("w:val");
                                // Các mã màu đỏ thông dụng: Red, FF0000, C00000 (Dark Red)
                                if (cVal && (cVal === 'red' || cVal.toUpperCase() === 'FF0000' || cVal.toUpperCase() === 'C00000')) {
                                    isHighlighted = true;
                                }
                            }
                        }

                        const t = node.getElementsByTagName("w:t");
                        if(t.length > 0) {
                            let content = t[0].textContent;
                            // Nếu style đặc biệt, thêm marker để nhận diện sau này
                            if (isHighlighted && content.trim().length > 0) {
                                content += CORRECT_MARKER; 
                            }
                            line += content;
                        }
                    } 
                    else if (node.nodeName === "m:oMath" || node.nodeName === "m:oMathPara") {
                        const mathTexts = node.getElementsByTagName("m:t");
                        let mathExp = "";
                        for(let k=0; k<mathTexts.length; k++) mathExp += mathTexts[k].textContent;
                        if(mathExp) line += " $" + mathExp + "$ ";
                    }
                }
                // Không cleanText ngay ở đây để giữ marker, clean sau khi tách
                if (line.trim()) extractedTextLines.push(line);
            }

            // 2. Xử lý Bảng Đáp Án (Hỗ trợ cả Ngang và Dọc)
            let answerKey = {};
            
            for (let i = 0; i < tables.length; i++) {
                const rows = tables[i].getElementsByTagName("w:tr");
                let tableData = []; 

                for(let r=0; r<rows.length; r++) {
                     let rowCells = [];
                     const cols = rows[r].getElementsByTagName("w:tc");
                     for(let c=0; c<cols.length; c++) {
                         rowCells.push(cleanText(cols[c].textContent));
                     }
                     if(rowCells.length > 0) tableData.push(rowCells);
                }

                // B2: Quét Bảng Ngang
                for(let r=0; r<tableData.length-1; r++) {
                    const rowTop = tableData[r];
                    const rowBot = tableData[r+1];
                    let validPairs = 0;
                    let tempKey = {};
                    const minLen = Math.min(rowTop.length, rowBot.length);
                    for(let k=0; k<minLen; k++) {
                        const valTop = rowTop[k];
                        const valBot = rowBot[k];
                        if(/^\d+$/.test(valTop) && /^[A-D]$/i.test(valBot)) {
                            tempKey[valTop] = valBot.toUpperCase();
                            validPairs++;
                        }
                    }
                    if(validPairs >= 3) {
                        Object.assign(answerKey, tempKey);
                        continue; 
                    }
                }

                // B3: Quét Bảng Dọc/Flatten
                let allCells = tableData.flat();
                for(let k=0; k<allCells.length; k++) {
                     const current = allCells[k];
                     const matchCombined = current.match(/^(\d+)[\.:\s]+([A-D])$/i);
                     if(matchCombined) {
                         answerKey[matchCombined[1]] = matchCombined[2].toUpperCase();
                         continue;
                     }
                     if (k < allCells.length - 1) {
                        const next = allCells[k+1];
                        if(/^\d+$/.test(current) && /^[A-D]$/i.test(next)) {
                            if(!answerKey[current]) answerKey[current] = next.toUpperCase();
                        }
                     }
                }
            }
            return { lines: extractedTextLines, answerKey };
        };

        // --- PARSER ENGINE (UPDATED FOR MARKER) ---
        const parseQuestions = (lines, externalKey = {}) => {
            const questions = [];
            let currentQ = null;
            const qRegex = /^(?:Câu|Bài)?\s*(\d+)[:.]/i; 
            const optRegex = /^([A-D])[\.:]\s*(.*)/i;
            
            lines.forEach(line => {
                // Clean text nhưng giữ marker nếu có
                const text = line.replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/\s+/g, ' ').trim(); 
                if(!text) return;

                const qMatch = text.match(qRegex);
                if (qMatch) {
                    if (currentQ) questions.push(currentQ);
                    currentQ = { 
                        id: Math.random(), 
                        number: qMatch[1], 
                        question: text.replace(qRegex, '').replace(CORRECT_MARKER, '').trim(), // Xóa marker ở câu hỏi nếu lỡ có
                        options: [], 
                        correctAnswerText: null,
                        correctAnswerIndex: -1,
                        markedIndex: -1 // Lưu index nếu tìm thấy gạch chân
                    };
                } else if (currentQ) {
                    const optMatch = text.match(optRegex);
                    if (optMatch) {
                        let rawContent = optMatch[2]; // Nội dung chưa clean marker
                        
                        // Kiểm tra Marker
                        let isMarked = false;
                        if (rawContent.includes(CORRECT_MARKER) || text.includes(CORRECT_MARKER)) {
                            isMarked = true;
                        }
                        
                        let finalContent = rawContent.replace(new RegExp(CORRECT_MARKER, 'g'), '').trim();
                        
                        currentQ.options.push(finalContent);
                        if (isMarked) currentQ.markedIndex = currentQ.options.length - 1;

                    } else {
                        if (currentQ.options.length === 0) {
                            // Nối tiếp nội dung câu hỏi
                            currentQ.question += " " + text.replace(CORRECT_MARKER, '');
                        }
                    }
                }
            });
            if (currentQ) questions.push(currentQ);

            questions.forEach(q => {
                // 1. Ưu tiên Key tìm được từ bảng (External Key)
                if (externalKey[q.number]) {
                    const char = externalKey[q.number]; 
                    const idx = char.charCodeAt(0) - 65;
                    if (q.options[idx] !== undefined) {
                        q.correctAnswerIndex = idx;
                        q.correctAnswerText = q.options[idx];
                    }
                }
                // 2. Nếu không có bảng, check xem có gạch chân/tô đỏ không
                else if (q.markedIndex !== -1) {
                    q.correctAnswerIndex = q.markedIndex;
                    q.correctAnswerText = q.options[q.markedIndex];
                }
                // 3. Fallback mặc định A
                if (q.correctAnswerIndex === -1 && q.options.length > 0) {
                     q.correctAnswerIndex = 0; 
                     q.correctAnswerText = q.options[0]; 
                }
            });
            return questions;
        };

        // --- EXPORT LOGIC (FIXED) ---
        const generateExamVariant = (originalQuestions, code) => {
            const shuffledQuestions = [...originalQuestions].sort(() => Math.random() - 0.5);
            return {
                code,
                questions: shuffledQuestions.map((q, i) => {
                    const optsWithMeta = q.options.map((opt, index) => ({
                        content: opt,
                        isCorrect: index === q.correctAnswerIndex
                    }));
                    const shuffledOpts = optsWithMeta.sort(() => Math.random() - 0.5);
                    const finalCorrectIdx = shuffledOpts.findIndex(o => o.isCorrect);
                    return {
                        ...q,
                        number: i + 1,
                        options: shuffledOpts.map(o => o.content),
                        correctAnswerLetter: String.fromCharCode(65 + (finalCorrectIdx !== -1 ? finalCorrectIdx : 0))
                    };
                })
            };
        };

        // --- COMPONENT: PDF VIEWER (CÓ ANIMATION & LASER) ---
        const PdfViewer = ({ file }) => {
            const [pdfDoc, setPdfDoc] = useState(null);
            const [pageNum, setPageNum] = useState(1);
            const [scale, setScale] = useState(1.2);
            const [loading, setLoading] = useState(false);
            const [effect, setEffect] = useState('slide'); // slide, fade, zoom, none
            const [laserMode, setLaserMode] = useState(false);
            const [cursorPos, setCursorPos] = useState({ x: -100, y: -100 });

            const canvasRef = useRef(null);
            const containerRef = useRef(null);

            useEffect(() => {
                if (file) {
                    setLoading(true);
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const typedarray = new Uint8Array(e.target.result);
                        const pdf = await pdfjsLib.getDocument(typedarray).promise;
                        setPdfDoc(pdf);
                        setPageNum(1);
                        setLoading(false);
                    };
                    reader.readAsArrayBuffer(file);
                }
            }, [file]);

            useEffect(() => {
                if (pdfDoc && canvasRef.current) {
                    renderPage(pageNum);
                }
            }, [pdfDoc, pageNum, scale]);

            const renderPage = async (num) => {
                const page = await pdfDoc.getPage(num);
                const viewport = page.getViewport({ scale: scale });
                const canvas = canvasRef.current;
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                const renderContext = { canvasContext: context, viewport: viewport };
                await page.render(renderContext).promise;
            };

            const changePage = (offset) => {
                const newPage = Math.min(Math.max(1, pageNum + offset), pdfDoc ? pdfDoc.numPages : 1);
                if(newPage !== pageNum) setPageNum(newPage);
            };

            // Laser Logic
            const handleMouseMove = (e) => {
                if (laserMode) {
                    setCursorPos({ x: e.clientX, y: e.clientY });
                }
            };

            if (!file) return (
                <div className="flex flex-col items-center justify-center h-full text-gray-400 border-2 border-dashed border-gray-300 rounded-xl m-4">
                    <Icons.BookOpen className="w-16 h-16 mb-4"/>
                    <p className="text-xl">Vui lòng chọn file PDF bài giảng</p>
                    <p className="text-sm mt-2">(PowerPoint -> Save As -> PDF)</p>
                </div>
            );

            return (
                <div 
                    ref={containerRef}
                    onMouseMove={handleMouseMove}
                    className={`flex flex-col h-full bg-gray-700 relative ${laserMode ? 'cursor-laser' : ''}`}
                >
                    {/* Laser Dot */}
                    {laserMode && <div className="laser-dot" style={{ left: cursorPos.x - 6, top: cursorPos.y - 6 }}></div>}

                    {/* Toolbar */}
                    <div className="bg-gray-800 text-white p-3 flex justify-between items-center shadow-md z-20">
                        <div className="flex items-center gap-4">
                            <span className="font-bold">Trang {pageNum} / {pdfDoc?.numPages || '--'}</span>
                            <div className="flex gap-2">
                                <button onClick={() => changePage(-1)} disabled={pageNum <= 1} className="p-1 bg-gray-600 rounded hover:bg-gray-500 disabled:opacity-50"><Icons.ArrowLeft className="w-5 h-5"/></button>
                                <button onClick={() => changePage(1)} disabled={pageNum >= (pdfDoc?.numPages || 0)} className="p-1 bg-gray-600 rounded hover:bg-gray-500 disabled:opacity-50"><Icons.ArrowRight className="w-5 h-5"/></button>
                            </div>
                        </div>
                        <div className="flex gap-3 items-center">
                             <div className="flex items-center gap-1 text-sm bg-gray-700 px-2 py-1 rounded">
                                <Icons.Zap className="w-4 h-4 text-yellow-400"/>
                                <select value={effect} onChange={(e)=>setEffect(e.target.value)} className="bg-transparent border-none outline-none text-white cursor-pointer">
                                    <option value="none">Không hiệu ứng</option>
                                    <option value="slide">Trượt (Slide)</option>
                                    <option value="fade">Mờ dần (Fade)</option>
                                    <option value="zoom">Phóng to (Zoom)</option>
                                </select>
                             </div>
                             <button onClick={() => setLaserMode(!laserMode)} className={`flex items-center gap-1 px-2 py-1 rounded text-sm border ${laserMode ? 'bg-red-600 border-red-600 text-white' : 'border-gray-500 text-gray-300 hover:bg-gray-600'}`}>
                                <Icons.Crosshair className="w-4 h-4"/> Laser
                             </button>
                             <div className="flex items-center">
                                 <button onClick={() => setScale(s => Math.max(0.5, s - 0.1))} className="px-2 bg-gray-600 rounded-l">-</button>
                                 <span className="px-2 bg-gray-700 text-sm min-w-[3rem] text-center">{Math.round(scale * 100)}%</span>
                                 <button onClick={() => setScale(s => Math.min(3, s + 0.1))} className="px-2 bg-gray-600 rounded-r">+</button>
                             </div>
                        </div>
                    </div>
                    
                    {/* Canvas Container with Animation Key */}
                    <div className="flex-1 overflow-auto flex justify-center p-4 bg-gray-500/50 relative">
                        {loading ? <div className="text-white text-xl">Đang tải bài giảng...</div> : (
                            <div key={pageNum} className={effect !== 'none' ? `${effect}-page-enter ${effect}-page-enter-active` : ''}>
                                <canvas ref={canvasRef} className="shadow-2xl rounded-sm bg-white max-w-full"/>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- COMPONENT: QUIZ PLAYER ---
        const QuizPlayer = ({ questions }) => {
            const [idx, setIdx] = useState(0);
            const [showKey, setShowKey] = useState(false);
            
            if (!questions || questions.length === 0) return (
                <div className="flex flex-col items-center justify-center h-full text-gray-400">
                    <Icons.CheckSquare className="w-16 h-16 mb-4"/>
                    <p className="text-xl">Chưa có câu hỏi nào.</p>
                    <p className="text-sm">Vui lòng dùng AI tạo hoặc Upload file đề.</p>
                </div>
            );

            const q = questions[idx];
            return (
                <div className="flex flex-col h-full bg-slate-900 text-white">
                    <div className="flex justify-between items-center p-4 bg-slate-800 border-b border-slate-700">
                        <h2 className="text-lg font-bold text-indigo-400">Câu {idx + 1}/{questions.length}</h2>
                        <div className="flex gap-2">
                            <button onClick={()=>setShowKey(!showKey)} className="px-4 py-1 bg-yellow-600 rounded hover:bg-yellow-500 text-sm font-bold flex gap-2 items-center">
                                {showKey ? <><Icons.EyeOff className="w-4 h-4"/> Ẩn Đáp Án</> : <><Icons.Eye className="w-4 h-4"/> Hiện Đáp Án</>}
                            </button>
                        </div>
                    </div>
                    
                    <div className="flex-1 flex flex-col items-center justify-center p-6 overflow-y-auto">
                        <div className="w-full max-w-4xl slide-page-enter slide-page-enter-active" key={idx}>
                            <div className="text-2xl md:text-3xl font-bold mb-8 leading-relaxed text-center">
                                <span dangerouslySetInnerHTML={{__html: q.question.replace(/\$([^$]+)\$/g, (m,t)=>katex.renderToString(t,{throwOnError:false}))}} />
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {q.options.map((o, i) => (
                                    <div key={i} className={`p-4 rounded-lg border-2 text-lg transition cursor-pointer flex items-center gap-3 
                                        ${showKey && i === q.correctAnswerIndex ? 'bg-green-900/40 border-green-500 text-green-400' : 'border-slate-600 bg-slate-800 hover:border-indigo-500'}`}>
                                        <span className="font-bold w-8 h-8 rounded-full border flex items-center justify-center shrink-0">{String.fromCharCode(65+i)}</span>
                                        <span dangerouslySetInnerHTML={{__html: o.replace(/\$([^$]+)\$/g, (m,t)=>katex.renderToString(t,{throwOnError:false}))}} />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="p-4 bg-slate-800 flex justify-center gap-4">
                         <button onClick={()=>{setIdx(Math.max(0, idx-1)); setShowKey(false)}} disabled={idx===0} className="p-3 bg-slate-700 rounded-full disabled:opacity-50 hover:bg-slate-600"><Icons.ArrowLeft className="w-6 h-6"/></button>
                         <button onClick={()=>{setIdx(Math.min(questions.length-1, idx+1)); setShowKey(false)}} disabled={idx===questions.length-1} className="p-3 bg-slate-700 rounded-full disabled:opacity-50 hover:bg-slate-600"><Icons.ArrowRight className="w-6 h-6"/></button>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [lectureFile, setLectureFile] = useState(null);
            const [questions, setQuestions] = useState([]);
            const [loadingQuiz, setLoadingQuiz] = useState(false);
            
            const lectureInputRef = useRef(null);
            const quizInputRef = useRef(null);

            // Xử lý Upload Đề (Real Logic từ Ultimate V3)
            const handleUploadQuiz = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                setLoadingQuiz(true);
                try {
                    let lines = [];
                    let answerKey = {};

                    if (file.name.endsWith('.docx')) {
                        const result = await parseDocxAdvanced(file);
                        lines = result.lines;
                        answerKey = result.answerKey;
                    } 
                    else if (file.name.endsWith('.pdf')) {
                        const buffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument(buffer).promise;
                        let fullText = "";
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            fullText += content.items.map(item => item.str).join(' ') + "\n";
                        }
                        lines = fullText.split('\n').map(cleanText);
                        let match;
                        const keyRegex = /(\d+)[\.\-\s]*([A-D])/g;
                        while ((match = keyRegex.exec(fullText)) !== null) {
                            if(parseInt(match[1]) < 100) answerKey[match[1]] = match[2];
                        }
                    }

                    const parsed = parseQuestions(lines, answerKey);
                    if(parsed.length === 0) throw new Error("Không tìm thấy câu hỏi nào!");
                    
                    setQuestions(parsed);
                    setActiveTab('quiz');
                    alert(`Đã nhập thành công ${parsed.length} câu hỏi!`);
                } catch (err) {
                    alert("Lỗi: " + err.message);
                } finally {
                    setLoadingQuiz(false);
                }
            };

            const handleUploadLecture = (e) => {
                if(e.target.files[0]) {
                    setLectureFile(e.target.files[0]);
                    setActiveTab('lecture');
                }
            };

            return (
                <div className="flex h-screen overflow-hidden font-sans">
                    {/* SIDEBAR */}
                    <div className="w-20 bg-indigo-900 text-indigo-100 flex flex-col items-center py-6 gap-8 shadow-xl z-20 shrink-0">
                        <div className="p-2 bg-indigo-800 rounded-lg mb-4 shadow-inner"><Icons.Book className="w-8 h-8"/></div>
                        
                        <button onClick={()=>setActiveTab('home')} className={`p-3 rounded-xl transition group relative ${activeTab==='home' ? 'bg-white text-indigo-900 shadow-lg' : 'hover:bg-indigo-800'}`}>
                            <Icons.Home className="w-6 h-6"/>
                            <span className="absolute left-14 bg-gray-900 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none">Trang chủ</span>
                        </button>
                        
                        <button onClick={()=>setActiveTab('lecture')} className={`p-3 rounded-xl transition group relative ${activeTab==='lecture' ? 'bg-white text-indigo-900 shadow-lg' : 'hover:bg-indigo-800'}`}>
                            <Icons.BookOpen className="w-6 h-6"/>
                            <span className="absolute left-14 bg-gray-900 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none">Bài giảng</span>
                        </button>
                        
                        <button onClick={()=>setActiveTab('quiz')} className={`p-3 rounded-xl transition group relative ${activeTab==='quiz' ? 'bg-white text-indigo-900 shadow-lg' : 'hover:bg-indigo-800'}`}>
                            <Icons.CheckSquare className="w-6 h-6"/>
                            {questions.length > 0 && <span className="absolute ml-4 -mt-8 bg-red-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center animate-pulse">{questions.length}</span>}
                            <span className="absolute left-14 bg-gray-900 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none">Trắc nghiệm</span>
                        </button>
                    </div>

                    {/* MAIN CONTENT AREA */}
                    <div className="flex-1 relative bg-gray-100 overflow-hidden">
                        
                        {/* TAB: HOME - DASHBOARD */}
                        {activeTab === 'home' && (
                            <div className="absolute inset-0 p-10 flex flex-col items-center justify-center overflow-y-auto">
                                <div className="text-center mb-12 animate-[fadeIn_0.5s_ease-out]">
                                    <h1 className="text-5xl font-extrabold text-indigo-900 mb-4 tracking-tight">SmartQuiz Pro</h1>
                                    <p className="text-xl text-gray-500">Bộ công cụ giảng dạy kỹ thuật số 3-trong-1</p>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl w-full">
                                    {/* Card 1: Bài Giảng */}
                                    <div onClick={()=>lectureInputRef.current.click()} className="bg-white p-8 rounded-3xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 border border-gray-100 cursor-pointer group relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full -mr-10 -mt-10 z-0 transition group-hover:scale-110"></div>
                                        <div className="relative z-10">
                                            <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mb-6 shadow-sm">
                                                <Icons.BookOpen className="w-8 h-8"/>
                                            </div>
                                            <h3 className="text-2xl font-bold text-gray-800 mb-2 group-hover:text-blue-600 transition">1. Trình Chiếu Bài Giảng</h3>
                                            <p className="text-gray-500 mb-4">Tải file PDF để giảng dạy. Hỗ trợ:</p>
                                            <ul className="text-sm text-gray-500 space-y-2">
                                                <li className="flex items-center gap-2"><span className="w-2 h-2 bg-blue-400 rounded-full"></span> Hiệu ứng chuyển trang (Slide/Zoom)</li>
                                                <li className="flex items-center gap-2"><span className="w-2 h-2 bg-blue-400 rounded-full"></span> Bút chỉ Laser ảo</li>
                                            </ul>
                                            {lectureFile && <p className="mt-4 text-sm text-green-600 font-bold bg-green-50 px-3 py-1 rounded-full inline-block">✓ Đang có file: {lectureFile.name}</p>}
                                        </div>
                                        <input type="file" accept=".pdf" ref={lectureInputRef} className="hidden" onChange={handleUploadLecture}/>
                                    </div>

                                    {/* Card 2: Trắc Nghiệm */}
                                    <div onClick={()=>quizInputRef.current.click()} className="bg-white p-8 rounded-3xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 border border-gray-100 cursor-pointer group relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-50 rounded-bl-full -mr-10 -mt-10 z-0 transition group-hover:scale-110"></div>
                                        <div className="relative z-10">
                                            <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mb-6 shadow-sm">
                                                <Icons.CheckSquare className="w-8 h-8"/>
                                            </div>
                                            <h3 className="text-2xl font-bold text-gray-800 mb-2 group-hover:text-indigo-600 transition">2. Tổ Chức Thi / Kiểm Tra</h3>
                                            <p className="text-gray-500 mb-4">Tải file Word/PDF đề thi. Hỗ trợ:</p>
                                            <ul className="text-sm text-gray-500 space-y-2">
                                                <li className="flex items-center gap-2"><span className="w-2 h-2 bg-indigo-400 rounded-full"></span> Tự động nhận diện đáp án (Gạch chân/Đỏ)</li>
                                                <li className="flex items-center gap-2"><span className="w-2 h-2 bg-indigo-400 rounded-full"></span> Chế độ thi thử sinh động</li>
                                            </ul>
                                            {loadingQuiz ? <p className="mt-4 text-indigo-500 animate-pulse">Đang phân tích file...</p> :
                                             questions.length > 0 && <p className="mt-4 text-sm text-green-600 font-bold bg-green-50 px-3 py-1 rounded-full inline-block">✓ Đang có {questions.length} câu hỏi</p>}
                                        </div>
                                        <input type="file" accept=".docx,.pdf" ref={quizInputRef} className="hidden" onChange={handleUploadQuiz}/>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB: LECTURE MODE */}
                        <div className={`absolute inset-0 transition-opacity duration-300 ${activeTab === 'lecture' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
                            <PdfViewer file={lectureFile} />
                        </div>

                        {/* TAB: QUIZ MODE */}
                        <div className={`absolute inset-0 transition-opacity duration-300 ${activeTab === 'quiz' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}>
                            <QuizPlayer questions={questions} />
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
