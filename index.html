<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQuiz Pro - Teaching Suite v3 (Google Slides)</title>
    
    <!-- Core Libs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- File & PDF Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <!-- Math Lib -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        .math-tex { font-family: 'Times New Roman', serif; font-size: 1.1em; }
        /* Animation Transitions */
        .slide-page-enter { opacity: 0; transform: translateX(50px); }
        .slide-page-enter-active { opacity: 1; transform: translateX(0); transition: all 400ms ease-out; }
        .fade-page-enter { opacity: 0; }
        .fade-page-enter-active { opacity: 1; transition: opacity 500ms ease-in-out; }
        .zoom-page-enter { opacity: 0; transform: scale(0.9); }
        .zoom-page-enter-active { opacity: 1; transform: scale(1); transition: all 400ms cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Cursors */
        .cursor-draw { cursor: crosshair; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- UTILS ---
        const cleanText = (str) => str ? str.replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/\s+/g, ' ').trim() : "";
        const CORRECT_MARKER = "{{#CORRECT#}}";

        // --- ICONS ---
        const Icon = ({ children, className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>;
        const Icons = {
            Home: (p) => <Icon {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>,
            BookOpen: (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>,
            Presentation: (p) => <Icon {...p}><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5 5 5-5"/></Icon>,
            CheckSquare: (p) => <Icon {...p}><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></Icon>,
            Book: (p) => <Icon {...p}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></Icon>,
            ArrowLeft: (p) => <Icon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>,
            ArrowRight: (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></Icon>,
            Upload: (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>,
            Zap: (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>,
            Crosshair: (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></Icon>,
            Pen: (p) => <Icon {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></Icon>,
            Eraser: (p) => <Icon {...p}><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></Icon>,
            Check: (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>,
            Trash: (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2-2v2"/></Icon>,
            Eye: (p) => <Icon {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></Icon>,
            EyeOff: (p) => <Icon {...p}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M1 1l22 22"/></Icon>,
            Link: (p) => <Icon {...p}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></Icon>,
        };

        // --- CORE PARSERS ---
        const parseDocxAdvanced = async (file) => {
            const zip = new JSZip();
            await zip.loadAsync(file);
            const xmlContent = await zip.file("word/document.xml").async("string");
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlContent, "text/xml");
            const paragraphs = xmlDoc.getElementsByTagName("w:p");
            const tables = xmlDoc.getElementsByTagName("w:tbl"); 
            let extractedTextLines = [];
            for (let i = 0; i < paragraphs.length; i++) {
                const p = paragraphs[i];
                let line = "";
                for (let j = 0; j < p.childNodes.length; j++) {
                    const node = p.childNodes[j];
                    if (node.nodeName === "w:r") {
                        let isHighlighted = false;
                        const rPr = node.getElementsByTagName("w:rPr")[0];
                        if (rPr) {
                            const u = rPr.getElementsByTagName("w:u")[0];
                            if (u && u.getAttribute("w:val") && u.getAttribute("w:val") !== 'none') isHighlighted = true;
                            const color = rPr.getElementsByTagName("w:color")[0];
                            if (color) {
                                const cVal = color.getAttribute("w:val");
                                if (cVal && (cVal === 'red' || cVal.toUpperCase() === 'FF0000' || cVal.toUpperCase() === 'C00000')) isHighlighted = true;
                            }
                        }
                        const t = node.getElementsByTagName("w:t");
                        if(t.length > 0) {
                            let content = t[0].textContent;
                            if (isHighlighted && content.trim().length > 0) content += CORRECT_MARKER; 
                            line += content;
                        }
                    } else if (node.nodeName === "m:oMath" || node.nodeName === "m:oMathPara") {
                        const mathTexts = node.getElementsByTagName("m:t");
                        let mathExp = "";
                        for(let k=0; k<mathTexts.length; k++) mathExp += mathTexts[k].textContent;
                        if(mathExp) line += " $" + mathExp + "$ ";
                    }
                }
                if (line.trim()) extractedTextLines.push(line);
            }
            let answerKey = {};
            for (let i = 0; i < tables.length; i++) {
                const rows = tables[i].getElementsByTagName("w:tr");
                let tableData = []; 
                for(let r=0; r<rows.length; r++) {
                     let rowCells = [];
                     const cols = rows[r].getElementsByTagName("w:tc");
                     for(let c=0; c<cols.length; c++) rowCells.push(cleanText(cols[c].textContent));
                     if(rowCells.length > 0) tableData.push(rowCells);
                }
                for(let r=0; r<tableData.length-1; r++) {
                    const rowTop = tableData[r];
                    const rowBot = tableData[r+1];
                    let validPairs = 0; let tempKey = {}; const minLen = Math.min(rowTop.length, rowBot.length);
                    for(let k=0; k<minLen; k++) { if(/^\d+$/.test(rowTop[k]) && /^[A-D]$/i.test(rowBot[k])) { tempKey[rowTop[k]] = rowBot[k].toUpperCase(); validPairs++; } }
                    if(validPairs >= 3) { Object.assign(answerKey, tempKey); continue; }
                }
                let allCells = tableData.flat();
                for(let k=0; k<allCells.length; k++) {
                     const current = allCells[k];
                     const matchCombined = current.match(/^(\d+)[\.:\s]+([A-D])$/i);
                     if(matchCombined) { answerKey[matchCombined[1]] = matchCombined[2].toUpperCase(); continue; }
                     if (k < allCells.length - 1) { if(/^\d+$/.test(current) && /^[A-D]$/i.test(allCells[k+1])) { if(!answerKey[current]) answerKey[current] = allCells[k+1].toUpperCase(); } }
                }
            }
            return { lines: extractedTextLines, answerKey };
        };

        const parseQuestions = (lines, externalKey = {}) => {
            const questions = [];
            let currentQ = null;
            const qRegex = /^(?:Câu|Bài)?\s*(\d+)[:.]/i; 
            const optRegex = /^([A-D])[\.:]\s*(.*)/i;
            lines.forEach(line => {
                const text = line.replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/\s+/g, ' ').trim(); 
                if(!text) return;
                const qMatch = text.match(qRegex);
                if (qMatch) {
                    if (currentQ) questions.push(currentQ);
                    currentQ = { id: Math.random(), number: qMatch[1], question: text.replace(qRegex, '').replace(CORRECT_MARKER, '').trim(), options: [], correctAnswerText: null, correctAnswerIndex: -1, markedIndex: -1 };
                } else if (currentQ) {
                    const optMatch = text.match(optRegex);
                    if (optMatch) {
                        let rawContent = optMatch[2]; 
                        let isMarked = (rawContent.includes(CORRECT_MARKER) || text.includes(CORRECT_MARKER));
                        let finalContent = rawContent.replace(new RegExp(CORRECT_MARKER, 'g'), '').trim();
                        currentQ.options.push(finalContent);
                        if (isMarked) currentQ.markedIndex = currentQ.options.length - 1;
                    } else { if (currentQ.options.length === 0) currentQ.question += " " + text.replace(CORRECT_MARKER, ''); }
                }
            });
            if (currentQ) questions.push(currentQ);
            questions.forEach(q => {
                if (externalKey[q.number]) {
                    const idx = externalKey[q.number].charCodeAt(0) - 65;
                    if (q.options[idx] !== undefined) { q.correctAnswerIndex = idx; q.correctAnswerText = q.options[idx]; }
                } else if (q.markedIndex !== -1) { q.correctAnswerIndex = q.markedIndex; q.correctAnswerText = q.options[q.markedIndex]; }
                if (q.correctAnswerIndex === -1 && q.options.length > 0) { q.correctAnswerIndex = 0; q.correctAnswerText = q.options[0]; }
            });
            return questions;
        };

        // --- COMPONENT: PDF VIEWER (Basic with Animations) ---
        const PdfViewer = ({ file }) => {
            const [pdfDoc, setPdfDoc] = useState(null);
            const [pageNum, setPageNum] = useState(1);
            const [scale, setScale] = useState(1.2);
            const [loading, setLoading] = useState(false);
            const [effect, setEffect] = useState('slide');
            const canvasRef = useRef(null);

            useEffect(() => {
                if (file) {
                    setLoading(true);
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const typedarray = new Uint8Array(e.target.result);
                        const pdf = await pdfjsLib.getDocument(typedarray).promise;
                        setPdfDoc(pdf);
                        setPageNum(1);
                        setLoading(false);
                    };
                    reader.readAsArrayBuffer(file);
                }
            }, [file]);

            useEffect(() => {
                if (pdfDoc && canvasRef.current) {
                    renderPage(pageNum);
                }
            }, [pdfDoc, pageNum, scale]);

            const renderPage = async (num) => {
                const page = await pdfDoc.getPage(num);
                const viewport = page.getViewport({ scale: scale });
                const canvas = canvasRef.current;
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
            };

            const changePage = (offset) => {
                setPageNum(prev => Math.min(Math.max(1, prev + offset), pdfDoc.numPages));
            };

            if (!file) return <div className="flex flex-col items-center justify-center h-full text-gray-400 border-2 border-dashed border-gray-300 rounded-xl m-4"><Icons.BookOpen className="w-16 h-16 mb-4"/><p className="text-xl">Vui lòng chọn file PDF</p></div>;

            return (
                <div className="flex flex-col h-full bg-gray-700">
                    <div className="bg-gray-800 text-white p-3 flex justify-between items-center shadow-md z-20">
                        <div className="flex items-center gap-4">
                            <div className="flex gap-2">
                                <button onClick={() => changePage(-1)} disabled={pageNum <= 1} className="p-1 bg-gray-600 rounded hover:bg-gray-500 disabled:opacity-50"><Icons.ArrowLeft className="w-5 h-5"/></button>
                                <span className="font-bold w-20 text-center">Trang {pageNum}/{pdfDoc?.numPages}</span>
                                <button onClick={() => changePage(1)} disabled={pageNum >= (pdfDoc?.numPages || 0)} className="p-1 bg-gray-600 rounded hover:bg-gray-500 disabled:opacity-50"><Icons.ArrowRight className="w-5 h-5"/></button>
                            </div>
                        </div>
                        <div className="flex gap-2 items-center">
                             <select value={effect} onChange={(e)=>setEffect(e.target.value)} className="bg-gray-700 border-none outline-none text-white cursor-pointer text-xs rounded px-2 py-1"><option value="slide">Trượt</option><option value="fade">Mờ</option><option value="zoom">Zoom</option></select>
                             <button onClick={() => setScale(s => Math.max(0.5, s - 0.1))} className="px-2 bg-gray-600 rounded">-</button>
                             <span className="text-xs">{Math.round(scale * 100)}%</span>
                             <button onClick={() => setScale(s => Math.min(3, s + 0.1))} className="px-2 bg-gray-600 rounded">+</button>
                        </div>
                    </div>
                    <div className="flex-1 overflow-auto flex justify-center p-4 bg-gray-500/50 relative">
                        {loading ? <div className="text-white text-xl">Đang tải...</div> : (
                            <div key={pageNum} className={effect !== 'none' ? `${effect}-page-enter ${effect}-page-enter-active` : ''}>
                                <canvas ref={canvasRef} className="shadow-2xl rounded-sm bg-white max-w-full"/>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- COMPONENT: GOOGLE SLIDES VIEWER ---
        const GoogleSlidesViewer = () => {
            const [url, setUrl] = useState("");
            const [embedUrl, setEmbedUrl] = useState("");
            const [isDrawingMode, setIsDrawingMode] = useState(false);
            const drawCanvasRef = useRef(null);
            const isDrawing = useRef(false);

            const processUrl = () => {
                if(!url) return;
                let finalUrl = url;
                // Hỗ trợ link dạng /pub?start=false...
                if(url.includes("/pub?")) {
                    finalUrl = url.replace("/pub?", "/embed?");
                } 
                // Hỗ trợ link edit (thử convert sang preview/embed)
                else if(url.includes("/edit")) {
                     finalUrl = url.split("/edit")[0] + "/embed?start=false&loop=false&delayms=3000";
                }
                setEmbedUrl(finalUrl);
                clearDrawing();
            };

            const clearDrawing = () => {
                const canvas = drawCanvasRef.current;
                if(canvas) {
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            };

            // Drawing Logic (Similar to PDF Board)
            const handleMouseDown = (e) => {
                if (!isDrawingMode) return;
                isDrawing.current = true;
                const canvas = drawCanvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const ctx = canvas.getContext('2d');
                ctx.beginPath();
                ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.strokeStyle = "red";
                ctx.lineWidth = 3;
                ctx.lineCap = "round";
            };

            const handleMouseMove = (e) => {
                if (!isDrawingMode || !isDrawing.current) return;
                const canvas = drawCanvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const ctx = canvas.getContext('2d');
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.stroke();
            };

            const handleMouseUp = () => { isDrawing.current = false; };

            // Resize canvas to match window
            useEffect(() => {
                const resizeCanvas = () => {
                    if(drawCanvasRef.current) {
                        drawCanvasRef.current.width = drawCanvasRef.current.offsetWidth;
                        drawCanvasRef.current.height = drawCanvasRef.current.offsetHeight;
                    }
                };
                window.addEventListener('resize', resizeCanvas);
                if(embedUrl) setTimeout(resizeCanvas, 500); // Wait for render
                return () => window.removeEventListener('resize', resizeCanvas);
            }, [embedUrl]);

            return (
                <div className="flex flex-col h-full bg-gray-800">
                    {/* Toolbar */}
                    <div className="bg-gray-900 text-white p-3 flex justify-between items-center shadow-md z-30">
                         <div className="flex-1 flex gap-2 max-w-2xl">
                             <input 
                                value={url}
                                onChange={(e)=>setUrl(e.target.value)}
                                placeholder="Dán link Google Slides (File -> Share -> Publish to web -> Embed -> Copy Link trong src='...')"
                                className="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-1 text-sm outline-none focus:border-indigo-500"
                             />
                             <button onClick={processUrl} className="bg-indigo-600 px-4 py-1 rounded text-sm hover:bg-indigo-500 font-bold">Load</button>
                         </div>
                         
                         <div className="flex items-center gap-2 ml-4">
                             <button 
                                onClick={()=>setIsDrawingMode(!isDrawingMode)} 
                                className={`flex items-center gap-2 px-3 py-1 rounded transition ${isDrawingMode ? 'bg-red-600 text-white shadow-lg ring-1 ring-white' : 'bg-gray-700 hover:bg-gray-600 text-gray-300'}`}
                             >
                                 <Icons.Pen className="w-4 h-4"/> {isDrawingMode ? "Đang Vẽ" : "Chế độ Vẽ"}
                             </button>
                             {isDrawingMode && (
                                 <button onClick={clearDrawing} className="p-1.5 bg-gray-700 rounded hover:bg-red-500 hover:text-white text-gray-400" title="Xóa hình vẽ"><Icons.Eraser className="w-5 h-5"/></button>
                             )}
                         </div>
                    </div>

                    {/* Content */}
                    <div className="flex-1 relative w-full h-full bg-black flex justify-center items-center">
                        {!embedUrl ? (
                            <div className="text-gray-500 text-center">
                                <Icons.Presentation className="w-20 h-20 mx-auto mb-4 opacity-50"/>
                                <p>Chưa có Slide nào.</p>
                                <p className="text-sm mt-2">Vào Google Slides {'>'} File {'>'} Share {'>'} Publish to web {'>'} Embed {'>'} Copy link.</p>
                            </div>
                        ) : (
                            <div className="relative w-full h-full">
                                <iframe 
                                    src={embedUrl} 
                                    frameBorder="0" 
                                    width="100%" 
                                    height="100%" 
                                    allowFullScreen="true" 
                                    mozallowfullscreen="true" 
                                    webkitallowfullscreen="true"
                                    className="absolute inset-0 z-0"
                                ></iframe>
                                
                                {/* Drawing Overlay */}
                                <canvas 
                                    ref={drawCanvasRef}
                                    className={`absolute inset-0 z-10 ${isDrawingMode ? 'cursor-draw pointer-events-auto' : 'pointer-events-none'}`}
                                    onMouseDown={handleMouseDown}
                                    onMouseMove={handleMouseMove}
                                    onMouseUp={handleMouseUp}
                                    onMouseLeave={handleMouseUp}
                                    width="100%"
                                    height="100%"
                                />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- COMPONENT: QUIZ PLAYER (Giữ nguyên) ---
        const QuizPlayer = ({ questions }) => {
            const [idx, setIdx] = useState(0);
            const [showKey, setShowKey] = useState(false);
            if (!questions || questions.length === 0) return <div className="flex flex-col items-center justify-center h-full text-gray-400"><Icons.CheckSquare className="w-16 h-16 mb-4"/><p className="text-xl">Chưa có câu hỏi.</p></div>;
            const q = questions[idx];
            return (
                <div className="flex flex-col h-full bg-slate-900 text-white">
                    <div className="flex justify-between items-center p-4 bg-slate-800 border-b border-slate-700"><h2 className="text-lg font-bold text-indigo-400">Câu {idx + 1}/{questions.length}</h2><div className="flex gap-2"><button onClick={()=>setShowKey(!showKey)} className="px-4 py-1 bg-yellow-600 rounded hover:bg-yellow-500 text-sm font-bold flex gap-2 items-center">{showKey ? <><Icons.EyeOff className="w-4 h-4"/> Ẩn Đáp Án</> : <><Icons.Eye className="w-4 h-4"/> Hiện Đáp Án</>}</button></div></div>
                    <div className="flex-1 flex flex-col items-center justify-center p-6 overflow-y-auto"><div className="w-full max-w-4xl"><div className="text-2xl md:text-3xl font-bold mb-8 leading-relaxed text-center"><span dangerouslySetInnerHTML={{__html: q.question.replace(/\$([^$]+)\$/g, (m,t)=>katex.renderToString(t,{throwOnError:false}))}} /></div><div className="grid grid-cols-1 md:grid-cols-2 gap-4">{q.options.map((o, i) => (<div key={i} className={`p-4 rounded-lg border-2 text-lg transition cursor-pointer flex items-center gap-3 ${showKey && i === q.correctAnswerIndex ? 'bg-green-900/40 border-green-500 text-green-400' : 'border-slate-600 bg-slate-800 hover:border-indigo-500'}`}><span className="font-bold w-8 h-8 rounded-full border flex items-center justify-center shrink-0">{String.fromCharCode(65+i)}</span><span dangerouslySetInnerHTML={{__html: o.replace(/\$([^$]+)\$/g, (m,t)=>katex.renderToString(t,{throwOnError:false}))}} /></div>))}</div></div></div>
                    <div className="p-4 bg-slate-800 flex justify-center gap-4"><button onClick={()=>{setIdx(Math.max(0, idx-1)); setShowKey(false)}} disabled={idx===0} className="p-3 bg-slate-700 rounded-full disabled:opacity-50 hover:bg-slate-600"><Icons.ArrowLeft className="w-6 h-6"/></button><button onClick={()=>{setIdx(Math.min(questions.length-1, idx+1)); setShowKey(false)}} disabled={idx===questions.length-1} className="p-3 bg-slate-700 rounded-full disabled:opacity-50 hover:bg-slate-600"><Icons.ArrowRight className="w-6 h-6"/></button></div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [lectureFile, setLectureFile] = useState(null);
            const [questions, setQuestions] = useState([]);
            const [loadingQuiz, setLoadingQuiz] = useState(false);
            const lectureInputRef = useRef(null);
            const quizInputRef = useRef(null);

            const handleUploadQuiz = async (e) => {
                const file = e.target.files[0]; if(!file) return; setLoadingQuiz(true);
                try {
                    let lines = [], answerKey = {};
                    if (file.name.endsWith('.docx')) { const result = await parseDocxAdvanced(file); lines = result.lines; answerKey = result.answerKey; } 
                    else if (file.name.endsWith('.pdf')) {
                        const buffer = await file.arrayBuffer(); const pdf = await pdfjsLib.getDocument(buffer).promise; let fullText = "";
                        for (let i = 1; i <= pdf.numPages; i++) { const page = await pdf.getPage(i); fullText += (await page.getTextContent()).items.map(item => item.str).join(' ') + "\n"; }
                        lines = fullText.split('\n').map(cleanText); const keyRegex = /(\d+)[\.\-\s]*([A-D])/g; let match;
                        while ((match = keyRegex.exec(fullText)) !== null) { if(parseInt(match[1]) < 100) answerKey[match[1]] = match[2]; }
                    }
                    const parsed = parseQuestions(lines, answerKey);
                    if(parsed.length === 0) throw new Error("Không tìm thấy câu hỏi nào!");
                    setQuestions(parsed); setActiveTab('quiz'); alert(`Đã nhập thành công ${parsed.length} câu hỏi!`);
                } catch (err) { alert("Lỗi: " + err.message); } finally { setLoadingQuiz(false); }
            };

            const handleUploadLecture = (e) => { if(e.target.files[0]) { setLectureFile(e.target.files[0]); setActiveTab('lecture'); } };

            return (
                <div className="flex h-screen overflow-hidden font-sans">
                    {/* SIDEBAR */}
                    <div className="w-20 bg-indigo-900 text-indigo-100 flex flex-col items-center py-6 gap-8 shadow-xl z-20 shrink-0">
                        <div className="p-2 bg-indigo-800 rounded-lg mb-4 shadow-inner"><Icons.Book className="w-8 h-8"/></div>
                        <button onClick={()=>setActiveTab('home')} className={`p-3 rounded-xl transition group relative ${activeTab==='home' ? 'bg-white text-indigo-900 shadow-lg' : 'hover:bg-indigo-800'}`}><Icons.Home className="w-6 h-6"/><span className="absolute left-14 bg-gray-900 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">Trang chủ</span></button>
                        <button onClick={()=>setActiveTab('lecture')} className={`p-3 rounded-xl transition group relative ${activeTab==='lecture' ? 'bg-white text-indigo-900 shadow-lg' : 'hover:bg-indigo-800'}`}><Icons.BookOpen className="w-6 h-6"/><span className="absolute left-14 bg-gray-900 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">Bài giảng PDF</span></button>
                        <button onClick={()=>setActiveTab('gslides')} className={`p-3 rounded-xl transition group relative ${activeTab==='gslides' ? 'bg-white text-indigo-900 shadow-lg' : 'hover:bg-indigo-800'}`}><Icons.Presentation className="w-6 h-6"/><span className="absolute left-14 bg-gray-900 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">Google Slides</span></button>
                        <button onClick={()=>setActiveTab('quiz')} className={`p-3 rounded-xl transition group relative ${activeTab==='quiz' ? 'bg-white text-indigo-900 shadow-lg' : 'hover:bg-indigo-800'}`}><Icons.CheckSquare className="w-6 h-6"/><span className="absolute left-14 bg-gray-900 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">Trắc nghiệm</span></button>
                    </div>
                    <div className="flex-1 relative bg-gray-100 overflow-hidden">
                        {activeTab === 'home' && (
                            <div className="absolute inset-0 p-10 flex flex-col items-center justify-center overflow-y-auto">
                                <div className="text-center mb-12"><h1 className="text-5xl font-extrabold text-indigo-900 mb-4 tracking-tight">SmartQuiz Pro v3</h1><p className="text-xl text-gray-500">Nền tảng dạy học toàn diện</p></div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl w-full">
                                    <div onClick={()=>lectureInputRef.current.click()} className="bg-white p-6 rounded-2xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 border-l-4 border-blue-500 cursor-pointer group"><div className="mb-4"><Icons.BookOpen className="w-10 h-10 text-blue-600"/></div><h3 className="text-xl font-bold text-gray-800 mb-2">1. Bài Giảng PDF</h3><p className="text-sm text-gray-500">Offline. Tải file PDF. Hỗ trợ hiệu ứng chuyển trang và bút vẽ.</p><input type="file" accept=".pdf" ref={lectureInputRef} className="hidden" onChange={handleUploadLecture}/></div>
                                    <div onClick={()=>setActiveTab('gslides')} className="bg-white p-6 rounded-2xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 border-l-4 border-yellow-500 cursor-pointer group"><div className="mb-4"><Icons.Presentation className="w-10 h-10 text-yellow-600"/></div><h3 className="text-xl font-bold text-gray-800 mb-2">2. Google Slides</h3><p className="text-sm text-gray-500">Online. Giữ nguyên hiệu ứng PPT gốc. Hỗ trợ vẽ đè lên slide.</p></div>
                                    <div onClick={()=>quizInputRef.current.click()} className="bg-white p-6 rounded-2xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 border-l-4 border-indigo-500 cursor-pointer group"><div className="mb-4"><Icons.CheckSquare className="w-10 h-10 text-indigo-600"/></div><h3 className="text-xl font-bold text-gray-800 mb-2">3. Thi Trắc Nghiệm</h3><p className="text-sm text-gray-500">Tải file Word/PDF đề thi. Chấm điểm tự động.</p><input type="file" accept=".docx,.pdf" ref={quizInputRef} className="hidden" onChange={handleUploadQuiz}/></div>
                                </div>
                            </div>
                        )}
                        <div className={`absolute inset-0 transition-opacity duration-300 ${activeTab === 'lecture' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}><PdfViewer file={lectureFile} /></div>
                        <div className={`absolute inset-0 transition-opacity duration-300 ${activeTab === 'gslides' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}><GoogleSlidesViewer /></div>
                        <div className={`absolute inset-0 transition-opacity duration-300 ${activeTab === 'quiz' ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}><QuizPlayer questions={questions} /></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
