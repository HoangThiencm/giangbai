<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý văn bản · Hành chính</title>
    <script src="access-control.js?v=20260622-vanban-sector1"></script>
    <script>window.VANBAN_SECTOR = 'hanhchinh';</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { font-family: "Segoe UI", Arial, sans-serif; background: #f6f8fb; }
        .modal-backdrop { background: rgba(15, 23, 42, .58); backdrop-filter: blur(2px); }
    </style>
</head>
<body class="min-h-screen text-slate-900">
    <div id="vanbanNav"></div>

    <main class="mx-auto max-w-7xl px-4 py-5">
        <div id="driveWarning" class="mb-4 hidden rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm leading-6 text-amber-950"></div>

        <section id="summary" class="grid grid-cols-2 gap-3 lg:grid-cols-4"></section>

        <section class="mt-5 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
            <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                <div id="directionTabs" class="flex flex-wrap gap-2"></div>
                <button id="newSchoolYearBtn" type="button" class="shrink-0 rounded border border-teal-200 bg-teal-50 px-3 py-2 text-xs font-bold text-teal-800 hover:bg-teal-100">
                    <i class="fa-solid fa-plus mr-1"></i>Tạo năm học
                </button>
            </div>
            <div class="mt-4 grid gap-3 md:grid-cols-3">
                <label class="text-sm font-bold text-slate-700">Năm học
                    <select id="academicYearFilter" class="mt-1 w-full rounded border border-slate-300 p-2.5 outline-none focus:ring-2 focus:ring-teal-500"></select>
                </label>
                <label class="text-sm font-bold text-slate-700">Trạng thái báo cáo
                    <select id="statusFilter" class="mt-1 w-full rounded border border-slate-300 p-2.5 outline-none focus:ring-2 focus:ring-teal-500">
                        <option value="">Tất cả</option>
                        <option value="pending">Chưa xử lý</option>
                        <option value="in_progress">Đang xử lý</option>
                        <option value="completed">Đã báo cáo</option>
                        <option value="overdue">Quá hạn</option>
                    </select>
                </label>
                <label class="text-sm font-bold text-slate-700">Tìm văn bản
                    <input id="searchInput" class="mt-1 w-full rounded border border-slate-300 p-2.5 outline-none focus:ring-2 focus:ring-teal-500" placeholder="Số/ký hiệu, trích yếu, nơi gửi/nhận...">
                </label>
            </div>
        </section>

        <section id="reminderPanel" class="mt-5 hidden rounded-xl border border-amber-200 bg-amber-50 p-4 shadow-sm">
            <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                <div>
                    <h2 class="font-extrabold text-amber-950"><i class="fa-solid fa-bell mr-2 text-amber-700"></i>Việc cần xử lý</h2>
                    <p id="reminderSummary" class="mt-1 text-sm text-amber-900"></p>
                </div>
            </div>
            <div id="reminderList" class="mt-3 grid gap-2 lg:grid-cols-2"></div>
        </section>

        <section class="mt-5 rounded-xl border border-slate-200 bg-white shadow-sm">
            <div class="flex items-center justify-between border-b border-slate-200 px-4 py-4">
                <h2 class="font-bold text-slate-800">Danh mục văn bản</h2>
                <span id="documentCount" class="text-sm text-slate-500"></span>
            </div>
            <div id="documentList"></div>
        </section>
    </main>

    <div id="documentModal" class="modal-backdrop fixed inset-0 z-50 hidden overflow-y-auto p-3 sm:p-6">
        <form id="documentForm" class="mx-auto my-4 max-w-5xl rounded-2xl bg-white shadow-2xl">
            <div class="flex items-start justify-between gap-4 border-b border-slate-200 px-5 py-4">
                <div>
                    <p class="text-xs font-extrabold uppercase tracking-[.13em] text-teal-700">Hành chính</p>
                    <h2 id="modalTitle" class="mt-1 text-xl font-black">Thêm văn bản</h2>
                </div>
                <button id="closeModalBtn" type="button" class="grid h-10 w-10 place-items-center rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-5 p-5">
                <input id="documentId" type="hidden">
                <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-4">
                    <label class="text-sm font-bold text-slate-700">Năm học <span class="text-rose-600">*</span>
                        <select id="academicYear" required class="mt-1 w-full rounded border border-slate-300 p-2.5"></select>
                    </label>
                    <label class="text-sm font-bold text-slate-700">Loại
                        <select id="direction" class="mt-1 w-full rounded border border-slate-300 p-2.5">
                            <option value="incoming">Văn bản đến</option>
                            <option value="outgoing">Văn bản đi</option>
                        </select>
                    </label>
                    <label class="text-sm font-bold text-slate-700">Số / ký hiệu
                        <input id="documentNumber" class="mt-1 w-full rounded border border-slate-300 p-2.5" placeholder="Ví dụ: 123/PGDĐT-GDTrH">
                    </label>
                    <label class="text-sm font-bold text-slate-700">Ngày văn bản
                        <input id="documentDate" type="date" class="mt-1 w-full rounded border border-slate-300 p-2.5">
                    </label>
                    <label class="text-sm font-bold text-slate-700">Loại văn bản
                        <select id="documentType" class="mt-1 w-full rounded border border-slate-300 bg-white p-2.5">
                            <option value="">Chọn loại văn bản</option>
                            <option value="Kế hoạch">Kế hoạch</option>
                            <option value="Tờ trình">Tờ trình</option>
                            <option value="Báo cáo">Báo cáo</option>
                            <option value="Quyết định">Quyết định</option>
                            <option value="Thông báo">Thông báo</option>
                            <option value="Công văn">Công văn</option>
                            <option value="Thông tư">Thông tư</option>
                            <option value="Hướng dẫn">Hướng dẫn</option>
                            <option value="Quy định">Quy định</option>
                        </select>
                    </label>
                </div>
                <div class="grid gap-3 md:grid-cols-[1fr_320px]">
                    <label class="text-sm font-bold text-slate-700">Trích yếu / tên văn bản <span class="text-rose-600">*</span>
                        <input id="title" required class="mt-1 w-full rounded border border-slate-300 p-2.5" placeholder="Ví dụ: Báo cáo kết quả thực hiện nhiệm vụ...">
                    </label>
                    <label class="text-sm font-bold text-slate-700">Nơi gửi / nhận
                        <input id="organization" class="mt-1 w-full rounded border border-slate-300 p-2.5" placeholder="Phòng GDĐT, UBND...">
                    </label>
                </div>
                <label class="block text-sm font-bold text-slate-700">Tóm tắt việc cần làm
                    <textarea id="summaryText" rows="3" class="mt-1 w-full rounded border border-slate-300 p-2.5"></textarea>
                </label>
                <section class="rounded-xl border border-violet-200 bg-violet-50 p-4">
                    <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                        <div>
                            <h3 class="font-bold text-violet-950"><i class="fa-solid fa-wand-magic-sparkles mr-2"></i>AI đọc và tự điền</h3>
                            <p class="mt-1 text-xs text-violet-800">Dán trích văn bản hoặc chọn PDF để AI gợi ý thông tin.</p>
                        </div>
                        <button id="aiSuggestBtn" type="button" class="shrink-0 rounded-lg bg-violet-700 px-3 py-2 text-sm font-bold text-white hover:bg-violet-800"><i class="fa-solid fa-wand-magic-sparkles mr-1"></i> AI tự điền</button>
                    </div>
                    <textarea id="sourceText" rows="5" class="mt-3 w-full rounded border border-violet-200 bg-white p-2.5 text-sm"></textarea>
                    <p id="aiNote" class="mt-2 hidden text-xs font-semibold text-violet-800"></p>
                </section>
                <section class="rounded-xl border border-amber-200 bg-amber-50 p-4">
                    <label class="inline-flex cursor-pointer items-center gap-2 text-sm font-bold text-amber-950">
                        <input id="reportRequired" type="checkbox" class="h-4 w-4 accent-amber-700"> Cần báo cáo / hoàn thành công việc
                    </label>
                    <div id="reportFields" class="mt-3 grid hidden gap-3 md:grid-cols-3">
                        <label class="text-sm font-bold text-slate-700">Hạn báo cáo<input id="reportDueAt" type="date" class="mt-1 w-full rounded border border-amber-300 bg-white p-2.5"></label>
                        <label class="text-sm font-bold text-slate-700">Trạng thái<select id="reportStatus" class="mt-1 w-full rounded border border-amber-300 bg-white p-2.5"><option value="pending">Chưa xử lý</option><option value="in_progress">Đang xử lý</option><option value="completed">Đã báo cáo</option></select></label>
                        <label class="text-sm font-bold text-slate-700">Ghi chú<textarea id="reportNote" rows="2" class="mt-1 w-full rounded border border-amber-300 bg-white p-2.5"></textarea></label>
                    </div>
                </section>
                <label class="block text-sm font-bold text-slate-700">Tệp văn bản / minh chứng
                    <input id="files" type="file" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png,.txt" class="mt-2 block w-full rounded border border-slate-300 bg-slate-50 p-2 text-sm">
                </label>
                <p id="formError" class="hidden rounded border border-rose-200 bg-rose-50 p-3 text-sm text-rose-800"></p>
            </div>
            <div class="flex flex-wrap justify-end gap-2 border-t border-slate-200 px-5 py-4">
                <button id="cancelModalBtn" type="button" class="rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-bold text-slate-700 hover:bg-slate-50">Hủy</button>
                <button id="saveDocumentBtn" type="submit" class="rounded-lg bg-teal-700 px-4 py-2.5 text-sm font-bold text-white hover:bg-teal-800"><i class="fa-solid fa-floppy-disk mr-1"></i> Lưu văn bản</button>
            </div>
        </form>
    </div>

    <div id="drivePreviewModal" class="modal-backdrop fixed inset-0 z-[60] hidden p-3 sm:p-6">
        <div class="mx-auto flex h-full max-w-6xl flex-col overflow-hidden rounded-2xl bg-white shadow-2xl">
            <div class="flex items-center justify-between border-b border-slate-200 px-5 py-3">
                <div>
                    <p class="text-[11px] font-extrabold uppercase tracking-[.14em] text-teal-700">Xem tệp văn bản</p>
                    <h2 id="drivePreviewTitle" class="text-base font-black text-slate-900">Tệp đính kèm</h2>
                </div>
                <button id="closeDrivePreviewBtn" type="button" class="grid h-10 w-10 place-items-center rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <iframe id="drivePreviewFrame" class="min-h-0 flex-1 bg-slate-100" title="Xem tệp trong trang"></iframe>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 z-[70] hidden max-w-sm rounded-lg px-4 py-3 text-sm font-semibold shadow-xl"></div>
    <script src="vanban-app.js?v=20260622-vanban-sector1"></script>
</body>
</html>
